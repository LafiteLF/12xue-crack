<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><meta name="format-detection" content="telephone=no"/>
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        body{

        }
    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav">
    <a class="aui-pull-left aui-btn">
        <span class="aui-iconfont aui-icon-back" tapmode onclick="api.closeWin();"></span>
    </a>
    <div class="aui-12xue-title">我的学习机</div>
    <a class="aui-iconfont aui-pull-right aui-icon-check" tapmode onclick="commitPicForStucpu();"></a>
</header>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript">
    apiready = function(){
        var header = $api.dom('header');
        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        if($api.getStorage('cpuCode').length != 0){
            $api.css($api.dom('.aui-pull-right'), 'display:none');
        }
        api.addEventListener({
            name: 'showRightBtn'
        }, function (ret, err) {
            $api.css($api.dom('.aui-pull-right'), 'display:block');
        });
        api.addEventListener({
            name: 'hideRightBtn'
        }, function (ret, err) {
            $api.css($api.dom('.aui-pull-right'), 'display:none');
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.openFrame({
            name: 'mystuCpu_frame',
            url: 'mystuCpu_frame.html',
            bounces: false,
            vScrollBarEnabled: false,
            rect: {
                x: 0,
                y: headerH ,
                w: 'auto',
                h: frameH
            },
        });
    };
    function commitPicForStucpu() {
        var jsfun = 'commitKeyInfo();';
        api.execScript({
            frameName:'mystuCpu_frame',
            script: jsfun
        });
    }
    function hideRightBtn() {
        $api.css($api.dom('.aui-pull-right'), 'display:none');
    }
    function showRightBtn() {
        $api.css($api.dom('.aui-pull-right'), 'display:block');
    }
</script>
</html>
