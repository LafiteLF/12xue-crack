<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,initial-scale=1.0,width=device-width"/>
    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>意见反馈</title>
    <link rel="stylesheet" href="../../../css/sm.min.css">
    <link rel="stylesheet" href="../../../css/common.css">
    <link rel="stylesheet" href="../../../css/analysis.css">
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui-pull-refresh.css"/>
    <style type="text/css">
        body {
            background-color: #f2f2f2
        }

        .qr {
            border: 1px solid #00c8c8;
            border-radius: 3px;
            margin-top: 0.5rem;
            font-size: 0.7rem !important;
            margin-right: 10px;
        }

        .aui-bar-nav .aui-iconfont {
            line-height: 1.25rem
        }

        .aui-icon-check:before {
            margin-right: 5px;
        }
        .aui-bar-nav .aui-iconfont:active{
            /*background: #4bc7c7;*/
            /*color: #fff;*/
        }
        .qr:active{
            background:#00c8c8 ;
            color: #fff;
        }
    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav content aui-clearfix">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">
        <span class="aui-iconfont aui-icon-left" tapmode onclick='api.closeWin()'></span>意见反馈
    </a>
    <span class="aui-iconfont aui-icon-check aui-pull-right qr" tapmode onclick="commitOpinion()"> 确定</span>
</header>
<!--<p class="aui-text-center">.aui-content 普通列表</p>-->

<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    apiready = function () {

        var header = document.querySelector('header');
//        $api.fixStatusBar(header);

        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'opinionView_frame',
            url: 'opinionView_frame.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false
        });
    };

    function commitOpinion() {
        var jsfun = 'commitOpinion();';
        api.execScript({
            frameName: 'opinionView_frame',
            script: jsfun
        });
    }
</script>

</body>
</html>
