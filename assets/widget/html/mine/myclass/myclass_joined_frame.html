    apiready = function () {
        var data = api.pageParam.name;
        for (var i = 0; i < api.pageParam.name.length; i++) {
            var realname = '';
            if (api.pageParam.name[i].realname == null) {
                realname = '班主任';
            } else {
                realname = api.pageParam.name[i].realname;
            }

            if (data[i].apply_type == 2 && data[i].audit_status == 0) {
                var html = '<li class="aui-list-view-cell">' +
                    '<p class=" classname aui-ellipsis-1">' + api.pageParam.name[i].njmc + '级' + api.pageParam.name[i].classname + '</p>' +
                    '<p class=" realname aui-ellipsis-1">' + realname + '</p>' +
                    '<p class="exitsh tc"  code="' + api.pageParam.name[i].code + '" id="' + api.pageParam.name[i].id + '" gradeid="' + api.pageParam.name[i].gradeid + '" classname="' + api.pageParam.name[i].njmc + '级' + api.pageParam.name[i].classname + '">退出审核中...</p>' +
                    '</li>';
            } else {
                var html = '<li class="aui-list-view-cell" >' +
                    '<p class=" classname aui-ellipsis-1">' + api.pageParam.name[i].njmc + '级' + api.pageParam.name[i].classname + '</p>' +
                    '<p class=" realname aui-ellipsis-1">' + realname + '</p>' +
                    '<p class="exit tc" onclick="logoutClass(this)" code="' + api.pageParam.name[i].code + '" id="' + api.pageParam.name[i].id + '" gradeid="' + api.pageParam.name[i].gradeid + '" classname="' + api.pageParam.name[i].njmc + '级' + api.pageParam.name[i].classname + '">退出</p>' +
                    '</li>';
            }
            var ul = $api.dom('.aui-list-view');
            $api.append(ul, html);
        }
    };

    function logoutClass(context) {



        api.confirm({
            title: '提示',
            msg: '确定退出该班级吗？(需老师审核)',
            buttons: ["取消", "确定"]
        }, function (ret, err) {
            switch (ret.buttonIndex) {
                case 1:
                    break;
                case 2:
                    apiObj.Post(UrlRouter.PostExitClass, {
                        values: {
                            cuid: $api.getStorage('uid'),
                            classid: $api.attr(context, 'id'),
                            type:2
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                count = $api.attr(context, 'id');
                                $api.text($api.byId($api.attr(context, 'id'), '.tc'), '退出审核中...');
                                $api.byId($api.attr(context, 'id')).disabled = true;
                                $api.dom($api.closest(context, '.aui-list-view-cell'), '.tc').disabled = true;
                                $api.removeCls($api.dom($api.closest(context, '.aui-list-view-cell'), '.tc'), 'exit');
                                $api.addCls($api.dom($api.closest(context, '.aui-list-view-cell'), '.tc'), 'exitsh');
                                $api.attr($api.byId($api.attr(context, 'id')), 'disabled', true);
                            } else {
                                toast12xue(ret.msg);
                            }
                        } else {
                            toast12xue(err.msg);
                        }
                    });
                    break;
            }
        });
