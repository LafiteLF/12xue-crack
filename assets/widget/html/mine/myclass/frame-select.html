<html>
<head>
    <meta charset="utf-8"><meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>密保问题列表</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .aui-border-t:before, .aui-border-b:after{ height: 0px;}
        .content {
            width: 35%;
            height: 70%;
            top:15%;
            position: absolute;
            left: 32.5%;
            border-radius: 3px;
            overflow-y: auto;
            background: #fff;


        }
        .content ul li div {
            line-height: 55px;
            font-size: 0.8rem;
            color: #333333;
            border-bottom: 1px solid #e3e3e3;
            padding: 0 10%;
            width: 100%;
            height: 55px;
            display:block;white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .content ul li div:active{
            color:#4bc7c7;
            background: #fff;
        }
        .close {
            width: 100%;
            height: 100%
        }
        ::-webkit-scrollbar { width: 4px; margin-right: 10px; border-radius: 60px;}
        ::-webkit-scrollbar-thumb {
            border-radius: 60px;
            background: #4bc7c7;
            -webkit-box-shadow: #4bc7c7;
        }
        ::-webkit-scrollbar-track {    -webkit-box-shadow: inset 0 0 6px rgba(0, 0, 0, 0);}
        ::-webkit-scrollbar-thumb:window-inactive {
            background: #4bc7c7; border-radius: 60px;
        }
        .aui-list .aui-list-item {
         padding-left: 0rem;
        }
        .aui-list.aui-list-in .aui-list-item-inner:after{ height: 0px}
    </style>
</head>
<body>
<div class="close" tapmode  ></div>
<div class="aui-content content">
    <ul  class="aui-list aui-list-in">

    </ul>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    apiready=function () {
        $api.attr($api.dom('.close'), 'onclick', 'closeFrame();');
        var xxxz= api.pageParam.xxxz;
        var czxz= api.pageParam.czxz;
        var gzxz= api.pageParam.gzxz;
        var  arr;
        var xnArr;
        if(api.pageParam.type=='xd'){
            if (xxxz!=0&&czxz!=0&&gzxz!=0){
                //小 初 高 都有
                var html='<li class="aui-list-item" id="21" onclick="clicked(this)">'+'<div class="aui-list-item-inner">小学</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);

                var html='<li class="aui-list-item" id="31" onclick="clicked(this)">'+'<div class="aui-list-item-inner">初中</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);

                var html='<li class="aui-list-item" id="34" onclick="clicked(this)">'+'<div class="aui-list-item-inner">高中</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);

            }else if (xxxz!=0&&czxz!=0&&gzxz==0){
                //无高中
                var html='<li class="aui-list-item" id="21" onclick="clicked(this)">'+'<div class="aui-list-item-inner">小学</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);

                var html='<li class="aui-list-item" id="31" onclick="clicked(this)">'+'<div class="aui-list-item-inner">初中</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);

            }else if (xxxz==0&&czxz!=0&&gzxz!=0){
                //无小学
                var html='<li class="aui-list-item" id="31" onclick="clicked(this)">'+'<div class="aui-list-item-inner">初中</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);

                var html='<li class="aui-list-item" id="34" onclick="clicked(this)">'+'<div class="aui-list-item-inner">高中</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);
            }else if(xxxz!=0&&czxz==0&&gzxz!=0){
                //无初中
                var html='<li class="aui-list-item" id="21" onclick="clicked(this)">'+'<div class="aui-list-item-inner">小学</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);


                var html='<li class="aui-list-item" id="34" onclick="clicked(this)">'+'<div class="aui-list-item-inner">高中</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);
            }else if(xxxz!=0&&czxz==0&&gzxz==0){
                //只要小学
                var html='<li class="aui-list-item" id="21" onclick="clicked(this)">'+'<div class="aui-list-item-inner">小学</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);
            }else if(xxxz==0&&czxz!=0&&gzxz==0){
                //只有初中
                var html='<li class="aui-list-item" id="31" onclick="clicked(this)">'+'<div class="aui-list-item-inner">初中</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);
            }else if(xxxz==0&&czxz==0&&gzxz!=0){
                //只有高中
                var html='<li class="aui-list-item" id="34" onclick="clicked(this)">'+'<div class="aui-list-item-inner">高中</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);
            }
        }else if(api.pageParam.type=='xn') {
            xnArr= api.pageParam.xnArr;
            for (var n=0;n<xnArr.length;n++){
                var html='<li class="aui-list-item"  onclick="clickedXn(this)">'+'<div class="aui-list-item-inner">'+xnArr[n]+'</div>'+'</li>'
                var ul= $api.dom( '.aui-list');
                $api.append(ul,html);
            }
        }


    };
     function clicked(context) {
         var xdid=$api.attr($api.closest(context, '.aui-list-item'), 'id');
         var xdmc=$api.text($api.dom(context, '.aui-list-item-inner'));
         api.sendEvent({
             name: 'selectXd',
             extra: {xdid:xdid,xdmc:xdmc}//学段id
         });
         api.closeFrame({
             name: ''
         });
     }
    //选择学年
    function clickedXn(context) {
        var xnmc=$api.text($api.dom(context, '.aui-list-item-inner'));
        api.sendEvent({
            name: 'selectXn',
            extra: {xnmc:xnmc}//学年id
        });
        api.closeFrame({
            name: ''
        });
    }
    function closeFrame() {
        api.closeFrame({
        });
    }
</script>

</html>
