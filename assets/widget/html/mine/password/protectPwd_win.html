<head>

<body>
<header class="aui-bar aui-bar-nav content aui-clearfix">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">
        <span class="aui-iconfont aui-icon-left" tapmode onclick='api.closeWin()' ></span>密码保护
    </a>
</header>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    apiready = function () {
        var systemType = api.systemType;//android or ios
        var json = '';
        var uid='';
        var token='';
        if (systemType == 'android') {
            json = JSON.parse(api.appParam);
            uid = json.uid;
            token = json.token;
        } else {
            json = api.pageParam;
            uid = json.uid;
            token = json.token;
        }
//        $api.setStorage('uid', uid);
//        $api.setStorage('token', token);


        var header = document.querySelector('header');
        header = document.querySelector('header');
//        $api.fixStatusBar(header);
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'protectPwd_frame',
            url: 'protectPwd_frame.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            pageParam: {name: 'pageparam'},
            bounces: true
        });

    }





</script>
</body>
</html>
