<script type="text/javascript">
    var data;
    var id;//第几个问题
    var questionIdsss = new Array(10);
    var qArr=[];
    var tagIdOne;
    var tagIdTwo;
    var tagIdThree;
    apiready=function () {
        data= api.pageParam.questions;
        id= api.pageParam.id;
        tagIdOne= api.pageParam.tagIdOne;
        tagIdTwo= api.pageParam.tagIdTwo;
        tagIdThree= api.pageParam.tagIdThree;

        for(var i=0;i<data.length;i++){
            if (tagIdOne==data[i].id||tagIdTwo==data[i].id||tagIdThree==data[i].id){

            }else {
                qArr.push(data[i]);
            }
        }

        if (qArr.length > 0) {
            data = qArr;
        }
        for (var n=0;n<data.length;n++){
            var html='<li class="aui-list-item" id="'+data[n].id+'" onclick="clicked(this)">'+'<div class="aui-list-item-inner">'+data[n].question+'</div>'+'</li>'
            var ul= $api.dom( '.aui-list');
            $api.append(ul,html);
        }
    };
    function clicked(context) {
        questionIdsss[id] =$api.attr(context,'id');
//        alert(questionIdsss[id]);

        var questionText=$api.text($api.dom(context,'.aui-list-item-inner'));
//        alert(questionText);
        api.sendEvent({
            name: 'clickItem',
            extra: {itemQuestion: questionText,questionIds:questionIdsss[id],id:id}//问题详情  问题id  第几个问题  012
        });
        api.closeFrame({
            name: ''
        });
    }
