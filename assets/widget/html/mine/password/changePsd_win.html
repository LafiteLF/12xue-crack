<script type="text/javascript">
    apiready = function () {
        var systemType = api.systemType;//ios or android
        var json = '';
        var uid = '';
        var token = '';
        if(systemType == 'android'){
            json = JSON.parse(api.appParam);
            uid = json.uid;
            token = json.token;
        }else{
            json = api.pageParam;
            uid = json.uid;
            token = json.token;
        }
//        $api.setStorage('uid',uid);
//        $api.setStorage('token',token);

//        apiObj.SetAuthToken($api.getStorage('token'));
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);

        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'changePsd_frame',
            url: 'changePsd_frame.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: true,
            pageParam:{type:api.pageParam.type}
        });
    };
    function closeWin() {
//        if(api.pageParam.type == 'must'){
//            api.toast({
//                msg: '您的密码过于简单，请重置密码',
//                duration: 2000,
//                location: 'bottom'
//            });
//        }else {
            api.closeWin();
//        }
    }
    function changePsw(){
        var jsfun='changePsw();';
        api.execScript({
            frameName: 'changePsd_frame',
            script: jsfun
        });
    }
</script>

</body>
