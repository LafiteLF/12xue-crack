<script>

    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiready = function () {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        apiObj.SetAuthToken($api.getStorage('token'));
        GetUserstore();
//        setTimeout("$api.html($api.dom('.czz'), $api.getStorage('prestige'))", 500);
        GetUserprestiges();

    };

    function GetUserprestiges() {
        apiObj.Get(UrlRouter.GetUserprestiges, {
            values: {
                num: 100,
                p: 1
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {
                    if (ret.data) {
                        if (ret.data == 0) {
                            $('.aui-contentNodata').show();
                            $('.content').hide();
                        } else {
                            $('.content').show();
                            var growall = ret.data;
                            var comment = [];
                            var create_time = [];
                            var create_time1 = [];
                            var gold = [];
                            for (var i = 0; i < growall.length; i++) {
                                comment.push(growall[i].comment);
                                var d = new Date(growall[i].create_time * 1000);    //根据时间戳生成的时间对象
                                create_time.push(d.format('yyyy-MM-dd'));
                                create_time1.push(d.format('hh:mm:ss'));
                                if (growall[i].gold > 0) {
                                    gold.push('+' + growall[i].gold);
                                } else {
                                    gold.push(growall[i].gold);
                                }
                                var htmltr = '<tr align=center>' + '<td>' + create_time[i] + ' ' + create_time1[i] + '</td>' + '<td>' + gold[i] + '</td>' + '<td>' + comment[i] + '</td>' + '</tr>';
                                $api.append($api.dom('table'), htmltr);
                            }
                        }

                    } else {
                        api.toast({
                            msg: '暂无成长记录',
                            duration: 2000,
                            location: 'bottom'
                        })

                    }

                } else {
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    })

                }
            } else {
                api.toast({
                            msg: err.msg,
                            duration: 2000,
                            location: 'bottom'
                        }
                )
            }
        })

    }
    Date.prototype.format = function (format) {
        var date = {
            "M+": this.getMonth() + 1,
            "d+": this.getDate(),
            "h+": this.getHours(),
            "m+": this.getMinutes(),
            "s+": this.getSeconds(),
            "q+": Math.floor((this.getMonth() + 3) / 3),
            "S+": this.getMilliseconds()
        };
        if (/(y+)/i.test(format)) {
            format = format.replace(RegExp.$1, (this.getFullYear() + '').substr(4 - RegExp.$1.length));
        }
        for (var k in date) {
            if (new RegExp("(" + k + ")").test(format)) {
                format = format.replace(RegExp.$1, RegExp.$1.length == 1
                        ? date[k] : ("00" + date[k]).substr(("" + date[k]).length));
            }
        }
        return format;
    }
