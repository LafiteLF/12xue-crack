<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title></title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <link rel="stylesheet" href="../../../css/ThirdCss/style.css"/>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .content {
            width: 35%;
            top: 30%;
            position: absolute;
            left: 32.5%;

        }

        .content ul {
            width: 100%;
            background: #fff;
            margin: 0 auto;
            border-radius: 5px;
            padding-top: 50px;
            padding-bottom: 30px;
        }

        .close {
            width: 100%;
            height: 100%
        }

        .content ul li {
            text-align: center;
            font-size: 0.8rem;
            color: #fff;
            width: 60%;
            height: 46px;
            line-height: 46px;
            margin: 0 auto;
            border-radius: 5px;
            margin-bottom: 20px;
            background: #4bc7c7;
        }

        ul li span {
            color: #fff;
            display: block;
            height: 46px;
            line-height: 46px;
            width: 55%;
            margin: 0 auto
        }


        ul li  span {
            text-align: center;
        }



        ul li:active{
            background: #3fa6a6;
        }
    </style>
</head>
<body>
<div class="close" tapmode  "></div>
<div class="content">
    <ul>
        <li tapmode @click="inputClick('boy')">
            <span>男</span>
        </li>
        <li tapmode @click="inputClick('girl')">
            <span>女</span>
        </li>
    </ul>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function () {
        $api.attr($api.dom('.close'), 'onclick', 'vm.closeFrame();');
    };
    var vm = new Vue({
        el: '.content',
        data: {},
        methods: {
            closeFrame: function () {
                api.closeFrame({
                    name: 'frame-sex-pad'
                });
            },
            inputClick:function (type) {
                if(type == 'boy'){
                    api.sendEvent({
                        name: 'frame-sex-pad',
                        extra: {type: 'boy'}
                    });
                }
                if(type == 'girl'){
                    api.sendEvent({
                        name: 'frame-sex-pad',
                        extra: {type: 'girl'}
                    });
                }
                api.closeFrame({
                    name: 'frame-sex-pad'
                });
            }
        }
    });

    function closeWin() {
        api.closeWin();
    }
</script>
