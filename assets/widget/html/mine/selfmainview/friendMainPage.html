<script type="text/javascript">
    var otheruid = '';
    var sexhtml;
    apiready = function () {
        otheruid = api.pageParam.otheruid;
//        getspaceinfo();
        getHeadUrl();

        api.addEventListener({
            name: 'reloadNum'
        }, function (ret, err) {
            getPortrait();
        });
    };

    function getHeadUrl() {
        apiObj.Get(UrlRouter.GetPortrait, {
            values: {
                uid: otheruid,
                size: 'b'
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    //存用户头像
                    if (ret.sex == 1) {
                        sexhtml = '<div class= "aui-iconfont aui-icon-mail sex"></div>';
                    } else if (ret.sex == 2) {
                        sexhtml = '<div class= "aui-iconfont aui-icon-femail unsex"></div>';
                    }else{
                        sexhtml ="";
                    }
                    getPortrait();
                }
            } else {
                getPortrait();
            }
        });
    }

    function guanzhu() {

        api.openWin({
            name: 'attention_win',
            url: 'attention_win.html',
            pageParam: {otheruid: otheruid, fans: 'no'}
        });
    }


    function fans() {

        api.openWin({
            name: 'attention_win',
            url: 'attention_win.html',
            pageParam: {otheruid: otheruid, fans: 'yes'}
        });


    }


    function contern(context) {
        if ($api.hasCls(context, 'aui-btn-infome')) {

            apiObj.Put(UrlRouter.FollowUser, {
                values: {
                    type: 1,
                    followuid: otheruid
                }
            }, function (ret, err) {
                if (ret) {
                    if (ret.ret == 0) {

                        $api.removeCls(context, 'aui-btn-infome');
                        $api.removeCls(context, 'aui-btn-warning');
                        $api.addCls(context, 'aui-btn-outlined');
                        $api.html(context, '取消关注');


                    } else {
                        //alert(ret.msg);
                    }
                } else {

                }
            });
        } else {


            apiObj.Put(UrlRouter.FollowUser, {
                values: {
                    type: 0,
                    followuid: otheruid
                }
            }, function (ret, err) {
                if (ret) {
                    if (ret.ret == 0) {

                        $api.addCls(context, 'aui-btn-infome');
                        $api.addCls(context, 'aui-btn-warning');
                        $api.removeCls(context, 'aui-btn-outlined');
                        $api.html(context, '<span class="aui-iconfont aui-icon-add"></span>关注');


                    } else {
                        //alert(ret.msg);
                    }
                } else {

                }
            })
        }
    }


</script>
