<script type="text/javascript">

    var page = 1;
    var otheruid;
    var fans;
    var totalPage;
    apiready = function () {

        otheruid = api.pageParam.otheruid;
        fans = api.pageParam.fans;
        getfanslist();

        //下拉刷新
        var pullRefresh = new auiPullToRefresh({
            container: document.querySelector('.aui-refresh-content'),
            triggerDistance: 100
        }, function (ret) {
            if (ret.status == "success") {
                setTimeout(function () {
                    page = 1;
                    getfanslist();
                    pullRefresh.cancelLoading(); //刷新成功后调用此方法隐藏
                }, 500)
            }
        });
        //下拉到底部的监听
        api.addEventListener({
            name: 'scrolltobottom',
            extra: {
                threshold: 0            //设置距离底部多少距离时触发，默认值为0，数字类型
            }
        }, function (ret, err) {
            page++;
            if(page>totalPage){
                api.toast({
                    msg: '已加载全部',
                    duration: 2000,
                    location: 'bottom'
                });
                return;
            }
            getfanslist();
        });


    };


</script>
