<!DOCTYPE HTML><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title></title>    <link rel="stylesheet" type="text/css" href="../css/publicCss.css"/>    <style type="text/css">        * {            margin: 0;            padding: 0;        }        html, body {            background-color: rgba(0, 0, 0, 0.06);            position: relative;            height: 100%; width: 100%;        }        img{             width: 300px;  position: absolute; top: calc(50% - 147px); left: calc(50% - 150px);        }        .massage {            width: 300px;            padding-bottom: 30px;            background-color: white;            position: absolute;            left: calc(50% - 150px);            top: calc(50% - 60px);            border-bottom-left-radius: 5px;            border-bottom-right-radius: 5px;        }        p {            text-align: center;            margin-top: 30px;        }        span {            font-size: 14px;        }        .button {            padding: 8px 25px;            border-radius: 100px;            background-color: #4CC7C7;            color: white;        }        </style></head><body><img src="../image/timeover.png"><div class="massage">    <p>        <span>您已经学习</span><span style="color: red" class="timeMin">10</span><span>分钟了，请注意休息哦~</span>    </p>    <p>        <span class="button" tapmode onclick="iKnow()">知道了</span>    </p></div></body><script type="text/javascript" src="../script/api.js"></script><script type="text/javascript" src="../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../script/12XueApi_Router.js"></script><script>    apiready = function () {        $api.text($api.dom('.timeMin'), $api.getStorage('stopTime'));        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            iKnow();        });    };    function iKnow() {        api.sendEvent({            name: 'timeoverEvent'        });        api.closeWin();//        api.closeFrame();    }</script></html>
