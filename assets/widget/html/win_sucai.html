<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>习题列表</title>    <link rel="stylesheet" type="text/css" href="../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../css/winDetailCss.css"/>    <style>        .winTitle {            width: calc(100% - 165px);        }        .chooseclass{width: 23px; height: 23px; position: absolute; right: 10px; top: 13px}        .chooseclass img{ width: 100%}    </style></head><body><header class="clearfix content1">    <div onclick=" vm.closeWin();" class="winTitle pull_left" v-text="homeworkItem.title">    </div>    <div class="chooseclass"  @click="chooseclass()"><img src="../image/newhomework/chooseclass.png"></div></header></body><script type="text/javascript" src="../script/api.js"></script><script type="text/javascript" src="../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../script/12XueApi_Router.js"></script><script type="text/javascript" src="../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../script/vue.js"></script><script type="text/javascript" src="../script/common.js"></script><script type="text/javascript" src="../script/fastclick.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    apiready = function () {        vue();        vm.GetUserSchoolinfo();        api.addEventListener({            name: 'ChooseClass'        }, function (ret, err) {            vm.PostPracticeSetPracticeLog(ret.value.list)        });        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            vm.closeWin()        });    };    // bjlist:ret.data.bjlist,    //     bjcheck:ret.data.bjcheck,    function vue() {        vm = new Vue({            el: '.content1',            data: {                homeworkItem:api.pageParam.item,                bjlist:api.pageParam.item.bjlist,                bjcheck:api.pageParam.item.bjcheck,            },            updated: function () {            },            methods: {                GetUserSchoolinfo: function () {                    apiObj.Get(UrlRouter.GetUserSchoolinfo, {                        values: {                            uid: $api.getStorage('uid')                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                vm.schoolid = ret.schoolid;                                vm.openFrame();                                if(vm.bjcheck==0){//未选择过班级                                    if(vm.bjlist.length==1){                                        vm.PostPracticeSetPracticeLog(vm.bjlist[0]);                                    }else{                                        api.openFrame({                                            name: 'ChooseClass',                                            url: '../html/newIntelligence/ChooseClass.html',                                            bounces: false,                                            rect: {                                                x: 0,                                                y: 0,                                                w: 'auto',                                                h: $api.getStorage('padHeight')                                            },                                            pageParam: {                                                bjlist:vm.bjlist                                            },                                            bgColor: 'rgba(0,0,0,0)'                                        });                                    }                                }else{//已经选择过班级                                    for (var i = 0; i < vm.bjlist.length; i++) {                                        if(vm.bjlist[i].ischeck==1 ){                                            vm.PostPracticeSetPracticeLog(vm.bjlist[i]);                                        }                                    }                                }                            } else {                                api.hideProgress();                                api.toast({                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        } else {                            api.hideProgress();                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    })                },                PostPracticeSetPracticeLog:function (list) {//修改精品套题提交状态                    vm.checkClass=list;                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Post(UrlRouter.PostPracticeSetPracticeLog, {                        values: {                            tuid:list.uid,                            classid:list.classid,                            xkid:vm.homeworkItem.xkid,                            schoolid:vm.homeworkItem.schoolid,                            xd:list.xd,                            volume:vm.homeworkItem.sxcid                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                api.hideProgress();                                vm.bjlist = ret.data;                                api.closeFrame({                                    name: 'ChooseClass'                                });                            } else {                                api.toast(                                    {                                        msg: ret.msg,                                        duration: 2000,                                        location: 'bottom'                                    }                                )                            }                        } else {                            api.toast(                                {                                    msg: err.msg,                                    duration: 2000,                                    location: 'bottom'                                }                            )                        }                    })                },                chooseclass:function(){                    api.openFrame({                        name: 'ChooseClass',                        url: '../html/newIntelligence/ChooseClass.html',                        bounces: false,                        rect: {                            x: 0,                            y: 0,                            w: 'auto',                            h: $api.getStorage('padHeight')                        },                        pageParam: {                            bjlist:vm.bjlist,                        },                        bgColor: 'rgba(0,0,0,0)'                    });                },                openFrame: function () {                    var header = document.querySelector('header');                    var headerH = $api.offset(header).h;                    var frameH = padWinHeight - headerH;                    api.setStatusBarStyle({                        style: 'light'                    });                    if(vm.homeworkItem.type=='txt'){                        api.openFrame({                            name: 'frame_wenzhang',                            url: 'frame_wenzhang.html',                            rect: {                                x: 0,                                y: headerH,                                w: api.winWidth,                                h: frameH                            },                            bounces: false,                            pageParam: {                                homeworkItem:api.pageParam.item                            }                        });                    }else{                        api.openFrame({                            name: 'frame_sucai',                            url: 'frame_sucai.html',                            rect: {                                x: 0,                                y: headerH,                                w: api.winWidth,                                h: frameH                            },                            bounces: false,                            pageParam: {                                homeworkItem:api.pageParam.item                            }                        });                    }                },                closeWin: function () {                    api.closeWin();//                    api.closeToWin({//                        name: 'win-stu-main'//                    })                }            }        });    }</script></html>
