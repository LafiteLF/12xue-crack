<script type="text/javascript">
    var listpage = 1;
    var totalPage = '';
    var currentTimes = 0;
    var vm;
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function () {
        vue();

        api.addEventListener({
            name: 'reloadCommentList'
        }, function (ret, err) {
            listpage = 1;
            getDetail();
            api.addEventListener({
                name: 'scrolltobottom',
                extra: {
                    threshold: 0            //设置距离底部多少距离时触发，默认值为0，数字类型
                }
            }, function (ret, err) {
                listpage++;
                if (totalPage >= listpage) {
                    getPinglunList();
                }

            });
        });
        api.addEventListener({
            name: 'scrolltobottom',
            extra: {
                threshold: 0            //设置距离底部多少距离时触发，默认值为0，数字类型
            }
        }, function (ret, err) {
            listpage++;
            if (totalPage >= listpage) {
                getPinglunList();
            }
        });

        getDetail();//获取文章详情
        getArtCheck();

    };
    function vue() {
        vm = new Vue({
            el: '.content',
            data: {
                id: api.pageParam.id,//文章id
                title: '',//标题
                view: '',//已读人数
                article_content: '',//文章内容
                comment: '',//评论数
                comment_alert: '-1',//0-没有评论 1-评论列表下拉刷新到底
                commentdata: [],
                good: '',//点赞数
                isExit: $api.getStorage('isLogin'),
                ispraise: '',//是否点过赞,
                date: '',
            },
            methods: {
                time: function (inputTime) {
                    var date = new Date(inputTime * 1000);
                    var y = date.getFullYear();
                    var m = date.getMonth() + 1;
                    m = m < 10 ? ('0' + m) : m;
                    var d = date.getDate();
                    d = d < 10 ? ('0' + d) : d;
                    var h = date.getHours();
                    h = h < 10 ? ('0' + h) : h;
                    var minute = date.getMinutes();
                    var second = date.getSeconds();
                    minute = minute < 10 ? ('0' + minute) : minute;
                    second = second < 10 ? ('0' + second) : second;
                    return y + '-' + m + '-' + d + ' ' + h + ':' + minute + ':' + second;
                }
            }
        });
    }
    function getDetail() {
        api.showProgress();
        apiObj.Get(UrlRouter.GetArticleInfo, {
            values: {
                id: vm.id
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    api.hideProgress();
                    api.refreshHeaderLoadDone();

                    vm.good = ret.good;
                    vm.title = ret.title;
                    vm.date = vm.time(ret.update_time);
                    vm.view = ret.view;
                    vm.article_content = ret.content;
                    vm.comment = ret.comment;
                    if(vm.isExit == 'true'){
                        getPinglunList();
                        videoCss();
                    }

                } else {
                    api.hideProgress();
                    alert(ret.msg);
                }
            } else {
                api.hideProgress();
                alert(err.msg);
            }
        })
    }

    function getPinglunList() {
        api.showProgress();
        var url = '/article/comments';
        apiObj.Get(url, {
            values: {
                article_id: vm.id,
                p: listpage
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    videoCss();
                    api.hideProgress();
                    api.refreshHeaderLoadDone();

                    totalPage = ret.totalpage;
                    if (!ret.list || ret.list.length == 0) {//评论数为0
                        vm.comment_alert = 0;
                        api.removeEventListener({
                            name: 'scrolltobottom',
                        });
                    } else {
                        if (listpage == 1) {
                            vm.commentdata = ret.list;
                        } else {
                            vm.commentdata = vm.commentdata.concat(ret.list);//页数大于1 追加
                        }

                        if (ret.totalpage == 1) {//只有一页 小于等于20条
                            api.removeEventListener({
                                name: 'scrolltobottom',
                            });
                        }
                        if (ret.current == ret.totalpage) {//最后一页
                            vm.comment_alert = 1;
                        }
                    }
                } else {
                    api.hideProgress();
                    alert(ret.msg);
                }
            } else {
                api.hideProgress();
                alert(err.msg);
            }
        })
    }
    function getArtCheck() {
        if ($api.getStorage('isLogin') == 'true') {//未登录
            var url = '/Article/checkpraise';
            apiObj.Get(url, {
                values: {
                    article_id: vm.id
                }
            }, function (ret, err) {
                if (ret) {
                    if (ret.ret == 0) {
                        if (ret.ispraise != 0) {
                            //已经点过赞
                            vm.ispraise = ret.ispraise;
                        } else {
                            //没点过赞
                            vm.ispraise = ret.ispraise;
                        }
                    } else {
                        api.hideProgress();
                        //没点过赞
                        vm.ispraise = 0;
                    }
                } else {
                    api.hideProgress();
                    alert(err.msg);
                }
            })
        } else {
        }
    }

    function praise() {
        if (new Date().getTime() - currentTimes < 3000) {
            return;
        }
        currentTimes = new Date().getTime();
        if ($api.getStorage('isLogin') == 'true') {
            var isZan = $api.attr($api.dom('.xin'), 'isZan');
            if (isZan == 0) {

                verifypraise();
            } else {

                cancelpraise();
            }
        } else {
            alert('您还未登录,请登录后操作。');
        }
    }
    function verifypraise() {
        var url = '/article/praise';

        apiObj.Put(url, {
            values: {
                article_id: vm.id
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    //
                    // setTimeout(function () {
                    //     $api.removeCls($api.dom('.Xin'), 'xin1');
                    //     $api.addCls($api.dom('.Xin'), 'xin');
                    //     $api.css($api.dom('.badge2'), 'display:block');
                    //     $(".xin").attr('src', '../../image/redZan.png');
                    //     var containter = $api.closest($api.dom('.xin'), '.dibuDiv');
                    //     var goodEl = $api.dom(containter, '.badge2');
                    //     var good = $api.text(goodEl);
                    //     var goodnum = parseInt(good);
                    //     goodnum = goodnum + 1;
                    //     $(".badge2").text(goodnum);
                    //     $api.attr($api.dom('.xin'), 'isZan', '1');
                    // }, 100);
                    // $api.css($api.dom('.badge2'), 'display:none');
                    // $api.removeCls($api.dom('.Xin'), 'xin');
                    // $api.addCls($api.dom('.Xin'), 'xin1');
                    // $(".Xin").attr('src', '../../image/redBZan.png');

                    setTimeout(function(){
                        $api.css($api.dom('.Xin'),'display:block');
                        $api.removeCls($api.dom('.Xin'),'xin1');
                        $api.addCls($api.dom('.Xin'),'xin');
                        $api.css($api.dom('.badge2'),'color:red');
                        $api.css($api.dom('.badge2'),'display:block');
                        $(".xin").attr('src', '../../image/redZan.png');
                        var containter = $api.closest($api.dom('.xin'), '.dibuDiv');
                        var goodEl = $api.dom(containter, '.badge2');
                        var good = $api.text(goodEl);
                        var goodnum = parseInt(good);
                        goodnum = goodnum + 1;
                        $(".badge2").text(goodnum);
                        $api.attr($api.dom('.xin'), 'isZan', '1');
                    }, 400);
                    setTimeout(function () {
                        $api.css($api.dom('.Xin'),'display:block');
                        $api.css($api.dom('.badge2'),'display:none');
                        $api.removeCls($api.dom('.Xin'),'xin');
                        $api.addCls($api.dom('.Xin'),'xin1');
                        $(".Xin").attr('src', '../../image/redBZan.png');
                    },150)
                     $api.css($api.dom('.badge2'),'display:none');
                     $api.css($api.dom('.Xin'),'display:none');

                } else {
                    alert(ret.msg);
                }
            } else {
                alert(err.msg);
            }
        })
    }
    function cancelpraise() {

        var url = '/article/praise?article_id=' + vm.id;
        apiObj.Delete(url, null, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {

                    $(".xin").attr('src', '../../image/zan.png');
                    $api.css($api.dom('.badge2'),'color:#010101');
                    var containter = $api.closest($api.dom('.xin'), '.dibuDiv');
                    var goodEl = $api.dom(containter, '.badge2');
                    var good = $api.text(goodEl);
                    var goodnum = parseInt(good);
                    if (goodnum != 0) {
                        goodnum = goodnum - 1;
                    }
                    $(".badge2").text(goodnum);
                    $api.attr($api.dom('.xin'), 'isZan', '0');
                } else {
                    alert(ret.msg);
                }
            } else {
                alert(err.msg);
            }
        })

    }

    function videoCss() {
        var videoArr = $api.domAll('video');

        for(var i=0;i<videoArr.length;i++){
            if (api.systemType == 'ios') {
                $api.css(videoArr[i], 'height: auto !important;');
            } else {
                $api.attr(videoArr[i], 'poster', '../../image/video/videoBac.png');//poster 属性规定视频下载时显示的图像，或者在用户点击播放按钮前显示的图像。如果未设置该属性，则使用视频的第一帧来代替。
                $api.attr(videoArr[i], 'controlsList', 'nodownload');//去掉下载按钮
                $api.css(videoArr[i], 'height:' + parseInt($api.offset(videoArr[i]).w * (9 / 16)) + 'px !important;');
            }
        }

//        videos.forEach(function(video){

//                $api.css(video, 'height: auto !important;');
//            }else {

//                $api.attr(video, 'controlsList','nodownload');
//                $api.css(video, 'height:'+parseInt($api.offset(video).w*(9/16))+'px !important;');
//            }

    }
</script>
