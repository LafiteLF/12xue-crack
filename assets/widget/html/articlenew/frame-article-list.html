<!DOCTYPE html>

<head>

    <title>文章列表</title>
    <style>
        body{ padding-top: 10px}
        .image {
            height: 50px;
        }

        .i-edu {
            padding: 11px 15px;
            height: 40px;
            background-color: #f4f4f4;
        }

        .aui-grid [class*=aui-col-] {
            padding: 0.5rem 0;
        }

        /*默认信息条隐藏*/
        .aui-tips {
            text-align: center;
            display: none;
        }

        .aui-list-item-media {
            margin-top: 0px;
        }

        .img-height-small {
            width: 2.5rem;
            height: 3rem;
        }

        .img-height-big {
            max-height: 4rem;
        }

        section {
            width: 80%;
            margin: 0 auto;
        }

        ul, h1 {
            background: #fff;
            border: 0px !important;
        }
        h1:nth-of-type(1){

        }
        h1 {
            font-size: 0.75rem;

            color: #6ec2c3;
            padding: 10px 5%;
            position: relative;
            margin-top: 10px;
        }
        h1 b{     display: block;
            width: 5px;
            height: 25px;
            background: #ffcd06;
            position: absolute;
            left: 0px;
            top: 12px; }

        h1 span {
            float: right;
            font-size: 0.65rem;padding-top: 3px;
        }
        .aui-media-list .aui-list-item {
            display: block;
            width: 90%;
            margin: 0 auto;
        }
        ul li{ border-bottom: 0px!important;   }
        .aui-list:before {
            height: 0px;
        }
        h1:after {
            height: 1px;
            background-color: #dddddd;
            display: block;
            content: '';
            position: absolute;
            bottom:0px;
            left: 5%;
            right: auto;
            width: 90%;
            z-index: 2;
            -webkit-transform-origin: 50% 100%;
            transform-origin: 50% 100%;
            pointer-events: none;
        }
        .aui-list:after {
            height: 0;}
        .aui-list .aui-list-item {
            padding-left: 0rem;
        }
        .aui-info {
            padding:  0px;
        }
        .aui-list .aui-list-item-media {
            width: 5rem;  padding: 0.3rem 9px; padding-right: 0px;}
        .aui-list .aui-list-item-title {
            font-size: 0.8rem!important;}
        .aui-info-item > *, .aui-info > * {
            padding-top: 2px;    color: #999;
        }
        [v-cloak] {
            display: none
        }
        .content{
            display: none;
        }

<section class="aui-refresh-content">
