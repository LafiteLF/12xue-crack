<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>文章详情</title>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <style>
        body {
            background-color: rgb(242, 242, 242);
            width: 100%;
        }

        .aui-bar-nav .aui-btn .aui-iconfont1 {
            color: #ffffff;
            padding: 15px;
            font-size: 0.8rem;
        }

    </style>
</head>
<body>
<div class="content">
    <header class="aui-bar aui-bar-nav aui-bar-primary">
        <a class="aui-pull-left" tapmode onclick="closeWin();">
            <span class="aui-iconfont aui-icon-left"></span>文章详情
        </a>
    </header>

</div>

</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/aui-tab.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../script/vue.js"></script>
<script type="text/javascript">
    var headerH;
    var frameH;
    var vm;
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function () {
        var header = document.querySelector('header');
        //$api.fixStatusBar(header);
        headerH = $api.offset(header).h;
        frameH = api.winHeight - headerH;
        vue();
        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
            closeWin();
        });
        if ($api.getStorage("is_login") == "true") {
            setIconUrl();//获取用户头像
        }
        api.openFrame({
            name: 'frame-article-detail',
            url: 'frame-article-detail.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            pageParam: {
                id: vm.id,
                good: vm.good,
                url: vm.url,
                y: headerH,
                h: frameH
            },
            bounces: false
        });
    };
    function vue() {
        vm = new Vue({
            el: '.content',
            data: {
                id: api.pageParam.id,
                url: api.pageParam.url,
                good: api.pageParam.good,
                title: api.pageParam.title,
                description: api.pageParam.description,
                isshared: '-1'
            },
            updated: function () {
            },
            methods: {}
        });
    }

    function closeWin() {
        // api.sendEvent({
        //     name:'refresh-list',
        //     extra:
        //         {
        //             id:vm.id
        //         }
        // });
        api.closeWin();
    }
</script>
</html>
