<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <style>
        /*.bt{ text-align: left;display:block;white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width: 100%}*/
        /*自定义title*/
        .aui-12xue-title {
            min-height: 2.25rem;
            position: absolute;
            margin: 0;
            text-align: left;
            white-space: nowrap;
            right: 5rem;
            left: 2rem;
            width: auto;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
            color: #000;
        }


    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav" >
    <a class="aui-pull-left aui-btn"  tapmode onclick="api.closeWin();">
        <span class="aui-iconfont aui-icon-left"></span>
    </a>
    <div class="aui-12xue-title" tapmode onclick="api.closeWin();">资讯</div>
</header>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script>
    apiready = function () {
        var index = api.pageParam.index;
        title(index);
        api.addEventListener({
            name: 'title'
        }, function(ret, err) {
            title(ret.value.index);
        });
        var header = document.querySelector('header');
        api.setStatusBarStyle({
            style: 'light'
        });

        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.openFrame({
            name: 'frame-article-list',
            url: 'frame-article-list.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            pageParam: {index: api.pageParam.index},
            bounces: false
        });


    };
    function title(index) {
        switch (index) {
            case 0:
                $api.text($api.dom('.aui-12xue-title'), '课外驿站');
                break;
            case 1:
                $api.text($api.dom('.aui-12xue-title'), '兴趣体验');
                break;
            case 2:
                $api.text($api.dom('.aui-12xue-title'), '有点意思');
                break;
        }
    }

</script>

</html>
