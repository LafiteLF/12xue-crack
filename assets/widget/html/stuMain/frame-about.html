<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>关于12Xue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="../../script/jquery-3.7.1.min.js"></script>
    <style>
        html {
            width: 100%;
            height: 100%;
            --wrem: calc(100vw / 1920);
            --hrem: calc(100vh / 1200);

        }

        body {
            margin: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: none;">
    <div style="width: calc(1536 * var(--wrem)); display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; box-sizing: border-box; padding: calc(100 * var(--hrem)) calc(90 * var(--wrem)) calc(150 * var(--hrem)); border-radius: calc(16 * var(--wrem))">
        <img src="../../image/stuMain/about/12Xue.png" style="width: calc(200 * var(--wrem))" alt="12Xue">
        <div style="display: grid; grid-auto-flow: column; grid-auto-columns: auto; column-gap: calc(20 * var(--wrem)); margin-top: calc(56 * var(--hrem)); color: #999999; font-size: calc(26 * var(--wrem)); line-height: 1">
            <span>12xue版本:</span>
            <span>V3.6.7</span>
            <span>更新时间:</span>
            <span>2026-01-24</span>
        </div>
        <div style="color: #333333; font-size: calc(34 * var(--wrem)); margin-top: calc(100 * var(--hrem))">
            山东十二学教育科技有限公司
        </div>
        <div style="margin-top: calc(70 * var(--hrem)); display: flex; flex-direction: column; line-height: 1.8; color: #666666; font-size: calc(28 * var(--wrem))">
            <p style="text-indent: 2em; margin: 0;">
                十二学公司聚焦教育智能化，为教师定制专属智能体，精准驱动差异化教学；为学生构建个性化智能体，规划定制化学习路径。通过深度融合人工智能与课堂教学，推动教学模式向混合式学习转型。</p>
            <p style="text-indent: 2em; margin: 0;">依托 “线下导师 + AI 老师”双师协同模式，打破学习场景边界，助力学生随时随地开展自主学习，推动教育从传统的
                “千人一面” 迈向 “一生百师” 的多元化育人新生态。</p>
        </div>
    </div>
</div>
<script>
    $('html').css({
        width: window.innerWidth,
        height: window.innerHeight,
        '--wrem': window.innerWidth / 1920 + 'px',
        '--hrem': window.innerHeight / 1200 + 'px',
    })

</script>
</body>
</html>
