<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="maximum-scale=1.0, minimum-scale=1.0, user-scalable=0, initial-scale=1.0, width=device-width"/>
    <meta name="format-detection" content="telephone=no, email=no, date=no, address=no">
    <title>温馨提示</title>
    <link rel="stylesheet" type="text/css" href="../css/api.2.0.css"/>
    <style>
        body {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .btn-div-privacy {
            padding-top: 20px;
            width: 100%;
            height: 2rem;
            text-align: center;
        }

        .btn-cancel {
            position: absolute;
            width: 120px;
            height: 2.5rem;
            left: 25%;
            color: #4bc7c7;
            border: 1px solid #4bc7c7;
            line-height: 2.5rem;
            border-radius: 1.25rem
        }

        .btn-ok {
            position: absolute;
            width: 120px;
            height: 2.5rem;
            right: 25%;
            color: #ffffff;
            background-color: #4bc7c7;
            border: 1px solid #4bc7c7;
            line-height: 2.5rem;
            border-radius: 1.25rem
        }

        .content-div {
            overflow: auto;
            max-height: 350px;
        }
        p{
            font-size: 16px;
        }
        span{
            font-size: 14px;
            color: #4bc7c7;
        }
    </style>
</head>
<body>
<div style="width: 80%;background-color: white;margin-left: 10%;height: 60%;margin-top: 30%;margin-bottom: 20%;border-radius: 10px">
    <div class="content-div">
        <div style="height: 100%;padding: 0 10px;font-size: 0.8rem">
            <p style="text-align: center;font-size: 0.9rem"><b>个人信息保护指引</b></p>
            <p>亲爱的用户，感谢您信任并使用12xue学生HDApp!</p>
            <p>我们依据相关法律法规指定了<span tapmode onclick="openUserAgreement()">《12xue学生HD用户服务协议》</span><span tapmode onclick="openUserPolicy()">《12xue学生HD用户隐私政策》</span>以帮助您了解我们收集、使用、存储和共享个人信息的情况，如您点击同意，则表示充分理解相关条款的内容。</p>
            <p>1.您可以在应用内"个性化学习-个人中心-隐私政策"页面再次查看本政策；</p>
            <p id="android" style="display: block">2.在您同意12xue学生HD用户隐私政策后，我们将进行集成SDK的初始化工作，会收集您的Android_id、Mac地址、IMEI、IMSI和应用安装列表，已保障App正常信息推送。</p>
            <!--            <p id="ios" style="display: none">2.在您同意12xue老师隐私政策后，我们将进行集成SDK的初始化工作，会收集您的Mac地址、IMEI、IMSI和应用安装列表，已保障App正常信息推送。</p>-->
        </div>
    </div>
    <div style="height: 75px">
        <div class="btn-div-privacy">
            <div class="btn-cancel" tapmode onclick="disagree()">不同意</div>
            <div class="btn-ok" tapmode onclick="agree()">同意</div>
        </div>
    </div>
</div>
</body>
<script type="text/javascript" src="../script/api.js"></script>
<script type="text/javascript">
    apiready = function () {
        api.parseTapmode();
    };
    function openUserAgreement() {
        api.openWin({
            name: 'win-user-agreement',
            url: 'win-user-agreement.html',
            pageParam: {}
        });
    }
    function openUserPolicy() {
        api.openWin({
            name: 'win-privacy-policise',
            url: 'win-privacy-policise.html',
            pageParam: {}
        });
    }
    function disagree() {
        api.closeWidget({
            id: 'A6942495244818',  //APPid
            retData: {
                name: 'closeWidget'
            },
            animation: {
                type: 'flip',
                subType: 'from_bottom',
                duration: 500
            },
            silent: true
        });
    }

    function agree() {
        //在名为winName的window中执行jsfun脚本
        var jsfun1 = 'openLoginFrame()';
        api.execScript({
            script: jsfun1
        });
        api.closeFrame();
    }
</script>
</html>
