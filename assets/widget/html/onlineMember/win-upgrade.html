<script>
    const {createApp, ref, computed} = Vue;
    createApp({
        setup() {
            const activationCode = ref('');
            const isShowActivationCodePrompt = ref(false);
            const isSpecialTrafficPackage = ref(false);
            const activationStatus = ref('');
            const activationInformation = ref('');
            const isLoaded = ref(false);
            const comboData = ref({});
            const QRCode = ref('');
            const isOnlineVersion = computed(() => {
                const level = JSON.parse($api.getStorage('comboData')).data.level;
                return ['nomal', 'professional', 'plus', 'max'].includes(level);
            });
            let apiObj;

            apiready = async () => {
                apiObj = new GridOpenApi(UrlDomain, source, version);
                apiObj.SetAuthToken($api.getStorage("token"));
                const ret = await new Promise((resolve, reject) => {
                    apiObj.Get(UrlRouter.GetMaterialMaterialServer, {
                        values: {
                            type: 'AI_DISPLAY_0'
                        }
                    }, function (res, err) {
                        if (res) {
                            resolve(res)
                        } else {
                            reject(err)
                        }
                    });
                });
                QRCode.value = ret.url;
                $(document).ready(() => {
                    $('#main').css('height', window.innerHeight + 'px');
                })
                isLoaded.value = true;
            }

            function close() {
                api.closeWin();
            }

            async function activateNow() {
                const ret = await new Promise((resolve, reject) => {
                    apiObj.Get(UrlRouter.GetPayfeeActivateCodeInfo, {
                        values: {
                            code: activationCode.value.trim(),
                        }
                    }, (ret, err) => {
                        if (ret) {
                            resolve(ret);
                        } else {
                            reject(err);
                        }
                    });
                })
                if (ret.ret === -1) {
                    alert(ret.msg);
                    return;
                }
                comboData.value = ret.data;
                isSpecialTrafficPackage.value = ret.data['monthly_usage'].length === 1;
                isShowActivationCodePrompt.value = true;
            }

            async function confirmActivation() {
                const ret = await new Promise((resolve, reject) => {
                    apiObj.Post(UrlRouter.PostPayfeeActivatePackage, {
                        values: {
                            code: activationCode.value.trim(),
                            schoolid: $api.getStorage("schoolid"),
                        }
                    }, (ret, err) => {
                        if (ret) {
                            resolve(ret);
                        } else {
                            reject(err);
                        }
                    });
                });
                if (ret.ret === -1) {
                    alert('参数错误或未定义');
                    return;
                }
                switch (ret.data.success) {
                    case -1:
                        activationInformation.value = ret.data.message;
                        activationStatus.value = 'fail';
                        break;
                    case 0:
                        activationInformation.value = ret.data.message;
                        activationStatus.value = 'pass';
                        break;
                    case 1:
                        apiObj.Get(UrlRouter.GetPayfeeUserInfo, {
                            values: {
                                uid: $api.getStorage("uid"),
                                schoolid: $api.getStorage("schoolid"),
                            }
                        }, function (ret, err) {
                            if (ret) {
                                $api.setStorage('comboData', JSON.stringify(ret));
                                api.sendEvent({
                                    name: 'upgrade-updateComboData'
                                });
                            }
                        });
                        activationStatus.value = 'success';
                        break;
                }
            }

            async function activationPass() {
                const ret = await new Promise((resolve, reject) => {
                    apiObj.Post(UrlRouter.PostPayfeeActivatePackage, {
                        values: {
                            code: activationCode.value.trim(),
                            schoolid: $api.getStorage("schoolid"),
                            pass: 1,
                        }
                    }, (ret, err) => {
                        if (ret) {
                            resolve(ret);
                        } else {
                            reject(err);
                        }
                    });
                });
                if (ret.ret === -1) {
                    alert('参数错误或未定义');
                    return;
                }
                switch (ret.data.success) {
                    case -1:
                        activationInformation.value = ret.data.message;
                        activationStatus.value = 'fail';
                        break;
                    case 1:
                        apiObj.Get(UrlRouter.GetPayfeeUserInfo, {
                            values: {
                                uid: $api.getStorage("uid"),
                                schoolid: $api.getStorage("schoolid"),
                            }
                        }, function (ret, err) {
                            if (ret) {
                                $api.setStorage('comboData', JSON.stringify(ret));
                                api.sendEvent({
                                    name: 'upgrade-updateComboData'
                                });
                            }
                        });
                        activationStatus.value = 'success';
                        break;
                }
            }

            return {
                activationCode,
                isShowActivationCodePrompt,
                isSpecialTrafficPackage,
                activationStatus,
                activationInformation,
                isLoaded,
                comboData,
                isOnlineVersion,
                close,
                QRCode,
                activateNow,
                confirmActivation,
                activationPass,
            }
        }
    }).mount('#main')
</script>
</body>
</html>
