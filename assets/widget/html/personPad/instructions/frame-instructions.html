<script type="text/javascript">
    var vm;
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function () {
        vue();
        getguidelist();
    };
    function vue() {
        vm = new Vue({
            el: '.content',
            data: {
                data: [],
            },
            methods: {

            }
        });
    }
    function getguidelist() {
        api.showProgress();
        apiObj.Get(UrlRouter.GetGuideLists, {
            values: {
                type: 4,//4学生OS
                uid: $api.getStorage('uid')
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {
                    vm.data = ret.data;
                    if(vm.data.length > 0 ){
                        $('.nonealert').hide();
                    }
                    else {
                        $('.nonealert').show();
                    }
                }else {
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'middle'
                    });
                }
            }else {
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'middle'
                });
            }
        })
    }
    function todetail(param) {
        api.openWin({
            name: 'win-instructions-detail',
            url: 'win-instructions-detail.html',
            pageParam: {
                id: $(param).attr('id'),
            }
        });
    }
</script>
