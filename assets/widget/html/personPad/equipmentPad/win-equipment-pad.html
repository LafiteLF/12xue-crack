<script type="text/javascript">
    apiready = function () {
        var header = document.querySelector('header');
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'frame-equipment-pad',
            url: 'frame-equipment-pad.html',
            rect: {
                x: 0,
                y: headerH,
                w: api.winWidth,
                h: frameH
            },
            pageParam: {headerH: headerH}
        });
    };
    function closeWin() {
        api.closeWin();
    }
</script>
