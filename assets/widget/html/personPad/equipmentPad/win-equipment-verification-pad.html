<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title></title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <link rel="stylesheet" href="../../../css/ThirdCss/style.css"/>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #e5e5e5
        }
        .titlea {
            width: 50%;
            text-align: left;
        }

        .nav-spanBtn {
            border: 1px solid #4bc7c7 !important;
            border-radius:3px;
            padding: 5px 10px;
            margin-right: 10px;
            font-size: 0.8rem
        }
        .nav-spanBtn:active {
            color: #fff;
            background-color:#4bc7c7;
        }

        .submit{
            padding-right: 20px;
        }

    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav">
    <a class="aui-toolbar-title aui-pull-left titlea"  >
        <span class="aui-iconfont aui-icon-left" tapmode onclick='closeWin()'></span><b tapmode onclick='closeWin()' style="font-weight: normal">验证设备</b>
    </a>

    <div style="float: right" class="submit" tapmode onclick="commitInfo()">
        <span class="nav-spanBtn  aui-iconfont aui-icon-check"
              style="font-size: 0.7rem" >确定</span>
    </div>

</header>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    apiready = function () {
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        var headerH = $api.offset(header).h;
        var frameH = api.winHeight - headerH;
//        alert(padWinHeight +'1'+ headerH);
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'frame-equipment-verification-pad',
            url: 'frame-equipment-verification-pad.html',
            rect: {
                x: 0,
                y: headerH,
                w: api.winWidth,
                h: frameH
            },
            pageParam: {schoolId: api.pageParam.schoolId}
        });
    };
    function closeWin() {
        api.closeWin();
    }

    function commitInfo() {
        api.execScript({
            frameName: 'frame-equipment-verification-pad',
            script: "Commit();"
        });
    }

</script>
