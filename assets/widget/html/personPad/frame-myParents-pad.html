<script>

    vm = new Vue({
        el: '.content',
        data: {
            list:''
        },
        methods: {
            getTime:function (item) {
                var d = new Date(item.create_time * 1000);
                var hours = '';
                var minutes = '';
                var month = '';
                if(d.getHours()<10){
                    hours ='0'+d.getHours();
                }else {
                    hours = d.getHours();
                }
                if(d.getMonth()<9){
                    month =d.getMonth()+1;
                    month = '0'+month;

                }else {
                    month = d.getMonth()+1;
                }
                if(d.getMinutes()<10){
                    minutes ='0'+d.getMinutes();
                }else {
                    minutes = d.getMinutes();
                }
                var date = (d.getFullYear()) + "-" + (month) + "-" + (d.getDate()) + " " + (hours) + ":" + (minutes);
                return date;
            },

        }
    });
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    var page = 1;
    apiready = function () {
        GetV1ClasspayUserpays();
//        //下拉刷新
//        var pullRefresh = new auiPullToRefresh({
//            container: document.querySelector('.aui-refresh-content'),
//            triggerDistance: 100
//        }, function (ret) {
//            if (ret.status == "success") {
//                setTimeout(function () {
//                    page = 1;
//                    GetV1ClasspayUserpays();
//                    pullRefresh.cancelLoading(); //刷新成功后调用此方法隐藏
//                }, 500)
//            }
//        });

        //下拉到底部的监听
        api.addEventListener({
            name: 'scrolltobottom',
            extra: {
                threshold: 0            //设置距离底部多少距离时触发，默认值为0，数字类型
            }
        }, function (ret, err) {
            page++;
            GetV1ClasspayUserpays();
        });
    };

    function GetV1ClasspayUserpays() {//根据uid获取付费服务列表
        apiObj.SetAuthToken($api.getStorage('token'));
        apiObj.Get(UrlRouter.GetV1ClasspayUserpays, {
            values: {
                pay_status : '1',
                type: '1,2,3',
                p:page,
                num:20,
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {

                    if (ret.data.data.length == 0) {
                        //无数据
                        if (page == 1) {
                            showNoData();
                        } else {
                            page--;
                            api.toast({
                                msg: '已加载全部',
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    } else {
                        if (page == 1) {
                            vm.list =ret.data.data;
                        } else {
                            vm.list =vm.list.concat(ret.data.data);
                        }
                    }

                } else {
                    api.toast(
                        {
                            msg: ret.msg,
                            duration: 2000,
                            location: 'bottom'
                        }
                    )
                }
            } else {
                api.toast(
                    {
                        msg: err.msg,
                        duration: 2000,
                        location: 'bottom'
                    }
                )
            }
        })
    }

    function showNoData() {
//        $api.css($api.dom(".bt"), "display:none");
        $api.css($api.dom(".nodata"), 'display:block');
        $api.css($api.dom("ul"), "display:none");
    }



</script>
