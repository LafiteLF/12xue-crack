<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var cacheStu = '';
    var kfPhone = '';
    var systemType;
    var vm;
    apiready = function () {
        //        api.showProgress();
        api.addEventListener({
            name: 'reloadNum'
        }, function (ret, err) {
            vm.getPersonInfo();
        });

        initVue();


        systemType = api.systemType;
        if (systemType == 'ios') {
            $('.setup').hide();
        } else {
            $('.setup').show();
        }

        var fs = api.require('fs');
        fs.getAttribute({
            path: 'fs://pdfDownload'
        }, function (ret, err) {
            if (ret.status) {
                //                    alert(JSON.stringify(ret));
                cacheStu = toDecimal(ret.attribute.size / (1024 * 1024)) + ' M';
            } else {
                cacheStu = '0.00MB';
            }
        });
        apiObj.SetAuthToken($api.getStorage('token'));
        apiObj.Get(UrlRouter.KfInfo, {
            value: {}
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    kfPhone = ret.data.phone;
                } else {
                    kfPhone = '暂无';
                }
            } else {
                kfPhone = '暂无';
            }
        });
        //        chargeIosCheck();
        vm.listLineHeight();
        vm.GetUserCoin();
        vm.GetUserRank();
        vm.getPersonInfo();

        api.addEventListener({
            name: 'changeHeadUrl'
        }, function (ret, err) {
            vm.face = ret.value.iconUrl
        });


    };

    //判断是否是iOS审核中
    function chargeIosCheck() {
        var realSource = api.systemType == "android" ? "student_android" : "student_ios";
        apiObj = new GridOpenApi(UrlDomain, realSource, version);
        apiObj.SetAuthToken($api.getStorage("token-stu"));
        apiObj.Get(UrlRouter.GetIosIsChecking, {
            values: null
        }, function (ret, err) {
            //            alert(JSON.stringify(ret));
            if (ret) {
                if (ret.ret == 0) {
                    if (version == versioniOS && ret.data != null && ret.data == 0) {
                        $api.addCls($api.dom('#7'), 'aui-hide');
                    } else {
                        if ($api.hasCls($api.dom('#7'), 'aui-hide')) {
                            $api.removeCls($api.dom('#7'), 'aui-hide');
                        }
                    }
                } else {
                    api.toast({
                        msg: ret.msg,
                        duration: 1000,
                        location: 'bottom'
                    });
                }
            } else {
                api.toast({
                    msg: err.msg,
                    duration: 1000,
                    location: 'bottom'
                });
            }

        });
    }

                                vm.face = $api.getStorage('head_url');

                                if (ret.school.xxmc == null || ret.school.xxmc == '') {
                                    $api.setStorage('xxmc', '暂无学校和班级');
                                    vm.XdClass = '暂无学校和班级';
                                    vm.School = '';
                                } else {
                                    //                                    var xueduan;
                                    //                                    var banji;
                                    ////                                var index = ret.school.xd.length - 1;
                                    //                                    if (ret.school.xd[0] == undefined) {
                                    //                                        xueduan = ''
                                    //                                    } else {
                                    //                                        xueduan = ret.school.xd[0];
                                    //                                    }
                                    //
                                    //                                    var index1 = ret.school.classlist.length - 1;
                                    //                                    if (ret.school.classlist[index1] == undefined) {
                                    //                                        banji = '';
                                    //                                    } else {
                                    //                                        banji = ret.school.classlist[index1];
                                    //                                    }
                                    //                                    vm.XdClass = xueduan + '  ' + banji;

                                    vm.XdClass = $api.getStorage('XdClass');
                                    vm.School = ret.school.xxmc;
                                    $api.setStorage('xxmc', ret.school.xxmc);

        }

    //保留两位小数
    //功能：将浮点数四舍五入，取小数点后2位
    function toDecimal(x) {
        var f = parseFloat(x);
        if (isNaN(f)) {
            return;
        }
        f = Math.round(x * 100) / 100;
        return f;
    }
