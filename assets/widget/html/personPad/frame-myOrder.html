<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>首页</title>
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui-pull-refresh.css"/>
   <style>
       body{ background:#f2f2f2 }
       .content{width: 80%; padding-top: 20px; margin: 0 auto}
       table {  width: 100%;

           /*防止表格变形*/
           table-layout: fixed;
           word-wrap: break-word;

           /*是将表格边框的间隙去掉*/
           border-collapse: collapse;
           /*color: #E5E5E5;*/
           background-color: #fff;
        border: 1px solid #e4e4e8
       }

       td, th {
           padding: 4px;;
           overflow: hidden;
           text-overflow: ellipsis;
           white-space: nowrap;
           font-size: 14px;
           font-weight: normal;
       }
       tr{ height: 40px; line-height: 40px;background: #fff}
         th {
           color: #4bc7c7
       }
       th{ border-right: 0px;
           border-left:0px;   font-size: 0.6rem;}
       tr, td {

           text-align: center;
           color: #333;
           font-size: 0.6rem;
       }
       tr+tr{ border-top: 1px solid #e4e4e8}
       td+td{ border-left: 1px solid #e4e4e8}
       th+th{ border-left: 1px solid #4bc7c7; }
       .bt{ border: 1px solid #4bc7c7}
       tr td:nth-of-type(5){
           color: #ff778c;
       }
       td,th{ height: 80%; margin-top: 10%}
       .bt th img{ width: 17px; margin-right: 5px; vertical-align: bottom; margin-bottom: 12px}

       .gone {
           display: none;
       }

       .nodata img {
           margin-top: 10%;
           width: 16%;
           margin-left: 42%;
       }

       .nodata p {
           width: 96%;
           text-align: center;
           padding: 10px;
           font-size: 14px;
           margin-left: 2%;
       }
       [v-cloak]{
           display: none;
       }
   </style>
</head>
<body>
<div class="content">
    <table >
        <tr  class="bt">
            <th><img src="../../image/stuHomePad/order01.png">消费项目</th>
            <th>金额</th>
            <th>缴费方式</th>
            <th>消费时间</th>
        </tr>

          <tr v-for="item in list" >
              <td  v-if = "item.title == '互动课堂'" v-text="item.title+item.time_str"></td>
              <td style="color:#4BC7C7;"  v-if = "item.title == '智能导练'" v-text="item.title+item.time_str" @click="openPop(item);"></td>
              <td  v-if = "item.title == '同步辅导'" v-text="item.xdmc+item.xkmc+'【'+item.title+'】'+item.time_str"></td>
              <td  v-text="getText(item)"></td>
              <td  v-if = "item.type == 1" v-cloak>线上自缴</td>
              <td  v-if = "item.type == 2" v-cloak>线上代缴</td>
              <td  v-if = "item.type == 3" v-cloak>线下支付</td>
              <td  v-text="getTime(item)"></td>
          </tr>

    </table>
</div>

<div class="nodata gone">
    <img src="../../image/nullPic.png"/>
    <p>暂无数据</p>
</div>

</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../script/vue.js"></script>
<script type="text/javascript" src="../../script/aui-pull-refresh.js"></script>
<script>

    vm = new Vue({
        el: '.content',
        data: {
            list:''
        },
        methods: {
            getTime:function (item) {
                var d = new Date(item.create_time * 1000);
                var day = '';
                var hours = '';
                var minutes = '';
                var month = '';
                if(d.getHours()<10){
                    hours ='0'+d.getHours();
                }else {
                    hours = d.getHours();
                }
                if(d.getMonth()<9){
                    month =d.getMonth()+1;
                    month = '0'+month;

                }else {
                    month = d.getMonth()+1;
                }
                if(d.getDate()<10){
                    day ='0'+d.getDate();
                }else {
                    day = d.getDate();
                }
                if(d.getMinutes()<10){
                    minutes ='0'+d.getMinutes();
                }else {
                    minutes = d.getMinutes();
                }
                var date = (d.getFullYear()) + "-" + (month) + "-" + (day) + " " + (hours) + ":" + (minutes);
                return date;
            },
            openPop:function (item) {
                api.openFrame({
                    name: 'frame_extrainfo',
                    url: 'frame_extrainfo.html',
                    rect: {
                        x: 0,
                        y: 0,
                        w: api.winWidth,
                        h: api.winHeight
                    },
                    pageParam: {extra: item.extra_info},
                    bounces: false
                });
            },
            getText: function (item) {
                if (item.price != 0) {
                    return item.price + '元';
                } else {
                   return '——';
                }
            }

        }
    });
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    var page = 1;
    apiready = function () {
        GetV1ClasspayUserpays();
//        //下拉刷新
//        var pullRefresh = new auiPullToRefresh({
//            container: document.querySelector('.aui-refresh-content'),
//            triggerDistance: 100
//        }, function (ret) {
//            if (ret.status == "success") {
//                setTimeout(function () {
//                    page = 1;
//                    GetV1ClasspayUserpays();
//                    pullRefresh.cancelLoading(); //刷新成功后调用此方法隐藏
//                }, 500)
//            }
//        });

        //下拉到底部的监听
        api.addEventListener({
            name: 'scrolltobottom',
            extra: {
                threshold: 0            //设置距离底部多少距离时触发，默认值为0，数字类型
            }
        }, function (ret, err) {
            page++;
            GetV1ClasspayUserpays();
        });
    };

    function GetV1ClasspayUserpays() {//根据uid获取付费服务列表
        apiObj.SetAuthToken($api.getStorage('token'));
        apiObj.Get(UrlRouter.GetV1ClasspayUserpays, {
            values: {
                pay_status : '1',
                type: '1,2,3',
                p:page,
                num:20,
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {

                    if (ret.data.data.length == 0) {
                        //无数据
                        if (page == 1) {
                            showNoData();
                        } else {
                            page--;
                            api.toast({
                                msg: '已加载全部',
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    } else {
                        if (page == 1) {
                            vm.list =ret.data.data;
                        } else {
                            vm.list =vm.list.concat(ret.data.data);
                        }
                    }

                } else {
                    api.toast(
                            {
                                msg: ret.msg,
                                duration: 2000,
                                location: 'bottom'
                            }
                    )
                }
            } else {
                api.toast(
                        {
                            msg: err.msg,
                            duration: 2000,
                            location: 'bottom'
                        }
                )
            }
        })
    }

    function showNoData() {
//        $api.css($api.dom(".bt"), "display:none");
        $api.css($api.dom(".nodata"), 'display:block');
        $api.css($api.dom("ul"), "display:none");
    }



</script>
</html>
