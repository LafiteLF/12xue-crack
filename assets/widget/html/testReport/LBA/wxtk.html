<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport"
        content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />
    <title>完形填空</title>
    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css" />
    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css" />
    <link rel="stylesheet" type="text/css" href="../../../css/ErrorBookLeftBtn.css">
    <style>
        [v-cloak] {
            display: none !important;
        }

        .all_wxtk_content {
            display: none;
        }
    </style>
</head>

<body>
    <div class="all_wxtk_content" v-cloak style="width: 100%;height: 100%;">
        <ul class="leftedit_btn">
            <li id="leftedit_btn_checkanswer" tapmode onclick="vm.onCheckAnswerClick();"><img class="noImgClick"
                    id="leftedit_btn_checkanswer_src"
                    :src="viewAnswer?'../../../image/check_answer_down.png':'../../../image/check_answer_up.png'"></li>


            <li id="leftedit_btn_AI" v-if="complete||viewAnswer" tapmode @click="PostAIBtn();">
                <img class="noImgClick" id="leftedit_btn_remove_src" src="../../../image/newhomework/aiBtn.png">
            </li>
        </ul>

        <div class="tkt_content" id="tkt_content" style="margin-left: 89px;width: calc(100% - 91px);">
            <div class="tkt_top">
                <ul>
                    <li class="tixing" v-text="'【'+txstr+'】'"></li>
                    <li v-if="complete||viewAnswer" class="zsd" @click="alertzsd(data.zsdmc)">
                        <span>难易度：</span><img class="noImgClick"
                            :src="data.nyd==1?'../../../image/newhomework/1xing.png':data.nyd==2?'../../../image/newhomework/2xing.png':data.nyd==3?'../../../image/newhomework/3xing.png':''"><span>
                            知识点：</span>{{data.zsdmc}}
                    </li>
                </ul>
            </div>
            <div class="tkt_left" id="left" style="width: calc(60% - 40px)">
                <div style="padding-left: 14px;width: calc(100% - 24px)" class="tg_content font666" v-html="data.tg">
                </div>
            </div>
            <div class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">
                <div class="tkt_right_content">
                    <div class="huakuai" id="huakuai"></div>
                    <!--<span v-if="complete==1" class="zongfen">-->
                    <!--<span v-if="data.is_true!=0" v-html="'本题正确率<em>'+data.accuracy*100+'%</em>'"></span>-->
                    <!--<span v-if="data.is_true==0" style="color: #ff778c">待批</span>-->
                    <!--</span>-->
                    <span class="wxtk_xiaoti" style="top: 10px;" v-text="'共'+xiaotinum+'小题'"></span>
                    <ul class="wxtk_content">
                        <li v-for="(list,index) in data.children">
                            <!--答题部分开始-->
                            <div style="width: calc(100% - 115px)"
                                :class="!complete||!viewAnswer?'wxtk_tg':'xiaotifenge wxtk_tg'"
                                v-html="'('+(index+1)+')<br>'+list.tg"></div>
                            <ul v-if="!complete&&!viewAnswer" class="wxtk_option">
                                <li v-for="item in list.options" :id="item.id" :index="index"
                                    :class="answerArr[index].da[0]==item.id?'xxactive':''" tapmode
                                    onclick="vm.xxselectClicked(this)" v-text="item.xx"></li>
                            </ul>
                            <!--答题部分结束-->
                            <!--答案部分开始-->
                            <dl v-if="complete||viewAnswer" class="wxtk_answer bgFFF">
                                <dd class="wxtk_myanswer">
                                    <div class="wxtkdefen">
                                        <img v-if="answerArr[index] && answerArr[index].is_true!=0"
                                            :src="answerArr[index].is_true==1?' ../../../image/newhomework/zhengque.png':answerArr[index].is_true==2?'../../../image/newhomework/cuowu.png':answerArr[index].is_true==3?'../../../image/newhomework/bandui.png':''">

                                        <span v-if="answerArr[index]"
                                            :style="answerArr[index].is_true==1 ? 'color:#4bc7c7' : 'color:#df7605'"
                                            v-text="answerArr[index].is_true==1 ? '正确' : '错误'">
                                        </span>

                                        <span v-if="answerArr[index] && answerArr[index].is_true==0">待批</span>

                                    </div>
                                    <h2>【我的答案】</h2>
                                    <ul class="clearfix ">
                                        <li class="wxtkzi"
                                            v-text="tempAnswer[index].is_unable==1?'无':tempAnswer[index].xsdastr"></li>
                                    </ul>
                                </dd>
                                <dd class="needpic">
                                    <h2>【{{data.tx_tip}}】</h2>
                                    <ul>
                                        <li class="wxtkzi" v-html="list.dastr==''?'无':list.dastr"></li>
                                    </ul>
                                </dd>
                                <dd class="needpic">
                                    <h2>【答案解析】</h2>
                                    <ul>
                                        <li class="wxtkzi" v-html="list.dajx==''?'无':list.dajx"></li>
                                    </ul>
                                </dd>
                            </dl>
                            <!--答案部分结束-->
                        </li>
                    </ul>
                    <div class="tijiao"
                        :style="selectAnswerArr.length!=xiaotinum?'background: #d5d5d5':'background: #4bc7c7'"
                        v-if="!complete && !viewAnswer" tapmode onclick="vm.checkAnswer()">提交
                    </div>
                    <!--答案部分结束-->
                </div>
            </div>
        </div>
    </div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript" src="../../../script/html2canvas.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    var moduleDialog = null;//弹窗模块bhzparam
    apiready = function () {
        vue();
        vm.huakuai();
        vm.isdt = api.pageParam.isdt;
        vm.totalCount = api.pageParam.totalCount;
        vm.index = api.pageParam.index;
        vm.current_page = api.pageParam.index;//


        document.getElementById('leftedit_btn_checkanswer_src').addEventListener('touchstart', function () {
            document.getElementById('leftedit_btn_checkanswer_src').src = "../../../image/check_answer_down.png";
        });
        document.getElementById('leftedit_btn_checkanswer_src').addEventListener('touchend', function () {
            document.getElementById('leftedit_btn_checkanswer_src').src = "../../../image/check_answer_up.png";
        });
        vm.getExInfo();
    };

    function vue() {
        vm = new Vue({
            el: '.all_wxtk_content',
            data: {
                csContent: api.pageParam.csContent[api.pageParam.index - 1],
                aiShow:false,
                tempAnswer:[],

                current_page: 0,
                isdt: 1,
                important: 0,
                index: 0,
                totalCount: 0,
                data: {},
                tx_type: '',
                answerArr: [],//答案数组
                complete: 0,
                viewAnswer: 0,//查看答案
                viewAnswerArr: [],//查看答案的数组 学生做错习题时的答案信息
                nowAnswerArr: [],//学生在错题本的答案数组
                answerStr: '',//答案字符串
                dastr: '',//习题正确答案
                is_true: '',//本次答题是否正确
                xiaotinum: 0,//小题总数
                selectAnswerArr: [],//学生在错题本选择的答案数组
                txstr: '',
                bhzparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 75,
                        "h": 150,
                        "w": 300
                    }, {
                        "viewType": 101,
                        "x": api.winWidth / 2 - 150 + 30,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,
                        "h": 48,
                        "w": 240,
                        "lineSpacting": 1.3,
                        "showText": "<font color='#666666'>确认移出错题本？</font>",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 159,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "ok",
                        "showText": "确定",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 40,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "no",
                        "showText": "取消",
                        "textSize": 14
                    }]
                },

            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');
                    $api.domAll('a')[i].onclick = function () {
                        return false;
                    }
                }
            },
            methods: {
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },

                onEditErroQustionClick: function () {
                    api.toast({
                        msg: 'onEditErroQustionClick',
                        duration: 2000,
                        location: 'bottom'
                    });
                },
                onCheckAnswerClick: function () {//点击查看答案
                    if (this.selectAnswerArr.length != this.xiaotinum||!this.aiShow) {
                        api.toast({
                            duration: 2000,
                            location: 'bottom',
                            msg: '请提交答案'
                        })
                        return false
                    }
                    vm.viewAnswer = !vm.viewAnswer;
                  
                    // if (vm.viewAnswer) {
                    //     for (var i = 0; i < vm.viewAnswerArr.length; i++) {
                    //         vm.answerArr.push(vm.viewAnswerArr[i]);
                    //     }
                    // }
                    // else {
                    //     for (var i = 0; i < vm.nowAnswerArr.length; i++) {
                    //         vm.answerArr.push(vm.nowAnswerArr[i]);
                    //     }
                    // }


                    if (vm.viewAnswer) {
                        vm.complete = 0;
                    }
                },
                onRemoveFromErrNoteClick: function () {
                    moduleDialog = api.require('moduleDialog');
                    moduleDialog.showDialog(vm.bhzparam, function (ret, err) {
                        if (ret.state == 'success' && ret.clickID) {
                            if (ret.clickID == 'ok') {
                                apiObj.Header({ 'Content-Type': 'application/json' }).Post(UrlRouter.DeleteStudentWrongBookUrl, {
                                    body: $api.jsonToStr({
                                        uid: $api.getStorage('uid'),
                                        type: 'outbook',
                                        sys_id: vm.data.sys_id,
                                        kc_type: vm.data.kc_type,
                                    })
                                }, function (ret, err) {
                                    if (ret) {
                                        if (ret.ret == 0) {
                                            //在这处理删除第一题，最后一题以及总题数是否为0
                                            vm.totalCount = vm.totalCount - 1;
                                            if (vm.totalCount == 0) {
                                                api.closeWin();
                                            }
                                            else {
                                                api.sendEvent({
                                                    name: 'onTopIndexChange',
                                                    extra: { index: vm.current_page },
                                                });
                                            }
                                            api.sendEvent({
                                                name: 'removeError',
                                                extra: {}
                                            });//刷新错题列表的frame数据

                                        } else {
                                            api.toast({
                                                msg: ret.msg,
                                                duration: 2000,
                                                location: 'bottom'
                                            });
                                        }
                                    } else {
                                        api.toast({
                                            msg: err.msg,
                                            duration: 2000,
                                            location: 'bottom'
                                        });
                                    }
                                });
                                dismissDialog();
                            } else {
                                dismissDialog();
                            }
                        } else {

                        }

                    });
                },
                checkAnswer: function () {
                    //没有全部作答不能提交
                    if (vm.selectAnswerArr.length != vm.xiaotinum) {
                        return false;
                    }
                    this.aiShow=true
                    if (vm.nowAnswerArr.length == vm.xiaotinum) {
                        for (var i = 0; i < vm.answerArr.length; i++) {
                            if (vm.answerArr[i].da[0] == vm.answerArr[i].daoptions[0].id) {
                                vm.answerArr[i].is_true = 1;//正确
                            } else {
                                vm.answerArr[i].is_true = 2;//错误
                            }
                        }
                        this.tempAnswer=[]
                        this.tempAnswer=JSON.parse(JSON.stringify(vm.answerArr))

                        vm.complete = 1;
                    }
                },
                xxselectClicked: function (context) {//选择判断题选项点击事件
                    var xtindex = $(context).attr('index');
                    vm.nowAnswerArr[xtindex].da[0] = $(context).attr('id');
                    vm.nowAnswerArr[xtindex].is_unable = 0;//不会做
                    vm.nowAnswerArr[xtindex].xsdastr = $(context).text();//选项

                    vm.answerArr = [];
                    for (var i = 0; i < vm.nowAnswerArr.length; i++) {
                        vm.answerArr.push(vm.nowAnswerArr[i]);
                    }

                    //alert($api.jsonToStr(vm.answerArr))
                    if (vm.selectAnswerArr.indexOf(xtindex) > -1) {//用于判断学生是不是选择了所有小题的答案

                    } else {
                        vm.selectAnswerArr.push(xtindex);
                    }
                },
                getExInfo: function () {




                    vm.data = {
                        sys_id: api.pageParam.id || this.csContent.id,
                        kc_type: api.pageParam.kc_type || this.csContent.sys_type,
                        xtid: api.pageParam.xtid || this.csContent.xtid,
                        zsdmc: this.csContent.zsdmc,
                        nyd: this.csContent.nyd,
                        is_important: this.csContent.is_important,
                        tg: this.csContent.tg,
                        daoptions: this.csContent.daoptions,
                        xsdaobj: this.csContent.xsdaobj,
                        dajx: this.csContent.dajx,
                        tx_tip: this.csContent.tx_tip,
                        is_auto: this.csContent.is_auto,
                        dastr: this.csContent.dastr,
                        tx: this.csContent.tx,
                        txstr: this.csContent.txstr,
                        children: this.csContent.children

                    };

                    vm.tx_type = this.csContent.tx;
                    vm.txstr = this.csContent.txstr;
                    vm.important = this.csContent.is_important;
                    vm.dastr = this.csContent.dastr;
                    vm.xiaotinum = this.csContent.children.length;
                    for (var i = 0; i < this.csContent.children.length; i++) {//给初始化的小题加个默认空答案 防止报错
                        var kongcontent = {
                            'topid': this.csContent.id,
                            'id': this.csContent.children[i].id,
                            'da': [],
                            'is_unable': this.csContent.children[i].is_unable,
                            'daoptions': this.csContent.children[i].daoptions,
                            'sort': this.csContent.children[i].sort,
                            'is_true': this.csContent.children[i].is_true,
                            'xsdastr': this.csContent.children[i].xsdastr,
                        };
                        Vue.set(vm.nowAnswerArr, i, kongcontent);
                    }
                    for (var i = 0; i < this.csContent.children.length; i++) {//给初始化的小题加个默认空答案 防止报错
                        var kongcontent = {
                            'topid': this.csContent.id,
                            'id': this.csContent.children[i].id,
                            'da': [],
                            'is_unable': this.csContent.children[i].is_unable,
                            'daoptions': this.csContent.children[i].daoptions,
                            'sort': this.csContent.children[i].sort,
                            'is_true': this.csContent.children[i].is_true,
                            'xsdastr': this.csContent.children[i].xsdastr,
                        };
                        Vue.set(vm.answerArr, i, kongcontent);
                    }
                    for (var i = 0; i < this.csContent.children.length; i++) {//给初始化的小题加个默认空答案 防止报错
                        var kongcontent = {
                            'topid': this.csContent.id,
                            'id': this.csContent.children[i].id,
                            'da': [],
                            'is_unable': this.csContent.children[i].is_unable,
                            'daoptions': this.csContent.children[i].daoptions,
                            'sort': this.csContent.children[i].sort,
                            'is_true': this.csContent.children[i].is_true,
                            'xsdastr': this.csContent.children[i].xsdastr,
                        };
                        Vue.set(vm.viewAnswerArr, i, kongcontent);
                    }
                    $('.all_wxtk_content').css('display', 'block');



                },
                huakuai: function () {
                    var tktcontent = document.getElementById('tkt_content'); //长线条
                    var right = document.getElementById('right'); //小方块
                    var left = document.getElementById('left');
                    var huakuai = document.getElementById('huakuai');
                    var ifBool = false; //判断鼠标是否按下
                    //鼠标按下方块
                    huakuai.addEventListener("touchstart", function (e) {
                        e.stopPropagation();
                        ifBool = true;
                    });
                    //拖动
                    window.addEventListener("touchmove", function (e) {
                        if (ifBool) {
                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x
                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标
                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值
                            if (minDiv_left >= tktcontent.offsetWidth - 15) {
                                minDiv_left = tktcontent.offsetWidth - 15;
                            }
                            //设置拖动后小方块的left值
                            var rightwidth;
                            var leftwidth;

                            var realWith = $(window).width() - 89;
                            if ((realWith - minDiv_left) > (realWith * 0.7 + 37)) {
                                rightwidth = realWith * 0.7 + 37;
                                leftwidth = realWith * 0.3 - 40;
                            } else if ((realWith - minDiv_left) < (realWith * 0.4 + 37)) {
                                rightwidth = realWith * 0.4 + 37;
                                leftwidth = realWith * 0.6 - 40;
                            } else {
                                rightwidth = realWith - minDiv_left;
                                leftwidth = minDiv_left
                            }

                            right.style.width = rightwidth + "px";
                            left.style.width = leftwidth + "px";
                        }
                    });
                    //鼠标松开
                    window.addEventListener("touchend", function (e) {
                        ifBool = false;
                    });

                    //获取元素的绝对位置
                    function getPosition(node) {
                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left
                        var top = node.offsetTop;
                        current = node.offsetParent; // 取得元素的offsetParent
                        // 一直循环直到根元素
                        while (current != null) {
                            left += current.offsetLeft;
                            top += current.offsetTop;
                            current = current.offsetParent;
                        }
                        return {
                            "left": left,
                            "top": top
                        };
                    }
                },
                PostAIBtn: async function () {
                    const aiAnalysis = $api.getStorage('aiAnalysis');

                    const ret = await new Promise((resolve, reject) => {
                        apiObj.Header({ 'Content-Type': 'application/json' }).Post(UrlRouter.PostPayfeeOperationLog, {
                            body: $api.jsonToStr({
                                schoolid: $api.getStorage('schoolid'),
                                type: 'ai_analysis',
                                resource_id: vm.data.xtid,
                                count: aiAnalysis.count,
                                card_type: aiAnalysis.card_type !== undefined ? aiAnalysis.card_type : null,
                                ...(aiAnalysis.card_id !== undefined && { card_id: aiAnalysis.card_id }),
                            })
                        }, function (ret, err) {
                            if (ret) {
                                api.sendEvent({
                                        name: 'aiAnalysisReduce'
                                    });
                                resolve(ret);
                            } else {
                                reject(err);
                            }
                        })
                    });
                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber') || ret.ret === -1) {
                        if ($api.getStorage('upgradeQRCode') === '1') {
                            api.toast({
                                msg: '本月剩余AI解析次数已耗尽',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            api.openFrame({
                                name: 'frame-number-exhausted',
                                url: '../../study/frame-number-exhausted.html',
                            })
                        }
                        return
                    }

                    if (ret.ret === 0 && ret.data === '') {
                        api.execScript({
                            name: 'win_error_detail_new',
                            script: 'postAIjxNum();'
                        });
                    }
                    api.showProgress({
                        title: '正在请求AI',
                        text: '请稍后...',
                        modal: true
                    });
                    const tgContent = document.querySelector('.tg_content');
                    const wxtk_tgs = document.querySelectorAll('.wxtk_tg');
                    const needpics = document.querySelectorAll('.needpic');
                    const allElements = [tgContent, ...wxtk_tgs, ...needpics];
                    const imageUrls = [];
                    let processedCount = 0;
                    // 处理每个元素的截图
                    allElements.forEach((element, index) => {
                        if (!element) return;
                        html2canvas(element, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        }).then(canvas => {
                            const imgUrl = canvas.toDataURL('image/png');
                            // 保存图片到相册    
                            imageUrls[index] = imgUrl;
                            processedCount++;
                            // 当所有图片都处理完成时
                            if (processedCount == allElements.length) {
                                api.hideProgress();
                                api.openFrame({
                                    name: 'frame_liushi',
                                    url: '../../study/newHomework/frame_liushi.html',
                                    rect: {
                                        x: 0,
                                        y: 0,
                                        w: 'auto',
                                        h: api.winHeight
                                    },
                                    pageParam: {
                                        xtid: vm.data.xtid,
                                        imagePaths: imageUrls
                                    },
                                    bounces: false
                                });
                            }
                        }).catch(error => {
                            api.toast({
                                msg: '截图失败：' + error,
                                duration: 2000,
                                location: 'bottom'
                            });
                        });
                    });
                },

            }
        });
    }
    function imgClick(context) {
        var src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        if (src.substring(src.length - 3) == 'gif') { } else {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    src
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
        }
    }
    function dismissDialog() {
        moduleDialog.dismissDialog();
    }
</script>

</html>
