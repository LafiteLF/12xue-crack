<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题诊断</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        html,
        body {
            overflow-y: hidden;
            overflow-x: hidden;
        }


        body::-webkit-scrollbar {
            display: none;


        }


        body {
            overflow-x: hidden;
            overflow: hidden;
            padding: 10px;
            padding-top: 10px;

        }

        .container {
            padding: 10px;
            padding-top: 10px;
            max-width: 1400px;
            /* 增加容器最大宽度以适应更宽的内容 */
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;

        }

        .subject-tabs {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .subject-tabs button {
            border: 1px solid#B5C9E6 ;
            -webkit-tap-highlight-color: transparent;
            font-size: 11px;
            margin-right: 11px;
            padding: 5px 14px;
            border-radius: 10px;
            cursor: pointer;
            background-color: #efefef;
            color: #333;
            transition: all 0.1s ease-in-out;
        }

        .subject-tabs button:last-child {
            margin-right: 0;
        }

        .subject-tabs button.active {
            background-color: #1759EA ;
            color: #fff;
        }

        .nowPage {
            
            font-size: 18px;
            font-weight: bold;
            color: #1759EA ;
        }

        .groupLength {
            font-size: 14px;
            color: #1759EA  ;
        }

        .mainContent {
            width: 100%;
            /* 设置更宽的固定宽度 */
            max-width: 100vw;
            /* 最大宽度为视窗宽度的95% */

            /* 设置最小高度 */
            overflow-x: auto;
            /* 允许横向滚动 */
            overflow-y: auto;
            /* 纵向滚动 */
            margin: 0 auto;
            /* 水平居中 */
            background: #fff;
            border-radius: 8px;
           
            padding-bottom: 10px;
           
            box-shadow: 0px 3px 16px 0px rgba(0,11,28,0.06);



        }



        .content-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            /* 水平居中 */
            width: 100%;

        }

        .nav-btn {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            top: calc(50% - 15px);
            border: none;
            outline: none;
            background: #fff;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
            color:#1759EA ;
            z-index: 999;
            transition: all 0.2s ease;

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            user-select: none;
            /* 默认禁用样式 */
            opacity: 0.5;
            pointer-events: none;
        }

        /* 按钮可用状态 */
        .nav-btn.enabled {
            opacity: 1;
            pointer-events: auto;
        }

        .nav-btn.enabled:hover {
            background: #f0f7ff;
        }

        .right {
            left: calc(100% - 15px);
        }

        .left {
            left: calc(0% - 15px);
        }

        /* 核心：滑动容器样式 */
        .question-cards {
            transition: transform 0.3s ease-in-out;
            overflow: hidden;
        }

        /* 题目卡片样式保持不变 */
        .question-card {
            padding: 10px 30px;

            
            border-bottom: 1px solid #E4E4E8;
        }

        /* .question-card:last-child {
            border-bottom: none;
            margin-bottom: 50px;
        } */

        .question-title {
            position: relative;
            color:#1759EA ;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .question-content {
            color: #333;
            line-height: 1.6;
            position: relative;
            padding-right: 60px;
            display: flex;
            flex-direction: row;
            justify-content: start;

        }

        .question-tag {
            color: #1759EA ;
            position: absolute;
            right: 0;
            top: 0%;

            font-size: 10px;
        }

        .QNo {

            position: absolute;
            left: -15px;
            top: 3px
        }

        .carousel-page {
            box-shadow: 0px 3px 16px 0px rgba(0,11,28,0.06);
            width: 100%;
            flex-shrink: 0;
            overflow: visible;
            /* 改为visible，允许内容正常显示 */


        }

        .carousel-track {
            display: flex;
            width: 100%;
            height: auto;
            transition: transform 0.3s ease-in-out;
        }


        .KContent {
            color:#1759EA ;

            white-space: nowrap;
            /* 不换行 */
            overflow: hidden;
            /* 超出隐藏 */
            text-overflow: ellipsis;
            /* 显示省略号 */

        }


        .carousel-page {

            width: 100%;
            flex-shrink: 0;
            overflow: hidden;



        }



        .bottom-tip {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #fef3f2;
            border-top: 1px solid #e5e5e5;
            padding: 10px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: rgb(255, 0, 0);
            z-index: 9999;
        }

        .bottom-tip button {
            margin-left: 25px;
            background-color: #ccc;
            /* 灰色按钮 */
            color: rgb(255, 255, 255);
            /* 灰色文字 */
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .bottom-tip button:hover {
            background-color: #bbb;
            /* 鼠标悬停颜色稍深 */
        }

        .conHeader {
            position: sticky;
            top: 0;
            z-index: 20;


            background: rgb(255, 255, 255);
          
           


            padding: 12px 10px 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);

            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;

            font-size: 12px;


        }

        .timePeriod {
            font-weight: bold;
            font-size: 16px;
            font-family: "MicrosoftYaHei-Bold";
            color: #64748B;
        }

        .rate {
            color: red;
        }

        .content-html {
            max-width: 100% !important;
            /* 强制所有子元素不超过容器宽度 */
            word-wrap: break-word;
            /* 超长文本换行 */
            word-break: break-word;
            /* 兼容性 */
            font-size: 13px;
        }

        .content-html img {
            max-width: 50%;
            /* 不超过容器宽度 */
            height: auto;
            /* 高度自适应 */

        }

        .content-html-wrapper table {
            width: 100% !important;
            /* 表格自适应宽度 */
            table-layout: fixed;
            /* 固定表格布局 */
            border-collapse: collapse;
        }

        .content-html-wrapper td,
        .content-html-wrapper th {
            word-wrap: break-word;
            word-break: break-word;
        }

        [v-cloak] {
            display: none;
        }

        .page-switcher {
            width: 100%;
            height: 100%;
            overflow: visible;
            position: relative;
        }

        .page-stage {
            width: 100%;
            height: 100%;
        }

        /* 横向动画 */
        .slide-left {
            animation: slideLeft 0.3s ease;
        }

        .slide-right {
            animation: slideRight 0.3s ease;
        }

        .even-page {
            background-color: #f5f8fa;
        }
        
    </style>
</head>

<body>
    <div class="container" id="container" v-cloak>
        <!-- 头部信息 -->
        <div class="header">
            <div class="timePeriod">
                <span>
                    <img src="../../../image/testReport/rilizuo.png" style="width: 12px;" alt="">
                    错题诊断时间
                </span>
                <span style="margin-left: 10px;">{{tmP}}</span>
            </div>
            <div style="margin-right: 15px;">
                <span class="nowPage">{{nowPage+1}}</span>
                <span class="groupLength">/{{csContentLength}} 组</span>
            </div>
        </div>

        <!-- 科目标签 -->
        <div class="subject-tabs">
            <button :class="{active : index==activeIndex}" v-for="(item ,index) of cs" :key="index"
                @click="handleTabClick(index)">{{item}}</button>
        </div>


        <div class="content-wrapper">

            <button class="nav-btn left" :class="{enabled: nowPage > 0}" @click="ReducePage()">
                <img width="30px" src="../../../image/testReport/LBA/prev.png" alt="">
            </button>

            <button class="nav-btn right" :class="{enabled: nowPage < csContentLength - 1}" @click="AddPage()">
                <img width="30px" src="../../../image/testReport/LBA/next.png" alt="">
            </button>

            <!-- 内容主体 -->

            <div class="page-switcher">
                <div class="page-stage" :class="slideDirection">
                    <main class="mainContent" ref="mainContent">
                        <div class="conHeader">
                            <span class="knowledge">
                                知识点：<span class="KContent">{{ knowLedge }}</span>
                            </span>
                            <span class="mineRate">
                                我的正确率：<span class="rate">{{ rate }}</span>
                            </span>
                        </div>

                        <!-- 当前页内容（只有这一页存在） -->

                        <div class="question-card" v-for="(item, index) in currentPageContent" :key="index"
                            @click="detailQ(currentPageContent, index)" :class="{'even-page': index % 2 === 0}">
                            <div class="inner">
                                <div class="question-title">
                                    <span class="QNo">{{ index === 0 ? `${nowPage + 1}.` : '' }}</span>
                                    【{{ item.type_text }}】
                                </div>

                                <div class="question-content">
                                    <span v-html="item.tg" class="content-html" style="margin-left:10px"></span>
                                    <span class="question-tag">[{{ item.txstr }}]</span>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            </div>

            <footer v-if="needPay">
                <div class="bottom-tip">
                    <span>当前学科只能作答10题向量提升题集哦，如作答更多向量提升题集需解锁更高版本~</span>
                    <button>立即解锁高级版</button>
                </div>
            </footer>
        </div>
    </div>

    <script type="text/javascript" src="../../../script/api.js"></script>
    <script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
    <script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
    <script type="text/javascript" src="../../../script/vue.global.prod-3.5.18.js"></script>
    <script type="text/javascript">
        apiready = function () {
            const { createApp, ref, computed, nextTick, onMounted, watch } = Vue;
            const slideDirection = ref('');
            const params = api.pageParam;
            const tmPeriod = params.tmPeriod
            const courses = params.courses
            const data = params.data


            createApp({
                setup() {
                    const totalHeight = ref(0)
                    const pageRefs = ref([]);
                    const height = ref(0)
                    const hasShownBottomModal = ref(false);
                    const needPay = ref(false)
                    const mainContent = ref(null)
                    const courseType = ref(['错题原题', '基础巩固题', '能力迁移题', '综合拔高题'])
                    const nowPage = ref(0)
                    const GetData = ref(data)
                    const tmP = ref(tmPeriod)
                    const activeIndex = ref(0)

                    onMounted(() => {
                        nextTick(() => {


                            const main = mainContent.value;
                            const screenHeight = api.winHeight; // APICLOUD 屏幕高度
                            const container = document.querySelector('.container');
                            const header = document.querySelector('.header');
                            const tabs = document.querySelector('.subject-tabs');
                            const page = document.querySelector('.nowPage');

                            // const bottomTip = document.querySelector('.bottom-tip');


                            const usedHeight =
                                header.offsetHeight +
                                tabs.offsetHeight + 100


                            if (main) {
                                main.style.height = (screenHeight - usedHeight) + 'px';
                                main.addEventListener('scroll', onMainScroll);


                            }

                        });


                        console.log(JSON.stringify(data[courses[activeIndex.value]][nowPage.value].accuracy_rate));
                    })

                    const resetScroll = () => {
                        nextTick(() => {
                            mainContent.value.scrollTop = 0;
                            // 动画播放完成后清空动画类
                            setTimeout(() => {
                                slideDirection.value = '';
                            }, 300); // 与动画持续时间一致
                        });
                    };

                    const currentPageContent = computed(() => {
                        const subject = data[courses[activeIndex.value]]
                        if (!subject) return []
                        return subject[nowPage.value].recommend_exercises || []
                    })


                    // 切换科目时重置页码
                    const handleTabClick = (index) => {
                        activeIndex.value = index
                        nowPage.value = 0
                        hasShownBottomModal.value = false;
                        nextTick(() => {
                            if (mainContent.value) {
                                mainContent.value.scrollTop = 0;
                            }

                        });
                    }

                    const onMainScroll = () => {
                        const el = mainContent.value;
                        if (!el) return;

                        const scrollTop = el.scrollTop;
                        const clientHeight = el.clientHeight;
                        const scrollHeight = el.scrollHeight;

                        const isAtBottom = scrollTop + clientHeight >= scrollHeight - 5;


                        if (!isAtBottom && hasShownBottomModal.value) {
                            hasShownBottomModal.value = false;
                        }


                        if (isAtBottom && !hasShownBottomModal.value) {
                            hasShownBottomModal.value = true;
                            showBottomDialog();
                        }
                    };

                    const showBottomDialog = () => {
                        api.toast({
                            msg: '已经滑到最底部啦',
                        });

                    };



                    // 下一页
                    const AddPage = () => {
                        if (nowPage.value < csContentLength.value - 1) {
                            nowPage.value++
                            hasShownBottomModal.value = false;
                            slideDirection.value = 'slide-left';
                            resetScroll();
                            nextTick(() => {
                                if (mainContent.value) {
                                    mainContent.value.scrollTop = 0;
                                }


                            });

                        }
                    }

                    // 上一页
                    const ReducePage = () => {

                        if (nowPage.value > 0) {
                            nowPage.value--
                            slideDirection.value = 'slide-right';
                            resetScroll();
                            hasShownBottomModal.value = false;
                            nextTick(() => {
                                if (mainContent.value) {
                                    mainContent.value.scrollTop = 0;
                                }

                            });
                        }
                    }

                    // 课程列表
                    const cs = computed(() => {
                        return courses || []
                    })

                    // 当前科目的内容
                    const csContent = computed(() => {
                        const currentSubject = data[courses[activeIndex.value]]
                        if (!currentSubject || !Array.isArray(currentSubject)) {
                            return []
                        }
                        return currentSubject.map(point => point.recommend_exercises || [])
                    })

                    const rate = computed(() => {
                        const currentSubject = data[courses[activeIndex.value]][nowPage.value]
                        let val = currentSubject.accuracy_rate.replace('%', '')

                        if (Number.isInteger(parseFloat(val))) {
                            return `${val.split('.')[0]}%`
                        } else {
                            return `${val}%` // 保留一位小数
                        }
                    })




                    // 内容组长度
                    const csContentLength = computed(() => {
                        return Object.values(csContent.value).filter(v => v).length
                    })


                    //知识点
                    const knowLedge = computed(() => {
                        return data[courses[activeIndex.value]][nowPage.value]['point_name']
                    })


                    const slideOffset = computed(() => {
                        return nowPage.value * 100
                    })

                    const detailQ = ((group, index) => {
                        console.log(group[index].xkid,
                            group[index].dyid,
                            group[index].njid,
                            group[index].type,





                            group[index].jieid,
                        );
                        api.openWin({
                            name: 'win_question_detail',
                            url: './win.question.datil.html',
                            pageParam: {
                                courseType: courseType.value[index],
                                csContent: group,
                                index: index + 1,
                                total: group.length,
                                xkid: group[index].xkid,
                                dyid: group[index].dyid,
                                njid: group[index].njid,
                                online: 1,
                                type: group[index].type,
                                tx_type: group[index].tx,
                                jieid: group[index].jieid,
                                sys_id: group[index].id
                            },

                        });
                    })



                    return {
                        pageRefs,
                        currentPageContent,
                        rate,
                        courseType,
                        knowLedge,
                        detailQ,
                        mainContent,
                        GetData,
                        courseType,
                        AddPage,
                        ReducePage,
                        csContentLength,
                        csContent,
                        nowPage,
                        tmP,
                        cs,
                        activeIndex,
                        slideOffset,
                        handleTabClick
                    }
                }
            }).mount('#container')
        }
    </script>
</body>

</html>
