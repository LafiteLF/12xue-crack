    function openMediaScanner(max) {
        if (!uiMediaScanner) {
            uiMediaScanner = api.require('UIMediaScanner');
        }
        uiMediaScanner.open({
            type: 'picture',
            column: 4,
            classify: true,
            max: max ? max : 6,
            sort: {
                key: 'time',
                order: 'desc'
            }, rotation: true,
            texts: {
                stateText: '已选*项',
                selectedMaxText: '最多上传*张图片',  //默认：'最多显示*个资源'
                cancelText: '取消',
                finishText: '完成'
            },
            styles: {
                bg: '#fff',
                mark: {
                    icon: '',
                    position: 'bottom_left',
                    size: 20
                },
                nav: {
                    bg: '#4bc7c7',
                    stateColor: '#fff',
                    stateSize: 18,
                    cancelBg: 'rgba(0,0,0,0)',
                    cancelColor: '#fff',
                    cancelSize: 18,
                    finishBg: 'rgba(0,0,0,0)',
                    finishColor: '#fff',
                    finishSize: 18
                }
            }
        }, function (ret) {
            if (ret) {
                if (ret.list) {
                    compressListener.allCount = ret.list.length;
                    compressListener.successCount = 0;
                    for (var i = 0; i < ret.list.length; i++) {
                        var selectImg = ret.list[i];
                        //获取图片路径
                        var selectimgPath = selectImg.path;
                        if (api.systemType == "ios") {
                            uiMediaScanner.transPath({
                                path: selectimgPath
                            }, function (ret, err) {
                                if (ret) {
                                    compressImage(ret.path);
                                } else {
                                    alert("ios地址转换失败：" + JSON.stringify(err));
                                }
                            });
                        } else {
                            //compressImage(selectimgPath);
                        }
                    }
                    if (api.systemType == "android") {
                        api.showProgress();
                        compressImage(0, ret.list);
                    }
                    console.log(JSON.stringify(ret));
                }
            }
        })
    }

    function compressImage(index, list) {
        var imageFilter = api.require('imageFilter');
        var imgName = getUrlName(list[index].path);
        var quality;
        if (api.systemType == 'ios') {
            quality = 0.2;
        } else {
            quality = 0.3;
        }
        imageFilter.compress({
            img: list[index].path,
            quality: quality,
            save: {
                imgPath: "fs://img_compress/",
                imgName: imgName
            }
        }, function (ret, err) {
            if (ret.status) {
                compressListener.successCount++;
                picArr.push(api.fsDir + "/img_compress/" + imgName);

                if (index < list.length - 1) {
                    compressImage(++index, list);
                }

                if (compressListener.allCount == compressListener.successCount) {
                    //api.showProgress();
                    qiniuUpfile(0);
                }
            } else {
                alert(JSON.stringify(err));
            }
            imageFilter = '';
        })
    }

    function qiniuUpfile(index) {
        var fileKey = (new Date()).valueOf() + picArr[index];
        apiObj.Get(UrlRouter.GetQiNiuToken, {
            values: {
                uid: $api.getStorage('uid'),
                bucket: 'vodresource',
                key: fileKey
            }
        }, function (ret, err) {
            var qiniuStorage = api.require("qiniuStorage");
            qiniuStorage.configUploader({
                params: {},
                checkCrc: false,
                mimeType: ''
            });
            qiniuStorage.start({
                token: ret.data.token,
                path: picArr[index],
                key: fileKey
            });
            qiniuStorage.addEventListener(function (ret) {
                var code;
                if (ret.eventType == 'complete' && (api.systemType == 'ios' ? ret.info.statusCode : ret.statusCode) == 200) {
                    pImageList.push(QINIU_DOMAIN + ret.key);
                    if (index < picArr.length - 1) {
                        qiniuUpfile(++index);
                    } else {
                        //上传七牛完毕
                        postCorrectionImgs();
                    }

                }
            });
        })
    }

    function postCorrectionImgs() {
        //api.showProgress();
        var params = {};
        params['uid'] = $api.getStorage('uid');
        params['sys_id'] = vm.current_sys_id;
        var data = [];
        for (var i = 0; i < pImageList.length; i++) {
            data.push({
                'url': pImageList[i],
                'sort': parseInt(maxsort) + i + 1,
            })
        }
        params['data'] = data;
        apiObj.Header({ 'Content-Type': 'application/json' }).Post(UrlRouter.UploadCorrectionImage, {
            body: params
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {
                    api.toast({
                        msg: '操作成功',
                        duration: 2000,
                        location: 'middle'
                    });
                    picArr = [];
                    pImageList = [];
                    GetCorrectionImageList(vm.current_sys_id, 1);
                    api.sendEvent({
                        name: 'refreshimglist',
                        extra: {}
                    });
                } else {
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            } else {
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }
        })
    }

     * @returns {boolean} true 压缩完成
     */
    function checkImageCompress() {
        if (compressListener.allCount != 0 && compressListener.allCount != compressListener.successCount) {
            api.toast({
                msg: '正在压缩图片，请稍后操作',
                duration: 2000,
                location: 'middle'
            });
            return false;
        }
        return true;
    }

    function getUrlName(url) {
        var index = url.lastIndexOf("/");
        var imgName;
        if (api.systemType == 'ios') {
            var idIndex = url.indexOf("id=");
            if (idIndex != -1) {
                var andIndex = url.indexOf("&");
                imgName = url.substring(idIndex + 3, andIndex);
            } else {
                imgName = url.substring(index + 1);
            }
        } else {
            imgName = url.substring(index + 1);
        }
        return imgName;
    }

    async function getAIbstAndSetNum() {
        if (vm.zsdmc === '无') {
            api.toast({
                msg: '该题暂无AI变式题',
            })
            return;
        }
        const ret = await new Promise((resolve, reject) => {
            apiObj.SetAuthToken($api.getStorage('token'));
            apiObj.Header({ 'Content-Type': 'application/json' }).Post(UrlRouter.PostPayfeeOperationLog, {
                body: $api.jsonToStr({
                    uid: $api.getStorage("uid"),
                    schoolid: $api.getStorage("schoolid"),
                    type: 'ai_push',
                    resource_id: vm.xtid,  //本题的id
                    count: vm.aiPush['count'],
                    card_type: vm.aiPush['card_type'] !== undefined ? vm.aiPush['card_type'] : null,
                    ...(vm.aiPush['card_id'] !== undefined && { card_id: vm.aiPush['card_id'] }),
                })
            }, function (ret, err) {
                if (ret) {
                    resolve(ret);
                } else {
                    reject(err);
                }
            });
        });
        if ((vm.aiPush.count <= 0 && ret.ret === 0 && ret.data === 'nonumber') || ret.ret === -1) {
            if ($api.getStorage('upgradeQRCode') === '1') {
                api.toast({
                    msg: '本月剩余变式题推送次数已耗尽',
                    duration: 2000,
                    location: 'bottom'
                });
            } else {
                api.openFrame({
                    name: 'number-exhausted',
                    url: '../frame-number-exhausted.html',
                })
            }
            return
        }
        if (ret.ret === 0 && ret.data === '') {
            vm.aiPush.count -= 1;
            api.execScript({
                name: 'win_error_list_pad',
                script: 'postAiPush();'
            });
        }
        getAIbst();
    }

    function postAIjxNum() {
        if (vm.aiAnalysis.count > 0) {
            vm.aiAnalysis.count -= 1;
        }
    }


    function getAIbst() {
        api.openWin({
            name: 'win_bst.html',
            url: 'AIbst/win_bst.html',
            pageParam: {
                xtid: vm.xtid,
            },
            bounces: false
        });
    }


</script>
