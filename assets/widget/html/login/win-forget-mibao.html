<script type="text/javascript">
    apiready = function(){
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = $api.getStorage('padHeight') - headerH;

        api.openFrame({
            name: 'frame-forget-mibao',
            url: 'frame-forget-mibao.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false,
            pageParam: {uid: api.pageParam.uid,account: api.pageParam.account,oneWinname: api.pageParam.oneWinname}
        });
    };

</script>
