<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>忘记密码</title>
    <link rel="stylesheet" href="../../css/sm.min.css">
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="../../css/analysis.css">
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <style type="text/css">
        body {
            background-color: #f2f2f2;
        }

        .wenti {
            padding: 0.5rem 0.5rem;
            font-size: 18px;
        }

        .aui-btn {
            margin-top: 40px;
            width: 92%;
            height: 50px;
            background-color: #4bc7c7;
            font-size: 20px;
            margin-left: 4%;
        }

        .aui-input-row {
            height: 40px;
            /*padding: 8px 15px;*/
            margin-top: 10px;
            width: 100%;
            line-height: 10px;
            background-color: #fff;
        }

        .aui-text-primary {
            float: right;
            padding: 25px 20px;
        }
        .aui-btn-info:active {
            color: #fff;
            background-color: #bdc3c7;
            border: 1px solid #bdc3c7;
        }
        .aui-list-item-input{
            background-color: #fff;
            margin: 5px 0;
            padding-left: 15px;
        }

    </style>
</head>
<body>
<div class="wenti"><span>问题：</span> <span id="question" class="question"></span></div>

<div class="aui-list-item-input">
    <input id="answer" type="text" class="aui-input" placeholder="请输入答案" style="">
</div>
<span class="aui-text-primary" onclick="changeQuestion()">换一个</span>

<p style="  width: 96%; margin: 100px auto;">
    <input type="button" style="color:#fff ;line-height: 1" value="下一步" class="aui-btn aui-btn-block" id="btn-addclass"
           tapmode onclick='next()'></p>
</body>
<footer>
</footer>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    var questionArr = new Array(3);//密保问题集合
    var questionIdArr = new Array(3);//密保问题ID 集合
    var showQuestion;//当前展示的密保问题
    var showId;//当前展示的密保问题ID
    var index ;//用来标记第几个
    apiready = function () {
        apiObj.Get(UrlRouter.GetSecurityInfo, {
            values: {
                uid: api.pageParam.uid
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    for (var i = 0; i < 3; i++) {
                        questionArr[i] = ret.data[i].question;
                        questionIdArr[i] = ret.data[i].id;
                    }
                    setQuestion();
                } else {
                    //alert(ret.msg);
                }
            } else {

            }
        });
    };
    //显示密保问题
    function setQuestion() {
        $api.text($api.byId('question'), questionArr[0]);
        showQuestion = questionArr[0];
        showId = questionIdArr[0];
        index=0;
    }
    //更换密保问题
    function changeQuestion() {
        if (index == 0) {
            $api.text($api.byId('question'), questionArr[1]);
            showQuestion = questionArr[1];
            showId = questionIdArr[1];
            index = 1;
        }else if (index == 1) {
            $api.text($api.byId('question'), questionArr[2]);
            showQuestion = questionArr[2];
            showId = questionIdArr[2];
            index = 2;
        }else if (index == 2) {
            $api.text($api.byId('question'), questionArr[0]);
            showQuestion = questionArr[0];
            showId = questionIdArr[0];
            index = 0;
        }
    }
    
    //验证密保问题
    function next() {
        var content =$api.val($api.byId('answer'));
        if (content.length==0){
            api.toast({
                msg: '请输入密保答案',
                duration: 2000,
                location: 'bottom'
            });
        }else {
            apiObj.Post(UrlRouter.PostChkAnswer,{
                values:{
                    uid:api.pageParam.uid,
                    question_id:showId,
                    answer:content
                }
            },function (ret,err) {
                if (ret){
                    if (ret.ret==0){

                        if(ret.secret){
                            api.openWin({
                                name: 'win-reset-pwd',
                                url: 'win-reset-pwd.html',
                                pageParam: {uid: api.pageParam.uid,account: api.pageParam.account,secret:ret.secret,oneWinname: api.pageParam.oneWinname}
                            });
                        }else {
                            api.toast({
                                msg: '密保答案错误！',
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    }else {
                        api.toast({
                            msg: ret.msg,
                            duration: 2000,
                            location: 'bottom'
                        });
                    }
                }else {

                }

            });
        }

    }

</script>
</html>
