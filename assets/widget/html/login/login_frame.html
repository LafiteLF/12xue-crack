<script>
    var online = false;
    var deviceType = '';
    var xieyi = false;
    apiready = function () {

        var account;
        var psw = $api.getStorage("psw");
        if ($api.getStorage('deviceModel') == 1) {
            account = '';
        } else {
            account = $api.getStorage("account");
            $('#dlpassword').val(psw);
        }
        try {
            if (account.length > 2 && psw.length > 2) {
                $('#user').val(account);
                login();
            }
        } catch (e) {
        }
        deviceType = $api.getStorage('padType') == '3' ? 'hangzhi' : '';
        api.addEventListener({
            name: 'MacAdress'
        }, function (ret, err) {
            $api.setStorage('macAdress', ret.value.adress);
            userlogin();
        });
        if ($api.getStorage('deviceModel') == 1) {
            api.addEventListener({
                name: 'autoLogin'
            }, function (ret, err) {
                $api.setStorage('macAdress', ret.value.macAdress);
                var account = ret.value.account;
                var psw = ret.value.psw;
                AutoLogin(account, psw);
            });

            api.sendEvent({
                name: 'getAccount'
            });
        } else {
            var connectionType = api.connectionType.toLowerCase();
            if (api.systemType == 'android') {
                if ($api.getStorage('isLogin') == "true" && connectionType != 'none') {
                    if (account != null && psw != null) {
                        AutoLogin(account, psw);
                    }
                }
            } else {
                if ($api.getStorage('isLogin') == "true" && connectionType != 'none') {
                    if (account != null && psw != null) {
                        AutoLogin(account, psw);
                    }
                }
            }
        }
        $api.css($api.dom('.bottom'), 'top:' + api.frameHeight * 0.85 + 'px;'); //适配不同的pad
        api.addEventListener({
            name: 'openIndexCheck'
        }, function (ret, err) {
            api.openFrame({
                name: 'frame_index_check',
                url: '../frame_index_check.html',
                rect: {
                    x: 0,
                    y: 0,
                    w: api.winWidth,
                    h: api.winHeight
                },
                bounces: false
            });
        });


        /*
         * 设置切换线路
         * */
        api.addEventListener({
            name: 'resetLoginUrl'
        }, function (ret, err) {
            apiObj = new GridOpenApi(urlArr[ret.value.index], source, version);
        });

       
        if($api.getStorage("padType")==='2'){
            const  once= $api.getStorage("openOnce");
            if (once===undefined || once===false){
               $api.setStorage("openOnce",true);
                getPermission();
            }
        }
        else{
            getPermission();
        }
        

    };
    $(function () {//密码显示隐藏
        $("#ShowHide").click(function () {
            if ($("#ShowHide").is(":checked")) {
                $('#dlpassword').attr('type', 'text');
            } else {
                $('#dlpassword').attr('type', 'password');
            }
        });
    });

    function login() {//登录按钮变色
        if ($('#user').val() != "") {
            $('.clear').show();
        } else {
            $('.clear').hide();
        }
        if ($('#user').val() != "" && $('#dlpassword').val() != "") {
            $('#denglu').css('color', '#fff').removeAttr("disabled");
        } else {
            $('#denglu').css('color', '#c2e9e9').attr("disabled", "disabled");
        }
    }

    function getMacAdress() {
        if (api.systemType == 'android') {
            api.addEventListener({
                name: 'MacAdress'
            }, function (ret, err) {
                $api.setStorage('macAdress', ret.value.adress);
                userlogin();
            });
            //点击登录，先获取MAC地址
            api.sendEvent({
                name: 'getMacAdress'
            });
            userlogin();

        } else {

            userlogin();
        }

    }

    var loginClick = true;

    function userlogin() {//登录
        if (loginClick) {

            if (!xieyi) {
                api.toast({
                    msg: '请先阅读并同意协议内容与隐私政策',
                    duration: 2000,
                    location: 'bottom'
                });
                return;
            }

            loginClick = false;
            var user = $('#user').val();
            var dlpassword = $.trim($('#dlpassword').val());
            $api.setStorage('user', user);
            $api.setStorage('dlpassword', dlpassword);
            PostUserlogin(user, dlpassword, '');//用户登录
            setTimeout("loginClick = true", 1000);
        }

    }

    function changjianwenti() {//常见问题
        api.openWin({
            name: 'questions_win',
            url: '../mine/question/questions_win.html',
            pageParam: { road: 'weidenglu' }
        });

    }

    function wangjimima() {//忘记密码
        api.toast({
            msg: '可联系班主任重置密码，可通过12xue家长APP重置密码',
            duration: 3000,

        //        api.openWin({
        //            name: 'win-forget-account',
        //            url: 'win-forget-account.html'
        //        });

    }


    function clearzhanghao() {
        $('#user').val('');

    }

    //点击联系客服
    function openLxkf() {
        api.openFrame({
            name: 'frame-contact-service',
            url: '../frame-contact-service.html',
            rect: {
                x: 0,

                w: 'auto',

    function postDeviceReport(uid) {
        apiObj.SetAuthToken($api.getStorage('token'));
        apiObj.Post(UrlRouter.PostDeviceReport, {
            values: {
                uid: uid,
                mac_addr: '',
                // serial_number: api.systemType == 'ios' ? api.deviceId : '',
                serial_number: '',
                device_type: deviceType
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    if (ret.data == 0) { //清理缓存的标志
                        //创建打开数据库
                        var db = api.require('db');
                        var ret = db.openDatabaseSync({
                            name: dbName,
                            path: 'fs://student_12xue.db'
                        });
                        var truncatedb = db.executeSqlSync({
                            name: dbName,
                            sql: 'delete from IntelligenceAnswer '
                        });
                    }

    function AutoLogin(account, psw) {
        apiObj.SetAuthToken($api.getStorage('token'));
        apiObj.Post(UrlRouter.PostUserlogin, {
            values: {
                account: base64encode(account),
                password: md5(psw),
                client_id: '12xue_stu',
                client_secret: 'a6c36548b3a7c78ef5d912e1d1a1bdce',
                is_pad: '1',
                mac_addr: $api.getStorage('macAdress'),
                decrypt: 'md5_1',
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {
                    $api.setStorage('isLogin', 'true');
                    $api.setStorage('token', ret.access_token);
                    $api.setStorage('refresh_token', ret.refresh_token);
                    $api.setStorage('uid', ret.uid);
                    $api.setStorage('openScanner', '1');
                    $api.setStorage('sex', ret.sex);
                    $api.setStorage('realname', ret.realname);
                    $api.setStorage('account', ret.username);
                    $api.setStorage('username', ret.username);
                    $api.setStorage('psw', psw);

                    //判断token有效期使用
                    $api.setStorage('expires_in', parseInt(new Date().getTime() / 1000));

                    //杭智管控判断强制绑定
                    if ($api.getStorage('padType') == '3' && ret.pad_allow_login == 0) {
                        checkAllowLogin();
                    } else {
                        GetStudentAuditNotify();
                        postDeviceReport(ret.uid);
                        api.openWin({
                            name: 'win-stu-main',
                            url: '../win-stu-main.html',
                            slidBackEnabled: false,
                            pageParam: { sex: ret.sex }
                        });
                    }

                } else {

                    //领创  发送广播
                    if ($api.getStorage('deviceModel') == 1) {
                        api.sendEvent({
                            name: 'closeToLispirer'
                        });
                    }

                    $api.setStorage('isLogin', 'false');
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            } else {

                //领创  发送广播
                if ($api.getStorage('deviceModel') == 1) {
                    api.sendEvent({
                        name: 'closeToLispirer'
                    });
                }

                $api.setStorage('isLogin', 'false');
                api.toast({
                    msg: '当前网络不可用，请检查网络设置',
                    duration: 3000,
                    location: 'bottom'
                });
            }
        });
    }


    function getPhone() {
        apiObj.Get(UrlRouter.KfInfo, {
            value: {}
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    $api.text($api.byId('spanTel'), ret.data.phone);

        });

    function openUserAgreement() {
        api.openWin({
            name: 'win-user-agreement',
            url: '../win-user-agreement.html',
            pageParam: {}
        });
    }

    function openUserPolicy() {
        api.openWin({
            name: 'win-privacy-policise',
            url: '../win-privacy-policise.html',
            pageParam: {}
        });
    }

    function xuanzhongxieyi() {
        xieyi = !xieyi;
    }

    function getPermission() {

        if (api.systemType == 'ios') {
        // 如果是iOS设备，则不执行任何权限请求的逻辑
        return;
    }


        // 1. 定义一个包含所有需要权限的数组
        var permissions = ['camera', 'microphone', 'storage']; // 例如：相机、麦克风、存储
        // 2. 检查这些权限的状态
        var resultList = api.hasPermission({
            list: permissions
        });

        // 3. 使用 Array.prototype.every 检查是否所有权限都已授予
        // every() 方法测试一个数组内的所有元素是否都能通过某个指定函数的测试。它返回一个布尔值。
        var allGranted = resultList.every(function (permission) {
            return permission.granted;
        });

        if (allGranted) {
            // 所有权限都已授权，可以继续下一步操作
            // api.alert({
            //     msg: '所需权限均已授权'
            // });
        } else {
            // 至少有一个权限未被授予，提示用户
            api.confirm({
                title: '授权请求',
                msg: '应用需要您的相机、麦克风和存储权限才能正常工作。相机权限用于拍照以及扫码，麦克风权限用于音频录制，存储权限用于用户数据的保存', // 修改提示信息
                buttons: ['取消', '去设置'],
                

            }, function (ret) {
                if (ret.buttonIndex == 2) {
                    // 4. 请求整个权限列表
                    api.requestPermission({
                        list: permissions,
                    }, function (res) {
                       
                        // 5. 再次检查返回的结果，确保所有请求的权限都被授予
                        var allRequestGranted = res.list.every(function (permission) {
                            return permission.granted;
                        });

                        if (allRequestGranted) {
                            // 所有请求的权限都已授权，可以继续下一步操作
                            api.alert({
                                msg: '授权成功'
                            });
                        } else {
                            // 用户在设置中没有授予全部权限
                            api.alert({
                                msg: '您有部分权限未授予，可能影响应用部分功能的使用'
                            });
                        }
                    });
                }
            });
        }
    }

</script>
