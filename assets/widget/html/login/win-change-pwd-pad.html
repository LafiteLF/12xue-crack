<header class="aui-bar aui-bar-nav aui-clearfix">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="closeWin();">
        <span class="aui-iconfont aui-icon-left" tapmode onclick='closeWin()'></span>修改密码
    </a>
</header>

<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript">
    apiready = function(){
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = api.winHeight - headerH;
//        if (api.pageParam.sex == '0') {
//            api.sendEvent({
//                name: 'chooseSex'
//            });
//        }

        api.openFrame({
            name: 'frame-change-pwd-pad',
            url: 'frame-change-pwd-pad.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false,
//            pageParam:{sex: api.pageParam.sex}
        });

        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
           closeWin();
        });

        api.addEventListener({
            name: 'changPwd'
        }, function (ret, err) {
            api.openWin({
                name: 'win-stu-main',
                url: '../../win-stu-main.html',
                pageParam: {loginSuc: true}
            });
        });

    };

    function closeWin() {

        var moduleDialog = api.require('moduleDialog');
        var param = {
            "data": [{
                "viewType": 100,
                "x": api.winWidth / 2 - 150,
                "y": $api.getStorage('padHeight') / 2 - 75,
                "h": 150,
                "w": 300
            }, {
                "viewType": 101,
                "x": api.winWidth / 2 - 150 + 30,
                "y": $api.getStorage('padHeight') / 2 - 75 + 30,
                "h": 48,
                "w": 240,
                "lineSpacting": 1.3,
                "showText": "<font color='#666666'>您的密码过于简单,不修改返回将退出登录状态,是否退出?</font>",
                "textSize": 14
            }, {
                "viewType": 102,
                "x": api.winWidth / 2 - 150 + 159,
                "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                "h": 35,
                "w": 100,
                "clickID": "ok",
                "showText": "是",
                "textSize": 14
            }, {
                "viewType": 102,
                "x": api.winWidth / 2 - 150 + 40,
                "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                "h": 35,
                "w": 100,
                "clickID": "no",
                "showText": "否",
                "textSize": 14
            }]
        };
        moduleDialog.showDialog(param, function (ret, err) {
            if (ret.state == 'success' && ret.clickID) {
                if(ret.clickID=='ok'){
                    //领创  发送广播
                    if ($api.getStorage('deviceModel') == 1) {
                        api.sendEvent({
                            name: 'closeToLispirer'
                        });
                    }
                    $api.setStorage('isLogin', 'false');
                    api.closeToWin({
                        name: 'root'
                    });
                    moduleDialog.dismissDialog();
                }else{
                    moduleDialog.dismissDialog();
                }
            } else {

            }
        });
    }



</script>
</html>
