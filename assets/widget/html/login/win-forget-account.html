<script type="text/javascript">
    apiready = function () {
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;

        api.openFrame({
            name: 'frame-forget-account',
            url: 'frame-forget-account.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false,
            pageParam: {oneWinname: api.winName}
        });

    };
</script>
