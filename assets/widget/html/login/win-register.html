<script>
    apiready = function () {
        var header = document.querySelector('header');
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.openFrame({
            name: 'frame-register',
            url: 'frame-register.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            reload: true,
            bounces: false,
            pageParam: {winname: api.pageParam.winname}
        });


    }
</script>
