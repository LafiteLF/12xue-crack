            margin-top: 0.5rem;

            margin-right: 10px;
        }

        .aui-bar-nav .aui-iconfont {
            line-height: 1.25rem

        .aui-icon-check:before {

<body>
<header class="aui-bar aui-bar-nav aui-bar-primary">
    <!--<a class="aui-pull-left aui-btn">-->

    <!--<div class="aui-12xue-title" tapmode onclick="api.closeWin();">重置密码</div>-->

<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    apiready = function () {
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;

        api.openFrame({
            name: 'frame-reset-pwd',
            url: 'frame-reset-pwd.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false,
            pageParam: {
                uid: api.pageParam.uid,
                account: api.pageParam.account,
                secret: api.pageParam.secret,
                oneWinname: api.pageParam.oneWinname
            }
        });
    };

    //重置密码
    function commitReset() {
        var jsfun = 'resetPwd();';
        api.execScript({
            frameName: 'frame-reset-pwd',
            script: jsfun
        });
    }

</script>
</html>
