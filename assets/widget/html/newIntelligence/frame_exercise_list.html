<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>习题列表</title>    <link rel="stylesheet" type="text/css" href="../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../css/exerciseCss.css"/>    <style>        .zndltop{width:calc(100% - 20px) ; position: relative; height:50px; background: #fff;  margin-bottom: 10px; margin-left: 10px   }        .ex_content{ padding-top: 10px; display: none}        .ex_content dl{width:100%; margin-left: 0; padding: 0px}        .ex_content dl dd{ padding: 0 20px; width: calc(100% - 40px)}        .ex-daipi{ right: 34px}        .ex-xiaoti{ right: 69px}        .ggzt{ height: 50px;vertical-align: top; float: left}        .zndltop span{ float: left; font-size: 1.2rem; display: inline-block; height: 50px; line-height: 50px; margin-left: 5px; margin-right: 17px}        .ggzi{            float: left; display: inline-block; width: calc(100% - 270px); font-size: 12px; height: 50px; line-height: 50px; color:#333 }        .opengxtt{ font-size: 1.2rem;color: #9a9a9a;   height: 50px; line-height: 50px; text-align: right; position: absolute; right: 10px; top: 0px}        .opengxtt img{ height:13px; vertical-align: top; margin-top: 19px; margin-left:6px  }    </style></head><body><div class="ex_content">    <div class="zndltop clearfix" >        <img class="ggzt" :src="data.complet==1?'../../image/awgg.png':data.complet==2?'../../image/azgg.png':'../../image/aygg.png'" >        <span :style="data.complet==1?'color:#ff4537':data.complet==2?'color:#eebe00':'color:#95d273'" v-text="data.complet==1?'未过关':data.complet==2?'暂过关':'已过关'"></span>        <div class="ggzi overflow" v-text="data.complet==1?'目前答对个性推送的'+unanswers+'道题才能过关噢！':data.complet==2?'恭喜您，自动批阅习题全部答对了，请等待老师对主观题的批阅吧！':'恭喜您掌握了本套习题考察的知识点噢！'"></div>        <p :style="data.individuation_complete==0 && data.individuation_uncomplete==0?'display:none':''" onclick="vm.personality()" class="opengxtt">进入个性推送套题<img src="../../image/newhomework/rightjt.png"></p>    </div>    <dl >        <dd v-for="(list,index) in data.material" @click="openWin(index)">            <p v-html="index+1+'.【'+list.txstr+'】'+tgstr(list.tg)"> </p>            <span class="ex-xiaoti" v-if="list.xts>0" v-text="list.tx_code==2?'['+list.xts+'填空]':'['+list.xts+'小题]'"></span>            <span class="ex-daipi" v-if="data.answershow&&list.is_true!=0" >                <img :src="list.is_true==1?'../../image/newhomework/zhengque.png':list.is_true==2?'../../image/newhomework/cuowu.png':list.is_true==3?'../../image/newhomework/bandui.png':''">            </span>            <span class="ex-daipi" v-if="data.answershow&&list.is_true==0" >待批</span>            <span class="ex-daipi" v-if="!data.answershow" style="color: #4bc7c7">已答</span>        </dd>    </dl></div></body><script type="text/javascript" src="../../script/api.js"></script><script type="text/javascript" src="../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../script/vue.js"></script><script type="text/javascript" src="../../script/common.js"></script><script type="text/javascript" src="../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var issaoma;    apiready = function () {        vm.data = api.pageParam.data;//题的详情        issaoma = api.pageParam.issaoma;        vm.GetPracticeIndividExercises(vm.data.id, vm.data.jieid, vm.data.complet,api.pageParam.version);    };    var vm = new Vue({        el: '.ex_content',        data: {            data: '',            unanswers:0,            personalityData:[]        },        updated:function(){        },        methods: {            tgstr: function (tgstr) {                var newtgStr;                newtgStr = tgstr.replace(new RegExp("<br>", "gm"), "");                newtgStr = newtgStr.replace(new RegExp("<br/>", "gm"), "");                newtgStr = newtgStr.replace(new RegExp("<img", "gm"), "<img style=\"height: 20px;\"");                newtgStr = newtgStr.replace(/(^\s*)|(\s*$)/g, "");                newtgStr = newtgStr.replace(new RegExp("&nbsp;", "gm"), "");                newtgStr = newtgStr.replace(/<br [^>]*style=*[^>]*>/gi,'');                // return newtgStr                var allowed='<i><b><u><s><em><strong><sup><sub><img>';                allowed = (((allowed || "") + "").toLowerCase().match(/<[a-z][a-z0-9]*>/g) || []).join('');                var tags = /<\/?([a-z][a-z0-9]*)\b[^>]*>/gi,                    commentsAndPhpTags = /<!--[\s\S]*?-->|<\?(?:php)?[\s\S]*?\?>/gi;                return newtgStr.replace(commentsAndPhpTags, '').replace(tags, function ($0, $1) {                    return allowed.indexOf('<' + $1.toLowerCase() + '>') > -1 ? $0 : '';                });            },            openWin: function (index) {                api.openWin({                    name: 'win_detail_answer',                    url: 'answer/win_detail_answer.html',                    pageParam: {                        hwid: vm.data.id,                        sxcid: vm.data.sxcid,                        dyid: vm.data.dyid,                        index: index,                        version:api.pageParam.version,                        answershow:vm.data.answershow                    }     ,                    slidBackEnabled:  false,                    reload:true                });            },            personality: function () {                if(vm.data.answershow){                    if (vm.show_statistics == 0)  {//未提交过 进入答题界面                        api.openWin({                            name: 'win_detail_gxts',                            url: 'gxts/win_detail_gxts.html',                            pageParam: {                                olddata:vm.data,                                personalityData:vm.personalityData,                                index:0,                                version:api.pageParam.version,                                openType:'1',                                issaoma:issaoma,                                checkClass:api.pageParam.checkClass,                                schoolid:api.pageParam.schoolid,                            } ,                            slidBackEnabled:  false,                            reload:true                        });                    } else {//提交过，进入列表页面                        api.openWin({                            name: 'win_exerciseGxts_list',                            url: 'gxts/win_exerciseGxts_list.html',                            pageParam: {//                            olddata:vm.data,//                            personalityData:vm.personalityData,                                hwid: vm.data.id,                                sxcid: vm.data.sxcid,                                dyid: vm.data.dyid,                                version:api.pageParam.version,                                openType:'0',                                issaoma:issaoma,                                checkClass:api.pageParam.checkClass,                                schoolid:api.pageParam.schoolid,                            } ,                            slidBackEnabled:  false,                            reload:true                        });                    }                }else{                    api.toast(                        {                            msg:'老师发送答案后才可以进入答题哦～',                            duration: 2000,                            location: 'middle'                        }                    )                }            },            GetPracticeIndividExercises: function (hwid, jieid, status,version) {                api.showProgress({                    title: '加载中',                    text: '请稍后...',                    modal: false                });                apiObj.Get(UrlRouter.GetPracticeIndividExercises, {                    values: {                        hwid: hwid,                        jieid: jieid,                        is_complete: status,                        version:version                    }                }, function (ret, err) {                    api.hideProgress();                    if (ret) {                        if (ret.ret == 0) {                            api.hideProgress();                            $api.css($api.dom('.ex_content'),'display:block');                            vm.show_statistics = ret.data.show_statistics;                            vm.unanswers = ret.data.unanswers;                            vm.personalityData= ret.data;                        } else {                            api.toast(                                {                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                }                            )                        }                    } else {                        api.toast(                            {                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            }                        )                    }                })            },        }    });</script></html>
