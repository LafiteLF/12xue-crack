<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>win</title>    <link rel="stylesheet" type="text/css" href="../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../css/winDetailCss.css"/>    <style>        .winTitle {            width: auto;            max-width: calc(100% - 510px);        }        .nydimg {            width: 115px;            margin-top: 15px;            margin-left: 15px        }        .winIcon li {            margin-right: 40px;        }        .qstt {            font-size: 1.2rem;            vertical-align: top;            /* margin-bottom: 22px; */            display: inline-block;            margin-top: 17px;            margin-left: 13px;        }        .chooseclass{width: 23px; height: 23px; position: absolute; right: 10px; top: 13px}        .chooseclass img{ width: 100%}    </style></head><body><div class="content1">    <header class="clearfix">        <div onclick="closeWin()" class="winTitle pull_left" v-text="getTitle(data.title)"></div>        <img class="nydimg"             :src="data.nyd==1?'../../image/new1xing.png':data.nyd==2?'../../image/new2xing.png':'../../image/new3xing.png'">        <span class="qstt">起始套题</span>        <ul class="pull_right clearfix winIcon" :style="issaoma=='zuoye'?'margin-right:35px':''">            <li @click="statistics()" class="buttonFour font4BC7C7 answerStatistics pull_right"><p>答题统计</p></li>        </ul>        <!--<div class="chooseclass" v-if="issaoma=='zuoye'" @click="chooseclass()"><img src="../../image/newhomework/chooseclass.png"></div>-->        <div class="chooseclass"  @click="chooseclass()"><img src="../../image/newhomework/chooseclass.png"></div>    </header></div></body><script type="text/javascript" src="../../script/api.js"></script><script type="text/javascript" src="../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../script/vue.js"></script><script type="text/javascript" src="../../script/common.js"></script><script type="text/javascript" src="../../script/fastclick.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var hwid = '';    var sxcid = '';    var dyid = '';    var issaoma = '';    var vm;    apiready = function () {        hwid = api.pageParam.hwid;        sxcid = api.pageParam.sxcid;        dyid = api.pageParam.dyid;        issaoma = api.pageParam.issaoma;        vue();        api.addEventListener({            name: 'ChooseClass'        }, function (ret, err) {            vm.PostPracticeSetPracticeLog(ret.value.list)        });        api.addEventListener({            name: 'shuaxin-win-Intelligence-exercise-list'        }, function (ret, err) {            vm.GetPracticePracticeinfo(hwid, sxcid, dyid,api.pageParam.version);        });        vm.GetPracticePracticeinfo(hwid, sxcid, dyid,api.pageParam.version);        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            closeWin()        });        vm.issaoma = api.pageParam.issaoma;        vm.bjlist = api.pageParam.bjlist;        vm.smxkid = api.pageParam.smxkid;    };    function vue(){ vm = new Vue({        el: '.content1',        data: {            sxcid: api.pageParam.sxcid,            data: '',            current: 0,            bjlist:'',            bjcheck:'',            smxkid:'',            issaoma:'',            checkClass:{}        },        updated:function(){            $api.css($api.dom('.content1'),'display:block');        },        methods: {            chooseclass:function(){                api.openFrame({                    name: 'ChooseClass',                    url: 'ChooseClass.html',                    bounces: false,                    rect: {                        x: 0,                        y: 0,                        w: 'auto',                        h: $api.getStorage('padHeight')                    },                    pageParam: {                        bjlist:vm.bjlist,                    },                    bgColor: 'rgba(0,0,0,0)'                });            },            GetUserSchoolinfo: function () {                apiObj.Get(UrlRouter.GetUserSchoolinfo, {                    values: {                        uid: $api.getStorage('uid')                    }                }, function (ret, err) {                    api.hideProgress();                    if (ret) {                        if (ret.ret == 0) {                            vm.schoolid = ret.schoolid;                            if( vm.bjcheck==0){//未选择过班级                                if( vm.bjlist.length==1){                                    vm.PostPracticeSetPracticeLog(vm.bjlist[0]);                                }else{                                    api.openFrame({                                        name: 'ChooseClass',                                        url: 'ChooseClass.html',                                        bounces: false,                                        rect: {                                            x: 0,                                            y: 0,                                            w: 'auto',                                            h: $api.getStorage('padHeight')                                        },                                        pageParam: {                                            bjlist:vm.bjlist,                                        },                                        bgColor: 'rgba(0,0,0,0)'                                    });                                }                            }else{//已经选择过班级                                for (var i = 0; i < vm.bjlist.length; i++) {                                    if(vm.bjlist[i].ischeck==1 ){                                        vm.PostPracticeSetPracticeLog(vm.bjlist[i]);                                    }                                }                            }                        } else {                            api.hideProgress();                            api.toast({                                msg: ret.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    } else {                        api.hideProgress();                        api.toast({                            msg: err.msg,                            duration: 2000,                            location: 'bottom'                        });                    }                })            },            PostPracticeSetPracticeLog:function (list) {//修改精品套题提交状态                vm.checkClass=list;                api.showProgress({                    title: '加载中',                    text: '请稍后...',                    modal: true                });                apiObj.Post(UrlRouter.PostPracticeSetPracticeLog, {                    values: {                        tuid:list.uid,                        classid:list.classid,                        xkid:vm.smxkid,                        schoolid:vm.schoolid,                        xd:list.xd,                        volume:vm.sxcid                    }                }, function (ret, err) {                    api.hideProgress();                    if (ret) {                        if (ret.ret == 0) {                            api.hideProgress();                            vm.bjlist = ret.data;                            api.closeFrame({                                name: 'ChooseClass'                            });                        } else {                            api.toast(                                {                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                }                            )                        }                    } else {                        api.toast(                            {                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            }                        )                    }                })            },            GetPracticePracticeinfo: function (hwid, sxcid, dyid,version) {                api.showProgress({                    title: '加载中',                    text: '请稍后...',                    modal: false                });                apiObj.Get(UrlRouter.GetPracticePracticeinfo, {                    values: {                        hwid: hwid,                        sxcid: sxcid,                        dyid: dyid,                        version:version,                        mac_addr:$api.getStorage('macAdress')//                                            mac_addr:'A0:57:E3:60:8A:D6'                    }                }, function (ret, err) {                    api.hideProgress();                    if (ret) {                        if (ret.ret == 0) {                            if (ret.data.paystatus == 1) {                                api.hideProgress();                                vm.data = ret.data;                                var header = document.querySelector('header');                                var headerH = $api.offset(header).h;                                var frameH = padWinHeight - headerH;                                api.setStatusBarStyle({                                    style: 'light'                                });                                api.openFrame({                                    name: 'frame_exercise_list',                                    url: 'frame_exercise_list.html',                                    rect: {                                        x: 0,                                        y: headerH,                                        w: 'auto',                                        h: frameH                                    },                                    pageParam: {                                        data:vm.data,                                        version:version,                                        issaoma:issaoma,                                        checkClass:vm.checkClass,                                        schoolid: vm.schoolid                                    },                                    bounces: false,                                    reload:true                                });                                vm.bjlist = ret.data.bjlist;                                vm.smxkid = ret.data.xkid;                                vm.bjcheck = ret.data.bjcheck;                                // if(api.pageParam.issaoma=='zuoye'){                                    vm.GetUserSchoolinfo();                                // }                            } else {                                var newData = ret.data;                                api.openWin({                                    name: 'win-Intelligence-Unlock',                                    url: 'win-Intelligence-Unlock.html',                                    pageParam: {                                        data: newData,                                        issaoma: issaoma                                    } ,                                    slidBackEnabled:  false                                });                            }                        } else {                            api.toast(                                {                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                }                            )                        }                    } else {                        api.toast(                            {                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            }                        )                    }                })            },            statistics:function () {                api.openWin({                    name: 'win-Intelligence-Statistics-two',                    url: 'win-Intelligence-Statistics-two.html',//                    name: 'win-Intelligence-Statistics',//                    url: 'win-Intelligence-Statistics.html',                    pageParam: {                        data: vm.data,                        xt_type:1                    }   ,                    slidBackEnabled:  false                });            },            getTitle: function (title) {                if (title) {                    if (title.length > 15) {                        return title.substr(0,15)                    } else {                        return title;                    }                }            }        }    });}    function closeWin() {        if(issaoma=='zuoye'){            if ($api.getStorage('scanType') == 'class') { //课堂扫码                api.closeToWin({                    name: 'win-interaction-home-pad'                });            } else {                api.closeToWin({                    name: 'win-stu-main'                });            }        }else{            api.sendEvent({                name: 'shuaxinframe'            });            api.closeToWin({                name: 'win-Intelligence-course-list'            });        }    }</script></html>
