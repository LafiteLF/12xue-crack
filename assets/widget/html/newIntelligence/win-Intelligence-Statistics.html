<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title></title>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <link rel="stylesheet" href="../../css/ThirdCss/style.css"/>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f2f2f2;
            position: relative;
        }

        header {
            text-align: left;
            position: absolute;
            left: 0;
            top: 0
        }

        a {
            display: inline-block;
            float: left;
            max-width: 30%;
        }

        header .aui-icon-left:before {
            position: absolute;
            left: 0;
        }

        .titlea span {
            display: block;
            width: 100%
        }

        .titlea span b {
            color: #333333 !important;
            font-weight: normal;
            font-size: 0.8rem;
            display: inline-block;
            padding-left: 20px;;
            max-width: 100%;
            overflow: hidden;
            /*文本不换行*/
            white-space: nowrap;
            /*文字超出用省略号*/
            text-overflow: ellipsis;
            float: left;
            text-align: left
        }

        .nyd {
            float: left;
            height: 26px;
            padding-top: 2px;
        }

        .nyd img {height: 20px;
        }

        .qstt {
            font-size: 0.6rem;
            color: #666;
            float: left;
            margin-left: 10px;
        }


    </style>
</head>
<body>
<div class="content1">
    <header class="aui-bar aui-bar-nav  aui-clearfix">
        <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="vm.openWin();">
            <span class="aui-iconfont aui-icon-left " ><b v-text="data.title"></b></span>
        </a>
        <div class="nyd">
            <img :src="data.nyd==1?'../../image/new1xing.png':data.nyd==2?'../../image/new2xing.png':'../../image/new3xing.png'">
        </div>
        <div class="qstt" v-text="xt_type==1?'起始套题':'个性推送套题'">起始套题</div>
    </header>
</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../script/vue.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript" src="../../script/fastclick.js"></script>
<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var openType;
    var issaoma;
    apiready = function () {
        vm.data = api.pageParam.data;
        vm.xt_type=api.pageParam.xt_type;
        openType = api.pageParam.openType;
        issaoma = api.pageParam.issaoma;
        if(vm.xt_type==2){
            vm.push_num=api.pageParam.personalityData.push_num;
        }else{
            vm.push_num=0
        }
        vm.GetPracticeBoutiqueHwStatistics(api.pageParam.data,api.pageParam.xt_type);
        // Android按返回键关闭页面时结束自定义页面统计
        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
            vm.openWin();
        });
    };
    var vm = new Vue({
        el: '.content1',
        data: {
            data: '',
            allshuju:'',
            xt_type:0,
            push_num:''
        },
        updated:function(){
            $api.css($api.dom('.content1'),'display:block');
        },
        methods: {
            GetPracticeBoutiqueHwStatistics: function (data,xt_type) {
                api.showProgress({
                    title: '加载中',
                    text: '请稍后...',
                    modal: false
                });
                apiObj.Get(UrlRouter.GetPracticeBoutiqueHwStatistics, {
                    values: {
                        uid: $api.getStorage('uid'),
                        kcid:data.id,
                        jieid:data.jieid,
                        xt_type:xt_type,
                        version:data.version,
                        push_num:vm.push_num,
                        schoolid:$api.getStorage('schoolid')
                    }
                }, function (ret, err) {
                    api.hideProgress();
                    if (ret) {
                        if (ret.ret == 0) {
                            api.hideProgress();
                            vm.allshuju = ret.data;
                            var header = document.querySelector('header');
                            var headerH = $api.offset(header).h;
                            var frameH = padWinHeight - headerH;
                            api.openFrame({
                                name: 'frame-Intelligence-Statistics',
                                url: 'frame-Intelligence-Statistics.html',
                                rect: {
                                    x: 0,
                                    y: headerH,
                                    w: 'auto',
                                    h: frameH
                                },
                                pageParam: {
                                    data:vm.data,
                                    xt_type:vm.xt_type,
                                    allshuju:vm.allshuju,
                                    personalityData:api.pageParam.personalityData,
                                    version:data.version,
                                    openType:openType,
                                    issaoma:issaoma,
                                    bjlist: api.pageParam.bjlist,
                                    bjcheck :api.pageParam.bjcheck,
                                    smxkid : api.pageParam.smxkid,
                                    checkClass:api.pageParam.checkClass,
                                    schoolid:api.pageParam.schoolid,
                                    answershow:ret.data.answershow
                                },
                                bounces: false,
                                reload: true  ,
                                slidBackEnabled:  false
                            });

                        } else {
                            api.toast(
                                    {
                                        msg: ret.msg,
                                        duration: 2000,
                                        location: 'bottom'
                                    }
                            )
                        }
                    } else {
                        api.toast(
                                {
                                    msg: err.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                }
                        )
                    }

                })
            },
            openWin:function () {
                if(vm.xt_type==2) {//个性推送套题
                    if(openType == '0'){//顺序进来
                        api.sendEvent({
                            name: 'shuaxin-personality-exercise-list'
                        });
                        api.closeToWin({
                            name: 'win_exerciseGxts_list',
                        });
                    } else if(openType == '1'){//直接跳过个性套题统计页面
                        api.openWin({
                            name: 'win_exerciseGxts_list',
                            url: 'gxts/win_exerciseGxts_list.html',
                            pageParam: {
                                hwid :api.pageParam.data.id,
                                sxcid:api.pageParam.data.sxcid,
                                dyid:api.pageParam.data.dyid,
//                    olddata:vm.olddata,
//                    personalityData:vm.data,
                                issaoma:issaoma,
                                version:vm.data.version,
                                openType:openType,
                                bjlist: api.pageParam.bjlist,
                                bjcheck :api.pageParam.bjcheck,
                                smxkid : api.pageParam.smxkid,
                            } ,
                            slidBackEnabled:  false,
                            reload:true
                        });
                    }else if(openType == '2'){//直接答题进入
                        api.openWin({
                            name: 'win_exerciseGxts_list',
                            url: 'gxts/win_exerciseGxts_list.html',
                            pageParam: {
                                hwid :api.pageParam.data.id,
                                sxcid:api.pageParam.data.sxcid,
                                dyid:api.pageParam.data.dyid,
//                    olddata:vm.olddata,
//                    personalityData:vm.data,
                                version:vm.data.version,
                                openType:openType,
                                issaoma:issaoma,
                                bjlist: api.pageParam.bjlist,
                                bjcheck :api.pageParam.bjcheck,
                                smxkid : api.pageParam.smxkid,

                            } ,
                            slidBackEnabled:  false,
                            reload:true
                        });
                        // api.sendEvent({
                        //     name: 'shuaxin-win-Intelligence-exercise-list'
                        // });
                        // api.openWin({
                        //     name: 'win-Intelligence-exercise-list',
                        //     url: 'win-Intelligence-exercise-list.html',
                        //     pageParam: {
                        //         hwid :api.pageParam.data.id,
                        //         sxcid:api.pageParam.data.sxcid,
                        //         dyid:api.pageParam.data.dyid,
                        //         issaoma:issaoma,
                        //         status:vm.allshuju.status,
                        //         version:vm.data.version
                        //     }  ,
                        //     slidBackEnabled:  false
                        // });
                    }
                }else if(vm.xt_type==1){
                    if(issaoma=='zuoye'){//扫码做作业进来
                        if(vm.allshuju.status==1){//未过关返回起始套题列表页面
                            api.openWin({
                                name: 'win_exercise_list',
                                url: 'win_exercise_list.html',
                                pageParam: {
                                    hwid :api.pageParam.data.id,
                                    sxcid:api.pageParam.data.sxcid,
                                    dyid:api.pageParam.data.dyid,
                                    issaoma:issaoma,
                                    status:vm.allshuju.status,
                                    version:vm.data.version,
                                    bjlist: api.pageParam.bjlist,
                                    bjcheck :api.pageParam.bjcheck,
                                    smxkid : api.pageParam.smxkid,
                                }  ,
                                slidBackEnabled:  false,
                                reload:true
                            });
                        }else{//过关返回首页
                            if ($api.getStorage('scanType') == 'class') { //课堂扫码
                                api.closeToWin({
                                    name: 'win-interaction-home-pad'
                                });
                            } else {
                                api.closeToWin({
                                    name: 'win-stu-main'
                                });
                            }

                        }

                    }else{//不是扫码进入
                        api.sendEvent({
                            name: 'shuaxin-win-Intelligence-exercise-list'
                        });
                        api.openWin({
                            name: 'win_exercise_list',
                            url: 'win_exercise_list.html',
                            pageParam: {
                                hwid :api.pageParam.data.id,
                                sxcid:api.pageParam.data.sxcid,
                                dyid:api.pageParam.data.dyid,
                                issaoma:false,
                                status:vm.allshuju.status,
                                version:vm.data.version,
                                bjlist: api.pageParam.bjlist,
                                bjcheck :api.pageParam.bjcheck,
                                smxkid : api.pageParam.smxkid,
                            }  ,
                            slidBackEnabled:  false,
                            reload:true
                        });
                    }

                }
            }
        }

    });
    function closeWin() {
        api.closeWin();
    }
</script>
