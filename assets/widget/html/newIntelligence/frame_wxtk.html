<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>完形填空</title>    <link rel="stylesheet" type="text/css" href="../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../css/frameDetail.css"/>    <style>        .tkt_content{ display: none}    </style></head><body><div class="tkt_content" id="tkt_content">    <div class="tkt_top">        <ul>            <li class="tixing clearfix">                <div class="tihao" v-text="(index+1)+'.'"></div>                <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>            </li>        </ul>    </div>    <div class="tkt_left" id="left" style="width: calc(60% - 53px);">        <div class="tg_content font666" v-html="material.tg"></div>    </div>    <div class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">        <div class="tkt_right_content">            <div class="huakuai" id="huakuai"></div>            <span class="wxtk_xiaoti" v-text="'共'+xiaotinum+'小题'"></span>            <ul class="wxtk_content">                <li v-for="(list,index) in material.children">                    <!--答题部分开始-->                    <div  class="wxtk_tg"v-html="'('+(index+1)+')<br>'+list.tg"></div>                    <ul v-if="showdati"  class="wxtk_option">                        <li  v-for="item in list.options" :id="item.id" :index="index" :class="answer[index].da[0]==item.id?'xxactive':''" tapmode onclick="vm.xxselectClicked(this)" v-text="item.xx" ></li>                    </ul>                    <div v-if="showdati" class="wxtkbhz font4BC7C7" :id="index" tapmode onclick="vm.checded(this)">                        <span :class="answer[index].is_unable==1?'inputCheckactive':''"></span>不会做                    </div>                    <!--答题部分结束-->                </li>            </ul>            <!--答案部分结束-->        </div>    </div></div></body><script type="text/javascript" src="../../script/api.js"></script><script type="text/javascript" src="../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../script/vue.js"></script><script type="text/javascript" src="../../script/common.js"></script><script type="text/javascript" src="../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var queryHomewokAnswer;    apiready = function () {        api.showProgress({            title: '加载中',            text: '请稍后...',            modal: false        });        vue();            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {                queryHomewokAnswer = {};            } else {                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));            }                for (var i = 0; i < vm.material.children.length; i++) {//给初始化的小题加个默认空答案 防止报错                    var kongcontent = {                        'topid':vm.material.id,                        'id':vm.material.children[i].id,                        'da':[],                        'is_unable': 0,                        'daoptions':vm.material.children[i].daoptions,                        'sort':vm.material.children[i].sort,                    };                    Vue.set(vm.answer, i, kongcontent);                }                if (queryHomewokAnswer.hasOwnProperty(vm.material.zyid)) {//缓存的答案                    vm.answer = queryHomewokAnswer[vm.material.zyid].children;                }    };  function vue(){      vm = new Vue({          el: '.tkt_content',          data: {              showdati:false,              index: api.pageParam.index,//当前frame的索引              material: api.pageParam.material,//当前习题资料              answer: [],//答案数组              complet: api.pageParam.complet,//答题状态              is_unable: 0,//是否会做 0会做 1不会做              xiaotinum:api.pageParam.material.children.length,              isPlaying: false,//老师留言是否播放中          },          created: function () {              this.initDatePicker();          },          updated: function () {              for (var i = 0; i < $api.domAll('img').length; i++) {                  if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                      $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                  }              }          },          methods: {              initDatePicker:function(){                  this.$nextTick(function () {                      api.hideProgress();                      $('.tkt_content').show();                      vm.showdati=true;                      vm.huakuai();                  })              },              huakuai:function () {                  var tktcontent = document.getElementById('tkt_content'); //长线条                  var right = document.getElementById('right'); //小方块                  var left = document.getElementById('left');                  var huakuai = document.getElementById('huakuai');                  var ifBool = false; //判断鼠标是否按下//鼠标按下方块                  huakuai.addEventListener("touchstart", function (e) {                      e.stopPropagation();                      ifBool = true;                  });//拖动                  window.addEventListener("touchmove", function (e) {                      if (ifBool) {                          var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x                          var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标                          var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值                          if (minDiv_left >= tktcontent.offsetWidth - 43) {                              minDiv_left = tktcontent.offsetWidth - 43;                          }//设置拖动后小方块的left值                          var rightwidth;                          var leftwidth;                          if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {                              rightwidth = $(window).width() * 0.7 + 37;                              leftwidth = $(window).width() * 0.3 - 53;                          } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {                              rightwidth = $(window).width() * 0.4 + 37;                              leftwidth = $(window).width() * 0.6 - 53;                          } else {                              rightwidth = $(window).width() - minDiv_left;                              leftwidth = minDiv_left -14                          }                          right.style.width = rightwidth + "px";                          left.style.width = leftwidth + "px";                      }                  });//鼠标松开                  window.addEventListener("touchend", function (e) {                      ifBool = false;                  });//获取元素的绝对位置                  function getPosition(node) {                      var left = node.offsetLeft; //获取元素相对于其父元素的left值var left                      var top = node.offsetTop;                      current = node.offsetParent; // 取得元素的offsetParent                      // 一直循环直到根元素                      while (current != null) {                          left += current.offsetLeft;                          top += current.offsetTop;                          current = current.offsetParent;                      }                      return {                          "left": left,                          "top": top                      };                  }              },              yuyin: function (audioItem, index) {                  if (audioItem.type == 1) {                      if (vm.isPlaying) {                          api.stopPlay();                          $('.img1').show();                          $('.img2').hide();                      } else {                          $('.img1').show();                          $('.img2').hide();                          var audioName = audioItem.savename;                          var path = "/audio/" + audioName + ".amr";                          api.download({                              url: audioItem.serverpath + "/" + audioItem.savename,                              savePath: 'fs:/' + path,                              report: false,                              cache: false,                              allowResume: false                          }, function (ret, err) {                              if (ret && ret.state == 1) {                                  // 下载成功  ret.savePath                                  isDownloading = false;                                  api.startPlay({                                      path: api.fsDir + path                                  }, function (ret, err) {                                      if (ret) {                                          vm.isPlaying = false;                                          $('.img1').show();                                          $('.img2').hide();                                      }                                  });                                  $('.yuyin3').eq(index).find('.img1').hide();                                  $('.yuyin3').eq(index).find('.img2').show();                                  $('.yuyin3').eq(index).siblings().find('.img1').show();                                  $('.yuyin3').eq(index).siblings().find('.img2').hide();                              }                          });                      }                      vm.isPlaying = !vm.isPlaying;                  }              },              xxselectClicked: function (context) {//选择判断题选项点击事件                  var xtindex=$(context).attr('index');                  vm.answer[xtindex].da =[$(context).attr('id')];                  vm.answer[xtindex].is_unable = 0;//不会做                  vm.saveAnswer(vm.answer);              },              checded: function (context) {//复选框不会做点击事件                  var xtindex= $(context).attr('id');                  vm.answer[xtindex].da = [];                  vm.answer[xtindex].is_unable = 1;//不会做                  vm.saveAnswer(vm.answer);              },              saveAnswer:function (da) {                  var eachxtgroup = {                      'is_auto': 1,                      'tx': vm.material.tx,                      'xtid': vm.material.zyid,                      'children': da,                      'tx_code':vm.material.tx_code,                  };                  api.sendEvent({                      name: 'saveAnswerHuancun',                      extra: {                          eachxtgroup: eachxtgroup,                          zyid: vm.material.zyid,                      }                  });              }          }      });  }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if(src.substring(src.length-3)=='gif'){}else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });}    }</script></html>
