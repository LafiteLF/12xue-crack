<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <meta name="format-detection" content="telephone=no"/>    <title>选择班级</title>    <link rel="stylesheet" href="../../css/publicCss.css">    <style>        html, body {            background: rgba(0, 0, 0, 0.3);            width: 100%;            height: 100%;            position: relative;        }        .content {            position: absolute;            left:calc(50% - 150px);            width: 300px;            top: calc(50% - 115px);z-index: 10;        }        .main {            width: 300px;            margin: 0 auto;            background: #fff;            border-radius: 6px; overflow: hidden;        }        h2 {            font-size: 1.4rem;            text-align: center;            height: 60px;            line-height: 60px;            font-weight: normal;            color: #9a9a9a;        }        .choose {            margin: 0 auto;            height: auto;            max-height: 110px;            overflow-y: auto;            margin-bottom: 10px;        }        .choose li {            height: 42px;            border-top: 1px solid #e5e5e9;            color: #303030;            text-align: center;            line-height: 42px;            font-size: 1.4rem;            padding: 0 30px;        }        .choose li:active{            color: #4bc7c7;        }        .tishi {            height: 28px;            font-size: 1.2rem;            text-align: center;            background: #edfdfd;            color:#4bc7c7 ;            line-height: 28px;        }        .noclass {            font-size: 1.4rem;            color: #666666;            line-height: 26px;            text-align: center;        }        .ok {            height: 35px;            width: 100px;            background: #4bc7c7;            color: #fff;            font-size: 1.4rem;            text-align: center;            line-height: 35px;            margin: 0 auto;            border-radius: 3px;            margin-top: 15px;        }        [v-cloak] {            display: none        }    </style><body><div  onclick="closewin()" style="width: 100% ; height: 100%;"></div><div class="content" v-cloak >    <img onclick="closewin3()" src="../../image/newhomework/close2.png" style="position: absolute; right:-12px ;top: -15px;width: 35px">    <div class="main">        <h2>请选择绑定该学科老师的班级</h2>        <!--<ul class="choose" >-->            <!--<li   class="overflow"    >请选择绑定该学科老师的班级请选择绑定该学科老师的班级</li>-->            <!--<li   class="overflow"    >请选择绑定该学科老师的班级请选择绑定该学科老师的班级</li>-->            <!--<li   class="overflow"    >请选择绑定该学科老师的班级请选择绑定该学科老师的班级</li>-->            <!--<li   class="overflow"    >请选择绑定该学科老师的班级请选择绑定该学科老师的班级</li>-->            <!--<li   class="overflow"    >请选择绑定该学科老师的班级请选择绑定该学科老师的班级</li>-->            <!--<li   class="overflow"    >请选择绑定该学科老师的班级请选择绑定该学科老师的班级</li>-->        <!--</ul>-->        <!--<p   class="tishi overflow">请正确选择班级，否则可能会导致部分数据统计不准确</p>-->        <!--<div   class="noclass">暂无该学科相关班级，<br> 请联系该学科老师将你加入其班级</div>-->        <!--<div   class="ok" onclick="closewin()">好的</div>-->        <!--<div style="height:20px "></div>-->        <ul class="choose" v-if="bjlist.length>0">            <li v-for="list in bjlist" class="overflow" :style="list.ischeck==1?'color:#4bc7c7':''" v-text="list.classname+'('+list.realname+')'" @click="choose(list)"></li>        </ul>        <p v-if="bjlist.length>0" class="tishi overflow">请正确选择班级，否则可能会导致部分数据统计不准确</p>        <div v-if="bjlist.length==0" class="noclass">暂无该学科相关班级，<br> 请联系该学科老师将你加入其班级</div>        <div v-if="bjlist.length==0" class="ok" onclick="closewin2()">好的</div>        <div  v-if="bjlist.length==0"  style="height:20px "></div>    </div></div></body><script type="text/javascript" src="../../script/api.js"></script><script type="text/javascript" src="../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../script/vue.js"></script><script type="text/javascript" src="../../script/common.js"></script><script type="text/javascript" src="../../script/fastclick.js"></script><script type="text/javascript">    var vm;    apiready = function () {        vue();    };    function vue() {        vm = new Vue({            el: '.content',            data: {                bjlist: api.pageParam.bjlist,            },            methods: {                choose: function (context) {                    api.sendEvent({                        name: 'ChooseClass',                        extra: {                            list: context                        }                    });                }            },        })    }    function  closewin() {        for(var i=0;i<vm.bjlist.length;i++){            if(vm.bjlist[i].ischeck==1){                api.closeFrame({                    name: 'ChooseClass'                });            }        }    }    function closewin3() {        api.closeFrame({            name: 'ChooseClass'        });    }    function  closewin2() {                api.closeFrame({                    name: 'ChooseClass'                });    }</script></html>
