<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>win</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width: auto;            max-width: calc(100% - 470px);        }        .nydimg {            width: 115px;            margin-top: 15px;            margin-left: 15px        }        .qstt {            font-size: 1.2rem;            vertical-align: top;            /* margin-bottom: 22px; */            display: inline-block;            margin-top: 17px;            margin-left: 13px;        }    </style></head><body><div class="content1">    <header class="clearfix">        <div onclick="closeWin()" class="winTitle pull_left" v-text="olddata.title"></div>        <img class="nydimg"             :src="olddata.nyd==1?'../../../image/new1xing.png':olddata.nyd==2?'../../../image/new2xing.png':'../../../image/new3xing.png'">        <span class="qstt">个性推送套题</span>    </header></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var openType;    var issaoma;    apiready = function () {        openType = api.pageParam.openType;        issaoma = api.pageParam.issaoma;        vm.GetPracticePracticeinfo(api.pageParam.hwid, api.pageParam.sxcid, api.pageParam.dyid,api.pageParam.version);        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            closeWin()        });        api.addEventListener({            name: 'shuaxin-personality-exercise-list'        }, function (ret, err) {            vm.GetPracticePracticeinfo(api.pageParam.hwid, api.pageParam.sxcid, api.pageParam.dyid,api.pageParam.version);        });    };    var vm = new Vue({        el: '.content1',        data: {            olddata: ''        },        methods: {            GetPracticePracticeinfo: function (hwid, sxcid, dyid,version) {                api.showProgress({                    title: '加载中',                    text: '请稍后...',                    modal: false                });                apiObj.Get(UrlRouter.GetPracticePracticeinfo, {                    values: {                        hwid: hwid,                        sxcid: sxcid,                        dyid: dyid,                        version:version,                        mac_addr:$api.getStorage('macAdress')//                                            mac_addr:'A0:57:E3:60:8A:D6'                    }                }, function (ret, err) {                    api.hideProgress();                    if (ret) {                        if (ret.ret == 0) {                            api.hideProgress();                            vm.olddata = ret.data;                            vm.GetPracticeIndividExercises(hwid, ret.data.jieid, ret.data.complet,version);                        } else {                            api.toast(                                {                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                }                            );                            setTimeout(api.closeToWin({name: 'win-stu-main'}), 2000)                        }                    } else {                        api.toast(                            {                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            }                        )                    }                })            },            GetPracticeIndividExercises: function (hwid, jieid, status,version) {                api.showProgress({                    title: '加载中',                    text: '请稍后...',                    modal: false                });                apiObj.Get(UrlRouter.GetPracticeIndividExercises, {                    values: {                        hwid: hwid,                        jieid: jieid,                        is_complete: status,                        version:version                    }                }, function (ret, err) {                    api.hideProgress();                    if (ret) {                        if (ret.ret == 0) {                            api.hideProgress();                            vm.personalityData= ret.data;                            var header = document.querySelector('header');                            var headerH = $api.offset(header).h;                            var frameH = padWinHeight - headerH;                            api.setStatusBarStyle({                                style: 'light'                            });                            api.openFrame({                                name: 'frame_exerciseGxts_list',                                url: 'frame_exerciseGxts_list.html',                                rect: {                                    x: 0,                                    y: headerH,                                    w: 'auto',                                    h: frameH                                },                                pageParam: {                                    olddata:vm.olddata,                                    data: ret.data,                                    version:version,                                    openType:openType,                                    issaoma:issaoma,                                    checkClass:api.pageParam.checkClass,                                    schoolid:api.pageParam.schoolid,                                },                                bounces: false,                                reload:true                            });                        } else {                            api.toast(                                {                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                }                            )                        }                    } else {                        api.toast(                            {                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            }                        )                    }                })            },            getTitle: function (title) {                if (title) {                    if (title.length > 15) {                        return title.substr(0,15)                    } else {                        return title;                    }                }            }        }    });    function closeWin() {        if(openType == '0'){            api.sendEvent({                name: 'shuaxin-win-Intelligence-exercise-list'            });            api.closeWin();        }else if(openType == '1' ){            api.sendEvent({                name: 'shuaxin-win-Intelligence-exercise-list'            });            api.closeToWin({                name: 'win_exercise_list'            });        }else if(openType == '2'){            api.openWin({                name: 'win_exercise_list',                url: '../win_exercise_list.html',                pageParam: {                    hwid: vm.olddata.id,                    sxcid: '',                    dyid: '',                    issaoma: issaoma,                    status: vm.olddata.status,                    version:vm.olddata.version,                    bjlist:vm.olddata.bjlist,                    smxkid:vm.olddata.xkid                }  ,                slidBackEnabled:  false            });        }    }</script></html>
