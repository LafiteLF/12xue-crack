<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport"
        content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />
    <title>问答题，朗读题</title>
    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css" />
    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css" />
    <link rel="stylesheet" type="text/css" href="../../../css/wx-audio.css" />
    <style>
        .wdt_content {
            display: none
        }
    </style>
</head>

<body>
    <div class="wdt_content">
        <img v-if=" material.is_complete==1&& material.res_type!=2 " class="aibtn noImgClick"
            src="../../../image/newhomework/aiBtn.png" @click="PostAIBtn()">
        <img v-if=" material.is_complete==1&& material.res_type!=2 " class="jrctb noImgClick"
            :src="isctb!=1?'../../../image/newhomework/join.png':'../../../image/newhomework/out.png'"
            @click="PostExercisesTriggerWrong()">
        <div class="content">
            <!--题干部分开始-->
            <div class="stem">
                <ul>
                    <li class="tixing clearfix">
                        <div class="tihao" v-text="(index+1)+'.'"></div>
                        <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>
                    </li>
                    <li v-if="material.is_complete==1" class="zsd" @click="alertzsd(material.zsdmc)">
                        <span>难易度：</span><img class="noImgClick"
                            :src="material.nyd==1?'../../../image/newhomework/1xing.png':material.nyd==2?'../../../image/newhomework/2xing.png':material.nyd==3?'../../../image/newhomework/3xing.png':''"><span>
                            知识点：</span>{{material.zsdmc}}
                    </li>
                </ul>
                <div class="tg_content font666" v-html="material.tg"></div>
                <div class="ldcl" v-if="material.tx=='ldt' && material.dastr!=''">
                    <h3>朗读材料：</h3>
                    <p v-html="material.dastr==''?'无':material.dastr"></p>
                </div>
            </div>
            <!--题干部分结束-->
            <!--答案部分开始-->
            <dl v-if="material.is_complete==1" class="wenda_answer bgFFF">
                <div class="defen">
                    <img class="noImgClick" v-if="material.is_true!=0"
                        :src="material.is_true==1?' ../../../image/newhomework/zhengque.png':material.is_true==2?'../../../image/newhomework/cuowu.png':material.is_true==3?'../../../image/newhomework/bandui.png':''">
                    <span
                        :style="material.is_true==1?'color: #4bc7c7':material.is_true==2?'color: #df7605':material.is_true==3?'color: #ffcd06':''"
                        v-text="material.is_true==1?'正确':material.is_true==2?'错误':material.is_true==3?'正确率'+material.accuracy+'%':''"></span>
                    <span v-if="material.is_true==0" style="color: #ff778c">待批</span>
                </div>
                <dd>
                    <h2 class="wendah2">【我的答案】</h2>
                    <div v-if="material.tx=='ldt' && material.is_unable==0" class="lddayinpin clearfix">
                        <img class="scyp2 noImgClick" src="../../../image/startPlay.png" onclick="vm.ZSrecordRun(this);"
                            :playStatus='0' alt="">
                        <div class="lddaRange"><input class="myRange" type="range" min="0" value="0"
                                :max='material.xsdaobj[0].filetime'></div>
                        <p class="ypTimeP" v-text="getTimes(material.xsdaobj[0].filetime)">00:00</p>
                    </div>
                    <ul class="clearfix wendawdda">
                        <li v-for="list in material.xsdaobj"
                            v-if="material.tx!='ldt'||(material.tx=='ldt' && list.is_unable==1 )"
                            :class="list.is_unable==1?'wendazi':(list.is_txt==1 && list.is_unable==0 && !list.image)?'wendazi':list.is_txt==2?'wendayuyin imgborder':list.is_txt==3?'wendashipin imgborder':'wendatu imgborder'">
                            <p v-if="list.is_unable==1 ||(list.is_txt==1 && list.is_unable==0 && !list.image)"
                                v-html="list.is_unable==1?'不会做':list.is_txt==1 && list.is_unable==0?list.descript:''">
                            </p>
                            <p v-if="list.is_txt==0 && list.is_unable==0" v-html=" list.thumbnail"></p>
                            <p v-if="list.is_txt==2 || list.is_txt==3" :url="list.serverpath+list.preview_link" tapmode
                                onclick="vm.videoZYPlay(this)" :filetime="list.filetime">
                                <img class="noImgClick" src="../../../image/bof_03.png">
                            </p>
                        </li>
                    </ul>
                </dd>
                <dd v-if="material.audio && material.audio.length>0">
                    <h2 class="wendah2">【老师留言】</h2>
                    <ul class="clearfix">
                        <li :class="ylist.type==1?'teacher_liuyan yuyin3':'teacher_liuyan_zi yuyin3'"
                            v-for="(ylist , index) in material.audio" @click="yuyin(ylist,index)">
                            <img v-if="ylist.type==1" class="audio-img img1 noImgClick"
                                src="../../../image/newhomework/yuyin1.png" />
                            <img v-if="ylist.type==1" class="audio-img img2 noImgClick"
                                src="../../../image/newhomework/yuyin2.gif" />
                            <span v-if="ylist.type==1" v-text="ylist.filetime+'″'"></span>
                            <p v-if="ylist.type==2" v-text="ylist.descript"></p>
                        </li>
                    </ul>
                </dd>
                <dd v-if="material.tx!='ldt'" class="needpic">
                    <h2 class="wendah2" v-text="'【'+material.tx_tip+'】'">
                    </h2>
                    <ul>
                        <li class="wendazi" v-html="material.dastr==''?'无':material.dastr">
                        </li>
                    </ul>
                </dd>
                <dd class="needpic">
                    <h2 class="wendah2">【答案解析】</h2>
                    <ul>
                        <li class="wendazi" v-html="material.dajx==''?'无':material.dajx">
                        </li>
                    </ul>
                </dd>
                <div class="jrctbkong"></div>
            </dl>
            <!--答案部分结束-->
        </div>
        <!--答题部分开始-->
        <div v-if=" showdati && material.is_complete==0" class="da_content">
            <textarea v-if='is_txt==1 && is_unable==0 && is_show_textarea==1 ' class="wdtzi" placeholder="请输入要填写的答案"
                cols="30" rows="10" maxlength="500" :value="answer.length>0?answer[0].descript:''"
                onchange="vm.shoudongpiyue(this);"></textarea>
            <div class="lddayinpin clearfix" v-if="material.tx=='ldt' && answer.length>0">
                <img class="scyp2 noImgClick" src="../../../image/startPlay.png" onclick="vm.recordRun(this);"
                    :playStatus='0' alt="">
                <div class="lddaRange"> <input class="myRange" type="range" min="0" value="0" :max='answer[0].filetime'>
                </div>
                <p class="ypTimeP" v-text="getTimes(answer[0].filetime)">00:00</p>
                <div class="chacha ldtDelete" tapmode onclick="vm.deletePic(this);" id='0'>
                    <img class="noImgClick" src="../../../image/newhomework/cha.png">
                </div>
            </div>
            <dl class="clearfix " v-if="is_txt!=1 && answer.length>0 && material.tx!='ldt'">
                <dd v-for="(list,index) in answer" :class="list.is_txt==0?'wendatu imgborder':'wendatu imgborder'">
                    <img class="noImgClick" :id="index" onclick="showImage(this)" v-if="list.is_txt==0"
                        :src="list.serverpath+list.savename+'?imageView2/2/w/300/h/300'"
                        :fdsrc="list.serverpath+list.savename">
                    <div :id="'luyin'+index" style="width: 100%; height: 100%">
                    </div>
                    <div :id="index" tapmode onclick="vm.deletePic(this);" class="chacha">
                        <img class="noImgClick" src="../../../image/newhomework/cha.png">
                    </div>
                </dd>
            </dl>
            <div
                :class="is_txt!=1 && answer.length>0?'wdAnswerTypeActive':is_txt==1 && is_unable==0 && is_show_textarea==1?'wdAnswerTypeActive':'wdAnswerType'">
                <ul>
                    <li class="openAnserType" tapmode onclick="vm.choose();"></li>
                    <li class="bhz font4BC7C7" tapmode onclick="vm.checded(this)">
                        <span :class="is_unable==1?'inputCheckactive':''"></span>不会做
                    </li>
                </ul>
            </div>
        </div>
        <!--答题部分结束-->

    </div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript" src="../../../script/wx-audio.js"></script>
<script type="text/javascript" src="../../../script/ThridJS/qiniu.min.js"></script>
<script type="text/javascript" src="../../../script/12xueUpload.js"></script>
<script type="text/javascript" src="../../../script/html2canvas.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    var uiMediaScanner;//打开相册需要的变量
    var compressListener = {//打开相册需要的变量
        allCount: 0,
        successCount: 0
    };
    var queryHomewokAnswer;
    var moduleDialog = null;//弹窗模块bhzparam
    var audioStreamer;
    var timer = null;
    var allTimes = 0;
    var sec;
    var downloadPath;
    var moduleImageScale = null;//图片放大旋转删除
    apiready = function () {
        moduleDialog = api.require('moduleDialog');
        moduleImageScale = api.require('moduleImageScale');
        moduleImageScale.dismissImage();//关模块
        dismissDialog();//关模块
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        vue();
        if (vm.material.is_complete == 0) {
            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {
                queryHomewokAnswer = {};
            } else {
                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));
            }
            if (queryHomewokAnswer.hasOwnProperty(vm.material.id)) {//缓存的答案
                vm.answer = queryHomewokAnswer[vm.material.id].da;
                vm.is_unable = queryHomewokAnswer[vm.material.id].is_unable;
                vm.is_txt = parseInt(queryHomewokAnswer[vm.material.id].is_txt);
            }
            if (vm.is_txt == 1 && vm.answer.length > 0) {
                vm.is_show_textarea = 1;
            } else {
                vm.is_show_textarea = 0;
            }
        }
        api.addEventListener({// 裁剪图片保存
            name: 'cutPicture' + api.frameName
        }, function (ret, err) {
            var src = ret.value.src;
            vm.compressImage(src);
            api.closeFrame({
                name: 'frame_cutPicture'
            });
        });
        api.addEventListener({// 滑动暂停音频
            name: 'yinpinCLose'
        }, function (ret, err) {
            if ($api.domAll('.scyp2').length >= 1) {
                if ($('.scyp2').attr('playStatus') == 1) {
                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');
                }
                audioStreamer = api.require('audioStreamer');
                clearInterval(timer);
                audioStreamer.pause();
                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                $api.dom('.myRange').disabled = true;
            }
            api.stopPlay();
            $('.img1').show();
            $('.img2').hide();
        });
        api.addEventListener({// 音频接收
            name: 'giveRecoreDataGxts'
        }, function (ret, err) {
            if (ret.value.isfrom == 'jc') {
                if (ret.value.index == vm.index) {
                    vm.is_txt = 0;
                    vm.answer = [];
                    vm.giveData(ret.value.savename, ret.value.filetime, ret.value.Local_address);
                }
                api.closeWin({
                    name: 'win_reading'
                });
            }
        });
        api.addEventListener({// 画板
            name: 'DrawingBoardImgGxts'
        }, function (ret, err) {
            if (ret.value.name == api.frameName && ret.value.type == 'huaban') {
                var imgsrc = ret.value.imgsrc;
                if (vm.is_txt == 1) {
                    vm.is_txt = 0;
                    vm.answer = [];
                } else {
                    vm.is_txt = 0;
                }
                vm.is_unable = 0;
                vm.qiniuUpfile(imgsrc);
                api.closeWin({
                    name: 'Drawing_board'
                });
            }
        });
    };
    function vue() {
        vm = new Vue({
            el: '.wdt_content',
            data: {
                showdati: false,
                index: api.pageParam.index,//当前frame的索引
                material: api.pageParam.material,//当前习题资料
                answer: [],//答案数组
                complet: api.pageParam.complet,//答题状态
                is_unable: 0,//是否会做 0会做 1不会做
                isPlaying: false,//老师留言是否播放中
                is_txt: 0,//是否是文字 1是文字 0不是文字
                is_show_textarea: 0,//是否显示输入框（刚打开页面的时候）
                isctb: api.pageParam.material.is_ctb,
                bhzparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 75,
                        "h": 150,
                        "w": 300
                    }, {
                        "viewType": 101,
                        "x": api.winWidth / 2 - 150 + 30,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,
                        "h": 48,
                        "w": 240,
                        "lineSpacting": 1.3,
                        "showText": "<font color='#666666'>选择不会做，会将您已经填写的答案清空，是否确定不会做？</font>",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 159,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "ok",
                        "showText": "确定",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 40,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "no",
                        "showText": "取消",
                        "textSize": 14
                    }]
                },
                paizhaoparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 89,
                        "h": 178,
                        "w": 300
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 89 + 41,
                        "h": 38,
                        "w": 150,
                        "clickID": "paizhao",
                        "showText": "拍照",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 89 + 41 + 58,
                        "h": 38,
                        "w": 150,
                        "clickID": "xiangce",
                        "showText": "从相册中选择",
                        "textSize": 14
                    }]
                },
                anniuparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 118,
                        "h": 236,
                        "w": 300
                    },

                    {
                        "viewType": 104,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 118 + 40,
                        "h": 38,
                        "w": 150,
                        "clickID": "img",
                        "img": 'widget://image/newhomework/os_06.png',
                        "img_down": 'widget://image/newhomework/20_06.png'

                    },
                    {
                        "viewType": 104,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 118 + 100,
                        "h": 38,
                        "w": 150,
                        "clickID": "input",
                        "img": 'widget://image/newhomework/os_03.png',
                        "img_down": 'widget://image/newhomework/20_03.png'

                    },
                    {
                        "viewType": 104,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 118 + 160,
                        "h": 38,
                        "w": 150,
                        "clickID": "shouxie",
                        "img": 'widget://image/newhomework/os_18.png',
                        "img_down": 'widget://image/newhomework/20_18.png'

                    }
                    ]
                },
            },
            created: function () {
                this.initDatePicker();
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');
                    $api.domAll('a')[i].onclick = function () {
                        return false;
                    }
                }
            },
            methods: {
                videoZYPlay: function (context) {
                    var url = $api.attr(context, 'url');
                    var filetime = $api.attr(context, 'filetime');
                    api.openWin({
                        name: 'win_video_view',
                        url: '../../win_video_view.html',
                        slidBackEnabled: false,
                        pageParam: {
                            path: url,
                            title: '',
                            isMp3: false,
                            filetime: filetime
                        }
                    });
                },
                initDatePicker: function () {
                    this.$nextTick(function () {
                        api.hideProgress();
                        $('.wdt_content').show();
                        vm.showdati = true;
                    })
                },
                PostExercisesTriggerWrong: function () {//错题本改版 ，添加错题本、移除错题本、表及重点
                    var type;
                    if (vm.isctb == 1) {
                        type = 'outbook';
                    } else {
                        type = 'addbook';
                    }
                    apiObj.Post(UrlRouter.PostExercisesTriggerWrong, {
                        values: {
                            sys_id: vm.material.sys_id,
                            kc_type: 3,
                            type: type
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                if (type == 'outbook') {
                                    vm.isctb = 0;
                                    api.toast({
                                        msg: '已移出错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                } else {
                                    vm.isctb = 1;
                                    api.toast({
                                        msg: '成功加入错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }

                            } else {
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }
                        } else {
                            api.toast({
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    })
                },
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },
                checded: function (context) {//复选框不会做点击事件
                    $('textarea').blur();
                    if (vm.answer.length > 0) {
                        var param = vm.bhzparam;
                        param.data[1].showText = "<font color='#666666'>选择不会做，会将您已经填写的答案清空，是否确定不会做？</font>";
                        param.data[2].showText = "确定";
                        param.data[3].showText = "取消";
                        moduleDialog.showDialog(vm.bhzparam, function (ret, err) {
                            if (ret.state == 'success' && ret.clickID) {
                                if (ret.clickID == 'ok') {
                                    vm.answer = [];
                                    vm.is_unable = 1;//不会做
                                    vm.saveAnswer(vm.is_unable, vm.answer);
                                    audioStreamer.stop();
                                    $api.attr(context, 'playStatus', '1');
                                    $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                                    if (timer) {
                                        clearInterval(timer);
                                    }
                                    dismissDialog();
                                } else {
                                    dismissDialog();
                                }
                            } else {

                            }

                        });
                    } else {
                        vm.answer = [];
                        vm.is_unable = 1;//不会做
                        vm.saveAnswer(vm.is_unable, vm.answer);
                    }
                },

                deletePic: function (context) {    //删除图片答案
                    if (vm.material.tx == 'ldt') {
                        var param = vm.bhzparam;
                        param.data[1].showText = "<font color='#666666'>确定删除该音频吗？</font>";
                        moduleDialog.showDialog(param, function (ret, err) {
                            if (ret.state == 'success' && ret.clickID) {
                                if (ret.clickID == 'ok') {
                                    if ($api.domAll('.scyp2').length >= 1) {
                                        if ($('.scyp2').attr('playStatus') == 1) {
                                            $api.attr($api.dom('.scyp2'), 'playStatus', '2');
                                        }
                                        audioStreamer = api.require('audioStreamer');
                                        clearInterval(timer);
                                        audioStreamer.pause();
                                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                        $api.dom('.myRange').disabled = true;
                                    }
                                    var index;
                                    index = parseInt($(context).attr('id'));
                                    vm.answer.splice(index, 1);//删除数据指定索引位置的url
                                    vm.saveAnswer(vm.is_unable, vm.answer);
                                    dismissDialog();
                                } else {
                                    dismissDialog();
                                }
                            } else {

                            }

                        });
                    } else {
                        var index;
                        index = parseInt($(context).attr('id'));
                        vm.answer.splice(index, 1);//删除数据指定索引位置的url
                        vm.saveAnswer(vm.is_unable, vm.answer);
                    }

                },
                choose: function () {//打开手动批阅题选择答题方式的页面


                    //关闭学科课程个性推送问答题答题功能
                    api.toast({
                        msg: '答题功能已关闭'
                    })

                    return;



                    if (!checkPermission(['camera', 'storage', 'microphone'])) {
                        return;
                    }
                    if (vm.material.tx == 'ldt') {//朗读题
                        if (vm.answer.length > 0) {
                            var param = vm.bhzparam;
                            param.data[1].showText = "<font color='#666666'>再次答题将清除之前录音内容，是否继续进行答题？</font>";
                            moduleDialog.showDialog(param, function (ret, err) {
                                if (ret.state == 'success' && ret.clickID) {
                                    if (ret.clickID == 'ok') {
                                        if ($('.scyp2').attr('playStatus') == 1) {
                                            $api.attr($api.dom('.scyp2'), 'playStatus', '2');
                                        }
                                        audioStreamer = api.require('audioStreamer');

                getTimes: function (value) {
                    var secondTime = parseInt(value);// 秒
                    var minuteTime = 0;// 分
                    if (secondTime > 59) {//如果秒数大于60，将秒数转换成整数
                        //获取分钟，除以60取整数，得到整数分钟
                        minuteTime = parseInt(secondTime / 60);
                        //获取秒数，秒数取佘，得到整数秒数
                        secondTime = parseInt(secondTime % 60);
                    }
                    var result = "" + parseInt(secondTime);
                    if (minuteTime > 0 && secondTime < 10) {
                        if (minuteTime > 9) {
                            result = parseInt(minuteTime) + ":0" + result;
                        } else {
                            result = "0" + parseInt(minuteTime) + ":0" + result;
                        }
                    } else if (minuteTime > 0 && secondTime >= 10) {
                        if (minuteTime > 9) {
                            result = parseInt(minuteTime) + ":" + result;
                        } else {
                            result = "0" + parseInt(minuteTime) + ":" + result;
                        }
                    } else if (minuteTime == 0 && secondTime < 10) {
                        result = "00" + ":0" + result;
                    } else {
                        result = "00" + ":" + result;
                    }
                    return result;
                },

                                        $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                                    } else {

                                        var range = $api.dom('.myRange');
                                        range.value = sec;
                                        range.disabled = false;
                                        range.onchange = function () {
                                            sec = parseInt(this.value);
                                            range.value = sec;
                                            allTimes = vm.material.xsdaobj[0].filetime - sec;
                                            var time = vm.getTimes(allTimes);
                                            $api.text($api.dom('.ldTimeP'), time);
                                            bfb = sec / recodetime * 100;
                                            bfb = bfb.toFixed(2);
                                            var ss = 'background-size: ' + bfb + '% 100%';
                                            $api.css($api.dom('.myRange'), ss);
                                            audioStreamer.seekToTime({
                                                time: sec
                                            });
                                        };
                                        var time = vm.getTimes(allTimes);
                                        $api.css($api.dom('.myRange'), ss);
                                        $api.text($api.dom('.ldTimeP'), time);
                                    }
                                }, 1000);
                                downloadPath = api.fsDir + path;
                                if (api.systemType == 'ios') {
                                    if (vm.Local_address.indexOf(".mp3") != -1) {
                                        audioStreamer.openPlayer({
                                            path: downloadPath
                                        }, function (ret) {
                                        });
                                    } else {
                                        var audioTrans = api.require('audioTrans');
                                        audioTrans.amrToWav({
                                            path: downloadPath
                                        }, function (ret) {
                                            if (ret) {
                                                var path1 = ret.path;
                                                audioStreamer.openPlayer({
                                                    path: path1
                                                }, function (ret) {
                                                });
                                            }
                                        });
                                    }
                                } else {
                                    audioStreamer.openPlayer({
                                        path: downloadPath
                                    }, function (ret) {
                                    });
                                }
                            }
                        });


                    } else if (playStatus == '1') {
                        $api.attr(context, 'playStatus', '2');
                        clearInterval(timer);
                        audioStreamer.pause();
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                        $api.dom('.myRange').disabled = true;
                    } else {
                        $api.dom('.myRange').disabled = false;
                        $api.attr(context, 'playStatus', '1');
                        recodetime = vm.material.xsdaobj[0].filetime;
                        //这个是一样的  重新播放
                        if (api.systemType == 'ios') {
                            audioStreamer.resume();
                        } else {
                            audioStreamer.openPlayer({
                                path: downloadPath,
                            }, function (ret) {
                            });
                        }
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                        timer = setInterval(function (e) {
                            sec = sec + 1;
                            allTimes = allTimes - 1;
                            bfb = sec / recodetime * 100;
                            bfb = bfb.toFixed(2);
                            var ss = 'background-size: ' + bfb + '% 100%';
                            console.log(sec);
                            if (allTimes == 0 || sec >= vm.material.xsdaobj[0].filetime) {
                                clearInterval(timer);
                                $api.attr(context, 'playStatus', '0');
                                $api.dom('.myRange').value = 0;
                                $api.dom('.myRange').disabled = true;
                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                $api.text($api.dom('.ldTimeP'), vm.getTimes(vm.material.xsdaobj[0].filetime));
                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                            } else {

                                var range = $api.dom('.myRange');
                                range.value = sec;
                                range.disabled = false;
                                range.onchange = function () {
                                    sec = parseInt(this.value);
                                    range.value = sec;
                                    allTimes = vm.material.xsdaobj[0].filetime - sec;
                                    var time = vm.getTimes(allTimes);
                                    $api.text($api.dom('.ldTimeP'), time);
                                    bfb = sec / recodetime * 100;
                                    bfb = bfb.toFixed(2);
                                    var ss = 'background-size: ' + bfb + '% 100%';
                                    $api.css($api.dom('.myRange'), ss);
                                    audioStreamer.seekToTime({
                                        time: sec
                                    });
                                };
                                var time = vm.getTimes(allTimes);
                                $api.css($api.dom('.myRange'), ss);
                                $api.text($api.dom('.ldTimeP'), time);
                            }
                        }, 1000);
                    }
                },
                PostAIBtn: async function () {
                    const aiAnalysis = $api.getStorage('aiAnalysis');
                    const ret = await new Promise((resolve, reject) => {
                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {
                            body: $api.jsonToStr({
                                schoolid: $api.getStorage('schoolid'),
                                type: 'ai_analysis',
                                resource_id: vm.material.id,
                                count: aiAnalysis.count,
                                card_type: aiAnalysis.card_type !== undefined ? aiAnalysis.card_type : null,
                                ...(aiAnalysis.card_id !== undefined && {card_id: aiAnalysis.card_id}),
                            })
                        }, function (ret, err) {
                            if (ret) {
                                resolve(ret);
                            } else {
                                reject(err);
                            }
                        })
                    });
                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber') || ret.ret === -1) {
                        if ($api.getStorage('upgradeQRCode') === '1') {
                            api.toast({
                                msg: '本月剩余AI解析次数已耗尽',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            api.openFrame({
                                name: 'frame-number-exhausted',
                                url: '../../study/frame-number-exhausted.html',
                            })
                        }
                        return
                    }
                    if (ret.ret === 0 && ret.data === '') {
                        api.execScript({
                            name: 'win_detail_gxts',
                            script: 'postAiAnalysis()'
                        });
                    }
                    api.showProgress({
                        title: '正在请求AI',
                        text: '请稍后...',
                        modal: true
                    });
                    const tgContent = document.querySelector('.tg_content');
                    const needPics = document.querySelectorAll('.needpic');
                    const allElements = [tgContent, ...needPics];
                    const imageUrls = [];
                    let processedCount = 0;
                    // 处理每个元素的截图
                    allElements.forEach((element, index) => {
                        if (!element) return;
                        html2canvas(element, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        }).then(canvas => {
                            const imgUrl = canvas.toDataURL('image/png');
                            imageUrls[index] = imgUrl;
                            processedCount++;
                            // 当所有图片都处理完成时
                            if (processedCount == allElements.length) {
                                api.hideProgress();
                                api.openFrame({
                                    name: 'frame_liushi',
                                    url: '../../study/newHomework/frame_liushi.html',
                                    rect: {
                                        x: 0,
                                        y: 0,
                                        w: 'auto',
                                        h: api.winHeight
                                    },
                                    pageParam: {
                                        xtid: vm.material.id,
                                        imagePaths: imageUrls
                                    },
                                    bounces: false
                                });
                            }
                        }).catch(error => {
                            api.toast({
                                msg: '截图失败：' + error,
                                duration: 2000,
                                location: 'bottom'
                            });
                        });
                    });
                },
            }
        });
    }
    function imgClick(context) {
        var src;
        src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        if (src.substring(src.length - 3) == 'gif') {
        } else {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    src
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
        }
    }
    function dismissDialog() {
        moduleDialog.dismissDialog();
    }
    function showImage(context) {
        if ($api.getStorage('padType') != '1') {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    $(context).attr('fdsrc')
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
            return
        }
        var url = $(context).attr('fdsrc');
        var index = $(context).attr('id');
        var param = { "deviceType": "deviceType_pad", "url": url };
        moduleImageScale.showImage(param, function (ret, err) {
            if (ret) {
                if (ret.state == "success" && ret.clickID == 'clickID_close') {
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_save') {
                    vm.qiniuUpfile(ret.imageSavePath, 'modulesave', index);
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_delete') {
                    vm.answer.splice(index, 1);
                    vm.saveAnswer(0, vm.answer);
                    moduleImageScale.dismissImage();
                }
            } else {
                alert(JSON.stringify(err));
            }


        });

    }
    function CutPictures(src, tkindex) {
        api.openFrame({
            name: 'frame_cutPicture',
            url: '../../frame_cutPicture.html',
            rect: {
                x: 0,
                y: 0,
                w: 'auto',
                h: api.winHeight
            },
            pageParam: { src: src, frameName: api.frameName, tkindex: tkindex },
            bounces: false
        });
    }
