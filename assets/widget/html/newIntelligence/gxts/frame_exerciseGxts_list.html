<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>习题列表</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/exerciseCss.css"/>    <style>        .ex_content {            padding-top: 10px;            display: none        }        .ex_content dl {            width: 100%;            margin-left: 0;            padding: 0px        }        .ex_content dl dd {            padding: 0 20px;            width: calc(100% - 40px)        }        .ex-daipi {            right: 34px        }        .ex-xiaoti {            right: 69px        }        .zndltop span {            float: left;            font-size: 1.2rem;            display: inline-block;            height: 50px;            line-height: 50px;            margin-left: 5px;            margin-right: 17px        }        .opengxtt img {            height: 13px;            vertical-align: top;            margin-top: 19px;            margin-left: 6px        }        .topnr ul {            text-align: center        }        .topnr ul li {            display: inline-block;            max-width: 30%;            font-size: 1.2rem;            padding-left: 25px;        }        .topnr ul li + li {            margin-left: 3%;        }        .topnr ul li:nth-of-type(1) {            color: #9a9a9a;            background: url("../../../image/pwdt.png") no-repeat left center;            background-size: 18px;        }        .topnr ul li:nth-of-type(2) {            color: #01b2ee;            background: url("../../../image/pwtj.png") no-repeat left center;            background-size: 18px;        }        .topnr ul li:nth-of-type(3) {            color: #95d273;            background: url("../../../image/pdd.png") no-repeat left center;            background-size: 18px;        }        .topnr ul li:nth-of-type(4) {            color: #ff4537;            background: url("../../../image/pdc.png") no-repeat left center;            background-size: 18px;        }        .tgg span {            display: inline !important;        }        .topnr ul li:nth-of-type(5) {            color: #ff778c;            background: url("../../../image/pdp.png") no-repeat left center;            background-size: 18px;        }        .top {            width: calc(100% - 20px);            height: 50px;            padding: 10px;            padding-top: 0px;        }        .topnr {            width: 100%;            height: 100%;            background: #fff;            line-height: 50px;            font-size: 14px;            color: #333;        }        .topnr img {            height: 100%;            float: left        }    </style></head><body><div class="ex_content">    <div class="top">        <div class="topnr ">            <ul>                <li :style="wdt==0?'display:none':' '">未答：<span v-text="wdt"></span>题</li>                <li :style="wtj==0?'display:none':' '">未交：<span v-text="wtj"></span>题</li>                <li :style="dd==0?'display:none':' '">答对：<span v-text="dd"></span>题</li>                <li :style="dc==0?'display:none':' '">答错：<span v-text="dc"></span>题<span v-text="'（包括'+bhz+'题不会做）'"                                                                                         :style="bhz>0?'':'display:none'"></span>                </li>                <li :style="dp==0?'display:none':' '">待批：<span v-text="dp"></span>题</li>            </ul>        </div>    </div>    <dl>        <dd v-for="(list,index) in data.data" @click="openWin(index)">            <p v-html="index+1+'.【'+list.txstr+'】'+tgstr(list.tg)"></p>            <span class="ex-xiaoti" v-if="list.xts>0" v-text="list.tx_code==2?'['+list.xts+'填空]':'['+list.xts+'小题]'"></span>            <span class="ex-daipi" v-if="list.is_true!=0 && list.is_true ">                <img :src="list.is_true==1?'../../../image/newhomework/zhengque.png':list.is_true==2?'../../../image/newhomework/cuowu.png':list.is_true==3?'../../../image/newhomework/bandui.png':''">            </span>            <span class="ex-daipi" v-if="list.is_true==0">待批</span>            <span class="ex-daipi" v-if="!list.is_true && dtstatus[index]!=5 && list.is_true!=0" style="color: #cccccc;">未答</span>            <span class="ex-daipi" v-if="!list.is_true && dtstatus[index]==5" style="color: #4bc7c7;">未交</span>        </dd>    </dl></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var issaoma;    apiready = function () {        api.showProgress({            title: '加载中',            text: '请稍后...',            modal: false        });        vue();        vm.data = api.pageParam.data;//题的详情        vm.olddata = api.pageParam.olddata;        issaoma = api.pageParam.issaoma;        vm.opendata();        api.addEventListener({            name: 'shuaxin-personality-exercise-list'        }, function (ret, err) {            vm.wdt = 0;            vm.wtj = 0;            vm.dd = 0;            vm.dc = 0;            vm.dp = 0;            vm.bhz = 0;            vm.dtstatus = [];            vm.opendata();        });    };    function vue() {        vm = new Vue({            el: '.ex_content',            data: {                data: '',                olddata: '',                hcData: [],                wdt: 0,                wtj: 0,                dd: 0,                dc: 0,                dp: 0,                bhz: 0,                dtstatus: []            },            created: function () {                this.initDatePicker();            },            updated: function () {            },            methods: {                initDatePicker: function () {                    this.$nextTick(function () {                        api.hideProgress();                        $('.ex_content').show();                    })                },                opendata: function () {                    //创建打开数据库                    var db = api.require('db');                    var ret = db.openDatabaseSync({                        name: dbName,                        path: 'fs://student_12xue.db'                    });                    var creatRet = db.executeSqlSync({                        name: dbName,                        sql: 'CREATE TABLE IF NOT EXISTS NewIntelligenceGx(id INTEGER PRIMARY KEY AUTOINCREMENT,uid varchar(20),kcid varchar(20),xkid varchar(20),njid varchar(20),bbid varchar(20),sxcid varchar(20),dyid varchar(20),jieid varchar(20),version varchar(20),xtgroup text)'                    });                    var returnData = db.selectSqlSync({                        name: dbName,                        sql: 'SELECT * FROM NewIntelligenceGx where uid=' + $api.getStorage('uid') + ' and kcid=' + vm.olddata.id + ' and jieid=' + vm.olddata.jieid + ' and version=' + vm.olddata.version                    });                    if (JSON.stringify(returnData.data) == '[]') {                        vm.hcData = {}                    }else{                        vm.hcData = JSON.parse(returnData.data[0].xtgroup.replace('&apos;', "'"));                    }                    for (var i = 0; i < vm.data.data.length; i++) {                        var istrue = vm.data.data[i].is_true;                        if (istrue == 0) {                            vm.dp++;                            vm.dtstatus[i] = 0                        } else if (istrue == 1) {                            vm.dd++;                            vm.dtstatus[i] = 1                        } else if (istrue == 2) {                            vm.dc++;                            vm.dtstatus[i] = 2;                            if (vm.data.data[i].is_unable == 1) {                                vm.bhz++                            }                        } else if (istrue == 3) {                            vm.dc++;                            vm.dtstatus[i] = 3                        } else  {                            // alert(JSON.stringify(vm.hcData[0].xtgroup));                            // alert(vm.data.data[i].id);                            if (vm.hcData.hasOwnProperty(vm.data.data[i].id)) {//缓存的答案                                vm.MonitorWZnumber(vm.hcData[[vm.data.data[i].id]],i);                            }                        }                    }                   vm.wdt = vm.data.data.length-vm.dp-vm.dd-vm.dc-vm.wtj;                },                tgstr: function (tgstr) {                    var newtgStr;                    newtgStr = tgstr.replace(new RegExp("<br>", "gm"), "");                    newtgStr = newtgStr.replace(new RegExp("<br/>", "gm"), "");                    newtgStr = newtgStr.replace(new RegExp("<img", "gm"), "<img style=\"height: 20px;\"");                    newtgStr = newtgStr.replace(/(^\s*)|(\s*$)/g, "");                    newtgStr = newtgStr.replace(new RegExp("&nbsp;", "gm"), "");                    newtgStr = newtgStr.replace(/<br [^>]*style=*[^>]*>/gi,'');                    // return newtgStr                    var allowed='<i><b><u><s><em><strong><sup><sub><img>';                    allowed = (((allowed || "") + "").toLowerCase().match(/<[a-z][a-z0-9]*>/g) || []).join('');                    var tags = /<\/?([a-z][a-z0-9]*)\b[^>]*>/gi,                        commentsAndPhpTags = /<!--[\s\S]*?-->|<\?(?:php)?[\s\S]*?\?>/gi;                    return newtgStr.replace(commentsAndPhpTags, '').replace(tags, function ($0, $1) {                        return allowed.indexOf('<' + $1.toLowerCase() + '>') > -1 ? $0 : '';                    });                },                openWin: function (index) {                    api.openWin({                        name: 'win_detail_gxts',                        url: 'win_detail_gxts.html',                        pageParam: {                            olddata: vm.olddata,                            personalityData: vm.data,                            index: index,                            version: api.pageParam.version,                            openType: api.pageParam.openType,                            issaoma: issaoma,                            checkClass:api.pageParam.checkClass,                            schoolid:api.pageParam.schoolid,                        },                        slidBackEnabled: false,                        reload: true                    });                },                MonitorWZnumber: function (xtgroup,wtji) {                    if (xtgroup.tx_code == 2) {//填空                        var tktwdkong = 0;                        for (var j = 0; j < xtgroup.da.length; j++) {                            if (xtgroup.da[j].is_unable == 0 && xtgroup.da[j].descript.length == 0) {                                tktwdkong++                            }                        }                        if (tktwdkong == 0) {                            vm.wtj++;                            vm.dtstatus[wtji]=5                        }                    } else if (xtgroup.tx_code == 1) {//选择判断题                        vm.wtj++;                        vm.dtstatus[wtji]=5                    } else if (xtgroup.tx_code == 3) {//问答题                        if (xtgroup.da.length == 0 && xtgroup.is_unable == 0) {                        } else {                            vm.wtj++;                            vm.dtstatus[wtji]=5                        }                    } else if (xtgroup.tx_code == 4) {//完形填空                        var wxwd = 0;                        for (var j = 0; j < xtgroup.children.length; j++) {                            if (xtgroup.children[j].da.length == 0 && xtgroup.children[j].is_unable == 0) {                                wxwd++                            }                        }                        if (wxwd == 0) {                            vm.wtj++;                            vm.dtstatus[wtji]=5                        }                    } else if (xtgroup.tx_code == 5) {//实验探究                        var sytjwd = 0;                        for (var j = 0; j < xtgroup.children.length; j++) {                            if (xtgroup.children[j].is_auto == 1) {//自动批阅                                var sytjautowd = 0;                                for (var s = 0; s < xtgroup.children[j].da.length; s++) {                                    if (xtgroup.children[j].da[s].is_unable == 0 &&                                        xtgroup.children[j].da[s].descript.length == 0) {                                        sytjautowd++;                                    }                                }                                if (sytjautowd != 0) {                                    sytjwd++                                }                            } else {//手动批阅                                if (xtgroup.children[j].is_unable == 0 && xtgroup.children[j].da.length == 0) {                                    sytjwd++                                }                            }                        }                        if (sytjwd == 0) {                            vm.wtj++;                            vm.dtstatus[wtji]=5                        }                    }                },            }        });    }</script></html>
