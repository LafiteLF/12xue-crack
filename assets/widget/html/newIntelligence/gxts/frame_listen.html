<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>听力题</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>    <style>        .listen_content{ display: none}    </style></head><body><div class="listen_content">    <img  v-if=" material.is_complete==1 " class="jrctb noImgClick" :src="isctb!=1?'../../../image/newhomework/join.png':'../../../image/newhomework/out.png'" @click="PostExercisesTriggerWrong()">    <!--题干部分开始-->    <div class="listen_stem">        <ul>            <li class="tixing clearfix">                <div class="tihao" v-text="(index+1)+'.'"></div>                <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>            </li>            <li  v-if=" material.is_complete==1&& material.res_type!=2  "  class="listen_zsd"  @click="alertzsd(material.zsdmc)"><span>难易度：</span><img  class="noImgClick" :src="material.nyd==1?'../../../image/newhomework/1xing.png':material.nyd==2?'../../../image/newhomework/2xing.png':material.nyd==3?'../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{material.zsdmc}}</li>        </ul>        <div class=" font666 listen_tigan" >            <p v-html="material.tg"></p>            <div class="tdjhyinpin clearfix" if=" material.attachments" >                <img  class="scyp1 noImgClick" src="../../../image/newhomework/yuyinimg.png">                <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);" src="../../../image/startPlay.png" alt="">                <div class="ypRange"><input class="myRange" type="range" min="0"  value="0"  :max='material.attachments[0].filetime' ></div>                <p class="ypTimeP"  v-text="getOutTime(material.attachments[0].filetime)"></p>                <audio class="hideenAudio" :src='material.attachments[0].serverpath + material.attachments[0].preview_link' ></audio>            </div>        </div>    </div>    <!--题干部分结束-->    <div class="listen_bottom">        <!--答题部分开始-->        <span v-if="material.is_complete==1" class="zongfen">                  <span v-if="material.is_true!=0 "  v-html="'本题正确率<em>'+material.accuracy+'%</em>'"></span>                     <span v-if="material.is_true==0" style="color: #ff778c">待批</span>            </span>        <span class="listen_xiaoti" v-text="'共'+xiaotinum+'小题'"></span>        <div v-for="(list,index) in material.children" >            <div class="listenda_content">                <div class="listen_xtxx" v-html="'('+(index+1)+')'+list.tg"></div>                <ul v-if="showdati && material.is_complete==0 " class="option">                    <li v-for="item in list.options" :id="item.id" :index="index" :class="answer[index].da[0]==item.id?'danxoption xxactive':'danxoption'" tapmode onclick="vm.xxselectClicked(this)"v-text="item.xx" ></li>                    <li  class="bhz font4BC7C7" :id="index" tapmode onclick="vm.checded(this)">                        <span :class="answer[index].is_unable==1?'inputCheckactive':''"></span>不会做                    </li>                </ul>            </div>            <!--答题部分结束-->            <!--答案部分开始-->            <dl v-if="material.is_complete==1" class="listen_answer bgFFF">                <div class="defen">                    <img class="noImgClick" v-if="list.is_true!=0"                         :src="list.is_true==1?' ../../../image/newhomework/zhengque.png':list.is_true==2?'../../../image/newhomework/cuowu.png':list.is_true==3?'../../../image/newhomework/bandui.png':''">                    <span :style="list.is_true==1?'color: #4bc7c7':list.is_true==2?'color: #df7605':list.is_true==3?'color: #ffcd06':''"                          v-text="list.is_true==1?'正确':list.is_true==2?'错误':list.is_true==3?'正确率'+list.accuracy+'%':''"></span>                    <span v-if="list.is_true==0" style="color: #ff778c">待批</span>                </div>                <dd>                    <h2 class="wendah2">【我的答案】</h2>                    <ul class="clearfix wendawdda">                        <li class="wendazi" v-text="list.is_unable==1?'不会做':list.xsdastr"></li>                    </ul>                </dd>                <dd >                    <h2 class="wendah2" v-text="'【'+material.tx_tip+'】'"> </h2>                    <ul>                        <li class="wendazi" v-html="list.dastr==''?'无':list.dastr" ></li>                    </ul>                </dd>                <dd >                    <h2 class="wendah2">【答案解析】</h2>                    <ul>                        <li class="wendazi"  v-html="list.dajx==''?'无':list.dajx"></li>                    </ul>                </dd>                <dd v-if="material.audio && material.audio.length>0" >                    <h2 class="wendah2" >【老师留言】</h2>                    <ul class="clearfix">                        <li :class="ylist.type==1?'teacher_liuyan yuyin3':'teacher_liuyan_zi yuyin3'"                            v-for="(ylist , index) in material.audio" @click="yuyin(ylist,index)">                            <img    v-if="ylist.type==1" class="audio-img img1 noImgClick" src="../../../image/newhomework/yuyin1.png"/>                            <img    v-if="ylist.type==1" class="audio-img img2 noImgClick" src="../../../image/newhomework/yuyin2.gif"/>                            <span v-if="ylist.type==1" v-text="ylist.filetime+'″'"></span>                            <span v-if="ylist.type==2" v-text="ylist.descript"></span>                        </li>                    </ul>                </dd>            </dl>            <!--答案部分结束-->            <div class="jrctbkong"></div>        </div>    </div></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var queryHomewokAnswer;    var allTimes = 0;//音频播放    var sec;    var timer = null;    apiready = function () {        vue();        if(vm.material.is_complete==0){            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {                queryHomewokAnswer = {};            } else {                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));            }            for (var i = 0; i < vm.material.children.length; i++) {//给初始化的小题加个默认空答案 防止报错                var kongcontent = {                    'topid': vm.material.id,                    'id': vm.material.children[i].id,                    'da': [],                    'is_unable': 0,                    'daoptions': vm.material.children[i].daoptions,                    'sort': vm.material.children[i].sort,                };                Vue.set(vm.answer, i, kongcontent);            }            if (queryHomewokAnswer.hasOwnProperty(vm.material.id)) {//缓存的答案                vm.answer = queryHomewokAnswer[vm.material.id].children;            }        }        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if($api.domAll('.scyp2').length>=1){                if($('.scyp2').attr('playStatus')==1){                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                audioStreamer = api.require('audioStreamer');                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                clearInterval(timer);                var hideenAudio = $api.dom('.hideenAudio');                hideenAudio.pause();            }            api.stopPlay();            $('.img1').show();            $('.img2').hide();        });    };    function vue() {        vm = new Vue({            el: '.listen_content',            data: {                showdati:false,                index: api.pageParam.index,//当前frame的索引                material: api.pageParam.material,//当前习题资料                answer: [],//答案数组                complet: api.pageParam.complet,//答题状态                xiaotinum:api.pageParam.material.children.length,                isPlaying: false,//老师留言是否播放中                isctb : api.pageParam.material.is_ctb,            },            created: function () {                this.initDatePicker();            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                initDatePicker: function () {                    this.$nextTick(function () {                        api.hideProgress();                        $('.listen_content').show();                        vm.showdati=true;                    })                },                PostExercisesTriggerWrong:function(){//错题本改版 ，添加错题本、移除错题本、表及重点                    var type;                    if(vm.isctb==1){                        type = 'outbook';                    }else{                        type = 'addbook';                    }                    apiObj.Post(UrlRouter.PostExercisesTriggerWrong, {                        values: {                            sys_id:vm.material.sys_id,                            kc_type:3,                            type:type                        }                    }, function (ret, err) {                        if (ret) {                            if (ret.ret == 0) {                                if(type=='outbook'){                                    vm.isctb=0;                                    api.toast({                                        msg: '已移出错题本',                                        duration: 2000,                                        location: 'bottom'                                    });                                }else{                                    vm.isctb=1;                                    api.toast({                                        msg: '成功加入错题本',                                        duration: 2000,                                        location: 'bottom'                                    });                                }                            }else{                                api.toast({                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        }else{                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    })                },                alertzsd:function(content){                    alert('知识点：'+content);                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    var xtindex=$(context).attr('index');                    vm.answer[xtindex].da =[$(context).attr('id')];                    vm.answer[xtindex].is_unable = 0;//不会做                    vm.saveAnswer(vm.answer);                },                checded: function (context) {//复选框不会做点击事件                    var xtindex= $(context).attr('id');                    vm.answer[xtindex].da = [];                    vm.answer[xtindex].is_unable = 1;//不会做                    vm.saveAnswer(vm.answer);                },                saveAnswer:function (da) {                    var eachxtgroup = {                        'is_auto': 1,                        'tx': vm.material.tx,                        'xtid': vm.material.id,                        'children': da,                        'tx_code':vm.material.tx_code,                        'score': vm.material.score                    };                    api.sendEvent({                        name: 'saveAnswerHuancunGxts',                        extra: {                            eachxtgroup: eachxtgroup,                            zyid: vm.material.id,                        }                    });                },                studentRecord:function (context) {                    var url =   vm.material.attachments[0].serverpath + vm.material.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.material.attachments[0].filetime;  // 获取一下  filetime                    var hideenAudio = $api.dom('.hideenAudio');                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频                    if (playStatus == '0') {                        if (timer) {                            clearInterval(timer);                        }                        $api.attr(context, 'playStatus', '1');                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                        hideenAudio.play();                        sec = 0;                        allTimes = recodetime;                        timer = setInterval(function (e) {                            console.log(hideenAudio.currentTime +'  ' + sec);                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb =  sec/recodetime *100;   //2                            bfb = bfb.toFixed(2);//2                            var ss = 'background-size: '+bfb + '% 100%';//2                            if (allTimes == 0 || sec >= recodetime) {                                clearInterval(timer);                                $api.attr(context, 'playStatus', '0');                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                            } else {                                range.value = sec;//                                range.onchange = function () {//                                    sec = parseInt(this.value);//                                    range.value = sec;//                                    hideenAudio.currentTime = sec;//                                    allTimes = recodetime - sec;//                                    var time = vm.getOutTime(allTimes);//                                    $api.text($api.dom('.ypTimeP'), time);//                                };                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);  //4                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    } else if (playStatus == '1') {                        $api.attr(context, 'playStatus', '2');                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                        clearInterval(timer);                        hideenAudio.pause();                    } else {                        $api.attr(context, 'playStatus', '1');                        hideenAudio.play();                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                        timer = setInterval(function (e) {                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb =  sec/recodetime *100;    //5                            bfb = bfb.toFixed(2);   //5                            var ss = 'background-size: '+bfb + '% 100%';  //5                            if (allTimes == 0 || sec >= recodetime) {                                $api.attr(context, 'playStatus', '0');                                clearInterval(timer);                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6                            } else {                                range.value = sec;//                                range.onchange = function () {//                                    sec = parseInt(this.value);//                                    range.value = sec;//                                    hideenAudio.currentTime = sec;//                                    allTimes = recodetime - sec;//                                    var time = vm.getOutTime(allTimes);//                                    $api.text($api.dom('.ypTimeP'), time);//                                };                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);    //7                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    }                },                getOutTime: function (intime) {                    var outTime = '';                    if(intime<=9){                        outTime = '00:0'+intime;                    }else if(intime<59){                        outTime = '00:'+intime;                    }else {                        var min =parseInt(intime/60);                        var sec = intime%60;                        if(sec<=9){                            if(min>0&&min<10){                                outTime ='0'+ min+ ':0' + sec ;                            }else if(min>=10){                                outTime = min+ ':0' + sec ;                            }else{                                outTime = '00:0'+sec;                            }                        }else{                            if(min>0&&min<10){                                outTime ='0'+ min + ':'+ sec ;                            }else if(min>=10){                                outTime = min + ':'+ sec ;                            }else {                                outTime = '00:'+sec;                            }                        }                    }                    return outTime;                }            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if(src.substring(src.length-3)=='gif'){}else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });}    }</script></html>
