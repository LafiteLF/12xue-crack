<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>win</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width: auto;            max-width: calc(100% - 600px)!important;        }        .winIcon {            position: absolute;            padding-left: 10px;            right: 0;            top: 0;        }        .nydimg {            width: 115px;            margin-top: 15px;            margin-left: 15px        }        .qstt {            font-size: 1.2rem;            vertical-align: top;            /* margin-bottom: 22px; */            display: inline-block;            margin-top: 17px;            margin-left: 13px;        }        .content{ display: none}        .yc ,.qstt{ display: none}        .scroll li{ position: relative}        .hd{ width: 10px; height: 10px; border-radius: 100px; background: #e64545; border: 1px solid #fff; position: absolute; top: -3px}    </style></head><body><div class="content1">    <header class="clearfix">        <div onclick="closeWin()" class="winTitle pull_left" v-text="olddata.title"></div>        <img class="nydimg  yc"             :src="olddata.nyd==1?'../../../image/new1xing.png':olddata.nyd==2?'../../../image/new2xing.png':'../../../image/new3xing.png'">        <span class="qstt ">个性推送套题</span>        <div style="position: absolute;top: calc(23px - 1.3vw/2);right: 25vw;font-size: 1.3vw;color:#999999;">            本月剩余AI解析次数:&nbsp;<span style="font-weight: bold;" :style="{'color': aiAnalysis.count > 0 ? '#4BC7C7': '#F82A1A'}">{{ aiAnalysis.count }}</span>        </div>        <ul class="pull_right clearfix winIcon " v-if="unanswers>0">            <li class="buttonFour font4BC7C7 allSubmit pull_right" @click="PostAnswerDoHomework()"><p>全部提交</p></li>            <li class="pull_right wzxts font666">未做习题：<span v-text="wznum+'道'"></span></li>        </ul>    </header>    <div class="content">        <div class="type bg4BC7C7 fontFFF">{{current+1}}/{{zynum}}</div>        <ul class="scroll" >            <li v-for="(list , index) in material"                :style=" list.is_complete==0 && current!=index && answeredArr[list.id]==true?'background:#70f0f0;border:1px solid #70f0f0;color:#fff':''"                :class="current==index?'current':''" tapmode                onclick="vm.itemClick(this)">                {{index+1}}                <span v-if="list.is_complete==0 &&current!=index && answeredArr[list.id]==false" class="hd"></span>            </li>        </ul>    </div>    <ul class="right_btn"  >        <li tapmode onclick="vm.winpageUpOnclick();"><img src="../../../image/up1.png"></li>        <li tapmode onclick="vm.winnextOnclick();"><img src="../../../image/down1.png"></li>    </ul></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var xtgroup;    var queryHomewokAnswer;    var moduleDialog = null;//弹窗模块    apiready = function () {        moduleDialog = api.require('moduleDialog');        dismissDialog();//关模块        openType = api.pageParam.openType;        vue();        if (vm.material.length > 0) {            for(var i=0;i<vm.material.length;i++){                if(vm.material[i].is_complete==0){                    vm.forwzxtNum++;//新推的习题                }            }            for (var i = 0; i < vm.material.length; i++) {//添加默认答题状态                vm.answeredArr[vm.material[i].id] = false;            }                //打开数据库                var db = api.require('db');                var retDatabaseSync = db.openDatabaseSync({                    name: dbName,                    path: 'fs://student_12xue.db'                });                //创建作业答案表格                var creatRet = db.executeSqlSync({                    name: dbName,                    sql: 'CREATE TABLE IF NOT EXISTS NewIntelligenceGx(id INTEGER PRIMARY KEY AUTOINCREMENT,uid varchar(20),kcid varchar(20),xkid varchar(20),njid varchar(20),bbid varchar(20),sxcid varchar(20),dyid varchar(20),jieid varchar(20),version varchar(20),xtgroup text)'                });            // alert(JSON.stringify(creatRet)+'建表');                //查询作业答案                var returnData = db.selectSqlSync({                    name: dbName,                    sql: 'SELECT * FROM NewIntelligenceGx where uid=' + $api.getStorage('uid') + ' and kcid=' + vm.hwid + ' and jieid=' + vm.jieid + ' and version=' + vm.version                });                queryHomewokAnswer = returnData.data;                // alert(JSON.stringify(returnData)+'chaxun');                if (JSON.stringify(queryHomewokAnswer) == '[]') {                    xtgroup = {};//如果缓存答案是空 就给xtgroup赋值空                    vm.wznum = vm.forwzxtNum;//没有缓存                } else {                    xtgroup = JSON.parse(queryHomewokAnswer[0].xtgroup.replace(/&apos;/gi , "'" ));                    queryHomewokAnswer[0].xtgroup = queryHomewokAnswer[0].xtgroup.replace(/&apos;/gi , "'" );                    vm.MonitorWZnumber(xtgroup)                }            vm.openFrameGroup();        }else{            vm.openframe();        }        api.addEventListener({ //接收答案            name: 'saveAnswerHuancunGxts'        }, function (ret, err) {            var eachxtgroup = ret.value.eachxtgroup;            var zyid = ret.value.zyid;            xtgroup[zyid] = eachxtgroup;            vm.MonitorWZnumber(xtgroup);            var JsonXtgroup = JSON.stringify(xtgroup);            // 打开数据库            var db = api.require('db');            var ret = db.openDatabaseSync({                name: dbName,                path: 'fs://student_12xue.db'            });            if (JSON.stringify(queryHomewokAnswer) == '[]') {//如果这道题的答题数据是空 就插入一条数据                var INSERTret = db.executeSqlSync({//插入一条数据                    name: dbName,                    sql: "INSERT INTO NewIntelligenceGx(uid,kcid,xkid,njid,bbid,sxcid,dyid,jieid,version,xtgroup) VALUES (" + $api.getStorage('uid') + "," + vm.hwid + "," + vm.xkid + "," + vm.njid + "," + vm.bbid + "," + vm.sxcid + "," + vm.dyid + "," + vm.jieid + "," + vm.version + ",'" + JsonXtgroup.replace(/'/g, '&apos;') + "')"                });                // alert('插入'+JSON.stringify(INSERTret));                //查询作业答案                var returnData = db.selectSqlSync({                    name: dbName,                    sql: 'SELECT * FROM NewIntelligenceGx where uid=' + $api.getStorage('uid') + ' and kcid=' + vm.hwid + ' and jieid=' + vm.jieid + ' and version=' + vm.version                });                queryHomewokAnswer = returnData.data;                // alert('查询'+JSON.stringify(returnData));            } else {//如果这道题的答题数据不是空 就更新这条数据                var UPDATEret = db.executeSqlSync({                    name: dbName,                    sql: "UPDATE NewIntelligenceGx SET xtgroup='" + JsonXtgroup.replace(/'/g, '&apos;') + "' WHERE id=" + queryHomewokAnswer[0].id                });                // alert('更新'+JSON.stringify(UPDATEret));            }        });        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            closeWin();        });    };    function vue() {        vm = new Vue({            el: '.content1',            data: {                olddata:api.pageParam.olddata,                hwid: api.pageParam.olddata.id,                sxcid: api.pageParam.olddata.sxcid,                jieid: api.pageParam.olddata.jieid,                xkid:api.pageParam.olddata.xkid,                njid:api.pageParam.olddata.njid,                bbid:api.pageParam.olddata.bbid,                dyid: api.pageParam.olddata.dyid,                issaoma: api.pageParam.issaoma,                // status: api.pageParam.olddata.status,//数据里没有                version: api.pageParam.olddata.version,                material:api.pageParam.personalityData.data,                wznum: 0,                zynum:api.pageParam.personalityData.data.length,                forwzxtNum:0,                // data: api.pageParam.personalityData,                current: 0,                answeredArr: {},                isallInput:true,                unanswers:api.pageParam.personalityData.unanswers,                checkClass:api.pageParam.checkClass,                aiAnalysis: {count: 0}            },            created: function () {                this.initDatePicker();            },            mounted: function () {                this.$watch('aiAnalysis', () => {                    $api.setStorage('aiAnalysis', this.aiAnalysis);                },{deep: true});                apiObj.Get(UrlRouter.GetPayfeeCountByType, {                    values: {                        type: 'ai_analysis',                        schoolid: $api.getStorage('schoolid'),                    }                }, (ret, err) => {                    if (ret && ret.ret === 0) {                        this.aiAnalysis = ret.data;                    }else{                        this.aiAnalysis = {count:0};                    }                })            },            updated: function () {            },            methods: {                initDatePicker: function () {                    this.$nextTick(function () {                        api.hideProgress();                        $('.content').show();                        $('.yc').show();                        $('.qstt').css('display','inline-block');                    })                },                openframe:function(){                    var header = document.querySelector('header');                    var headerH = $api.offset(header).h;                    api.openFrame({                        name: 'kong',                        url: 'kong.html',                        rect: {                            x: 0,                            y: 56 + 10,                            w: api.winWidth,                            h: $api.getStorage('padHeight') - headerH - 10                        },                        bounces: false,                        reload: true                    });                },                openFrameGroup: function () {                    var header = document.querySelector('header');                    // var leftW = $api.offset($api.dom('.content')).w;                    // var rightW = $api.offset($api.dom('.right_btn')).w;                    var leftW = 67;                    var rightW = 40;                    var headerH = $api.offset(header).h;                    var frameAry = [];                    var frameObj = {};                    for (var i = 0; i < vm.material.length; i++) {                        var url;                            switch (vm.material[i].tx_code) {                                case '1'://单选 多选 判断 听单句话 单项选择                                    url = 'frame_xzt.html';                                    break;                                case '2':// 填空题 名著导读                                    url = 'frame_tkt.html';                                    break;                                case '3'://问答题 语言表达 默写 翻译 作文 朗读 证明 书面表达 朗读 解答 辨析 简答 计算                                    url = "frame_wdt.html";                                    break;                                case '4'://复合题带选项                                    if (vm.material[i].tx == 'tdh' || vm.material[i].tx == 'tdb'|| vm.material[i].tx == 'ttt') {//听对话 听对白                                        url = "frame_listen.html";                                    } else {//完型填空 阅读理解 材料选择题                                        url = "frame_wxtk.html";                                    }                                    break;                                case '5'://复合题不带选项 ：材料分析 解答 现代文阅读 综合探究 实验与探究 是个减伤 文言文批阅                                    url = "frame_sytj.html";                                    break                            }                        frameObj = {                            name: 'frame_detail_gxts' + (i + 1),                            url: url,                            bounces: false,                            bgColor: '#f2f2f2',                            pageParam: {                                index: i,                                material: vm.material[i],                                queryHomewokAnswer: queryHomewokAnswer,                            }                        };                        frameAry.push(frameObj);                    }                    api.openFrameGroup({                        name: 'frame_detail_gxts',                        scrollEnabled: false,                        rect: {                            x: leftW + 10,                            y: headerH + 10,                            w: api.winWidth - leftW - rightW - 30,                            h: $api.getStorage('padHeight') - headerH - 10                        },                        index: api.pageParam.index,                        preload: 0,                        frames: frameAry,                        reload: true                    }, function (ret, err) {                        vm.current = ret.index;                        if (vm.current > 4) {                            $api.dom('.scroll').scrollTop = (vm.current - 4) * 47                        } else {                            $api.dom('.scroll').scrollTop = 0;                        }                        api.sendEvent({//暂停音频                            name: 'yinpinCLose'                        });                    });                },                winpageUpOnclick: function () {//右边上一个按钮切换                    if (vm.current == 0) {                        api.toast({                            msg: '已经是第一个了',                            duration: 2000,                            location: 'bottom'                        })                    } else {                        vm.current = vm.current - 1;                        api.setFrameGroupIndex({                            name: 'frame_detail_gxts',                            index: vm.current,                            scroll: true                        });                    }                },                winnextOnclick: function () {//右边下一个按钮切换                    if (vm.current == vm.zynum - 1) {                        api.toast({                            msg: '已经是最后一个了',                            duration: 2000,                            location: 'bottom'                        })                    } else {                        vm.current = vm.current + 1;                        api.setFrameGroupIndex({                            name: 'frame_detail_gxts',                            index: vm.current,                            scroll: true                        });                    }                },                itemClick: function (context) {//左边题号切换                    vm.current = $(context).index();                    api.setFrameGroupIndex({                        name: 'frame_detail_gxts',                        index: vm.current,                        scroll: true                    });                },                MonitorWZnumber: function (xtgroup) {                    var material = vm.material;                    var yzxtnum = 0;                    for (var i = 0; i < material.length; i++) {                        if(material[i].is_complete==0){                            var listid = material[i].id;                            if (xtgroup[listid] == undefined) {                            } else {                                if (xtgroup[listid].tx_code == 2) {//填空                                    var tktwdkong = 0;                                    for (var j = 0; j < xtgroup[listid].da.length; j++) {                                        if (xtgroup[listid].da[j].is_unable == 0 && xtgroup[listid].da[j].descript.length == 0) {                                            tktwdkong++                                        }                                    }                                    if (tktwdkong == 0) {                                        yzxtnum++;                                        vm.answeredArr[listid] = true;                                    } else {                                        vm.answeredArr[listid] = false;                                    }                                } else if (xtgroup[listid].tx_code == 1) {//选择判断题                                    yzxtnum++;                                    vm.answeredArr[listid] = true;                                } else if (xtgroup[listid].tx_code == 3) {//问答题                                    if (xtgroup[listid].da.length == 0 && xtgroup[listid].is_unable == 0) {                                        vm.answeredArr[listid] = false;                                    } else {                                        yzxtnum++;                                        vm.answeredArr[listid] = true;                                    }                                } else if (xtgroup[listid].tx_code == 4) {//完形填空                                    var wxwd = 0;                                    for (var j = 0; j < xtgroup[listid].children.length; j++) {                                        if (xtgroup[listid].children[j].da.length == 0 && xtgroup[listid].children[j].is_unable == 0) {                                            wxwd++                                        }                                    }                                    if (wxwd == 0) {                                        yzxtnum++;                                        vm.answeredArr[listid] = true;                                    } else {                                        vm.answeredArr[listid] = false;                                    }                                } else if (xtgroup[listid].tx_code == 5) {//实验探究                                    var sytjwd = 0;                                    for (var j = 0; j < xtgroup[listid].children.length; j++) {                                        if (xtgroup[listid].children[j].is_auto == 1) {//自动批阅                                            var sytjautowd = 0;                                            for (var s = 0; s < xtgroup[listid].children[j].da.length; s++) {                                                if (xtgroup[listid].children[j].da[s].is_unable == 0 &&                                                    xtgroup[listid].children[j].da[s].descript.length == 0) {                                                    sytjautowd++;                                                }                                            }                                            if (sytjautowd != 0) {                                                sytjwd++                                            }                                        } else {//手动批阅                                            if (xtgroup[listid].children[j].is_unable == 0 && xtgroup[listid].children[j].da.length == 0) {                                                sytjwd++                                            }                                        }                                    }                                    if (sytjwd == 0) {                                        yzxtnum++;                                        vm.answeredArr[listid] = true;                                    } else {                                        vm.answeredArr[listid] = false;                                    }                                }                            }                        }                    }                    vm.wznum = vm.forwzxtNum - yzxtnum;                },                tijaoAnswer: function () {//作业统一提交                        if (vm.wznum != 0) {                            wdTips(vm.wznum);                            // alert('您还有' + vm.wznum + '道题没答，如果不会可以选择不会做，全部答完才能提交噢！')                        } else {                            apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPracticeDoHomework, {                                body: $api.jsonToStr({                                    uid: $api.getStorage('uid'),                                    kcid: vm.hwid,                                    xkid: vm.xkid,                                    njid: vm.njid,                                    bbid: vm.bbid,                                    sxcid: vm.sxcid,                                    dyid: vm.dyid,                                    jieid: vm.jieid,                                    version:vm.version,                                    xtgroup: xtgroup,                                    xt_type: 2,//习题类型（1：基础，2：个性推荐）                                    is_complete: 1,                                    push_num:api.pageParam.personalityData.push_num,                                    xsbjid:vm.checkClass.classid,                                    tuid:vm.checkClass.uid,                                    schoolid:api.pageParam.schoolid                                })                            }, function (ret, err) {                                if (ret) {                                    if (ret.ret == 0) {                                        vm.isallInput = false;                                        api.hideProgress();                                        // $('.tijiao').removeAttr('onclick');                                        //创建打开数据库                                        var db = api.require('db');                                        var ret = db.openDatabaseSync({                                            name: dbName,                                            path: 'fs://student_12xue.db'                                        });                                        var DELETERet = db.executeSqlSync({                                            name: dbName,                                            sql: 'DELETE FROM NewIntelligenceGx where uid=' + $api.getStorage('uid') + ' and kcid=' + vm.hwid + ' and jieid=' + vm.jieid                                        });                                        api.closeFrameGroup({                                            name: 'frame_detail_gxts'                                        });                                        var newtype;                                        if(openType == '12'){                                            newtype = 2                                        }else if(openType == '11'){                                            newtype = 1                                        }else{                                            newtype = openType                                        }                                        api.openWin({                                            name: 'win-Intelligence-Statistics',                                            url: '../win-Intelligence-Statistics.html',                                            pageParam: {                                                data: vm.olddata,                                                xt_type: 2, //习题类型（1：基础，2：个性推荐）,                                                personalityData:api.pageParam.personalityData,                                                openType:newtype,                                                issaoma:vm.issaoma,                                                checkClass:api.pageParam.checkClass,                                                schoolid:api.pageParam.schoolid,                                            },                                            slidBackEnabled:  false,                                            reload:true                                        });                                    } else {                                        vm.isallInput = true;                                        api.hideProgress();                                        api.toast(                                            {                                                msg: ret.msg,                                                duration: 2000,                                                location: 'bottom'                                            }                                        )                                    }                                } else {                                    vm.isallInput = true;                                    api.hideProgress();                                    api.toast(                                        {                                            msg:err.statusCode==405?'网络无法连接，请检查网络配置': err.msg,                                            duration: 2000,                                            location: 'bottom'                                        }                                    )                                }                            })                        }                },                PostAnswerDoHomework: function () {//作业统一提交                    api.sendEvent({//暂停音频                        name: 'yinpinCLose'                    });                    if(vm.isallInput){                        vm.isallInput=false;                        vm.tijaoAnswer();                        setTimeout(function(){  vm.isallInput=true; }, 3000);                    }else{                        api.toast(                            {                                msg:'正在提交，请稍后再试！',                                duration: 2000,                                location: 'bottom'                            }                        )                    }                },            }        });    }    function closeWin() {//        api.sendEvent({//            name: 'shuaxin-win-Intelligence-exercise-list'//        });//        api.sendEvent({//            name: 'shuaxin-personality-exercise-list'//        });        if(openType == '0'){//顺序进来            api.sendEvent({                name: 'shuaxin-personality-exercise-list'            });            api.closeToWin({                name: 'win_exerciseGxts_list',            });        } else if(openType == '1'){//直接跳过个性套题统计页面            api.sendEvent({                name: 'shuaxin-win-Intelligence-exercise-list'            });            api.closeToWin({                name: 'win_exercise_list',            });            // api.closeToWin({            //     name: ' win-Intelligence-exercise-list',            // });        }else if(openType == '12' || openType == '11'){//直接跳过个性套题统计页面
