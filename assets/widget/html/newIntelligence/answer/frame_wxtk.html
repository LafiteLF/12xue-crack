<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>完形填空</title>
    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>
    <style>
        .tkt_content{ display: none}
    </style>
</head>
<body>
<div class="tkt_content" id="tkt_content">
    <img v-if=" isShowAnswer && material.res_type!=2" class="aibtn noImgClick"
            src="../../../image/newhomework/aiBtn.png" @click="PostAIBtn()">
    <img  v-if=" isShowAnswer && material.res_type!=2" class="jrctb noImgClick" :src="isctb!=1?'../../../image/newhomework/join.png':'../../../image/newhomework/out.png'" @click="PostExercisesTriggerWrong()">
    <div  v-if="showdati" class="tkt_top">
        <ul>
            <li class="tixing clearfix">
                <div class="tihao" v-text="(index+1)+'.'"></div>
                <div class="tixingzi"  v-text="'【'+material.txstr+'】'"></div>
            </li>
            <li  class="zsd"  @click="alertzsd(material.zsdmc)">
                <span>难易度：</span><img  class="noImgClick" :src="material.nyd==1?'../../../image/newhomework/1xing.png':material.nyd==2?'../../../image/newhomework/2xing.png':material.nyd==3?'../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{material.zsdmc}}
            </li>
        </ul>
    </div>
    <div    class="tkt_left" id="left" style="width: calc(60% - 53px);">
        <div class="tg_content font666" v-html="material.tg"></div>
    </div>
    <div    class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">
        <div class="tkt_right_content">
            <div  :style="!isShowAnswer ?'display:block':'display:none'" class="tishi2 overflow"><img src="../../../image/newhomework/ts.png">老师尚未发送答案，只展示个人答案哦~</div>
            <div class="huakuai" id="huakuai"></div>
            <span v-if="isShowAnswer" class="zongfen">
                  <span v-if="material.is_true!=0 "  v-html="'本题正确率<em>'+material.accuracy+'%</em>'"></span>
                     <span v-if="material.is_true==0" style="color: #ff778c">待批</span>
            </span>
            <span class="wxtk_xiaoti" :style="isShowAnswer?'':'top:40px'" v-text="'共'+xiaotinum+'小题'"></span>
            <ul class="wxtk_content">
                <li v-for="(list,index) in material.children">
                    <!--答题部分开始-->
                    <div  class="xiaotifenge wxtk_tg"v-html="'('+(index+1)+')<br>'+list.tg"></div>
                    <!--答题部分结束-->
                    <!--答案部分开始-->
                    <dl  class="wxtk_answer bgFFF">
                        <dd class="wxtk_myanswer">
                            <div v-if="isShowAnswer" class="wxtkdefen">
                                <img class="noImgClick" v-if="list.is_true!=0"
                                     :src="list.is_true==1?' ../../../image/newhomework/zhengque.png':list.is_true==2?'../../../image/newhomework/cuowu.png':list.is_true==3?'../../../image/newhomework/bandui.png':''">
                                <span :style="list.is_true==1?'color: #4bc7c7':list.is_true==2?'color: #df7605':list.is_true==3?'color: #ffcd06':''"
                                      v-text="list.is_true==1?'正确':list.is_true==2?'错误':list.is_true==3?'正确率'+list.accuracy+'%':''"></span>
                                <span v-if="list.is_true==0" style="color: #ff778c">待批</span>
                            </div>
                            <h2 >【我的答案】</h2>
                            <ul class="clearfix ">
                                <li class="wxtkzi" v-text="list.is_unable==1?'不会做':list.xsdastr"></li>
                            </ul>
                        </dd>
                        <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">
                            <h2  v-text="'【'+material.tx_tip+'】'"> </h2>
                            <ul>
                                <li class="wxtkzi" v-html="list.dastr==''?'无':list.dastr"></li>
                            </ul>
                        </dd>
                        <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">
                            <h2 >【答案解析】</h2>
                            <ul>
                                <li class="wxtkzi" v-html="list.dajx==''?'无':list.dajx"></li>
                            </ul>
                        </dd>
                    </dl>
                    <!--答案部分开始-->
                </li>
            </ul>
            <dl v-if=" material.audio && material.audio.length>0" class="wxtk_dajx" :style="isShowAnswer?'display:block':'display:none'">
                <dd>
                    <h2 class="tktjxh2">【老师留言】</h2>
                    <ul class="clearfix">
                        <li :class="ylist.type==1?'teacher_liuyan yuyin':'teacher_liuyan_zi yuyin'"
                            v-for="(ylist , index) in material.audio" @click="yuyin(ylist,index)">
                            <img   v-if="ylist.type==1" class="audio-img img1 noImgClick" src="../../../image/newhomework/yuyin1.png"/>
                            <img    v-if="ylist.type==1" class="audio-img img2 noImgClick" src="../../../image/newhomework/yuyin2.gif"/>
                            <span v-if="ylist.type==1" v-text="ylist.filetime+'″'"></span>
                            <p v-if="ylist.type==2" v-text="ylist.descript"></p>
                        </li>
                    </ul>
                </dd>

            </dl>
            <!--答案部分结束-->
            <div class="jrctbkong"></div>
        </div>
    </div>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript" src="../../../script/common.js"></script>
<script type="text/javascript" src="../../../script/fastclick.js"></script>
<script type="text/javascript" src="../../../script/html2canvas.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    apiready = function () {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        vue();
        vm.index = api.pageParam.index;//第几题
        vm.material = api.pageParam.material;//题的详情
        vm.isctb = api.pageParam.material.is_ctb;
        vm.isShowAnswer = api.pageParam.answershow;
//        alert(vm.material.audio)
        api.addEventListener({// 滑动暂停音频
            name: 'yinpinCLose'
        }, function (ret, err) {
            api.stopPlay();
            $('.img1').show();
            $('.img2').hide();
        });
    };
    function vue() {
        vm = new Vue({
            el: '.tkt_content',
            data: {
                showdati:false,
                index: '',//题号
                material: '',//习题,
                isShowAnswer:'',
                isPlaying: false,//老师留言是否播放中
                xiaotinum:api.pageParam.material.children.length,
                isctb:''
            },
            created: function () {
                this.initDatePicker();
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');
                    $api.domAll('a')[i].onclick = function () {
                        return false;
                    }
                }
            },
            methods: {
                initDatePicker: function () {
                    this.$nextTick(function () {
                        api.hideProgress();
                        $('.tkt_content').show();
                        vm.showdati=true;
                        if(vm.showdati){
                            vm.huakuai();
                        }
                    })
                },
                PostExercisesTriggerWrong:function(){//错题本改版 ，添加错题本、移除错题本、表及重点
                    var type;
                    if(vm.isctb==1){
                        type = 'outbook';
                    }else{
                        type = 'addbook';
                    }
                    apiObj.Post(UrlRouter.PostExercisesTriggerWrong, {
                        values: {
                            sys_id:vm.material.sys_id,
                            kc_type:3,
                            type:type
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                if(type=='outbook'){
                                    vm.isctb=0;
                                    api.toast({
                                        msg: '已移出错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }else{
                                    vm.isctb=1;
                                    api.toast({
                                        msg: '成功加入错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }

                            }else{
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }
                        }else{
                            api.toast({
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    })
                },
                alertzsd:function(content){
                    alert('知识点：'+content);
                },
                huakuai:function () {
                    var tktcontent = document.getElementById('tkt_content'); //长线条
                    var right = document.getElementById('right'); //小方块
                    var left = document.getElementById('left');
                    var huakuai = document.getElementById('huakuai');
                    var ifBool = false; //判断鼠标是否按下
//鼠标按下方块
                    huakuai.addEventListener("touchstart", function (e) {
                        e.stopPropagation();
                        ifBool = true;
                    });
//拖动
                    window.addEventListener("touchmove", function (e) {
                        if (ifBool) {
                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x
                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标
                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值
                            if (minDiv_left >= tktcontent.offsetWidth - 43) {
                                minDiv_left = tktcontent.offsetWidth - 43;
                            }
//设置拖动后小方块的left值
                            var rightwidth;
                            var leftwidth;
                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {
                                rightwidth = $(window).width() * 0.7 + 37;
                                leftwidth = $(window).width() * 0.3 - 53;
                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {
                                rightwidth = $(window).width() * 0.4 + 37;
                                leftwidth = $(window).width() * 0.6 - 53;
                            } else {
                                rightwidth = $(window).width() - minDiv_left;
                                leftwidth = minDiv_left -14
                            }
                            right.style.width = rightwidth + "px";
                            left.style.width = leftwidth + "px";
                        }
                    });
//鼠标松开
                    window.addEventListener("touchend", function (e) {
                        ifBool = false;
                    });

//获取元素的绝对位置
                    function getPosition(node) {
                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left
                        var top = node.offsetTop;
                        current = node.offsetParent; // 取得元素的offsetParent
                        // 一直循环直到根元素
                        while (current != null) {
                            left += current.offsetLeft;
                            top += current.offsetTop;
                            current = current.offsetParent;
                        }
                        return {
                            "left": left,
                            "top": top
                        };
                    }
                },
                ckzsd:function(context){
                    alert('知识点：'+context);
                }
                ,
                zhengquelv:function (num) {
                    return Math.round(num);
                },
                yuyin: function (audioItem, index) {

                    if (vm.isPlaying) {
                        api.stopPlay();
                        $('.img1').show();
                        $('.img2').hide();
                    } else {
                        $('.img1').show();
                        $('.img2').hide();
                        var audioName = audioItem.savename;
                        var path = "/audio/" + audioName + ".amr";
                        api.download({
                            url: audioItem.serverpath + "/" + audioItem.savename,
                            savePath: 'fs:/' + path,
                            report: false,
                            cache: false,
                            allowResume: false
                        }, function (ret, err) {
                            if (ret && ret.state == 1) {
                                // 下载成功  ret.savePath
                                isDownloading = false;
                                api.startPlay({
                                    path: api.fsDir + path
                                }, function (ret, err) {
                                    if (ret) {
                                        vm.isPlaying = false;
                                        $('.img1').show();
                                        $('.img2').hide();

                                    }
                                });

                                $('.yuyin').eq(index).find('.img1').hide();
                                $('.yuyin').eq(index).find('.img2').show();
                                $('.yuyin').eq(index).siblings().find('.img1').show();
                                $('.yuyin').eq(index).siblings().find('.img2').hide();
                            }
                        });
                    }
                    vm.isPlaying = !vm.isPlaying;
                },
                PostAIBtn: async function () {
                    const aiAnalysis = $api.getStorage('aiAnalysis');
                    const ret = await new Promise((resolve, reject) => {
                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {
                            body: $api.jsonToStr({
                                schoolid: $api.getStorage('schoolid'),
                                type: 'ai_analysis',
                                resource_id: vm.material.zyid,
                                count: aiAnalysis.count,
                                card_type: aiAnalysis.card_type !== undefined ? aiAnalysis.card_type : null,
                                ...(aiAnalysis.card_id !== undefined && {card_id: aiAnalysis.card_id}),
                            })
                        }, function (ret, err) {
                            if (ret) {
                                resolve(ret);
                            } else {
                                reject(err);
                            }
                        })
                    });
                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber')|| ret.ret === -1) {
                        if ($api.getStorage('upgradeQRCode') === '1') {
                            api.toast({
                                msg: '本月剩余AI解析次数已耗尽',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            api.openFrame({
                                name: 'frame-number-exhausted',
                                url: '../../study/frame-number-exhausted.html',
                            })
                        }
                        return
                    }
                    if (ret.ret === 0 && ret.data === '') {
                        api.execScript({
                            name: 'win_detail_answer',
                            script: 'postAiAnalysis()'
                        });
                    }
                    api.showProgress({
                        title: '正在请求AI',
                        text: '请稍后...',
                        modal: true
                    });
                    const tgContent = document.querySelector('.tg_content');
                    const wxtk_tgs = document.querySelectorAll('.wxtk_tg');
                    const needpics = document.querySelectorAll('.needpic');
                    const allElements = [tgContent, ...wxtk_tgs, ...needpics];
                    const imageUrls = [];
                    let processedCount = 0;
                    // 处理每个元素的截图
                    allElements.forEach((element, index) => {
                        if (!element) return;
                        html2canvas(element, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        }).then(canvas => {
                            const imgUrl = canvas.toDataURL('image/png');
                            imageUrls[index] = imgUrl;
                            processedCount++;
                            // 当所有图片都处理完成时
                            if (processedCount == allElements.length) {
                                api.hideProgress();
                                api.openFrame({
                                    name: 'frame_liushi',
                                    url: '../../study/newHomework/frame_liushi.html',
                                    rect: {
                                        x: 0,
                                        y: 0,
                                        w: 'auto',
                                        h: api.winHeight
                                    },
                                    pageParam: {
                                        xtid: vm.material.zyid,
                                        imagePaths: imageUrls
                                    },
                                    bounces: false
                                });
                            }
                        }).catch(error => {
                            api.toast({
                                msg: '截图失败：' + error,
                                duration: 2000,
                                location: 'bottom'
                            });
                        });
                    });
                },

            }
        });
    }

    function imgClick(context) {
        var src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        var photoBrowser = api.require('photoBrowser');
        photoBrowser.open({
            images: [
                src
            ],
            placeholderImg: 'widget://../image/loading_more.gif',
            bgColor: '#fff'
        }, function (ret, err) {
            if (ret.eventType == 'click') {
                photoBrowser.close();
            }
        });
    }
</script>
</html>
