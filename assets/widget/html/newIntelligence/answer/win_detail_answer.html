<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>答题结果</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width: auto;            max-width: calc(100% - 600px) !important;        }        .nydimg {            width: 115px;            margin-top: 15px;            margin-left: 15px        }        .qstt {            font-size: 1.2rem;            vertical-align: top;            /* margin-bottom: 22px; */            display: inline-block;            margin-top: 17px;            margin-left: 13px;        }    </style></head><body><div class="content1">    <header class="clearfix">        <div onclick="closeWin()" class="winTitle pull_left" v-text="data.title"></div>        <img class="nydimg"             :src="data.nyd==1?'../../../image/new1xing.png':data.nyd==2?'../../../image/new2xing.png':'../../../image/new3xing.png'">        <span class="qstt">起始套题</span>    </header>    <div style="position: absolute;right: 10rem;top: 1.5rem;font-size: 1.5rem;color:#999999">        本月剩余AI解析次数:&nbsp;<span style="font-weight: bold;"                                       :style="{'color': aiAnalysis.count > 0 ? '#4BC7C7': '#F82A1A'}">        {{ aiAnalysis.count }}</span>    </div>    <div class="content">        <div class="type bg4BC7C7 fontFFF">{{ current + 1 }}/{{ material.length }}</div>        <ul class="scroll">            <li v-for="(list , index) in material" v-text="index+1" :class="current==index?'current':''" tapmode                onclick="vm.itemClick(this)"></li>        </ul>    </div>    <ul class="right_btn">        <li tapmode onclick="vm.winpageUpOnclick();"><img src="../../../image/up1.png"></li>        <li tapmode onclick="vm.winnextOnclick();"><img src="../../../image/down1.png"></li>    </ul></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var hwid = '';    var sxcid = '';    var dyid = '';    apiready = function () {        hwid = api.pageParam.hwid;        sxcid = api.pageParam.sxcid;        dyid = api.pageParam.dyid;        vm.current = api.pageParam.index;        vm.GetPracticePracticeinfo(hwid, sxcid, dyid, api.pageParam.version);        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            closeWin()        });        apiObj.Get(UrlRouter.GetPayfeeCountByType, {            values: {                type: 'ai_analysis',                schoolid: $api.getStorage('schoolid'),            }        }, (ret, err) => {            if (ret && ret.ret === 0) {                vm.aiAnalysis = ret.data;            }else{                vm.aiAnalysis = {count:0};            }        });    };    var vm = new Vue({        el: '.content1',        data: {            data: '',            material: '',            current: 0,            spancurrent: 0,            aiAnalysis: {count: 0}        },        mounted: function () {            this.$watch('aiAnalysis', () => {                $api.setStorage('aiAnalysis', this.aiAnalysis);            },{deep: true});        },        updated: function () {            $api.css($api.dom('.content1'), 'display:block');        },        methods: {            GetPracticePracticeinfo: function (hwid, sxcid, dyid, version) {                api.showProgress({                    title: '加载中',                    text: '请稍后...',                    modal: false                });                apiObj.Get(UrlRouter.GetPracticePracticeinfo, {                    values: {                        hwid: hwid,                        sxcid: sxcid,                        dyid: dyid,                        version: version,                        mac_addr: $api.getStorage('macAdress')//                                            mac_addr:'A0:57:E3:60:8A:D6'                    }                }, function (ret, err) {                    api.hideProgress();                    if (ret) {                        if (ret.ret == 0) {                            if (ret.data.paystatus == 1) {                                api.hideProgress();                                vm.data = ret.data;                                vm.material = ret.data.material;                                vm.openFrameGroup();                            } else {                                var newData = ret.data;                                api.openWin({                                    name: 'win-Intelligence-Unlock',                                    url: 'win-Intelligence-Unlock.html',                                    pageParam: {                                        data: newData,                                        issaoma: issaoma                                    },                                    slidBackEnabled: false                                });                            }                        } else {                            api.toast(                                {                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                }                            )                        }                    } else {                        api.toast(                            {                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            }                        )                    }                })            },            openFrameGroup: function () {                var header = document.querySelector('header');                var leftW = 67;                var rightW = 40;                var headerH = $api.offset(header).h;                var frameAry = [];                var frameObj = {};                for (var i = 0; i < vm.material.length; i++) {                    var url;                    switch (vm.material[i].tx_code) {                        case '1'://单选 多选 判断 听单句话 单项选择                            url = 'frame_xzt.html';                            break;                        case '2':// 填空题 名著导读                            url = 'frame_tkt.html';                            break;                        case '3'://问答题 语言表达 默写 翻译 作文 朗读 证明 书面表达 朗读 解答 辨析 简答 计算                            url = "frame_wdt.html";                            break;                        case '4'://复合题带选项                            if (vm.material[i].tx == 'tdh' || vm.material[i].tx == 'tdb' || vm.material[i].tx == 'ttt') {//听对话 听对白                                url = "frame_listen.html";                            } else {//完型填空 阅读理解 材料选择题                                url = "frame_wxtk.html";                            }                            break;                        case '5'://复合题不带选项 ：材料分析 解答 现代文阅读 综合探究 实验与探究 是个减伤 文言文批阅                            url = "frame_sytj.html";                            break                    }                    frameObj = {                        name: 'frame_detail_answer' + (i + 1),                        url: url,                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            index: i,                            material: vm.material[i],                            xtgroupObj: vm.xtgroupObj,                            answershow: api.pageParam.answershow                        }                    };                    frameAry.push(frameObj);                }                api.openFrameGroup({                    name: 'frame_detail_answer',                    scrollEnabled: false,                    rect: {                        x: leftW + 10,                        y: headerH + 10,                        w: api.winWidth - leftW - rightW - 30,                        h: $api.getStorage('padHeight') - headerH - 10                    },                    index: vm.current,                    preload: 0,                    frames: frameAry,                    reload: true                }, function (ret, err) {                    vm.current = ret.index;                    //设置上面index跟随下面滑动                    if (vm.current > 4) {                        $api.dom('.scroll').scrollTop = (vm.current - 4) * 47                    } else {                        $api.dom('.scroll').scrollTop = 0;                    }                    api.sendEvent({//暂停音频                        name: 'yinpinCLose'                    });                });            },            winpageUpOnclick: function () {//右边上一个按钮切换                if (vm.current == 0) {                    api.toast({                        msg: '已经是第一个了',                        duration: 2000,                        location: 'bottom'                    })                } else {                    vm.current = vm.current - 1;                    api.setFrameGroupIndex({                        name: 'frame_detail_answer',                        index: vm.current                    });                }            },            winnextOnclick: function () {//右边下一个按钮切换                if (vm.current == vm.material.length - 1) {                    api.toast({                        msg: '已经是最后一个了',                        duration: 2000,                        location: 'bottom'                    })                } else {                    vm.current = vm.current + 1;                    api.setFrameGroupIndex({                        name: 'frame_detail_answer',                        index: vm.current                    });                }            },            itemClick: function (context) {//左边题号切换                vm.current = $(context).index();                api.setFrameGroupIndex({                    name: 'frame_detail_answer',                    index: vm.current                });            }        }    });    function closeWin() {        api.closeWin();    }    function postAiAnalysis() {        if(vm.aiAnalysis.count > 0) {            vm.aiAnalysis.count -= 1;        }    }</script></html>
