<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport"
        content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />
    <title>填空题</title>
    <link rel="stylesheet" type="text/css" href="../../css/publicCss.css" />
    <link rel="stylesheet" type="text/css" href="../../css/frameDetail.css" />
    <style>
        .tkt_content {
            display: none
        }
    </style>
</head>

<body>
    <div class="tkt_content" id="tkt_content">
        <div class="tkt_top">
            <ul>
                <li class="tixing clearfix">
                    <div class="tihao" v-text="(index+1)+'.'"></div>
                    <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>
                </li>
            </ul>
        </div>
        <div class="tkt_left" id="left" style="width: calc(60% - 53px);">
            <div class="tg_content font666" v-html="material.tg"></div>
        </div>
        <div class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">
            <div class="tkt_right_content">
                <div class="huakuai" id="huakuai"></div>
                <!--答题部分开始-->
                <dl v-if="showdati" class="tktda_content">
                    <dd v-for="(list , index) in material.daoptions"
                        :class="list.is_auto==1?'clearfix tkt_auto':'clearfix tkt_noauto'">
                        <span class="kong_list" v-text="'空'+(index+1)+'：'"></span>
                        <input v-if="list.is_auto==1" type="text" onchange="vm.shoudongpiyue(this);" :id="index"
                            :value="answer[index].descript[0]">
                        <textarea
                            v-if="list.is_auto==0 && answer[index].is_txt==1 && answer[index].is_unable==0 && is_show_textarea[index]==1"
                            class="tktextarea" :value="answer[index].descript[0]" placeholder="请输入要填写的答案" cols="30"
                            rows="10" maxlength="500" :id="index" onchange="vm.shoudongpiyue(this);"></textarea>
                        <ul class="tkt_kongimg clearfix">
                            <li v-if="list.is_auto==0 && answer[index].is_txt!=1 && answer[index].is_unable==0 && answer[index].descript.length>0"
                                v-for="(item ,index2) in answer[index].descript " class="tkt_img">
                                <img class="noImgClick" :id="index2" :topid="index" onclick="showImage(this)"
                                    v-if="answer[index].is_txt==0"
                                    :src="item.serverpath+item.savename+'?imageView2/2/w/300/h/300'"
                                    :fdsrc="item.serverpath+item.savename">
                                <img class="noImgClick" v-if="answer[index].is_txt==2" class="stop"
                                    src="../../image/startPlay.png">
                                <input v-if="answer[index].is_txt==2" class="myRange" type="range" min="0" value="0"
                                    max='10'>
                                <p v-if="answer[index].is_txt==2" class="fileTimeP" v-text="item.filetime"></p>
                                <img class="noImgClick" v-if="answer[index].is_txt==3" src="../../image/video_bg2.png ">
                                <div class="chacha" tapmode onclick="vm.deletePic(this);" :id="index2" :topid="index">
                                    <img class="noImgClick" src="../../image/newhomework/cha.png">
                                </div>
                            </li>
                            <li v-if="list.is_auto==0" class="tkt_addimg" :id="index" tapmode onclick="vm.choose(this)">
                                <img class="noImgClick" src="../../image/stuHomePad/dianji.png">
                            </li>
                        </ul>
                        <div class="tktbhz font4BC7C7" :id="index" tapmode onclick="vm.checded(this)">
                            <span :class="answer[index].is_unable==1?'inputCheckactive':''"></span>不会做
                        </div>
                    </dd>
                </dl>
                <!--答题部分结束-->
            </div>
        </div>
    </div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../script/vue.js"></script>
<script type="text/javascript" src="../../script/ThridJS/qiniu.min.js"></script>
<script type="text/javascript" src="../../script/12xueUpload.js"></script>
<!--<script type="text/javascript" src="../../script/common.js"></script>-->

<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    var uiMediaScanner;//打开相册需要的变量
    var queryHomewokAnswer;
    var compressListener = {//打开相册需要的变量
        allCount: 0,
        successCount: 0
    };
    var moduleDialog = null;//弹窗模块bhzparam
    var moduleImageScale = null;//图片放大旋转删除
    apiready = function () {
        moduleDialog = api.require('moduleDialog');
        moduleImageScale = api.require('moduleImageScale');
        moduleImageScale.dismissImage();//关模块
        dismissDialog();//关模块
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        vue();
        if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {
            queryHomewokAnswer = {};
        } else {
            queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));
        }

        for (var i = 0; i < vm.material.daoptions.length; i++) {//给初始化的自动填空加个默认空答案 防止报错
            var kongcontent = {
                'descript': [],
                'is_unable': 0,
                'is_txt': 0,
                'is_auto': vm.material.daoptions[i].is_auto
            };
            Vue.set(vm.answer, i, kongcontent);
        }
        if (queryHomewokAnswer.hasOwnProperty(vm.material.zyid)) {//缓存的答案
            vm.answer = queryHomewokAnswer[vm.material.zyid].da;
        }
        for (var i = 0; i < vm.answer.length; i++) {
            if (vm.answer[i].is_auto == 0) {
                if (vm.answer[i].descript.length > 0 && vm.answer[i].is_txt == 1) {
                    vm.is_show_textarea[i] = 1
                } else {
                    vm.is_show_textarea[i] = 0
                }
            }
        }
        api.addEventListener({// 裁剪图片保存
            name: 'cutPicture' + api.frameName
        }, function (ret, err) {
            var src = ret.value.src;
            var tkindex = ret.value.tkindex;
            vm.compressImage(tkindex, src);
            api.closeFrame({
                name: 'frame_cutPicture'
            });
        });
        api.addEventListener({// 画板
            name: 'DrawingBoardImg'
        }, function (ret, err) {
            if (ret.value.name == api.frameName && ret.value.type == 'huaban') {
                var imgsrc = ret.value.imgsrc;
                var xtindex = ret.value.tkindex;
                if (vm.answer[xtindex].is_txt == 1) {
                    vm.answer[xtindex].is_txt = 0;
                    vm.answer[xtindex].descript = [];
                } else {
                    vm.answer[xtindex].is_txt = 0;
                }
                vm.answer[xtindex].is_unable = 0;
                vm.qiniuUpfile(xtindex, imgsrc);
                api.closeWin({
                    name: 'Drawing_board'
                });
            }
        });
    };
    function vue() {
        vm = new Vue({
            el: '.tkt_content',
            data: {
                showdati: false,
                index: api.pageParam.index,//当前frame的索引
                material: api.pageParam.material,//当前习题资料
                complet: api.pageParam.complet,//答题状态
                answer: [],//答案数组
                is_show_textarea: [],//是否显示输入框（刚打开页面的时候）
                bhzparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 75,
                        "h": 150,
                        "w": 300
                    }, {
                        "viewType": 101,
                        "x": api.winWidth / 2 - 150 + 30,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,
                        "h": 48,
                        "w": 240,
                        "lineSpacting": 1.3,
                        "showText": "<font color='#666666'>选择不会做，会将您已经填写的答案清空，是否确定不会做？</font>",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 159,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "ok",
                        "showText": "确定",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 40,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "no",
                        "showText": "取消",
                        "textSize": 14
                    }]
                },
                paizhaoparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 89,
                        "h": 178,
                        "w": 300
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 89 + 41,
                        "h": 38,
                        "w": 150,
                        "clickID": "paizhao",
                        "showText": "拍照",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 89 + 41 + 58,
                        "h": 38,
                        "w": 150,
                        "clickID": "xiangce",
                        "showText": "从相册中选择",
                        "textSize": 14
                    }
                    ]

                },
                anniuparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 118,
                        "h": 236,
                        "w": 300
                    },
                    //     {
                    //     "viewType": 104,
                    //     "x": api.winWidth / 2 - 150 + 75,
                    //     "y": $api.getStorage('padHeight') / 2 - 118 + 40,
                    //     "h": 38,
                    //     "w": 150,
                    //     "clickID": "input",
                    //     "img": 'widget://image/newhomework/os_03.png',
                    //     "img_down": 'widget://image/newhomework/20_03.png'
                    //
                    // },
                    {
                        "viewType": 104,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 118 + 40,
                        "h": 38,
                        "w": 150,
                        "clickID": "img",
                        "img": 'widget://image/newhomework/os_06.png',
                        "img_down": 'widget://image/newhomework/20_06.png'

                    },
                    {
                        "viewType": 104,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 118 + 100,
                        "h": 38,
                        "w": 150,
                        "clickID": "input",
                        "img": 'widget://image/newhomework/os_03.png',
                        "img_down": 'widget://image/newhomework/20_03.png'

                    },
                    {
                        "viewType": 104,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 118 + 160,
                        "h": 38,
                        "w": 150,
                        "clickID": "shouxie",
                        "img": 'widget://image/newhomework/os_18.png',
                        "img_down": 'widget://image/newhomework/20_18.png'

                    }
                    ]
                },
                isPlaying: false,//老师留言是否播放中
            },
            created: function () {
                this.initDatePicker();
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
            },
            methods: {
                initDatePicker: function () {
                    this.$nextTick(function () {
                        api.hideProgress();
                        $('.tkt_content').show();
                        vm.showdati = true;
                        vm.huakuai();
                    })
                },
                huakuai: function () {
                    var tktcontent = document.getElementById('tkt_content'); //长线条
                    var right = document.getElementById('right'); //小方块
                    var left = document.getElementById('left');
                    var huakuai = document.getElementById('huakuai');
                    var ifBool = false; //判断鼠标是否按下
                    //鼠标按下方块
                    huakuai.addEventListener("touchstart", function (e) {
                        e.stopPropagation();
                        ifBool = true;
                    });
                    //拖动
                    window.addEventListener("touchmove", function (e) {
                        if (ifBool) {
                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x
                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标
                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值
                            if (minDiv_left >= tktcontent.offsetWidth - 43) {
                                minDiv_left = tktcontent.offsetWidth - 43;
                            }
                            //设置拖动后小方块的left值
                            var rightwidth;
                            var leftwidth;
                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {
                                rightwidth = $(window).width() * 0.7 + 37;
                                leftwidth = $(window).width() * 0.3 - 53;
                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {
                                rightwidth = $(window).width() * 0.4 + 37;
                                leftwidth = $(window).width() * 0.6 - 53;
                            } else {
                                rightwidth = $(window).width() - minDiv_left;
                                leftwidth = minDiv_left - 14
                            }
                            right.style.width = rightwidth + "px";
                            left.style.width = leftwidth + "px";
                        }
                    });
                    //鼠标松开
                    window.addEventListener("touchend", function (e) {
                        ifBool = false;
                    });

                    //获取元素的绝对位置

                },
                deletePic: function (context) {    //删除图片答案
                    var index;
                    var topindex;
                    index = parseInt($(context).attr('id'));
                    topindex = parseInt($(context).attr('topid'));
                    vm.answer[topindex].descript.splice(index, 1);//删除数据指定索引位置的url
                    vm.saveAnswer(vm.answer);
                },
                yuyin: function (audioItem, index) {
                    if (audioItem.type == 1) {
                        if (vm.isPlaying) {
                            api.stopPlay();
                            $('.img1').show();
                            $('.img2').hide();
                        } else {
                            $('.img1').show();
                            $('.img2').hide();
                            var audioName = audioItem.savename;
                            var path = "/audio/" + audioName + ".amr";
                            api.download({
                                url: audioItem.serverpath + "/" + audioItem.savename,
                                savePath: 'fs:/' + path,
                                report: false,
                                cache: false,
                                allowResume: false
                            }, function (ret, err) {
                                if (ret && ret.state == 1) {
                                    // 下载成功  ret.savePath
                                    isDownloading = false;
                                    api.startPlay({
                                        path: api.fsDir + path
                                    }, function (ret, err) {
                                        if (ret) {
                                            vm.isPlaying = false;
                                            $('.img1').show();
                                            $('.img2').hide();

                                        }
                                    });

                                    $('.yuyin3').eq(index).find('.img1').hide();
                                    $('.yuyin3').eq(index).find('.img2').show();
                                    $('.yuyin3').eq(index).siblings().find('.img1').show();
                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();
                                }
                            });
                        }
                        vm.isPlaying = !vm.isPlaying;
                    }

                },
                choose: function (context) {//打开手动批阅题选择答题方式的页面

                    //关闭学科课程填空题答题功能
                    api.toast({
                        msg:'答题功能已关闭'
                    })

                    return;



                    if (!checkPermission(['camera', 'storage'])) {
                        return;
                    }

                    var tkindex = $(context).attr('id');
                    moduleDialog.showDialog(vm.anniuparam, function (ret, err) {
                        if (ret.state == 'success' && ret.clickID) {
                            if (ret.clickID == 'input') {//输入
                                if (vm.answer[tkindex].descript.length > 0 && vm.answer[tkindex].is_txt == 1) {
                                    vm.answer[tkindex].is_txt = 1;
                                    Vue.set(vm.is_show_textarea, tkindex, 1);
                                    vm.answer[tkindex].is_unable = 0;
                                    vm.saveAnswer(vm.answer);
                                } else {
                                    vm.answer[tkindex].is_txt = 1;
                                    vm.answer[tkindex].descript = [];
                                    Vue.set(vm.is_show_textarea, tkindex, 1);
                                    vm.answer[tkindex].is_unable = 0;
                                    vm.saveAnswer(vm.answer);
                                }
                                dismissDialog();
                            } else
                                if (ret.clickID == 'img') {//图片
                                    dismissDialog();
                                    if (vm.getFileNum(tkindex, 0) >= 5) {
                                        api.toast({
                                            msg: "最多只能选择5张图片！",
                                            duration: 2000,
                                            location: 'bottom'
                                        });
                                        return;
                                    }
                                    var imgAccountMax = 5 - vm.getFileNum(tkindex, 0);// 还可以选择图片数量的最大值
                                    // moduleDialog.showDialog(vm.paizhaoparam, function (ret, err) {
                                    //     if (ret.state == 'success' && ret.clickID) {
                                    //         if (ret.clickID == 'xiangce') {//相册
                                    //             vm.openMediaScanner(tkindex, imgAccountMax);
                                    //             dismissDialog();
                                    //         } else if (ret.clickID == 'paizhao') {//拍照
                                    api.getPicture({
                                        sourceType: 'camera',
                                        encodingType: 'jpg',
                                        mediaValue: 'pic',
                                        destinationType: 'url',
                                        quality: 50
                                    }, function (ret, err) {
                                        if (ret) {//如果拍了照片
                                            if (ret.data.length > 0) {
                                                if (vm.answer[tkindex].is_txt == 1) {
                                                    vm.answer[tkindex].is_txt = 0;
                                                    vm.answer[tkindex].descript = [];
                                                } else {
                                                    vm.answer[tkindex].is_txt = 0;
                                                }
                                                vm.answer[tkindex].is_unable = 0;//会做
                                                // vm.compressImage(tkindex, ret.data);
                                                CutPictures(ret.data, tkindex);
                                            }
                                        } else {//如果点了取消

                                        }
                                    });
                                    dismissDialog();
                                    // }
                                    //     }
                                    // });

                                } else if (ret.clickID == 'shouxie') {//手写
                                    if (vm.getFileNum(tkindex, 0) >= 5) {
                                        api.toast({
                                            msg: "最多只能选择5张图片！",
                                            duration: 2000,
                                            location: 'bottom'
                                        });
                                        dismissDialog();
                                        return;
                                    }
                                    var imgAccountMax = 5 - vm.getFileNum(tkindex, 0);// 还可以选择图片数量的最大值
                                    api.openWin({
                                        name: 'Drawing_board',
                                        url: 'Drawing_board.html',
                                        pageParam: { name: api.frameName, type: 'huaban', tkindex: tkindex },
                                        slidBackEnabled: false
                                    });
                                    dismissDialog();
                                }
                        } else {

                        }

                    });
                },
                shoudongpiyue: function (context) {//手动批阅题文字的状态
                    var tkindex = $(context).attr('id');
                    // var answer = clear_emoji($(context).val().replace(/(^\s*)|(\s*$)/g, ""));
                    var answer = $(context).val().trim();
                    if (answer.length == 0) {
                        vm.answer[tkindex].descript = [];

                    } else {
                        vm.answer[tkindex].descript[0] = answer;
                    }
                    vm.answer[tkindex].is_txt = 1;
                    vm.answer[tkindex].is_unable = 0;
                    vm.saveAnswer(vm.answer);
                },
                checded: function (context) {//复选框不会做点击事件
                    $('textarea').blur();
                    var tktindex = $(context).attr('id');
                    if (vm.answer[tktindex].descript.length > 0) {
                        var param = vm.bhzparam;
                        param.data[1].showText = "<font color='#666666'>选择不会做，会将您已经填写的答案清空，是否确定不会做？</font>";
                        param.data[2].showText = "确定";
                        param.data[3].showText = "取消";
                        moduleDialog.showDialog(vm.bhzparam, function (ret, err) {
                            if (ret.state == 'success' && ret.clickID) {
                                if (ret.clickID == 'ok') {
                                    vm.answer[tktindex].descript = [];
                                    vm.answer[tktindex].is_unable = 1;//不会做
                                    vm.saveAnswer(vm.answer);
                                    dismissDialog();
                                } else {
                                    dismissDialog();
                                }
                            } else {

                            }
                        });
                    } else {
                        vm.answer[tktindex].descript = [];
                        vm.answer[tktindex].is_unable = 1;//不会做
                        vm.saveAnswer(vm.answer);
                    }
                },
                getFileNum: function (tkindex, isTxt) {//answer里面图片 视频 音频各自的数量
                    var num = 0;
                    for (i = 0; i < vm.answer[tkindex].descript.length; i++) {
                        if (vm.answer[tkindex].is_txt == isTxt) {
                            num = num + 1;
                        }
                    }
                    return num;
                },
                openMediaScanner: function (tkindex, max) {// 选择相册图片 可多选
                    if (!uiMediaScanner) {
                        uiMediaScanner = api.require('UIMediaScanner');
                    }
                    uiMediaScanner.open({
                        type: 'picture',
                        column: 4,
                        classify: true,
                        max: max ? max : 5,
                        sort: {
                            key: 'time',
                            order: 'desc'
                        },
                        texts: {
                            stateText: '已选*项',
                            cancelText: '取消',
                            finishText: '完成'
                        },
                        rotation: true,
                        styles: {
                            bg: '#fff',
                            mark: {
                                icon: '',
                                position: 'bottom_left',
                                size: 20
                            },
                            nav: {
                                bg: '#4bc7c7',
                                stateColor: '#fff',
                                stateSize: 18,
                                cancelBg: 'rgba(0,0,0,0)',
                                cancelColor: '#fff',
                                cancelSize: 18,
                                finishBg: 'rgba(0,0,0,0)',
                                finishColor: '#fff',
                                finishSize: 18
                            }
                        }
                    }, function (ret) {
                        if (ret) {
                            if (ret.eventType == 'confirm' && ret.list.length > 0) {//如果选了图片 点了确定
                                if (vm.answer[tkindex].is_txt == 1) {
                                    vm.answer[tkindex].is_txt = 0;
                                    vm.answer[tkindex].descript = [];
                                } else {
                                    vm.answer[tkindex].is_txt = 0;
                                }
                                vm.saveAnswer(vm.answer);
                                vm.answer[tkindex].is_unable = 0;//会做
                                compressListener.successCount = 0;
                                compressListener.allCount = ret.list.length;
                                for (var i = 0; i < ret.list.length; i++) {
                                    var selectImg = ret.list[i];
                                    // 获取图片的路径
                                    var selectimgPath = selectImg.path;
                                    var selectimgThumbPath = selectImg.thumbPath;
                                    // console.warn("image url :" + url);
                                    if (api.systemType == "ios") {
                                        uiMediaScanner.transPath({
                                            path: selectimgPath
                                        }, function (ret, err) {
                                            if (ret) {
                                                vm.compressImage(tkindex, ret.path);
                                            } else {
                                                alert("ios地址转换失败：" + JSON.stringify(err));
                                            }
                                        });
                                    } else {
                                        vm.compressImage(tkindex, selectimgPath);
                                    }
                                }
                            } else {
                            }
                            // console.log(JSON.stringify(ret));
                        } else {
                            alert("图片选择器打开失败");
                        }
                    });
                },
                getUrlName: function (url) {
                    var index = url.lastIndexOf("/");
                    var imgName;
                    if (api.systemType == 'ios') {
                        var idIndex = url.indexOf("id=");
                        if (idIndex != -1) {
                            var idStr = url.substr(idIndex);
                            var andIndex = url.indexOf("&");
                            imgName = url.substring(idIndex + 3, andIndex);
                        } else {
                            imgName = url.substring(index + 1);
                        }
                    } else {
                        imgName = url.substring(index + 1);
                    }
                    return imgName;
                },
                compressImage: function (tkindex, url) {// 图片压缩处理
                    var imageFilter = api.require('imageFilter');
                    var imgName = vm.getUrlName(url);
                    var quality;
                    if (api.systemType == 'ios') {
                        quality = 0.2;
                    } else {
                        quality = 0.8;
                    }
                    imageFilter.compress({
                        img: url,
                        quality: quality,
                        save: {
                            imgPath: "fs://img_compress/",
                            imgName: imgName + ".jpg"
                        }
                    }, function (ret, err) {
                        // console.log("compress result : ret=" + JSON.stringify(ret) + "  err:" + JSON.stringify(err));
                        if (ret.status) {
                            compressListener.successCount++;
                            var newimgurl = api.fsDir + "/img_compress/" + imgName + ".jpg";
                            vm.qiniuUpfile(tkindex, newimgurl);
                        } else {
                        }
                        imageFilter = '';
                    })
                },
                qiniuUpfile: function (tkindex, imgurl, type, index) {//上传图片
                    api.showProgress({
                        title: '正在上传图片',
                        text: '请稍后',
                        modal: true
                    });
                    var fileKey = (new Date()).valueOf() + imgurl;
                    apiObj.Get(UrlRouter.GetQiNiuToken, {
                        values: {
                            uid: $api.getStorage('uid'),
                            bucket: 'vodresource',
                            key: fileKey
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                var token = ret.data.token;
                                var trans = api.require('trans');
                                trans.decodeImgToBase64({
                                    imgPath: imgurl
                                }, function (ret, err) {

                                    if (ret.status) {

                                        var file = b64ImgToBlob(ret.base64Str);
                                        var observable = qiniu.upload(file, fileKey, token, qiniuPutExtra, qiniuConfig);
                                        observable.subscribe({
                                            next(res) {
                                                //进度
                                            },
                                            error(err) {
                                                // 失败报错信息
                                                api.toast({
                                                    msg: '图片上传失败' + err.message + err.code,
                                                    duration: 2000,
                                                    location: 'middle'
                                                });
                                            },
                                            complete(res) {
                                                // 上传成功
                                                var answerlist = {
                                                    'serverpath': QINIU_DOMAIN,
                                                    'savename': res.key,
                                                    'filetime': 0,
                                                    'Local_address': QINIU_DOMAIN + res.key
                                                }; //txt 0图片 2 音频  3视频   Local_address本地地址
                                                if (type == 'modulesave') {
                                                    Vue.set(vm.answer[tkindex].descript, index, answerlist);
                                                    vm.saveAnswer(vm.answer);
                                                } else {
                                                    vm.answer[tkindex].descript.push(answerlist);//把答案图片放在数组里
                                                    vm.saveAnswer(vm.answer);
                                                }
                                                api.hideProgress();
                                            }
                                        })
                                    } else {
                                        api.hideProgress();
                                        api.toast({
                                            msg: '图片转码失败，请重试',
                                            duration: 2000,
                                            location: 'middle'
                                        });

                                    }
                                })
                            } else {
                                api.hideProgress();
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }

                        } else {
                            api.hideProgress();
                            api.toast({
                                msg: '图片上传失败，请重新提交答案',
                                duration: 2000,
                                location: 'bottom'
                            });
                        }

                    }
                    );
                },
                saveAnswer: function (da) {//保存答案 发给win
                    var eachxtgroup = {
                        'is_auto': vm.material.is_auto,
                        'tx': vm.material.tx,
                        'xtid': vm.material.zyid,
                        'da': da,
                        'daoptions': vm.material.daoptions,
                        'tx_code': vm.material.tx_code,
                    };
                    api.sendEvent({
                        name: 'saveAnswerHuancun',
                        extra: {
                            eachxtgroup: eachxtgroup,
                            zyid: vm.material.zyid,
                        }
                    });
                }

            }
        });
    }

    function imgClick(context) {
        var src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        if (src.substring(src.length - 3) == 'gif') {
        } else {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    src
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
        }
    }

    function dismissDialog() {
        moduleDialog.dismissDialog();
    }
    function getPosition(node) {
        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left
        var top = node.offsetTop;
        current = node.offsetParent; // 取得元素的offsetParent
        // 一直循环直到根元素
        while (current != null) {
            left += current.offsetLeft;
            top += current.offsetTop;
            current = current.offsetParent;
        }
        return {
            "left": left,
            "top": top
        };
    }
    function showImage(context) {
        if ($api.getStorage('padType') != '1') {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    $(context).attr('fdsrc')
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
            return
        }
        var url = $(context).attr('fdsrc');
        var index = $(context).attr('id');
        var topindex = $(context).attr('topid');
        var param = { "deviceType": "deviceType_pad", "url": url };
        moduleImageScale.showImage(param, function (ret, err) {
            if (ret) {
                if (ret.state == "success" && ret.clickID == 'clickID_close') {
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_save') {
                    vm.qiniuUpfile(topindex, ret.imageSavePath, 'modulesave', index);
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_delete') {
                    vm.answer[topindex].descript.splice(index, 1);
                    vm.saveAnswer(vm.answer);
                    moduleImageScale.dismissImage();
                }
            } else {
                alert(JSON.stringify(err));
            }


        });

    }

            url: '../frame_cutPicture.html',
            rect: {
                x: 0,
                y: 0,
                w: 'auto',
                h: api.winHeight
            },
            pageParam: { src: src, frameName: api.frameName, tkindex: tkindex },
            bounces: false
        });
    }
