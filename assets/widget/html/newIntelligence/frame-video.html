<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>视频</title>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <style>
        [v-cloak] {
            display: none
        }
        .content{ position: relative; height: 100%}
        .videoDic {
            width:100%;
            height: 95%;
            text-align: center;
            margin-left: 20px
        }

        .videoDic video {
            max-width: 100%;
            min-width: 80%;
            max-height: 100%;
            object-fit: contain;
            background: #000;
        }

        img {
            max-width: 100%;
        }

        .main {
            width: 360px;
            height: 160px;
            position: absolute;
            top: calc(50% - 120px);
            left: calc(50% - 180px);
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            z-index: 2;
            padding-top: 12px;
        }

        .main h2 {
            height: 60px;
            line-height: 60px;
            font-size: 0.7rem;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
            border-bottom: 1px solid #e4e4e8;
        }

        .prompt {
            height: 25px;
            text-align: center;
        }

        .prompt span {
            height: 25px;
            line-height: 25px;
            font-size: 0.5rem;
            text-align: center;
            color: #ff3e3e;
            display: none;
        }

        input[type="text"] {
            width: 220px;
            height: 35px !important;
            min-height: 35px;
            border: 1px solid #4bc7c7;
            border-radius: 3px;
            text-align: center;
            font-size: 0.6rem;
            color: #999;
            margin: 0 auto
        }

        .main ul {
            width: 220px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .main ul li {
            height: 35px;
            line-height: 36px;
            font-size: 0.7rem;
            color: #fff;
            border-radius: 3px;
            background: #4bc7c7;
            float: left;
            width: 100px;
            text-align: center;
        }

        .main ul li + li {
            margin-left: 20px
        }
    </style>
</head>
<body>
<div class="content"  >
    <div class="videoDic" v-if="data.paystatus==1"  >
        <div class="swfDiv" v-text="data.title"  >在现场咨询</div>
        <video  controls id="my-video" :src="data.serverpath+data.preview_link" autoplay data-origin-x="20"
               data-origin-y="40" poster="../../image/video_bg.png"></video>
    </div>
    <div class="main" v-else>
        <h2>您暂未购买该视频，确定要购买吗？</h2>
        <ul>
            <li tapmode onclick="vm.quxiao()">取消</li>
            <li tapmode onclick="vm.sure()">确定</li>
        </ul>
    </div>
</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../script/vue.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript" src="../../script/fastclick.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function () {
        vm.GetPracticeMicroclassinfo(api.pageParam.hwid,api.pageParam.sxcid,api.pageParam.dyid);
    };
    var vm = new Vue({
        el: '.content',
        data: {
            data: ''
        },
        methods: {
            GetPracticeMicroclassinfo: function (hwid,sxcid,dyid) {
                api.showProgress({
                    title: '加载中',
                    text: '请稍后...',
                    modal: false
                });
                apiObj.Get(UrlRouter.GetPracticeMicroclassinfo, {
                    values: {
                        id:hwid,
                        sxcid: sxcid,
                        mac_addr:$api.getStorage('macAdress')
//                                            mac_addr:'A0:57:E3:60:8A:D6'
                    }
                }, function (ret, err) {
                    api.hideProgress();
                    if (ret) {
                        if (ret.ret == 0) {
                            api.hideProgress();
                            vm.data=ret.data;
                        } else {
                            api.toast(
                                    {
                                        msg: ret.msg,
                                        duration: 2000,
                                        location: 'bottom'
                                    }
                            )
                        }
                    } else {
                        api.toast(
                                {
                                    msg: err.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                }
                        )
                    }

                })
            },
            quxiao:function () {
                api.closeToWin({
                    name: 'win-stu-main'
                });
            },
            sure:function () {
                api.openWin({
                    name: 'win-Intelligence-Unlock',
                    url: 'win-Intelligence-Unlock.html',
                    pageParam: {
                        data:vm.data,
                        issaoma:true
                    }  ,
                    slidBackEnabled:  false
                });
            }
        }
    });
</script>
</html>
