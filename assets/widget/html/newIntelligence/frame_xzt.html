<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>选择题</title>    <link rel="stylesheet" type="text/css" href="../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../css/frameDetail.css"/>    <style>        .xzt_content {            display: none        }    </style></head><body><div class="xzt_content">    <div class="content">        <div class="stem">            <ul>                <li class="tixing clearfix">                    <div class="tihao" v-text="(index+1)+'.'"></div>                    <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>                </li>            </ul>            <div class="tg_content font666" v-html="material.tg"></div>            <div class="scyinpin clearfix" v-if="material.tx=='tdjh' && material.attachments">                <img class="scyp1 noImgClick"   src="../../image/newhomework/yuyinimg.png">                <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);" src="../../image/startPlay.png" alt="">                <div class="ypRange"><input class="myRange" type="range" min="0"  value="0"  :max='material.attachments[0].filetime' ></div>                <p class="ypTimeP"  v-text="getOutTime(material.attachments[0].filetime)"></p>                <audio class="hideenAudio" :src='material.attachments[0].serverpath + material.attachments[0].preview_link' ></audio>            </div><!--            <div class="tdjhxx"  v-if="material.tx=='tdjh'">--><!--                <p v-for="list in material.options" v-html="'<span>'+list.xx+'</span>'+'.'+list.description"></p>--><!--            </div>-->        </div>    </div>    <!--作答部分开始-->    <ul v-if="showdati" class="option">        <!--单选-->        <li v-for="list in material.options" v-if="material.tx!='duoxt'" :id="list.id" :class="answer[0]==list.id?'danxoption xxactive':'danxoption'" v-text="material.tx=='pdt'?list.description:list.xx" tapmode onclick="vm.xxselectClicked(this)"></li>        <!--多选-->        <li v-for="list in material.options" v-if="material.tx=='duoxt'" :id="list.id" :class="isdxactive(list.id)?'duoxoption xxactive':'duoxoption'" v-text="list.xx" tapmode onclick="vm.xxselectClicked(this)"></li>        <li class="bhz font4BC7C7" tapmode onclick="vm.checded(this)">            <span :class="is_unable==1?'inputCheckactive':''"></span>不会做        </li>    </ul>    <!--作答部分结束--></div></body><script type="text/javascript" src="../../script/api.js"></script><script type="text/javascript" src="../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../script/vue.js"></script><script type="text/javascript" src="../../script/common.js"></script><script type="text/javascript" src="../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var queryHomewokAnswer;    var allTimes = 0;//音频播放    var sec;    var timer = null;    apiready = function () {        api.showProgress({            title: '加载中',            text: '请稍后...',            modal: false        });        vue();            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {                queryHomewokAnswer = {};            } else {                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));            }            if (queryHomewokAnswer.hasOwnProperty(vm.material.zyid)) {//缓存的答案                vm.answer = queryHomewokAnswer[vm.material.zyid].da;                vm.is_unable = queryHomewokAnswer[vm.material.zyid].is_unable;            }        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if($api.domAll('.scyp2').length>=1){                if($('.scyp2').attr('playStatus')==1){                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                audioStreamer = api.require('audioStreamer');                $api.attr($api.dom('.scyp2'), 'src', '../../image/startPlay.png');                clearInterval(timer);                var hideenAudio = $api.dom('.hideenAudio');                hideenAudio.pause();            }        });    };    function vue() {        vm = new Vue({            el: '.xzt_content',            data: {                showdati:false,                index: api.pageParam.index,//当前frame的索引                material: api.pageParam.material,//当前习题资料                answer: [],//答案数组                complet: api.pageParam.complet,//答题状态                is_unable: 0,//是否会做 0会做 1不会做                isPlaying: false,//老师留言是否播放中            },            created: function () {                this.initDatePicker();            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                initDatePicker: function () {                    this.$nextTick(function () {                        api.hideProgress();                        $('.xzt_content').show();                        vm.showdati=true;                        FastClick.attach(document.body);                    })                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                isdxactive: function (xxid) {//判断多选选项是否选择了                    if (vm.answer.length > 0) {                        for (var i = 0; i < vm.answer.length; i++) {                            if (vm.answer[i] == xxid) {                                return true;                            }                        }                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    if (vm.material.tx == 'duoxt') {//判断是多选题 可以选多个答案                        if (vm.answer.length == 0) {                            vm.answer.push($(context).attr('id'));                            vm.is_unable = 0;//会做                            vm.saveAnswer(vm.is_unable, vm.answer);                        } else {                            for (var i = 0; i < vm.answer.length; i++) {                                if (vm.answer[i] == $(context).attr('id')) {                                    vm.answer.splice(i, 1);                                    if (vm.answer.length == 0) {                                        vm.is_unable = 1;//不会做                                    } else {                                        vm.is_unable = 0;//会做                                    }                                    vm.saveAnswer(vm.is_unable, vm.answer);                                    return;                                } else if (i == vm.answer.length - 1) {                                    vm.answer.push($(context).attr('id'));                                    vm.is_unable = 0;//会做                                    vm.saveAnswer(vm.is_unable, vm.answer);                                    return;                                }                            }                        }                    } else {//判断是单选 或者判断题 只有一个选项的                        Vue.set(vm.answer, 0, $(context).attr('id'));                        vm.is_unable = 0;//会做                        vm.saveAnswer(vm.is_unable, vm.answer);                    }                },                checded: function (context) {//复选框不会做点击事件                    vm.answer = [];                    vm.is_unable = 1;//不会做                    vm.saveAnswer(vm.is_unable, vm.answer);                },                saveAnswer: function (is_unable, da) {                    var eachxtgroup = {                        'is_auto': 1,                        'tx': vm.material.tx,                        'is_unable': is_unable,                        'xtid': vm.material.zyid,                        'da': da,                        'daoptions': vm.material.daoptions,                        'tx_code': vm.material.tx_code,                    };                    api.sendEvent({                        name: 'saveAnswerHuancun',                        extra: {                            eachxtgroup: eachxtgroup,                            zyid: vm.material.zyid,                        }                    });                },                studentRecord:function (context) {                    var url =   vm.material.attachments[0].serverpath + vm.material.attachments[0].preview_link;   // 获取一下  material.attachments[0].serverpath + material.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.material.attachments[0].filetime;  // 获取一下  filetime                    var hideenAudio = $api.dom('.hideenAudio');                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频                    if (playStatus == '0') {                        if (timer) {                            clearInterval(timer);                        }                        $api.attr(context, 'playStatus', '1');                        $api.attr($api.dom('.scyp2'), 'src', '../../image/stop.png');                        hideenAudio.play();                        sec = 0;                        allTimes = recodetime;                        timer = setInterval(function (e) {                            console.log(hideenAudio.currentTime +'  ' + sec);                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb =  sec/recodetime *100;   //2                            bfb = bfb.toFixed(2);//2                            var ss = 'background-size: '+bfb + '% 100%';//2                            if (allTimes == 0 || sec >= recodetime) {                                clearInterval(timer);                                $api.attr(context, 'playStatus', '0');                                $api.attr($api.dom('.scyp2'), 'src', '../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                            } else {                                range.value = sec;//                                range.onchange = function () {//                                    sec = parseInt(this.value);//                                    range.value = sec;//                                    hideenAudio.currentTime = sec;//                                    allTimes = recodetime - sec;//                                    var time = vm.getOutTime(allTimes);//                                    $api.text($api.dom('.ypTimeP'), time);//                                };                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);  //4                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    } else if (playStatus == '1') {                        $api.attr(context, 'playStatus', '2');                        $api.attr($api.dom('.scyp2'), 'src', '../../image/startPlay.png');                        clearInterval(timer);                        hideenAudio.pause();                    } else {                        $api.attr(context, 'playStatus', '1');                        hideenAudio.play();                        $api.attr($api.dom('.scyp2'), 'src', '../../image/stop.png');                        timer = setInterval(function (e) {                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb =  sec/recodetime *100;    //5                            bfb = bfb.toFixed(2);   //5                            var ss = 'background-size: '+bfb + '% 100%';  //5                            if (allTimes == 0 || sec >= recodetime) {                                $api.attr(context, 'playStatus', '0');                                clearInterval(timer);                                $api.attr($api.dom('.scyp2'), 'src', '../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6                            } else {                                range.value = sec;//                                range.onchange = function () {//                                    sec = parseInt(this.value);//                                    range.value = sec;//                                    hideenAudio.currentTime = sec;//                                    allTimes = recodetime - sec;//                                    var time = vm.getOutTime(allTimes);//                                    $api.text($api.dom('.ypTimeP'), time);//                                };                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);    //7                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    }                },                getOutTime: function (intime) {                    var outTime = '';                    if(intime<=9){                        outTime = '00:0'+intime;                    }else if(intime<59){                        outTime = '00:'+intime;                    }else {                        var min =parseInt(intime/60);                        var sec = intime%60;                        if(sec<=9){                            if(min>0&&min<10){                                outTime ='0'+ min+ ':0' + sec ;                            }else if(min>=10){                                outTime = min+ ':0' + sec ;                            }else{                                outTime = '00:0'+sec;                            }                        }else{                            if(min>0&&min<10){                                outTime ='0'+ min + ':'+ sec ;                            }else if(min>=10){                                outTime = min + ':'+ sec ;                            }else {                                outTime = '00:'+sec;                            }                        }                    }                    return outTime;                }            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if (src.substring(src.length - 3) == 'gif') {        } else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });        }    }</script></html>
