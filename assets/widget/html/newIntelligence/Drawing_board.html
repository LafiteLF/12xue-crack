<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <link rel="stylesheet" type="text/css" href="../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../css/winDetailCss.css"/>    <link rel="stylesheet" type="text/css" href="../../css/drawing_board.css"/>    <title>Title</title>    <style>        .winTitle {            width: calc(100% - 631px);        }    </style></head><body><header class="clearfix">    <div onclick=" closeframe() " class="winTitle pull_left">        手写板    </div>    <ul class="pull_right clearfix winIcon" id="baocun">        <li class="buttonTwo font4BC7C7 baocun pull_right" tapmode="active" onclick="save()"><p>保存</p></li>        <!--<li class="buttonTwo font4BC7C7 qiongkong pull_right" tapmode="active" onclick="clear1()"><p>清空</p></li>-->    </ul></header><div id="wrap">    <div id="main">        <div class="inputzi">            <input id="pollting" value="要添加的文字"/>            <input id="color" value="颜色"/>            <input id="width" value="宽度"/></div>        <div class="content" style="background: #e3e3e3;">        </div>        <div class="tool" :style="isRedoButton?'background: none':''">            <ul v-if="!isRedoButton">                <li class="clickbtn3" tapmode="active" onclick="clear1()">                </li>                <li class="clickbtn1" tapmode="active" onclick="undo()">                    <!--<img src="../../../image/newhomework/vvx_03.png">-->                </li>                <li class="clickbtn2" tapmode="active" onclick="redo()">                </li>                <li tapmode="active">                    <p :style="'background:'+color" class="choose_color"  onclick="vm.chooseColor()"></p>                    <div class="colors">                        <span tapmode id="1" onclick="setColor(this) " style="background-color:#000"></span>                        <span tapmode id="2" onclick="setColor(this)" style="background-color:#4969e4"></span>                        <span tapmode id="3" onclick="setColor(this)" style="background-color:#e34949"></span>                    </div>                </li>                <li class="clickbtn" tapmode="active" onclick="changethin()"><img                        :src="'../../image/newhomework/thin'+ thin +'.png'"></li>                <li class="clickbtn" tapmode="active" onclick="setState1()"><img                        :src="activeButton==1?'../../image/newhomework/vvx_08a.png':'../../image/newhomework/vvx_08.png'"></li>                <!--<li class="clickbtn" tapmode="active" onclick="setState6()"><img-->                        <!--:src="activeButton==6?'../../image/newhomework/vvx_10a.png':'../../image/newhomework/vvx_10.png'"></li>-->                <li class="clickbtn" tapmode="active" onclick="setState5()"><img                        :src="activeButton==5?'../../image/newhomework/vvx_12a.png':'../../image/newhomework/vvx_12.png'"></li>                <li class="clickbtn" tapmode="active" onclick="setState2()"><img                        :src="activeButton==2?'../../image/newhomework/vvx_18a.png':'../../image/newhomework/vvx_18.png'"></li>                <li class="clickbtn" tapmode="active" onclick="setState4()"><img                :src="activeButton==4?'../../image/newhomework/vvx_14a.png':'../../image/newhomework/vvx_14.png'"></li>                <li class="clickbtn" tapmode="active" onclick="setState3()"><img                        :src="activeButton==3?'../../image/newhomework/vvx_16a.png':'../../image/newhomework/vvx_16.png'"></li>            </ul>            <ul v-if="isRedoButton" class="RedoButton">                <li id="jixu" onclick="isRedoButton(this)">                    <img src="../../image/newhomework/jxzt.png">                    <p>继续作图</p>                </li>                <li id="chongzuo"  onclick="isRedoButton(this)">                    <img src="../../image/newhomework/cxzt.png">                    <p>重新作图</p>                </li>            </ul>            <!--<div class="clickbtn" tapmode="active" onclick="showView()">添加涂鸦View</div>-->            <!--<div class="clickbtn" tapmode="active" onclick="removeView()">移除涂鸦View</div>-->            <!--<div class="clickbtn" tapmode="active" onclick="setColor()">颜色</div>-->            <!--<div class="clickbtn" tapmode="active" onclick="setWidth()">宽度</div>-->            <!--&lt;!&ndash;<div class="clickbtn" tapmode="active" onclick="selectTime()">选择日期</div>&ndash;&gt;-->        </div>    </div></div></body><script type="text/javascript" src="../../script/api.js"></script><script type="text/javascript" src="../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../script/vue.js"></script><script type="text/javascript" src="../../script/wx-audio.js"></script><script type="text/javascript" src="../../script/common.js"></script><script type="text/javascript" src="../../script/fastclick.js"></script><script type="text/javascript">    var moduleplotting = null;    var type;    var name;    var imgsrc;    var xzcolor;    var lineWidth;    var huabanx;    var huabany;    var huabanw;    var huabanh;    var vm;    var state;    apiready = function () {        vue();        moduleplotting = api.require('moduleplotting');        type = api.pageParam.type;        name = api.pageParam.name;        huabanx = 20;        huabany = 60;        huabanw = api.winWidth - 100;        huabanh = $api.getStorage('padHeight') - 70;        if (type == 'huaban' || type == '4') {            imgsrc = "widget://image/newhomework/di.png";        }else if(type == '3'){            imgsrc = api.pageParam.imgUrl;        }else if(type == '2'){            var ztimgindex =  api.pageParam.ztimgindex;            if(api.pageParam.answerImgUrl[ztimgindex]){                imgsrc = api.pageParam.answerImgUrl[ztimgindex].serverpath+api.pageParam.answerImgUrl[ztimgindex].savename;                vm.isRedoButton=true;            }else{                imgsrc = api.pageParam.imgUrl;                vm.isRedoButton=false;            }        }        xzcolor = '#000000';        lineWidth = 3;        state = 1;        showView();        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            closeframe();        });    };    function vue() {        vm = new Vue({            el: '#wrap',            data: {                color: '#000000',                activeButton:1,                thin:1,                type:api.pageParam.type,                isRedoButton:false,//是否重做按钮            },            updated: function () {            },            methods: {                chooseColor: function () {                    if(vm.activeButton==5){                        api.toast({                            msg: '对不起，橡皮擦状态下无法选择颜色~',                            duration: 2000,                            location: 'bottom'                        });                    }else {                        $('.colors').show();                        $('.choose_color').hide();                    }                },            }        });    }    function isRedoButton (content) {        var ischongzuo=$(content).attr('id');        vm.isRedoButton=false;        if(ischongzuo=='chongzuo'){            imgsrc = api.pageParam.imgUrl;            moduleplotting.removeView(function (ret, err) {                if (ret && ret.state == 'success') {                    showView();                }else{                    api.hideProgress();                }            });        }else{            setState1();        }    }    function showView() {        api.showProgress({            title: '加载中',            text: '请稍后...',            modal: false        });        var param = {"x": huabanx, "y": huabany, "w": huabanw, "h": huabanh, "url": imgsrc};        moduleplotting.addView(param, function (ret, err) {            if (ret.state == 'success') {                api.hideProgress();                if(vm.isRedoButton==true){                    setState5()                }else{                    setState1();                }            } else {                api.hideProgress();                alert('图片没有出来,返回再试试吧 (T＿T)');            }        });    }    function changethin() {        if(vm.thin == '1'){            vm.thin = '2';            lineWidth = 9;        }else if(vm.thin == '2'){            vm.thin = '3';            lineWidth = 27;        }else if(vm.thin == '3'){            vm.thin = '1';            lineWidth = 3;        }        var param = {"state": state,"color": vm.color,"width": lineWidth};        moduleplotting.setState(param, function (ret, err) {            vm.activeButton = state;        });    }    function setState1() {        state = 1;        var param = {"state": state, "color": vm.color, "width": lineWidth};        moduleplotting.setState(param, function (ret, err) {            vm.activeButton=1;        });    }    function setState2() {        state = 2;        var param = {"state": state, "color": vm.color, "width": lineWidth};        moduleplotting.setState(param);        vm.activeButton=2;    }    function setState3() {        state = 3;        var param = {"state": state, "color": vm.color, "width": lineWidth};        moduleplotting.setState(param);        vm.activeButton=3;    }    function setState4() {        state = 4;        var param = {"state": state, "color": vm.color, "width": lineWidth};        moduleplotting.setState(param);        vm.activeButton=4;    }    function setState5() {        state = 5;        var param = {"state": state,"width": 10};        moduleplotting.setState(param);        vm.activeButton=5;        $('.colors').hide();        $('.choose_color').show();    }    function setState6() {        api.prompt({            buttons: ['确定', '取消']        }, function(ret, err) {            if(ret.buttonIndex==1){                var mill = ret.text;                var param = {"state": 6, "b": mill,"width":50,"color": vm.color};                moduleplotting.setState(param);                vm.activeButton = 6;            }        });    }    function setColor(context) {        if ($(context).attr('id') == '1') {            vm.color = '#000000'        } else if ($(context).attr('id') == '2') {            vm.color = '#4969e4'        } else if ($(context).attr('id') == '3') {            vm.color = '#e34949'        }        $('.colors').hide();        $('.choose_color').show();        var param = {"color": vm.color};        moduleplotting.setColor(param);    }    function setWidth() {        var param = {"width": lineWidth};        moduleplotting.setWidth(param);    }    function save() {        $('#baocun').hide();        api.showProgress({            title: '加载中',            text: '请稍后...',            modal: false        });        moduleplotting.save(function (ret, err) {            imgsrc = ret.path;            moduleplotting.removeView(function (ret, err) {                if (ret && ret.state == 'success') {                    api.hideProgress();                    // showView();                    api.sendEvent({                        name: 'DrawingBoardImg',                        extra: {                            name: api.pageParam.name,                            type: api.pageParam.type,                            imgsrc: imgsrc,                            tkindex: api.pageParam.tkindex,                            ztimgindex:api.pageParam.ztimgindex,                        }                    });                }else{                    api.hideProgress();                    $('#baocun').show();                    alert('保存失败，请重新保存！')                }            });        });    }    function clear1() {        moduleplotting.clear();    }    function redo() {        moduleplotting.redo();    }    function undo() {        moduleplotting.undo();    }    function removeView() {        moduleplotting.removeView();    }    function closeframe() {        api.confirm({            title: '退出将无法保存写画内容，请问是否退出？',            buttons: ['退出', '不退出']        }, function (ret, err) {            if (ret.buttonIndex == 1) {                api.showProgress({                    title: '加载中',                    text: '请稍后...',                    modal: false                });                moduleplotting.removeView(function (ret, err) {                    if (ret.state == 'success') {                        api.hideProgress();                        // showView();                        // api.closeWin();                    }                });                api.closeWin();            }        });    }</script></html>
