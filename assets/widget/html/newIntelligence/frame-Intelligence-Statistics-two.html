<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport"
        content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css" />
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css" />
    <style>
        html {
            font-size: 62.5% !important;
        }

        /*[v-cloak] {*/
        /*display: none*/
        /*}*/
        /*.content{ display: none}*/
        body {
            background: url("../../image/stuHomePad/qb.png") no-repeat bottom #f9f9f9;
            background-size: 100%;
        }

        .clearfix:before,
        .clearfix:after {
            content: " ";
            display: table;
        }

        .clearfix:after {
            clear: both;
        }

        /*清除浮动*/
        .content {
            width: 100%;
            height: 100%;
            padding-top: 32px;
        }

        .top {
            width: 50%;
            position: absolute;
            left: 5%;
            top: 30px;
            height: 200px;
            background: #e0f4f4;
            border: 1px dashed #bfbfbf;
            padding: 13px 0px;
            border-radius: 6px;
        }

        .ltimg,
        .rtimg {
            width: 75px;
            position: absolute;
            top: -16px;
        }

        .ltimg {
            left: -38px;
        }

        .rtimg {
            right: -38px;
        }

        .top-left,
        .bottom-left {
            width: 100%;
            float: left;
            height: 100%
        }

        .top h2 {
            font-size: 16px;
            color: #333333;
            text-align: center;
            margin: 0px;
            padding: 10px 0px;
        }

        .lflj,
        .rflj {
            width: 20px;
            position: absolute;
            bottom: -39px;
        }

        .lflj {
            left: 20px
        }

        .rflj {
            right: 20px
        }

        .bottom {
            width: 50%;
            position: absolute;
            left: 5%;
            top: 238px;
            height: calc(100% - 258px);
            margin: 0;
            background: #fff;
            border: 1px dashed #bfbfbf;
            padding: 23px 0 5px 0;
            border-radius: 6px;
            overflow-y: auto;
        }

        .bottom-left {
            padding: 0 20px;

        }

        .bottom-left h2 {
            height: 20px;
            border-left: 4px solid #00c8c8;
            font-size: 16px;
            color: #666;
            padding-left: 20px;
            margin: 20px 0 10px 0;
        }

        .bottom-left ul li {
            float: left;
            height: 30px;
            width: 30px;
            border-radius: 100px;
            font-size: 14px;
            text-align: center;
            line-height: 30px;
            ;
            margin: 5px;
        }

        .istrue li {
            border: 1px solid #00c8c8;
            color: #00c8c8;
        }

        .isfalse li {
            border: 1px solid #df7605;
            color: #df7605;
        }

        .isweipi li {
            border: 1px solid #d5d5d5;
            color: #d5d5d5;
        }

        .isweipi {
            border-bottom: none
        }

        .bottom-left ul {
            padding-bottom: 10px;
            border-bottom: 1px dashed #bfbfbf
        }

        .quan {
            width: 100px;
            height: 100px;
            border: 1px solid #fff;
            border-radius: 1000px;
            margin: 0 auto;
            margin-top: 5px;
            padding: 7px;
        }

        .zql {
            width: 100%;
            height: 100%;
            border-radius: 1000px;
            background: #fff;
        }

        .bottom-left ul:nth-of-type(3) {
            border-bottom: none
        }

        /* 右侧板块样式对齐 frame_answer_statics.html */
        .righttop {
            width: 38%;
            position: absolute;
            left: 57%;
            top: 30px;
            background: #fff;
            height: 200px;
            border-radius: 6px;
            border: 1px dashed #bfbfbf;
            padding: 15px;
            box-sizing: border-box;
        }

        .difficulty-analysis {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .difficulty-title {
            font-size: 1.6rem;
            color: #333;
            margin-bottom: 20px;
            padding-left: 10px;
            position: relative;
        }

        .difficulty-title:before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 16px;
            background: #4bc7c7;
            border-radius: 2px;
        }

        .pie-chart-container {
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            height: 140px;
            margin-top: 10px;
        }

        .pie-chart {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        .pie-legend {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .pie-legend ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 1.3rem;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 8px;
            display: inline-block;
        }

        .legend-label {
            color: #666;
        }

        .rightbottom {
            width: 38%;
            position: absolute;
            left: 57%;
            top: 238px;
            background: #fff;
            height: calc(100% - 258px);
            border-radius: 6px;
            border: 1px dashed #bfbfbf;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .knowledge-analysis {
            width: 100%;
            height: 100%;
        }

        .knowledge-title {
            font-size: 1.6rem;
            color: #333;
            margin-bottom: 20px;
            padding-left: 10px;
            position: relative;
            display: flex;
            align-items: baseline;
            flex-wrap: nowrap;
            white-space: nowrap;
            flex-direction: row;
        }

        .knowledge-title:before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 16px;
            background: #4bc7c7;
            border-radius: 2px;
        }

        .knowledge-subtitle {
            font-size: 1.2rem;
            color: #999;
            margin-left: 8px;
            font-weight: normal;
            display: flex;
            flex-wrap: nowrap;
        }

        .knowledge-list {
            margin-top: 15px;
        }

        .knowledge-item {
            margin-bottom: 15px;
            padding: 12px 0;
        }

        .knowledge-item:last-child {
            border-bottom: none;
        }

        .knowledge-name {
            font-size: 1.4rem;
            color: #333;
            line-height: 1.4;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .knowledge-stats {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .knowledge-progress {
            font-size: 1.3rem;
            font-weight: bold;
            min-width: 45px;
        }

        .knowledge-progress.excellent {
            color: #4bc7c7;
        }

        .knowledge-progress.good {
            color: #ff9500;
        }

        .knowledge-progress.poor {
            color: #ff4663;
        }

        .knowledge-count {
            font-size: 1.2rem;
            color: #999;
        }

        .knowledge-progress .percentage {
            font-weight: bold;
        }

        .knowledge-progress.excellent .percentage {
            color: #4bc7c7;
        }

        .knowledge-progress.good .percentage {
            color: #ff9500;
        }

        .knowledge-progress.poor .percentage {
            color: #ff4663;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="top clearfix">
            <img class="lflj" src="../../image/stuHomePad/tj.png">
            <img class="rflj" src="../../image/stuHomePad/tj.png">
            <div class="top-left">
                <h2>答题情况</h2>
                <div class="quan">
                    <div class="zql" :style="isweipi>0?'display:none':''">
                        <p style="font-size: 26px; text-align: center;padding-top: 16px; "
                            :style="accuracy>=80?'color:rgba(75, 199, 199, 0.87)':'color:rgba(255, 70, 99, 0.87)'"><span
                                v-text="accuracy"></span><span style="font-size: 18px">%</span></p>
                        <p style="font-size: 14px; color: #333; text-align: center">正确率</p>
                    </div>
                    <div class="zql" :style="isweipi>0?'':'display:none'">
                        <p
                            style="font-size: 16px; color: #d5d5d5; text-align: center;height: 84px; line-height: 84px; ">
                            待批阅</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom clearfix">
            <div class="bottom-left">
                <h2 v-text="'答对:'+istrue+'题'"></h2>
                <ul class="clearfix istrue">
                    <li v-for="list in data.data" :class=" list.is_true==1?'':'aui-hide'" v-text="list.keys"></li>
                </ul>
                <h2>
                    <span v-text="'答错:'+isfalse+'题'"></span>
                    <span style="font-size: 14px;color:#9a9a9a" v-text="isunable>0?'（不会做的习题算答错）':''"></span>
                </h2>
                <ul class="clearfix isfalse">
                    <li v-for="list in data.data" :class=" list.is_true==2 || list.is_true==3?'':'aui-hide'"
                        v-text="list.keys"></li>
                </ul>
                <h2 v-text="'待批:'+isweipi+'题'"></h2>
                <ul class="clearfix isweipi">
                    <li v-for="list in data.data" :class=" list.is_true==0?'':'aui-hide'" v-text="list.keys"></li>
                </ul>
            </div>
        </div>
        <div class="righttop">
            <div class="difficulty-analysis">
                <div class="difficulty-title">题目难度分布</div>

                <div class="pie-chart-container">
                    <div class="pie-chart" :style="pieChartStyle"></div>
                    <div class="pie-legend">
                        <ul>
                            <li class="legend-item">
                                <span class="legend-color" :style="{ backgroundColor: pieColors.ry }"></span>
                                <span class="legend-label">容易：{{ nyd.ry }} 题 ({{ getPercentage(nyd.ry) }}%)</span>
                            </li>
                            <li class="legend-item">
                                <span class="legend-color" :style="{ backgroundColor: pieColors.yb }"></span>
                                <span class="legend-label">一般：{{ nyd.yb }} 题 ({{ getPercentage(nyd.yb) }}%)</span>
                            </li>
                            <li class="legend-item">
                                <span class="legend-color" :style="{ backgroundColor: pieColors.kn }"></span>
                                <span class="legend-label">困难：{{ nyd.kn }} 题 ({{ getPercentage(nyd.kn) }}%)</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div class="rightbottom">
            <div class="knowledge-analysis">
                <div class="knowledge-title">
                    知识点统计
                    <span class="knowledge-subtitle">（主观题待批习题暂时不计入统计）</span>
                </div>
                <div class="knowledge-list">
                    <div v-if="zsd.length === 0" class="knowledge-item"
                        style="text-align: center; color: #999; padding: 40px 0;">
                        暂无知识点数据
                    </div>
                    <div v-for="(item, index) in zsd" :key="item.zsdid" class="knowledge-item">
                        <div class="knowledge-name" v-text="item.zsdmc"></div>
                        <div class="knowledge-stats">
                            <div class="knowledge-progress" :class="getProgressClass(item.avg)">
                                <span style="color: #999;">掌握程度：</span><span class="percentage">{{
                                    formatProgress(item.avg) }}</span>
                            </div>
                            <div class="knowledge-count">（共{{ item.total }}题）</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../script/vue.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript" src="../../script/fastclick.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var arcProgress;
    apiready = function () {
        vm.GetPracticeBoutiqueHwStatistics(api.pageParam.data, api.pageParam.xt_type);
    };

    var vm = new Vue({
        el: '.content',
        data: {
            data: '',
            istrue: 0,
            isfalse: 0,
            isweipi: 0,
            isunable: 0,
            olddata: '',
            accuracy: 0,
            totalQuestions: 0,
            zsd: [], // 知识点数据
            nyd: {},
            // 添加饼图颜色配置
            pieColors: {
                ry: '#4bc7c7', // 容易 (蓝色)
                yb: '#FF9500', // 一般 (橙色)
                kn: '#FF4663'  // 困难 (红色)
            }
        },
        updated: function () {
            $api.css($api.dom('.content'), 'display:block');
        },
        // computed 对象
        computed: {
            // 检查是否有有效题目
            hasValidQuestions: function () {
                return this.data.length > 0;
            },
            // 生成饼图的 style 对象
            pieChartStyle: function () {
                const total = this.totalQuestions;
                if (total === 0) {
                    // 如果没有题目，显示一个灰色的圆
                    return { backgroundImage: `conic-gradient(#eee 0% 100%)` };
                }

                const ryPercent = (this.nyd.ry / total) * 100;
                const ybPercent = (this.nyd.yb / total) * 100;

                // 计算各个颜色段的起止点
                const ryEnd = ryPercent;
                const ybEnd = ryPercent + ybPercent;

                // 使用上面定义的颜色，构建 conic-gradient 字符串
                const gradient = `conic-gradient(
                        ${this.pieColors.ry} 0% ${ryEnd}%,
                        ${this.pieColors.yb} ${ryEnd}% ${ybEnd}%,
                        ${this.pieColors.kn} ${ybEnd}% 100%
                    )`;

                return { backgroundImage: gradient };
            }
        },
        methods: {
            // 根据正确率获取样式类名
            getProgressClass: function (zql) {
                var percentage = Math.round(zql * 100);
                if (percentage >= 80) {
                    return 'excellent';
                } else if (percentage >= 60) {
                    return 'good';
                } else {
                    return 'poor';
                }
            },
            // 格式化正确率显示 - 保留1位小数，四舍五入
            // formatProgress: function (avg) {
            //     if (typeof avg !== 'number' || isNaN(avg)) return '0.0%';
            //     return (Math.round(avg * 1000) / 10).toFixed(1) + '%';
            // },
            formatProgress: function (avg) {
                return Math.round(avg * 100) + '%';
            },
            // 格式化难度显示文字
            formatDifficultyText: function (count) {
                var total = vm.nyd.total;
                count = Number(count) || 0;
                return count + '/' + total;
            },
            // 计算百分比
            getPercentage: function (count) {
                var total = vm.nyd.total;
                if (total === 0) return 0;
                return Math.round((count / total) * 100);
            },

            GetPracticeBoutiqueHwStatistics: function (data, xt_type) {
                api.showProgress({
                    title: '加载中',
                    text: '请稍后...',
                    modal: false
                });
                apiObj.Get(UrlRouter.GetPracticeBoutiqueHwStatistics, {
                    values: {
                        uid: $api.getStorage('uid'),
                        kcid: data.id,
                        jieid: data.jieid,
                        xt_type: xt_type,
                        version: data.version,
                        push_num: 0
                    }
                }, function (ret, err) {
                    api.hideProgress();
                    if (ret) {
                        if (ret.ret == 0) {
                            api.hideProgress();
                            vm.data = ret.data;
                            vm.nyd = ret.data.nyd;
                            vm.totalQuestions = ret.data.nyd.total;
                            // 设置知识点数据并按 avg 从高到低排序
                            var zsdData = ret.data.zsd || [];
                            if (zsdData.length > 0) {
                                zsdData.sort(function (a, b) {
                                    return b.avg - a.avg;
                                });
                            }
                            vm.zsd = zsdData;
                            for (var i = 0; i < vm.data.data.length; i++) {
                                if (vm.data.data[i].is_true == 1) {
                                    vm.istrue++
                                } else if (vm.data.data[i].is_true == 2 || vm.data.data[i].is_true == 3) {
                                    vm.isfalse++
                                } else {
                                    vm.isweipi++;
                                }
                                if (vm.data.data[i].is_unable == 1) {
                                    vm.isunable++
                                }
                            }
                            if (vm.isweipi == 0) {
                                vm.accuracy = vm.data.accuracy
                            } else {
                                vm.accuracy = 0;
                            }
                            arcProgress = api.require('arcProgress');
                            var centerX;
                            centerX = api.frameWidth * 0.3;
                            var pgcolor;
                            if (vm.accuracy >= 80) {
                                pgcolor = '#4bc7c7'
                            } else {
                                pgcolor = '#ff4663'
                            }
                            arcProgress.open({
                                type: 'annular',
                                centerX: centerX,
                                centerY: 143,
                                radius: 45,
                                loopWidth: 7,
                                bgColor: '#dedede',
                                pgColor: pgcolor,
                                fixed: false,
                                fixedOn: 'frame-Intelligence-Statistics-two'
                            }, function (ret, err) {
                                arcProgress.setValue({
                                    id: ret.id,
                                    value: vm.accuracy
                                });
                            });

                        } else {
                            api.toast(
                                {
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                }
                            )
                        }
                    } else {
                        api.toast(
                            {
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            }
                        )
                    }

                })
            }
        }
    });
</script>

</html>
