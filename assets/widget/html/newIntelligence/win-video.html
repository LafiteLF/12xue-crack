    apiready = function () {
        var header = document.querySelector('header');
//        //$api.fixStatusBar(header);
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'frame-video',
            url: 'frame-video.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            pageParam: {
                hwid:api.pageParam.hwid,
                sxcid:api.pageParam.sxcid,
                dyid:api.pageParam.dyid
            },
            bounces: false
        });

    };
