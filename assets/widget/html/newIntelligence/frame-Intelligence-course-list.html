<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>智能导练</title>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui-pull-refresh.css"/>
    <style>
        * {
            box-sizing: border-box;
        }

        [v-cloak] {
            display: none !important;
        }

        img {
            display: block;
        }

        html {
            background: #f2f2f2;
            height: 100%;
            width: 100%;
        }

        body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        .content {
            width: 100%;
            height: 100%;
            padding: 10px;
            /*display: none;*/
        }

        ul li {
            float: left;
            width: calc(25% - 20px);
            height: 220px;
            margin: 9px;
            border-radius: 3px;
            background: #fff;
            overflow: hidden;
        }

        .item {
            background: #fff;
            height: 100%;
            width: 100%;
            position: relative;
            background-size: 35% !important;
        }

        .button {
            height: 40px;
            line-height: 40px;
            color: #fff;
            font-size: 0.6rem;
            text-align: center;
            width: 100%;
            background: #4bc7c7;
            position: absolute;
            bottom: 0px;
        }

        .ggzt {
            width: 25%;
            position: absolute;
            right: 0;
            top: 0
        }

        .title {
            width: 90%;
            margin: 0 auto;
            text-align: center;
            font-size: 0.8rem;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            padding: 0px;
            height: 93px;
            padding-top: 30px;
            line-height: 30px;
            /* text-overflow: ellipsis; */
            /* white-space: nowrap; */
        }

        .dymc {
            width: 90%;
            margin: 0 auto;
            text-align: center;
            font-size: 0.6rem;
            color: #666;
            height: 60px;
            line-height: 60px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .nyd {
            width: 100%;
            height: 20px;
            text-align: center;
        }

        .nyd img {
            height: 20px;

        }

        .suo {
            width: 100%;
            position: absolute;
            height: 100%;
            background: url("../../image/suo.png") no-repeat center center rgba(0, 0, 0, 0.4);
            right: 0;
            top: 0;
            z-index: 20;
            background-size: 30%;
        }

        .clearfix:before,
        .clearfix:after {
            content: " ";
            display: table;
        }

        .clearfix:after {
            clear: both;
        }

        /* .aui-refresh-content {
            height: 100%
        } */

        .kong {
            width: 100%;
            height: 100%;
            background: url('../../image/kongbg.png') no-repeat center center;
            background-size: 278px auto;
            margin: 0 auto;
            position: relative
        }

        .kong span {
            font-size: 12px;
            text-align: center;
            width: 265px;
            height: 230px;
            display: inline-block;
            position: absolute;
            top: calc(50% - 115px);
            left: calc(50% - 131px);
            padding-top: 37px;
            color: #00a0a0
        }

        .czr {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: -8px
        }
    </style>
</head>
<body>
<div id="main" v-cloak style="display: flex; flex-direction: row; width: 100%; height: 100%; padding: 2vh 0;">
    <div v-show="recommend.type === 'practice'" style="background: #FFFFFF; height: 100%; width: 30%; border: 0.1vw solid #E4E4E8; border-radius: 0 1vw 1vw 0; box-shadow: 0 0.1vw 1vw 0 rgba(0,0,0,0.06); padding: 5vh 2vw; overflow-y: auto;">
        <div v-if="courseListFilter.length > 0"
             style="display: grid; grid-auto-columns: 1fr; row-gap: 2vh; height: fit-content;">
            <div v-for="item in courseListFilter" @click.stop="openCourse(item)"
                 style="position: relative;; display: flex; flex-direction: column; align-items: center; border: 0.1vw solid #4BC7C7; border-radius: 2vw 2vw 2.1vw 2.1vw; background: #F9FDFD url('../../image/newIntelligence/premium_courses_background.png') no-repeat bottom / 101% auto; overflow: hidden; padding-bottom: 5vh;">
                <div style="background: linear-gradient(0deg, #9B9B9B, #EFEFEF, #CCCCCC, #EFEFEF, #BABABA); height: 1vh; width: 10vw; border-radius: 0 0 0.5vw 0.5vw;"></div>
                <div style="color: #FEFEFE;background: url('../../image/newIntelligence/resource_pack.png') no-repeat; background-size: 100% 100%; font-size: 1.5vw; padding: 0 2vw;">
                    资源包
                </div>
                <div style="display: flex; align-items: center; line-height: 1.4; font-size: 2vw; height: calc(1.4 * 2 * 2vw); margin: 2vh 2vw 0;">
                    <span style="text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; text-overflow: ellipsis; overflow: hidden;">
                        {{ item.title }}
                    </span>
                </div>
                <div style="background: linear-gradient(to bottom, #4BC7C7 0%, #4BC7C7 50%, transparent 50%); width: 75%; height: 1px; margin: 3vh 0;"></div>
                <div style="display: flex; align-items: center; line-height: 1.4; color: #999999; font-size: 1.5vw; height: calc(1.4 * 2 * 1.5vw); margin: 0 2vw">
                    <span style="white-space: pre-wrap; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; text-overflow: ellipsis; overflow: hidden;"
                          v-text="item.dyname.replace(/ +/,'\n')"></span>
                </div>
            </div>
        </div>
        <div v-else
             style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
            <img src="../../image/newIntelligence/resource_pack_no_data.png" style="width: 50%;" alt="资源包无数据">
            <div style="color: #999999; font-size: 1.5vw; margin-top: 4%; line-height: 1.5; text-align: center;">当前筛选条件下<br>暂无资源包内容，敬请期待~
            </div>
        </div>
    </div>
    <div style="display: flex; flex-direction: column; width: 100%; height: 100%;">
        <div @click.stop="openStatusSelect"
             style="margin-left: auto; display: flex; flex-direction: row; align-items: center; border: 0.1vw solid #4BC7C7; border-radius: 0.5vw; padding: 0.5vh 0.8vw 0.2vh 1.2vw; margin-right: 2vw;">
            <div style="color: #4BC7C7; font-size: 1.8vw; line-height: 1;">{{ nowstatus.name }}</div>
            <div style="background: #4BC7C7; clip-path: polygon(0 0, 100% 0, 50% 100%, 50% 100%); width: 1vw; height: 1vw; margin-left: 0.8vw;"></div>
        </div>
        <section @scroll="checkScrollPosition" v-show="!isDataEmpty" class="aui-refresh-content" style="overflow-y: auto; margin: 1vh 2vw; display: flex; flex-direction: column;">
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 2vh 1vw;">
                <div v-for="item in alldata" @click.stop="openwin(item)"
                     style="position: relative; background-color: #FFFFFF; background-size: 35%; background-repeat: no-repeat; border-radius: 1vw; overflow: hidden;"
                     :style="{'background-image': subjectImg(kmmc)}">
                    <div v-if="item.lock"
                         style="position: absolute; background-image: url('../../image/suo.png'); background-color: rgba(0,0,0,0.4); background-repeat: no-repeat; background-position: center center; background-size: 40%; width: 100%; height: 100%; z-index: 1;"></div>
                    <div style="display: flex; flex-direction: column; align-items: center; position: relative;">
                        <img :src="({0:'../../image/wtj.png', 1: '../../image/wgg.png', 2: '../../image/zgg.png', 3:'../../image/ygg.png', 4:'../../image/wdt.png'})[item.status]"
                             style="position: absolute; right: 0; top: 0; width: 25%;" alt="状态">
                        <div style="background: url('../../image/newIntelligence/set_of_questions.png') no-repeat; background-size: 100% 100%; color: #FEFEFE; font-size: 1.5vw; padding: 0.2vh 2vw;">
                            套题
                        </div>
                        <div style="display: flex; align-items: center; justify-content: center; line-height: 1.4; height: calc(1.4 * 2 * 2.2vw); margin: 0 2vw;">
                            <div style="color: #333333; font-size: 2.2vw; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; text-align: center;">
                                {{ item.title }}
                            </div>
                        </div>
                        <img :src="({1: '../../image/new1xing.png', 2: '../../image/new2xing.png', 3: '../../image/new3xing.png'})[item.nyd]"
                             style="height: 4vh; margin-top: 5%;" alt="难易度">
                        <div style="display: flex; align-items: center; line-height: 1.4; height: calc(1.4 * 2 * 1.5vw); color: #999999; font-size: 1.5vw; margin-top: 5%; padding: 0 5%;">
                            <span style="display: -webkit-box; text-align: center; white-space: pre-wrap; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;"
                                  v-text="item.dyname.replace(/ +/, '\n')"></span>
                        </div>
                        <div style="display: flex; align-items: center; justify-content: center; background-color: #4BC7C7; font-size: 1.5vw; color: #FFFFFF; width: 100%; padding: 2vh; margin-top: 4%;">
                            起始套题:&nbsp;共计{{ item.xts ? item.xts : 0 }}题
                        </div>
                    </div>
                </div>
            </div>
            <div style="height: 0; flex-shrink: 0; width: 100%; transition: height 0.5s ease;"></div>
        </section>
        <div v-if="isDataEmpty"
             style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%;">
            <img src="../../image/newIntelligence/smart_coach_no_data.png" style="width: 25%;" alt="智能导练无数据">
            <div style="color: #999999; font-size: 1.5vw; margin-top: 2%;">当前筛选条件下暂无学科课程内容~</div>
        </div>
    </div>
</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../script/jquery-3.7.1.min.js"></script>
<script type="text/javascript" src="../../script/vue.js"></script>
<script type="text/javascript" src="../../script/aui-pull-refresh.js"></script>
<script type="text/javascript" src="../../script/common.js"></script>
<script type="text/javascript" src="../../script/fastclick.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var pullRefresh;
    var p = 1;
    var pageCount;
    var refresh = true;
    apiready = function () {
        window.dispatchEvent(new Event('apiready'))
        vm.recommend = api.pageParam.recommend;
        vm.nowstatus = api.pageParam.nowstatus;
        vm.kmmc = api.pageParam.kmmc;
        if (JSON.stringify(api.pageParam.chaptlist.Grade) == '{}') {
            refresh = false;
        } else {
            refresh = true;
            p = 1;
            api.showProgress({
                title: '加载中',
                text: '请稍后...',
                modal: false
            });
            vm.GetPracticeDatalist(vm.recommend.schoolid, vm.recommend.sxcid, vm.recommend.dyid, vm.recommend.jieid, vm.nowstatus.id, p);

        }
        api.addEventListener({
            name: 'shuaxinframe'
        }, function (ret, err) {
            p = 1;
            vm.alldata = [];
            api.showProgress({
                title: '加载中',
                text: '请稍后...',
                modal: false
            });
            vm.GetPracticeDatalist(vm.recommend.schoolid, vm.recommend.sxcid, vm.recommend.dyid, vm.recommend.jieid, vm.nowstatus.id, p);
            $('.aui-refresh-content > div:last-child').css('height', '0px')
        });
        //下拉刷新
        pullRefresh = new auiPullToRefresh({
            container: document.querySelector('.aui-refresh-content'),
            triggerDistance: 100
        }, function (ret) {
            if (ret.status == "success") {
                $('.aui-refresh-content > div:last-child').css('height', '0px')
                if (refresh) {
                    p = 1;
                    vm.alldata = [];
                    vm.GetPracticeDatalist(vm.recommend.schoolid, vm.recommend.sxcid, vm.recommend.dyid, vm.recommend.jieid, vm.nowstatus.id, p);
                } else {
                    pullRefresh.cancelLoading();
                }
            }
        });
    };
    var vm = new Vue({
        el: '#main',
        data: {
//            alldata: [{"id":"1505895479011332280","title":"走进化学科学走进化学科学走进化学科学走进化学科学走进化学科学走进化学科学","schoolid":"1033144472316561052","nyd":1,"version":7,"xkid":"1","njid":"52","bbid":"53","sxcid":"54","dyid":"55","jieid":"56","jcxts":0,"status":4,"xxmc":"天津市南开中学","xkname":"化学","njname":"高中","bbname":"鲁科版/鲁科2003课标板","sxcname":"必修1","dyname":"第1章 认识化学科学认识化学科学认识化学科学认识化学科学认识化学科学","jiename":"第1节 走进化学科学","lock":false},{"id":"1507513882731752511","title":"资源广场作业","schoolid":"1033144472316561052","nyd":2,"version":7,"xkid":"1","njid":"52","bbid":"53","sxcid":"54","dyid":"55","jieid":"56","jcxts":2,"status":1,"xxmc":"天津市南开中学","xkname":"化学","njname":"高中","bbname":"鲁科版/鲁科2003课标板","sxcname":"必修1","dyname":"第1章 认识化学科学","jiename":"第1节 走进化学科学","lock":false}],
            alldata: [],
            recommend: [],
            nowSection: '',
            nowstatus: '',
            kmmc: '',
            courseList: [],
            scrollTimeout: null,
        },
        mounted: async function () {
            await new Promise(resolve => {
                window.addEventListener('apiready', () => {
                    resolve();
                })
            })
            try {
                apiObj.Get(UrlRouter.GetPracticeGetCourseList, {
                    values: {
                        schoolid: api.pageParam.recommend.schoolid,
                        sxcid: api.pageParam.recommend.sxcid,
                        dyid: api.pageParam.recommend.dyid,
                        jieid: api.pageParam.recommend.jieid,
                    }
                },  (ret, err) => {
                    if (ret) {
                        if (ret.ret === 0) {
                            this.courseList = ret.data
                        }
                    } else {
                        throw new Error(err)
                    }
                })
            } catch (e) {
                console.error(e)
            }
        },
        computed: {
            courseListFilter: function () {
                return this.courseList.filter(item => {
                    const recommend = api.pageParam.recommend
                    return item.schoolid === api.pageParam.recommend.schoolid && item.sxcid === api.pageParam.recommend.sxcid && (Number(recommend.dyid) === 0 || item.dyid === api.pageParam.recommend.dyid) && (Number(recommend.jieid) === 0 || item.jieid === api.pageParam.recommend.jieid);
                })
            },

            isDataEmpty: function () {
                return this.alldata.length === 0;
            }
        },
        methods: {
            subjectImg: function (kmmc) {
                switch (kmmc) {
                    case '数学':
                        return "url('../../image/shuxue.png')";
                        break;
                    case '语文':
                        return "url('../../image/yuwen.png')";
                        break;
                    case '物理':
                        return "url('../../image/wuli.png')";
                        break;
                    case '化学':
                        return "url('../../image/huaxue.png')";
                        break;
                    case '生物':
                        return "url('../../image/shengwu.png')";
                        break;
                    case '英语':
                        return "url('../../image/yingyu.png')";
                        break;
                    case '地理':
                        return "url('../../image/dili.png')";
                        break;
                    case '历史':
                        return "url('../../image/lishi.png')";
                        break;
                    case '政治':
                        return "url('../../image/zhengzhi.png')";
                        break;
                    default:
                        return "url('../../image/qita.png')";
                        break;
                }
            },
            GetPracticeDatalist: function (schoolid, sxcid, dyid, jieid, status, currentPage) {
                apiObj.Get(UrlRouter.GetPracticeDatalist, {
                    values: {
                        uid: $api.getStorage('uid'),
                        sxcid: sxcid,
                        schoolid: schoolid,
                        status: status,
                        dyid: dyid,
                        jieid: jieid,
                        p: currentPage,
                        num: 12,
                        type: vm.recommend.type,
                        mac_addr: $api.getStorage('macAdress')
//                                            mac_addr:'A0:57:E3:60:8A:D6'
                    }
                }, function (ret, err) {
                    api.hideProgress();
                    if (ret) {
                        if (ret.ret === 0) {
                            pullRefresh.cancelLoading();
                            api.hideProgress();
                            pageCount = ret.data['totalPages'] || 1;
                            if (ret.data.data.length === 0) {
                                $('.aui-refresh-content > div:last-child').css('height', '2px')
                            } else {
                                vm.alldata = vm.alldata.concat(ret.data.data);
                            }
                        } else {
                            api.toast(
                                {
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                }
                            )
                        }
                    } else {
                        api.toast(
                            {
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            }
                        )
                    }
                })
            },
            openwin: function (item) {
                api.showProgress({
                    title: '加载中',
                    text: '请稍后...',
                    modal: true
                });
                apiObj.Get(UrlRouter.GetPracticePracticeinfo, {
                    values: {
                        hwid: item.id,
                        sxcid: item.sxcid,
                        dyid: item.dyid,
                        version: item.version,
                        check: 1,
                        mac_addr: $api.getStorage('macAdress')
//                                            mac_addr:'A0:57:E3:60:8A:D6'
                    }
                }, function (ret, err) {
                    api.hideProgress();
                    if (ret) {
                        if (ret.ret == 0) {
                            if (item.lock == true) {
                                // api.openWin({
                                //     name: 'not_opened',
                                //     url: '../not_opened.html',
                                // });
                                api.openWin({
                                    name: 'win-Intelligence-Unlock',
                                    url: 'win-Intelligence-Unlock.html',
                                    pageParam: {
                                        data: item,
                                        issaoma: false
                                    },
                                    slidBackEnabled: false
                                });
                            } else {
                                if (item.status == 4 || item.status == 0) {
                                    api.openWin({
                                        name: 'win_detail',
                                        url: 'win_detail.html',
                                        pageParam: {
                                            hwid: item.id,
                                            sxcid: item.sxcid,
                                            dyid: item.dyid,
                                            version: item.version,
                                            issaoma: false,
                                            status: item.status,
                                        },
                                        slidBackEnabled: false
                                    });
                                } else {
                                    api.openWin({
                                        name: 'win_exercise_list',
                                        url: 'win_exercise_list.html',
                                        pageParam: {
                                            hwid: item.id,
                                            sxcid: item.sxcid,
                                            dyid: item.dyid,
                                            issaoma: false,
                                            status: item.status,
                                            version: item.version
                                        },
                                        slidBackEnabled: false
                                    });
                                }
                            }
                        } else {
                            api.toast(
                                {
                                    msg: ret.msg,
                                    duration: 3000,
                                    location: 'middle'
                                }
                            )
                        }
                    } else {
                        api.closeWin();
                        api.toast(
                            {
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            }
                        )
                    }

                });
            },
            openStatusSelect: function () {
                api.openFrame({
                    name: 'frame-statusSelect',
                    url: './frame-statusSelect.html',
                    pageParam: {
                        nowstatus: vm.nowstatus
                    }
                })
            },
            openCourse: function (item) {
                api.openWin({
                    name: 'win-handout-list',
                    url: '../study/newCourse/win-handout-list.html',
                    pageParam: {
                        id: item.id,
                        title: item.title,
                    }
                })
            },
            checkScrollPosition: function (event) {
                const container = event.target;
                const $scrollContainer = $('.aui-refresh-content > div:last-child')
                if ($scrollContainer.css('height') === '0px') {
                    $scrollContainer.css('height','20px')
                }
                if (this.scrollTimeout) {
                    clearTimeout(this.scrollTimeout)
                }
                this.scrollTimeout = setTimeout(() => {
                    if (container.scrollTop + container.clientHeight >= container.scrollHeight - $scrollContainer.height()) {
                        p++;
                        if (p <= pageCount && $scrollContainer.height() !== 2) {
                            api.showProgress({
                                title: '加载中',
                                text: '请稍后...',
                                modal: false
                            });
                            vm.GetPracticeDatalist(vm.recommend.schoolid, vm.recommend.sxcid, vm.recommend.dyid, vm.recommend.jieid, vm.nowstatus.id, p);
                        } else {
                            api.toast({
                                msg: '已经到底啦，没有更多套题了',
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    }
                }, 200)

            }
        }
    });
</script>
</html>
