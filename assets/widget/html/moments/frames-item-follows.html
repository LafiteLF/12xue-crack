            color: #e91e63;

        .identitytype {
            font-size: 0.7rem;

            margin-bottom: 0;

        .btn-follow {
            font-size: 14px;
            line-height: 1;
            text-decoration: none;
            position: absolute;
            top: 30px;
            display: inline-block;
            -webkit-transform: translateY(-50%);
            transform: translateY(-50%);
            right: 10px;
            -webkit-font-smoothing: antialiased;
            color: #fff;
            padding-top: 5px;
            padding-bottom: 5px;
        }

        .btn-unfollow {
            font-size: 14px;
            line-height: 1;
            text-decoration: none;
            position: absolute;
            top: 30px;
            display: inline-block;
            -webkit-transform: translateY(-50%);
            transform: translateY(-50%);
            right: 10px;
            -webkit-font-smoothing: antialiased;
            color: #fff;
            padding-top: 5px;
            padding-bottom: 5px;
        }

        .enter-follow-mo {
            width: 35%;
            margin: 1rem auto;
            height: 1.5rem;
            line-height: 0.5rem;
            font-size: 0.7rem;
        }

        .aui-grid [class*=aui-col-] {
            padding: 0.2rem 0;
        }

        .aui-grid .aui-grid-label {
            margin-top: 0;
        }

        .aui-grid .aui-iconfont {
            font-size: 0.7rem;
        }

        .img-size1 {
            width: 80% !important;
        }

        .content-forward {
            background-color: #f9f9f9;
        }

        .forward-school {
            color: #757575;
        }

        .thumb-red {
            color: #dd191b;
        }

        .aui-card-list-content-padded .content-text img, .aui-card-list-content-padded .forward-content-text img {
            width: 14%;
            height: auto;!important;
            display: inline-block;
            overflow: hidden;
        }

        .aui-card-list-content-padded .content-exercise img, .aui-card-list-content-padded .forward-content-exercise img {
            width: 35px;
            height: 35px;
            display: inline-block;
        }

        .aui-label-info {
            background-color: #6b8fec;
            margin-left: 5px;
        }

        .username {
            max-width: 100px;
            float: left;
            display: block;
        }

        .content-text .content-exercise {
            word-break: break-all;
        }

        .loading {
            padding: 0.5rem;
            text-align: center;
            margin: 0 auto;
        }

        body {
            width: 80%;
            margin: 0 auto;
        }

        .aui-card-list-footer {
            margin-left: 50%;
            width: 50%;
        }
        .aui-list:after{
            height:0px;
        }
        .aui-list li {
            margin-top: 10px;
        }
        em, em * {
            font-style: italic;
        }
        em, del, strong, var, label, cite, small, time, mark, code {
            display:inline;
        }
        strong {
            display:inline !important;
        }
        .bugflag {
            margin-top: -20px;
        }
    </style>
</head>

<script type="text/javascript">
    var type;
    apiready = function () {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        getFollowUser();
        pullRefresh = new auiPullToRefresh({
            container: document.querySelector('.aui-refresh-content'),
            triggerDistance: 100
        }, function (ret) {
            if (ret.status == "success") {
                p = 1;
                isClean = true;
                if (type == 1) {
                    getRecommendUsers();
                } else {
                    getFollowUser();
                }
            }
        });
        api.addEventListener({
            name: 'init_user'
        }, function (ret, err) {
            apiObj.SetAuthToken($api.getStorage('token'));
//            p = 1;
//            getFollowUser();
        });
//        api.addEventListener({
//            name: 'loginSuccess'
//        }, function (ret, err) {
//            apiObj.SetAuthToken($api.getStorage('token'));
//            p = 1;
//            isClean = true;
//            getFollowUser();
//        });
    };
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var p = 1;
    var totalPage;
    var isClean = true;
    function getFollowUser() {
        apiObj.Get(UrlRouter.GetFollowMoment, {
            values: {
                uid: $api.getStorage('uid'),
                p: p,
                num: 20
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    if (ret.list == null) {
                        if ($api.hasCls($api.dom('.tips'), 'aui-hide')) {
                            $api.removeCls($api.dom('.tips'), 'aui-hide');
                            $api.addCls($api.dom('.tips'), 'aui-show');

                            $api.removeCls($api.dom('.left-border'), 'aui-hide');
                            $api.addCls($api.dom('.left-border'), 'aui-show');
                        }
                        type = 1;
                        getRecommendUsers();
                    } else {
                        if ($api.hasCls($api.dom('.tips'), 'aui-show')) {
                            $api.removeCls($api.dom('.tips'), 'aui-show');
                            $api.addCls($api.dom('.tips'), 'aui-hide');

                            $api.removeCls($api.dom('.left-border'), 'aui-show');
                            $api.addCls($api.dom('.left-border'), 'aui-show');

                        }
                        type = 2;
                        getFollowMoment();
                    }
                    $api.css($api.dom('.aui-refresh-pull-arrow'), 'z-index:0');
                    $api.css($api.dom('.head'), 'z-index:999');
                    $api.css($api.dom('.aui-refresh-content'), 'top:' + $api.offset($api.dom('.head')).h + 'px');
                } else {
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    })
                }
            } else {
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                })
            }
            api.hideProgress();
        })
    }

    function getRecommendUsers() {
        api.removeEventListener({
            name: 'scrolltobottom'
        });

        apiObj.Get(UrlRouter.GetRecommendUsers, {
            values: {
                num: 10
            }
        }, function (ret, err) {
            pullRefresh.cancelLoading();
            $api.addCls($api.dom('.loading'), 'aui-hide');
            if (ret) {
                if (isClean) {
                    $api.html($api.dom('.aui-list'), '');
                }
                if (ret.ret == 0 && ret.data.length > 0) {
                    $api.html($api.dom('.aui-list'), '');
                    for (var i = 0; i < ret.data.length; i++) {
                        var identitytype = ret.data[i].identitytype == 2 ? '老师' : ret.data[i].identitytype == 3 ? '学生' : '家长';
                        if ( ret.data[i].sex == 1) {
                            var sexhtml = '<div class= "aui-iconfont aui-icon-mail sex"></div>';
                        } else {
                            var sexhtml = '<div class= "aui-iconfont aui-icon-femail unsex"></div>';
                        }
                        var followHtml = ret.data[i].uid != $api.getStorage('uid') ? ret.data[i].follow ? '<div class="aui-btn btn-follow aui-btn-warning aui-btn-outlined" tapmode onclick="btnFollow(this)">取消关注</div> </div> </li>' : '<div class="aui-btn btn-follow aui-btn-warning" tapmode onclick="btnFollow(this)"><span class="aui-iconfont aui-icon-add"></span>关注</div> </div> </li>' : '';
                        $api.append($api.dom('.aui-list'), '<li class="aui-card-list aui-border-b" uid="' + ret.data[i].uid + '"> ' +
                                '<div class="aui-card-list-header aui-card-list-user"> ' +
                                '<div class="aui-card-list-user-avatar followAvatar">' +sexhtml+
                                ' <img src="' + ret.data[i].face + '" class="aui-img-round aui-margin-t-10 aui-margin-l-10"/> </div>' +
                                ' <div class="aui-card-list-user-name aui-font-size-16"> ' +
                                '<div class="aui-text-primary aui-text-primaryDiv">' +
                                '<span class="username aui-ellipsis-1">' + ret.data[i].realname + ' </span>' +
                                '<span class="aui-label aui-label-info">' + ret.data[i].rank + '</span>' +
                                '<span class="identitytype">（' + identitytype + '）</span></div> </div> ' +
                                '<div class="aui-card-list-content aui-text-default">' + ret.data[i].xd + ' ' + ret.data[i].kmmc + '</div> ' +
                                '<div class="aui-card-list-content aui-text-default">' + ret.data[i].xxmc + '</div> ' +
                                '<div class="aui-card-list-content aui-text-default">关注' + ret.data[i].statistics.follownum + ' 粉丝' + ret.data[i].statistics.fansnum + '</div> ' +
                                followHtml);
                    }
                    $api.append($api.dom('.aui-list'), '<div class="aui-btn aui-btn-primary aui-btn-block enter-follow-mo" tapmode onclick="enterFollowMo();">进入关注人动态</div>');
                } else if (ret.ret == 0) {
                    alert('暂无推荐关注人信息');
                } else {
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    })
                }
            } else {
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                })
            }
            api.hideProgress();
        })
    }
    var pullRefresh;

    function getFollowMoment() {
        apiObj.Get(UrlRouter.GetFollowMoment, {
            values: {
                uid: $api.getStorage('uid'),
                p: p,
                num: 20
            }
        }, function (ret, err) {
            pullRefresh.cancelLoading();
            if (ret) {
                if (ret.ret == 0) {
                    if (isClean) {
                        $api.html($api.dom('.aui-list'), '');
                        if ($api.dom('.img-null') != null) {
                            $api.remove($api.dom('.img-null'));
                        }
                        if (ret.list.length != 0) {
                            $api.html($api.dom('.aui-content'), '<ul class="aui-list"> </ul>');
                        } else {
//                        alert('暂无动态内容');
                            $api.append($api.dom('body'), '<div class="no-data"> <img class="img-null" src="../../image/noDynamic.png" style="height:auto!important;width:40%;vertical-align: middle;position: absolute;left: 30%;"/></div>');
                            $api.css($api.dom('.img-null'), 'top:' + api.frameHeight / 3 + 'px');
                        }
                    }
                    for (var i = 0; i < ret.list.length; i++) {
                        var isFollow = ret.list[i].follow == true ? 'aui-btn-outlined' : '';
                        var isAppreciate = ret.list[i].thumb == true ? 'thumb-red' : '';
                        var followText = ret.list[i].follow == true ? '取消关注' : '<span class="aui-iconfont aui-icon-add"></span>关注';
                        var isMineDel = $api.getStorage('uid') != ret.list[i].uid ? 'display:none' : 'display:inline-block';
                        var isMineFlo = $api.getStorage('uid') == ret.list[i].uid ? 'display:none' : 'display:inline-block';
                        var rank = ret.list[i].userinfo.rank;
                        if (ret.list[i].userinfo.offical && ret.list[i].userinfo.offical == true) {
                            rank = "官方";
                        }
                        if ( ret.list[i].userinfo.sex == 1) {
                            var sexhtml = '<div class= "aui-iconfont aui-icon-mail sex"></div>';
                        } else {
                            var sexhtml = '<div class= "aui-iconfont aui-icon-femail unsex"></div>';
                        }
                        var Istatus = '666';
                        if(ret.list[i].ref){
                            if(ret.list[i].ref.status == 0){
                                Istatus = ret.list[i].ref.status;
                            }
                        }
                        $api.append($api.dom('.aui-list'), '<li class="aui-card-list aui-border-b" uid="' + ret.list[i].uid + '" id="' + ret.list[i].id + '" tapmode onclick="momentDetail(this);"> <div class="aui-card-list-header aui-card-list-user"> <div class="aui-card-list-user-avatar" tapmode onclick="userInfoClick(this);">'+sexhtml+' <img src="' + ret.list[i].userinfo.face + '" class="aui-img-round"/> </div> <div class="aui-card-list-user-name aui-font-size-16"  tapmode onclick="userInfoClick(this);"> <div class="aui-text-primary "><span class="username aui-ellipsis-1">' + ret.list[i].userinfo.realname + ' </span><span class="aui-label aui-label-info">' +' ' + rank + '</span></div> </div> <div class="aui-card-list-user-info aui-text-default">' + ret.list[i].userinfo.xxmc + ' ' + ret.list[i].userinfo.role + '</div> <small class="aui-card-list-user-info">' + ret.list[i].createtime + ' ' + ret.list[i].device + '</small> <div class="aui-btn aui-btn-warning btn-follow ' + isFollow + '" style="' + isMineFlo + '" tapmode onclick="btnFollow(this)">' + followText + '</div> </div> <div class="aui-card-list-content-padded "><div class="content-text bugflag"></div><div class="content-exercise"></div><div class="content-img aui-padded-t-5"></div> </div><div class="content-forward" status = "' + Istatus + '"  tapmode onclick="transpondContent(this);"></div> <div class="aui-card-list-footer aui-padded-t-0"> <div class="aui-font-size-12"   tapmode onclick="transpondMoment(this);"><i class="aui-iconfont aui-icon-forward aui-margin-r-0"></i>转发(<span class="forward">' + ret.list[i].forword_count + '</span>) </div> <div class="aui-font-size-12 btn-appreciate ' + isAppreciate + '" tapmode onclick="appreciate(this);"><i class="aui-iconfont aui-icon-appreciate aui-margin-r-0"></i>赞(<span class="appreciate">' + ret.list[i].thumbup_count + '</span>) </div> <div class="aui-font-size-12" tapmode onclick="commentClick(this)"><i class="aui-iconfont aui-icon-comment aui-margin-r-0"></i>评论(<span class="comment">' + ret.list[i].comment_count + '</span>) </div> <div class="aui-font-size-12" style="' + isMineDel + '" tapmode onclick="delMoment(this);"><i class="aui-iconfont aui-icon-delete aui-margin-r-0"></i> 删除</div> </div>');
                        if (rank == "官方") {
                            $api.css($api.domAll(".aui-label-info")[$api.domAll(".aui-label-info").length - 1], 'background-color:red');
                            // 不显示关注按钮
                            $api.css($api.domAll(".btn-follow")[$api.domAll(".btn-follow").length - 1], 'display:none');
                        }
                        if (ret.list[i].content != '') {
                            var content = ret.list[i].content.replace(/(<\/?a.*?>)|(<\/?span.*?>)/g, "");
                            switch (ret.list[i].content_type) {
                                case '':
                                case 'user':
                                    $api.html($api.domAll('.content-text')[$api.domAll('.content-text').length - 1], ret.list[i].content);
                                    break;
                                case 'course':
                                    if (ret.list[i].tag) {
                                        $api.html($api.domAll('.content-text')[$api.domAll('.content-text').length - 1], '制作了<span class="aui-text-primary" tapmode onclick="resourceClick(this,\'course\');" resId="' + ret.list[i].resourceid + '">【课堂资源包】' + content + '</span> <br>' + ret.list[i].tag.xkmc + ' ' + ret.list[i].tag.njmc + ' ' + ret.list[i].tag.bbmc + ' ' + ret.list[i].tag.dymc + ' ' + ret.list[i].tag.jmc);
                                    } else {
                                        $api.html($api.domAll('.content-text')[$api.domAll('.content-text').length - 1], '制作了<span class="aui-text-primary" tapmode onclick="resourceClick(this,\'course\');" resId="' + ret.list[i].resourceid + '">【课堂资源包】' + content + '</span> <br>');
                                    }
                                    break;
                                case 'homework':
                                    if (ret.list[i].tag) {
                                        $api.html($api.domAll('.content-text')[$api.domAll('.content-text').length - 1], '布置了<span class="aui-text-primary" tapmode onclick="resourceClick(this,\'homework\');" resId="' + ret.list[i].resourceid + '">【作业】' + content + '</span> <br>' + ret.list[i].tag.xkmc + ' ' + ret.list[i].tag.njmc);
                                    } else {
                                        $api.html($api.domAll('.content-text')[$api.domAll('.content-text').length - 1], '布置了<span class="aui-text-primary" tapmode onclick="resourceClick(this,\'homework\');" resId="' + ret.list[i].resourceid + '">【作业】' + content + '</span> <br>');
                                    }
                                    break;
                                case 'material':
                                    var fl = ret.list[i].fl == '1' ? '教学设计' : ret.list[i].fl == '2' ? '自主学习单' : ret.list[i].fl == '3' ? '精讲助学' : ret.list[i].fl == '4' ? '影音素材' : ret.list[i].fl == '6' ? '微课': '其他类';
                                    if (ret.list[i].tag) {

                    api.toast({
                        msg: err.msg,
                        duration: 2000,
                        location: 'bottom'
                    })
                }
            })
        }
    }

    function appreciate(context) {
        window.event ? window.event.cancelBubble = true : context.stopPropagation();
        if ($api.hasCls(context, 'thumb-red')) {
            $api.removeCls(context, 'thumb-red');
            $api.text($api.dom(context, '.appreciate'), parseInt($api.text($api.dom(context, '.appreciate'))) - 1);
            apiObj.Delete(UrlRouter.PraiseDynamic + "?dynamicid=" + $api.closest(context, '.aui-card-list').id, null,
                    function (ret, err) {

                    })
        } else {
            $api.addCls(context, 'thumb-red');
            $api.text($api.dom(context, '.appreciate'), parseInt($api.text($api.dom(context, '.appreciate'))) + 1);
            apiObj.Put(UrlRouter.PraiseDynamic, {
                values: {
                    dynamicid: $api.closest(context, '.aui-card-list').id
                }
            }, function (ret, err) {

            })
        }
    }
    function delMoment(context) {
        window.event ? window.event.cancelBubble = true : context.stopPropagation();
        api.confirm({
            title: '提示',
            msg: '确认删除该动态？',
            buttons: ['确定', '取消']
        }, function (ret, err) {
            if (ret.buttonIndex == 1) {
                apiObj.Delete(UrlRouter.DelDynamic + '?dynamicid=' + $api.closest(context, '.aui-card-list').id, null, function (ret, err) {
                    if (ret) {
                        if (ret.ret == 0) {
                            $api.remove($api.closest(context, '.aui-card-list'));
                        } else {
                            api.toast({
                                msg: ret.msg,
                                duration: 2000,
                                location: 'bottom'
                            })
                        }
                    } else {
                        api.toast({
                            msg: err.msg,
                            duration: 2000,
                            location: 'bottom'
                        })
                    }
                })
            }
        });
    }
    function transpondContent(context) {
        var status = $api.attr(context, 'status');
        if(status == '0'){
            alert('内容已被删除');
            window.event ? window.event.cancelBubble = true : context.stopPropagation();
        }else {
            window.event ? window.event.cancelBubble = true : context.stopPropagation();
            api.openWin({
                name: 'win-comment-content-original',
                url: 'win-comment-content-original.html',
                pageParam: {
                    id: $api.dom(context, '.aui-card-list-content-padded').id,
                    isFollow: $api.cssVal($api.dom($api.closest(context, '.aui-card-list'), '.btn-follow'), 'display') == 'none',
                    isAppreciate: $api.hasCls($api.dom($api.closest(context, '.aui-card-list'), '.btn-appreciate'), 'thumb-red')
                }
            });
        }
    }
</script>
</html>
