        .aui-list::before{

            min-height: 5rem;

            color: dodgerblue;

            right: 1px;
            text-align: right;

            height: 0.75rem;

            font-size: 14px;
            line-height: 1;
            text-decoration: none;
            position: absolute;
            top: 30px;
            display: inline-block;
            -webkit-transform: translateY(-50%);

            color: #fff;
            padding-top: 5px;
            padding-bottom: 5px;

        .aui-grid .aui-grid-label {

            white-space: nowrap;
            text-overflow: ellipsis;
            color: #666666;

        .aui-grid .aui-iconfont {

        }

        .img-size1 {
            width: 80% !important;
        }

        .content-forward {
            background-color: #f9f9f9;
        }

        .forward-school {
            color: #757575;
        }

        .thumb-red {
            color: #dd191b;
        }

        .aui-label-info {
            margin-left: 5px;
            background-color: #6b8fec;
        }

        .aui-card-list-content-padded .content-text img, .aui-card-list-content-padded .forward-content-text img {
            width: 14%;
            height: auto;!important;
            display: inline-block;
            overflow: hidden;
        }

        .username {
            max-width: 6rem;
            float: left;
            display: block;
        }

        .content-text {
            word-break: break-all;
        }

        .loading {
            padding: 0.5rem;
            text-align: center;

            /*width: 80%;*/

        .aui-content{

        .aui-list li{

        em, em * {
            font-style: italic;
        }
        em, del, strong, var, label, cite, small, time, mark, code {

<script type="text/javascript">
    var pullRefresh;
    apiready = function () {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        api.addEventListener({
            name: 'init_user'
        }, function (ret, err) {
            apiObj.SetAuthToken($api.getStorage('token'));
//            p = 1;
//            getSameAgeList();
        });
        getSameAgeList();
        api.addEventListener({
            name: 'refreshDynamic'
        }, function (ret, err) {
            api.showProgress({
                title: '加载中',
                text: '请稍后...',
                modal: false
            });
            p = 1;
            getSameAgeList();
        });
        pullRefresh = new auiPullToRefresh({
            container: document.querySelector('.aui-refresh-content'),
            triggerDistance: 100
        }, function (ret) {
            if (ret.status == "success") {
                p = 1;
                isClean = true;
                getSameAgeList();
            }
        });
        $api.css($api.dom('.aui-refresh-pull-arrow'), 'z-index:0');
        $api.css($api.dom('.head'), 'z-index:999');
        $api.css($api.dom('.aui-refresh-content'), 'top:' + $api.offset($api.dom('.head')).h + 'px');

    };
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var p = 1;
    var sex = 0;
    var area = 0;
    var xd = 0;
    var isClean = true;
    var totalPage;
    function getSameAgeList() {
        apiObj.Get(UrlRouter.GetStudentJoinClass, {
            values: {
                uid: $api.getStorage('uid'),
            }
        }, function (ret, err) {
            api.hideProgress();
            pullRefresh.cancelLoading();
            $api.addCls($api.dom('.loading'),'aui-hide');
            if (ret) {
                if (ret.ret == 0) {
                    if (ret.data.length == 0) {
                        pullRefresh.cancelLoading();
                        $api.html($api.dom('.aui-list'), '');
                        $api.addCls($api.dom('.loading'), 'aui-hide');
                        $api.append($api.dom('.aui-list'), '<div class="tips">亲，加入班级后才有同龄人动态，<br/>去<span style="color: #4bc7c7;" tapmode onclick="goToJoinClass()">加入班级</span>吧！ </div>');

                    } else {
                        getSameAgeListDetail();
                    }
                }
            }
        });
    }


    function getSameAgeListDetail() {
        apiObj.Get(UrlRouter.GetSameAgeList, {
            values: {
                sex: sex,
                area: area,
                p: p,
                num: 10
            }
        }, function (ret, err) {
            pullRefresh.cancelLoading();
            $api.addCls($api.dom('.loading'), 'aui-hide');
            if (ret) {
                api.hideProgress();
                if (ret.ret == 0) {
                    if (isClean) {
                        $api.html($api.dom('.aui-list'), '');
                        if ($api.dom('.img-null') != null) {
                            $api.remove($api.dom('.img-null'));
                        }
                        if (ret.list.length != 0 && ret.list != false) {
                            $api.html($api.dom('.aui-content'), '<ul class="aui-list"> </ul>');
                        } else {
//                        alert('暂无动态内容');
                            $api.html($api.dom('.aui-content'), '<div class="no-data"> <img class="img-null" src="../../image/stuHomePad/noContent.png" style="height:auto!important;width:40%;vertical-align: middle;position: absolute;left: 30%;"/></div>');
                            $api.css($api.dom('.img-null'), 'top:' + api.frameHeight / 4 + 'px');
                        }
                    }

                    for (var i = 0; i < ret.list.length; i++) {
                        var isFollow = ret.list[i].follow == true ? 'aui-btn-outlined' : '';
                        var isAppreciate = ret.list[i].thumb == true ? 'thumb-red' : '';
                        var followText = ret.list[i].follow == true ? '取消关注' : '<span class="aui-iconfont aui-icon-add"></span>关注';
                        if ( ret.list[i].userinfo.sex == 1) {
                            var sexhtml = '<div class= "aui-iconfont aui-icon-mail sex"></div>';
                        } else {
                            var sexhtml = '<div class= "aui-iconfont aui-icon-femail unsex"></div>';
                        }
                        var Istatus = '666';
                        if(ret.list[i].ref){
                            if(ret.list[i].ref.status == 0){
                                Istatus = ret.list[i].ref.status;
                            }
                        }
                        var isMineDel = $api.getStorage('uid') != ret.list[i].uid ? 'display:none' : 'display:inline-block';
                        var isMineFlo = $api.getStorage('uid') == ret.list[i].uid ? 'display:none' : 'display:inline-block';
                        $api.append($api.dom('.aui-list'), '<li class="aui-card-list aui-border-b" uid="' + ret.list[i].uid + '" id="' + ret.list[i].id + '" tapmode onclick="momentDetail(this);"> <div class="aui-card-list-header aui-card-list-user"> <div class="aui-card-list-user-avatar" tapmode onclick="userInfoClick(this);"> '+sexhtml+'<img src="' + ret.list[i].userinfo.face + '?imageMogr2/auto-orient/thumbnail/!75p" class="aui-img-round"/> </div> <div class="aui-card-list-user-name aui-font-size-16"  tapmode onclick="userInfoClick(this);"> <div class="aui-text-primary aui-text-primaryDiv"><span class="username aui-ellipsis-1">' + ret.list[i].userinfo.realname + ' </span><span class="aui-label aui-label-info">' +' ' + ret.list[i].userinfo.rank + '</span></div> </div> <div class="aui-card-list-user-info aui-text-default">' + ret.list[i].userinfo.xxmc + ' ' + ret.list[i].userinfo.role + '</div> <small class="aui-card-list-user-info">' + ret.list[i].createtime + ' ' + ret.list[i].device + '</small> <div class="aui-btn aui-btn-warning btn-follow ' + isFollow + '" style="' + isMineFlo + '" tapmode onclick="btnFollow(this)">' + followText + '</div> </div> <div class="aui-card-list-content-padded "><div class="content-text bugflag"></div><div class="content-img aui-padded-t-5"></div> </div><div class="content-forward" status = "' + Istatus + '" tapmode onclick="transpondContent(this);"></div> <div class="aui-card-list-footer aui-padded-t-0"> <div class="aui-font-size-12" tapmode onclick="transpondMoment(this);"><i class="aui-iconfont aui-icon-forward aui-margin-r-0"></i>转发(<span class="forward">' + ret.list[i].forword_count + '</span>) </div> <div class="aui-font-size-12 btn-appreciate ' + isAppreciate + '" tapmode onclick="appreciate(this);"><i class="aui-iconfont aui-icon-appreciate aui-margin-r-0"></i>赞(<span class="appreciate">' + ret.list[i].thumbup_count + '</span>) </div> <div class="aui-font-size-12" tapmode onclick="commentClick(this)"><i class="aui-iconfont aui-icon-comment aui-margin-r-0"></i>评论(<span class="comment">' + ret.list[i].comment_count + '</span>) </div> <div class="aui-font-size-12" style="' + isMineDel + '" tapmode onclick="delMoment(this);"><i class="aui-iconfont aui-icon-delete aui-margin-r-0"></i> 删除</div> </div>');
                        if (ret.list[i].content != '') {
                            var content = ret.list[i].content.replace(/(<\/?a.*?>)|(<\/?span.*?>)/g, "");
                            switch (ret.list[i].content_type) {
                                case '':
                                case 'user':
                                    $api.html($api.domAll('.content-text')[$api.domAll('.content-text').length - 1], ret.list[i].content);

                    if (ret.ret == 0) {
                        for (var i = 0; i < $api.domAll('.aui-card-list').length; i++) {
                            if (uid == $api.attr(($api.domAll('.aui-card-list')[i]), 'uid')) {
                                $api.addCls($api.dom($api.domAll('.aui-card-list')[i], '.btn-follow'), 'aui-btn-outlined');
                                $api.html($api.dom($api.domAll('.aui-card-list')[i], '.btn-follow'), '取消关注');
                            }
                        }
                    } else {
                        api.toast({
                            msg: ret.msg,
                            duration: 2000,
                            location: 'bottom'
                        })
                    }
                } else {
                    api.toast({
                        msg: err.msg,
                        duration: 2000,
                        location: 'bottom'
                    })
                }
            })
        }
    }

    function appreciate(context) {
        window.event ? window.event.cancelBubble = true : context.stopPropagation();
        if ($api.hasCls(context, 'thumb-red')) {
            $api.removeCls(context, 'thumb-red');
            $api.text($api.dom(context, '.appreciate'), parseInt($api.text($api.dom(context, '.appreciate'))) - 1);
            apiObj.Delete(UrlRouter.PraiseDynamic + '?dynamicid=' + $api.closest(context, '.aui-card-list').id, null, function (ret, err) {

            })
        } else {
            $api.addCls(context, 'thumb-red');
            $api.text($api.dom(context, '.appreciate'), parseInt($api.text($api.dom(context, '.appreciate'))) + 1);
            apiObj.Put(UrlRouter.PraiseDynamic, {
                values: {
                    dynamicid: $api.closest(context, '.aui-card-list').id
                }
            }, function (ret, err) {

            })
        }
    }
    function delMoment(context) {
        window.event ? window.event.cancelBubble = true : context.stopPropagation();
        api.confirm({
            title: '提示',
            msg: '确认删除该动态？',
            buttons: ['确定', '取消']
        }, function (ret, err) {
            if (ret.buttonIndex == 1) {
                apiObj.Delete(UrlRouter.DelDynamic + '?dynamicid=' + $api.closest(context, '.aui-card-list').id, null, function (ret, err) {
                    if (ret) {
                        if (ret.ret == 0) {

                            $api.remove($api.closest(context, '.aui-card-list'));
                        } else {
                            api.toast({
                                msg: ret.msg,
                                duration: 2000,
                                location: 'bottom'
                            })
                        }
                    } else {
                        api.toast({
                            msg: err.msg,
                            duration: 2000,
                            location: 'bottom'
                        })
                    }
                })
            }
        });
    }
    function transpondContent(context) {

        var status = $api.attr(context, 'status');
        if(status == '0'){
            alert('内容已被删除');
            window.event ? window.event.cancelBubble = true : context.stopPropagation();
        }else {
            window.event ? window.event.cancelBubble = true : context.stopPropagation();
            api.openWin({
                name: 'win-comment-content-original',
                url: 'win-comment-content-original.html',
                pageParam: {
                    id: $api.dom(context, '.aui-card-list-content-padded').id,
                    isFollow: $api.cssVal($api.dom($api.closest(context, '.aui-card-list'), '.btn-follow'), 'display') == 'none',
                    isAppreciate: $api.hasCls($api.dom($api.closest(context, '.aui-card-list'), '.btn-appreciate'), 'thumb-red')
                }
            });
        }
    }
    function goToJoinClass() {
        api.openWin({
            slidBackEnabled: false,
            name: 'addClass_win',
            url: '../mine/myclass/myclass_win.html',
            reload: true
        });

    }
</script>
</html>
