<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>填空题</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>    <style>        .tkt_content {            display: none        }    </style></head><body><div class="tkt_content" id="tkt_content">    <div class="tkt_top">        <ul>            <li class="tixing clearfix">                <div class="tihao" v-text="(index+1)+'.'"> 5.</div>                <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>            </li>            <li v-if="complete==2" class="zsd" @click="alertzsd(data.zsdmc)">                <span>难易度：</span><img  class="noImgClick"                                       :src="data.nyd==1?'../../../image/newhomework/1xing.png':data.nyd==2?'../../../image/newhomework/2xing.png':data.nyd==3?'../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{data.zsdmc}}            </li>        </ul>    </div>    <div class="tkt_left" id="left" style="width: calc(100% - 25px - 37px)">        <div class="tg_content font666" v-html="data.tg"></div>        <div class="scyinpin clearfix" v-if="material.zyqf ==2 && material.tx=='tdjh' && data.attachments">            <img  class="scyp1 noImgClick" src="../../../image/newhomework/yuyinimg.png">            <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);"  src="../../../image/startPlay.png" alt="">            <div class="ypRange"> <input class="myRange" type="range" min="0"  value="0"  :max='data.attachments[0].filetime' ></div>            <p class="ypTimeP" v-text="getOutTime(data.attachments[0].filetime)"></p>            <audio class="hideenAudio" :src='data.attachments[0].serverpath + data.attachments[0].preview_link' ></audio>        </div>        <div class="tdjhxx"  v-if="material.zyqf ==2 && material.tx=='tdjh'">            <p v-for="list in data.options" v-if="list.type==1" v-html="'<span>'+list.xx+'</span>'+'.'+list.description"></p>        </div>        <div class="ldcl" v-if="material.tx=='ldt' && data.dastr!=''">            <h3>朗读材料：</h3>            <p v-html="data.dastr==''?'无':data.dastr"></p>        </div>    </div>    <!--<div v-if="xiaotinum>0" class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">-->        <!--<div class="tkt_right_content">-->            <!--<span class="wxtk_xiaoti" v-text="'共'+xiaotinum+'小题'"></span>-->            <!--<ul class="wxtk_content">-->                <!--<li v-for="(list,index) in data.children">-->                    <!--&lt;!&ndash;答题部分开始&ndash;&gt;-->                    <!--<div :class="complete!=2?'wxtk_tg':'xiaotifenge wxtk_tg'" v-html="'('+(index+1)+')'+list.tg"></div>-->                    <!--&lt;!&ndash;作图题图片题干&ndash;&gt;-->                    <!--<ul v-if="list.is_auto==0 && list.datatype==2 " class="zttimg clearfix">-->                        <!--<li v-for="(item ,index2) in list.attachments">-->                            <!--<img :src="item.serverpath+item.savename">-->                            <!--<p v-text="index2+1"></p>-->                        <!--</li>-->                    <!--</ul>-->                <!--</li>-->            <!--</ul>-->        <!--</div>-->    <!--</div>--></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var timer = null;    apiready = function () {        vue();        vm.GetParentexercisesUrl();//获取作业习题详情及答题结果        if (vm.complete == 2) {//答完题显示总分            vm.type = api.pageParam.type;        }        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if($api.domAll('.scyp2').length>=1){                if($('.scyp2').attr('playStatus')==1){                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                audioStreamer = api.require('audioStreamer');                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                clearInterval(timer);                var hideenAudio = $api.dom('.hideenAudio');                hideenAudio.pause();            }            api.stopPlay();        });    };    function vue() {        vm = new Vue({            el: '.tkt_content',            data: {                index: api.pageParam.index,//当前frame的索引                material: api.pageParam.material,//当前习题资料                homeworkListData: api.pageParam.homeworkListData,//作业列表传过来的数据                complete: api.pageParam.complete,//作业完成状态                data: [],//习题详情                answer: [],//答案数组                schoolid: api.pageParam.schoolid,//学校id                isShowAnswer: false,                isPlaying: false,//老师留言是否播放中                type: '',//习题总分                is_show_textarea: [],//是否显示输入框（刚打开页面的时候）                xiaotinum: ''            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                alertzsd: function (content) {                    alert('知识点：' + content);                },                GetParentexercisesUrl: function () {//获取作业习题详情及答题结果                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetExerciseDetail, {                        values: {                            id: vm.material.zyid                        }                    }, function (ret, err) {                        //console.log("-----" + $api.jsonToStr(ret));                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.tkt_content').show();                                vm.data = ret;                                vm.xiaotinum = vm.data.children.length;                            } else {                                api.toast({                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        } else {                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    })                },                studentRecord:function (context) {                    var url =   vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime                    var hideenAudio = $api.dom('.hideenAudio');                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频                    if (playStatus == '0') {                        if (timer) {                            clearInterval(timer);                        }                        $api.attr(context, 'playStatus', '1');                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                        hideenAudio.play();                        sec = 0;                        allTimes = recodetime;                        timer = setInterval(function (e) {                            console.log(hideenAudio.currentTime +'  ' + sec);                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb =  sec/recodetime *100;   //2                            bfb = bfb.toFixed(2);//2                            var ss = 'background-size: '+bfb + '% 100%';//2                            if (allTimes == 0 || sec >= recodetime) {                                clearInterval(timer);                                $api.attr(context, 'playStatus', '0');                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                            } else {                                range.value = sec;//                                range.onchange = function () {//                                    sec = parseInt(this.value);//                                    range.value = sec;//                                    hideenAudio.currentTime = sec;//                                    allTimes = recodetime - sec;//                                    var time = vm.getOutTime(allTimes);//                                    $api.text($api.dom('.ypTimeP'), time);//                                };                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);  //4                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    } else if (playStatus == '1') {                        $api.attr(context, 'playStatus', '2');                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                        clearInterval(timer);                        hideenAudio.pause();                    } else {                        $api.attr(context, 'playStatus', '1');                        hideenAudio.play();                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                        timer = setInterval(function (e) {                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb =  sec/recodetime *100;    //5                            bfb = bfb.toFixed(2);   //5                            var ss = 'background-size: '+bfb + '% 100%';  //5                            if (allTimes == 0 || sec >= recodetime) {                                $api.attr(context, 'playStatus', '0');                                clearInterval(timer);                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6                            } else {                                range.value = sec;//                                range.onchange = function () {//                                    sec = parseInt(this.value);//                                    range.value = sec;//                                    hideenAudio.currentTime = sec;//                                    allTimes = recodetime - sec;//                                    var time = vm.getOutTime(allTimes);//                                    $api.text($api.dom('.ypTimeP'), time);//                                };                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);    //7                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    }                },                getOutTime: function (intime) {                    var outTime = '';                    if(intime<=9){                        outTime = '00:0'+intime;                    }else if(intime<59){                        outTime = '00:'+intime;                    }else {                        var min =parseInt(intime/60);                        var sec = intime%60;                        if(sec<=9){                            if(min>0&&min<10){                                outTime ='0'+ min+ ':0' + sec ;                            }else if(min>=10){                                outTime = min+ ':0' + sec ;                            }else{                                outTime = '00:0'+sec;                            }                        }else{                            if(min>0 && min < 10){                                outTime ='0'+ min + ':'+ sec ;                            }else if(min>=10){                                outTime = min + ':'+ sec ;                            }else {                                outTime = '00:'+sec;                            }                        }                    }                    return outTime;                }            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if (src.substring(src.length - 3) == 'gif') {        } else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });        }    }</script></html>
