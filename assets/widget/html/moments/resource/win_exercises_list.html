<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>习题列表</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width: calc(100% - 165px);        }    </style></head><body><header class="clearfix">    <div onclick=" api.closeWin();" class="winTitle pull_left">    </div></header></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    apiready = function () {        var header = document.querySelector('header');//        $api.fixStatusBar(header);        $('.winTitle').html(api.pageParam.homeworkName);        $api.setStorage('resourceid-stu', api.pageParam.classId);        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            closeWin();        });        var headerH = $api.offset(header).h;        var frameH = api.winHeight - headerH;        api.openFrame({            name: 'frame_exercises_list',            url: 'frame_exercises_list.html',            rect: {                x: 0,                y: headerH,                w: 'auto',                h: frameH            },            bounces: false,            pageParam: {                headerH: headerH,                frameH: frameH,                detailData: api.pageParam.detailData            }        });    };    function closeWin() {        api.sendEvent({            name: 'shuaxin-frame-homework-list-pad'        });//        api.closeToWin({//            name: 'win-homework-list-pad'//        });        api.closeWin();    }</script></html>
