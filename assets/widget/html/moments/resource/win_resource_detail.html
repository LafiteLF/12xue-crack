<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>


    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        body {
            background-color: #f2f2f2;
        }

        .aui-toolbar-title {
            text-align: left;
            /*width: 200px;*/
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .content {
            margin-top: 0.5rem;
            width: 3.5rem;
            /*height: 80%;*/
            overflow-y: auto;
            float: left;
            border-bottom: 1px solid #e5e5e5;
        }

        .scroll {
            width: 3.5rem;
            /*height: 80%;*/
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            overflow-y: auto;
            margin: 0 auto;
            position: relative;
            top: 0px;
        }

        .item {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            border: 1px solid #4bc7c7;
            background-color: #fff;
            margin: 9px 7px;
            float: left;
            line-height: 1.5rem;
            text-align: center;
            color: #4bc7c7;
            font-size: 0.6rem;
            margin-left: 1rem;
        }

        .type {
            background-color: #4bc7c7;
            width: 100%;
            height: 2rem;
            line-height: 2rem;
            color: #fff;
            text-align: center;
            font-size: 0.7rem;
        }

        .right-btn {
            /*float: right;*/
            height: 7rem;
            width: 3rem;
            margin-top: 15%;
            position: fixed;
            right: 0;
            z-index: 20;
        }

        .up, .down {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 15%;
            background: rgba(0, 0, 0, 0.32);
            text-align: center;
            line-height: 2.2rem;
            /*position: absolute;*/
            margin-top: 1.5rem;
            right: 0;
        }

        .up:active, .down:active {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 15%;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            line-height: 2.2rem;
            /*position: absolute;*/
            margin-top: 1.5rem;
            right: 0;
        }

        .aui-border:after {
            border-radius: 15%;
            border: none;
        }
    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">
        <!--<span class="aui-iconfont aui-icon-left" tapmode onclick='api.closeWin()'></span>-->
    </a>
</header>
<div>
    <div class="content">
        <div class="type">1/1</div>
        <div class="scroll">
        </div>
    </div>
    <div class="right-btn">
        <div class="up aui-border" tapmode onclick="winpageUpOnclick();">
            <span class="aui-iconfont aui-icon-shangyiti"
                  style="font-size: 1.8rem !important;color: white;line-height: 2.2rem"></span>
        </div>
        <div class="down aui-border" tapmode onclick="winnextOnclick();">
            <span class="aui-iconfont aui-icon-xiayiti"
                  style="font-size: 1.8rem !important;color: white;line-height: 2.2rem"></span>
        </div>
    </div>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var frameAry = [];
    var frameObj = {};
    var headerH;
    var frameH;
    var isVideo = 0;

    var currentIndex;
    var homeworkArr = [];

    apiready = function () {
        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
            api.closeWin();
        });

        var header = document.querySelector('header');
        var item = $api.dom('.content');
        var itemH = $api.offset(item).h;
        headerH = $api.offset(header).h;
        var contentH = padWinHeight - headerH - 15;
        var scrollH = contentH - $api.offset($api.dom('.type')).h;
        $api.css($api.dom('.content'), 'height:' + contentH + 'px');
        $api.css($api.dom('.scroll'), 'height:' + scrollH + 'px');
        var title = api.pageParam.homeworkName.replace(/<[^>]+>/g, "");
        if (title.length >= 40) {
            title = title.substring(0, 38) + '...';
        }
        $api.html($api.dom('.aui-toolbar-title'), '<span class="aui-iconfont aui-icon-left " style="font-size: 18px" tapmode onclick="api.closeWin();"></span>' + title + '');
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        if (api.pageParam.type == 'exercise') {
            apiObj.Get(UrlRouter.GetResourceInfo, {
                values: {
                    id: api.pageParam.resId,
                    type: 'exercise',
                    detail:1
                }
            }, function (ret, err) {
                api.hideProgress();
                if (ret) {
                    if (ret.ret == 0) {
                        frameObj = {
                            name: 'frame' + 1,
                            url: 'frame_text.html',
                            bounces: false,
                            pageParam: {
                                zymc: '【' + ret.txstr.substr(0,2) + '】' + ret.tg,
                                answer: ret.dastr,
                                analysis: ret.dajx
                            }
                        };
                        openFrameGroup();
                    }
                }
            });
        } else {
            getResource();
//            var cdn = '';
//            if (api.connectionType == 'wifi' || api.connectionType == 'unknown') {
//                cdn = $api.getStorage('SchoolIp');
//                api.ajax({
//                    url: "http://" + cdn + "/config",
//                    method: 'get',
//                    timeout: 3,
//                    returnAll: false
//                }, function (ret, err) {
//                    if (ret) {
//                        if (ret.id != $api.getStorage('station_id')) {
//                            cdn = '';
//                        }
//                    } else {
//                        cdn = '';
//                    }
//                    getResource(cdn);
//                });
//            } else {
//                getResource(cdn);
//            }
        }
    };

    function getResource() {
        apiObj.Get(UrlRouter.GetResourceInfo, {
            values: {
                id: api.pageParam.resId,
                type: 'material',
//                cdn: cdn,
                detail:1
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {
                    switch (ret.type) {
                        case 'doc':
                            var url = ret.serverpath + ret.rootpath;
                            frameObj = {
                                name: 'frame' + 1,
                                url: 'frame_doc.html',
                                pageParam: {
                                    url: url,
                                    zymc: '【素材】'+ ret.title+ret.filetype,
                                    isConvert: ret.is_convert,
                                    convertStatus: ret.convert_status,
                                    zyid: ret
                                },
                                bounces: false
                            };
                            break;
                        case 'video':
                            isVideo = 1;
                            if(ret.filetype == '.mp3' || ret.filetype == '.wma'){
                                var url = '';
                                if(ret.filetype == '.mp3'){
                                    url = ret.serverpath + ret.savename;
                                }
                                else {
                                    url = ret.serverpath + ret.rootpath;
                                }
                                frameObj = {
                                    name: 'frame' + 1,
                                    url: 'frame_voice_pad.html',
                                    pageParam: {
                                        url: url,
                                        zymc: '【素材】'+ ret.file_link,
                                        headerH: headerH,
                                        frameH: frameH,
                                        isConvert: ret.is_convert,
                                        convertStatus: ret.convert_status,
                                        filetime: ret.filetime,
                                    },
                                    bounces: false
                                };
                            }
                            else {
                                var url = ret.serverpath + ret.rootpath;
                                frameObj = {
                                    name: 'frame' + 1,
                                    url: 'frame_mp4.html',
                                    pageParam: {
                                        url: url,
                                        zymc: '【素材】'+ ret.file_link,
                                        headerH: headerH,
                                        frameH: frameH,
                                        isConvert: ret.is_convert,
                                        convertStatus: ret.convert_status
                                    },
                                    bounces: false
                                };
                            }
                            break;
                        case 'photo':
                            var url = ret.serverpath + ret.rootpath;
                            frameObj = {
                                name: 'frame' + 1,
                                url: 'frame_img.html',
                                pageParam: {url: url, zymc: '【素材】'+ ret.title+ret.filetype,},
                                bounces: false
                            };
                            break;
                        case 'swf':
                            frameObj = {
                                name: 'frame' + 1,
                                url: 'frame_swf.html',
                                pageParam: {url: url, zymc: '【素材】'+ ret.title+ret.filetype,},
                                bounces: false
                            };
                            break;
                    }
                    openFrameGroup();
                } else {
                    //alert(ret.msg);
                }
            } else {

            }
        })
    }
    function openFrameGroup() {
        frameAry.push(frameObj);
        var header = document.querySelector('header');
        var leftW = $api.offset($api.dom('.content')).w;
        var rightW = $api.offset($api.dom('.right-btn')).w;
        var headerH = $api.offset(header).h;
        api.openFrameGroup({
            name: 'materiallist',
            scrollEnabled: true,
            rect: {
                x: leftW + 10,
                y: headerH + 12,
                w: api.winWidth - leftW - leftW - 30,
                h: padWinHeight - headerH - 12
            },
            index: api.pageParam.index,
            preload: 0,
            frames: frameAry
        }, function (ret, err) {
            for (var i = 0; i < $api.domAll('.item').length; i++) {
                $api.css($api.domAll('.item')[i], 'color:#4bc7c7;background-color: #fff;width:1.5rem;height:1.5rem;line-height: 1.5rem; margin-left: 1rem;font-size: 0.6rem;');
            }
            $api.css($api.domAll('.item')[ret.index], 'color:#fff;background-color: #4bc7c7; width:1.8rem;height:1.8rem;line-height: 1.8rem; margin-left: 0.85rem;font-size: 0.75rem;');
            //设置上面index跟随下面滑动
            if ($api.html($api.domAll('.item')[ret.index]) > 5) {
                $api.dom('.scroll').scrollTop = ($api.html($api.domAll('.item')[ret.index]) - 4) * 56;
            } else {
                $api.dom('.scroll').scrollTop = 0;
            }
            api.sendEvent({
                name: 'stopVideo'
            });

        });
        var num = 1;
//        var itemWidth = num * 45 + 190;
//        $api.css($api.dom('.scroll'), 'width:' + itemWidth + 'px;');
        for (var i = 0; i < num; i++) {
            $api.append($api.dom('.scroll'), '<div class="item" onclick="itemClick(this);">' + (i + 1) + '</div>');
        }
        api.parseTapmode();
    }
    function itemClick(context) {

    }
    function winpageUpOnclick() {

        api.toast({
            msg: '已经是第一个了',
            duration: 2000,
            location: 'bottom'

        })

    }
    function winnextOnclick() {

        api.toast({
            msg: '已经是最后一个了',
            duration: 2000,
            location: 'bottom'
        });

    }
    //退出win之前，将屏幕设置为强制竖屏
    function closethis() {
//        api.setScreenOrientation({
//            orientation: 'portrait_up'
//        });
        api.closeWin();
    }

</script>
</html>
