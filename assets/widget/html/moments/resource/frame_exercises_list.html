<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>习题列表</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <style>        .ex_content{ padding-top: 20px; display: none}        .ex_content dl{ width:calc(100% - 60px); margin-left: 10px; margin-bottom: 10px; background: #fff; position: relative;  padding: 40px 20px 0 20px}        .ex_content dl dt{            width: 160px; height:40px ;background: #4bc7c7; color: #fff; text-align: center;  line-height: 40px;font-size: 1.8rem;            position: absolute; left: 0; top: 0;        }        .ex_content dl dd{ height: 55px;line-height: 55px; font-size: 1.4rem; position: relative }        .ex_content dl dd + dd{border-top: 1px solid #e4e4e8}        .ex-daipi{ position: absolute; right: 0; text-align: center; height: 25px; line-height: 25px; font-size: 1.2rem; color: #ff778c ; top: 15px;}        .ex_content dl dd p{width: calc(100% - 100px);overflow: hidden;            text-overflow:ellipsis;            white-space: nowrap;}        .ex-daipi img{width: 25px; height: 25px;}        .ex-xiaoti{ font-size: 1.2rem; color: #4bc7c7; display: block; height: 55px; line-height: 55px; position: absolute; right: 35px; width: 50px; text-align: right; top: 0px;}        .ex_content dl dd p img{     height: 49px!important;            vertical-align: top;            margin: 3px;}    </style></head><body><div class="ex_content">    <dl  v-if="materiallist.length>0"  >        <dt>基础类</dt>        <dd v-for="(list,index) in materiallist" :id="index" :type="is_score==1 && list.zyqf==2?list.xtzf:'noxtzf'" tapmode onclick="vm.openWinDetail(this)">           <p v-html="index+1+'.'+getzymc(list.txstr,list.zyqf,list.tx,list.zymc)"></p>            <span  class="ex-xiaoti" v-if=" list.xts>0" v-text="list.tx_code==2?'['+list.xts+'填空]':'['+list.xts+'小题]'"></span>        </dd>    </dl>    <dl v-if="materialtzxt.length>0" >        <dt>拓展类</dt>        <dd v-for="(list,index) in materialtzxt" :id="index" tapmode onclick="vm.openWinDetailTZ(this)">            <p v-html="index+1+'.'+getzymc(list.txstr,list.zyqf,list.tx,list.zymc)"></p>            <span  class="ex-xiaoti" v-if=" list.xts>0" v-text="list.tx_code==2?'['+list.xts+'填空]':'['+list.xts+'小题]'"></span>        </dd>    </dl></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    apiready = function () {        vue();        $('.ex_content').show();        vm.getData();    };    function vue() {        vm = new Vue({            el: '.ex_content',            data: {                materiallist: [],                materialtzxt: [],                is_score: ''            },            updated: function () {            },            methods: {                getzymc: function (txstr, zyqf, tx, zymc) {                    if (zyqf == 2) {                        return '【' + txstr + '】' + zymc;                    } else if (zyqf == 1) {                        return zymc;                    } else {                        return '作业要求';                    }                },                openWinDetail: function (context) {                    var index = $(context).attr('id');                    api.openWin({//                        name: 'win_detail',//                        url: 'win_detail.html',//                        pageParam: {//                            detailData: api.pageParam.detailData,//                            materiallist: vm.materiallist,//                            materialtzxt: vm.materialtzxt,//                            complete: 2,//                            type: $(context).attr('type'),//                            index: index//                        },                        name: 'win_detail',                        url: 'win_detail.html',                        pageParam: {                            detailData: api.pageParam.detailData,                            materiallist: vm.materiallist,                            materialtzxt: vm.materialtzxt,                            complete: 2,                            type: $(context).attr('type'),                            index: index                        },                        slidBackEnabled: false                    });                },                openWinDetailTZ: function (context) {                    var index = $(context).attr('id');                    api.openWin({//                        name: 'win_detail_kzxt',//                        url: 'kzxt/win_detail_kzxt.html',                        name: 'win_detail',                        url: 'win_detail.html',                        pageParam: {                            detailData: api.pageParam.detailData,//                            materiallist: vm.materiallist,//                            materialtzxt: vm.materialtzxt,                            materiallist: vm.materialtzxt,                            complete: 2,                            index: index                        },                        slidBackEnabled: false                    });                },                getData:function(){                    api.showProgress();                    var cdn = '';                    if (api.connectionType == 'wifi' || api.connectionType == 'unknown') {                        cdn = $api.getStorage('SchoolIp');                        api.ajax({                            url: "http://" + cdn + "/config",                            method: 'get',                            timeout: 3,                            returnAll: false                        }, function (ret, err) {                            if (ret) {                                if (ret.id != $api.getStorage('station_id')) {                                    cdn = '';                                }                            } else {                                cdn = '';                            }                            vm.getList(cdn);                        });                    } else {                        vm.getList(cdn);                    }                },                getList:function(cdn) {                    apiObj.Get(UrlRouter.GetResourceInfo, {                        values: {                            id: $api.getStorage('resourceid-stu'),                            type: 'homework',                            cdn: cdn,                            detail: 1                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            console.log("-----" + $api.jsonToStr(ret));                            if (ret.ret == 0) {                                vm.materiallist = ret.materiallist;                                vm.materialtzxt = ret.materialtzxt;                                vm.is_score = ret.is_score;                                if (ret.materialdxa.length > 0) {                                    vm.materiallist.unshift(ret.materialdxa[0]);                                }                                var zymc = ret.content;                                if (ret.content) {                                    var zyyq = {'txstr': '作业要求', 'zymc': zymc, 'zyqf': 3};                                    vm.materiallist.unshift(zyyq);                                }                                if(vm.materiallist.length == 0 && vm.materialtzxt.length == 0){                                    api.openFrame({                                        name: 'kong_list',                                        url: 'kong.html',                                        rect: {                                            x: 0,                                            y: api.pageParam.headerH,                                            w: 'auto',                                            h: api.pageParam.frameH                                        },                                        bounces: false,                                    });                                }                            } else {                                alert(ret.msg);                            }                        } else {                            alert(err.msg);                        }                    })                }            }        });    }</script></html>
