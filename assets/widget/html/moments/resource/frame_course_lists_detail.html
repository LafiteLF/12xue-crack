    var zyInfo = {};
    var jcxt = [];

    function getDetailLists() {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        apiObj.Get(UrlRouter.GetResourceInfo, {
            values: {
                id: api.pageParam.kcid,
                type: 'course',
//                cdn: cdn,
                detail:1
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    api.hideProgress();
                    if (ret.materiallist.jksc.length == 0) {
                        $api.html($api.dom('.aui-content'), '<div class="no-data"> <img class="img-null" src="../../../image/stuHomePad/noContent.png" style="height:auto!important;width: 40%;vertical-align: middle;position: absolute;top: 30%;left: 30%;"/> </div>');
                    } else {
                        for (var i = 0; i < ret.materiallist.jksc.length; i++) {
                            var string = ret.materiallist.jksc[i].xsmc;
                            //替换string里的<br>、<br/>标签
                            string = string.replace(new RegExp("<br>", "gm"), "");
                            string = string.replace(new RegExp("<br/>", "gm"), "");
                            string = string.replace(new RegExp("<p>", "gm"), "");
                            string = string.replace(new RegExp("</p>", "gm"), "");
                            tx = '';
//                            if (ret.materiallist.jksc[i].tx == "danxt") {
//                                tx = "【单选】";
//                            } else if (ret.materiallist.jksc[i].tx == "duoxt") {
//                                tx = "【多选】";
//                            } else if (ret.materiallist.jksc[i].tx == "pdt") {
//                                tx = "【判断】";
//                            } else if (ret.materiallist.jksc[i].tx == "wendt") {
//                                tx = "【问答】";
//                            } else if (ret.materiallist.jksc[i].tx == "tkt") {
//                                tx = "【填空】";
//                            } else {
//                                tx = "";
//                            }
                            if(ret.materiallist.jksc[i].zyqf == 2){
                                //tx = '【'+ret.materiallist.jksc[i].txstr.substr(0,2)+'】';
                                tx = '【'+ret.materiallist.jksc[i].txstr+'】';
                            }else {
                                tx = '';
                            }
                            var xts = ret.materiallist.jksc[i].xts;
                            var tx_code = ret.materiallist.jksc[i].tx_code;
                            var xts_show = '';
                            if(xts > 0){
                                if(tx_code == 2){
                                    xts_show = '['+ret.materiallist.jksc[i].xts+'填空]';
                                }
                                else {
                                    xts_show = '['+ret.materiallist.jksc[i].xts+'小题]';
                                }
                            }

                            $api.append($api.dom("#listView"),
                                '<li class="aui-list-view-cell" index = "' + i + '" tapmode onclick="openJcxtMaterial(this);"><span class="aui-ellipsis-1 li_content">' + (i + 1) + '. ' + tx + string + '</span><span class="xts_show">' + xts_show + '</span></li>'
                            );
                            if (ret.materiallist.jksc[i].zyqf == 1) {
                                zyUrl = ret.materiallist.jksc[i].serverpath + ret.materiallist.jksc[i].rootpath;
//                                if (ret.materiallist.jksc[i].type == 'doc') {
//                                    zyUrl = ret.materiallist.jksc[i].PreTemp + encodeURIComponent(zyUrl);
//                                }
                                zyInfo = {
                                    name: (i + 1 ) + '.' + '【素材】' + ret.materiallist.jksc[i].xsmc,
                                    type: 'zy',
                                    url: zyUrl,
                                    is_convert: ret.materiallist.jksc[i].is_convert,
                                    zytype: ret.materiallist.jksc[i].type,
                                    convert_status: ret.materiallist.jksc[i].convert_status,
                                    filetype: ret.materiallist.jksc[i].filetype,
                                    zyid: ret.materiallist.jksc[i].zyid,
                                    zyqf: ret.materiallist.jksc[i].zyqf,
                                };
                            } else {
                                zyInfo = {
                                    name: (i + 1 ) + '. ' + tx + ret.materiallist.jksc[i].xsmc,
                                    type: 'xt',
                                    filetype: '',
                                    answer: ret.materiallist.jksc[i].dastr,
                                    analysis: ret.materiallist.jksc[i].dajx
                                };
                            }
                            jcxt.push(zyInfo);
                        }
                        api.parseTapmode();
                    }

                } else {
                    api.hideProgress();
                    //alert(ret.msg);
                }
            } else {
                api.hideProgress();

            }
        })
    }
    function openJcxtMaterial(context) {
        api.openWin({
            name: 'win_course_detail',
            url: 'win_course_detail.html',
            pageParam: {list: jcxt, index: $api.attr(context, 'index'), homeworkName: api.pageParam.homeworkName}
        });
    }
