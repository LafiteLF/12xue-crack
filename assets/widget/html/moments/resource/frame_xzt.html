<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>单选 多选 判断 听单句话 单项选择</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/></head><style>    .xzt_content{ display: none}</style><body><div class="xzt_content">    <div class="content">        <div class="stem">            <ul>                <li class="tixing clearfix">                    <div class="tihao" v-text="(index+1)+'.'"></div>                    <div class="tixingzi" v-if="material.ytlx!=3" v-text="material.zyqf != 1?'【'+material.txstr+'】':'【素材】'"></div>                    <div class="tixingzi" v-if="material.ytlx==3" >【自主学习单】</div>                </li>                <li v-if="complete==2 && material.zyqf == 2" class="zsd" @click="alertzsd(data.zsdmc)">                    <span>难易度：</span><img class="noImgClick" :src="data.nyd==1?'../../../image/newhomework/1xing.png':data.nyd==2?'../../../image/newhomework/2xing.png':data.nyd==3?'../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{data.zsdmc}}                </li>            </ul>            <div class="tg_content font666" v-if="material.zyqf !=1" v-html="material.zyqf == 3 ?material.zymc:data.tg"></div>            <div class="tg_content font666" v-if="material.zyqf ==1" v-html="data.file_link"></div>            <div class="scyinpin clearfix" v-if="material.zyqf ==2 && material.tx=='tdjh' && data.attachments">                <img  class="scyp1 noImgClick" src="../../../image/newhomework/yuyinimg.png">                <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);"  src="../../../image/startPlay.png" alt="">                <div class="ypRange"> <input class="myRange" type="range" min="0"  value="0"  :max='data.attachments[0].filetime' ></div>                <p class="ypTimeP" v-text="getOutTime(data.attachments[0].filetime)"></p>                <audio v-if="fileType == '.mp3'" class="hideenAudio" :src='data.attachments[0].serverpath + data.attachments[0].savename'></audio>                <audio v-if="fileType != '.mp3'" class="hideenAudio" :src='data.attachments[0].serverpath + data.attachments[0].preview_link' ></audio>            </div><!--            <div class="tdjhxx"  v-if="material.zyqf ==2 && material.tx=='tdjh'">--><!--                <p v-for="list in data.option" v-html="'<span>'+list.xx+'</span>'+'.'+list.description"></p>--><!--            </div>-->            <!--素材开始-->            <div class="sucai" v-if="material.zyqf ==1">                <div class="sctupian" v-if="getFileType(fileType) == 'img'">                    <img :src="url" alt="">                </div>                <div class="pdf" v-if="getFileType(fileType) == 'doc'">                    <img  class="noImgClick" v-if="convert_status == 0" src="../../../image/newhomework/zhuanma.gif">                    <img  class="noImgClick" v-if="convert_status == 2" src="../../../image/newhomework/shibai.png">                    <p v-if="convert_status == 0|| convert_status == 2" v-text="getconvert(convert_status)"></p>                    <span v-if="convert_status == 1  " tapmode @click="openPDF(url)">点击查看内容</span>                </div>                <div class="pdf" v-if="getFileType(fileType) == 'pdf'">                    <span tapmode @click="openPDF(url)">点击查看内容</span>                </div>                <div class="scshipin" v-if="getFileType(fileType) == 'video'" :url="getVideo(url)" onclick="vm.videoZYPlay(this);">                    <img  class="noImgClick"  src="../../../image/bof_03.png">                </div>                <div class="pdf" v-if="getFileType(fileType) == 'swf'">                    <img class="noImgClick"  src="../../../image/newhomework/shibai.png">                    <p>swf资源暂不支持在移动端播放</p>                </div>            </div>            <!--素材结束-->        </div>        <!--答案部分开始-->        <dl v-if="complete==2 && material.zyqf == 2" class="wenda_answer bgFFF">            <dt v-if="isShowAnswer" class="defen">                <img  class="noImgClick"  v-if="data.is_true!=0 && type =='noxtzf'"                      :src="data.is_true==1?' ../../../image/newhomework/zhengque.png':data.is_true==2?'../../../image/newhomework/cuowu.png':data.is_true==3?'../../../image/newhomework/bandui.png':''">                <span v-if="type =='noxtzf'" :style="data.is_true==1?'color: #4bc7c7':data.is_true==2?'color: #df7605':data.is_true==3?'color: #ffcd06':''"                      v-text="data.is_true==1?'正确':data.is_true==2?'错误':data.is_true==3?'正确率'+data.accuracy*100+'%':''"></span>                <span v-if="data.is_true==0" style="color: #ff778c">待批</span>                <b v-if="data.is_true!=0 && type !='noxtzf'" v-html="'本题得分<em>'+data.score+'</em>/总分'+scorelist"></b>            </dt>            <dd :style="!isShowAnswer?'display:inline-block':'display:none'" class="tishi"><img src="../../../image/newhomework/ts.png">未到正确答案显示时间，只展示学生答案哦~</dd>            <dd>                <h2 class="wendah2">【我的答案】</h2>                <ul class="clearfix wendawdda">                    <li class="wendazi">                        <p v-html="data.is_unable==1?'不会做':data.xsdastr"></p>                    </li>                </ul>            </dd>            <dd v-if="data.audio && data.audio.length>0" :style="isShowAnswer?'display:block':'display:none'">                <h2 class="wendah2">【老师留言】</h2>                <ul class="clearfix">                    <li :class="ylist.type==1?'teacher_liuyan yuyin3':'teacher_liuyan_zi yuyin3'"                        v-for="(ylist , index) in data.audio" @click="yuyin(ylist,index)">                        <img   v-if="ylist.type==1" class="audio-img img1 noImgClick" src="../../../image/newhomework/yuyin1.png"/>                        <img   v-if="ylist.type==1" class="audio-img img2 noImgClick" src="../../../image/newhomework/yuyin2.gif"/>                        <span v-if="ylist.type==1" v-text="ylist.filetime+'″'"></span>                        <span v-if="ylist.type==2" v-text="ylist.descript"></span>                    </li>                </ul>            </dd>            <dd :style="isShowAnswer?'display:block':'display:none'">                <h2 class="wendah2">【正确答案】</h2>                <ul>                    <li class="wendazi" v-html="data.dastr==''?'无':data.dastr"></li>                </ul>            </dd>            <dd :style="isShowAnswer?'display:block':'display:none'">                <h2 class="wendah2">【答案解析】</h2>                <ul>                    <li class="wendazi" v-html="data.dajx==''?'无':data.dajx"></li>                </ul>            </dd>        </dl>        <!--答案部分结束-->    </div>    <!--作答部分开始-->    <ul v-if="complete!=2 && material.zyqf == 2" class="option">        <!--单选-->        <li v-for="list in data.option" v-if="data.tx!='duoxt'" :id="list.id"            :class="answer[0]==list.id?'danxoption xxactive':'danxoption'" v-text="data.tx=='pdt'?list.description:list.xx" tapmode            onclick="vm.xxselectClicked(this)"></li>        <!--多选-->        <li v-for="list in data.option" v-if="data.tx=='duoxt'" :id="list.id"            :class="isdxactive(list.id)?'duoxoption xxactive':'duoxoption'" v-text="list.xx" tapmode            onclick="vm.xxselectClicked(this)"></li>        <li class="bhz font4BC7C7" tapmode onclick="vm.checded(this)">            <span :class="is_unable==1?'inputCheckactive':''"></span>不会做        </li>    </ul>    <!--作答部分结束--></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var actionTime = 0;    var allTime = 0;    var newtimejs;    var queryHomewokAnswer;    var allTimes = 0;//音频播放    var sec;    var timer = null;    apiready = function () {        vue();        if(vm.complete!=2){            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {                queryHomewokAnswer = {};            } else {                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));            }        }        if (vm.material.zyqf == 1) {//资源            vm.GetMaterialInfo();        } else if (vm.material.zyqf == 2) {//习题            vm.GetParentexercisesUrl()        } else {//作业要求            $('.xzt_content').show();        }        // alert(JSON.stringify(vm.material))        if(vm.complete==2){//答完题显示总分            vm.type = api.pageParam.type;            vm.scorelist = api.pageParam.scorelist;        }        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if($api.domAll('.scyp2').length>=1){                if($('.scyp2').attr('playStatus')==1){                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                audioStreamer = api.require('audioStreamer');                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                clearInterval(timer);                var hideenAudio = $api.dom('.hideenAudio');                hideenAudio.pause();            }        });        api.addEventListener({//记录时间开始            name: 'kshomeworkSetTimeout'        }, function (ret, err) {            if (ret.value.index == vm.index) {                if (vm.material.txstr != '作业要求') {                    var db = api.require('db');                    var ret = db.openDatabaseSync({                        name: dbName,                        path: 'fs://student_12xue.db'                    });                    var returnDatatime = db.selectSqlSync({//查询作业时间                        name: dbName,                        sql: 'SELECT * FROM NewHomeWrokTime where uid=' + $api.getStorage('uid') + ' and kcid=' + vm.material.hwid + ' and zyid=' + vm.material.zyid + ' and xsbjid=' + vm.homeworkListData.bjid                    });                    // alert('returnDatatime'+JSON.stringify(returnDatatime))                    if (JSON.stringify(returnDatatime.data) == '[]') {                        allTime = 0;                    } else {                        allTime = parseInt(returnDatatime.data[0].time);                    }                    newtimejs = setInterval(function () {                        actionTime++;                    }, 1000);                }            } else {                clearInterval(newtimejs);                allTime = allTime + actionTime;                actionTime = 0;                if (vm.material.zyqf == 1) {//资源                    api.sendEvent({                        name: 'zytime',                        extra: {                            zyid: vm.material.zyid,                            use_time: allTime,                            index: vm.index                        }                    });                }            }        });    };    function vue() {        vm = new Vue({            el: '.xzt_content',            data: {                index: api.pageParam.index,//当前frame的索引                material: api.pageParam.material,//当前习题资料                homeworkListData: api.pageParam.homeworkListData,//作业列表传过来的数据                complete: api.pageParam.complete,//作业完成状态                data: [],//作业详情                schoolid: api.pageParam.schoolid,//学校id                answer: [],//答案数组                is_unable: 0,//是否会做 0会做 1不会做                isPlaying: false,//老师留言是否播放中                isShowAnswer: false,                fileType: '',//素材类型                url: '',//素材路径                convert_status: '',//判断素材doc是否转码成功                type:'',//习题总分,                scorelist:'',                filetime: 0,                title: ''            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                alertzsd:function(content){                    alert('知识点：'+content);                },                GetMaterialInfo: function () {//获取资源详情                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetMaterialInfo, {                        values: {                            id: vm.material.zyid                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.xzt_content').show();                                vm.data = ret;                                vm.fileType = ret.filetype;                                vm.convert_status = ret.convert_status;                                vm.url = ret.serverpath + ret.rootpath;                                vm.filetime = ret.filetime;                                vm.title = ret.title;                            } else {                                api.toast({                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        } else {                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    })                },                GetParentexercisesUrl: function () {//获取作业习题详情及答题结果                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetParentexercisesUrl, {                        values: {                            hwid: vm.material.hwid,                            uid: $api.getStorage('uid'),                            xtid: vm.material.zyid,                            classid: vm.homeworkListData.bjid,                            ytlx: vm.material.ytlx,                            step: 0,                            schoolid: vm.schoolid                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.xzt_content').show();                                vm.data = ret;                                // alert(JSON.stringify(vm.data.attachments[0]));                                if (vm.complete == 2) {                                    if ( vm.data.isshowanswer == 1) {                                        vm.isShowAnswer = true;                                    } else {                                        vm.isShowAnswer = false;                                    }                                }                                if (vm.complete != 2) {                                    if (queryHomewokAnswer.hasOwnProperty(vm.material.zyid)) {//缓存的答案                                        vm.answer = queryHomewokAnswer[vm.material.zyid].da;                                        vm.is_unable = queryHomewokAnswer[vm.material.zyid].is_unable;                                    }                                }                            } else {                                api.toast({                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        } else {                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    })                },                getFileType: function (filetype) {                    if (filetype == '.png' || filetype == '.jpg' || filetype == '.jpeg' || filetype == '.gif' || filetype == '.bmp') {                        return 'img'                    }                    else if (filetype == '.doc' || filetype == '.docx' || filetype == '.ppt' || filetype == '.pptx' || filetype == '.xls' || filetype == '.xlsx' || filetype == '.txt') {                        return 'doc'                    } else if (filetype == '.pdf') {                        return 'pdf'                    }                    else if (filetype == '.swf') {                        return 'swf'                    } else if (filetype == '.mp3' || filetype == '.wma') {                        // if (api.systemType == 'ios') {                        return 'video';                        // } else {                        //     return 'audio'                        // }                    } else {                        return 'video'                    }                },                getconvert: function (convert_status) {                    if (convert_status == 0) {                        return '资源正在转码,请三分钟后回来';                    }                    else if (convert_status == 2) {                        return '资源转码失败';                    }                },                openPDF: function (url) {                    api.showProgress({                        style: 'default',                        animationType: 'fade',                        title: '提示',                        text: '正在下载素材',                        modal: true                    });                    var str = vm.material.zymc + vm.material.zyid;                    str = str.replace(/#/, '');                    api.download({                        url: url,                        savePath: 'fs://pdfDownload/' + str + '.pdf',                        report: false,                        cache: true,                        allowResume: true                    }, function (ret, err) {                        api.hideProgress();                        if (ret.state == 1) {//                            if (api.systemType == 'ios') {//                                var docReader = api.require('docReader');//                                docReader.open({//                                    path: ret.savePath//                                }, function (ret, err) {//                                });//                            } else {                                api.openWin({                                    name: 'win_pdf_view',                                    url: '../../win_pdf_view.html',                                    pageParam: {                                        path: ret.savePath                                    }                                });                            //}                        } else {                            //提示文档打开失败                            api.toast({                                msg: '文档下载失败，请检查网络，稍后再试！',                                duration: 2000,                                location: 'bottom'                            });                        }                    });                },                getVideo: function (url) {                    return decodeURIComponent(url);                },                videoZYPlay: function (context) {                    var url = $api.attr(context, 'url');                    api.openWin({                        name: 'win_video_view',                        url: '../../win_video_view.html',                        slidBackEnabled:false,                        pageParam: {                            path: url,                            title: vm.title,                            isMp3: false,                            filetime: vm.filetime                        }                    });                    api.addEventListener({                        name: 'backVideo'                    }, function (ret, err) {                        api.closeToWin({                            name: 'win-homework-Detail'                        });                    });//                    var videoPlayer = api.require('videoPlayer');//                    videoPlayer.play({//                        texts: {//                            head: {//                                title: ''//                            }//                        },//                        styles: {//                            head: {//                                bg: 'rgba(0.5,0.5,0.5,0.7)',//                                height: 44,//                                titleSize: 18,//                                titleColor: '#fff',//                                backSize: 44,//                                backImg: 'widget://image/video/video_d.png',//                                setSize: 44,//                                setImg: 'widget://image/video/video_e.png'//                            },//                            foot: {//                                bg: 'rgba(0.5,0.5,0.5,0.7)',//                                height: 44,//                                playSize: 44,//                                playImg: 'widget://image/video/video_f.png',//                                pauseImg: 'widget://image/video/video_b.png',//                                nextSize: 44,//                                nextImg: 'widget://image/video/video_i.png',//                                timeSize: 14,//                                timeColor: '#fff',//                                sliderImg: 'fs://img/slder.png',//                                progressColor: '#696969',//                                progressSelected: '#76EE00',//                                verticalImg: 'widget://image/video/video_l.png',//                                horizontalImg: 'widget://image/video/video_l.png'//                            }//                        },//                        path: url,//                        autoPlay: true,//                        coverImg: 'widget://image/video/video_k.png',//                        autorotation: false,//                        audio: 'video'//                    }, function (ret, err) {//                        if (ret.eventType == 'back') {//                            api.closeToWin({//                                name: 'win-homework-Detail'//                            });//                        }//                    });                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                isdxactive: function (xxid) {//判断多选选项是否选择了                    if (vm.answer.length > 0) {                        for (var i = 0; i < vm.answer.length; i++) {                            if (vm.answer[i] == xxid) {                                return true;                            }                        }                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    if (vm.data.tx == 'duoxt') {//判断是多选题 可以选多个答案                        if (vm.answer.length == 0) {                            vm.answer.push($(context).attr('id'));                            vm.is_unable = 0;//会做                            vm.saveAnswer(vm.is_unable, vm.answer);                        } else {                            for (var i = 0; i < vm.answer.length; i++) {                                if (vm.answer[i] == $(context).attr('id')) {                                    vm.answer.splice(i, 1);                                    if (vm.answer.length == 0) {                                        vm.is_unable = 1;//不会做                                    } else {                                        vm.is_unable = 0;//会做                                    }                                    vm.saveAnswer(vm.is_unable, vm.answer);                                    return;                                } else if (i == vm.answer.length - 1) {                                    vm.answer.push($(context).attr('id'));                                    vm.is_unable = 0;//会做                                    vm.saveAnswer(vm.is_unable, vm.answer);                                    return;                                }                            }                        }                    } else {//判断是单选 或者判断题 只有一个选项的                        Vue.set(vm.answer, 0, $(context).attr('id'));                        vm.is_unable = 0;//会做                        vm.saveAnswer(vm.is_unable, vm.answer);                    }                },                checded: function (context) {//复选框不会做点击事件                    vm.answer = [];                    vm.is_unable = 1;//不会做                    vm.saveAnswer(vm.is_unable, vm.answer);                },                saveAnswer: function (is_unable, da) {                    var eachxtgroup = {                        'is_auto': 1,                        'tx': vm.data.tx,                        'is_unable': is_unable,                        'xtid': vm.material.zyid,                        'da': da,                        'daoptions': vm.data.daoption,                        'tx_code': vm.data.tx_code,                        'score': vm.material.score                    };                    clearInterval(newtimejs);                    allTime = allTime + actionTime;                    actionTime = 0;                    api.sendEvent({                        name: 'saveAnswerHuancun',                        extra: {                            eachxtgroup: eachxtgroup,                            zyid: vm.material.zyid,                            use_time:allTime,                            index: vm.index                        }                    });                    newtimejs = setInterval(function () {                        actionTime++;                    }, 1000);                },                studentRecord:function (context) {                    var url =   vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime                    var hideenAudio = $api.dom('.hideenAudio');                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频 tr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if(src.substring(src.length-3)=='gif'){}else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });}    }</script></html>
