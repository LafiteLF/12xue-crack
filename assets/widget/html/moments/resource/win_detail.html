<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>win</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width: calc(100% - 631px);        }    </style></head><body><div class="content1" style="display: none">    <header class="clearfix">        <div tapmode @click="closeWin();" class="winTitle pull_left" v-text="homeworkListData.title"></div>    </header>    <div class="content">        <div class="type bg4BC7C7 fontFFF">{{current+1}}/{{zynum}}</div>        <ul class="scroll">            <li v-for="(list , index) in materiallist" v-text="index+1" :style="complete!=2 && current!=index && answeredArr[list.zyid]==true?'background:#70f0f0;border:1px solid #70f0f0;color:#fff':''" :class="current==index?'current':''" tapmode                onclick="vm.itemClick(this)">            </li>        </ul>    </div>    <ul class="right_btn">        <li tapmode onclick="vm.winpageUpOnclick();"><img src="../../../image/up1.png"></li>        <li tapmode onclick="vm.winnextOnclick();"><img src="../../../image/down1.png"></li>    </ul></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var queryHomewokAnswer;    apiready = function () {        vue();        $('.content1').show();        vm.openFrameGroup();        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            vm.closeWin()        });    };    function vue() {        vm = new Vue({            el: '.content1',            data: {                homeworkListData: api.pageParam.detailData,//作业列表传过来的数据                complete: api.pageParam.complete,//作业完成状态                current: 0,//当前是第几个frame                xitiAllNum: 0,// 习题总数可作答部分 不包括素材 和作业要求                zynum: api.pageParam.materiallist.length,//所有题的数量 包括素材 习题和作业要求                data: [],                materiallist: api.pageParam.materiallist,//基础习题列表                materialtzxt: api.pageParam.materialtzxt,//扩展习题列                isEvaluate: api.pageParam.detailData.remark ? api.pageParam.detailData.remark : '',//是否显示评论                isUpload: api.pageParam.detailData.is_attach ? api.pageParam.detailData.is_attach : '',//是否显示上传附件                pingyu:api.pageParam.detailData.content?api.pageParam.detailData.content:'',                wznum: 0,                tongji: 0,                oldindex:0,                answeredArr:{}            },            updated: function () {            },            methods: {                openFrameGroup: function () {                    var header = document.querySelector('header');                    var leftW = $api.offset($api.dom('.content')).w;                    var rightW = $api.offset($api.dom('.right_btn')).w;                    var headerH = $api.offset(header).h;                    var frameAry = [];                    var frameObj = {};                    for (var i = 0; i < vm.materiallist.length; i++) {                        var url;                        if (vm.materiallist[i].zyqf != 2) {//素材和作业要求                            if (vm.materiallist[i].filetype == '.mp3' || vm.materiallist[i].filetype == '.wma'){                                url = 'frame_homework_voice_pad.html';                            }                            else {                                url = 'frame_xzt.html';                            }                        } else {                            if(vm.materiallist[i].tx_code == 4 || vm.materiallist[i].tx_code == 5) {                                url = 'frame_sytj.html';                            }                            else  {                                url = 'frame_tkt.html';                            }                        }                        frameObj = {                            name: 'frame_Detail' + (i + 1),                            url: url,                            bounces: false,                            bgColor: '#f2f2f2',                            pageParam: {                                index: i,                                material: vm.materiallist[i],                                homeworkListData: vm.homeworkListData,                                complete: vm.complete,                                schoolid: vm.data.schoolid,                                queryHomewokAnswer: queryHomewokAnswer,                                type: api.pageParam.type,                                isConvert: vm.materiallist[i].is_convert,                                convertStatus: vm.materiallist[i].convert_status,                                filetype: api.pageParam.filetype                            }                        };                        frameAry.push(frameObj);                    }                    api.openFrameGroup({                        name: 'frame_Detail',                        scrollEnabled: false,                        rect: {                            x: leftW + 10,                            y: headerH + 10,                            w: api.winWidth - leftW - rightW - 30,                            h: $api.getStorage('padHeight') - headerH - 10                        },                        index: api.pageParam.index,                        preload: 2,                        frames: frameAry,                        reload: true                    }, function (ret, err) {                        if( vm.materiallist[0].txstr=='作业要求' && ret.index ==0 ){                            $('.tiwen').hide();                        }else{                            $('.tiwen').show();                        }                        vm.current = ret.index;                        if (vm.current > 4) {                            $api.dom('.scroll').scrollTop = (vm.current - 4) * 47                        } else {                            $api.dom('.scroll').scrollTop = 0;                        }                        if (vm.complete != 2) {                            if(vm.current==0){                                // alert('san');                                setTimeout(                                    function(){                                        api.sendEvent({                                            name: 'kshomeworkSetTimeout',                                            extra: {index: ret.index}                                        });                                    },2000);                            }else{                                api.sendEvent({                                    name: 'kshomeworkSetTimeout',                                    extra: {index: ret.index}                                });                            }                        }                        api.sendEvent({//暂停音频                            name: 'yinpinCLose'                        });                    });                },                winpageUpOnclick: function () {//右边上一个按钮切换                    if (vm.current == 0) {                        api.toast({                            msg: '已经是第一个了',                            duration: 2000,                            location: 'bottom'                        })                    } else {                        vm.current = vm.current - 1;                        api.setFrameGroupIndex({                            name: 'frame_Detail',                            index: vm.current,                            scroll: true                        });                    }                },                winnextOnclick: function () {//右边下一个按钮切换                    if (vm.current == vm.zynum - 1) {//                        if (vm.complete == 2) {//答完跳统计页面//                            api.openWin({//                                name: 'win_answer_statics',//                                url: 'win_answer_statics.html',//                                pageParam: {//                                    hwid: vm.hwid,//                                    xsbjid: vm.xsbjid,//                                    is_score: vm.data.is_score,//是否是得分//                                    complete: vm.complete,//                                    homeworkListData: vm.homeworkListData,//                                    tongji: vm.tongji,//                                    inputType:'datiafter'//                                }//                            });//                        } else {//未答完提示//                            api.toast({//                                msg: '已经是最后一个了',//                                duration: 2000,//                                location: 'bottom'////                            })//                        }                        api.toast({                            msg: '已经是最后一个了',                            duration: 2000,                            location: 'bottom'                        })                    } else {                        vm.current = vm.current + 1;                        api.setFrameGroupIndex({                            name: 'frame_Detail',                            index: vm.current,                            scroll: true                        });                    }                },                itemClick: function (context) {//左边题号切换                    vm.current = $(context).index();                    api.setFrameGroupIndex({                        name: 'frame_Detail',                        index: vm.current,                        scroll: true                    });                },                closeWin: function () {                    api.closeWin();                    api.sendEvent({                        name: 'shuaxin-frame-homework-list-pad'                    });                },                MonitorWZnumber:function(xtgroup) {                    // vm.answeredArr[ret.materiallist[i].id] = false;                    var material = vm.materiallist;                    var yzxtnum = 0;                    for (var i = 0; i < material.length; i++) {                        var listid = material[i].zyid;                        if (xtgroup[listid] == undefined) {                        } else {                            if (xtgroup[listid].tx_code == 2) {//填空                                var tktwdkong = 0;                                for (var j = 0; j < xtgroup[listid].da.length; j++) {                                    if (xtgroup[listid].da[j].is_unable == 0 && xtgroup[listid].da[j].descript.length == 0) {                                        tktwdkong++                                    }                                }                                if (tktwdkong == 0) {                                    yzxtnum++;                                    vm.answeredArr[listid] = true;                                }else{                                    vm.answeredArr[listid] = false;                                }                            } else if (xtgroup[listid].tx_code == 1) {//选择判断题                                yzxtnum++;                                vm.answeredArr[listid] = true;                            } else if (xtgroup[listid].tx_code == 3) {//问答题                                if (xtgroup[listid].da.length == 0 && xtgroup[listid].is_unable == 0) {                                    vm.answeredArr[listid] = false;                                } else {                                    yzxtnum++;                                    vm.answeredArr[listid] = true;                                }                            } else if (xtgroup[listid].tx_code == 4) {//完形填空                                var wxwd = 0;                                for (var j = 0; j < xtgroup[listid].children.length; j++) {                                    if (xtgroup[listid].children[j].da.length == 0 && xtgroup[listid].children[j].is_unable == 0) {                                        wxwd++                                    }                                }                                if (wxwd == 0) {                                    yzxtnum++;                                    vm.answeredArr[listid] = true;                                }else{                                    vm.answeredArr[listid] = false;                                }                            } else if (xtgroup[listid].tx_code == 5) {//实验探究                                var sytjwd = 0;                                for (var j = 0; j < xtgroup[listid].children.length; j++) {                                    if (xtgroup[listid].children[j].is_auto == 1) {//自动批阅                                        var sytjautowd = 0;                                        for (var s = 0; s < xtgroup[listid].children[j].da.length; s++) {                                            if (xtgroup[listid].children[j].da[s].is_unable == 0 &&                                                xtgroup[listid].children[j].da[s].descript.length == 0) {                                                sytjautowd++;                                            }                                        }                                        if (sytjautowd != 0) {                                            sytjwd++                                        }                                    } else {//手动批阅                                        if (xtgroup[listid].children[j].is_unable == 0 && xtgroup[listid].children[j].da.length == 0) {                                            sytjwd++                                        }                                    }                                }                                if (sytjwd == 0) {                                    yzxtnum++;                                    vm.answeredArr[listid] = true;                                }else{                                    vm.answeredArr[listid] = false;                                }                            }                        }                    }                    vm.wznum = vm.xitiAllNum - yzxtnum;                    if (vm.wznum < vm.xitiAllNum) {                        if (vm.complete != 1) {                            vm.PostAnswerUpdateHomeworkComplete(1);                        }                    } else {                        if (vm.complete != 0) {                            vm.PostAnswerUpdateHomeworkComplete(0);                        }                    }                },            }        })    }</script></html>
