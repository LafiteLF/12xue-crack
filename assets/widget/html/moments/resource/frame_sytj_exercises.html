<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>填空题</title>
    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>
    <style>
        .tkt_content {
            display: none
        }
    </style>
</head>
<body>
<div class="tkt_content" id="tkt_content">
    <div class="tkt_top">
        <ul>
            <li class="tixing clearfix">
                <div class="tihao" v-text="1 +'.'"></div>
                <div class="tixingzi" v-text="'【'+data.txstr+'】'"></div>
            </li>
            <li class="zsd" @click="alertzsd(data.zsdmc)">
                <span>难易度：</span><img  class="noImgClick"
                                       :src="data.nyd==1?'../../../image/newhomework/1xing.png':data.nyd==2?'../../../image/newhomework/2xing.png':data.nyd==3?'../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{data.zsdmc}}
            </li>
        </ul>
    </div>
    <div class="tkt_left" id="left" style="width: calc(60% - 25px)">
        <div class="tg_content font666" v-html="data.tg"></div>
        <div style="" class="tdjhyinpin clearfix" v-if="data.attachments && (data.tx=='tdh' || data.tx=='tdb'|| data.tx=='ttt')">
            <img style="padding-left: 30px;" class="scyp1 noImgClick" src="../../../image/newhomework/yuyinimg.png">
            <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);"  src="../../../image/startPlay.png" alt="">
            <div style="width: calc(100% - 190px);" class="ypRange"> <input class="myRange" type="range" min="0"  value="0"  :max='data.attachments[0].filetime' ></div>
            <p class="ypTimeP" v-text="getOutTime(data.attachments[0].filetime)"></p>
            <audio class="hideenAudio" :src='data.attachments[0].serverpath + data.attachments[0].preview_link' ></audio>
        </div>
    </div>
    <div class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">
        <div class="tkt_right_content">
            <div class="huakuai" id="huakuai"></div>
            <span class="wxtk_xiaoti" v-text="'共'+data.children.length+'小题'"></span>
            <ul class="wxtk_content">
                <li v-for="(list,index) in data.children">
                    <!--答题部分开始-->
                    <div class="xiaotifenge wxtk_tg" v-html="'('+(index+1)+')'+list.tg"></div>
                    <!--作图题图片题干-->
                    <ul v-if="list.is_auto==0 && list.datatype==2 " class="zttimg clearfix">
                        <li v-for="(item ,index2) in list.attachments">
                            <img :src="item.serverpath+item.savename">
                            <p v-text="index2+1"></p>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    var timer = null;
    apiready = function () {
        vue();
        $('.tkt_content').show();
        vm.huakuai();
        for (var i = 0; i < $api.domAll('img').length; i++) {
            if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
            }
        }
    };

    function vue() {
        vm = new Vue({
            el: '.tkt_content',
            data: {
                homeworkListData: api.pageParam.homeworkListData,//作业列表传过来的数据
                data: api.pageParam.homeworkListData//作业列表传过来的数据
            },
            updated: function () {
//                for (var i = 0; i < $api.domAll('img').length; i++) {
//                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
//                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
//                    }
//                }
            },
            methods: {
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },
                studentRecord:function (context) {
                    var url =   vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link
                    var playStatus = $api.attr(context, 'playStatus');
                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime
                    var hideenAudio = $api.dom('.hideenAudio');
                    var range = $api.dom('.myRange');
                    range.disabled = true;
                    var bfb;  //1
//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频
                    if (playStatus == '0') {
                        if (timer) {
                            clearInterval(timer);
                        }
                        $api.attr(context, 'playStatus', '1');
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                        hideenAudio.play();
                        sec = 0;
                        allTimes = recodetime;
                        timer = setInterval(function (e) {
                            console.log(hideenAudio.currentTime +'  ' + sec);
                            sec = sec + 1;
                            allTimes = allTimes - 1;
                            bfb =  sec/recodetime *100;   //2
                            bfb = bfb.toFixed(2);//2
                            var ss = 'background-size: '+bfb + '% 100%';//2
                            if (allTimes == 0 || sec >= recodetime) {
                                clearInterval(timer);
                                $api.attr(context, 'playStatus', '0');
                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                var time = vm.getOutTime(recodetime);
                                $api.text($api.dom('.ypTimeP'), time);
                                range.value = 0;
                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3
                            } else {
                                range.value = sec;
//                                range.onchange = function () {
//                                    sec = parseInt(this.value);
//                                    range.value = sec;
//                                    hideenAudio.currentTime = sec;
//                                    allTimes = recodetime - sec;
//                                    var time = vm.getOutTime(allTimes);
//                                    $api.text($api.dom('.ypTimeP'), time);
//                                };
                                var time = vm.getOutTime(allTimes);
                                $api.css($api.dom('.myRange'), ss);  //4
                                $api.text($api.dom('.ypTimeP'), time);
                            }
                        }, 1000);
                    } else if (playStatus == '1') {
                        $api.attr(context, 'playStatus', '2');
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                        clearInterval(timer);
                        hideenAudio.pause();
                    } else {
                        $api.attr(context, 'playStatus', '1');
                        hideenAudio.play();
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                        timer = setInterval(function (e) {
                            sec = sec + 1;
                            allTimes = allTimes - 1;
                            bfb =  sec/recodetime *100;    //5
                            bfb = bfb.toFixed(2);   //5
                            var ss = 'background-size: '+bfb + '% 100%';  //5
                            if (allTimes == 0 || sec >= recodetime) {
                                $api.attr(context, 'playStatus', '0');
                                clearInterval(timer);
                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                var time = vm.getOutTime(recodetime);
                                $api.text($api.dom('.ypTimeP'), time);
                                range.value = 0;
                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6
                            } else {
                                range.value = sec;
//                                range.onchange = function () {
//                                    sec = parseInt(this.value);
//                                    range.value = sec;
//                                    hideenAudio.currentTime = sec;
//                                    allTimes = recodetime - sec;
//                                    var time = vm.getOutTime(allTimes);
//                                    $api.text($api.dom('.ypTimeP'), time);
//                                };
                                var time = vm.getOutTime(allTimes);
                                $api.css($api.dom('.myRange'), ss);    //7
                                $api.text($api.dom('.ypTimeP'), time);
                            }
                        }, 1000);
                    }
                },
                getOutTime: function (intime) {
                    var outTime = '';
                    if(intime<=9){
                        outTime = '00:0'+intime;
                    }else if(intime<59){
                        outTime = '00:'+intime;
                    }else {
                        var min =parseInt(intime/60);
                        var sec = intime%60;
                        if(sec<=9){
                            if(min>0&&min<10){
                                outTime ='0'+ min+ ':0' + sec ;
                            }else if(min>=10){
                                outTime = min+ ':0' + sec ;
                            }else{
                                outTime = '00:0'+sec;
                            }
                        }else{
                            if(min>0 && min < 10){
                                outTime ='0'+ min + ':'+ sec ;
                            }else if(min>=10){
                                outTime = min + ':'+ sec ;
                            }else {
                                outTime = '00:'+sec;
                            }
                        }
                    }
                    return outTime;
                },
                huakuai: function () {
                    var tktcontent = document.getElementById('tkt_content'); //长线条
                    var right = document.getElementById('right'); //小方块
                    var left = document.getElementById('left');
                    var huakuai = document.getElementById('huakuai');
                    var ifBool = false; //判断鼠标是否按下
                    //鼠标按下方块
                    huakuai.addEventListener("touchstart", function (e) {
                        e.stopPropagation();
                        ifBool = true;
                    });
                    //拖动
                    window.addEventListener("touchmove", function (e) {
                        if (ifBool) {
                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x
                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标
                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值
                            if (minDiv_left >= tktcontent.offsetWidth - 15) {
                                minDiv_left = tktcontent.offsetWidth - 15;
                            }
                            //设置拖动后小方块的left值
                            var rightwidth;
                            var leftwidth;
                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {
                                rightwidth = $(window).width() * 0.7 + 37;
                                leftwidth = $(window).width() * 0.3 - 25;
                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {
                                rightwidth = $(window).width() * 0.4 + 37;
                                leftwidth = $(window).width() * 0.6 - 25;
                            } else {
                                rightwidth = $(window).width() - minDiv_left;
                                leftwidth = minDiv_left + 12
                            }
                            right.style.width = rightwidth + "px";
                            left.style.width = leftwidth + "px";
                        }
                    });
                    //鼠标松开
                    window.addEventListener("touchend", function (e) {
                        ifBool = false;
                    });

                    //获取元素的绝对位置
                    function getPosition(node) {
                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left
                        var top = node.offsetTop;
                        current = node.offsetParent; // 取得元素的offsetParent
                        // 一直循环直到根元素
                        while (current != null) {
                            left += current.offsetLeft;
                            top += current.offsetTop;
                            current = current.offsetParent;
                        }
                        return {
                            "left": left,
                            "top": top
                        };
                    }
                },
            }
        });
    }

    function imgClick(context) {
        var src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        if (src.substring(src.length - 3) == 'gif') {
        } else {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    src
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
        }
    }
</script>
</html>
