<script type="text/javascript">
    apiready = function () {
        if (api.pageParam.content != null) {
            $api.html($api.dom('.zymc'), api.pageParam.zymc + '<br>' + api.pageParam.content);
        } else {

//            $api.html($api.dom('.answer'), api.pageParam.answer == null ? '' : api.pageParam.answer);

        for (var i = 0; i < $api.domAll('img').length; i++) {
            $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
        }
    };
    function imgClick(context) {
        var src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        var photoBrowser = api.require('photoBrowser');
        photoBrowser.open({
            images: [
                src
            ],
            placeholderImg: 'widget://image/loading_more.gif',
            bgColor: '#fff'
        }, function (ret, err) {
            if (ret.eventType == 'click') {
                photoBrowser.close();
            }
        });
    }
</script>
