<body>

    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">

<script type="text/javascript">
    apiready = function(){

        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var footerH = $api.offset($api.dom('.comment')).h;
        var frameH = padWinHeight - headerH-footerH;
        api.openFrame({
            name: 'frame-comment-content-forward',
            url: 'frame-comment-content-forward.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false
//            pageParam: {id: api.pageParam.id}
        });
    };
</script>
