<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><meta name="format-detection" content="telephone=no"/><meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <style>
        html, body {
            background-color: rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .aui-border-t:before, .aui-border-b:after{ height: 0px;}

        .show {
            width: 35%;
            top: 25%;
            position: absolute;
            left: 32.5%;
            background: #fff;
            border-radius: 5px;
            padding-top: 50px;
            padding-bottom: 30px;
            height: 40%; overflow-y: auto;
        }
        .item {
            text-align: center;
            font-size: 0.8rem;
            color: #fff;
            width: 60%;
            height: 46px;
            line-height: 46px;
            margin: 0 auto;
            border-radius: 5px;
            margin-bottom: 20px;
            background: #4bc7c7;
        }
        .item:active{
            background: #3fa6a6;
        }


        .backgroud {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="backgroud" tapmode onclick="api.closeFrame()"></div>
<div class="show">
    <!--<p id="3" class="item aui-border-b" tapmode onclick="itemClick(this)">全部</p>-->
    <!--<p id="2" class="item aui-border-b" tapmode onclick="itemClick(this)">未发送</p>-->
    <!--<p id="1" class="item aui-border-b" tapmode onclick="itemClick(this)">发送过</p>-->
</div>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript">
    apiready = function () {

        var array = api.pageParam.array;
        for (var i = 0; i < array.length; i++) {
            $api.append($api.dom('.show'), '<p id="' + i + '" class="item aui-border-b" tapmode onclick="itemClick(this,\'' + api.pageParam.item + '\')">' + array[i] + '</p>');
        }

        api.addEventListener({
            name: 'HomeKey'
        }, function (ret, err) {
            api.closeFrame();
        });

    };

    function itemClick(context, item) {
        var js;
        var contenttype;
        var xd;
        var identitytype;

        switch (item) {
            case 'type-area'://学生端不同于教师端，需要修改的(名师 选择区域)5
                js = 'area = ' + context.id + ';p = 1;isClean = true;getSchoolMoment();api.showProgress();';
                break;
            case 'type-contenttype':
                switch (context.id) {
                    case '0':
                        contenttype = 'all';
                        break;
                    case '1':
                        contenttype = 'course';
                        break;
                    case '2':
                        contenttype = 'homework';
                        break;
                    case '3':
                        contenttype = 'material';
                        break;
                    case '4':
                        contenttype = 'exercise';
                        break;
                    case '5':
                        contenttype = 'user';
                        break;
                }
                js = "contenttype = '" + contenttype + "';p = 1;isClean = true;getSubMoment();api.showProgress();";
                break;
            case 'type-xd':
                switch (context.id) {
                    case '0':
                        xd = 0;
                        break;
                    case '1':
                        xd = 21;
                        break;
                    case '2':
                        xd = 31;
                        break;
                    case '3':
                        xd = 34;
                        break;
                }
                js = 'xd = ' + xd + ';p = 1;isClean = true;getSubMoment();api.showProgress();';
                break;
            case 'type-school':
                js = 'area = ' + context.id + ';p = 1;isClean = true;getSchoolMoment();api.showProgress();';
                break;
            case 'type-identitytype':
                switch (context.id) {
                    case '0':
                        identitytype = 0;
                        break;
                    case '1':
                        identitytype = 2;
                        break;
                    case '2':
                        identitytype = 3;
                        break;
                    case '3':
                        identitytype = 4;
                        break;
                }
                js = 'identitytype = ' + identitytype + ';p = 1;isClean = true;getSchoolMoment();api.showProgress();';
                break;
            case 'type-area-peers'://同龄人 选择区域
                js = 'area = ' + context.id + ';p = 1;isClean = true;getSameAgeList();api.showProgress();';
                break;
            case 'type-sex':// 同龄人 选择性别
                js = 'sex = ' + context.id + ';p = 1;isClean = true;getSameAgeList();api.showProgress();';
                break;

        }
        var func = "$api.html($api.dom($api.dom('." + item + "'),'.type'), '" + $api.text(context) + '<span class="aui-iconfont aui-icon-unfold"></span>' + "');api.closeFrame({name: 'frame-tab'});";
        api.execScript({
            frameName: api.pageParam.frameName,
            script: func
        });
        api.execScript({
            frameName: api.pageParam.frameName,
            script: js
        })
    }
</script>
</html>
