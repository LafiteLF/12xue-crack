<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><meta name="format-detection" content="telephone=no"/>
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>
    <style>
        body{

        }
        .nav-spanBtn {
            border: 1px solid #4bc7c7 !important;
            border-radius:3px;
            padding: 5px 10px;
            margin-right: 10px;
            font-size: 0.8rem
        }
        .nav-spanBtn:active {
            color: #fff;
            background-color:#4bc7c7 ;
        }
        .aui-bar-nav .aui-btn.aui-btn-outlined {
            padding: 0 0.5rem;}
        .aui-icon-check:before {
            content: "\e619";
            margin-right: 10px;
            font-size: 20px;
        }
        .aui-bar-nav .aui-btn.aui-btn-outlined{
            background:none;
        }
    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">

    </a>
    <div style="float: right" class="submit" tapmode onclick="okBtn();">
        <span class="nav-spanBtn  aui-iconfont aui-icon-check"
              style="font-size: 0.7rem" >确定</span>
    </div>
</header>
</body>
<script type="text/javascript" src="../../script/api.js"></script>
<script type="text/javascript" src="../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    var sendSuc = true;
    apiready = function(){
        $api.html($api.dom('.titlea'), '<span class="aui-iconfont aui-icon-left" tapmode onclick="api.closeWin();"></span>回复-'+api.pageParam.replyName);
        var hfid='';//动态id 由上个界面获取
//        hfId=api.pageParam.id;
        hfid=api.pageParam.dynamicid;
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;

        api.openFrame({
            name: 'frame-comment-reply',
            url: 'frame-comment-reply.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false,
//            pageParam: {id: api.pageParam.id}
            pageParam: {id: hfid,realname: api.pageParam.realname,replyid: api.pageParam.replyid}
        });

    };

    function okBtn(){
//        var jsfun='okBtn();';
//        api.execScript({
//            frameName: 'frame-comment-reply',
//            script: jsfun
//        });
        if(sendSuc){
            api.execScript({
                frameName: 'frame-comment-reply',
                script: "okBtn();"
            });
            sendSuc = false;
        }else {
            setTimeout(function() {
                api.execScript({
                    frameName: 'frame-comment-reply',
                    script: "okBtn();"
                });
                sendSuc = true;
            }, 4000);//1秒后才能点击
        }
    }
</script>
</html>
