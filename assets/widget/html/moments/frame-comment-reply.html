<script type="text/javascript">
    apiready = function () {
        api.addEventListener({
            name: 'at'
        }, function (ret, err) {
            var content = $api.val($api.dom("#content-text"));
            //@规则  拼接字符串  @+用户名+一个空格
            content = content + "@" + ret.value.realname + " ";
            $api.val($api.dom("#content-text"), content);
        });

        api.addEventListener({
            name: 'tap'
        }, function (ret, err) {
            onTextChangeListener();
        });
        initTextarea()
    };
    function okBtn() {
        //获得回复id
        var dynamicid = api.pageParam.id;
        var replyid = api.pageParam.replyid;
        var realname = api.pageParam.realname;
        var content = $api.val($api.dom(".comment-text"));
        content = $api.trim(content);
        if (textLength(content) > 140) {
            api.toast({
                msg: '字数超过限制，请控制在140字内！',
                duration: 2000,
                location: 'bottom'
            });
            return;
        }
        content = finalContent(content);
        var realSource = 'student_12xueos';
        if(api.systemType== 'ios'){
            realSource = '12xueoshd';
        }
        var apiObj = new GridOpenApi(UrlDomain, realSource, version);
        apiObj.SetAuthToken($api.getStorage('token'));
        if (content == '') {
            api.toast({
                msg: '回复内容不能为空',
                duration: 2000,
                location: 'bottom'
            });
        } else {
            apiObj.Post(UrlRouter.PostDynamicReply, {
                values: {
                    dynamicid: dynamicid,
                    fromuid: $api.getStorage('uid'),
                    realname: realname,
                    content: content,
                    replyid: replyid
                }
            }, function (ret, err) {
                if (ret) {
                    if (ret.ret == 0) {

                        api.toast({
                            msg: '发布成功!',
                            duration: 2000,
                            location: 'bottom'
                        });
                        api.sendEvent({
                            name: 'finishComment'
                        });
                        api.sendEvent({
                            name: 'replySuccess'
                        });
                        api.closeWin();

                    } else {

                        api.toast({
                            msg: ret.msg,
                            duration: 2000,
                            location: 'bottom'
                        })
                    }

                } else {

                    api.toast({
                        msg: err.msg,
                        duration: 2000,
                        location: 'bottom'
                    });
                }

            })
        }
    }
    //@某人
    function atFriend() {
        api.openWin({
            name: 'win-choose-@people',
            url: 'win-choose-@people.html',
            slidBackEnabled: false
        });
    }
