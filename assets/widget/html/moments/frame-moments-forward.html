<script type="text/javascript">
    var apiObj;
    var picArr = [];
    apiready = function () {
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        if (api.pageParam.content && api.pageParam.content != '' && api.pageParam.content != undefined) {
            $api.val($api.dom(".container textarea"), "//" + api.pageParam.content.replace(/<[^>]+>/g,''));
        }
        var realSource = 'student_12xueos';
        if(api.systemType== 'ios'){
            realSource = '12xueoshd';
        }
        apiObj = new GridOpenApi(UrlDomain, realSource, version);
        apiObj.SetAuthToken($api.getStorage("token"));
        //@人的回调
        api.addEventListener({
            name: 'at'
        }, function (ret, err) {
            // ret> realname  uid
            var content = $api.val($api.dom(".container textarea"));
            //@规则  拼接字符串  @+用户名+一个空格
            content = "@" + ret.value.realname + " " + content;
            $api.val($api.dom(".container textarea"), content);
        });
        initTextarea()
    };

    //点击对号
    function send() {
        var content = $api.val($api.dom(".container textarea"));
        content = $api.trim(content);
        if (textLength(content)>140){
            api.toast({
                msg: '字数超过限制，请控制在140字内！',
                duration: 2000,
                location: 'bottom'
            });
            return;
        }
        content = finalContent(content);
        postSend(content);
    }

    //发送网络请求

    function postSend(content) {
        apiObj.Post(UrlRouter.PostDynamicTranspond, {
            values: {
                dynamicid: api.pageParam.id,
                content: content
            }
        }, function (ret, err) {
            if (ret && ret.ret == 0) {
                //转发成功 关掉win
                api.sendEvent({
                    name: 'finishForward'
                });
                api.closeWin();
            } else {
                var msg = '';
                if (ret) {
                    msg = ret.msg;
                } else {
                    msg = err.msg;
                }
                api.toast({
                    msg: msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }
        })
    }
</script>
