<script type="text/javascript">
    apiready = function () {

        var apiObj = new GridOpenApi(UrlDomain, source, version);
        apiObj.SetAuthToken($api.getStorage('token'));

        apiObj.Get(UrlRouter.GetViewConversation, {
            values: {
                replyid: api.pageParam.replyid
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    for (var i = 0; i < ret.data.list.length; i++) {
                        var identity;
                        if (ret.data.list[i].userinfo.identitytype == 2) {
                            identity = '老师';
                        } else if (ret.data.list[i].userinfo.identitytype == 3) {
                            identity = '学生';
                        } else {
                            identity = '家长';
                        }
                        if (ret.data.list[i].ref == null) {
                            if (ret.data.list[i].userinfo.sex == 1) {
                                var sexhtml = '<div class= "aui-iconfont aui-icon-mail sex"></div>';
                            } else {
                                var sexhtml = '<div class= "aui-iconfont aui-icon-femail unsex"></div>';
                            }
                            $api.append($api.dom('.dialogueList'), '<li class="aui-list-item aui-list-item-middle"> <div class="aui-media-list-item-inner"> <div class="aui-list-item-media user-icon" style="width: 3rem;">'+sexhtml+' <img src="' + ret.data.list[i].userinfo.face + '" class="aui-img-round aui-list-img-sm"> </div> <div class="aui-list-item-inner user-info"> <div class="aui-list-item-text"> <div class="aui-list-item-title aui-font-size-16 user-name">' + ret.data.list[i].userinfo.realname + '<div class="aui-label aui-label-info level">' + ret.data.list[i].userinfo.rank + '</div><a class="school">(' + ret.data.list[i].userinfo.xxmc + ' ' + identity + ')</a></div> </div> <div class="aui-list-item-text send-time">' + ret.data.list[i].createtime + ' </div> </div> </div> <div class="content-text">' + ret.data.list[i].content + '</div> </li>');

                        } else {
                            var refIdentity;
                            if (ret.data.list[i].ref.userinfo.identitytype == 2) {
                                refIdentity = '老师';
                            } else if (ret.data.list[i].ref.userinfo.identitytype == 3) {
                                refIdentity = '学生';
                            } else {
                                refIdentity = '家长';
                            }
                            if (ret.data.list[i].userinfo.sex == 1) {
                                var sexhtml = '<div class= "aui-iconfont aui-icon-mail sex"></div>';
                            } else {
                                var sexhtml = '<div class= "aui-iconfont aui-icon-femail unsex"></div>';
                            }
                            $api.append($api.dom('.dialogueList'), '<li class="aui-list-item aui-list-item-middle"> <div class="aui-media-list-item-inner"> <div class="aui-list-item-media user-icon" style="width: 3rem;">'+sexhtml+' <img src="' + ret.data.list[i].userinfo.face + '" class="aui-img-round aui-list-img-sm"> </div> <div class="aui-list-item-inner user-info"> <div class="aui-list-item-text"> <div class="aui-list-item-title aui-font-size-16 user-name">' + ret.data.list[i].userinfo.realname + '<div class="aui-label aui-label-info level">' + ret.data.list[i].userinfo.rank + '</div><a class="school">(' + ret.data.list[i].userinfo.xxmc + ' ' + identity + ')</a></div> </div> <div class="aui-list-item-text send-time">' + ret.data.list[i].createtime + ' </div> </div> </div> <div class="content-text">回复<span class="little-user-name">@' + ret.data.list[i].ref.userinfo.realname + '<div class="aui-label aui-label-info level">' + ret.data.list[i].ref.userinfo.rank + '</div><a class="school-green">(' + ret.data.list[i].ref.userinfo.xxmc + ' ' + refIdentity + ')</a></span>:<span>' + ret.data.list[i].content + '</span></div> </li>');

                    }
                } else {
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    })
                }

            } else {
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                })
            }
        });
    };

    function htmlspecialchars(str, n_to_empty = 0) {
        var s = '';
        if (typeof str === 'undefined' || str.length === 0) {
            return '';
        }
        for (var i = 0; i < str.length; i++) {
            switch (str.substr(i, 1)) {
                case "<":
                    s += "&lt;";
                    break;
                case ">":
                    s += "&gt;";
                    break;
                case "&":
                    s += "&amp;";
                    break;
                case " ":
                    if (str.substr(i + 1, 1) == " ") {
                        s += " &nbsp;";
                        i++;
                    } else s += " ";
                    break;
                case "\"":
                    s += "&quot;";
                    break;
                case "\n":
                    if(!n_to_empty) {
                        s += "<br>";
                    }else{
                        s += `  `;
                    }
                    break;
                default:
                    s += str.substr(i, 1);
                    break;
            }
        }
        return s;
    }
