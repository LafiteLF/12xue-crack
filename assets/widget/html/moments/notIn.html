<!DOCTYPE HTML><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title></title>    <link rel="stylesheet" type="text/css" href="../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../css/api.2.0.css"/>    <link rel="stylesheet" type="text/css" href="../../css/aui.2.0.css"/>    <style type="text/css">        * {            margin: 0;            padding: 0;        }        html, body {            background-color: white;            position: relative;            height: 100%;            width: 100%;        }        img {            width: 260px;            height: 260px;            position: absolute;            top: calc(50% - 180px);            left: calc(50% - 130px);        }    </style></head><body><div style="float: right;margin-right: 6%;" id="dynamic" class="aui-hide">    <div tapmode onclick="openSearchUsers();"         style="float: left;width: 290px;height:36px;background-color: #f2f2f2;font-size: 0.6rem;color: #666666;padding-left: 0.5rem;border-radius: 10px;border: 1px solid #DDDDDD">        <span class="aui-iconfont aui-icon-search" style="font-size: 1rem"></span><span            style="display: inline-block;vertical-align: top;line-height: 36px;color: #CCCCCC">输入姓名找人</span>    </div>    <span class="aui-iconfont aui-icon-add"          style="color: #4bc7c7;padding-right: 20px;padding-left: 20px;font-size: 1.4rem;line-height: 1.6rem" tapmode          onclick="openMomentSend();"></span></div><img src="../../image/momentKong.png"></body><script type="text/javascript" src="../../script/api.js"></script><script type="text/javascript">    apiready = function () {        if ($api.getStorage("studentSwitch") == 0) {            $api.addCls($api.byId("dynamic"), 'aui-hide');        } else {            $api.removeCls($api.byId("dynamic"), 'aui-hide');        }    }    function openSearchUsers() {        api.openWin({            name: 'win-search-user.html',            url: 'win-search-user.html'        });    }    function openMomentSend() {        if ($api.getStorage('studentSwitch') != 1) {            if ($api.getStorage("haveclass") == 0) {                api.toast({                    msg: '您目前还不能发布动态，请等待班级老师的审核',                    duration: 2000,                    location: 'bottom'                });            } else {                api.toast({                    msg: '暂不允许进行发布动态，还是老老实实回去学习吧',                    duration: 2000,                    location: 'bottom'                });            }            return;        }        api.openWin({            name: 'win-moments-publish',            url: 'win-moments-publish.html',        });    }</script></html>
