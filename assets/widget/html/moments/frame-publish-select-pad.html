<body>
<div class="close" tapmode onclick="vm.closeFrame()"></div>

        <li tapmode @click="inputClick('camera')">
            <span>拍照</span>
        </li>

<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function () {

    };
    var vm = new Vue({
        el: '.content',
        data: {},
        methods: {
            closeFrame: function () {
                api.closeFrame({
                    name: 'frame-publish-select-pad'
                });
            },
            inputClick:function (type) {
                if(type == 'camera'){
                    api.sendEvent({
                        name: 'selectPublish-pad',
                        extra: {type: 'camera'}
                    });
                }
                if(type == 'photo'){
                    api.sendEvent({
                        name: 'selectPublish-pad',
                        extra: {type: 'photo'}
                    });
                }
                api.closeFrame({
                    name: 'frame-publish-select-pad'
                });
            }
        }
    });
    function closeWin() {
        api.closeWin();
    }
</script>
