<script type="text/javascript">
    var apiObj;
    var picArr = [];
    var content = '';
    var pImageList = [];
    var photoBrowser;// 浏览图片
    var uiMediaScanner;// 选择图片
    var imageFilter;// 压缩图片
    var QINIU_DOMIN = 'http://vod-qiniu.12xue.com/';// 七牛地址
    // 记录上传七牛的状态
    var qiniuListener = {
        uploadAccount: 0,
        successAccount: 0,
        failIndex: []
    };
    var compressListener = {
        allCount: 0,
        successCount: 0
    };
    var vm = new Vue({
        el: '.bottom-container',
        data: {
            daArr: [],//图片内容
            yuyinArr: [],//语音内容
            hasAudio: false,//是否有音频
            seconds: '',//音频的长度
        },
        methods: {
            deleteImage: function (index) {
                vm.daArr.splice(index, 1);//删除数据指定索引位置的url
            }

        }
    });
    apiready = function () {
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        api.addEventListener({
            name: 'selectPublish-pad'
        }, function (ret, err) {
            var type = ret.value.type;
            selectAnswerPad(type)
        });
        photoBrowser = api.require('photoBrowser');
        var realSource = 'student_12xueos';
        if(api.systemType== 'ios'){
            realSource = '12xueoshd';
        }
        apiObj = new GridOpenApi(UrlDomain, realSource, version);
        apiObj.SetAuthToken($api.getStorage("token"));
        //删除图片的回调
        api.addEventListener({
            name: 'deletePic'
        }, function (ret, err) {
            deletePic(ret.value.url);
        });
        //@人的回调
        api.addEventListener({
            name: 'at'
        }, function (ret, err) {
            // ret> realname  uid
            var content = $api.val($api.dom(".container textarea"));
            //@规则  拼接字符串  @+用户名+一个空格
            content = "@" + ret.value.realname + " " + content;
            $api.val($api.dom(".container textarea"), content);
        });
        initTextarea();
    };

    //点击对号
    function publish() {
        qiniuListener = {
            uploadAccount: 0,
            successAccount: 0,
            failIndex: []
        };
        var content = $api.val($api.dom(".container textarea"));
        content = $api.trim(content);
        if (textLength(content) > 140) {
            api.toast({
                msg: '字数超过限制，请控制在140字内！',
                duration: 2000,
                location: 'bottom'
            });
            return;
        }
        content = finalContent(content);
        if ((content == "" || content == null) && picArr.length == 0) {
            api.toast({
                msg: '请先输入内容',
                duration: 2000,
                location: 'bottom'
            });
        } else {
            api.showProgress({
                title: '发送中',
                text: '请稍后...',
                modal: true
            });
            if (picArr && picArr.length > 0) {
              //  for (var i = 0; i < picArr.length; i++) {
                    qiniuUpfile(0);
                //}
            } else {
                postPublish();
            }
        }
    }

    //发送网络请求   若不传参数pImageList=undefined
    function postPublish(pImageList) {
        var content = $api.val($api.dom(".container textarea"));
        content = $api.trim(content);
        content = finalContent(content);
        var params = {};
        if (pImageList && pImageList != undefined && pImageList.length > 0) {
            for (var i = 0; i < pImageList.length; i++) {
                params["imagelist[" + i + "]"] = pImageList[i];
            }
        }
        params["contenttype"] = "user";
        params["content"] = content;
        console.log(pImageList + "-----params=" + JSON.stringify(params));
        apiObj.Post(UrlRouter.PostDynamicPublish, {
            values: params
        }, function (ret, err) {
            api.hideProgress();
            if (ret && ret.ret == 0) {
                //发布成功 关掉win  刷新首页动态
                api.closeWin();
                api.sendEvent({
                    name: 'refreshDynamic',
                });
            } else {
                var msg = '';
                if (ret) {
                    msg = ret.msg;
                } else {
                    msg = err.msg;
                }
                api.toast({
                    msg: msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }
        })
    }
    // 上传图片到七牛
    function qiniuUpfile(index) {
        var fileKey = (new Date()).valueOf()+picArr[index];
        apiObj.Get(UrlRouter.GetQiNiuToken, {
            values: {
                uid: $api.getStorage('uid'),
                bucket: 'vodresource',
                key:fileKey
            }
        }, function (ret, err) {
            var qiniuStorage = api.require("qiniuStorage");
            qiniuListener.uploadAccount++;
            qiniuStorage.configUploader({
                params:{},
                checkCrc: false,
                mimeType: '',
                zone: $api.getStorage('qiniuZone')
            });
            qiniuStorage.start({
                token: ret.data.token,
                path: picArr[index],
                key:fileKey
            });
            qiniuStorage.addEventListener(function (ret) {
                if(ret.eventType == 'complete'&&(api.systemType=='ios'?ret.info.statusCode:ret.statusCode) == 200){
                    qiniuListener.successAccount++;
                    pImageList.push(QINIU_DOMAIN + ret.key);
                    if(index < picArr.length){
                        qiniuUpfile(index+1);
                    }
                }else {
                    qiniuListener.failIndex.push(index);
                    api.hideProgress();
                }

                // 是否上传完毕的检测
                if (qiniuListener.uploadAccount == picArr.length) {
                    // 所有的图片都上传了
                    if (qiniuListener.successAccount == picArr.length) {
                        // 所有图片都上传成功
                        console.log("所有图片上传成功");
                        postPublish(pImageList);
                    }
                }

            });
        });
    }
    //选择答题方式
    function selectAnswerPad(type) {

        if (!checkPermission(['camera', 'storage'])) {
            return;
        }

        if (vm.daArr.length >= 9) {
            api.toast({
                msg: "最多只能选择9张图片",
                duration: 2000,
                location: 'bottom'
            });
            return;
        }
        if (type == 'camera') {
            api.getPicture({
                sourceType: 'camera',
                encodingType: 'jpg',
                mediaValue: 'pic',
                destinationType: 'url',
                allowEdit: true,
                quality: 50
            }, function (ret, err) {
                if (ret.data.length > 5) {
                    displayPic(ret.data);
                }
            });
        } else if (type == 'photo') {
            // 换成多选的
            var imgAccountMax = 9 - picArr.length;// 还可以选择图片数量的最大值
            openMediaScanner(imgAccountMax);
        }
    }
    function selectPic() {
        if (!checkPermission(['camera', 'storage'])) {
            return;
        }
        $api.addCls($api.dom('.emoji-icon'), 'aui-hide');
        if (!checkImageCompress()) {
            return;
        }
        if (picArr.length >= 9) {
            api.toast({
                msg: '最多只能选择9张图片上传',
                duration: 2000,
                location: 'bottom'
            });
            return;
        }
        api.openFrame({
            name: 'frame-publish-select-pad',
            url: 'frame-publish-select-pad.html',
            rect: {
                x: 0,
                y: 0,
                w: 'auto',
                h: $api.getStorage('padHeight')
            },
            pageParam: {name: 'pageparam'},
            bounces: false
        });

    }

    // 选择相册图片 可多选
    function openMediaScanner(max) {
        if (!uiMediaScanner) {
            uiMediaScanner = api.require('UIMediaScanner');
        }
        uiMediaScanner.open({
            type: 'picture',
            column: 4,
            classify: true,
            max: max ? max : 9,
            sort: {
                key: 'time',
                order: 'desc'
            },
            texts: {
                stateText: '已选*项',
                cancelText: '取消',
                finishText: '完成'
            },
            rotation: true,
            styles: {
                bg: '#fff',
                mark: {
                    icon: '',
                    position: 'bottom_left',
                    size: 20
                },
                nav: {
                    bg: '#4bc7c7',
                    stateColor: '#fff',
                    stateSize: 18,
                    cancelBg: 'rgba(0,0,0,0)',
                    cancelColor: '#fff',
                    cancelSize: 18,
                    finishBg: 'rgba(0,0,0,0)',
                    finishColor: '#fff',
                    finishSize: 18
                }
            }
        }, function (ret) {
            if (ret) {
                if (ret.eventType == 'confirm') {
                    compressListener.allCount = ret.list.length;
                    compressListener.successCount = 0;
                    for (var i = 0; i < ret.list.length; i++) {
                        var selectImg = ret.list[i];
                        // 获取图片的路径
                        var selectimgPath = selectImg.path;
                        var selectimgThumbPath = selectImg.thumbPath;
                        if (api.systemType == "ios") {
                            uiMediaScanner.transPath({
                                path: selectimgPath
                            }, function (ret, err) {
                                if (ret) {
                                    compressImage(ret.path);
                                } else {
                                    alert("ios地址转换失败：" + JSON.stringify(err));
                                }
                            });
                        } else {
                            compressImage(selectimgPath);
                        }
                    }
                    console.log(JSON.stringify(ret));
                }
            }
        });
    }
    // 图片压缩处理
    function compressImage(url) {
        var imageFilter = api.require('imageFilter');
        var imgName = getUrlName(url);
        var quality;
        if (api.systemType == 'ios') {
            quality = 0.2;
        } else {
            quality = 0.3;
        }
        imageFilter.compress({
            img: url,
            quality: quality,
            save: {
                imgPath: "fs://img_compress/",
                imgName: imgName + ".jpg"
            }
        }, function (ret, err) {
            console.log("compress result : ret=" + JSON.stringify(ret) + "  err:" + JSON.stringify(err));
            if (ret.status) {
                compressListener.successCount++;
                displayPic(api.fsDir + "/img_compress/" + imgName + ".jpg");
                console.log("compress url:" + api.fsDir + "/" + imgName + ".jpg");
            } else {
                alert(JSON.stringify(err));
            }
            imageFilter = '';
        });
    }

    function getUrlName(url) {
        var index = url.lastIndexOf("/");
        var imgName;
        if (api.systemType == 'ios') {
            var idIndex = url.indexOf("id=");
            if (idIndex != -1) {
                var idStr = url.substr(idIndex);
                var andIndex = url.indexOf("&");
                imgName = url.substring(idIndex + 3, andIndex);
            } else {
                imgName = url.substring(index + 1);
            }
        } else {
            imgName = url.substring(index + 1);
        }
        return imgName;
    }
    function openAt() {
        api.openWin({
            name: 'win-choose-@people',
            url: 'win-choose-@people.html',
            pageParam: {name: 'pageparamname'},
            slidBackEnabled: false
        });
    }

    function displayPic(url) {
        console.log("display url:" + url);
        $api.css($api.dom(".display-pic"), 'display:block;');
        var index = $api.domAll("li").length;
        var html = '<li id="' + index + '"><img class="img" src="' + url + '" alt="图片加载失败" tapmode onclick="openPic(this);"><img class="chacha" src="../../image/chacha.png" onclick="deletePic(this)" ></li>';
        $api.append($api.dom("ul"), html);
        picArr.push(url);
    }
    function openPic(context) {
        var index = -1;
        var url = $api.attr(context, 'src');
        //计算索引 不能用id作为索引
        for (var i = 0; i < picArr.length; i++) {
            if (url == picArr[i]) {
                index = i;
            }
        }
        api.execScript({
            script: "isOpenPic=true;"
        });
        photoBrowser.open({
            images: picArr,
            placeholderImg: 'widget://image/loading_more.gif',
            bgColor: '#000000',
            activeIndex: index
        }, function (ret, err) {
            if (ret.eventType == 'click') {
                api.execScript({
                    script: "isOpenPic=true;"
                });
                photoBrowser.close();
            }
        });
    }

    //删除图片答案
    function deletePic(context) {
        var li = $api.closest(context, 'li');
        var url = $api.attr($api.dom(li, ".img"), 'src');
        var imgs = $api.domAll("li>.img");
        var index = -1;
        //匹配url  删除dom元素   不能根据id作为索引来删除
        for (var i = 0; i < imgs.length; i++) {
            var imgSrc = $api.attr(imgs[i], 'src');
            if (imgSrc == url) {
                index = i;
                break;
            }
        }
        $api.remove(li);
        picArr.splice(index, 1);//删除数据指定索引位置的url
        if (picArr.length == 0) {
            $api.css($api.dom(".display-pic"), 'display:none;');
        }
    }
    /**
     * 检查图片压缩进度
     * @returns {boolean} true 压缩完成
     */
    function checkImageCompress() {
        if (compressListener.allCount != 0 && compressListener.allCount != compressListener.successCount) {
            api.toast({
                msg: '正在压缩图片，请稍后操作',
                duration: 2000,
                location: 'bottom'
            });
            return false;
        }
        return true;
    }
</script>
