<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            background-color: transparent;
            writing-mode: horizontal-tb;
            direction: ltr;
        }

        #main {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 主要内容区域 */
        .content {
            display: flex;
            padding: 0 4vw 2vh;
            margin-bottom: 2vh;
            align-items: flex-start;
            flex-direction: row;
            height: 90%;

        }

        .left-section {
            background: #56DBDB;
            position: relative;
            width: 38vw;
            height: 100%;
            flex-shrink: 0;
            margin-left: 10px;
            border-radius: 2vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-bottom: 2vh;
        }

        .left-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .middle-section {
            background-size: 100% 100%;
            width: 46vw;
            height: 100%;
            margin-left: 2vw;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;


        }

        .right-buttons {
            width: 5vw;
            display: flex;
            flex-direction: column;
            /* gap: 3vh; */
            align-items: center;
            margin-top: 15vh;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 2vw;
            padding: 2vh 1vw;
            box-shadow: 0 0.5vh 2vh rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            margin-left: 3vw;
            flex-shrink: 0;
        }

        /* 用子元素的 margin 模拟 gap */
        .right-buttons>*+* {
            margin-top: 3vh;
        }

        .section-title {
            text-align: center;
            padding: 1.5vh 0;
            border-radius: 2vw 2vw 0 0;
            font-size: 2vw;
            font-weight: bold;
        }

        .cards-container {
            border-top: none;
            border-radius: 0 0 2vw 2vw;
            display: grid;
            gap: 2vh;
            align-items: center;
        }

        /* 左侧AI同步学习区域标题 */
        .left-section-title {
            color: white;
            font-size: 2vw;
            font-weight: bold;
            text-align: center;
            padding: 2vh 0 1.5vh 0;
            position: relative;
            z-index: 2;
        }

        /* 白色容器框 */
        .left-section-container {
            background: white;
            border-radius: 2vw;
            margin: 0 2vw 4vh 2vw;
            padding: 2vh 1.5vw;
            flex: 1;
            position: relative;
            z-index: 1;
            box-shadow: 0 0.5vh 2vh rgba(0, 0, 0, 0.1),
                inset 0 -10px 30px rgba(1, 171, 255, 0.20),
                inset -5px 0 10px rgba(1, 171, 255, 0.15),
                inset 5px 0 10px rgba(1, 171, 255, 0.15);
        }


        /* 左侧AI同步学习区域布局 */
        .left-section .cards-container {
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 0;
        }

        /* 卡片内容布局 左边文字+箭头，右边图标 */
        .card-content {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            /* padding: 1.5vh 1.8vw; */
            height: 100%;
            width: 100%;
            position: relative;
        }

        .card-top {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            flex: 1;
            height: 100%;
            padding-left: 1.8vw;
        }

        .card-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* margin-bottom: 1vh; */
            writing-mode: horizontal-tb;
            text-orientation: mixed;
        }

        .card-right {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            /* margin-left: 1vw; */
        }

        .card-bottom {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: auto;
        }

        .card-text {
            font-size: 1.6vw;
            color: #333;
            /* margin-bottom: 1vh; */
            writing-mode: horizontal-tb;
            text-orientation: mixed;
        }

        .card-subtitle {
            font-size: 1.4vw;
            color: #666;
            opacity: 0.8;
        }

        .card-icon-new {
            width: 5vw;
            margin-right: 1.2vw;
            object-fit: contain;
        }

        .card-arrow-new {
            width: 2vw;
            height: 2vw;
            opacity: 0.7;
            margin-top: 1vh;
        }

        /* 小卡片使用统一布局 - 左边文字+箭头，右边图标 */
        .card-small .card-content {
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            /* padding: 1.2vh 1.3vw; */
        }

        .card-small .card-top {
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            flex: 1;
            height: 100%;
            writing-mode: horizontal-tb;
            direction: ltr;
        }

        .card-small .card-left {
            margin-bottom: 1vh;
            writing-mode: horizontal-tb;
            direction: ltr;
        }

        .card-small .card-right {
            flex-shrink: 0;
        }

        .card-small .card-bottom {
            width: auto;
        }

        .card-small .card-text {
            writing-mode: horizontal-tb;
            text-orientation: mixed;
            direction: ltr;
            white-space: nowrap;
        }

        .card-small .card-icon-new {
            width: 4.5vw;
            /* height: 4.5vw; */
            margin-right: 2.5vw;
            object-fit: contain;
        }

        .card-small .card-right {
            /* width: 5vw; */
            /* height: 5vw; */
            /* margin-left: 0.5vw; */
        }

        /* 不同卡片的背景色 */
        .card-oral {
            background: linear-gradient(to right, #FEE4C4 0%, #FFEDC7 100%);
        }

        .card-ai-learning {
            background: linear-gradient(to right, #DBE7FE 0%, #CFF0FB 100%);
        }

        .card-knowledge {
            background: #BCF3D2;
        }

        .card-essay {
            background: linear-gradient(to right, #FED8D8 0%, #FDE8D4 100%);
        }

        .card-knowledge .card-text,
        .card-essay .card-text {
            writing-mode: horizontal-tb !important;
            text-orientation: mixed !important;
            direction: ltr !important;
            white-space: nowrap !important;
            display: inline-block !important;
        }

        .card-knowledge .card-left,
        .card-essay .card-left {
            writing-mode: horizontal-tb !important;
            direction: ltr !important;
        }


        /* 默认布局 - 4个卡片（没有选课时） */
        .classroom-cards {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            height: 100%;
            width: 100%;
        }

        /* 没有选课时的布局 - 作业(3份) + 打分(1份) + 课堂讲义(2份) + 互动课堂(2份) */
        .classroom-cards .card:nth-child(1) {
            /* 作业 - 占左侧3份 */
            grid-column: 1;
            grid-row: 1 / span 3;
            height: 100%;
            width: 100%;
        }

        .classroom-cards .card:nth-child(2) {
            /* 打分 - 没有选课时，打分是第2个卡片，占左侧1份 */
            grid-column: 1;
            grid-row: 4;
            height: 100%;
            width: 100%;
        }

        .classroom-cards .card:nth-child(3) {
            /* 课堂讲义 - 没有选课时，课堂讲义是第3个卡片，占右侧2份 */
            grid-column: 2;
            grid-row: 1 / span 2;
            height: 100%;
            width: 100%;
        }

        .classroom-cards .card:nth-child(4) {
            /* 互动课堂 - 没有选课时，互动课堂是第4个卡片，占右侧2份 */
            grid-column: 2;
            grid-row: 3 / span 2;
            height: 100%;
            width: 100%;
        }

        .classroom-cards .card:nth-child(5) {
            grid-column: 2;
            grid-row: 3 / span 2;
            height: 70%;
            width: 100%;
        }

        /* 课堂同步区域卡片背景色 */
        .classroom-cards .card:nth-child(1) {
            background: linear-gradient(to right, #DBE7FE 0%, #CFF0FB 100%);
        }

        .classroom-cards .card:nth-child(2) {
            background: linear-gradient(to right, #FFF4E6 0%, #FFE4B5 100%);
        }

        .classroom-cards .card:nth-child(3) {
            background: linear-gradient(to right, #FED8D8 0%, #FDE8D4 100%);
        }

        .classroom-cards .card:nth-child(4) {
            background: #BCF3D2;
        }

        /* 有选课时的卡片背景色 */

        .classroom-cards.has-xuanke .card:nth-child(5) {
            background: linear-gradient(to right, #E9DDFE 0%, #EFE7FF 100%);
        }


        /* 有选课时的布局 - 5个卡片 */
        .classroom-cards.has-xuanke {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
        }

        /* 有选课时 - 作业卡片占据2份 */
        .classroom-cards.has-xuanke .card:nth-child(1) {
            grid-column: 1;
            grid-row: 1 / span 2;
            height: 100%;
            width: 100%;
        }

        /* 有选课时 - 打分卡片占据1份 */
        .classroom-cards.has-xuanke .card:nth-child(2) {
            grid-column: 1;
            grid-row: 4;
            height: 100%;
            width: 100%;
        }

        /* 有选课时 - 选课卡片占据1份 */
        .classroom-cards.has-xuanke .card:nth-child(5) {
            grid-column: 1;
            grid-row: 3;
            height: 100%;
            width: 100%;
        }


        /* 卡片样式 */
        .card {
            -webkit-tap-highlight-color: transparent;
            border-radius: 1.5vw;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 左侧大卡片样式 */
        .left-section .card-large {
            height: 100%;
        }

        /* 左侧小卡片样式 */
        .left-section .card-small {
            height: 100%;
            width: 100%;
        }


        .card-title {
            font-size: 1.8vw;
            font-weight: bold;
            color: #333;
        }

        .card-icon {
            width: 4vw;
            height: 4vw;
        }

        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-arrow {
            font-size: 2vw;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
        }


        .handout {
            margin-top: 5px;
        }


        /* 底部功能区域 */
        .bottom-section {
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: flex-start;
            margin-top: 2vh;
        }

        .bottom-section>*:not(:first-child) {
            margin-left: 2vw;
        }

        .bottom-card {
            border-radius: 2vw;
            cursor: pointer;
            transition: transform 0.2s;
            width: 25%;
            height: 20vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2vh 1.5vw;
            position: relative;
            background-color: rgba(255, 255, 255, 0.50);
        }

        .bottom-card-icon {
            width: 3vw;
            /* height: 6vh; */
            margin-bottom: 3vh;
        }

        .bottom-card-text {
            font-size: 1.3vw;
            /* font-weight: bold; */
            color: #333;
        }


        /* 右侧应用设置按钮 */
        .right-buttons .fixed-btn {
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 5vw;
            height: 8vh;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .right-buttons .fixed-btn:hover {
            transform: translateY(-0.2vh);
        }

        .right-buttons .fixed-btn .btn-icon {
            width: 3.5vw;
            height: 3.5vw;
            margin-bottom: 0.5vh;
            position: relative;
        }


        .right-buttons .fixed-btn .btn-icon img {
            width: 2vw;
            height: 2vw;
            position: relative;
            z-index: 2;
            margin-left: 0.7vw;
        }

        .right-buttons .fixed-btn .btn-text {
            font-size: 1.2vw;
            font-weight: 500;
            text-align: center;
        }


        .hebing {
            display: grid;
            grid-template-columns: 1fr 1fr;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 1.5vw;
            writing-mode: horizontal-tb;
            direction: ltr;
        }

        .classroom-sync {
            background: #56DBDB;
            width: 100%;
            flex: 1;
            height: 0;
            padding: 0;
            border-radius: 2vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 1vh;
        }

        /* 课堂同步区域标题 */
        .classroom-sync-title {
            color: white;
            font-size: 2vw;
            font-weight: bold;
            text-align: center;
            padding: 2vh 0 1.5vh 0;
            position: relative;
            z-index: 2;
        }

        /* 课堂同步白色容器框 */
        .classroom-sync-container {
            background: white;
            border-radius: 2vw;
            margin: 0 2vw 1.5vh 2vw;
            padding: 2vh 1.5vw;
            flex: 1;
            height: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 0.5vh 2vh rgba(0, 0, 0, 0.1),
                inset 0 -10px 30px rgba(1, 171, 255, 0.20),
                inset -5px 0 10px rgba(1, 171, 255, 0.15),
                inset 5px 0 10px rgba(1, 171, 255, 0.15);
        }

        .classroom-sync::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 15% 25%, rgba(255, 255, 255, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(255, 255, 255, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .ai-icon {
            font-size: 3vw;
            color: white;
        }

        button {
            outline: none;
        }
    </style>
    <script type="text/javascript" src="../script/api.js"></script>
    <script type="text/javascript" src="../script/12XueApi_Router.js"></script>
    <script type="text/javascript" src="../script/12XueApi_SDK.js"></script>
    <script type="text/javascript" src="../script/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="../script/vue.global.prod-3.5.18.js"></script>
    <script type="text/javascript" src="../script/aui-tab.js"></script>
    <script type="text/javascript" src="../script/login/login.js"></script>
    <script type="text/javascript" src="../script/common.js"></script>
    <script type="text/javascript" src="../script/fastclick.js"></script>
</head>

<body>
    <div id="main">
        <!-- 主要内容区域 -->
        <div class="content">
            <!-- 左侧AI同步学习区域 -->
            <div class="left-section">
                <!-- 内部元素水平排列 -->
                <div style="display: flex; justify-content: center; align-items: center; z-index: 2;">

                    <!-- 左边的图标 -->
                    <img src="../image/luosi.png" style="width: 1vw; height: 1vw;">

                    <div class="left-section-title" style="padding: 2vh 12vw 1.5vh;">自主学习</div>

                    <!-- 右边的图标 -->
                    <img src="../image/luosi.png" style="width: 1vw; height: 1vw;">

                </div>
                <!-- 白色容器框 -->
                <div class="left-section-container">
                    <div class="cards-container">
                        <!-- 口语训练卡片 -->
                        <div class="card card-large card-oral" @click="openFrame({id: '11'})">
                            <div class="card-content">
                                <div class="card-top">
                                    <div class="card-left">
                                        <div class="card-text">口语训练</div>
                                    </div>
                                    <div class="card-bottom">
                                        <!-- 右箭头 -->
                                        <img src="../image/kouyujt.png" alt="箭头" class="card-arrow-new">
                                    </div>
                                </div>
                                <div class="card-right">
                                    <!-- 口语训练图标 -->
                                    <img src="../image/kouyu.png" alt="口语训练图标" class="card-icon-new"
                                        style="width: 7vw;">
                                </div>
                            </div>
                        </div>

                        <!-- AI伴学卡片 -->
                        <div class="card card-large card-ai-learning" @click="openFrame({id: '10'})">
                            <div class="card-content">
                                <div class="card-top">
                                    <div class="card-left">
                                        <!-- 如果默认写ai伴学，审核时修改文本会闪一下，很容易露馅，所以先空着 -->
                                        <div class="card-text" id="aiAssistantText"></div>
                                    </div>
                                    <div class="card-bottom">
                                        <!-- 右箭头 -->
                                        <img src="../image/aijt.png" alt="箭头" class="card-arrow-new">
                                    </div>
                                </div>
                                <div class="card-right">
                                    <!--AI伴学图标 -->
                                    <img src="../image/ai.png" alt="AI伴学图标" class="card-icon-new" style="width: 7vw;">
                                </div>
                            </div>
                        </div>

                        <div class="hebing">
                            <!-- 知识图谱卡片 -->
                            <div class="card card-small card-knowledge" @click="openFrame({id: '12'})"
                                style="position: relative;">
                                <div class="card-content">
                                    <div class="card-top">
                                        <div class="card-left">
                                            <div class="card-text">知识图谱</div>
                                        </div>
                                        <div class="card-bottom">
                                            <!-- 右箭头 -->
                                            <img src="../image/zstpjt.png" alt="箭头" class="card-arrow-new">
                                        </div>
                                    </div>
                                    <div class="card-right" style="position:absolute;right: 0;bottom: 0;">
                                        <!-- 知识图谱图标 -->
                                        <img src="../image/zstp.png" alt="知识图谱图标" style="width:7vw; margin-top: 5vh;">
                                    </div>
                                </div>
                            </div>

                            <!-- AI作文批阅卡片 -->
                            <div class="card card-small card-essay" @click="openAiEssayReview"
                                style="position: relative;">
                                <div class="card-content">
                                    <div class="card-top">
                                        <div class="card-left">
                                            <div class="card-text" style="font-size: 1.6vw;">AI作文批阅</div>
                                        </div>
                                        <div class="card-bottom">
                                            <!-- ：右箭头 -->
                                            <img src="../image/aipyjt.png" alt="箭头" class="card-arrow-new">
                                        </div>
                                    </div>
                                    <div class="card-right" style="position:absolute;right: 0;bottom: 0;">
                                        <!-- AI作文批阅图标 -->
                                        <img src="../image/aipy.png" alt="AI作文批阅图标" style="width: 6.8vw; ">
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <div style="display: flex; align-items: center; padding: 0 2vw 1.5vh 2vw; z-index: 2;">

                    <!-- 左侧装饰组 -->
                    <img src="../image/luosi.png" style="width: 1vw; height: 1vw;">
                    <img src="../image/zuoce.png" style="height: 3vh; margin-left: 3vw;">

                    <!-- 自动伸缩的空白区域，-->
                    <div style="flex-grow: 1;"></div>

                    <!-- 右侧装饰组 -->
                    <img src="../image/youce.png" style="height: 3vh; margin-right: 3vw;">
                    <img src="../image/luosi.png" style="width: 1vw; height: 1vw;">

                </div>
            </div>

            <!-- 中间区域包含课堂同步和底部卡片 -->
            <div class="middle-section">
                <!-- 课堂同步区域 -->
                <div class="classroom-sync">
                    <!-- 课堂同步标题 -->
                    <div style="display: flex; justify-content: center; align-items: center; z-index: 2;">

                        <!-- 左边的图标 -->
                        <img src="../image/luosi.png" style="width: 1vw; height: 1vw;">

                        <div class="left-section-title" style="padding: 2vh 15vw 1.5vh;">课堂同步</div>

                        <!-- 右边的图标 -->
                        <img src="../image/luosi.png" style="width: 1vw; height: 1vw;">

                    </div>
                    <!-- 白色容器框 -->
                    <div class="classroom-sync-container">
                        <div class="cards-container classroom-cards"
                            :class="{'has-xuanke': chooseSubjectType != 1 && gradelist.length > 0}">
                            <!-- 作业卡片 -->
                            <div class="card" @click="openFrame({id: '0'})">
                                <div class="card-content">
                                    <div class="card-top">
                                        <div class="card-left">
                                            <div class="card-text">作业</div>
                                            <div class="card-subtitle"
                                                v-if="chooseSubjectType != 1 && gradelist.length > 0">
                                            </div>
                                        </div>
                                        <div class="card-bottom">
                                            <img src="../image/aijt.png" alt="箭头" class="card-arrow-new">
                                        </div>
                                    </div>

            vm.GetSelectCourseStuOpenSelect(false, vm.schoolid);
        });

        if (api.pageParam.sex == '0') { //未设置性别
            api.openFrame({
                name: 'frame-choose-sex',
                url: 'frame-choose-sex.html',
                rect: {
                    x: 0,
                    y: 0,
                    w: 'auto',
                    h: $api.getStorage('padHeight')
                },
                bounces: false
            });
        }

        //手动热更新功能
        var mam = api.require('mam');
        mam.checkSmartUpdate(function (ret, err) {
            if (ret) {
                if (ret.packages && ret.packages.length != 0) {
                    var msg;
                    if (ret.packages[0].extra != null && ret.packages[0].extra != '') {
                        msg = '更新日志：\n' + ret.packages[0].extra;
                    } else {
                        msg = '修改部分已知问题';
                    }
                    mam.startSmartUpdate(function (ret, err) {
                        if (ret) {
                            if (ret.state == 3) {
                                api.alert({
                                    title: '云修复完成',
                                    msg: msg,
                                    buttons: ['重启后生效']
                                }, function (ret, err) {
                                    if (ret.buttonIndex == 1) {
                                        //重启应用
                                        api.sendEvent({
                                            name: 'restartApp'
                                        });
                                    }
                                });
                            }
                        }
                    });
                }
            }
        });
    };

    // apiready();

    // 辅助函数
    function checkClassid() {
        if (name == 'win-appstore') {
            return 0;
        } else if (name == 'ChoiceSubject_win') {
            api.openWin({
                name: name,
                url: path,
                slidBackEnabled: false
            });
        } else if (name == 'classroom') {
            apiObj.SetAuthToken($api.getStorage('token'));
            apiObj.Get(UrlRouter.GetUserSchoolInfo, {
                values: {
                    uid: $api.getStorage('uid'),
                    identitytype: '3'
                }
            }, function (ret, err) {
                if (ret) {
                    if (ret.ret == 0) {
                        if (ret.data != '') {
                            if (ret.data[0].class && ret.data[0].class != '') {
                                classid.length = 0;
                                for (var i = 0; i < ret.data[0].class.length; i++) {
                                    classid.push(ret.data[0].class[i].bjid);
                                    $api.setStorage('groupSchoolid', ret.data[0].id);
                                }
                                $api.setStorage('classidForClass', classid);
                                var classArr = ret.data[0].class;
                                if (name == "classroom") {
                                    apiObj.Get(UrlRouter.GetV1ClasspayStatus, {
                                        values: {
                                            mac_addr: $api.getStorage('macAdress')
                                        }
                                    }, function (ret, err) {
                                        api.hideProgress();
                                        if (ret) {
                                            if (ret.ret == 0) {
                                                if (ret.data) {
                                                    if (ret.data.status >= 8) {
                                                        //未开通付费功能
                                                        api.openWin({
                                                            name: 'win-classlimit',
                                                            url: '../html/study/newClass/win-classlimit.html'
                                                        });
                                                    } else if (ret.data.status != 0 && ret.data.status != 3 && ret.data.status != 2 && ret.data.status != 5) {
                                                        api.openWin({
                                                            name: 'not_opened',
                                                            url: 'not_opened.html'
                                                        });
                                                    } else {
                                                        //接入H5课堂
                                                        api.openWin({
                                                            name: 'win-interaction-home-pad',
                                                            url: '../html/study/newClass/win-interaction-home-pad.html',
                                                            pageParam: { classArr: classArr },
                                                            slidBackEnabled: false
                                                        });
                                                    }
                                                }
                                            }
                                        }
                                    });
                                } else {
                                    api.openWin({
                                        slidBackEnabled: false,
                                        name: name,
                                        url: path,
                                        pageParam: { classid: classid }
                                    });
                                }
                            } else {
                                handleNoClass();
                            }
                        } else {
                            handleNoClass();
                        }
                    } else {
                        api.toast({
                            msg: ret.msg,
                            duration: 2000,
                            location: 'middle'
                        });
                    }
                } else {
                    api.toast({
                        msg: err.msg,
                        duration: 2000,
                        location: 'middle'
                    });
                }
            });
        } else {
            //请求classid
            apiObj.Get(UrlRouter.GetUserSchoolInfo, {
                values: {
                    uid: $api.getStorage('uid'),
                    identitytype: '3'
                }
            }, function (ret, err) {
                if (ret) {
                    if (ret.ret == 0) {
                        if (ret.data != '') {
                            if (ret.data[0].class && ret.data[0].class != '') {
                                $api.setStorage('newSchoolId', ret.data[0].id);
                                $api.setStorage('stuXD', ret.data[0].class[0].xd);
                                classid.length = 0;
                                for (var i = 0; i < ret.data[0].class.length; i++) {
                                    classid.push(ret.data[0].class[i].bjid);
                                }
                                if (name == "classroom") {
                                    //接入H5课堂
                                    var classArr = ret.data[0].class;
                                    api.openWin({
                                        name: 'win-interaction-home-pad',
                                        url: '../html/study/newClass/win-interaction-home-pad.html',
                                        pageParam: { classArr: classArr },
                                        slidBackEnabled: false
                                    });
                                } else {
                                    // 口语训练特殊处理
                                    if (name == 'oralTraining-win-main' || name == 'oralTraining-offline') {
                                        var pageParams = {
                                            uid: $api.getStorage('uid'),
                                            token: $api.getStorage('token'),
                                            padType: $api.getStorage('padType'),
                                            upgradeQRCode: $api.getStorage('upgradeQRCode'),
                                            apiUrlIndex: apiUrlIndex,
                                            classid: classid
                                        };

                                        // 如果是离线模式，直接打开缓存页
                                        if (name == 'oralTraining-offline') {
                                            api.openWin({
                                                slidBackEnabled: false,
                                                name: name,
                                                url: path,
                                                pageParam: pageParams
                                            });
                                        } else {
                                            // 在线模式，尝试打开远程服务，设置超时降级
                                            openOralTrainingWithFallback(path, pageParams);
                                        }
                                    } else if (name == 'oralTraining-win-main' && api.systemType == 'ios') {
                                        api.openWin({
                                            slidBackEnabled: false,
                                            name: name,
                                            url: path,
                                            pageParam: {
                                                uid: $api.getStorage('uid'),
                                                token: $api.getStorage('token'),
                                                padType: $api.getStorage('padType'),
                                                upgradeQRCode: $api.getStorage('upgradeQRCode'),
                                                apiUrlIndex: apiUrlIndex,
                                                classid: classid
                                            }
                                        });
                                    } else {
                                        api.openWin({
                                            slidBackEnabled: false,
                                            name: name,
                                            url: path,
                                            pageParam: { classid: classid }
                                        });
                                    }
                                }
                            } else {
                                handleNoClass();
                            }
                        } else {
                            handleNoClass();
                        }
                    } else {
                        api.toast({
                            msg: ret.msg,
                            duration: 2000,
                            location: 'middle'
                        });
                    }
                } else {
                    api.toast({
                        msg: err.msg,
                        duration: 2000,
                        location: 'middle'
                    });
                }
            });
        }
    }

    function handleNoClass() {
        apiObj.Get(UrlRouter.GetStudentAuditClass, {
            values: {
                uid: $api.getStorage('uid'),
                type: '1'
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    if (ret.data.length == 0 && !hsClass) {
                        api.confirm({
                            title: '',
                            msg: '目前未加入班级，是否前往加入班级',
                            buttons: ['取消', '确定']
                        }, function (ret, err) {
                            if (ret) {
                                if (ret.buttonIndex == 2) {
                                    openMyClassWin();
                                }
                            }
                        });
                    } else {
                        api.confirm({
                            title: '',
                            msg: '班级正在审核，是否前往查看',
                            buttons: ['取消', '确定']
                        }, function (ret, err) {
                            if (ret) {
                                if (ret.buttonIndex == 2) {
                                    openMyClassWin();
                                }
                            }
                        });
                    }
                }
            }
        })
    }

    function getClassB() {
        apiObj.Get(UrlRouter.GetStudentAuditClassB, {
            values: {
                uid: $api.getStorage('uid')
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    if (ret.data.length == 0) {
                        hsClass = false;
                    } else {
                        hsClass = true;
                    }
                } else {
                    hsClass = false;
                }
            } else {
                hsClass = false;
            }
        });
    }

    function openMyClassWin() {
        api.openWin({
            slidBackEnabled: false,
            name: 'myclass_win',
            url: '../html/mine/myclass/myclass_win.html',
            reload: true
        });
    }

    function postLoginSync() {
        apiObj.Post(UrlRouter.postLoginSync, {
            values: {
                uid: $api.getStorage('uid'),
                identitytype: 3
            }
        }, function (ret, err) {
            $api.setStorage('loginSyncTime', getCurrentTimestamp());
        })
    }

    function getCurrentTimestamp() {
        return Math.round(new Date() / 1000)
    }

    // 口语训练服务降级处理
    // 注意：这个超时只检测页面是否能打开，不影响页面内部的API接口调用
    function openOralTrainingWithFallback(remotePath, pageParams) {
        // 直接尝试打开远程服务，不设置超时
        // 如果页面无法加载，APICloud 的 WebView 会自然显示加载失败
        // 此时用户可以通过返回按钮回到首页，或者我们可以监听加载失败事件

        api.showProgress({
            title: '正在连接...',
            text: '请稍候',
            modal: false
        });

        // 尝试打开远程服务
        api.openWin({
            slidBackEnabled: false,
            name: 'oralTraining-win-main',
            url: remotePath,
            pageParam: pageParams,
            cachePolicy: 'noCache' ,
            // 页面加载完成后隐藏进度条
            pageParam: Object.assign({}, pageParams, {
                fromFallback: true
            })
        });

        // 1秒后隐藏加载提示（给页面一点加载时间）
        setTimeout(function () {
            api.hideProgress();
        }, 1000);
    }
</script>
