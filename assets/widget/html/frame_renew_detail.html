<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>文章详情-frame</title>
    <link rel="stylesheet" type="text/css" href="../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../css/aui.2.0.css"/>
    <style>
        body {
            background-color: #f2f2f2
        }

        .content {
            width: 80%;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
        }

        img {
            width: 30%;
            text-align: center;
            margin-top: 20px;
            height: auto;
        }


        [v-cloak] {
            display: none;
        }
    </style>
</head>
<body>
<div class="content" v-cloak="">
    <p style="text-indent: 0;font-size: 20px;" v-text="title"></p>
    <p style="text-indent: 0;font-size: 16px; color: lightgrey;" v-text="time(date)"></p>
    <div style="width: 100% !important;overflow-x: hidden;margin-bottom: 10px;" v-html="content"></div>
</div>
</body>
<script type="text/javascript" src="../script/api.js"></script>
<script type="text/javascript" src="../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../script/vue.js"></script>
<script type="text/javascript">
    var vm;
    apiready = function () {
        vue();
    };
    function vue() {
        vm = new Vue({
            el: '.content',
            data: {
                title: api.pageParam.ret.title,
                date: api.pageParam.ret.create_time,
                content: api.pageParam.ret.content
            },
            methods: {
                time: function (inputTime) {
                    var date = new Date(inputTime * 1000);
                    var y = date.getFullYear();
                    var m = date.getMonth() + 1;
                    m = m < 10 ? ('0' + m) : m;
                    var d = date.getDate();
                    d = d < 10 ? ('0' + d) : d;
                    var h = date.getHours();
                    h = h < 10 ? ('0' + h) : h;
                    var minute = date.getMinutes();
                    var second = date.getSeconds();
                    minute = minute < 10 ? ('0' + minute) : minute;
                    second = second < 10 ? ('0' + second) : second;
                    return y + '-' + m + '-' + d + ' ' + h + ':' + minute + ':' + second;
                }
            }
        });
    }
</script>
</html>
