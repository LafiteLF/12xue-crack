<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title></title>
    <link rel="stylesheet" type="text/css" href="../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../css/aui.2.0.css"/>
    <style type="text/css">

        html, body {
            background-color: rgba(0, 0, 0, 0.2);
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            align-items: center; /*定义body的元素垂直居中*/
            justify-content: center; /*定义body的里的元素水平居中*/
        }

        .pop-content {
            width: 350px;
            height: auto;
            max-height: 150px;
            background-color: #ffffff;
            border-radius: 4px;
            padding-bottom: 20px;
            text-align: center;
            /*display: flex;*/
            /*align-items: center; !*定义body的元素垂直居中*!*/
        }

        .txt1 {
            font-size: 16px;
            color: #333333;
            text-align: center;
            padding-top: 26px;
        }

        .txt2 {
            font-size: 16px;
            color: #333333;
            text-align: center;
            padding-bottom: 25px;
        }

        .know {
            background-color: #4bc7c7;
            border-radius: 15px;
            font-size: 16px;
            color: #ffffff;
            text-align: center;
            padding: 6px 20px;

        }


    </style>
</head>
<body>
<div class="pop-content">

    <div class="txt1">尊敬的用户，由于当前网络高峰阻塞，</div>
    <div class="txt2">建议您稍后错峰使用。</div>

    <span class="know" tapmode onclick="exit()">知道了</span>

</div>
</body>
<script type="text/javascript" src="../script/api.js"></script>
<script type="text/javascript" src="../script/12XueApi_SDK.js"></script>
<script type="text/javascript">
    apiready = function () {
    };


    function exit() {
        api.closeFrame();
        //领创  发送广播
        if ($api.getStorage('deviceModel') == 1) {
            api.sendEvent({
                name: 'closeToLispirer'
            });
        }
        $api.setStorage('isLogin', 'false');

        api.closeToWin({
            name: 'root'
        });
    }

</script>
