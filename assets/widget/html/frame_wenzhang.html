<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>单选 多选 判断 听单句话 单项选择</title>    <link rel="stylesheet" type="text/css" href="../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../css/frameDetail.css"/></head><style>    strong{  color: #000; font-weight: bold}    [v-cloak] {        display: none    }    .xzt_content{        width: 100%; height: 100%;margin: 0; padding: 0;    }    .content{         height: calc(100% - 20px);background: #fff;        width: calc(100% - 20px);        position: fixed;        top: 10px;left: 10px;    }    .main{ padding:0  10px 0 20px; margin-right:10px;font-size: 1.4rem; height:calc(100% - 40px);line-height: 26px; overflow-y: scroll;margin-top: 20px}    .main img{ vertical-align: middle!important;}</style><body><div class="xzt_content" v-cloak>    <div class="content">        <div class="main"v-html="homeworkItem.content">        </div>    </div></div></body><script type="text/javascript" src="../script/api.js"></script><script type="text/javascript" src="../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../script/12XueApi_Router.js"></script><script type="text/javascript" src="../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../script/vue.js"></script><script type="text/javascript" src="../script/common.js"></script><script type="text/javascript" src="../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    apiready = function () {        vue();    };    function vue() {        vm = new Vue({            el: '.xzt_content',            data: {                fileType: api.pageParam.homeworkItem.filetype,//素材类型                url: api.pageParam.homeworkItem.serverpath + api.pageParam.homeworkItem.rootpath,//素材路径                convert_status: api.pageParam.homeworkItem.convert_status ,//判断素材doc是否转码成功                homeworkItem:api.pageParam.homeworkItem,            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                getFileType: function (filetype) {                    if (filetype == '.png' || filetype == '.jpg' || filetype == '.jpeg' || filetype == '.gif' || filetype == '.bmp') {                        return 'img'                    }                    else if (filetype == '.doc' || filetype == '.docx' || filetype == '.ppt' || filetype == '.pptx' || filetype == '.xls' || filetype == '.xlsx' || filetype == '.txt') {                        return 'doc'                    } else if (filetype == '.pdf') {                        return 'pdf'                    }                    else if (filetype == '.swf') {                        return 'swf'                    } else if (filetype == '.mp3' || filetype == '.wma') {                        // if (api.systemType == 'ios') {                            return 'video';                        // } else {                        //     return 'audio'                        // }                    } else {                        return 'video'                    }                },                getconvert: function (convert_status) {                    if (convert_status == 0) {                        return '资源正在转码,请三分钟后回来';                    }                    else if (convert_status == 2) {                        return '资源转码失败';                    }                },                openPDF: function (url) {                    api.showProgress({                        style: 'default',                        animationType: 'fade',                        title: '提示',                        text: '正在下载素材',                        modal: true                    });                    var str = vm.homeworkItem.zymc + vm.homeworkItem .zyid;                    str = str.replace(/#/, '');                    api.download({                        url: url,                        savePath: 'fs://pdfDownload/' + str + '.pdf',                        report: false,                        cache: true,                        allowResume: true                    }, function (ret, err) {                        api.hideProgress();                        if (ret.state == 1) {                            if (api.systemType == 'ios') {                                var docReader = api.require('docReader');                                docReader.open({                                    path: ret.savePath                                }, function (ret, err) {                                });                            } else {                                api.openWin({                                    name: 'win_pdf_view',                                    url: 'win_pdf_view.html',                                    pageParam: {                                        path: ret.savePath                                    }                                });                            }                        } else {                            //提示文档打开失败                            api.toast({                                msg: '文档下载失败，请检查网络，稍后再试！',                                duration: 2000,                                location: 'bottom'                            });                        }                    });                }            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if(src.substring(src.length-3)=='gif'){}else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });}    }</script></html>
