    var downloadManager;

    var downLoadState = 0; // 0 初始状态  1 正在下载 2 暂停下载  3 下载完成
    var schoolId = '';
    var pullRefresh;
    var refreshId = 0;
    apiready = function () {
        vm.getSchoolId();
        downloadManager = api.require('downloadManager');

        //下拉刷新
        pullRefresh = new auiPullToRefresh({
            container: document.querySelector('.aui-refresh-content'),
            triggerDistance: 100
        }, function (ret) {
            if (ret.status == "success") {
                if (schoolId == '') {
                    vm.getSchoolId();
                } else {
                    vm.refreshAppLists();
                }
            }
        });

    };

    var vm = new Vue({
        el: '.content',
        data: {
            apps:[],
            errIcon: '../../icon/icon_moren.png'
        },
        methods: {
            getAppLists: function () {
                api.showProgress({
                    title: '加载中',
                    text: '请稍后...',
                    modal: false
                });
                var apiObj = new GridOpenApi(UrlDomain, source, version);
                apiObj.Get(UrlRouter.PadApps, {
                    values: {
                        schoolid: schoolId
                    }
                }, function (ret, err) {
                    if (ret) {
                        if (ret.ret == 0) {
                            vm.apps = ret.data;
                            if (ret.data.length == 0) {
                                $api.removeCls($api.dom('.noApps'), 'aui-hide');
                            }
                        } else {
                            api.toast({
                                msg: ret.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                            $api.removeCls($api.dom('.noApps'), 'aui-hide');
                        }
                    } else {
                        api.toast({
                            msg: ret.msg,
                            duration: 2000,
                            location: 'bottom'
                        });
                        $api.removeCls($api.dom('.noApps'), 'aui-hide');
                    }
                    api.hideProgress();
                });
            },

            getSchoolId: function () {
                var apiObj = new GridOpenApi(UrlDomain, source, version);
                apiObj.Get(UrlRouter.GetUserSchoolInfo, {
                    values: {
                        uid: $api.getStorage('uid')
                    }
                }, function (ret, err) {
                    if (ret) {
                        if (ret.ret == 0) {
                            if (ret.data == '' || ret.data == null) {
                                vm.apps = [];
                                schoolId = '';
                                $api.removeCls($api.dom('.noApps'), 'aui-hide');
                            } else {
                                schoolId = ret.data[0].id;
                                vm.getAppLists();
                            }
                        } else {
                            api.toast({
                                msg: ret.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                            $api.removeCls($api.dom('.noApps'), 'aui-hide');
                        }
                    } else {
                        api.toast({
                            msg: err.msg,
                            duration: 2000,
                            location: 'bottom'
                        });
                        $api.removeCls($api.dom('.noApps'), 'aui-hide');
                    }
                    pullRefresh.cancelLoading();
                });
            },

            refreshAppLists: function () {
                var apiObj = new GridOpenApi(UrlDomain, source, version);
                apiObj.Get(UrlRouter.PadApps, {
                    values: {
                        schoolid: schoolId
                    }
                }, function (ret, err) {
                    if (ret) {
                        if (ret.ret == 0) {
                            vm.apps = ret.data;
                            if (ret.data.length == 0) {
                                $api.removeCls($api.dom('.noApps'), 'aui-hide');
                            } else {
                                $api.addCls($api.dom('.noApps'), 'aui-hide');
                            }
                        } else {
                            api.toast({
                                msg: ret.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                            $api.removeCls($api.dom('.noApps'), 'aui-hide');
                        }
                    } else {
                        api.toast({
                            msg: err.msg,
                            duration: 2000,
                            location: 'bottom'
                        });
                        $api.removeCls($api.dom('.noApps'), 'aui-hide');
                    }
                    pullRefresh.cancelLoading();
                });
            }
        }
    });

            api.toast({

        }
        api.download({
            url: $api.attr(context, 'url'),
            savePath: 'file:///storage/emulated/0/UZMap/A6919706055886/download/'+$api.attr(context, 'appName'),
            report: true,
            cache: true,
            allowResume: true

            if (ret) {
                setText(context, '下载中');
                downLoadState = 1;

                    downLoadState = 0;
                    api.installApp({
                        appUri: ret.savePath
                    });
                }
            } else {

                    duration: 2000,
                    location: 'bottom'
                });

    function itemClick1(context, id) {

        downloadManager.openDownloadedFile({
            id: id
        }, function (ret, err) {
            if (!ret.status) {
                downloadManager.enqueue({
                    url: $api.attr(context, 'url'),
                    savePath: 'file:///storage/emulated/0/UZMap/A6919706055886/download/'+$api.attr(context, 'appName'),
                    cache: true,
                    allowResume: true,
                    networkTypes: 'all'
                }, function (ret, err) {
                    var newContext = context;
                    if (ret) {
                        downLoadState = 1;
                        $api.attr(context, 'appId', ret.id);
                        timer = setInterval("checkDownLoad(newContext)", 1000);
                    } else {
                        alert(err);
                    }
                });
            }
        });
    }

    function checkDownLoad(context) {
        downloadManager.query({
            ids: [
                $api.attr(context, 'appId')
            ]
        }, function(ret, err) {
            if (ret) {
                if (ret.data && ret.data.length != 0) {
                    if (ret.data[0].finishSize == ret.data[0].totalSize) {
                        $api.attr($api.first(context), 'style', 'width: 100%');

                        setText(context, '点击安装');
//                        $api.text($api.last(context), '点击安装');
//                        $api.text($api.dom($api.first(context), 'jx2'), '点击安装');
                        downLoadState = 3;
                        clearInterval(timer);
                    } else {
                        if (downLoadState != 2) {
                            var progress = (Math.round(ret.data[0].finishSize/ret.data[0].totalSize * 100) + "%");
                            $api.attr($api.first(context), 'style', 'width:' + progress);
//                            $api.text($api.last(context), progress);
                            setText(context, progress);
                            downLoadState = 1;
                        }
                    }
                }
            }
        });
    }

    function setText(context, str) {
        $api.text($api.dom(context, '.jx1'), str);
        $api.text($api.dom(context, '.jx2'), str);
    }

    function ErrIcon(context) {
        refreshId++;
        context.src = vm.errIcon;
        if (refreshId > 6) {  //连续刷新6此以上 onerror事件自动去掉
            context.onerror = null;
        }
    }
