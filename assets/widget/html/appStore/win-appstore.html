<script type="text/javascript">

    apiready = function () {

        if(api.systemType == 'ios'){
            api.setScreenOrientation({
                orientation: 'landscape_left'
            });
        }else {
            api.setScreenOrientation({
                orientation: 'landscape_left'
            });
        }

        api.addEventListener({
            name: 'viewappear'
        }, function (ret, err) {
            api.setFullScreen({
                fullScreen: false
            });
        });

        var header = document.querySelector('header');
        var headerH = $api.offset(header).h + 25;
        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            color: '#4bc7c7'
        });
        var frameH = padWinHeight - headerH;
        api.openFrame({
            name: 'frame-appstore',
            url: 'frame-appstore.html',
            rect: {
                x: 0,
                y: headerH,
                w: api.winWidth,
                h: frameH
            },
            bounces: false
        });

//        api.addEventListener({
//            name: 'keyback'
//        }, function (ret, err) {
//            closeWin();
//        });

        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
            api.hideProgress();
            api.closeWin();
            //退出不做处理
        });

    };

    function closeWin() {
//        api.closeWin();
        api.sendEvent({
            name: 'closeActivity'
        });
    }
