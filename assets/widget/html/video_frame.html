<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="tephone=no,email=no,date=no,address=no">
    <style type="text/css">
        body {
            display: block;
            margin: 0;
        }
        video {
            background-color: rgba(0, 0, 0, .5);
            background-image: url("../image/video_bg.png");
            background-position: center center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
<div class="video-div">
    <video controls="" autoplay="" src="" type="video/mp4" controlsList="nodownload"></video>
</div>
</body>
</html>
<script type="text/javascript" src="../script/api.js"></script>
<script type="text/javascript" src="../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript">

    var url;
    apiready = function () {
        api.addEventListener({
            name: 'closeVideo'
        }, function (ret, err) {
            api.closeWin();
        });
        url = api.pageParam.path;
        $api.css($api.dom('video'), 'height:' + api.frameHeight + 'px !important;');
        $api.css($api.dom('video'), 'width:' + api.frameWidth + 'px !important;');
        $api.attr($api.dom('video'), 'src', decodeURIComponent(url));
    };
</script>
