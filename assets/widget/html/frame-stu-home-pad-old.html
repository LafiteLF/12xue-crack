<script>
    var sendSuc = true;
    var hsClass = false;//学生有没有申请还没有创建的班级
    var vm = new Vue({
        el: '.content',
        data: {
            photoHeight: '',
            personName: $api.getStorage('realname'),
            XdClass: '',
            School: '',
            Grade: '',
            face: $api.getStorage('head_url'),
            schoolid: '',
            isxuanke: true,
            xkok: false,
            chooseSubjectType: 1,//1不选课 2开始选课3 选课完成
            SubjectData: {},
            gradelist: [],
            comboData: {}
        },
        computed: {
            avatarFrameUrl: function () {
                return `../image/onlineMember/${this.comboData.data['level']}/avatar-frame.png`
            },
            isShowAvatarFrame: function () {
                return this.comboData.data && this.comboData.data['level'] !== 'nomal'
            },
            avatarFrameStyle: function () {
                switch (this.comboData.data['level']) {
                    case 'offprofessional':
                        return {
                            transform: 'translate(-50%, -50%)',
                        }
                    case 'offplus':
                        return {
                            transform: 'translate(-40%, -55%)',
                        }
                    case 'offmax':
                        return {
                            transform: 'translate(-50%, -55%)',
                            width: '8vw',
                            height: '8vw'
                        }
                    case 'max':
                        return {
                            width: '8vw',
                            height: '8vw'
                        }
                    default:
                        return {}
                }
            }
        },
        methods: {
            GetStudentStudentgradeid: function (schoolid) {
                api.showProgress({
                    title: '加载中',
                    text: '请稍后...',
                    modal: false
                });
                apiObj.SetAuthToken($api.getStorage('token'));
                apiObj.Get(UrlRouter.GetStudentStudentgradeid, {
                    values: {
                        schoolid: schoolid,
                        uid: $api.getStorage('uid'),
                    }
                }, function (ret, err) {
                    if (ret) {
                        if (ret.ret == 0) {
                            api.hideProgress();
                            // alert(JSON.stringify(ret)+'dddd')
                            vm.gradelist = ret.data
                            if (vm.gradelist.length > 0) {
                                vm.GetSelectCourseStuOpenSelect(false, schoolid)
                            }

                        } else {
                            api.hideProgress();
                            api.toast({
                                msg: ret.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }

                    } else {
                        api.hideProgress();
                        api.toast({
                            msg: err.msg,
                            duration: 2000,
                            location: 'bottom'
                        });
                    }
                });
            },
            GetSelectCourseStuOpenSelect: function (isclick, schoolid) {
                api.showProgress({

                                            if (ret.data.length == 0 && !hsClass) {
                                                var noClass = api.confirm({
                                                    title: '',
                                                    msg: '目前未加入班级，是否前往加入班级',
                                                    buttons: ['取消', '确定']
                                                }, function (ret, err) {
                                                    if (ret) {
                                                        if (ret.buttonIndex == 2) {
                                                            openMyClassWin();
                                                        }
                                                    }
                                                });
                                            } else {
                                                var auditClass = api.confirm({
                                                    title: '',
                                                    msg: '班级正在审核，是否前往查看',
                                                    buttons: ['取消', '确定']
                                                }, function (ret, err) {
                                                    if (ret) {
                                                        if (ret.buttonIndex == 2) {
                                                            openMyClassWin();
                                                        }
                                                        if (ret.buttonIndex == 1) {

                                                        }
                                                    }
                                                });
                                            }
                                        }
                                    }
                                })
                            }
                        } else {
                            // alert('没有班级');
                            apiObj.Get(UrlRouter.GetStudentAuditClass, {
                                values: {
                                    uid: $api.getStorage('uid'),
                                    type: '1'
                                }
                            }, function (ret, err) {
                                if (ret) {
                                    if (ret.ret == 0) {
                                        if (ret.data.length == 0 && !hsClass) {
                                            // alert('没有班级');
                                            var noClass = api.confirm({
                                                title: '',
                                                msg: '目前未加入班级，是否前往加入班级',
                                                buttons: ['取消', '确定']
                                            }, function (ret, err) {
                                                if (ret) {

                                                    if (ret.buttonIndex == 2) {
                                                        openMyClassWin();
                                                    }
                                                }
                                            });
                                        } else {
                                            // alert('有班级，但是正在审核');
                                            var auditClass = api.confirm({
                                                title: '',
                                                msg: '班级正在审核，是否前往查看',
                                                buttons: ['取消', '确定']
                                            }, function (ret, err) {
                                                if (ret) {
                                                    if (ret.buttonIndex == 2) {
                                                        openMyClassWin();
                                                    }
                                                }
                                            });
                                        }
                                    }
                                }
                            })
                        }
                    } else {
                        api.toast({
                            msg: ret.msg,
                            duration: 2000,
                            location: 'middle'
                        });
                    }
                } else {
                    api.toast({
                        msg: err.msg,
                        duration: 2000,
                        location: 'middle'
                    });
                    errEmaill(err);
                }
            });
        }
    }

    function openMyClassWin() {
        api.openWin({
            slidBackEnabled: false,
            name: 'myclass_win',
            url: '../html/mine/myclass/myclass_win.html',
            reload: true
        });

    function articleSwitch(index) {

            values: {
                schoolid: $api.getStorage('schoolid'),

                identitytype: '3'

    //签到
    function sign(type) {
        if ($api.getStorage('isLogin') == 'true') {
            if (type == 'checkSign') {
                apiObj.Get(UrlRouter.UserSign, "", function (ret, err) {
                    if (ret) {
                        if (ret.ret == 0) {
                            if ((ret.time * 1000) > stortTime()) {
                                $api.setStorage(getToday() + 'sign', true);
                                $api.addCls($api.dom('.imgSign'), 'aui-hide');
                                $api.removeCls($api.dom('.txtSigned'), 'aui-hide');
                            } else {
                                $api.addCls($api.dom('.txtSigned'), 'aui-hide');
                                $api.removeCls($api.dom('.imgSign'), 'aui-hide');
                            }
                        }
                    }
                });
            } else {
                apiObj.Post(UrlRouter.UserSign, "", function (ret, err) {
                    if (ret) {
                        $api.setStorage(getToday() + 'sign', true);
                        if (ret.ret == 0) {
                            //上传打分信息
                            updatebycode();
                            $api.addCls($api.dom('.imgSign'), 'aui-hide');
                            $api.removeCls($api.dom('.txtSigned'), 'aui-hide');
                            //获取分值信息
                            getSignedInfo('sign_earn_points');
                        } else {
                            $api.addCls($api.dom('.imgSign'), 'aui-hide');
                            $api.removeCls($api.dom('.txtSigned'), 'aui-hide');
                        }
                    }
                });
            }
        } else {
            if (!type) {
                return;
            }
            // 未登录
            api.openWin({
                name: 'login_win',
                url: 'login/login_win.html',
                slidBackEnabled: false
            });
        }
    }

    //签到成功后增加成长值
    function updatebycode() {
        apiObj.Put(UrlRouter.Postupdatebycode, {
            values: {
                "code": "sign_earn_points"
            }
        }, function (ret, err) {
            if (ret.ret == 0) {
                //增加成长值
                apiObj.Put(UrlRouter.Postupdatebycode, {
                    values: {
                        "code": "sign_earn_prestige"
                    }
                }, function (ret, err) {
                    if (ret.ret == 0) {
                        api.sendEvent({
                            name: 'init_user'
                        });
                    }
                });
            }
        });
    }

    var points = 0;
    var prestige = 0;

    function getSignedInfo(code) {
        //获取签到积分
        apiObj.Get(UrlRouter.GetUserConfigInfo, {
            values: {
                uid: $api.getStorage('uid'),
                code: code
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    if (code == 'sign_earn_points') {
                        points = ret.data.value;
                        getSignedInfo('sign_earn_prestige')
                    } else {
                        prestige = ret.data.value;
                        api.openFrame({
                            name: 'frame_finish_sign',
                            url: 'frame_finish_sign.html',
                            rect: {
                                x: 0,
                                y: 0,
                                w: api.winWidth,
                                h: api.winHeight
                            },
                            pageParam: {
                                prestige: prestige,
                                points: points
                            },
                            bounces: false
                        });
                    }
                } else {
                    $api.toast('温馨提示', '签到成功', 1000);
                }
            }
        });
    }

    function getToday() {
        var date = new Date();
        return date.getFullYear() + '-' + (date.getMonth() + 1) + '-' + date.getDate();
    }

    function stortTime() {
        var date = new Date();
        date.setDate(date.getDate());
        var tomorrow = date.getFullYear() + "/" + (date.getMonth() + 1) + "/" + date.getDate();
        return time = Date.parse(new Date(tomorrow));
    }

    //检查学校服务是否关闭
    function getIndexCheck() {
        apiObj2.Get(UrlRouter.GetIndexCheck, {
            values: {
                identitytype: '3',
                schoolid: $api.getStorage('schoolid')
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.data == 1) {
                    setTimeout(function () {

                        $api.setStorage('isLogin', 'false');

                        api.sendEvent({
                            name: 'openIndexCheck'
                        });

                        api.closeToWin({
                            name: 'root'
                        });

                    }, 1000);//1秒后跳转
                }
            }
        });
    }

    function errEmaill(info) {
        var msg = JSON.stringify(info);
        api.ajax({
            url: errorEmail,
            method: 'post',
            timeout: 30,
            dataType: 'json',
            returnAll: false,
            data: {
                values: {
                    msg: msg,
                    file: 'frame-stu-home-pad',
                    number: 'UserInfo',
                    version: api.appVersion,
                    app: '12xue OS',
                    system: api.systemType,
                    system_version: api.systemVersion,
                    device_id: '',
                    device_mode: api.deviceModel,
                    device_name: api.deviceName,
                    uid: $api.getStorage('uid')
                }
            }
        }, function (ret, err) {
        });
    }

    function postLoginSync() {
        apiObj.Post(UrlRouter.postLoginSync, {
            values: {
                uid: $api.getStorage('uid'),
                identitytype: 3
            }
        }, function (ret, err) {
            $api.setStorage('loginSyncTime', getCurrentTimestamp());
        })
    }

    function yisign() {
        api.toast({
            msg: '今日已签到',
            duration: 2000,
            location: 'middle'
        });
    }

    /**获取当前时间戳 秒**/
    function getCurrentTimestamp() {
        return Math.round(new Date() / 1000)
    }
