<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>通知详情</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        body {
            background: rgb(242, 242, 242);
        }
        .aui-bar-nav .aui-btn .aui-iconfont1 {
            color: #ffffff;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="content">
    <header class="aui-bar aui-bar-nav aui-bar-primary">
        <a v-if="rejectStatus == 0" class="aui-pull-left" tapmode onclick="closewin();">
            <span class="aui-iconfont aui-icon-left"></span>
            通知详情
        </a>
        <a v-else class="aui-pull-left" tapmode onclick="api.closeWin();">
            <span class="aui-iconfont aui-icon-left"></span>
            通知
        </a>
    </header>
</div>

</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript">
    var vm;
    apiready = function () {
        vue();
        var header = document.querySelector('header');
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'frame-notidetail',
            url: 'frame-notidetail.html',
            rect: {
                x: 80,
                y: headerH + 10,
                w: api.winWidth - 160,
                h: frameH - 20
            },
            pageParam: {
                list: api.pageParam.list,
            },
        });

        // Android按返回键关闭页面时结束自定义页面统计
        api.addEventListener({
            name:'keyback'
        },function(ret,err){
            api.sendEvent({
                name: 'closeAudio',
                extra: {}
            });
            api.closeWin();
        });

        api.addEventListener({
            name: 'loginOut'
        }, function (ret, err) {
            api.closeWin();
        });
    };
    function closewin() {
        api.sendEvent({
            name: 'closeAudio',
            extra: {}
        });
        api.closeWin();
    }
    function vue() {
        vm = new Vue({
            el: '.content',
            data: {
                rejectStatus: api.pageParam.list.rejectStatus,
                title: api.pageParam.list.title,
            },
            updated: function () {
            },
            methods: {

            }
        });
    }
</script>
</html>
