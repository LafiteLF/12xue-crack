<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var pullRefresh;
    var selectedId = "2";
    var totalP;
    var p = 1;
    apiready = function () {
        getCommentList(p);
        pullRefresh = new auiPullToRefresh({
            container: document.querySelector('.aui-refresh-content'),
            triggerDistance: 100
        }, function (ret) {
            if (ret.status == "success") {
                p = 1;
                $api.html($api.dom('.aui-list'), '');
                getCommentList(p);
            }
        });

        api.addEventListener({
            name: 'scrolltobottom',
            extra: {
                threshold: -100           //设置距离底部多少距离时触发，默认值为0，数字类型
            }
        }, function (ret, err) {
            p++;
            if (p > totalP) {
                api.toast({
                    msg: '已经到底啦，没有更多消息了',
                    duration: 2000,
                    location: 'bottom'
                });
            } else {
                getCommentList(p);
            }
        });
    };
    var count = 0;
    var count1 = 0;

    function getCommentList(page) {

        api.showProgress();
        if (selectedId == "2") {
            //收到的
            apiObj.Get(UrlRouter.GetReceivedComments, {
                values: {
                    num: 10,
                    p: page
                }

            }, function (ret, err) {
                if (ret) {
                    api.hideProgress();
                    pullRefresh.cancelLoading();
                    if (ret.ret == 0) {
                        totalP = ret.totalpage;
                        if (ret.list.length == 0) {
                            $api.html($api.dom('.aui-list'), '<div class="no-data"> <img class="img-null" src="../../../image/stuHomePad/noContent.png" style="height:auto!important;width: 40%;vertical-align: middle;position: absolute;top: 20%;left: 30%;"/> </div>');
                            $api.css($api.dom('.img-null'), 'top:' + api.frameHeight / 4 + 'px');
                            return;
                        }
                        for (var i = 0; i < ret.list.length; i++) {
                            if (ret.list[i].dynamic.status == 1) {
                                count++;
                            }
                        }
                        for (var i = 0; i < ret.list.length; i++) {

                            if (ret.list[i].dynamic.status == 0) {
                                if (count == 0) {
                                    $api.html($api.dom('.aui-list'), '<div class="no-data"> <img class="img-null" src="../../../image/stuHomePad/noContent.png" style="height:auto!important;width: 40%;vertical-align: middle;position: absolute;top: 20%;left: 30%;"/> </div>');
                                    $api.css($api.dom('.img-null'), 'top:' + api.frameHeight / 4 + 'px');
                                }
                            } else {


                                var role = '';
                                switch (ret.list[i].userinfo.identitytype) {
                                    case 2:
                                        role = "老师";
                                        break;
                                    case 3:
                                        role = "学生";
                                        break;
                                    case 4:
                                        role = "家长";
                                        break;
                                    default:
                                        role = "未知";
                                        break;
                                }

                                switch (ret.list[i].dynamic.userinfo.identitytype) {
                                    case 2:

                                        break;
                                    case 3:
                                        myrole = "学生";
                                        break;
                                    case 4:
                                        myrole = "家长";
                                        break;
                                    default:
                                        myrole = "未知";
                                        break;

//                            var refRole = '';

        api.openWin({

    function replyClick(context) {
        if ($api.getStorage('teacherSwitch') == 1) {
            if ($api.getStorage("haveclass") == 0) {
                api.toast({
                    msg: '您目前还不能回复，请等待班级老师的审核',
                    duration: 2000,
                    location: 'bottom'
                });
            } else {
                api.toast({
                    msg: '暂不允许进行回复，还是老老实实回去学习吧',
                    duration: 2000,
                    location: 'bottom'
                });
            }
            return;
        }
        api.openWin({
            name: 'win-comment-reply',
            url: '../../moments/win-comment-reply.html',
            pageParam: {
                dynamicid: $api.attr(context, 'dynamicid'),
                realname: $api.getStorage('realname'),
                replyid: $api.attr(context, 'commentId'),
                replyName: $api.attr(context, 'replyname')
            }
        });

    }
