<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><meta name="format-detection" content="telephone=no"/><meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        html, body {
            background-color: rgba(0, 0, 0, 0.3);
            position: relative;
        }       .aui-border-t:before, .aui-border-b:after{ height: 0px;}
        .show {
            width: 35%;
            top: 30%;
            position: absolute;
            left: 32.5%;
            background: #fff;
            border-radius: 5px;
            padding-top: 50px;
            padding-bottom: 30px;
        }
        .item {
            text-align: center;
            font-size: 0.8rem;
            color: #fff;
            width: 60%;
            height: 46px;
            line-height: 46px;
            margin: 0 auto;
            border-radius: 5px;
            margin-bottom: 20px;
            background: #4bc7c7;
        }
        .item:active{
            background: #3fa6a6;
        }
        .backgroud {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="backgroud" tapmode onclick="api.closeFrame({
    name: 'frame-comments-tab'
});"></div>
<div class="show">
    <p id="2" class="item aui-border-b" tapmode onclick="itemClick(this)">收到的</p>
    <p id="1" class="item aui-border-b" tapmode onclick="itemClick(this)">发送的</p>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript">
    apiready = function () {

    };

    function itemClick(context) {
        var func = "$api.html($api.dom('.type'), '" + $api.text(context) + "');";
        api.execScript({
            script: func
        });
        var jsfun = "api.closeFrame({name: 'frame-comments-tab'});";
        api.execScript({
            frameName: 'frame-comments-tab',
            script: jsfun
        });

        var mainJsfun = "selectedId="+context.id+";p = 1; totalP = 0; $api.html($api.dom('.aui-list'), '');getCommentList(p);";
        api.execScript({
            frameName: 'frame-comment-main',
            script: mainJsfun
        });
    }
</script>
</html>
