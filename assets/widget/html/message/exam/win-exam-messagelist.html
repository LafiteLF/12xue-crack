<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>考试消息列表</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        body {
            background: rgb(242, 242, 242);
        }
        .aui-bar-nav .aui-btn .aui-iconfont1 {
            color: #ffffff;
            padding: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="content">
    <header class="aui-bar aui-bar-nav">
        <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">
            <span class="aui-iconfont aui-icon-left" tapmode onclick='api.closeWin();'></span>考试消息
        </a>
    </header>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript">
    var vm;
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function () {
        vue();
        var header = document.querySelector('header');
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'frame-exam-messagelist',
            url: 'frame-exam-messagelist.html',
            rect: {
                x: 80,
                y: headerH + 0,
                w: api.winWidth - 160,
                h: frameH - 10
            },
            bounces: false
        });

        // Android按返回键关闭页面时结束自定义页面统计
        api.addEventListener({
            name:'keyback'
        },function(ret,err){
            api.closeWin();
        });

        api.addEventListener({
            name: 'loginOut'
        }, function (ret, err) {
            api.closeWin();
        });

        api.addEventListener({
            name: 'kong'
        }, function (ret, err) {
            vm.flag = 1;
        });
    };
    function vue() {
        vm = new Vue({
            el: '.content',
            data: {
                flag: '',
            },
            updated: function () {
            },
            methods: {

            }
        });
    }
</script>
</html>
