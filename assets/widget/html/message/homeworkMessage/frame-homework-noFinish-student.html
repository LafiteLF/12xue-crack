<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlWeibo, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function(){
        apiObj.Get(UrlRouter.GetUncompleteStudentList, {
            values: {
                zyid:api.pageParam.zyid,
                classid:api.pageParam.classid
            }
        }, function (ret, err) {
            if (ret){
                if (ret.status==1){
                    for(var i=0;i<ret.data.length;i++){
                        $api.append($api.dom('.user-grid'),'<div class="row aui-text-center"> <div class="aui-col-xs-3"> <img  src="'+ret.data[i].userinfo.face+'"> <p>'+ret.data[i].userinfo.realname+'</p> </div> </div>')
                    }

                }else{
                    api.hideProgress();
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    })
                }
            }else{
                api.hideProgress();
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                })
            }
            api.refreshHeaderLoadDone();
        });
    };
</script>
