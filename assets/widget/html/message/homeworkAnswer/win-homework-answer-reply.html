<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        .nav-spanBtn {
            border: 1px solid #4bc7c7 !important;
            border-radius:3px;
            padding: 5px 10px;
            margin-right: 10px;
            font-size: 0.8rem
        }
        .nav-spanBtn:active{
            color: #fff;
            background:#4bc7c7  ;
        }
    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav aui-bar-primary">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">
        <span class="aui-iconfont aui-icon-left" ></span>回复
    </a>
    <div style="float: right" class="submit">
        <span class="nav-spanBtn  aui-iconfont aui-icon-check"
              style="font-size: 0.7rem" tapmode onclick="reply();">确定</span>
    </div>
</header>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    var isOpenPic = false;
    apiready = function () {
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'frame-homework-answer-reply',
            url: 'frame-homework-answer-reply.html',
            rect: {
                x: 0,
                y: $api.offset($api.dom("header")).h,
                w: "auto",
                h: "auto"
            },
            pageParam: {id:api.pageParam.id,parent:api.pageParam.parent},
            bounces: false
        });
        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
            if (isOpenPic) {
                api.execScript({
                    frameName: 'frame-homework-answer-reply',
                    script: "photoBrowser.close();"
                });
                isOpenPic = false;
            } else {
                api.closeWin();
            }
        });
    };
    function reply() {
        api.execScript({
            frameName: 'frame-homework-answer-reply',
            script: "reply();"
        });
    }

</script>
</html>
