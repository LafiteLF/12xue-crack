<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    var p = 1;
    var isClean = true;
    var status = 1;
    var classid = new Array();
    var xkid = new Array();
    var xkmc = new Array();
    var xkidS = '';//用来穿参数
    var totalPage;
    var totalP;
    var imageList;
    var audioList;
    var frameH;
    var headerH;
    apiready = function () {
        var header = document.querySelector('header');
        apiObj.SetAuthToken($api.getStorage('token'));
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        getXkid();//获取xkid
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.openFrame({
            name: 'frame-homework-answer-list',
            url: 'frame-homework-answer-list.html',
            bounces: false,
            vScrollBarEnabled: false,
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            pageParam: {
                y: headerH,
                h: frameH
            }

        });
    };
//    function chooses(type) {
//
//        api.sendEvent({
//            name: 'myEvents',
//            extra: {
//                key1: type
//            }
//        });
//    }
    //获取学科列表
    function getXkid() {
        apiObj.Get(UrlRouter.GetQuestionxk, {
            values: {
                useruid: $api.getStorage('uid'),
                identitytype: '3'
            }
        }, function (ret, err) {
            if (ret) {
                api.hideProgress();
                if (ret.ret == 0) {
                    if (ret.data.length == 0) {
                        //展示空界面
                        $api.html($api.dom('.aui-list'), '<div class="no-data"> <img class="img-null" src="../../../image/noContent.png" style="height:auto!important;width: 40%;vertical-align: middle;position: absolute;top: 30%;left: 30%;"/> </div>');
                        $api.css($api.dom('.img-null'), 'top:' + api.frameHeight / 3 + 'px');
                    } else {
                        //先清空一下
                        xkid.length = 0;
                        xkmc.length = 0;
                        xkid.push('');
                        xkmc.push('全部学科');
                        //添加学科ID 学科名称进数组
                        for (var i = 0; i < ret.data.length; i++) {
                            xkid.push(ret.data[i].xkid);
                            xkmc.push(ret.data[i].xkmc);
                        }

                    }
                } else {
                    alert(ret.msg);
                }
            } else {
                alert(err.msg);
            }

        })
    }
    function chooses(type) {
        switch (type) {
            case 'is-request':
                openFrame(['我发出的', '我收到的'], '', 'type-request');
                break;
            case 'subject':
                openFrame(xkmc, xkid, 'type-subject');
                break;

        }
    }

    function openFrame(xkmc, xkid, item) {
        api.openFrame({
            name: 'frame-tab',
            url: 'frame-tab.html',
            rect: {
                x: 0,
                y: 0,
                w: 'auto',
                h: $api.getStorage('padHeight')
            },
            pageParam: {array: xkmc, arrayId: xkid, item: item, frameName: 'frame-homework-answer-list'},
            bounces: false,
            reload: true
        });
    }

</script>
