<script type="text/javascript">

    var apiObj = new GridOpenApi(UrlDomain, source, version);
    var timerId;
    apiready = function () {
        apiObj.SetAuthToken($api.getStorage("token"));
        if ($api.getStorage("studentSwitch") == 0) {
            $api.addCls($api.byId("ishide"), 'aui-hide');
            $api.addCls($api.byId("hide"), 'aui-hide');
        } else {
            $api.removeCls($api.byId("ishide"), 'aui-hide');
            $api.removeCls($api.byId("hide"), 'aui-hide');
        }
        getNofiNum();
        setNotifyInterval();
        api.addEventListener({
            name: 'init_user'
        }, function (ret, err) {
            apiObj.SetAuthToken(ret.value.token);
            restartNotifyInterval();
        });
        addWinListener();
    };

    function restartNotifyInterval() {
        if (timerId) {
            clearNotifyInterval();
        }
        setNotifyInterval();
    }
    function setNotifyInterval() {
        if (!timerId) {
            timerId = setInterval("getNofiNum()", 30000);
        }
    }
    function clearNotifyInterval() {
        if (timerId) {
            clearInterval(timerId);
            timerId = 0;
        }
    }
    function addWinListener() {
        api.addEventListener({
            name: 'viewappear'
        }, function (ret, err) {
            setNotifyInterval();
        });
        api.addEventListener({
            name: 'viewdisappear'
        }, function (ret, err) {
            clearNotifyInterval();
        });
        api.addEventListener({
            name: 'pause'
        }, function (ret, err) {
            clearNotifyInterval();
        });
        api.addEventListener({
            name: 'resume'
        }, function (ret, err) {
            restartNotifyInterval();
        });
    }
    var nofi = 0, me = 0, comm = 0, zan = 0, xgr = 0, faq = 0, course = 0, homework = 0, exam = 0;

    //作业消息数量
    function getHomeworkNum() {
        apiObj.Get(UrlRouter.Getstuhomeworkmessage, {value: {identitytype: 3}}, function (ret, err) {
            if (ret && ret.ret == 0) {
                if (ret.data.homework_dynamic.bchange) {
                    homework = ret.data.homework_dynamic.count;
                    $api.addCls($api.byId("badge-zyxx"), 'aui-badge');
                    $api.text($api.byId("badge-zyxx"), homework);
                } else {
                    homework = 0;
                    $api.text($api.byId("badge-zyxx"), "");
                    $api.removeCls($api.byId("badge-zyxx"), 'aui-badge');
                }
                getCourse();
            } else {
                api.hideProgress();
                api.toast({
                    msg: ret.msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }

        });
    }

    //得到通知消息数量
    function getNofiNum() {
        //消息数量
        apiObj.Get(UrlRouter.Getpullmessage, "", function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    if (ret.data.normalnotify_dynamic.bchange) {
                        nofi = ret.data.normalnotify_dynamic.count;
                        $api.addCls($api.byId("badge-tz"), 'aui-badge');
                        $api.text($api.byId("badge-tz"), nofi);
                    } else {
                        nofi = 0;
                        $api.text($api.byId("badge-tz"), "");
                        $api.removeCls($api.byId("badge-tz"), 'aui-badge');
                    }
                    getFaq();
                } else {
                    api.hideProgress();
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            } else {
                api.hideProgress();
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }

        });
    }

    //学生作业问答消息数量
    function getFaq() {
        apiObj.Get(UrlRouter.Getstumessage, "", function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    if (ret.data.faq_dynamic.bchange) {
                        faq = ret.data.faq_dynamic.count;
                        $api.addCls($api.byId("badge-zywd"), 'aui-badge');
                        $api.text($api.byId("badge-zywd"), faq);
                    } else {
                        faq = 0;
                        $api.text($api.byId("badge-zywd"), "");
                        $api.removeCls($api.byId("badge-zywd"), 'aui-badge');
                    }
                    getHomeworkNum();
                } else {
                    api.hideProgress();
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            } else {
                api.hideProgress();
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }
        });
    }

    //课堂资源包消息数量
    function getCourse() {
        apiObj.Get(UrlRouter.Getclassmessage, {values: {identitytype: 3}}, function (ret, err) {
            if (ret.ret == 0) {
                //@我
                if (ret.data.course_dynamic.bchange) {
                    course = ret.data.course_dynamic.count;
                    $api.addCls($api.byId("badge-kcxx"), 'aui-badge');
                    $api.text($api.byId("badge-kcxx"), course);
                } else {
                    course = 0;
                    $api.text($api.byId("badge-kcxx"), "");
                    $api.removeCls($api.byId("badge-kcxx"), 'aui-badge');
                }
                Getnewexammessage();
            } else {
                api.hideProgress();
                api.toast({
                    msg: ret.msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }
        });
    }

    //考试消息数量
    function Getnewexammessage() {
        apiObj.Get(UrlRouter.Getnewexammessage, {
            values: {
                uid: $api.getStorage("uid"),
            }
        }, function (ret, err) {
            if (ret.ret == 0) {
                if (ret.data.exammsg_dynamic.bchange) {
                    exam = ret.data.exammsg_dynamic.count;
                    $api.addCls($api.byId("badge-exam"), 'aui-badge');
                    $api.text($api.byId("badge-exam"), exam);
                } else {
                    exam = 0;
                    $api.text($api.byId("badge-exam"), "");
                    $api.removeCls($api.byId("badge-exam"), 'aui-badge');
                }
                getPullcommon();
            } else {
                api.toast({
                    msg: ret.msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }
        })
    }

    //用户@、评论、赞、关注消息
    function getPullcommon() {
        apiObj.Get(UrlRouter.Getpullcommon, "", function (ret, err) {
            if (ret.ret == 0) {
                //@我
                if (ret.data.at_dynamic.bchange) {
                    me = ret.data.at_dynamic.count;
                    $api.addCls($api.byId("badge-me"), 'aui-badge');
                    $api.text($api.byId("badge-me"), me);
                } else {
                    me = 0;
                    $api.text($api.byId("badge-me"), "");
                    $api.removeCls($api.byId("badge-me"), 'aui-badge');
                }
                //评论
                if (ret.data.commentme_dynamic.bchange) {
                    comm = ret.data.commentme_dynamic.count;
                    $api.addCls($api.byId("badge-pl"), 'aui-badge');
                    $api.text($api.byId("badge-pl"), comm);
                } else {
                    comm = 0;
                    $api.text($api.byId("badge-pl"), "");
                    $api.removeCls($api.byId("badge-pl"), 'aui-badge');
                }
                //赞
                if (ret.data.thumbup_dynamic.bchange) {
                    zan = ret.data.thumbup_dynamic.count;
                    $api.addCls($api.byId("badge-zan"), 'aui-badge');
                    $api.text($api.byId("badge-zan"), zan);
                } else {
                    zan = 0;
                    $api.text($api.byId("badge-zan"), "");
                    $api.removeCls($api.byId("badge-zan"), 'aui-badge');
                }
                //新关注
                if (ret.data.follow_dynamic.bchange) {
                    xgr = ret.data.follow_dynamic.count;
                    $api.addCls($api.byId("badge-xgr"), 'aui-badge');
                    $api.text($api.byId("badge-xgr"), xgr);
                } else {
                    xgr = 0;
                    $api.text($api.byId("badge-xgr"), "");
                    $api.removeCls($api.byId("badge-xgr"), 'aui-badge');
                }
                //本地存储未读消息总数
                if ($api.getStorage('teacherSwitch') == 1) {
                    count = nofi + course + faq + homework + exam;
                } else {
                    count = nofi + comm + me + zan + xgr + course + faq + homework + exam;

                }
                $api.setStorage('all_message', count);
            } else {
                $api.setStorage('all_message', 0);
            }
            api.sendEvent({
                name: 'refreshMessageCount',
                extra: {}
            });
        });

    }


    function openWin(index) {
        var winName;
        var winPath;
        var data = {};
        switch (index) {
            case 1:
                winName = 'win-homework-message-list';
                winPath = 'homeworkMessage';
                if (homework != 0) {
                    $api.text($api.byId("badge-zyxx"), "");
                    $api.removeCls($api.byId("badge-zyxx"), 'aui-badge');
                }
                break;
            case 2:
                winName = 'win-homework-answer-main';
                winPath = 'homeworkAnswer';
                if (faq != 0) {
                    $api.text($api.byId("badge-zywd"), "");
                    $api.removeCls($api.byId("badge-zywd"), 'aui-badge');
                }
                break;
            case 3:
                winName = 'win-course-message';
                winPath = 'courseMessage';
                if (course != 0) {
                    $api.text($api.byId("badge-kcxx"), "");
                    $api.removeCls($api.byId("badge-kcxx"), 'aui-badge');
                }
                break;
            case 4:
                winName = 'win-notifylist';
                winPath = 'newnotify';
                if (nofi != 0) {
                    $api.text($api.byId("badge-tz"), "");
                    $api.removeCls($api.byId("badge-tz"), 'aui-badge');
                }
                break;
            case 9:
                winName = 'win-exam-messagelist';
                winPath = 'exam';
                if (exam != 0) {
                    $api.text($api.byId("badge-exam"), "");
                    $api.removeCls($api.byId("badge-exam"), 'aui-badge');
                }
                break;
            case 5:
                winName = 'win-atMe';
                winPath = 'atMe';
                if (me != 0) {
                    $api.text($api.byId("badge-me"), "");
                    $api.removeCls($api.byId("badge-me"), 'aui-badge');
                }
                break;
            case 6:
                winName = 'win-comment-main';
                winPath = 'comments';
                if (comm != 0) {
                    $api.text($api.byId("badge-pl"), "");
                    $api.removeCls($api.byId("badge-pl"), 'aui-badge');
                }
                break;
            case 7:
                winName = 'win-support';
                winPath = 'support';
                if (zan != 0) {
                    $api.text($api.byId("badge-zan"), "");
                    $api.removeCls($api.byId("badge-zan"), 'aui-badge');
                }
                break;
            case 8:
                winName = 'win-new-focus';
                winPath = 'newFocus';
                if (xgr != 0) {
                    $api.text($api.byId("badge-xgr"), "");
                    $api.removeCls($api.byId("badge-xgr"), 'aui-badge');
                }
                break;
        }
        api.openWin({
            name: winName,
            url: winPath + '/' + winName + '.html',
            pageParam: data
        });
    }
