<script type="text/javascript">
    var pullRefresh;
    apiready = function () {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        getData();
        pullRefresh = new auiPullToRefresh({
            container: document.querySelector('.aui-refresh-content'),
            triggerDistance: 100
        }, function (ret) {
            if (ret.status == "success") {
                p = 1;
                isClean = true;
                getData();
            }
        })
    };
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var p = 1;
    var isClean = true;
    var totalPage;

    function getData() {
        apiObj.Get(UrlRouter.Praiselist, {
            values: {
                num: 10,
                p: p
            }
        }, function (ret, err) {
            pullRefresh.cancelLoading();
            if (ret) {
                api.hideProgress();
                if (ret.ret == 0) {

                    if (isClean) {
                        $api.html($api.dom('.aui-list'), '');
                    }
                    var isNull= '0';
                    for (var i = 0; i < ret.list.length; i++) {
                        if (ret.list[i].status != 0) {
                            isNull = '1';
                        }
                    }
                    if (ret.list.length == 0||isNull == '0') {
                        $api.html($api.dom('.aui-list'), '<div class="no-data"> <img class="img-null" src="../../../image/stuHomePad/noContent.png" style="height:auto!important;width: 40%;vertical-align: middle;position: absolute;top: 150px;left: 30%;"/> </div>');
//                        $api.css($api.dom('.img-null'), 'top:' + api.frameHeight / 3 + 'px');
                        return;
                    }
                    for (var i = 0; i < ret.list.length; i++) {
                        if (ret.list[i].status == 0) {

                        } else {
                        var isFollow = ret.list[i].follow == true ? 'display:none' : $api.getStorage('puid') == ret.list[i].uid ? 'display:none' : 'display:inline-block';
                        var isMine = $api.getStorage('puid') != ret.list[i].uid ? 'display:none' : 'display:inline-block';
                        var role = '';
                        switch (ret.list[i].thumb_userinfo.identitytype) {
                            case 2:
                                role = "老师";
                                break;
                            case 3:
                                role = "学生";
                                break;
                            case 4:
                                role = "家长";
                                break;
                            default:
                                role = "未知";
                                break;
                        }
                        var myrole = '';
                        switch (ret.list[i].userinfo.identitytype) {
                            case 2:
                                myrole = "老师";
                                break;
                            case 3:
                                myrole = "学生";
                                break;
                            case 4:
                                myrole = "家长";
                                break;
                            default:
                                myrole = "未知";
                                break;
                        }

                        if (ret.list[i].thumb_userinfo.sex == 1) {
                            var sexhtml = '<div class= "aui-iconfont aui-icon-mail sex"></div>';
                        } else {
                            var sexhtml = '<div class= "aui-iconfont aui-icon-femail unsex"></div>';
                        }

                        var Istatus = '666' ;
                        if(ret.list[i].ref){
                            if(ret.list[i].ref.status == 0){
                                Istatus = ret.list[i].ref.status;
                            }
                        }
                        $api.append($api.dom('.aui-list'), '<li class="aui-card-list aui-border-b"> ' +

                                '<div class="aui-card-list-header aui-card-list-user" refUid="' + ret.list[i].thumb_uid + '"> ' +
                                '<div class="aui-card-list-user-avatar" onclick="clickYuanUser(this)"> ' +sexhtml+
                                '<img src="' + ret.list[i].thumb_userinfo.face + '" class="aui-img-round" />' +
                                ' </div> ' +
                                '<div class="aui-card-list-user-name aui-font-size-16" onclick="clickYuanUser(this)">' +
                                '<div class="aui-text-primary "  uid="' + ret.list[i].uid + '" ><span class="aui-ellipsis-1 username ">' + ret.list[i].thumb_userinfo.realname + '</span> ' +
                                '<span class="aui-label aui-label-info">' + ret.list[i].thumb_userinfo.rank + '' +
                                '</span>' +
                                '</div> ' +
                                '</div> ' +
                                '<div class="aui-card-list-user-info aui-text-default">' + ret.list[i].thumb_userinfo.xxmc + ' ' + role + '' +
                                '</div> ' +
                                '<small class="aui-card-list-user-info">' + ret.list[i].thumb_createtime +
                                '</small>' +
                                ' </div>' +
                                ' <div class="aui-card-list-content-padded"> ' +
                                '<div class="content-text ">给了我一个赞 </div>' +
                                ' <div class="content-forward" style="background: #F4F4F4;margin: 0.7rem ;padding: 0.2rem" tapmode onclick="momentDetail(this)" id="' + ret.list[i].id + '"> ' +
                                '<div class="aui-card-list-user-name  aui-margin-b-5" >' +
                                ' <div class="aui-text-primary " onclick="clickSecondUser(this)" uid="' + ret.list[i].uid + '">' + ret.list[i].userinfo.realname + ' ' +
                                '<span class="aui-label aui-label-info">' + ret.list[i].userinfo.rank + '' +
                                '</span>' +
                                '<spanclass="aui-text-default">（' + ret.list[i].userinfo.xxmc + '  ' + myrole + '）</span>' +
                                ' </div> ' +
                                '</div> ' +
                                '<div class="content-forward-text "> ' +
                                '</div>' +
                                '<div class="content-img aui-padded-t-5 aui-margin-l-5" style="margin-right: 5px;">' +
                                '</div> ' +
                                '<div class="report-block" status = "'+Istatus+'" tapmode onclick="transpondContent(this)"> ' +
                                '<div class="aui-card-list-user-info">' + ret.list[i].createtime + ' ' + ret.list[i].device + '</div>' +
                                ' </div> ' +
                                '</div> ' +

                                '</div> ' +
                                '</li>');

                        if (ret.list[i].content != '') {
                            var content = ret.list[i].content.replace(/(<\/?a.*?>)|(<\/?span.*?>)/g, "");
                            switch (ret.list[i].content_type) {
                                case '':
                                case 'user':
                                    $api.html($api.domAll('.content-forward-text')[$api.domAll('.content-forward-text').length - 1], ret.list[i].ref ? '转发了动态:' + ret.list[i].content : ret.list[i].content);
                                    break;
                                case 'course':
                                    $api.html($api.domAll('.content-forward-text')[$api.domAll('.content-forward-text').length - 1], '制作了<span class="aui-text-primary" uid="' + ret.list[i].uid + '" tapmode onclick="resourceClick(this,\'course\');" resId="' + ret.list[i].resourceid + '">【课堂资源包】' + content + '</span> <br>' + ret.list[i].tag.xkmc + ' ' + ret.list[i].tag.njmc + ' ' + ret.list[i].tag.bbmc + ' ' + ret.list[i].tag.dymc + ' ' + ret.list[i].tag.jmc);
                                    break;
                                case 'homework':
                                    $api.html($api.domAll('.content-forward-text')[$api.domAll('.content-forward-text').length - 1], '布置了<span class="aui-text-primary" uid="' + ret.list[i].uid + '" tapmode onclick="resourceClick(this,\'homework\');" resId="' + ret.list[i].resourceid + '">【作业】' + content + '</span> <br>' + ret.list[i].tag.xkmc + ' ' + ret.list[i].tag.njmc);
                                    break;
                                case 'material':
                                    var fl = ret.list[i].fl == '1' ? '教学设计' : ret.list[i].fl == '2' ? '自主学习单' : ret.list[i].fl == '3' ? '精讲助学' : ret.list[i].fl == '4' ? '影音素材' : ret.list[i].fl == '6' ? '微课': '其他类';
                                    $api.html($api.domAll('.content-forward-text')[$api.domAll('.content-forward-text').length - 1], '上传了<span class="aui-text-primary" uid="' + ret.list[i].uid + '" tapmode onclick="resourceClick(this,\'material\');" resId="' + ret.list[i].resourceid + '">【' + fl + '】' + content + '</span> <br>' + ret.list[i].tag.xkmc + ' ' + ret.list[i].tag.njmc + ' ' + ret.list[i].tag.bbmc + ' ' + ret.list[i].tag.dymc + ' ' + ret.list[i].tag.jmc);
                                    break;
                                case 'exercise':
                                    $api.html($api.domAll('.content-forward-exercise')[$api.domAll('.content-forward-exercise').length - 1], '编写了<span class="aui-text-primary" uid="' + ret.list[i].uid + '" tapmode onclick="resourceClick(this,\'exercise\');" resId="' + ret.list[i].resourceid + '">【习题】' + content + '</span> <br>' + ret.list[i].tag.xkmc + ' ' + ret.list[i].tag.njmc + ' ' + ret.list[i].tag.bbmc + ' ' + ret.list[i].tag.sxcmc + ' ' + ret.list[i].tag.dymc + ' ' + ret.list[i].tag.jmc);
                                    break;
                            }
                        }


                        if (ret.list[i].image_list != null) {
                            if (ret.list[i].image_list.length == 1) {
                                if (ret.list[i].image_list[0].indexOf('?') != -1) {
                                    $api.html($api.domAll('.content-img')[$api.domAll('.content-img').length - 1], '<img class="img-size1" src="' + ret.list[i].image_list[0] + '/auto-orient/thumbnail/!65p"/>');
                                } else {
                                    $api.html($api.domAll('.content-img')[$api.domAll('.content-img').length - 1], '<img class="img-size1" src="' + ret.list[i].image_list[0] + '?imageMogr2/auto-orient/thumbnail/!65p"/>');
                                }
                            } else if (ret.list[i].image_list.length > 1) {
                                $api.html($api.domAll('.content-img')[$api.domAll('.content-img').length - 1], '<div class="img-size4 aui-row aui-row-padded"> </div>');
                                for (var imageSize = 0; imageSize < ret.list[i].image_list.length; imageSize++) {
                                    if (ret.list[i].image_list[imageSize].indexOf('?') != -1) {
                                        $api.append($api.domAll('.img-size4')[$api.domAll('.img-size4').length - 1], '<div class="aui-col-xs-4"> <img src="' + ret.list[i].image_list[imageSize] + '/auto-orient/thumbnail/!65p" alt=""> </div>');
                                    } else {
                                        $api.append($api.domAll('.img-size4')[$api.domAll('.img-size4').length - 1], '<div class="aui-col-xs-4"> <img src="' + ret.list[i].image_list[imageSize] + '?imageMogr2/auto-orient/thumbnail/!65p" alt=""> </div>');
                                    }
                                }
                            }
                        }

                        if (ret.list[i].ref != null) {
                            var reportrole = '';
                            switch (ret.list[i].ref.userinfo.identitytype) {
                                case 2:
                                    reportrole = "老师";
                                    break;
                                case 3:
                                    reportrole = "学生";
                                    break;
                                case 4:
                                    reportrole = "家长";
                                    break;
                                default:
                                    reportrole = "未知";
                                    break;
                            }

                            $api.append($api.domAll('.report-block')[$api.domAll('.report-block').length - 1], '<div class="report-content-forward-text aui-margin-b-5"> </div><div class="report-content-forward-exercise aui-margin-b-5"> </div> <div class="aui-padded-t-5 report-content-img" style="margin-right: 5px;"> </div>');
                            $api.domAll('.report-block')[$api.domAll('.report-block').length - 1].id = ret.list[i].ref.id;
                            if (ret.list[i].ref.status == 0) {
                                $api.html($api.dom($api.domAll('.report-block')[$api.domAll('.report-block').length - 1], '.report-content-forward-text'), '内容已被删除');
                                //移除 transpondContent 事件
                            } else {
                                if (ret.list[i].ref.content != '') {
                                    var refContent = ret.list[i].ref.content.replace(/(<\/?a.*?>)|(<\/?span.*?>)/g, "");
                                    switch (ret.list[i].ref.content_type) {
                                        case '':
                                        case 'user':
                                            $api.html($api.dom($api.domAll('.report-block')[$api.domAll('.report-block').length - 1], '.report-content-forward-text'), ret.list[i].ref.content);
                                            break;
                                        case 'course':
                                            $api.html($api.dom($api.domAll('.report-block')[$api.domAll('.report-block').length - 1], '.report-content-forward-text'), '制作了<span class="aui-text-primary" uid="' + ret.list[i].ref.uid + '" tapmode onclick="resourceClick(this,\'course\');" resId="' + ret.list[i].ref.resourceid + '">【课堂资源包】' + refContent + '</span> <br>' + ret.list[i].ref.tag.xkmc + ' ' + ret.list[i].ref.tag.njmc + ' ' + ret.list[i].ref.tag.bbmc + ' ' + ret.list[i].ref.tag.dymc + ' ' + ret.list[i].ref.tag.jmc);
                                            break;
                                        case 'homework':
                                            $api.html($api.dom($api.domAll('.report-block')[$api.domAll('.report-block').length - 1], '.report-content-forward-text'), '布置了<span class="aui-text-primary" uid="' + ret.list[i].ref.uid + '" tapmode onclick="resourceClick(this,\'homework\');" resId="' + ret.list[i].ref.resourceid + '">【作业】' + refContent + '</span> <br>' + ret.list[i].ref.tag.xkmc + ' ' + ret.list[i].ref.tag.njmc);
                                            break;
                                        case 'material':
                                            var fl = ret.list[i].ref.fl == '1' ? '教学设计' : ret.list[i].ref.fl == '2' ? '自主学习单' : ret.list[i].ref.fl == '3' ? '精讲助学' : ret.list[i].ref.fl == '4' ? '影音素材' : ret.list[i].ref.fl == '6' ? '微课': '其他类';
                                            $api.html($api.dom($api.domAll('.report-block')[$api.domAll('.report-block').length - 1], '.report-content-forward-text'), '上传了<span class="aui-text-primary" uid="' + ret.list[i].ref.uid + '" tapmode onclick="resourceClick(this,\'material\');" resId="' + ret.list[i].ref.resourceid + '">【' + fl + '】' + refContent + '</span> <br>' + ret.list[i].ref.tag.xkmc + ' ' + ret.list[i].ref.tag.njmc + ' ' + ret.list[i].ref.tag.bbmc + ' ' + ret.list[i].ref.tag.dymc + ' ' + ret.list[i].ref.tag.jmc);
                                            break;
                                        case 'exercise':
                                            $api.html($api.dom($api.domAll('.report-block')[$api.domAll('.report-block').length - 1], '.report-content-forward-exercise'), '编写了<span class="aui-text-primary" uid="' + ret.list[i].ref.uid + '" tapmode onclick="resourceClick(this,\'exercise\');" resId="' + ret.list[i].ref.resourceid + '">【习题】' + refContent + '</span> <br>' + ret.list[i].ref.tag.xkmc + ' ' + ret.list[i].ref.tag.njmc + ' ' + ret.list[i].ref.tag.bbmc + ' ' + ret.list[i].ref.tag.dymc + ' ' + ret.list[i].ref.tag.jmc);
                                            break;
                                    }
                                }
                                if (ret.list[i].ref.image_list == null) {

                                } else {
                                    if (ret.list[i].ref.image_list.length == 1) {
                                        $api.html($api.domAll('.report-content-img')[$api.domAll('.report-content-img').length - 1], '<img class="img-size1" src="' + ret.list[i].ref.image_list[0] + '?imageMogr2/auto-orient/thumbnail/!65p"/>');
                                    } else if (ret.list[i].ref.image_list.length > 1) {
                                        $api.html($api.domAll('.report-content-img')[$api.domAll('.report-content-img').length - 1], '<div class="img-size4 aui-row aui-row-padded"> </div>');
                                        for (var imageSize1 = 0; imageSize1 < ret.list[i].ref.image_list.length; imageSize1++) {
                                            $api.append($api.domAll('.img-size4')[$api.domAll('.img-size4').length - 1], '<div class="aui-col-xs-4"> <img src="' + ret.list[i].ref.image_list[imageSize1] + '?imageMogr2/auto-orient/thumbnail/!65p" alt=""> </div>');
                                        }
                                    }
                                }
                            }
                            for (var j = 0; j < $api.domAll('.content-img img').length; j++) {
                                $api.css($api.domAll('.content-img img')[j], 'height:' + $api.offset($api.domAll('.content-img img')[j]).w + 'px');
                            }
                            for (var j = 0; j < $api.domAll('.report-content-img img').length; j++) {
                                $api.css($api.domAll('.report-content-img img')[j], 'height:' + $api.offset($api.domAll('.report-content-img img')[j]).w + 'px');
                            }
                            for (var j = 0; j < $api.domAll('.aui-img-round').length; j++) {
                                $api.css($api.domAll('.aui-img-round')[j], 'height:' + $api.offset($api.domAll('.aui-img-round')[j]).w + 'px');
                            }
                        }
                    }
                    p++;
                    totalPage = ret.totalpage;
                    api.addEventListener({
                        name: 'scrolltobottom',
                        extra: {
                            threshold: 100           //设置距离底部多少距离时触发，默认值为0，数字类型
                        }
                    }, function (ret, err) {
                        if (p > totalPage) {
                            api.toast({
                                msg: '已经到底啦，没有更多了',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            isClean = false;
                            getData();
                            api.removeEventListener({
                                name: 'scrolltobottom'
                            });

                        }
                    });
                } }else {
                    api.hideProgress();
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    })
                }
            } else {
                api.hideProgress();
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                })
            }
        })
    }
