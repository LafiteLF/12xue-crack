<script type="text/javascript">
    apiready = function(){
        var header = document.querySelector('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        var systemType = api.systemType; //ios or android
        var json = '';
        var uid = '';
        var token = '';
        if (systemType == 'android') {
            json = JSON.parse(api.appParam);
            uid = json.uid;
            token = json.token;
        } else {
            json = api.pageParam;
            uid = json.uid;
            token = json.token;
        }

        api.addEventListener({
            name: 'viewdisappear'
        }, function (ret, err) {

        });
        
        api.openFrame({
            name: 'frame-message-home',
            url: 'frame-message-home.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false
        });
    };
</script>
