<html><head>    <meta charset="utf-8">    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <meta name="format-detection" content="tephone=no,email=no,date=no,address=no">    <style type="text/css">        body {            display: block;            margin: 0;        }        html {            background-color: white;        }        .video-footer-div {            height: 60px;            background-color: #333333;        }        .video-play-btn {            width: 60px;            height: 60px;            color: #ffffff;            line-height: 60px;            text-align: center;            position: fixed;            bottom: 0;            background-image: url(../image/video/video_f.png);            background-size: 100% 100%;        }        .video-player-div {            height: calc(100% - 60px);            background-color: red;        }        input[type=range] {            -webkit-box-shadow: 0 1px 0 0px rgb(243, 243, 243), 0 1px 0 rgb(210, 210, 226) inset, 0px 2px 10px 0px rgb(152, 152, 152) inset, 1px 0px 2px rgb(204, 204, 204) inset, 0 0px 1px rgba(0, 0, 0, 0.6) inset;            margin-top: 2px;            background: -webkit-linear-gradient(#000, #000) no-repeat, #ddd; /*设置左边颜色为#61bd12，右边颜色为#ddd*/            background-size: 0 100%;            border-radius: 15px;            width: calc(100% - 180px);            -webkit-appearance: none;            height: 10px;            position: absolute;            left: 60px;            bottom: 24px;        }        input[type=range]::-webkit-slider-thumb {            -webkit-appearance: none;            cursor: default;            height: 20px;            width: 20px;            margin-top: 10px;            transform: translateY(-4px);            background: none repeat scroll 0 0 #777;            border-radius: 15px;            -webkit-box-shadow: 0 -1px 1px black inset;        }        .time {            width: 80px;            line-height: 60px;            color: #fff;            position: absolute;            right: 20px        }    </style></head><body><div class="video-div">    <div class="video-header-div">        <div></div>    </div>    <div class="video-player-div">    </div>    <div class="video-footer-div">        <div class="video-play-btn" onclick="play()"></div>        <input id="player" type="range" min="0" value="0"  >        <div class="time">00:00</div>    </div></div></body></html><script type="text/javascript" src="../script/api.js"></script><script type="text/javascript" src="../script/jquery-1.11.3.min.js"></script><script type="text/javascript">    var videoPlayer;    var isstart = 0;    // videoPlayer.pause();    var playdTime = 0;//播放时长    var timer;//计时器    var alltime; //视频总时长    var Percentage;//百分比    apiready = function () {        alltime=api.pageParam.filetime;        $('#player').attr('max',alltime);        videoPlayer = api.require('videoPlayer');        videoPlayer.close();        videoPlayer.open({            rect: {                x: 0,                y: 0,                w: api.frameWidth,                h: api.frameHeight - 60            },            autoPlay: false,            fixedOn: api.frameName,            fixed: true,            path: api.pageParam.path,            coverImg:'widget://image/video_bg.png'        }, function (ret, err) {        });        $('.time').html(getOutTime(playdTime) + '/'+getOutTime(alltime));        api.addEventListener({            name: 'pause'        }, function (ret, err) {            // alert('应用进入后台');            $('.video-play-btn').css('background-image',' url(../image/video/video_f.png)');            isstart == 0;            if (timer) {                clearInterval(timer);            }        });        api.addEventListener({            name: 'resume'        }, function (ret, err) {            // alert('应用回到后台');            isstart = 0;            videoPlayer.seekTo({                seconds: playdTime            });        });        api.addEventListener({            name: 'closeVideo'        }, function (ret, err) {            clearInterval(timer);            videoPlayer.close();            api.closeWin();        });    };    function play() {        if (isstart == 0) {            videoPlayer.start();            isstart = 1;            if (timer) {                clearInterval(timer);            }            timer = setInterval(function () {                playdTime = playdTime + 1;//每秒加一                Percentage = playdTime / alltime * 100;//进度条百分比                var nowtime = getOutTime(playdTime);                $('.time').html(getOutTime(playdTime) + '/' + getOutTime(alltime));                $('.video-play-btn').css('background-image',' url(../image/video/video_b.png)');                if (playdTime > alltime || alltime == 0) {                    isstart = 0;                    videoPlayer.stop();                    playdTime = 0;                    $('#player').val(playdTime);                    $('#player').css('background-size', '0% 100% ');                    clearInterval(timer);                    $('.time').html(getOutTime(playdTime) + '/'+getOutTime(alltime));                    $('.video-play-btn').css('background-image',' url(../image/video/video_f.png)');                } else {                    $('#player').val(playdTime);                    $('#player').css('background-size', Percentage + '% 100% ');                    $('#player').on('change', function () {                        playdTime = parseInt(this.value);                        Percentage = playdTime / alltime * 100;//进度条百分比                        videoPlayer.seekTo({                            seconds: playdTime                        });                        $('.time').html(getOutTime(playdTime) + '/' + getOutTime(alltime));                        $('#player').val(playdTime);                        $('#player').css('background-size', Percentage + '% 100% ');                        // console.log(playdTime)                    })                }            }, 1000);        } else {            videoPlayer.pause();            $('.video-play-btn').css('background-image',' url(../image/video/video_f.png)');            isstart = 0;            clearInterval(timer);        }    }    function getOutTime(intime) {        var outTime = '';        if (intime < 9) {            outTime = '00:0' + intime;        } else if (intime < 59) {            outTime = '00:' + intime;        } else {            var min = parseInt(intime / 60);            var sec = intime % 60;            if (sec < 9) {                if (min > 0 && min < 10) {                    outTime = '0' + min + ':0' + sec;                } else if (min >= 10) {                    outTime = min + ':0' + sec;                } else {                    outTime = '00:0' + sec;                }            } else {                if (min > 0 && min < 10) {                    outTime = '0' + min + ':' + sec;                } else if (min >= 10) {                    outTime = min + ':' + sec;                } else {                    outTime = '00:' + sec;                }            }        }        return outTime;    }</script>
