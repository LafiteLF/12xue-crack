<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title></title><style></style></head><body></body><script type="text/javascript" src="../script/api.js"></script><script type="text/javascript" src="../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../script/12XueApi_Router.js"></script><script type="text/javascript" src="../script/jquery-1.11.3.min.js"></script><script>    var ijkplayer;    var videoPlayer;    var title;    var index = 2;    apiready = function () {        if (api.pageParam.title) {            title = api.pageParam.title;        } else {            title = '';        }        ijkplayer = api.require('ijkplayer');        ijkplayer.open({            rect: {                x: 0,                y: 0,                w: api.frameWidth,                h: api.frameHeight            },            path: api.pageParam.path,            autoPlay: true,            coverImg:'widget://image/video/video_k.png',            isAutorotate: false,            enableFull: false,            isBackBtn: true,            isSmallOpenGesture: true,            isFullBtn: false,            fixedOn: 'frame_video_view',            fixed: true,            texts: {                head: {                    title: title                }            },            styles: {                repeat:{                    repeatwidth: 40,                    repeatheight: 40,                    repeatImg:''                },                head: {                    bg: 'rgba(0.5,0.5,0.5,0.7)',                    height: 44,                    titleSize: 18,                    titleColor: '#fff',                    backSize: 44,                    backImg: 'widget://image/video/video_d.png',                    hide: false,                    customButtons:[                        {                            w:64,                            h:64,                            rightMagin:12,                            img:'widget://image/video/video_speed.png',                            imgSelected:'widget://image/video/video_speed.png',                        }]                },                foot: {                    bg: 'rgba(0.5,0.5,0.5,0.7)',                    height: 44,                    playSize: 44,                    playImg: 'widget://image/video/video_f.png',                    pauseImg: 'widget://image/video/video_b.png',                    timeSize: 14,                    timeColor: '#fff',                    sliderImg: 'fs://img/slder.png',                    progressColor: '#696969',                    progressSelected: '#76EE00',                    hide:false,                    verticalImg:'widget://image/video/video_l.png',                    horizontalImg:'widget://image/video/video_l.png'                }            }        });        ijkplayer.addEventListener({            name: 'gesture'        }, function (ret, err) {            if (ret.eventType == 'gestureTap') {                api.sendEvent({                    name: 'closespeed',                    extra: {}                });            }        });        ijkplayer.addEventListener({            name: 'click'        }, function(ret, err) {            if (ret) {                if (ret.eventType == 'clickBack') {                    keyback();                }                if (ret.eventType == 'clickOne') {//'clickOne' : 点击第一个自定义按钮事件（正常状态下点击）                    api.openFrame({                        name: 'frame-speed',                        url: 'frame-speed.html',                        rect: {                            x: api.winWidth - 200,                            y: 50,                            w: 200,                            h: api.winHeight - 50                        },                        pageParam: {                            index: index                        },                        bounces: false                    });                }                if (ret.eventType == 'clickOneSelected') {//'clickOneSelected' : 点击第一个自定义按钮事件（选中状态下点击）                    api.sendEvent({                        name: 'closespeed',                        extra: {}                    });                    api.openFrame({                        name: 'frame-speed',                        url: 'frame-speed.html',                        rect: {                            x: api.winWidth - 200,                            y: 50,                            w: 200,                            h: api.winHeight - 50                        },                        pageParam: {                            index: index                        },                        bounces: false                    });                }            }        });        api.addEventListener({            name: 'closeVideo'        }, function (ret, err) {            keyback();        });        api.addEventListener({            name: 'speed'        }, function (ret, err) {            index = ret.value.index;            var speed;            if(index == 0){                speed = 0.5;            }            else if(index == 1){                speed = 0.75;            }            else if(index == 2){                speed = 1.0;            }            else if(index == 3){                speed = 1.25;            }            else if(index == 4){                speed = 1.5;            }else {                speed = 1.9;            }            ijkplayer.setSpeed({                speed: speed            },function(ret) {                if (ret) {                }            });        });    };    function keyback() {        ijkplayer.close();        api.sendEvent({            name: 'backVideo'        });        api.closeWin();    }</script></html>
