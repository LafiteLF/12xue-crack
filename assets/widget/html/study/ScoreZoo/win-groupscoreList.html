<script type="text/javascript">
    apiready = function(){
        var header = $api.dom('header');
        //$api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        var getGroupData = api.pageParam.groupData;
        api.openFrame({
            name: 'frame-groupscoreList',
            url: 'frame-groupscoreList.html',
            bounces: false,
            vScrollBarEnabled: false,
            rect: {
                x: 0,
                y: headerH ,
                w: 'auto',
                h: frameH
            },
            pageParam:{GroupData:getGroupData}
        });
    };
</script>
