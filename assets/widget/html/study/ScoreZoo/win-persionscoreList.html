<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><meta name="format-detection" content="telephone=no"/>
    <meta name="viewport" content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        body{

        }
        /*自定义title*/
        .aui-bar-nav .aui-12xue-title {
            min-height: 2.25rem;
            position: absolute;
            margin: 0;
            text-align: left;
            white-space: nowrap;
            right: 10rem;
            left: 2rem;
            width: auto;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }
        .xljt{
            display: block;
            width: 0px;
            height: 0px;
            border-top: 8px solid #4bc7c7;
            border-left: 8px solid rgba(75, 199, 199, 0);
            border-right: 8px solid rgba(75, 199, 199, 0);
            border-bottom: 8px solid rgba(75, 199, 199, 0);
            margin-right: 15px;
            margin-top: 25px;
        }
    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">
        <span class="aui-iconfont aui-icon-left" tapmode onclick="api.closeWin();"></span>个人总分乐园
    </a>
    <span class=" xljt" style="float: right;" tapmode onclick="openStuClassList()"></span>
    <span class="type aui-ellipsis-1 stu-frist-class" style="float: right; font-size: 0.7rem; color: #999 ; max-width: 8rem; padding-right: 5px" tapmode
          onclick="openStuClassList()"></span>
</header>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiready = function(){
        apiObj.SetAuthToken($api.getStorage('token'));
        var header = $api.dom('header');
        //$api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });

        getGroupScoreData();
    };
    function getGroupScoreData(index) {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        apiObj.Get(UrlRouter.GetClassInfoByStu, {
            values: {
                uid: $api.getStorage('uid')
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {
                    if(ret.data.length==1){
                        $('.xljt').hide();
                        isclick=false;
                        $('.stu-frist-class').css('padding-right','15px')
                    }else{
                        isclick=true;
                    }
                    $api.text($api.dom('.stu-frist-class'), '' + ret.data[0].bjmc + '');
                    stuClassArr = ret.data;
                    var header = $api.dom('header');
                    var headerH = $api.offset(header).h;
                    var frameH = padWinHeight - headerH;
                    api.openFrame({
                        name: 'frame-persionscoreList',
                        url: 'frame-persionscoreList.html',
                        bounces: false,
                        vScrollBarEnabled: false,
                        rect: {
                            x: 0,
                            y: headerH,
                            w: 'auto',
                            h: frameH
                        },
                        pageParam: {
                            bjid: ret.data[0].bjid
//                            schoolid: ret.data[0].schoolid
                        }
                    })

                } else {
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            } else {
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }
        })
    }
    function openStuClassList() {
        if(isclick==true){
        var frameH = padWinHeight;
        api.openFrame({
            name: 'frame-stu-classList',
            url: 'frame-stu-classList.html',
            rect: {
                x: 0,
                y: 0,
                w: 'auto',
                h: frameH
            },
            pageParam: {stuClassArr: stuClassArr,type:'zoo'},
        });}
    }
</script>
</html>
