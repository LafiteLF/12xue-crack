        }

        }

            text-align: center;
            margin-right: 10px;
        }

        }

            margin: 0 20px;

            padding-top: 0.5rem;

            margin-bottom: 0.2rem;
        }

        .imageDiv {
            margin-left: 1%;

            margin-bottom: 1%;

        }

        .imageDiv img:nth-of-type(1) {

    var seconds; //录音时间

    function gtouchstart() {
        timeOutEvent = setTimeout("longPress()", 800);

    }

    function gtouchend() {
        clearTimeout(timeOutEvent);

        if (timeOutEvent != 0) {
//            alert("你这是点击，不是长按");
        }
        return false;
    }

    //录音
    function selectVoice() {
        if (!checkPermission(['microphone'])) {
            return;
        }
        api.openFrame({
            name: 'frame-record',
            url: 'frame-record.html'
        });
    }

    function openPic(context) {
        var index = -1;
        var url = $api.attr(context, 'src');
        //计算索引 不能用id作为索引
        for (var i = 0; i < vm.daArr.length; i++) {
            if (url == vm.daArr[i]) {
                index = i;
            }
        }
        api.execScript({
            script: "isOpenPic=true;"
        });
        photoBrowser.open({
            images: vm.daArr,
            placeholderImg: 'widget://../image/loading_more.gif',
            bgColor: '#000000',
            activeIndex: index
        }, function (ret, err) {
            if (ret.eventType == 'click') {
                api.execScript({
                    script: "isOpenPic=true;"
                });
                photoBrowser.close();
            }
        });
    }

    function gtouchmove(event) {
        clearTimeout(timeOutEvent);
        //清除定时器
        timeOutEvent = 0;
        $api.css($api.dom('.yuyindiv'), 'background-color: #f2f2f2;');
        api.sendEvent({
            name: 'closeYuYinFrame',
            extra: {key1: 'value', key2: 'value'}
        });
    }
    //真正长按后应该执行的内容
    function longPress() {

        timeOutEvent = 0;
        if (vm.hasAudio) {

            api.confirm({
                title: '确定要删除该语音吗？',
                buttons: ["确定", "取消"]

                    $api.css($api.dom(".display-voice"), 'display:none;');
                    vm.hasAudio = false;
                    api.stopPlay();

            });

//            api.openFrame({

        vm.miaoshu = api.pageParam.resdesc;

                return;

            vm.seconds = ret.value.seconds;

//        hammer.on("pressup", function (ev) {

//                name: 'stopRecordForTiWen',

//        });

        });

    // 播放音频
    var isPalying = false;// 是否正在播放
    function palyAudio(context) {
        if (isPalying) {
            api.stopPlay();
            $(context).find('.yitu').html('<img src="../../../image/yuyin1.png" width="15px">');
        } else {
            api.startPlay({
                path: api.fsDir + path
            }, function (ret, err) {
                if (ret) {
                    isPalying = false;
                    $(context).find('.yitu').html('<img src="../../../image/yuyin1.png" width="15px">');
                }
            });
            $(context).find('.yitu').html('<img src="../../../image/yuyin2.gif" width="15px">');
        }
        isPalying = !isPalying;
    }

    //选择答题方式
    function selectAnswerPad(type) {

        if (!checkPermission(['camera'])) {
            return;
        }

        if (vm.daArr.length >= 3) {
            api.toast({
                msg: "最多可选3张图片",
                duration: 2000,
                location: 'bottom'
            });
            return;
        }
        if (type == 'camera') {
            api.getPicture({
                sourceType: 'camera',
                encodingType: 'jpg',
                mediaValue: 'pic',
                destinationType: 'url',
                //targetWidth: 100,
                //targetHeight: 100,
                quality: 50
            }, function (ret, err) {
                if (ret) {
                    if (ret.data.length > 5) {
                        vm.isTxt = false;
                        vm.daArr.push(ret.data);
                    }
                } else {

                }
            });
        } else if (type == 'photo') {
            var imgAccountMax = 3 - vm.daArr.length;// 还可以选择图片数量的最大值
            openMediaScanner(imgAccountMax);

        }
    }

    // 选择相册图片 可多选
    function openMediaScanner(max) {
        if (!uiMediaScanner) {
            uiMediaScanner = api.require('UIMediaScanner');
        }
        uiMediaScanner.open({
            type: 'picture',
            column: 4,
            classify: true,
            max: max ? max : 5,
            sort: {
                key: 'time',
                order: 'desc'
            },
            texts: {
                stateText: '已选*项',
                cancelText: '取消',
                finishText: '完成'
            },
            rotation: true,
            styles: {
                bg: '#fff',
                mark: {
                    icon: '',
                    position: 'bottom_left',
                    size: 20
                },
                nav: {
                    bg: '#4bc7c7',
                    stateColor: '#fff',
                    stateSize: 18,
                    cancelBg: 'rgba(0,0,0,0)',
                    cancelColor: '#fff',
                    cancelSize: 18,
                    finishBg: 'rgba(0,0,0,0)',
                    finishColor: '#fff',
                    finishSize: 18
                }
            }
        }, function (ret) {
            if (ret) {
                if (!ret.list) {
                    return
                }
                ;
                compressListener.successCount = 0;
                compressListener.allCount = ret.list.length;
                for (var i = 0; i < ret.list.length; i++) {
                    var selectImg = ret.list[i];
                    // 获取图片的路径
                    var selectimgPath = selectImg.path;
                    var selectimgThumbPath = selectImg.thumbPath;
                    if (api.systemType == "ios") {
                        uiMediaScanner.transPath({
                            path: selectimgPath
                        }, function (ret, err) {
                            if (ret) {
                                compressImage(ret.path);
                            } else {
                                alert("ios地址转换失败：" + JSON.stringify(err));
                            }
                        });
                    } else {
                        compressImage(selectimgPath);
                    }
                }
                console.log(JSON.stringify(ret));
            } else {
                alert("图片选择器打开失败");
            }
        });
    }

    // 图片压缩处理
    function compressImage(url) {
        var imageFilter = api.require('imageFilter');
        var index = url.lastIndexOf("/");
        var imgName = url.substring(index + 1, url.lastIndexOf("."));
        //获取图片大小
        // 单位：Byte
        imageFilter.getAttr({
            path: url
        }, function (ret, err) {
            if (ret.size > 5242880) {//图片文件大于5M
                api.toast({
                    msg: '图片文件不能大于5MB~',
                    duration: 2000,
                    location: 'bottom'
                });
                compressListener.allCount--;
            } else {
                var quality;
                if (api.systemType == 'ios') {
                    quality = 0.2;
                } else {
                    quality = 0.6;
                }
                imageFilter.compress({
                    img: url,
                    quality: quality,
                    save: {
                        imgPath: "fs://img_compress/",
                        imgName: imgName + ".jpg"
                    }
                }, function (ret, err) {
                    console.log("compress result : ret=" + JSON.stringify(ret) + "  err:" + JSON.stringify(err));
                    if (ret.status) {
                        compressListener.successCount++;
                        vm.daArr.push(api.fsDir + "/img_compress/" + imgName + ".jpg");
                    } else {
                        alert("图片压缩失败" + JSON.stringify(err));
                    }
                    imageFilter = '';
                });
            }
        });
    }

    //删除图片答案
    function deletePic(context) {
        var li = $api.closest(context, "div");
        var lis = $api.domAll(".daanImgDiv");
        var index = -1;
        for (var i = 0; i < lis.length; i++) {
            if (li == lis[i]) {
                index = i;
                break;
            }
        }

        vm.daArr.splice(index, 1);//删除数据指定索引位置的url
    }

            });
            return;
        }
        api.getPicture({
            sourceType: 'camera',
            encodingType: 'jpg',
            mediaValue: 'pic',
            destinationType: 'url',
            quality: 50
        }, function (ret, err) {
            if (ret) {
                if (ret.data.length > 5) {
                    vm.isTxt = false;
                    vm.daArr.push(ret.data);
                }
            } else {

            }
        });
        //2022/6/22 移除从相册选择
        // api.openFrame({
        //     name: 'frame-tiwen-select-pad',
        //     url: 'frame-tiwen-select-pad.html',
        //     rect: {
        //         x: 0,

        //         w: 'auto',
        //         h: api.winHeight

    }

    //点击对号
    function reply() {
        var replyTxt = clear_emoji($api.val($api.dom("#content-text")));
        if (!checkImageCompress()) {
            return;
        }

        if ((replyTxt == "" || replyTxt == null) && vm.daArr.length == 0 && !vm.hasAudio) {
            api.toast({
                msg: '请先输入文字内容',
                duration: 2000,
                location: 'bottom'
            });
        } else {
            api.showProgress({
                title: '加载中',
                text: '请稍后...',
                modal: true
            });
            if (vm.daArr && vm.daArr.length > 0) {
                pImageList = [];
                qiniuUpfile(0);
            } else {
                if (vm.hasAudio) {
                    // 无图片 有声音
                    qiniuUpSound();
                } else {

            }

    //网络请求
    function postReply() {
        var content = clear_emoji($api.val($api.dom(".content textarea")));
        var params = {};
        if (pImageList && pImageList != undefined && pImageList.length > 0) {
            for (var i = 0; i < pImageList.length; i++) {
                params["imagelist[" + i + "]"] = pImageList[i];
            }
        }
        if (pAudio && pAudio != "") {
            params["audiolist"] = '{"url":"' + pAudio + '","duration":' + vm.seconds + '}';
        }


        params["zyid"] = api.pageParam.zyid;
        params["classid"] = api.pageParam.classid;
        params["content"] = content;
        params["tuid"] = api.pageParam.tuid;
        params["restype"] = api.pageParam.restype;
        params["restitle"] = api.pageParam.restitle;
        params["resdesc"] = api.pageParam.resdesc;
        params["resdescript"] = api.pageParam.resdescript;
        params["resid"] = api.pageParam.resid;
        params["fromuid"] = $api.getStorage("uid");
//        alert(pImageList + "-----params=" + JSON.stringify(params));
        apiObj.Post(UrlRouter.PostHomeworkQuestion, {
            values: params
        }, function (ret, err) {
            if (ret && ret.ret == 0) {
                //发布成功 关掉win  刷新首页动态
                api.sendEvent({
                    name: 'finishReply'
                });
                api.hideProgress();
                api.closeWin();
            } else {
                var msg = '';
                if (ret) {
                    msg = ret.msg;
                } else {
                    msg = err;
                }
                api.hideProgress();
                api.toast({
                    msg: msg,
                    duration: 2000,
                    location: 'bottom'
                });
            }
        })

    }

    function qiniuUpSound() {

                        }
//            } else {
//                api.hideProgress();
//                api.toast({

//                    duration: 2000,

//                });
                    });
                } else {
                    api.hideProgress();

                    api.toast({
                        msg: ret.msg,

                }

            } else {

                api.toast({

            api.toast({
                msg: '正在压缩图片，请稍后操作',
                duration: 2000,

            });

    function getUrlName(url) {
        var index = url.lastIndexOf("/");
        var imgName;
        if (api.systemType == 'ios') {
            var idIndex = url.indexOf("id=");
            if (idIndex != -1) {
                var idStr = url.substr(idIndex);
                var andIndex = url.indexOf("&");
                imgName = url.substring(idIndex + 3, andIndex);
            } else {
                imgName = url.substring(index + 1);
            }
        } else {
            imgName = url.substring(index + 1);
        }
        return imgName;
    }
