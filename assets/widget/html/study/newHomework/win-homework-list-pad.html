<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>作业列表</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width: auto;            max-width: calc(30% - 30px)        }        * {            margin: 0;            padding: 0;        }        body {            background-color: #e5e5e5        }        a {            display: inline-block;            float: left        }        span b {            color: #333333 !important;            font-weight: normal;            font-size: 0.8rem        }        span {            float: right;            padding-right: 20px;        }        .chapter {            display: block;            color: #00c8c8 !important;            margin-right: 20px;            background: url("../../../image/stuHomePad/xljt.jpg") no-repeat right 15px center;            background-size: 10px;            line-height: 30px;            margin-top: 9px;            font-size: 1.6rem;            max-width: 30%;            border: 1px solid #00c8c8;            border-radius: 25px;            padding: 0px 30px 0px 15px;        }        .unit {            color: #00c8c8 !important;            margin-right: 20px;            background: url("../../../image/stuHomePad/xljt.jpg") no-repeat right 15px center;            background-size: 10px;            font-size: 1.6rem;            max-width: 20%;            line-height: 30px;            margin-top: 9px;            border: 1px solid #00c8c8;            border-radius: 25px;            text-align: center;            padding: 0px 30px 0px 15px;            display: block;        }    </style></head><body><header class="clearfix wincontent">    <div onclick=" closeWin();" class="winTitle pull_left">        作业    </div>    <span class="chapter overflow" tapmode onclick="vm.choosechapter()" v-text="selectdy.name"></span>    <span class="unit overflow" tapmode onclick="vm.chooseUnit()" v-text="selectgrade.name+' '+selectsxc.name"></span></header></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    apiready = function () {        vm.getCourseListNew();        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            closeWin();        });        api.addEventListener({            name: 'chooseunit'        }, function (ret, err) {            vm.selectgrade=ret.value.selectgrade;            vm.selectsxc=ret.value.selectsxc;            vm.selectdy={'id':0,'name':'全部单元'};        });        api.addEventListener({            name: 'chooseDy'        }, function (ret, err) {            vm.selectdy=ret.value.selectdy;        });    };    var vm = new Vue({        el: '.wincontent',        data: {            data:[],            grade:[],            selectgrade:{},            selectsxc:{},            selectdy:{'id':0,'name':'全部单元'}        },        methods: {            openframe:function(){                var header = document.querySelector('header');//        //$api.fixStatusBar(header);                var headerH = $api.offset(header).h;                var frameH = padWinHeight - headerH;                api.setStatusBarStyle({                    style: 'light'                });                var title = api.pageParam.subjectname + '作业';                $api.html($api.dom('.winTitle'), title);                api.openFrame({                    name: 'frame-homework-list-pad',                    url: 'frame-homework-list-pad.html',                    rect: {                        x: 0,                        y: headerH + 1,                        w: api.winWidth,                        h: frameH - 1                    },                    bounces: false,                    pageParam: {                        xkid: api.pageParam.xkid,                        classid: api.pageParam.classid,                        xkname: api.pageParam.subjectname,                        selectgrade:vm.selectgrade,                        selectsxc:vm.selectsxc,                        selectdy:vm.selectdy                    }                });            },            getCourseListNew: function () {                var params = {};                var classid = api.pageParam.classid;                for (var i = 0; i < classid.length; i++) {                    params["classid[" + i + "]"] = classid[i];                }                params['uid'] = $api.getStorage('uid');                params['xkid'] = api.pageParam.xkid;                apiObj.Get(UrlRouter.GetHomeworkHomeworkchapt, {                    values: params                }, function (ret, err) {                    if (ret) {                        if (ret.ret == 0 && ret.data.length > 0) {                            vm.data=ret.data[0].data;                            vm.grade=ret.data[0].grade;                            vm.selectgrade={'id':ret.data[0].near.njid,'name':ret.data[0].near.njname};                            for(var i=0;i<vm.grade.length;i++){                                if(vm.grade[i].id==vm.selectgrade.id){                                    var sxclist=vm.grade[i].data;                                    for(var j=0;j<sxclist.length;j++){                                        if(sxclist[j].id==ret.data[0].near.sxcid){                                            vm.selectsxc=sxclist[j];                                        }                                    }                                }                            }                            // vm.selectsxc={'id':ret.data[0].near.sxcid,'name':ret.data[0].near.sxcname};                            vm.openframe();                        } else {                            $api.css($api.dom('.unit'), 'display:none');                            $api.css($api.dom('.chapter'), 'display:none');                            $api.css($api.dom('.kong'), 'display:block');                        }                    } else {                        api.toast({                            msg: err.msg,                            duration: 2000,                            location: 'bottom'                        });                    }                });            },            chooseUnit: function () {                api.openFrame({                    name: 'choose-list',                    url: 'choose-list-new.html',                    rect: {                        x: 0,                        y: 0,                        w: 'auto',                        h: padWinHeight                    },                    pageParam: {                        data:vm.data,                        grade:vm.grade,                        selectgrade:vm.selectgrade,                        selectsxc:vm.selectsxc,                        selectdy:vm.selectdy                    }                })            },            choosechapter: function () {                api.openFrame({                    name: 'chapter-list',                    url: 'chapter-list-new.html',                    rect: {                        x: 0,                        y: 0,                        w: 'auto',                        h: padWinHeight                    },                    pageParam: {                        data:vm.data,                        grade:vm.grade,                        selectgrade:vm.selectgrade,                        selectsxc:vm.selectsxc,                        selectdy:vm.selectdy                    }                })            }        }    });    function closeWin() {        api.sendEvent({            name: 'reloadSubjectList',            extra: {key1: 'value', key2: 'value'}        });        api.closeWin();    }</script></html>
