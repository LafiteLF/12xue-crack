<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>实验与探究</title>
    <link rel="stylesheet" type="text/css" href="../../../../css/publicCss.css"/>
    <link rel="stylesheet" type="text/css" href="../../../../css/frameDetail.css"/>
    <style>
        .tkt_content {
            display: none
        }

        .tkt_auto input {
            width: calc(100% - 95px);
        }
    </style>
</head>

<body>
<div class="kong_bg">
    <div class="cxjz">
        <div class="cxjztop clearfix">
            <img src="../../../../image/newhomework/cxjz.png">
            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>
        </div>
        <div class="cxjz_button" onclick="cxjz()">重新加载</div>
    </div>
</div>
<div class="tkt_content" id="tkt_content">
    <img v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2 && aiCorrect == 1"
         class="Aipyicon noImgClick" src="../../../../image/newhomework/Aipyicon.png" @click="openaiCorrect()">
    <img v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2"
         class="aibtn noImgClick" src="../../../../image/newhomework/aiBtn.png" @click="PostAIBtn()">
    <img v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2"
         class="jrctb noImgClick"
         :src="isctb!=1?'../../../../image/newhomework/join.png':'../../../../image/newhomework/out.png'"
         @click="PostExercisesTriggerWrong()">
    <div class="tkt_top">
        <ul>
            <li class="tixing clearfix">
                <div class="tihao" v-text="(index+1)+'.'"></div>
                <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>
            </li>
            <li v-if="data.sys_id!= undefined || data.sys_id" class="zsd" @click="alertzsd(data.zsdmc)">
                <span>难易度：</span><img class="noImgClick"
                                         :src="data.nyd==1?'../../../../image/newhomework/1xing.png':data.nyd==2?'../../../../image/newhomework/2xing.png':data.nyd==3?'../../../../image/newhomework/3xing.png':''"><span>
                        知识点：</span>{{ data.zsdmc }}
            </li>
        </ul>
    </div>
    <div class="tkt_left" id="left" style="width: calc(60% - 53px);">
        <div class="tg_content font666" v-html="data.tg"></div>
    </div>
    <div class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">
        <div class="tkt_right_content">
            <div :style="!isShowAnswer && (data.sys_id!= undefined || data.sys_id)?'display:block':'display:none'"
                 class="tishi2 overflow"><img src="../../../../image/newhomework/ts.png">未到正确答案显示时间，只展示学生答案哦~
            </div>
            <div class="huakuai" id="huakuai"></div>
            <span v-if="isShowAnswer && (data.sys_id!= undefined || data.sys_id)" class="zongfen">
                    <span v-if="data.is_true!=0 " v-html="'本题正确率<em>'+data.accuracy+'%</em>'"></span>
                    <span v-if="data.is_true==0" style="color: #ff778c">待批</span>
                </span>
            <span class="wxtk_xiaoti"
                  :style="!isShowAnswer && (data.sys_id!= undefined || data.sys_id)?'top:33px':''"
                  v-text="'共'+xiaotinum+'小题'"></span>
            <ul class="wxtk_content">
                <li v-for="(list,index) in data.children">
                    <!--答题部分开始-->
                    <div :class="!(data.sys_id!= undefined || data.sys_id)?'wxtk_tg':'xiaotifenge wxtk_tg'"
                         v-html="'('+(index+1)+')'+list.tg" :id="'xt'+index"></div>
                    <!--作图题图片题干-->
                    <ul v-if="list.is_auto==0 && list.datatype==2 " class="zttimg clearfix">
                        <li v-for="(item ,index2) in list.attachments">
                            <img :src="item.serverpath+item.savename">
                            <p v-text="index2+1"></p>
                        </li>
                    </ul>
                    <!--手动批阅答题方式-->
                    <div v-if="list.is_auto==0 && !(data.sys_id!= undefined || data.sys_id)">
                            <textarea
                                    v-if='answer[index].is_unable==0  && answer[index].is_txt==1 && is_show_textarea[index]==1'
                                    :id="index" class="sytjextarea" placeholder="请输入要填写的答案" cols="30" rows="10"
                                    maxlength="500" :value="answer[index].da.length==0?'':answer[index].da[0].descript"
                                    oninput="vm.shoudongpiyue(this);"></textarea>
                        <ul class="sytj_kongimg clearfix"
                            v-if='answer[index].is_unable==0 && answer[index].is_txt!=1'>
                            <li class="tkt_img" v-for="(imglist,imgindex) in answer[index].da"
                                v-if="answer[index].da[imgindex]">
                                <img class="noImgClick" :id="imgindex" :topid="index" onclick="showImage(this)"
                                     v-if="imglist.is_txt==0"
                                     :src="imglist.serverpath+imglist.savename+'?imageView2/2/w/300/h/300'"
                                     :fdsrc="imglist.serverpath+imglist.savename">
                                <img class="noImgClick" v-if="imglist.is_txt!=0"
                                     :url="imglist.serverpath+imglist.savename" tapmode
                                     onclick="vm.videoZYPlay(this)" src="../../../../image/newhomework/shipin.jpg">
                                <div tapmode onclick="vm.deletePic(this);" :id="imgindex" :topid="index"
                                     class="chacha">
                                    <img class="noImgClick" src="../../../../image/newhomework/cha.png">
                                </div>
                            </li>
                        </ul>
                        <div class="wdAnswerType">
                            <ul>
                                <li class="openAnserType" :id="index" :type="list.datatype" tapmode
                                    onclick="vm.choose(this)"></li>
                                <!--<li class="bhz font4BC7C7" :id="index" tapmode onclick="vm.sdchecded(this)">-->
                                <!--<span :class="answer[index].is_unable==1?'inputCheckactive':''"></span>不会做-->
                                <!--</li>-->
                            </ul>
                        </div>
                    </div>
                    <!--自动批阅答题方式-->
                    <dl v-if="list.is_auto==1 && !(data.sys_id!= undefined || data.sys_id)" class="sytjda_content">
                        <dd class="clearfix tkt_auto" v-for="(item,itemindex) in list.options">
                            <span class="kong_list" v-text="'空'+(itemindex+1)+'：'"></span>
                            <input type="text" :value="answer[index].da[itemindex].descript" :id="index"
                                   :itemid="itemindex" oninput="vm.shoudongpiyue(this);">
                            <!--<div class="tktbhz font4BC7C7" :id="index" :itemid="itemindex" tapmode-->
                            <!--onclick="vm.checded(this)">-->
                            <!--<span :class="answer[index].da[itemindex].is_unable==1?'inputCheckactive':''"></span>不会做-->
                            <!--</div>-->
                        </dd>
                    </dl>

                    <!--答题部分结束-->
                    <!--答案部分开始-->
                    <dl v-if="data.sys_id!= undefined || data.sys_id" class="wxtk_answer bgFFF">
                        <dd class="wxtk_myanswer">
                            <div v-if="isShowAnswer" class="wxtkdefen">
                                <img class="noImgClick" v-if="list.is_true!=0"
                                     :src="list.is_true==1?' ../../../../image/newhomework/zhengque.png':list.is_true==2?'../../../../image/newhomework/cuowu.png':list.is_true==3?'../../../../image/newhomework/bandui.png':''">
                                <span
                                        :style="list.is_true==1?'color: #4bc7c7':list.is_true==2?'color: #df7605':list.is_true==3?'color: #ffcd06':''"
                                        v-text="list.is_true==1?'正确':list.is_true==2?'错误':list.is_true==3?'正确率'+list.accuracy+'%':''"></span>
                                <span v-if="list.is_true==0" style="color: #ff778c">待批</span>
                            </div>
                            <!--自动批阅正确答案-->
                            <div v-if="list.is_auto==1" class="sytj_auto" :style="itemindex==0?'margin-top: 0px':''"
                                 v-for="(item,itemindex) in list.xsdaobj">
                                <div class="sytj_kong_list" v-text="'空'+(itemindex+1)+'：'"></div>
                                <div v-if="isShowAnswer" class="sytj_kong_defen">
                                    <img class="noImgClick"
                                         :src="item.is_true==1?' ../../../../image/newhomework/zhengque.png':item.is_true==2?'../../../../image/newhomework/cuowu.png':''">
                                </div>
                                <div class="sytj_auto_kong">
                                    <h4>【我的答案】</h4>
                                    <p v-html="item.is_unable==1?'不会做':item.descript"></p>
                                    <h4 v-if="isShowAnswer" v-text="'【'+material.tx_tip+'】'"></h4>
                                    <p v-if="isShowAnswer"
                                       v-html="list.daoptions[itemindex].description==''?'无':tihuan(list.daoptions[itemindex].description_rep)">
                                    </p>
                                </div>
                            </div>
                            <!--非自动批阅正确答案-->
                            <h2 v-if="list.is_auto==0">【我的答案】</h2>
                            <ul v-if="list.is_auto==0" class="sytj_kongimg clearfix">
                                <li class="tkt_img" v-for="item in list.xsdaobj"
                                    :class="item.is_txt==1?'sytjdazi':'tkt_img'">
                                    <p if="item.is_txt==1||item.is_txt==0"
                                       v-html="list.is_unable==1?'不会做':list.is_unable==0 && item.is_txt==0?item.thumbnail:item.descript">
                                    </p>
                                    <p v-if="item.is_txt==3">
                                        <img class="noImgClick" src="../../../../image/newhomework/shipin.jpg"
                                             :url="item.serverpath+item.savename" :filetime="item.filetime" tapmode
                                             onclick="vm.videoZYPlay(this)">
                                    </p>
                                </li>
                            </ul>
                        </dd>
                        <!--非自动批阅正确答案-->
                        <dd v-if="list.is_auto==0" :style="isShowAnswer?'display:block':'display:none'">
                            <h2 v-text="'【'+material.tx_tip+'】'"></h2>
                            <ul>
                                <li class="wxtkzi" v-html="list.dastr==''?'无':list.dastr"></li>
                            </ul>
                        </dd>
                        <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">
                            <h2>【答案解析】</h2>
                            <ul>
                                <li class="wxtkzi" v-html="list.dajx==''?'无':list.dajx"></li>
                            </ul>
                        </dd>
                    </dl>
                    <!--答案部分开始-->
                </li>
            </ul>
            <div v-if="!(data.sys_id!= undefined || data.sys_id)" class="tijiao"
                 @click.stop="PostV2exercisesAnswer()">提交
            </div>
            <dl v-if="data.sys_id!= undefined || data.sys_id" class="wxtk_dajx"
                :style="isShowAnswer?'display:block':'display:none'">
                <dd v-if="data.audio && data.audio.length>0">
                    <h2 class="tktjxh2">【老师留言】</h2>
                    <ul class="clearfix">
                        <li :class="ylist.type==1?'teacher_liuyan yuyin3':'teacher_liuyan_zi yuyin3'"
                            v-for="(ylist , index) in data.audio" @click="yuyin(ylist,index)">
                            <img v-if="ylist.type==1" class="audio-img img1 noImgClick"
                                 src="../../../../image/newhomework/yuyin1.png"/>
                            <img v-if="ylist.type==1" class="audio-img img2 noImgClick"
                                 src="../../../../image/newhomework/yuyin2.gif"/>
                            <span v-if="ylist.type==1" v-text="ylist.filetime+'″'"></span>
                            <p v-if="ylist.type==2" v-text="ylist.descript"></p>
                        </li>
                    </ul>
                </dd>
            </dl>
            <!--答案部分结束-->
            <div class="jrctbkong"></div>
        </div>
    </div>
</div>
<canvas id="canvas" style="display: none"></canvas>
</body>
<script type="text/javascript" src="../../../../script/api.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../../script/vue.js"></script>
<script type="text/javascript" src="../../../../script/html2canvas.js"></script>
<script type="text/javascript" src="../../../../script/ThridJS/qiniu.min.js"></script>
<script type="text/javascript" src="../../../../script/12xueUpload.js"></script>
<!--<script type="text/javascript" src="../../../../script/common.js"></script>-->
<!--<script type="text/javascript" src="../../../../script/fastclick.js"></script>-->
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    var ctx;//文字生成图片参数
    var canvas;//文字生成图片参数
    var strNum;//文字生成图片参数
    var imageName = 'check_' + new Date().getTime();//文字生成图片参数
    var uiMediaScanner;//打开相册需要的变量
    var compressListener = {//打开相册需要的变量
        allCount: 0,
        successCount: 0
    };
    var moduleDialog = null;//弹窗模块bhzparam
    var imgindex = 0;
    var moduleImageScale = null;//图片放大旋转删除
    var video_url;//保存录制的视频地址 用于重新上传视频
    var reupload_index;//
    windowError();
    apiready = function () {
        moduleDialog = api.require('moduleDialog');
        moduleImageScale = api.require('moduleImageScale');
        moduleImageScale.dismissImage();//关模块
        dismissDialog();//关模块
        vue();
        vm.huakuai();
        vm.GetParentexercisesUrl();//获取作业习题详情及答题结果
        api.addEventListener({// 滑动暂停音频
            name: 'yinpinCLose'
        }, function (ret, err) {
            api.stopPlay();
            $('.img1').show();
            $('.img2').hide();
        });
        api.addEventListener({// 裁剪图片保存
            name: 'cutPicture' + api.frameName
        }, function (ret, err) {
            var src = ret.value.src;
            var tkindex = ret.value.tkindex;
            vm.compressImage(src, tkindex);
            api.closeFrame({
                name: 'frame_cutPicture'
            });
        });
        api.addEventListener({// 画板
            name: 'DrawingBoardImgKzxt'
        }, function (ret, err) {
            if (ret.value.name == api.frameName) {
                var imgsrc = ret.value.imgsrc;
                var xtindex = ret.value.tkindex;
                if (ret.value.type == '2') {//作图题
                    var ztimgindex = ret.value.ztimgindex;
                    vm.qiniuUpfile(imgsrc, xtindex, 'zuotu', '', ztimgindex);
                    api.closeWin({
                        name: 'Drawing_board'
                    });
                } else if (ret.value.type == '3') {//断句题
                    vm.answer[xtindex].da = [];
                    vm.qiniuUpfile(imgsrc, xtindex);
                    api.closeWin({
                        name: 'Drawing_board'
                    });
                } else if (ret.value.type == '4') {//手写
                    if (vm.answer[xtindex].is_txt == 1) {
                        vm.answer[xtindex].da = [];
                        vm.answer[xtindex].is_txt = 0;
                    }
                    vm.qiniuUpfile(imgsrc, xtindex);
                    api.closeWin({
                        name: 'Drawing_board'
                    });
                }
            }
        });
        api.addEventListener({// 视频上传失败重新上传代码
            name: 'reuploadVideo'
        }, function (ret, err) {
            vm.qiniuUpVideo(video_url, reupload_index);
        });
    };

    function vue() {
        vm = new Vue({
            el: '.tkt_content',
            data: {
                index: api.pageParam.index,//当前frame的索引
                material: api.pageParam.material,//当前习题资料
                xsbjid: api.pageParam.xsbjid,
                complete: api.pageParam.complete,//作业完成状态
                data: [],//习题详情
                schoolid: api.pageParam.schoolid,//学校id
                xiaotinum: 0,
                answer: [],
                is_show_textarea: [],//是否显示输入框（刚打开页面的时候）
                isPlaying: false,//老师留言是否播放中
                isShowAnswer: false,
                isctb: '',
                aiCorrect: 0,
                bhzparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 75,
                        "h": 150,
                        "w": 300
                    }, {
                        "viewType": 101,
                        "x": api.winWidth / 2 - 150 + 30,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,
                        "h": 48,
                        "w": 240,
                        "lineSpacting": 1.3,
                        "showText": "<font color='#666666'>选择不会做，会将您已经填写的答案清空，是否确定不会做？</font>",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 159,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "ok",
                        "showText": "确定",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 40,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "no",
                        "showText": "取消",
                        "textSize": 14
                    }]
                },
                paizhaoparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 89,
                        "h": 178,
                        "w": 300
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 89 + 41,
                        "h": 38,
                        "w": 150,
                        "clickID": "paizhao",
                        "showText": "拍照",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 89 + 41 + 58,
                        "h": 38,
                        "w": 150,
                        "clickID": "xiangce",
                        "showText": "从相册中选择",
                        "textSize": 14
                    }
                    ]

                },
                anniuparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 118,
                        "h": 236,
                        "w": 300
                    },
                        //     {
                        //     "viewType": 104,
                        //     "x": api.winWidth / 2 - 150 + 75,
                        //     "y": $api.getStorage('padHeight') / 2 - 118 + 40,
                        //     "h": 38,
                        //     "w": 150,
                        //     "clickID": "shipin",
                        //     "img": 'widget://image/newhomework/os_08.png',
                        //     "img_down": 'widget://image/newhomework/20_08.png'
                        // },

                        {
                            "viewType": 104,
                            "x": api.winWidth / 2 - 150 + 75,
                            "y": $api.getStorage('padHeight') / 2 - 118 + 40,
                            "h": 38,
                            "w": 150,
                            "clickID": "img",
                            "img": 'widget://image/newhomework/os_06.png',
                            "img_down": 'widget://image/newhomework/20_06.png'

                        },
                        {
                            "viewType": 104,
                            "x": api.winWidth / 2 - 150 + 75,
                            "y": $api.getStorage('padHeight') / 2 - 118 + 100,
                            "h": 38,
                            "w": 150,
                            "clickID": "input",
                            "img": 'widget://image/newhomework/os_03.png',
                            "img_down": 'widget://image/newhomework/20_03.png'

                        },
                        {
                            "viewType": 104,
                            "x": api.winWidth / 2 - 150 + 75,
                            "y": $api.getStorage('padHeight') / 2 - 118 + 160,
                            "h": 38,
                            "w": 150,
                            "clickID": "shouxie",
                            "img": 'widget://image/newhomework/os_18.png',
                            "img_down": 'widget://image/newhomework/20_18.png'

                        }
                    ]
                },
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');
                    $api.domAll('a')[i].onclick = function () {
                        return false;
                    }
                }
            },
            methods: {
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },
                openaiCorrect: function () {
                    var uid = $api.getStorage('uid');
                    var xtid = vm.material.zyid;
                    var classid = vm.xsbjid;
                    var kcid = vm.material.hwid;
                    api.openFrame({
                        name: 'frame_zgtpy',
                        url: '../frame_zgtpy.html',
                        rect: {
                            x: 0,
                            y: 0,
                            w: 'auto',
                            h: api.winHeight
                        },
                        pageParam: {
                            uid: uid,
                            xtid: xtid,
                            classid: classid,
                            kcid: kcid
                        },
                        bounces: false
                    });
                },
                PostExercisesTriggerWrong: function () {//错题本改版 ，添加错题本、移除错题本、表及重点
                    var type;
                    if (vm.isctb == 1) {
                        type = 'outbook';
                    } else {
                        type = 'addbook';
                    }
                    apiObj.Header({'Content-Type': 'application/x-www-form-urlencoded'}).Post(UrlRouter.PostExercisesTriggerWrong, {
                        values: {
                            sys_id: vm.data.sys_id,
                            kc_type: 2,
                            type: type
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                if (type == 'outbook') {
                                    vm.isctb = 0;
                                    api.toast({
                                        msg: '已移出错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                } else {
                                    vm.isctb = 1;
                                    api.toast({
                                        msg: '成功加入错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }

                            } else {
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }
                        } else {
                            api.toast({
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    })

                tihuan: function (content) {

                huakuai: function () {
                    var tktcontent = document.getElementById('tkt_content'); //长线条
                    var right = document.getElementById('right'); //小方块
                    var left = document.getElementById('left');
                    var huakuai = document.getElementById('huakuai');
                    var ifBool = false; //判断鼠标是否按下
                    //鼠标按下方块
                    huakuai.addEventListener("touchstart", function (e) {
                        e.stopPropagation();
                        ifBool = true;
                    });
                    //拖动
                    window.addEventListener("touchmove", function (e) {
                        if (ifBool) {
                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x
                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标
                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值
                            if (minDiv_left >= tktcontent.offsetWidth - 43) {
                                minDiv_left = tktcontent.offsetWidth - 43;
                            }
                            //设置拖动后小方块的left值
                            var rightwidth;
                            var leftwidth;
                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {
                                rightwidth = $(window).width() * 0.7 + 37;
                                leftwidth = $(window).width() * 0.3 - 53;
                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {
                                rightwidth = $(window).width() * 0.4 + 37;
                                leftwidth = $(window).width() * 0.6 - 53;
                            } else {
                                rightwidth = $(window).width() - minDiv_left;
                                leftwidth = minDiv_left - 14
                            }
                            right.style.width = rightwidth + "px";
                            left.style.width = leftwidth + "px";
                        }
                    });
                    //鼠标松开
                    window.addEventListener("touchend", function (e) {
                        ifBool = false;
                    });

                    //获取元素的绝对位置
                    function getPosition(node) {
                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left
                        var top = node.offsetTop;
                        current = node.offsetParent; // 取得元素的offsetParent
                        // 一直循环直到根元素
                        while (current != null) {
                            left += current.offsetLeft;
                            top += current.offsetTop;
                            current = current.offsetParent;
                        }
                        return {
                            "left": left,
                            "top": top
                        };
                    }
                },

                            imgName = url.substring(idIndex + 3, andIndex);
                        } else {
                            imgName = url.substring(index + 1);

                PostAIBtn: async function () {
                    const aiAnalysis = $api.getStorage('aiAnalysis');

                            } else {

                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber') || ret.ret === -1) {

                                msg: '本月剩余AI解析次数已耗尽',

                        } else {
                            api.openFrame({
                                name: 'frame-number-exhausted',
                                url: '../../frame-number-exhausted.html',
                            })
                        }
                        return
                    }
                    if (ret.ret === 0 && ret.data === '') {
                        api.execScript({
                            name: 'win_detail_kzxt',
                            script: 'postAddOperationLog();'
                        });
                    }
                    api.showProgress({
                        title: '正在请求AI',
                        text: '请稍后...',
                        modal: true
                    });
                    const tgContent = document.querySelector('.tg_content');
                    const wxtk_tgs = document.querySelectorAll('.wxtk_tg');
                    const needpics = document.querySelectorAll('.needpic');
                    const allElements = [tgContent, ...wxtk_tgs, ...needpics];
                    const imageUrls = [];
                    let processedCount = 0;
                    // 处理每个元素的截图
                    allElements.forEach((element, index) => {
                        if (!element) return;
                        html2canvas(element, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        }).then(canvas => {
                            const imgUrl = canvas.toDataURL('image/png');
                            imageUrls[index] = imgUrl;

                            });
                        });
                    });
                },

    function getByteLen(val) {
        var len = 0;
        for (var i = 0; i < val.length; i++) {
            var a = val.charAt(i);
            if (a.match(/[^\x00-\xff]/ig) != null) {
                len += 2;
            } else {
                len += 1;
            }
        }
        return len;
    }

    function fillText(text) {
        var textSize = 16;
        var lineCount = Math.floor(canvas.width / textSize - 1);
        var line = 1;
        while (text.length) {
            var fillText = text.substr(0, lineCount);
            text = text.substr(lineCount);
            ctx.fillText(fillText, 10, 30 * line, canvas.width);
            line++;
        }

    }
