<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>问答题，朗读题</title>
    <link rel="stylesheet" type="text/css" href="../../../../css/publicCss.css"/>
    <link rel="stylesheet" type="text/css" href="../../../../css/frameDetail.css"/>
    <link rel="stylesheet" type="text/css" href="../../../../css/wx-audio.css"/>
    <style>
        .wdt_content {
            display: none
        }
    </style>
</head>

<body>
<div class="kong_bg">
    <div class="cxjz">
        <div class="cxjztop clearfix">
            <img src="../../../../image/newhomework/cxjz.png">
            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>
        </div>
        <div class="cxjz_button" onclick="cxjz()">重新加载</div>
    </div>
</div>
<div class="wdt_content">
    <img v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2 && aiCorrect == 1"
         class="Aipyicon noImgClick" src="../../../../image/newhomework/Aipyicon.png" @click="openaiCorrect()">
    <img v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2"
         class="aibtn noImgClick" src="../../../../image/newhomework/aiBtn.png" @click="PostAIBtn()">
    <img v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2"
         class="jrctb noImgClick"
         :src="isctb!=1?'../../../../image/newhomework/join.png':'../../../../image/newhomework/out.png'"
         @click="PostExercisesTriggerWrong()">
    <div class="content">
        <!--题干部分开始-->
        <div class="stem">
            <ul>
                <li class="tixing clearfix">
                    <div class="tihao" v-text="(index+1)+'.'"></div>
                    <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>
                </li>
                <li class="zsd" v-if="data.sys_id!= undefined || data.sys_id" @click="alertzsd(data.zsdmc)">
                    <span>难易度：</span><img class="noImgClick"
                                             :src="data.nyd==1?'../../../../image/newhomework/1xing.png':data.nyd==2?'../../../../image/newhomework/2xing.png':data.nyd==3?'../../../../image/newhomework/3xing.png':''"><span>
                            知识点：</span>{{ data.zsdmc }}
                </li>
            </ul>
            <div class="tg_content font666" v-html="data.tg"></div>
            <div class="tishi" style="margin-top: 10px;margin-left: 50px;margin-bottom: 0;"><img class="noImgClick"
                                                                                                 src="../../../../image/newhomework/ts.png">照片请将文字方向朝下，方向不对时可点击放大旋转保存。
            </div>
            <div class="ldcl" v-if="material.tx=='ldt' && data.dastr!=''">
                <h3>朗读材料：</h3>
                <p v-html="data.dastr==''?'无':data.dastr"></p>
            </div>
        </div>
        <!--题干部分结束-->
        <!--答案部分开始-->
        <dl v-if="data.sys_id!= undefined || data.sys_id" class="wenda_answer bgFFF">
            <div v-if="isShowAnswer" class="defen">
                <img class="noImgClick" v-if="data.is_true!=0"
                     :src="data.is_true==1?' ../../../../image/newhomework/zhengque.png':data.is_true==2?'../../../../image/newhomework/cuowu.png':data.is_true==3?'../../../../image/newhomework/bandui.png':''">
                <span
                        :style="data.is_true==1?'color: #4bc7c7':data.is_true==2?'color: #df7605':data.is_true==3?'color: #ffcd06':''"
                        v-text="data.is_true==1?'正确':data.is_true==2?'错误':data.is_true==3?'正确率'+data.accuracy+'%':''"></span>
                <span v-if="data.is_true==0" style="color: #ff778c">待批</span>
            </div>
            <dd :style="!isShowAnswer?'display:inline-block':'display:none'" class="tishi"><img class="noImgClick"
                                                                                                src="../../../../image/newhomework/ts.png">未到作业结束时间未到正确答案显示时间，只展示学生答案哦~
            </dd>
            <dd>
                <h2 class="wendah2">【我的答案】</h2>
                <div v-if="material.tx=='ldt' && data.is_unable==0" class="lddayinpin clearfix">
                    <img class="scyp2 noImgClick" src="../../../../image/startPlay.png"
                         onclick="vm.ZSrecordRun(this);" :playStatus='2' alt="">
                    <div class="lddaRange"><input oninput="vm.zsmonitorRange(event)" class="myRange" type="range"
                                                  min="0" value="0" :max='data.xsdaobj[0].filetime'></div>
                    <p class="ypTimeP" v-text="getTimes(data.xsdaobj[0].filetime)">00:00</p>
                </div>
                <ul class="clearfix wendawdda">
                    <li v-for="list in data.xsdaobj"
                        v-if="material.tx!='ldt'||(material.tx=='ldt' && list.is_unable==1 )"
                        :class="list.is_unable==1?'wendazi':(list.is_txt==1 && list.is_unable==0 && !list.image)?'wendazi':list.is_txt==2?'wendayuyin imgborder':list.is_txt==3?'wendashipin imgborder':'wendatu imgborder'">
                        <p v-if="list.is_unable==1 ||(list.is_txt==1 && list.is_unable==0 && !list.image)"
                           v-html="list.is_unable==1?'不会做':list.is_txt==1 && list.is_unable==0?list.descript:''">
                        </p>
                        <p v-if="list.is_txt==0 && list.is_unable==0" v-html="list.thumbnail"></p>
                        <p v-if="list.is_txt==2 || list.is_txt==3" :url="list.serverpath+list.preview_link" tapmode
                           onclick="vm.videoZYPlay(this)" :filetime="list.filetime">
                            <img class="noImgClick" src="../../../../image/bof_03.png">
                        </p>
                    </li>
                </ul>
            </dd>
            <dd v-if="data.audio && data.audio.length>0" :style="isShowAnswer?'display:block':'display:none'">
                <h2 class="wendah2">【老师留言】</h2>
                <ul class="clearfix">
                    <li :class="ylist.type==1?'teacher_liuyan yuyin3':'teacher_liuyan_zi yuyin3'"
                        v-for="(ylist , index) in data.audio" @click="yuyin(ylist,index)">
                        <img v-if="ylist.type==1" class="audio-img img1 noImgClick"
                             src="../../../../image/newhomework/yuyin1.png"/>
                        <img v-if="ylist.type==1" class="audio-img img2 noImgClick"
                             src="../../../../image/newhomework/yuyin2.gif"/>
                        <span v-if="ylist.type==1" v-text="ylist.filetime+'″'"></span>
                        <p v-if="ylist.type==2" v-text="ylist.descript"></p>
                    </li>
                </ul>
            </dd>
            <dd :style="isShowAnswer?'display:block':'display:none'" v-if="material.tx!='ldt'" class="needpic">
                <h2 class="wendah2" v-text="'【'+material.tx_tip+'】'"></h2>
                <ul>
                    <li class="wendazi" v-html="data.dastr==''?'无':data.dastr">
                    </li>
                </ul>
            </dd>
            <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">
                <h2 class="wendah2">【答案解析】</h2>
                <ul>
                    <li class="wendazi" v-html="data.dajx==''?'无':data.dajx">
                    </li>
                </ul>
            </dd>
            <div class="jrctbkong"></div>
        </dl>
        <!--答案部分结束-->
    </div>
    <!--答题部分开始-->
    <div class="da_content" v-if="!(data.sys_id!= undefined || data.sys_id)">
            <textarea v-if='is_txt==1 && is_unable==0 && is_show_textarea==1 ' class="wdtzi"
                      placeholder="请输入要填写的答案"
                      cols="30" rows="10" maxlength="500" :value="answer.length>0?answer[0].descript:''"
                      oninput="vm.shoudongpiyue(this);"></textarea>
        <div class="lddayinpin clearfix" v-if="material.tx=='ldt' && answer.length>0">
            <img class="scyp2 noImgClick" src="../../../../image/startPlay.png" onclick="vm.recordRun(this);"
                 :playStatus='2' alt="">
            <div class="lddaRange"><input oninput="vm.monitorRange(event)" class="myRange" type="range" min="0"
                                          value="0" :max='answer[0].filetime'>
            </div>
            <p class="ypTimeP" v-text="getTimes(answer[0].filetime)"></p>
            <div class="chacha" tapmode onclick="vm.deletePic(this);" id='0'>
                <img class="noImgClick" src="../../../../image/newhomework/cha.png">
            </div>
        </div>
        <dl class="clearfix " v-if="is_txt!=1 && answer.length>0 && material.tx!='ldt'">
            <dd v-for="(list,index) in answer" :class="list.is_txt==0?'wendatu imgborder':'wendatu imgborder'">
                <img class="noImgClick" :id="index" onclick="showImage(this)" v-if="list.is_txt==0"
                     :src="list.serverpath+list.savename+'?imageView2/2/w/300/h/300'"
                     :fdsrc="list.serverpath+list.savename">
                <div :id="'luyin'+index" style="width: 100%; height: 100%">
                </div>
                <div :id="index" tapmode onclick="vm.deletePic(this);" class="chacha">
                    <img class="noImgClick" src="../../../../image/newhomework/cha.png">
                </div>
            </dd>
        </dl>
        <div
                :class="is_txt!=1 && answer.length>0?'wdAnswerTypeActive':is_txt==1 && is_unable==0 && is_show_textarea==1?'wdAnswerTypeActive':'wdAnswerType'">
            <ul>
                <li class="openAnserType" tapmode onclick="vm.choose();"></li>
                <!--<li class="bhz font4BC7C7" tapmode onclick="vm.checded(this)">-->
                <!--<span :class="is_unable==1?'inputCheckactive':''"></span>不会做-->
                <!--</li>-->
            </ul>
        </div>
    </div>
    <div v-if="!(data.sys_id!= undefined || data.sys_id)" class="tijiao"
         @click.stop="PostV2exercisesAnswer()">
        提交
    </div>
    <!--答题部分结束-->

</div>
</body>
<script type="text/javascript" src="../../../../script/api.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../../script/vue.js"></script>
<script type="text/javascript" src="../../../../script/wx-audio.js"></script>
<script type="text/javascript" src="../../../../script/ThridJS/qiniu.min.js"></script>
<script type="text/javascript" src="../../../../script/12xueUpload.js"></script>
<script type="text/javascript" src="../../../../script/html2canvas.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    var uiMediaScanner;//打开相册需要的变量
    var compressListener = {//打开相册需要的变量
        allCount: 0,
        successCount: 0
    };
    var moduleDialog = null;//弹窗模块bhzparam
    var allTimes = 0;//音频播放
    var sec = 0;
    var timer = null;
    var audioStreamer;
    var downloadUrl = '';
    var downloadFinshed = '0';
    var playStatus;
    var moduleImageScale = null;//图片放大旋转删除
    windowError();
    apiready = function () {
        audioStreamer = api.require('audioStreamer');
        moduleDialog = api.require('moduleDialog');
        moduleImageScale = api.require('moduleImageScale');
        moduleImageScale.dismissImage();//关模块
        dismissDialog();//关模块
        vue();
        vm.GetParentexercisesUrl();//获取作业习题详情及答题结果
        api.addEventListener({//viewdisappear
            name: 'pause'
        }, function (ret, err) {
            api.sendEvent({
                name: 'yinpinCLose'
            });
        });
        api.addEventListener({// 滑动暂停音频
            name: 'yinpinCLose'
        }, function (ret, err) {
            if ($api.domAll('.scyp2').length >= 1) {
                if ($('.scyp2').attr('playStatus') == 1) {
                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');
                }
                //audioStreamer = api.require('audioStreamer');
                clearInterval(timer);
                audioStreamer.pause();
                $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');
                //$api.dom('.myRange').disabled = true;
            }
            api.stopPlay();
            $('.img1').show();
            $('.img2').hide();
        });
        api.addEventListener({// 裁剪图片保存
            name: 'cutPicture' + api.frameName
        }, function (ret, err) {
            var src = ret.value.src;
            // vm.compressImage(src);
            vm.qiniuUpfile(src);
            api.closeFrame({
                name: 'frame_cutPicture'
            });
        });
        api.addEventListener({// 音频接收
            name: 'giveRecoreDataKzxt'
        }, function (ret, err) {
            if (ret.value.isfrom == 'kz') {
                if (ret.value.index == vm.index) {
                    vm.is_txt = 0;
                    vm.answer = [];
                    vm.giveData(ret.value.savename, ret.value.filetime, ret.value.Local_address);
                }
                api.closeWin({
                    name: 'win_reading'
                });
            }
        });
        api.addEventListener({// 画板
            name: 'DrawingBoardImgKzxt'
        }, function (ret, err) {
            if (ret.value.name == api.frameName && ret.value.type == 'huaban') {
                var imgsrc = ret.value.imgsrc;
                if (vm.is_txt == 1) {
                    vm.is_txt = 0;
                    vm.answer = [];
                } else {
                    vm.is_txt = 0;
                }
                vm.is_unable = 0;
                vm.qiniuUpfile(imgsrc);
                api.closeWin({
                    name: 'Drawing_board'
                });
            }
        });
    };

    function vue() {
        vm = new Vue({
            el: '.wdt_content',
            data: {
                index: api.pageParam.index,//当前frame的索引
                material: api.pageParam.material,//当前习题资料
                complete: api.pageParam.complete,//作业完成状态
                data: [],//习题详情
                xsbjid: api.pageParam.xsbjid,
                schoolid: api.pageParam.schoolid,//学校id
                answer: [],//答案数组
                is_unable: 0,//是否会做 0会做 1 不会做
                is_txt: 0,//是否是文字 1是文字 0不是文字
                is_show_textarea: 0,//是否显示输入框（刚打开页面的时候）
                isPlaying: false,//老师留言是否播放中
                isShowAnswer: false,
                isctb: '',
                aiCorrect: 0,
                bhzparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 75,
                        "h": 150,
                        "w": 300
                    }, {
                        "viewType": 101,
                        "x": api.winWidth / 2 - 150 + 30,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,
                        "h": 48,
                        "w": 240,
                        "lineSpacting": 1.3,
                        "showText": "<font color='#666666'>选择不会做，会将您已经填写的答案清空，是否确定不会做？</font>",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 159,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "ok",
                        "showText": "确定",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 40,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "no",
                        "showText": "取消",
                        "textSize": 14
                    }]
                },
                paizhaoparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 89,
                        "h": 178,
                        "w": 300
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 89 + 41,
                        "h": 38,
                        "w": 150,
                        "clickID": "paizhao",
                        "showText": "拍照",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 75,
                        "y": $api.getStorage('padHeight') / 2 - 89 + 41 + 58,
                        "h": 38,
                        "w": 150,
                        "clickID": "xiangce",
                        "showText": "从相册中选择",
                        "textSize": 14
                    }
                    ]

                },
                anniuparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 118,
                        "h": 236,
                        "w": 300
                    },
                        {
                            "viewType": 104,
                            "x": api.winWidth / 2 - 150 + 75,
                            "y": $api.getStorage('padHeight') / 2 - 118 + 40,
                            "h": 38,
                            "w": 150,
                            "clickID": "img",
                            "img": 'widget://image/newhomework/os_06.png',
                            "img_down": 'widget://image/newhomework/20_06.png'

                        },
                        {
                            "viewType": 104,
                            "x": api.winWidth / 2 - 150 + 75,
                            "y": $api.getStorage('padHeight') / 2 - 118 + 100,
                            "h": 38,
                            "w": 150,
                            "clickID": "input",
                            "img": 'widget://image/newhomework/os_03.png',
                            "img_down": 'widget://image/newhomework/20_03.png'

                        },

                        {
                            "viewType": 104,
                            "x": api.winWidth / 2 - 150 + 75,
                            "y": $api.getStorage('padHeight') / 2 - 118 + 160,
                            "h": 38,
                            "w": 150,
                            "clickID": "shouxie",
                            "img": 'widget://image/newhomework/os_18.png',
                            "img_down": 'widget://image/newhomework/20_18.png'

                        }
                    ]
                },
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');
                    $api.domAll('a')[i].onclick = function () {
                        return false;
                    }
                }
            },
            methods: {
                videoZYPlay: function (context) {
                    var url = $api.attr(context, 'url');
                    var filetime = $api.attr(context, 'filetime');
                    api.openWin({
                        name: 'win_video_view',
                        url: '../../../win_video_view.html',
                        slidBackEnabled: false,
                        pageParam: {
                            path: url,
                            title: '',
                            isMp3: false,
                            filetime: filetime
                        }
                    });
                },
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },
                openaiCorrect: function () {
                    var uid = $api.getStorage('uid');
                    var xtid = vm.data.xtid;
                    var classid = vm.xsbjid;
                    var kcid = vm.material.hwid;
                    var ytlx = vm.material.ytlx;
                    api.openFrame({
                        name: 'frame_zgtpy',
                        url: '../frame_zgtpy.html',
                        rect: {
                            x: 0,
                            y: 0,
                            w: 'auto',
                            h: api.winHeight
                        },
                        pageParam: {
                            uid: uid,
                            xtid: xtid,
                            classid: classid,
                            kcid: kcid,
                            ytlx: ytlx,
                        },
                        bounces: false
                    });
                },
                PostExercisesTriggerWrong: function () {//错题本改版 ，添加错题本、移除错题本、表及重点
                    var type;
                    if (vm.isctb == 1) {
                        type = 'outbook';
                    } else {
                        type = 'addbook';
                    }
                    apiObj.Header({'Content-Type': 'application/x-www-form-urlencoded'}).Post(UrlRouter.PostExercisesTriggerWrong, {
                        values: {
                            sys_id: vm.data.sys_id,
                            kc_type: 2,
                            type: type
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                if (type == 'outbook') {
                                    vm.isctb = 0;
                                    api.toast({
                                        msg: '已移出错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                } else {
                                    vm.isctb = 1;
                                    api.toast({
                                        msg: '成功加入错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }

                            } else {
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }
                        } else {
                            api.toast({
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    })
                },
                GetParentexercisesUrl: function () {//获取作业习题详情及答题结果
                    api.showProgress({
                        title: '加载中',
                        text: '请稍后...',
                        modal: true
                    });
                    apiObj.Get(UrlRouter.GetParentexercisesUrl, {
                        values: {
                            hwid: vm.material.hwid,
                            uid: $api.getStorage('uid'),
                            xtid: vm.material.zyid,
                            classid: vm.xsbjid,
                            ytlx: vm.material.ytlx,
                            step: 0,
                            schoolid: vm.schoolid
                        }
                    }, function (ret, err) {
                        api.hideProgress();
                        if (ret) {
                            if (ret.ret == 0) {
                                $('.wdt_content').show();
                                $('.kong_bg').hide();
                                vm.data = ret;
                                vm.isctb = ret.is_ctb;
                                vm.aiCorrect = ret.aiCorrect;
                                if (vm.data.isshowanswer == 1) {
                                    vm.isShowAnswer = true;
                                } else {
                                    vm.isShowAnswer = false;
                                }
                            } else {
                                $('.wdt_content').hide();
                                $('.kong_bg').show();
                            }
                        } else {
                            $('.wdt_content').hide();
                            $('.kong_bg').show();
                        }
                    })
                },
                checded: function (context) {//复选框不会做点击事件
                    if (vm.answer.length > 0) {
                        var param = vm.bhzparam;
                        param.data[1].showText = "<font color='#666666'>选择不会做，会将您已经填写的答案清空，是否确定不会做？</font>";
                        param.data[2].showText = "确定";
                        param.data[3].showText = "取消";
                        moduleDialog.showDialog(vm.bhzparam, function (ret, err) {
                            if (ret.state == 'success' && ret.clickID) {

                getTimes: function (value) {
                    var secondTime = parseInt(value);// 秒
                    var minuteTime = 0;// 分
                    if (secondTime > 59) {//如果秒数大于60，将秒数转换成整数
                        //获取分钟，除以60取整数，得到整数分钟
                        minuteTime = parseInt(secondTime / 60);
                        //获取秒数，秒数取佘，得到整数秒数
                        secondTime = parseInt(secondTime % 60);
                    }
                    var result = "" + parseInt(secondTime);
                    if (minuteTime > 0 && secondTime < 10) {
                        if (minuteTime > 9) {
                            result = parseInt(minuteTime) + ":0" + result;
                        } else {
                            result = "0" + parseInt(minuteTime) + ":0" + result;
                        }
                    } else if (minuteTime > 0 && secondTime >= 10) {
                        if (minuteTime > 9) {
                            result = parseInt(minuteTime) + ":" + result;
                        } else {
                            result = "0" + parseInt(minuteTime) + ":" + result;
                        }
                    } else if (minuteTime == 0 && secondTime < 10) {
                        result = "00" + ":0" + result;
                    } else {
                        result = "00" + ":" + result;
                    }
                    return result;
                },

                                    var ss = 'background-size: ' + bfb + '% 100%';
                                    if (allTimes == 0 || sec >= recodetime) {
                                        $api.attr(context, 'playStatus', '2');
                                        clearInterval(timer);
                                        $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');
                                        var time = vm.getTimes(recodetime);
                                        $api.text($api.dom('.ypTimeP'), time);
                                        $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                                        range.value = 0;
                                        audioStreamer.pause();
                                        sec = 0;
                                    } else {
                                        range.value = sec;
                                        var time = vm.getTimes(allTimes);
                                        $api.css($api.dom('.myRange'), ss);
                                        $api.text($api.dom('.ypTimeP'), time);
                                    }
                                }, 1000);
                            }
                        });
                    } else {
                        if (sec == 0) {
                            audioStreamer.stop();
                            openPlayer(downloadUrl);
                        }
                        if (playStatus == '1') {//暂停
                            $api.attr(context, 'playStatus', '2');
                            $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');
                            clearInterval(timer);
                            audioStreamer.pause();
                        } else {//播放
                            $api.attr(context, 'playStatus', '1');
                            resume(downloadUrl);
                            if (sec == 0) {
                                allTimes = recodetime;
                            }
                            $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');
                            timer = setInterval(function (e) {
                                sec = sec + 1;
                                allTimes = allTimes - 1;
                                bfb = sec / recodetime * 100;
                                bfb = bfb.toFixed(2);
                                var ss = 'background-size: ' + bfb + '% 100%';
                                if (allTimes == 0 || sec >= recodetime) {
                                    $api.attr(context, 'playStatus', '2');
                                    clearInterval(timer);
                                    $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');
                                    var time = vm.getTimes(recodetime);
                                    $api.text($api.dom('.ypTimeP'), time);
                                    $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                                    range.value = 0;
                                    audioStreamer.pause();
                                    sec = 0;
                                } else {
                                    range.value = sec;
                                    var time = vm.getTimes(allTimes);
                                    $api.css($api.dom('.myRange'), ss);
                                    $api.text($api.dom('.ypTimeP'), time);
                                }
                            }, 1000);
                        }
                    }
                },
                PostAIBtn: async function () {
                    const aiAnalysis = $api.getStorage('aiAnalysis');
                    const ret = await new Promise((resolve, reject) => {
                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {
                            body: $api.jsonToStr({
                                schoolid: $api.getStorage('schoolid'),
                                type: 'ai_analysis',
                                resource_id: vm.data.xtid,
                                count: aiAnalysis.count,
                                card_type: aiAnalysis.card_type !== undefined ? aiAnalysis.card_type : null,
                                ...(aiAnalysis.card_id !== undefined && {card_id: aiAnalysis.card_id}),
                            })
                        }, function (ret, err) {
                            if (ret) {
                                resolve(ret);
                            } else {
                                reject(err);
                            }
                        })
                    });
                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber')|| ret.ret === -1) {
                        if ($api.getStorage('upgradeQRCode') === '1') {
                            api.toast({
                                msg: '本月剩余AI解析次数已耗尽',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            api.openFrame({
                                name: 'frame-number-exhausted',
                                url: '../../frame-number-exhausted.html',
                            })
                        }
                        return
                    }
                    if(ret.ret === 0 && ret.data === ''){
                        api.execScript({
                            name: 'win_detail_kzxt',
                            script: 'postAddOperationLog();'
                        });
                    }
                    api.showProgress({
                        title: '正在请求AI',
                        text: '请稍后...',
                        modal: true
                    });
                    const tgContent = document.querySelector('.tg_content');
                    const needPics = document.querySelectorAll('.needpic');
                    const allElements = [tgContent, ...needPics];
                    const imageUrls = [];
                    let processedCount = 0;
                    // 处理每个元素的截图
                    allElements.forEach((element, index) => {
                        if (!element) return;
                        html2canvas(element, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        }).then(canvas => {
                            const imgUrl = canvas.toDataURL('image/png');
                            imageUrls[index] = imgUrl;
                            processedCount++;
                            // 当所有图片都处理完成时
                            if (processedCount == allElements.length) {
                                api.hideProgress();
                                api.openFrame({
                                    name: 'frame_liushi',
                                    url: '../frame_liushi.html',
                                    rect: {
                                        x: 0,
                                        y: 0,
                                        w: 'auto',
                                        h: api.winHeight
                                    },
                                    pageParam: {
                                        xtid: vm.data.xtid,
                                        imagePaths: imageUrls
                                    },
                                    bounces: false
                                });
                            }
                        }).catch(error => {
                            api.toast({
                                msg: '截图失败：' + error,
                                duration: 2000,
                                location: 'bottom'
                            });
                        });
                    });
                },
            }
        });
    }

    function showImage(context) {
        if ($api.getStorage('padType') != '1') {

                images: [
                    $(context).attr('fdsrc')
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
            return
        }
        var url = $(context).attr('fdsrc');
        var index = $(context).attr('id');
        var param = {"deviceType": "deviceType_pad", "url": url};
        moduleImageScale.showImage(param, function (ret, err) {
            if (ret) {
                if (ret.state == "success" && ret.clickID == 'clickID_close') {
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_save') {
                    if (api.systemType === 'ios') {
                        vm.qiniuUpfile(ret.imageSavePath, 'modulesave', index);
                    } else {
                        vm.qiniuUpfile("/storage/emulated/0/" + ret.imageSavePath.substring(19), 'modulesave', index);
                    }
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_delete') {
                    vm.answer.splice(index, 1);
                    moduleImageScale.dismissImage();
                }
            } else {
                alert(JSON.stringify(err));
            }


        });
