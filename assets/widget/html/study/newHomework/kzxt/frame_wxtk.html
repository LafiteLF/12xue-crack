<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>完形填空</title>
    <link rel="stylesheet" type="text/css" href="../../../../css/publicCss.css"/>
    <link rel="stylesheet" type="text/css" href="../../../../css/frameDetail.css"/>
    <style>
        .tkt_content {
            display: none
        }
    </style>
</head>
<body>
<div class="kong_bg">
    <div class="cxjz">
        <div class="cxjztop clearfix">
            <img src="../../../../image/newhomework/cxjz.png">
            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>
        </div>
        <div class="cxjz_button" onclick="cxjz()">重新加载</div>
    </div>
</div>
<div class="tkt_content" id="tkt_content">
    <img v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2 && aiCorrect == 1" class="Aipyicon noImgClick"
            src="../../../../image/newhomework/Aipyicon.png" @click="openaiCorrect()">
    <img v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2" class="aibtn noImgClick"
            src="../../../../image/newhomework/aiBtn.png" @click="PostAIBtn()">
    <img  v-if=" (data.sys_id!= undefined || data.sys_id)  && isShowAnswer && data.res_type!=2" class="jrctb noImgClick" :src="isctb!=1?'../../../../image/newhomework/join.png':'../../../../image/newhomework/out.png'" @click="PostExercisesTriggerWrong()">
    <div class="tkt_top">
        <ul>
            <li class="tixing clearfix">
                <div class="tihao" v-text="(index+1)+'.'"></div>
                <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>
            </li>
            <li v-if="data.sys_id!= undefined || data.sys_id" class="zsd" @click="alertzsd(data.zsdmc)">
                <span>难易度：</span><img  class="noImgClick"
                    :src="data.nyd==1?'../../../../image/newhomework/1xing.png':data.nyd==2?'../../../../image/newhomework/2xing.png':data.nyd==3?'../../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{data.zsdmc}}
            </li>
        </ul>
    </div>
    <div class="tkt_left" id="left" style="width: calc(60% - 53px);">
        <div class="tg_content font666" v-html="data.tg"></div>
    </div>
    <div class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">
        <div class="tkt_right_content">
            <div :style="!isShowAnswer && (data.sys_id!= undefined || data.sys_id)?'display:block':'display:none'"
                 class="tishi2 overflow"><img src="../../../../image/newhomework/ts.png">未到正确答案显示时间，只展示学生答案哦~
            </div>
            <div class="huakuai" id="huakuai"></div>
            <span v-if="isShowAnswer && (data.sys_id!= undefined || data.sys_id)" class="zongfen">
                  <span v-if="data.is_true!=0 " v-html="'本题正确率<em>'+data.accuracy+'%</em>'"></span>
                     <span v-if="data.is_true==0" style="color: #ff778c">待批</span>
            </span>
            <span class="wxtk_xiaoti" :style="!isShowAnswer && (data.sys_id!= undefined || data.sys_id)?'top:40px':''" v-text="'共'+xiaotinum+'小题'"></span>
            <ul class="wxtk_content">
                <li v-for="(list,index) in data.children">
                    <!--答题部分开始-->
                    <div :class="!(data.sys_id!= undefined || data.sys_id)?'wxtk_tg':'xiaotifenge wxtk_tg'"
                         v-html="'('+(index+1)+')<br>'+list.tg"></div>
                    <ul v-if="!(data.sys_id!= undefined || data.sys_id)" class="wxtk_option">
                        <li v-for="item in list.options" :id="item.id" :index="index"
                            :class="answer[index].da[0]==item.id?'xxactive':''" tapmode
                            onclick="vm.xxselectClicked(this)" v-text="item.xx"></li>
                    </ul>
                    <!--<div v-if="!(data.sys_id!= undefined || data.sys_id)" class="wxtkbhz font4BC7C7" :id="index" tapmode onclick="vm.checded(this)">-->
                    <!--<span :class="answer[index].is_unable==1?'inputCheckactive':''"></span>不会做-->
                    <!--</div>-->

                    <!--答题部分结束-->
                    <!--答案部分开始-->
                    <dl v-if="data.sys_id!= undefined || data.sys_id" class="wxtk_answer bgFFF">
                        <dd class="wxtk_myanswer">
                            <div v-if="isShowAnswer" class="wxtkdefen">
                                <img class="noImgClick" v-if="list.is_true!=0"
                                     :src="list.is_true==1?' ../../../../image/newhomework/zhengque.png':list.is_true==2?'../../../../image/newhomework/cuowu.png':list.is_true==3?'../../../../image/newhomework/bandui.png':''">
                                <span :style="list.is_true==1?'color: #4bc7c7':list.is_true==2?'color: #df7605':list.is_true==3?'color: #ffcd06':''"
                                      v-text="list.is_true==1?'正确':list.is_true==2?'错误':list.is_true==3?'正确率'+list.accuracy+'%':''"></span>
                                <span v-if="list.is_true==0" style="color: #ff778c">待批</span>
                            </div>
                            <h2>【我的答案】</h2>
                            <ul class="clearfix ">
                                <li class="wxtkzi" v-text="list.is_unable==1?'不会做':list.xsdastr"></li>
                            </ul>
                        </dd>
                        <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">
                            <h2 v-text="'【'+material.tx_tip+'】'"> </h2>
                            <ul>
                                <li class="wxtkzi" v-html="list.dastr==''?'无':list.dastr"></li>
                            </ul>
                        </dd>
                        <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">
                            <h2>【答案解析】</h2>
                            <ul>
                                <li class="wxtkzi" v-html="list.dajx==''?'无':list.dajx"></li>
                            </ul>
                        </dd>
                    </dl>
                    <!--答案部分开始-->
                </li>

            </ul>
            <div v-if="!(data.sys_id!= undefined || data.sys_id)" class="tijiao"
                 @click.stop="PostV2exercisesAnswer()">提交
            </div>
            <dl v-if="(data.sys_id!= undefined || data.sys_id)&& data.audio && data.audio.length>0" class="wxtk_dajx"
                :style="isShowAnswer?'display:block':'display:none'">
                <dd>
                    <h2 class="tktjxh2">【老师留言】</h2>
                    <ul class="clearfix">
                        <li :class="ylist.type==1?'teacher_liuyan yuyin3':'teacher_liuyan_zi yuyin3'"
                            v-for="(ylist , index) in data.audio" @click="yuyin(ylist,index)">
                            <img   v-if="ylist.type==1" class="audio-img img1 noImgClick"
                                 src="../../../../image/newhomework/yuyin1.png"/>
                            <img   v-if="ylist.type==1" class="audio-img img2 noImgClick"
                                 src="../../../../image/newhomework/yuyin2.gif"/>
                            <span v-if="ylist.type==1" v-text="ylist.filetime+'″'"></span>
                            <p v-if="ylist.type==2" v-text="ylist.descript"></p>
                        </li>
                    </ul>
                </dd>

            </dl>
            <!--答案部分结束-->
            <div class="jrctbkong"></div>
        </div>
    </div>
</div>
</body>
<script type="text/javascript" src="../../../../script/api.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../../script/vue.js"></script>
<script type="text/javascript" src="../../../../script/common.js"></script>
<script type="text/javascript" src="../../../../script/fastclick.js"></script> 
<script type="text/javascript" src="../../../../script/html2canvas.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    windowError();
    apiready = function () {
        vue();
        vm.huakuai();
        vm.GetParentexercisesUrl();//获取作业习题详情及答题结果
        api.addEventListener({// 滑动暂停音频
            name: 'yinpinCLose'
        }, function (ret, err) {
            api.stopPlay();
            $('.img1').show();
            $('.img2').hide();
        })
    };

    function vue() {
        vm = new Vue({
            el: '.tkt_content',
            data: {
                index: api.pageParam.index,//当前frame的索引
                material: api.pageParam.material,//当前习题资料
                complete: api.pageParam.complete,//作业完成状态
                xsbjid: api.pageParam.xsbjid,
                data: [],//习题详情
                schoolid: api.pageParam.schoolid,//学校id
                xiaotinum: 0,//小题总数
                answer: [],
                isPlaying: false,//老师留言是否播放中
                isShowAnswer: false,
                aiCorrect:0,
                isctb:''
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');
                    $api.domAll('a')[i].onclick = function () {
                        return false;
                    }
                }
            },
            methods: {
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },
                openaiCorrect:function(){
                   var uid = $api.getStorage('uid');
                   var xtid= vm.material.zyid;
                   var classid = vm.xsbjid;
                   var kcid = vm.material.hwid;
                   api.openFrame({
                       name: 'frame_zgtpy',
                       url: '../frame_zgtpy.html',
                       rect: {
                           x: 0,
                           y: 0,
                           w: 'auto',
                           h: api.winHeight
                       },
                       pageParam: {
                           uid: uid,
                           xtid: xtid,
                           classid: classid,
                           kcid: kcid
                       },
                       bounces: false
                   });
                },
                PostExercisesTriggerWrong:function(){//错题本改版 ，添加错题本、移除错题本、表及重点
                    var type;
                    if(vm.isctb==1){
                        type = 'outbook';
                    }else{
                        type = 'addbook';
                    }
                    apiObj.Header({'Content-Type': 'application/x-www-form-urlencoded'}).Post(UrlRouter.PostExercisesTriggerWrong, {
                        values: {
                            sys_id:vm.data.sys_id,
                            kc_type:2,
                            type:type
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                if(type=='outbook'){
                                    vm.isctb=0;
                                    api.toast({
                                        msg: '已移出错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }else{
                                    vm.isctb=1;
                                    api.toast({
                                        msg: '成功加入错题本',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }

                            }else{
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }
                        }else{
                            api.toast({
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    })
                },
                huakuai: function () {
                    var tktcontent = document.getElementById('tkt_content'); //长线条
                    var right = document.getElementById('right'); //小方块
                    var left = document.getElementById('left');
                    var huakuai = document.getElementById('huakuai');
                    var ifBool = false; //判断鼠标是否按下
//鼠标按下方块
                    huakuai.addEventListener("touchstart", function (e) {
                        e.stopPropagation();
                        ifBool = true;
                    });
//拖动
                    window.addEventListener("touchmove", function (e) {
                        if (ifBool) {
                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x
                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标
                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值
                            if (minDiv_left >= tktcontent.offsetWidth - 43) {
                                minDiv_left = tktcontent.offsetWidth - 43;
                            }
//设置拖动后小方块的left值
                            var rightwidth;
                            var leftwidth;
                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {
                                rightwidth = $(window).width() * 0.7 + 37;
                                leftwidth = $(window).width() * 0.3 - 53;
                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {
                                rightwidth = $(window).width() * 0.4 + 37;
                                leftwidth = $(window).width() * 0.6 - 53;
                            } else {
                                rightwidth = $(window).width() - minDiv_left;
                                leftwidth = minDiv_left -14
                            }
                            right.style.width = rightwidth + "px";
                            left.style.width = leftwidth + "px";
                        }
                    });
//鼠标松开
                    window.addEventListener("touchend", function (e) {
                        ifBool = false;
                    });

//获取元素的绝对位置
                    function getPosition(node) {
                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left
                        var top = node.offsetTop;
                        current = node.offsetParent; // 取得元素的offsetParent
                        // 一直循环直到根元素
                        while (current != null) {
                            left += current.offsetLeft;
                            top += current.offsetTop;
                            current = current.offsetParent;
                        }
                        return {
                            "left": left,
                            "top": top
                        };
                    }
                },
                yuyin: function (audioItem, index) {
                    if (audioItem.type == 1) {
                        if (vm.isPlaying) {
                            api.stopPlay();
                            $('.img1').show();
                            $('.img2').hide();
                        } else {
                            $('.img1').show();
                            $('.img2').hide();
                            var audioName = audioItem.savename;
                            var path = "/audio/" + audioName + ".amr";
                            api.download({
                                url: audioItem.serverpath + "/" + audioItem.savename,
                                savePath: 'fs:/' + path,
                                report: false,
                                cache: false,
                                allowResume: false
                            }, function (ret, err) {
                                if (ret && ret.state == 1) {
                                    // 下载成功  ret.savePath
                                    isDownloading = false;
                                    api.startPlay({
                                        path: api.fsDir + path
                                    }, function (ret, err) {
                                        if (ret) {
                                            vm.isPlaying = false;
                                            $('.img1').show();
                                            $('.img2').hide();

                                        }
                                    });

                                    $('.yuyin3').eq(index).find('.img1').hide();
                                    $('.yuyin3').eq(index).find('.img2').show();
                                    $('.yuyin3').eq(index).siblings().find('.img1').show();
                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();
                                }
                            });
                        }
                        vm.isPlaying = !vm.isPlaying;
                    }

                },
                GetParentexercisesUrl: function () {//获取作业习题详情及答题结果
                    api.showProgress({
                        title: '加载中',
                        text: '请稍后...',
                        modal: true
                    });
                    apiObj.Get(UrlRouter.GetParentexercisesUrl, {
                        values: {
                            hwid: vm.material.hwid,
                            uid: $api.getStorage('uid'),
                            xtid: vm.material.zyid,
                            classid: vm.xsbjid,
                            ytlx: vm.material.ytlx,
                            step: 0,
                            schoolid: vm.schoolid
                        }
                    }, function (ret, err) {
                        api.hideProgress();
                        if (ret) {
                            if (ret.ret == 0) {
                                $('.tkt_content').show();
                                $('.kong_bg').hide();
                                vm.data = ret;
                                vm.isctb = ret.is_ctb;
                                vm.aiCorrect = ret.aiCorrect;
                                vm.xiaotinum = ret.children.length;
                                if (vm.data.isshowanswer==1) {
                                    vm.isShowAnswer = true;
                                } else {
                                    vm.isShowAnswer = false;
                                }
                                for (var i = 0; i < ret.children.length; i++) {//给初始化的小题加个默认空答案 防止报错
                                    var kongcontent = {
                                        'topid': ret.id,
                                        'id': ret.children[i].id,
                                        'da': [],
                                        'is_unable': 0,
                                        'daoptions': ret.children[i].daoptions,
                                        'sort': ret.children[i].sort,
                                    };
                                    Vue.set(vm.answer, i, kongcontent);
                                }
                            } else {
                                $('.tkt_content').hide();
                                $('.kong_bg').show();
                            }
                        } else {
                            $('.tkt_content').hide();
                            $('.kong_bg').show();
                        }
                    })
                },
                xxselectClicked: function (context) {//选择判断题选项点击事件
                    var xtindex = $(context).attr('index');
                    vm.answer[xtindex].da = [$(context).attr('id')];
                    vm.answer[xtindex].is_unable = 0;//不会做
                },
                checded: function (context) {//复选框不会做点击事件
                    var xtindex = $(context).attr('id');
                    vm.answer[xtindex].da = [];
                    vm.answer[xtindex].is_unable = 1;//不会做
                },
                PostV2exercisesAnswer: function () {
                    var wxwd = 0;
                    for (var j = 0; j < vm.answer.length; j++) {
                        if (vm.answer[j].da.length == 0 && vm.answer[j].is_unable == 0) {
                            wxwd++
                        }
                    }
                    if (wxwd == 0) {
                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostV2exercisesAnswer, {
                            body: $api.jsonToStr({
                                xtid: vm.material.zyid,
                                uid: $api.getStorage('uid'),
                                ytlx: 4,
                                xsbjid: vm.xsbjid,
                                kcid: vm.material.hwid,
                                tx: vm.data.tx,
                                is_auto: vm.data.is_auto,
                                daoptions: vm.data.daoption,
                                xkid: api.pageParam.winData.xkid,
                                njid: api.pageParam.winData.njid,
                                bbid: api.pageParam.winData.bbid,
                                sxcid: api.pageParam.winData.sxcid,
                                dyid: api.pageParam.winData.dyid,
                                jieid: api.pageParam.winData.jieid,
                                children: vm.answer,
                                descript: 'mobile',
                                score: vm.material.score,
                                kc_type: 'homework',
                                tx_code: vm.data.tx_code,
                            })
                        }, function (ret, err) {
                            api.hideProgress();
                            if (ret) {
                                if (ret.ret == 0) {
                                    api.hideProgress();
                                    vm.GetParentexercisesUrl();
                                } else {
                                    api.hideProgress();
                                    alert("12xue提交答案失败" + ret.msg);
                                }
                            } else {
                                api.hideProgress();
                                alert("12xue提交答案失败" + err.msg);
                            }
                        })
                    } else {
                        alert('提交答案不能为空！')
                    }

                },
                PostAIBtn: async function () {
                    const aiAnalysis = $api.getStorage('aiAnalysis');
                    const ret = await new Promise((resolve, reject) => {
                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {
                            body: $api.jsonToStr({
                                schoolid: $api.getStorage('schoolid'),
                                type: 'ai_analysis',
                                resource_id: vm.data.xtid,
                                count: aiAnalysis.count,
                                card_type: aiAnalysis.card_type !== undefined ? aiAnalysis.card_type : null,
                                ...(aiAnalysis.card_id !== undefined && {card_id: aiAnalysis.card_id}),
                            })
                        }, function (ret, err) {
                            if (ret) {
                                resolve(ret);
                            } else {
                                reject(err);
                            }
                        })
                    });
                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber')|| ret.ret === -1) {
                        if ($api.getStorage('upgradeQRCode') === '1') {
                            api.toast({
                                msg: '本月剩余AI解析次数已耗尽',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            api.openFrame({
                                name: 'frame-number-exhausted',
                                url: '../../frame-number-exhausted.html',
                            })
                        }
                        return
                    }
                    if(ret.ret === 0 && ret.data === ''){
                        api.execScript({
                            name: 'win_detail_kzxt',
                            script: 'postAddOperationLog();'
                        });
                    }
                    api.showProgress({
                        title: '正在请求AI',
                        text: '请稍后...',
                        modal: true
                    });
                    const tgContent = document.querySelector('.tg_content');
                    const wxtk_tgs = document.querySelectorAll('.wxtk_tg');
                    const needpics = document.querySelectorAll('.needpic');
                    const allElements = [tgContent, ...wxtk_tgs, ...needpics];
                    const imageUrls = [];
                    let processedCount = 0;
                    // 处理每个元素的截图
                    allElements.forEach((element, index) => {
                        if (!element) return;
                        html2canvas(element, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        }).then(canvas => {
                            const imgUrl = canvas.toDataURL('image/png');
                            imageUrls[index] = imgUrl;
                            processedCount++;
                            // 当所有图片都处理完成时
                            if (processedCount == allElements.length) {
                                api.hideProgress();
                                api.openFrame({
                                    name: 'frame_liushi',
                                    url: '../frame_liushi.html',
                                    rect: {
                                        x: 0,
                                        y: 0,
                                        w: 'auto',
                                        h: api.winHeight
                                    },
                                    pageParam: {
                                        xtid: vm.data.xtid,
                                        imagePaths: imageUrls
                                    },
                                    bounces: false
                                });
                            }
                        }).catch(error => {
                            api.toast({
                                msg: '截图失败：' + error,
                                duration: 2000,
                                location: 'bottom'
                            });
                        });
                    });
                },
            }
        });
    }

    function imgClick(context) {
        var src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        if (src.substring(src.length - 3) == 'gif') {
        } else {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    src
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
        }
    }
    function cxjz() {
            vm.GetParentexercisesUrl()
    }
</script>
