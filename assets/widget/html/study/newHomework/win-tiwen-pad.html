<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title></title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <link rel="stylesheet" href="../../../css/ThirdCss/style.css"/>
    <style type="text/css">
        body {
            background-color: #e5e5e5
        }

        .nav-spanBtn {
            border: 1px solid #4bc7c7 !important;
            border-radius:3px;
            padding: 5px 10px;
            margin-right: 10px;
            font-size: 0.8rem
        }
        .nav-spanBtn:active {
            color: #fff;
            background-color:#4bc7c7 ;
        }
        .aui-bar-nav .aui-btn.aui-btn-outlined {
            padding: 0 0.5rem;}
        .aui-icon-check:before {
            content: "\e619";
            margin-right: 10px;
            font-size: 20px;
        }
        .aui-bar-nav .aui-btn.aui-btn-outlined{
            background:none;
        }
    </style>
</head>
<body>
<header class="aui-bar aui-bar-nav">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">
        <span class="aui-iconfont aui-icon-left" ></span>作业提问
    </a>
    <div style="float: right" class="submit" tapmode onclick="reply();">
        <span class="nav-spanBtn  aui-iconfont aui-icon-check"
              style="font-size: 0.7rem">确定</span>
    </div>
</header>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/common.js"></script>
<script type="text/javascript" src="../../../script/fastclick.js"></script>
<script type="text/javascript">
    var click=false;
    apiready = function () {
        var header = document.querySelector('header');
//        //$api.fixStatusBar(header);
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        var header = document.querySelector('header');
        var headerH = $api.offset(header).h;
        api.openFrame({
            name: 'frame-tiwen-pad',
            url: 'frame-tiwen-pad.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: padWinHeight - headerH
            },
            pageParam: {
                zyid: api.pageParam.zyid,
                classid: api.pageParam.classid,
                restype: api.pageParam.restype,
                resdesc: api.pageParam.resdesc,
                restitle: api.pageParam.restitle,
                resdescript: api.pageParam.resdescript,
                resid: api.pageParam.resid,
                data: api.pageParam.data,
                tuid:api.pageParam.tuid
            },
            bounces: false
        });

    };
    function reply() {
        if(!click){
            click = true;
            api.execScript({
                frameName: 'frame-tiwen-pad',
                script: "reply();"
            });
            setTimeout(function () {
                click = false;
            },2000);
        }
    }
</script>
