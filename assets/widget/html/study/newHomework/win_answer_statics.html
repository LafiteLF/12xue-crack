<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport"
        content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />
    <title>答题统计</title>
    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css" />
    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css" />
    <style>
        .winTitle {
            width: calc(50% - 15rem);
        }
    </style>
</head>

<body>
    <header class="clearfix">
        <div onclick="closeWin();" class="winTitle pull_left">
            答题统计
        </div>
        <div
            style="position: absolute;left: 50%;transform: translateX(-50%);font-size: 1.5rem;line-height: 51px;color:#999999">
            本月剩余主观题AI批阅次数:&nbsp;<span id="ai-grading-count" style="font-weight: bold;color: #4BC7C7">0</span>
        </div>
    </header>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript" src="../../../script/common.js"></script>
<script type="text/javascript" src="../../../script/fastclick.js"></script>
<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var inputType;//进入统计页面的方式
    var aiAnalysis = { count: 0 };
    var isAbandon = 0;


    apiready = function () {
        api.addEventListener({
            name: 'update_ai_count_to_check_frame',

        }, function (ret, err) {
            if (ret && ret.value && ret.value.count !== undefined) {
                aiAnalysis.count = ret.value.count;
                var countElement = document.getElementById('ai-grading-count');
                if (countElement) {
                    countElement.innerText = aiAnalysis.count || 0;
                }
                // 存储更新后的AI分析数据
                $api.setStorage('aiCheck', aiAnalysis);
            }
        });
        inputType = api.pageParam.inputType;

        // 获取AI批阅次数
        apiObj.Get(UrlRouter.GetPayfeeCountByType, {
            values: {
                type: 'ai_subjective_review',
                schoolid: $api.getStorage('schoolid'),
            }
        }, function (ret, err) {
            if (ret && ret.ret === 0) {
                aiAnalysis = ret.data;
                if (ret.data && ret.data.disabled === true) {
                    isAbandon = 1;
                }
            } else {
                aiAnalysis = { count: 0 };
                isAbandon = (ret && ret.data && ret.data.disabled === true) ? 1 : 0;
            }
            // 更新页面显示
            var countElement = document.getElementById('ai-grading-count');
            if (countElement) {
                countElement.innerText = aiAnalysis.count || 0;
            }
            // 存储AI分析数据
            $api.setStorage('aiCheck', aiAnalysis);
        });
        api.closeWin({
            name: 'win_detail'
        });
        api.closeFrameGroup({
            name: 'frame_Detail'
        });
        var header = document.querySelector('header');
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.openFrame({
            name: 'frame_answer_statics',
            url: 'frame_answer_statics.html',
            rect: {
                x: 0,
                y: headerH,
                w: api.winWidth,
                h: frameH
            },
            pageParam: {
                hwid: api.pageParam.hwid,
                xsbjid: api.pageParam.xsbjid,
                is_score: api.pageParam.is_score,//是否是得分
                complete: api.pageParam.complete,
                homeworkListData: api.pageParam.homeworkListData,
                tongji: api.pageParam.tongji,
                inputType: inputType,
                homeworkIndex: api.pageParam.homeworkIndex//选择的作业下标
            },
            //            bounces: true
        });
        // Android按返回键关闭页面时结束自定义页面统计
        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
            closeWin();
        });
    };
    function closeWin() {
        api.closeWin({
            name: 'win_detail'
        });
        api.closeFrameGroup({
            name: 'frame_Detail'
        });
        for (var i = 0; i < api.windows().length; i++) {
            if (api.windows()[i].name == 'win-homework-message-list') {
                api.closeToWin({
                    name: 'win-homework-message-list'
                });
            }
        }
        if (inputType == 'liebiao') {
            api.closeToWin({
                name: 'win-homework-list-pad'
            });
        } else if (inputType == 'datiafter') {
            api.closeToWin({
                name: 'win-homework-list-pad'
            });
        } else if (inputType == 'dati') {
            api.openWin({
                name: 'win_exercises_list',
                url: 'win_exercises_list.html',
                pageParam: {
                    detailData: api.pageParam.homeworkListData,
                    dansz: api.pageParam.homeworkListData.dansz,
                    finishtime: api.pageParam.homeworkListData.finish_time,
                    complete: api.pageParam.homeworkListData.complete,
                    from: api.pageParam.from,
                    homeworkIndex: api.pageParam.homeworkIndex,//选择的作业下标,
                    inputType: inputType
                },
                slidBackEnabled: false,
                animation: {
                    type: "none",                //动画类型（详见动画类型常量）
                    subType: "from_left",       //动画子类型（详见动画子类型常量）
                    duration: 300                //动画过渡时间，默认300毫秒
                }
            });
        }
    }
</script>

</html>
