<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    apiready = function () {
        vue();
        vm.openFrame();
    };
    function vue() {
        vm = new Vue({
            el: '.content',
            data: {
                current: 0,
                answersSort: api.pageParam.answersSort,
                yipiList:api.pageParam.yipiList,
                daipiList:api.pageParam.daipiList,
                tx:api.pageParam.tx
            },
            updated: function () {

            },
            methods: {
                getName:function (item) {
                    if(api.pageParam.tx == 'tkt'){
                        return '空'+item;
                    }else {
                        return '('+item+')';
                    }
                },
                openFrame: function () {

                    var x = api.winWidth/2 - 350;
                    var y = api.winHeight/2 - 180;

                    if(vm.answersSort.length ==0){
                        $api.css($api.dom('.topContent'), 'display:none;');
                        api.openFrame({
                            name: 'frame_studentpage',
                            url: 'frame_studentpage.html',
                            rect: {
                                x: x,
                                y: y,
                                w: 700,
                                h: 360
                            },
                            bounces: false,
                            pageParam: {
                                tuid: api.pageParam.tuid,
                                yipiList:api.pageParam.yipiList,
                                daipiList:api.pageParam.daipiList,
                                sortArr:vm.answersSort,
                                hwid: api.pageParam.hwid,
                                classid: api.pageParam.classid,
                                xtid: api.pageParam.xtid,
                                ytlx: api.pageParam.ytlx,
                                index:0,
                                tx_code:api.pageParam.tx_code,
                                currentSort:api.pageParam.currentSort,
                                isFenzhi: api.pageParam.isFenzhi,
                                fz:api.pageParam.fz,
                            }
                        });
                    }else {
                        var frames = [];
                        var j = 0;
                        for (var i = 0; i < vm.answersSort.length; i++) {
                            if(vm.answersSort[i] == api.pageParam.currentSort){
                                vm.current = i;
                            }
                            frames.push({
                                name: "frame_studentpage",
                                url: 'frame_studentpage.html',
                                pageParam: {
                                    tuid: api.pageParam.tuid,
                                    yipiList:api.pageParam.yipiList,
                                    daipiList:api.pageParam.daipiList,
                                    hwid: api.pageParam.hwid,
                                    classid: api.pageParam.classid,
                                    xtid: api.pageParam.xtid,
                                    ytlx: api.pageParam.ytlx,
                                    index:i,
                                    sortArr:vm.answersSort,
                                    tx_code:api.pageParam.tx_code,
                                    currentSort:api.pageParam.currentSort,
                                    isFenzhi: api.pageParam.isFenzhi,
                                    fz:api.pageParam.fz,
                                },
                                bounces: false
                            });
                        }
                        api.openFrameGroup({
                            name: 'frame_Marking_group',
                            url: 'frame_studentpage.html',
                            rect: {
                                x: x,
                                y: y+40,
                                w: 700,
                                h: 320
                            },
                            frames: frames,
                            index:vm.current,
                            preload: 0,
                        },function (ret, err) {
                            if (ret) {
                                vm.funActive(ret.index);
                                var itemWidth = vm.answersSort.length * 64;
                                if(itemWidth >= 700){
                                    $api.css($api.dom('.scroll'), 'width:' + itemWidth + 'px;');
                                }else {
                                    $api.css($api.dom('.scroll'), 'width:700px;');
                                }
                                if (vm.current > 10) {
                                    $api.dom('.content').scrollLeft = (vm.current - 4) * 64;
                                } else {
                                    $api.dom('.content').scrollLeft = 0;
                                }
                            }
                        });
                    }
                },
                itemClick: function (context) {
                    var id = $api.attr(context, 'id');
                    api.setFrameGroupIndex({
                        name: 'frame_Marking_group',
                        index: id
                    });
                },
                funActive: function (index) {
                    vm.current = index;
                },
                closeWin: function () {
                    api.closeWin();
                },
                closeFrame:function () {
                    if(vm.answersSort.length ==0){
                        api.closeFrame({
                            name: 'frame_studentpage'
                        });
                        api.closeFrame({
                            name: 'frame_student'
                        });
                    }else {
                        api.closeFrameGroup({
                            name: 'frame_Marking_group'
                        });
                        api.closeFrame({
                            name: 'frame_student'
                        });
                        api.closeFrame({
                            name: 'frame_studentpage'
                        });
                    }
                }
            }
        });
    }

    function GetcorrectAnswerOptionStudents() {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        apiObj.Get(UrlRouter.GetcorrectAnswerOptionStudents, {
            values: {
                tuid: api.pageParam.tuid, //获取hwid
                hwid: api.pageParam.hwid, //获取hwid
                classid: api.pageParam.classid,
                xtid: api.pageParam.xtid,
                ytlx: api.pageParam.ytlx,
                leaderuid: $api.getStorage('uid'),
                tx_code:api.pageParam.tx_code,
                is_auto:'0',
//                            sort: api.pageParam.sortArr[api.pageParam.index],
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {
                    vm.yipiList = ret.data.ypList;
                    vm.daipiList = ret.data.dpList;
                    vm.daipiNum = ret.data.dpList.length;
                    vm.yipiNum = ret.data.ypList.length;

                } else {
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'middle'
                    });
                }
            } else {
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'middle'
                });
            }
        })
    }
