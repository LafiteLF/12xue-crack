<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <meta name="format-detection" content="telephone=no"/>
    <title>待批习题列表</title>
    <link rel="stylesheet" href="../../../../css/publicCss.css">
    <link rel="stylesheet" href="../../../../css/frameDetail.css">
    <style>

        html,body{
           background-color: rgba(0, 0, 0, 0);
        }

        .content {

            border: 0 solid #e4e4e8; !important;
        }


        .markingBottom {
            position: fixed;
            bottom: 0;
            background: rgba(0, 0, 0, 0);
            width: 100%;
            height: 60px;
            /*opacity: 0.9;*/
        }

        .markingBottom ul {
            float: left;
            padding-left: 10px
        }

        .markingBottom ul li {
            padding: 12px 12px;
            float: left;
            padding-top: 13px;
        }

        .markingBottom ul li img {
            width: 34px;
            height: 34px;
        }

        .markingButton {
            width: 120px;
            height: 60px;
            border-left: 1px solid #d3d3d3;
            float: right
        }

        .markingButton p {
            width: 50%;
            float: left;
            text-align: center
        }

        .markingButton p img {
            width: 25px;
            display: block;
            margin: 0 auto;
            margin-top: 10px;
            font-size: 1.2rem;
            margin-bottom: 5px
        }

        .content {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: rgba(0, 0, 0, 0.6);
        }


    </style>
</head>
<body>
