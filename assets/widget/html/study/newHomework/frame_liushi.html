<script>
    const mathCache = new Map();
    const renderMath = (text, displayMode) => {
        const cacheKey = `${text}-${displayMode}`;
        if (mathCache.has(cacheKey)) {
            return mathCache.get(cacheKey);
        }
        try {
            const result = katex.renderToString(text, {
                displayMode,
                throwOnError: false,
                strict: 'ignore'
            });
            mathCache.set(cacheKey, result);
            return result;
        } catch (err) {
            console.error('KaTeX 渲染错误:', err);
            return text;
        }
    };
    const createMathExtension = (name, level, patterns, displayMode) => {
        return {
            name,
            level,
            start(src) {
                const indices = patterns.map(pattern => src.indexOf(pattern.start));
                const validIndices = indices.filter(index => index !== -1);
                return validIndices.length > 0 ? Math.min(...validIndices) : -1;
            },
            tokenizer(src) {
                for (const pattern of patterns) {
                    // 跳过转义的开始标记
                    if (src.startsWith(pattern.escape)) continue;

                    const match = pattern.regex.exec(src);
                    if (match) {
                        return {
                            type: name,
                            raw: match[0],
                            text: match[1].trim(),
                        };
                    }
                }
            },
            renderer(token) {
                return renderMath(token.text, displayMode);
            }
        };
    };
    const blockPatterns = [
        {start: '$$', escape: '\\$$', regex: /^\$\$(.*?)\$\$/s},
        {start: '\\[', escape: '\\\\\\[', regex: /^\\\[(.*?)\\\]/s}
    ];
    const inlinePatterns = [
        {start: '$', escape: '\\$', regex: /^\$(.*?)\$/},
        {start: '\\(', escape: '\\\\\\(', regex: /^\\\((.*?)\\\)/}
    ];
    marked.use({
        extensions: [
            createMathExtension('mathBlock', 'block', blockPatterns, true),
            createMathExtension('mathInline', 'inline', inlinePatterns, false)
        ]
    });
</script>

    async function PostDta() {
        const outputElement = document.getElementById('output');

        let imagePaths = api.pageParam.imagePaths || [];
        urlPicList = [];
        for (let i = 0; i < imagePaths.length; i++) {

图中是一道习题，包括题干和答案，请根据图片中的题目以及正确答案,帮我有条理且简洁地分析下这道题的解题思路,注意一定要精炼！公式必须用$$包裹
`

            }]
        });
        for (let i = 0; i < urlPicList.length; i++) {
            messages[0].content.push({
                    type: 'image_url',
                    image_url: urlPicList[i]
                }
            );
        }
        const body = {
            stream: true,
            message: messages,
            type: 'Ai_liushi',
            options: {
                model: 'ep-20250827162306-cwrh9',
                thinking: {
                    type: "disabled"
                },
            }
        }
        console.log(JSON.stringify(body));
        // 定义请求体
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'token': $api.getStorage('token'),
            },
            body: JSON.stringify(body)
        });
        // 流式数据处理
        const reader = response.body.getReader();
        console.log('reader', reader);

        const decoder = new TextDecoder();
        while (true) {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
                window.scrollTo(0, document.body.scrollHeight);
            }
            const {done, value} = await reader.read();

            }
            const chunk = decoder.decode(value);
            chunk.split('\n').forEach(line => {

                        const data = JSON.parse(line.slice(6));

                        // console.log(result);
                        const finalHtml = marked.parse(result);
                        // console.log(finalHtml);
                        outputElement.innerHTML = finalHtml;
                    } catch (e) {
                    }
                }
            });
        }
    }

    // 添加模拟流式输出函数
    function simulateStreamOutput(text) {
        const outputElement = document.getElementById('output');
        let index = 0;
        const interval = 20; // 每个字符的输出间隔，20
        var memText = '';

        function outputNextChar() {

            if (index < text.length) {
                memText += text[index];
                outputElement.innerHTML = marked.parse(memText);
                index++;
                setTimeout(outputNextChar, interval);
            } else {
                // 文本全部输出完成后，统一处理数学公式
                outputElement.innerHTML = marked.parse(memText);
                // 显示播放按钮
                document.querySelector('.audio-btn').style.display = 'flex';
                if (!api.pageParam.classroom) {
                    document.querySelector('.assistant-btn').style.display = 'flex';
                }
            }
            //如果当前处于页面最下方附近，则页面滑动至最下方
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        outputNextChar();
    }

                        }
                    });
                }
                while (!isCompleted) {
                    try {
                        const ret = await new Promise((resolve, reject) => {
                            apiObj.Post(UrlRouter.GetDeepSeekDajxVoice, {
                                values: {
                                    content: result1,
                                    xtid: api.pageParam.xtid,
                                    qid: $api.getStorage('uid')
                                }
                            }, (ret, err) => {
                                if (ret) {
                                    resolve(ret);
                                } else {
                                    reject(err)
                                }
                            })
                        });

                        switch (ret.code) {
                            case -1:
                                api.toast({
                                    msg: "此题暂不支持音频播放~",
                                    duration: 2000,
                                    location: 'middle'
                                });
                                isCompleted = true;
                                break;
                            case 0:
                                break;
                            case 1:
                                await PostAiCot(ret.url);
                                getVoice = ret.url;
                                await playAudio(ret.url);
                                isCompleted = true;
                                if (!canAutoPlay) {
                                    api.stopPlay();
                                    audioIcon.src = '../../../image/newhomework/yuyin1.png';
                                    isPlaying = false;
                                }
                                break;
                            default:
                                throw new Error("生成失败")
                        }
                        await new Promise(resolve => setTimeout(resolve, 2000));
                    } catch (err) {
                        isCompleted = true;
                        api.toast({
                            msg: "音频生成失败",
                        });
                        console.log("语音生成失败", err);
                    }
                }

                toggleAudio.isGenerating = false;
            }
        } else {
            audioIcon.src = '../../../image/newhomework/yuyin1.png';
            isPlaying = false;
            api.stopPlay();
        }
    }

    async function playAudio(url) {
        const fileName = `audio_${api.pageParam.xtid}.mp3`;
        const filePath = api.cacheDir + '/' + fileName;
        const audioIcon = document.getElementById('audioIcon');
        try {
            // 下载音频文件
            const ret = await new Promise((resolve, reject) => {
                api.download({
                    url: url,
                    savePath: filePath,
                    report: false,
                    cache: false,
                    allowResume: true
                }, function (ret, err) {
                    if (ret) resolve(ret);
                    else reject(err);
                });
            });
            if (ret.state !== 1) {
                console.log(JSON.stringify(ret));
                api.toast({msg: "音频文件下载失败"});
                return
            }
            isPlaying = true;
            audioIcon.src = '../../../image/newhomework/yuyin2.gif';
            api.startPlay({path: filePath}, function (ret, err) {
                if (ret) {
                    api.toast({msg: '播放完成'});
                    audioIcon.src = '../../../image/newhomework/yuyin1.png';
                    isPlaying = false;
                } else {
                    api.alert({msg: JSON.stringify(err)});
                    console.log(JSON.stringify(err));
                    isPlaying = false;
                }
            });

        } catch (err) {
            console.log(err);
            api.toast({msg: '音频播放失败'});
            isPlaying = false;
        }
    }

    async function PostAiCot(url) {
        // const result = document.getElementById('output').textContent;
        getText = result; // 更新 getText 变量
        const audioIcon = document.getElementById('audioIcon');
        // 调用语音合成接口
        const ret = await new Promise((resolve, reject) => {
            apiObj.Post(UrlRouter.PostDeepseekAddCot, {
                values: {
                    xtid: api.pageParam.xtid,
                    dajx_cot: result,
                    dajx_url: url
                }
            }, function (ret, err) {
                if (ret) {
                    resolve(ret);
                } else {
                    reject(err);
                }
            });
        });

        if (ret.ret == 0) {
            document.querySelector('.audio-btn').style.display = 'flex';
        } else {
            api.toast({
                msg: '频率过高或次数受限，AI解析失败。',
                duration: 2000,
            });
            // closeFrame();
        }

    }

    function closeFrame() {
        setTimeout(() => {
            api.closeFrame({
                name: 'frame_liushi'
            });
        }, 500);
    }
</script>
