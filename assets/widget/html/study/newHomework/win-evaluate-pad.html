    apiready = function () {
        var header = document.querySelector('header');
//        //$api.fixStatusBar(header);
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        var header = document.querySelector('header');
        var headerH = $api.offset(header).h;
        api.openFrame({
            name: 'frame-evaluate-pad',
            url: 'frame-evaluate-pad.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: padWinHeight - headerH
            },
            pageParam: {remark: api.pageParam.remark, content: api.pageParam.content },
            bounces: false
        });

    };

</script>
