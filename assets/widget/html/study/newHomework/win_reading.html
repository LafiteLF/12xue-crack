<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>录音</title>
    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>
</head>
<body>
<header class="clearfix">
    <div onclick=" closeWin();" class="winTitle pull_left">
        录音
    </div>
</header>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript" src="../../../script/common.js"></script>
<script type="text/javascript" src="../../../script/fastclick.js"></script>
<script type="text/javascript">
    apiready = function () {
        var header = document.querySelector('header');
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });

        if(api.systemType == 'ios'){
            api.openFrame({
                name: 'frame_reading3',
                url: 'frame_reading3.html',
                rect: {
                    x: 0,
                    y: headerH,
                    w: api.winWidth,
                    h: frameH
                },
                pageParam: {index: api.pageParam.index,isform:api.pageParam.isform,tg:api.pageParam.tg},
//            bounces: true
            });
        }else {

            // if($api.getStorage('schoolid') == '1034145741227351904'||$api.getStorage('schoolid') == '1034145741227351082'){
            if(true){
                api.openFrame({
                    name: 'frame_reading',
                    url: 'frame_reading.html',
                    rect: {
                        x: 0,
                        y: headerH,
                        w: api.winWidth,
                        h: frameH
                    },
                    pageParam: {index: api.pageParam.index,isform:api.pageParam.isform,tg:api.pageParam.tg},
                });
            }else {
                api.openFrame({
                    name: 'frame_reading2',
                    url: 'frame_reading2.html',
                    rect: {
                        x: 0,
                        y: headerH,
                        w: api.winWidth,
                        h: frameH
                    },
                    pageParam: {index: api.pageParam.index,isform:api.pageParam.isform,tg:api.pageParam.tg},
//            bounces: true
                });
            }



        }



        // Android按返回键关闭页面时结束自定义页面统计
        api.addEventListener({
            name:'keyback'
        },function(ret,err){
            closeWin();
        });
    };
    function closeWin() {
        api.sendEvent({
            name: 'closeReading'
        });
    }
</script>
</html>
