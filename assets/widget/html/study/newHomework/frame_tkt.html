        successCount: 0

    var moduleDialog = null;//弹窗模块bhzparam

    apiready = function () {
        if(api.systemType == 'ios'){
            $api.dom('#tixingziUl').style.position = 'absolute';
        }
        moduleDialog = api.require('moduleDialog');
        moduleImageScale = api.require('moduleImageScale');

        if (vm.complete != 2) {
            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]' || typeof (api.pageParam.queryHomewokAnswer) == 'undefined') {

            } else {
                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));

        }
        vm.huakuai();
        vm.GetParentexercisesUrl();//获取作业习题详情及答题结果
        api.addEventListener({// 滑动暂停音频
            name: 'yinpinCLose'
        }, function (ret, err) {
            api.stopPlay();
            $('.img1').show();
            $('.img2').hide();
        });
        api.addEventListener({// 裁剪图片保存
            name: 'cutPicture' + api.frameName
        }, function (ret, err) {
            var src = ret.value.src;
            var tkindex = ret.value.tkindex;
            vm.compressImage(tkindex, src);
            api.closeFrame({
                name: 'frame_cutPicture'
            });
        });
        api.addEventListener({// 画板
            name: 'DrawingBoardImg'
        }, function (ret, err) {
            if (ret.value.name == api.frameName && ret.value.type == 'huaban') {
                var imgsrc = ret.value.imgsrc;
                var xtindex = ret.value.tkindex;
                if (vm.answer[xtindex].is_txt == 1) {
                    vm.answer[xtindex].is_txt = 0;
                    vm.answer[xtindex].descript = [];
                } else {
                    vm.answer[xtindex].is_txt = 0;
                }
                vm.answer[xtindex].is_unable = 0;
                vm.qiniuUpfile(xtindex, imgsrc);
                api.closeWin({
                    name: 'Drawing_board'
                });
            }
        });
        if (vm.complete == 2) {//答完题显示总分
            vm.type = api.pageParam.type;
            vm.scorelist = api.pageParam.scorelist;
        }

        if (isfirst == 1) {
            var db = api.require('db');
            var ret = db.openDatabaseSync({
                name: dbName,
                path: 'fs://student_12xue.db'
            });
            var returnDatatime = db.selectSqlSync({//查询作业时间
                name: dbName,
                sql: 'SELECT * FROM NewHomeWrokTime where uid=' + $api.getStorage('uid') + ' and kcid=' + vm.material.hwid + ' and zyid=' + vm.material.zyid + ' and xsbjid=' + vm.homeworkListData.bjid
            });
            // alert('returnDatatime'+JSON.stringify(returnDatatime))
            if (JSON.stringify(returnDatatime.data) == '[]') {
                allTime = 0;
            } else {
                allTime = parseInt(returnDatatime.data[0].time);
            }
            newtimejs = setInterval(function () {
                actionTime++;
            }, 1000);
        }
        api.addEventListener({//记录时间开始
            name: 'kshomeworkSetTimeout'
        }, function (ret, err) {
            if (ret.value.index == vm.index) {
                if (isfirst == 0) {
                    var db = api.require('db');
                    var ret = db.openDatabaseSync({
                        name: dbName,
                        path: 'fs://student_12xue.db'
                    });
                    var returnDatatime = db.selectSqlSync({//查询作业时间
                        name: dbName,
                        sql: 'SELECT * FROM NewHomeWrokTime where uid=' + $api.getStorage('uid') + ' and kcid=' + vm.material.hwid + ' and zyid=' + vm.material.zyid + ' and xsbjid=' + vm.homeworkListData.bjid
                    });
                    // alert('returnDatatime'+JSON.stringify(returnDatatime))
                    if (JSON.stringify(returnDatatime.data) == '[]') {
                        allTime = 0;
                    } else {
                        allTime = parseInt(returnDatatime.data[0].time);
                    }
                    newtimejs = setInterval(function () {
                        actionTime++;
                    }, 1000);
                }
            } else {
                isfirst = 0;
                clearInterval(newtimejs);
                allTime = allTime + actionTime;
                actionTime = 0;
            }
        });
    };

                    ]
                },
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');
                    $api.domAll('a')[i].onclick = function () {

                    }
                }
            },
            methods: {
                showScore: function (list) {
                    var allscore = 0;
                    for (var i = 0; i < list.length; i++) {
                        allscore = allscore + Number(list[i]);
                        if (i + 1 == list.length) {
                            return vm.number_analysis(allscore);
                        }
                    }

                },
                number_analysis: function (number, bit) {
                    /**
                     * number_format
                     * @param number 传进来的数,
                     * @param bit 保留的小数位,默认保留两位小数
                     */
                    if (vm.is_empty(number)) {
                        return number;
                    }
                    //设置接收参数的默认值
                    bit = bit ? bit : 1;

                    var str = '';
                    number = Number(number);
                    number = (number).toFixed(bit);//格式化
                    var realnum = number.split('.')[0];//整数位(使用小数点分割整数和小数部分)
                    var decimal = number.split('.')[1];//小数位
                    //重新拼接实数部分和小数位
                    if (parseInt(decimal) > 0)
                        realnum = realnum + '.' + decimal;
                    return realnum;
                },
                is_empty: function (data) {
                    /**
                     * 判断对象或字符串是否为空
                     * @param data
                     * @author 邹峰
                     * @time 2017年07月24日15:44:24
                     * @return {boolean}
                     */
                    if (typeof data === 'undefined') {
                        return true;
                    } else if (typeof data === 'string' && (data === '' || data === '0' || data === 'null')) {
                        return true;
                    } else if (typeof data === 'object') {
                        for (var name in data) {
                            return false;
                        }
                        return true;
                    } else if (data instanceof Array) {
                        if (data.length === 0) return true;
                    } else if (typeof data === 'boolean') {
                        return !data;
                    } else if (data === null || data === 'null') {
                        return true;
                    } else if (data === 0 || data === '0') {
                        return true;
                    }
                    return false;
                },
                videoZYPlay: function (context) {
                    var url = $api.attr(context, 'url');
                    var filetime = $api.attr(context, 'filetime');
                    api.openWin({
                        name: 'win_video_view',
                        url: '../../win_video_view.html',
                        slidBackEnabled: false,
                        pageParam: {
                            path: url,
                            title: '',
                            isMp3: false,
                            filetime: filetime
                        }
                    });
                },
                xtzongfen: function (xtzf, xtnum, xtindex) {
                    var b = Math.floor((xtzf * 10) / xtnum) / 10;
                    if (xtindex + 1 == xtnum) {
                        var last = xtzf - (b * (xtnum - 1));
                        if (last.toString().split('.')[1] > 0) {
                            last = last.toFixed(1)
                        } else {
                            last = last.toFixed(0)
                        }
                        return last
                    } else {
                        return b;
                    }
                },
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },

                    var xtid = vm.material.zyid;

                    var kcid = vm.material.hwid;

                        rect: {

                huakuai: function () {
                    var tktcontent = document.getElementById('tkt_content'); //长线条
                    var right = document.getElementById('right'); //小方块
                    var left = document.getElementById('left');
                    var huakuai = document.getElementById('huakuai');
                    var ifBool = false; //判断鼠标是否按下
                    //鼠标按下方块
                    huakuai.addEventListener("touchstart", function (e) {
                        e.stopPropagation();
                        ifBool = true;
                    });
                    //拖动
                    window.addEventListener("touchmove", function (e) {
                        if (ifBool) {
                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x
                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标
                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值
                            if (minDiv_left >= tktcontent.offsetWidth - 15) {
                                minDiv_left = tktcontent.offsetWidth - 15;
                            }
                            //设置拖动后小方块的left值
                            var rightwidth;
                            var leftwidth;
                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {
                                rightwidth = $(window).width() * 0.7 + 37;
                                leftwidth = $(window).width() * 0.3 - 53;
                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {
                                rightwidth = $(window).width() * 0.4 + 37;
                                leftwidth = $(window).width() * 0.6 - 53;
                            } else {
                                rightwidth = $(window).width() - minDiv_left;
                                leftwidth = minDiv_left + 12
                            }
                            right.style.width = rightwidth + "px";
                            left.style.width = leftwidth + "px";
                        }
                    });
                    //鼠标松开
                    window.addEventListener("touchend", function (e) {
                        ifBool = false;
                    });

                    //获取元素的绝对位置
                    function getPosition(node) {
                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left
                        var top = node.offsetTop;
                        current = node.offsetParent; // 取得元素的offsetParent
                        // 一直循环直到根元素
                        while (current != null) {
                            left += current.offsetLeft;
                            top += current.offsetTop;
                            current = current.offsetParent;
                        }
                        return {
                            "left": left,
                            "top": top
                        };
                    }
                },

                        }).catch(error => {
                            api.toast({
                                msg: '截图失败：' + error,
                                duration: 2000,
                                location: 'bottom'
                            });
                        });
                    });
                },
            }
        });
    }

        if (src.substring(src.length - 3) == 'gif') {
        } else {

    function dismissDialog() {

    function showImage(context) {
        if ($api.getStorage('padType') != '1') {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    $(context).attr('fdsrc')
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
            return
        }
        var url = $(context).attr('fdsrc');
        var index = $(context).attr('id');
        var topindex = $(context).attr('topid');
        var param = {"deviceType": "deviceType_pad", "url": url};
        moduleImageScale.showImage(param, function (ret, err) {
            if (ret) {
                if (ret.state == "success" && ret.clickID == 'clickID_close') {
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_save') {
                    vm.qiniuUpfile(topindex, ret.imageSavePath, 'modulesave', index);
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_delete') {
                    vm.answer[topindex].descript.splice(index, 1);
                    vm.saveAnswer(vm.answer);
                    moduleImageScale.dismissImage();
                }
            } else {
                alert(JSON.stringify(err));
            }


        });

    }
