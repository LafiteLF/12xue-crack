<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"><meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        html, body {
            background-color: rgba(0, 0, 0, 0.0);
        }

        .show {
            position: absolute;
            color: #000;
            top: 0;
            width: 70%;
            /*background-color: white;*/
            text-align: center;
            margin-left: 15%;
            margin-right: 15%;
            margin-top: 15%;
            padding: 1.5rem 0;
            /*border-radius: 0.4rem;*/
        }
        .img {
            text-align: center;
        }
    </style>
</head>
<body>
<div class="show">
    <div class="img">
        <img src="../../../image/yuyin.gif" alt="" style="width: 30%">
    </div>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/hammer.min.js"></script>
<script type="text/javascript" src="../../../script/common.js"></script>
<script type="text/javascript" src="../../../script/fastclick.js"></script>
<script type="text/javascript">
    var path = '';
    var beforeload;
    var afterload;
    var seconds;

    apiready = function () {

//        var hammertime = new Hammer($api.dom('body'));
//        hammertime.on("swipeleft",function (ev) {
//            alert(1111);
//            api.sendEvent({
//                name: 'closeYuYinFrame',
//                extra: {key1: 'value', key2: 'value'}
//            });
//        })
        api.addEventListener({
            name: 'closeYuYinFrame'
        }, function (ret, err) {
            api.closeFrame({
                name: 'frame-yuyin-record-pad'
            });
        });

        beforeload = (new Date()).getTime();

        path = "/audio/" + new Date().getTime() + ".amr";
        api.startRecord({
            path: 'fs:/' + path
        });

        api.addEventListener({
            name: 'stopRecordForTiWen'
        }, function (ret, err) {
            api.stopRecord(
                    function (ret, err) {
                        if (ret) {
                            afterload = (new Date()).getTime();
                            seconds = (afterload-beforeload) / 1000;
                            api.sendEvent({
                                name: 'audio',
                                extra: {
                                    path: path,
                                    seconds: seconds.toFixed(1)

                                }
                            });
                            api.closeFrame({
                                name: 'frame-yuyin-record-pad'
                            });
                        }
                    }
            );
        });


    };

    function onClick(position, context) {
        switch (position) {
            case 1:// 开始  取消
                var text = $api.text(context);
                switch (text) {
                    case "开始":
                        beforeload = (new Date()).getTime();

                        path = "/audio/" + new Date().getTime() + ".amr";
                        api.startRecord({
                            path: 'fs:/' + path
                        });
                        var text = $api.text(context, "取消");
                        break;
                    case "取消":
                        api.stopRecord(
                                function (ret, err) {
                                    if (ret) {
                                        api.sendEvent({
                                            name: 'audio',
                                            extra: {
                                                path: path,
                                                seconds:0
                                            }
                                        });
                                        api.closeFrame({});
                                    }
                                }
                        );
                        var text = $api.text(context, "开始");
                        break;
                }
                break;
            case 2:// 结束
                api.stopRecord(
                        function (ret, err) {
                            if (ret) {
                                afterload = (new Date()).getTime();
                                seconds = (afterload-beforeload) / 1000;
                                api.sendEvent({
                                    name: 'audio',
                                    extra: {
                                        path: path,
                                        seconds: seconds.toFixed(1)

                                    }
                                });
                                api.closeFrame({});
                            }
                        }
                );
                break;
        }
    }

</script>
</html>
