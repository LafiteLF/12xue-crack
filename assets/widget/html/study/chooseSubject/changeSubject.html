<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>选课</title>
    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>
    <style>
        * {
            box-sizing: border-box
        }


        html,body,.reading_main {
            background: rgba(226, 204, 204, 0)
        }

        .reading_main {
            height: calc(100% - 110px);
            padding: 20px;
            /*min-width:660px;*/

        }

        .tijiao {
            font-size: 1.8rem;
            color: #fff;
            height:50px; line-height:50px;
            padding: 0 40px;
            border: none;
            border-radius: 200px;
            background-color: #ccc;
            width: 200px;
            position: fixed;
            margin: auto;
            bottom: 15px;
            left: 0;
            right: 0;
        }

        .zhu {
            font-size: 1.2rem;
            color: #ff778c;
            text-align: center;
            height: 20px;
            line-height: 20px;
        }

        .subject {
            height: calc(100% - 20px);
            width: 100%;
            display: flex
        }

        .subject_zoom {
            flex: 1;
        }

        .subject_zoom dd {
            border: 1px solid #4bc7c7;
            width: 100%;
            height: 38px;
            line-height: 38px;
            color: #4bc7c7;
            text-align: center;
            font-size: 1.4rem;
            border-radius: 3px;
            margin-top: 20px;
        }

        .subject_zoom dl {
            padding-top: 15px;
            width: 90%;
            margin: 0 auto
        }

        .subject_zoom dt {
            font-size: 1.6rem;
            height: 38px;
            padding-bottom: 5px;
            color: #363636;
            text-align: center;
        }

        .active {
            background: #4bc7c7;
            color: #fff !important;
        }
        .xkok{ font-size:1.6rem; color:#363636 ;text-align: center; padding-top:40px}
        .reading_main ul{width:90%; margin:0 auto;margin-top: 20px; padding:0 10% ;padding-bottom: 40px;}
        .reading_main ul li{ float:left; width:calc(50% - 40px);margin:10px 20px ; color:#fff; background:#4bc7c7; text-align: center;     height: 38px;
            line-height: 38px; font-size: 1.4rem;}
        .changesubject{
            position:fixed;
            background: rgba(0, 0, 0, 0.6);
            left:0;top:0; right:0; bottom:0;
            z-index:5;
        }
        .change_main{
            width:70%; height:80%;background:#fff; position:absolute;left:15%;top:10%; border-radius: 10px;
            padding:20px;
            display:flex
        }
        .changebutton{ position:absolute; bottom:20px; text-align: center; width:100%}
        .changebutton li{ display:inline-block; width:100px; height:40px; line-height:40px; text-align:center; color:#fff; background:#4bc7c7; font-size:1.6rem; margin:0 20px; border-radius:100px}
        [v-cloak] {
            display: none;
        }
    </style>
</head>
<body>
<div class="main" v-cloak="">
    <div class="changesubject"  v-if="isshow" >
        <div class="change_main">
            <div class="subject_zoom" v-for="(all,allindex) in subjectList">
                <dl>
                    <dt v-text="allindex==1?'选课更改':''"></dt>
                    <dd v-for="list in all" :id="list.id"
                        @click="chooseSubject(allindex,list)"
                        :class="isactive(allindex,list)?'active':''"

                    >
                        <span v-if="allindex==0" v-for="(item,index) in list.arr">
                            {{ index != 0 ? '+' + item.name : item.name }}
                        </span>
                        <span v-if="allindex!=0">
                           {{ list.name }}
                        </span>
                    </dd>
                </dl>
            </div>
            <ul class="changebutton">
                <li @click="cancel">取消</li>
                <li @click="sure">确定</li>
            </ul>
        </div>
    </div>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;

    apiready = function () {
        vue();
        vm.selectThree=api.pageParam.selectThree;
        vm.selectTwo=api.pageParam.selectTwo;
        vm.selectOne=api.pageParam.selectOne;
        vm.tjid=api.pageParam.tjid
    };

    function vue() {
        vm = new Vue({
            el: '.main',
            data: {
                isshow:false,
                subjectList: [[
                    {
                        id: 'zuhe1',
                        arr: [
                            {name: '语文', id: 1071},
                            {name: '数学', id: 2099},
                            {name: '英语', id: 2887},
                        ]
                    },
                    {
                        id: 'zuhe2',
                        arr: [
                            {name: '语文', id: 1071},
                            {name: '数学', id: 2099},
                            {name: '日语', id: '1033147248583893650'},
                        ]
                    }
                ], [
                    {name: '物理', id: 3863},
                    {name: '历史', id: 243}
                ], [
                    {name: '化学', id: 1},
                    {name: '生物', id: '3599'},
                    {name: '思想政治', id: 7348},
                    {name: '地理', id: 3248}
                ]],
                selectThree:{},
                selectTwo:[],
                selectOne:{},
                tjid:''
                // yssj:{}//取消保存，保存之前的信息
            },
            updated: function () {

            },
            computed:{
                isinput(){
                    if(this.selectTwo.length==2 && vm.selectThree.id &&vm.selectOne.id){
                        return true
                    }
                }
            },
            mounted() {
                this.isshow=true
            },
            methods: {
                PostSelectCourse: function (xkid) {//修改精品套题提交状态
                    api.showProgress({
                        title: '加载中',
                        text: '请稍后...',
                        modal: true
                    });
                    var id='';
                    if(api.pageParam.id && api.pageParam.id!=''){
                        id=api.pageParam.id
                    }else{
                        id=vm.tjid
                    }
                    // alert(id)
                    apiObj.Post(UrlRouter.PostSelectCourse, {
                        values: {
                            gradeid: api.pageParam.gradeid,
                            xkids: xkid.toString(),
                            schoolid:api.pageParam.schoolid,
                            uid: $api.getStorage('uid'),
                            id: id,
                        }
                    }, function (ret, err) {
                        api.hideProgress();
                        if (ret) {
                            if (ret.ret == 0) {
                                api.hideProgress();
                                api.toast(
                                    {
                                        msg: '修改成功',
                                        duration: 2000,
                                        location: 'middle'
                                    }
                                )
                                api.sendEvent({
                                    name: 'istijiao',
                                    extra: {
                                        selectThree: vm.selectThree,
                                        selectTwo: vm.selectTwo,
                                        selectOne: vm.selectOne,
                                        tjid:ret.data.insertId
                                    }
                                });
                                api.closeFrame();

                            } else {
                                api.toast(
                                    {
                                        msg: ret.msg,
                                        duration: 2000,
                                        location: 'middle'
                                    }
                                )
                            }
                        } else {
                            api.toast(
                                {
                                    msg: err.msg,
                                    duration: 2000,
                                    location: 'middle'
                                }
                            )
                        }

                    })
                },
                cancel(){
                    api.closeFrame();

                },
                sure(){
                    if(vm.selectTwo.length==2 && vm.selectThree.id &&vm.selectOne.id){
                        var arr=[]
                        for(var i=0;i<vm.selectThree.arr.length;i++){
                            arr.push(vm.selectThree.arr[i].id)
                        }
                        for(var i=0;i<vm.selectTwo.length;i++){
                            arr.push(vm.selectTwo[i].id)
                        }
                        arr.push(vm.selectOne.id)
                        vm.PostSelectCourse(arr)

                    }else{
                        api.toast(
                            {
                                msg: '请完善选课信息',
                                duration: 2000,
                                location: 'middle'
                            }
                        )
                    }
                },
                isactive:function (num,list){
                    switch (num){
                        case 0:
                            if(vm.selectThree.id&& vm.selectThree.id==list.id){
                                return true;
                            }
                            break;
                        case 1:
                            if(vm.selectOne.id && vm.selectOne.id==list.id){
                                return true
                            }
                            break;
                        case 2:
                            // alert(JSON.stringify('LIST'+JSON.stringify(list)))
                            if(vm.selectTwo){
                                if(vm.inarray(vm.selectTwo,list)){
                                        return true
                                }
                            }

                            break;

                    }
                },
                inarray:function (arr,list){
                    for (var i=0;i< vm.selectTwo.length;i++) {
                        if (vm.selectTwo[i].id == list.id) {
                            return i+1;
                        }
                    }
                    return false;
                },
                chooseSubject: function (num, list) {

                    switch (num){
                        case 0:
                            vm.selectThree=list
                            break;
                        case 1:
                            vm.selectOne=list;
                            break;
                        case 2:

                            if(vm.inarray(vm.selectTwo,list)){
                                vm.selectTwo.splice(vm.inarray(vm.selectTwo,list)-1,1)
                            }else{
                                        if(vm.selectTwo.length<2){
                                            vm.selectTwo.push(list);
                                        }else{
                                            api.toast(
                                                {
                                                    msg: '只能选两门课哦！',
                                                    duration: 2000,
                                                    location: 'middle'
                                                }
                                            )
                                        }
                            }
                            break;
                    }

                }
            }
        });
    }

</script>
</html>
