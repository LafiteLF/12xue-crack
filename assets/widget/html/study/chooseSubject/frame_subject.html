<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>分班走班信息</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>    <style>        body{background:url(../../../image/stuHomePad/xkbj.jpg) repeat 100% 100%;}        * {            box-sizing: border-box        }        .reading_main {            background: #fff;        }        .reading_main {            min-height: calc(100% - 130px);            padding: 20px;            margin-bottom: 20px;            /*min-width:660px;*/        }        table{width:80%; margin:0 auto; border:1px solid #4bc7c7; margin-top: 30px;	border-collapse: collapse;}        tr{ height:40px ; text-align:center; font-size:1.4rem}        th{            color:#4bc7c7;background:#f3fffa;font-weight:normal;        }        th,td{ border:1px solid #4bc7c7}        /*td:nth-of-type(2){*/        /*color:#ff778c;*/        /*}*/        .xbtitle{ font-size: 2rem;text-align:center;color:#4bc7c7;margin-top:40px}        [v-cloak] {            display: none;        }    </style></head><body><div class="main" v-cloak="">    <div class="reading_main"  >        <h2 class="xbtitle">行政班级：{{ classtitle && classtitle!=''?classtitle: '分配中'}}</h2>        <table>            <tr><th>学科</th><th>上课班级</th></tr>            <tr v-for="list in subjectdata"><td>{{ list.name }}</td><td :style="list.classname?'':' color:#ff778c;'">{{ list.classname?list.classname:'分配中' }}</td></tr>        </table>    </div></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    apiready = function () {        vue();        vm.GetSelectCourseStuClassList()    };    function vue() {        vm = new Vue({            el: '.main',            data: {                isshow:false,                subjectdata:[],                classtitle:''            },            updated: function () {            },            computed:{            },            mounted() {                this.isshow=true            },            methods: {                GetSelectCourseStuClassList: function ( ) {                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: false                    });                    apiObj.SetAuthToken($api.getStorage('token'));                    apiObj.Get(UrlRouter.GetSelectCourseStuClassList, {                        values: {                            schoolid:api.pageParam.schoolid,                            uid: $api.getStorage('uid'),                            gradeid:api.pageParam.SubjectData.gradeid                        }                    }, function (ret, err) {                        if (ret) {                            api.hideProgress();                            // alert(JSON.stringify(ret))                            vm.subjectdata=ret.data.zbbj;                                vm.classtitle=ret.data.xzbj                        } else {                            api.hideProgress();                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'middle'                            });                        }                    });                },            }        });    }</script></html>
