<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>选班</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .buttonFour p {width:50px}        .buttonFour{width:70px}    </style></head><body><header class="clearfix">    <div class="main"> <div onclick="api.closeWin();" class="winTitle pull_left">        选课    </div>        <ul  v-if="istijiao" class="pull_right clearfix winIcon">            <li @click="change"   class="buttonFour font4BC7C7 answerStatistics pull_right"><p>更改</p></li>        </ul></div></header></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var moduleDialog = null;//弹窗模块    apiready = function () {        moduleDialog = api.require('moduleDialog');        dismissDialog();//关模块        vue();        var SubjectData=api.pageParam.SubjectData;        // alert(JSON.stringify(SubjectData))        if(SubjectData.xkselect.length>0){            vm.istijiao=true;            for(var i=0;i<SubjectData.xkselect.length;i++){                switch(SubjectData.xkselect[i].id+''){                    case '2887'://英语                        vm.selectThree=  {                            id: 'zuhe1',                            arr: [                                {name: '语文', id: 1071},                                {name: '数学', id: 2099},                                {name: '英语', id: 2887},                            ]                        }                        break;                    case '1033147248583893650'://日语                        vm.selectThree=  {                            id: 'zuhe2',                            arr: [                                {name: '语文', id: 1071},                                {name: '数学', id: 2099},                                {name: '日语', id: '1033147248583893650'},                            ]                        }                        break;                    case '3863'://物理                        vm.selectOne= {name: '物理', id: 3863}                        break;                    case '243'://历史                        vm.selectOne=  {name: '历史', id: 243}                        break;                    case '1'://化学                        vm.selectTwo.push({name: '化学', id: 1})                        break;                    case '3599'://生物                        vm.selectTwo.push({name: '生物', id: 3599})                        break;                    case '7348'://思想政治                        vm.selectTwo.push({name: '思想政治', id: 7348})                        break;                    case '3248'://地理                        vm.selectTwo.push({name: '地理', id: 3248})                        break;                }            }        }        api.addEventListener({            name: 'istijiao'        }, function (ret, err) {            vm.istijiao=true;            vm.selectThree=ret.value.selectThree;            vm.selectTwo=ret.value.selectTwo;            vm.selectOne=ret.value.selectOne;            vm.tjid=ret.value.tjid;        });        var header = document.querySelector('header');        var headerH = $api.offset(header).h;        var frameH = padWinHeight - headerH;        api.setStatusBarStyle({            style: 'light'        });        api.openFrame({            name: 'frame_choose_subject',            url: 'frame_choose_subject.html',            rect: {                x: 0,                y: headerH,                w: api.winWidth,                h: frameH            },            pageParam: {                gradeid:api.pageParam.SubjectData.gradeid,                selectThree:vm.selectThree,                selectTwo:vm.selectTwo,                selectOne:vm.selectOne,                isxkok: vm.istijiao,                end_time:api.pageParam.SubjectData.end_time,                schoolid:api.pageParam.schoolid            },//            bounces: true        });    };    function vue() {        vm = new Vue({            el: '.main',            data: {                istijiao:false,                selectThree: {},                selectTwo:[],                selectOne: {},                tjid:''            },            updated: function () {            },            computed:{            },            mounted() {            },            methods: {                change: function(){                    // api.sendEvent({                    //     name: 'change',                    // });                    api.openFrame({                        name: 'changeSubject',                        url: 'changeSubject.html',                        rect: {                            x: 0,                            y: 0,                            w: 'auto',                            h: api.winHeight                        },                        pageParam: {                            selectThree:vm.selectThree,                            selectTwo:vm.selectTwo,                            selectOne:vm.selectOne,                            gradeid:api.pageParam.SubjectData.gradeid,                            id:api.pageParam.SubjectData.id,                            tjid:vm.tjid,                            schoolid:api.pageParam.schoolid                        },                        bounces: false                    });                },                closeWin:function (){                    if(vm.istijiao){                        api.closeWin();                    }else{                        wdTips()                    }                }            }        });    }    function wdTips() {        var param = {            "data": [{                "viewType": 100,                "x": api.winWidth / 2 - 150,                "y": $api.getStorage('padHeight') / 2 - 75,                "h": 150,                "w": 300            }, {                "viewType": 101,                "x": api.winWidth / 2 - 150 + 30,                "y": $api.getStorage('padHeight') / 2 - 75 + 30,                "h": 48,                "w": 240,                "lineSpacting": 1.3,                "showText": "<font color='#666666'>您还没有提交选课信息，确定退出吗？退出后，您可以再次进入本页面进行选课。</font>",                "textSize": 14            },  {                "viewType": 102,                "x": api.winWidth / 2 - 150 + 159,                "y": $api.getStorage('padHeight')/ 2 - 75 + 94,                "h": 35,                "w": 100,                "clickID": "ok",                "showText": "确定",                "textSize": 14            }, {                "viewType": 102,                "x": api.winWidth / 2 - 150 + 40,                "y":$api.getStorage('padHeight')/ 2 - 75 + 94,                "h": 35,                "w": 100,                "clickID": "no",                "showText": "取消",                "textSize": 14            }]        };        moduleDialog.showDialog(param, function (ret, err) {            if (ret.state == 'success' && ret.clickID) {                if (ret.clickID == 'ok') {                    api.closeWin();                    dismissDialog();                } else {                    dismissDialog();                }                // dismissDialog();            } else {                // alert(JSON.stringify(err))            }        });    }    function dismissDialog() {        moduleDialog.dismissDialog();    }</script></html>
