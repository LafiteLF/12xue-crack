<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>口语训练 - 离线模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }

        .icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #FEE4C4 0%, #FFEDC7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .status {
            display: inline-block;
            padding: 8px 20px;
            background: #ff6b6b;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .message {
            font-size: 18px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .tips {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .tips h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .tips h3::before {
            content: "💡";
            margin-right: 8px;
            font-size: 20px;
        }

        .tips ul {
            list-style: none;
            padding: 0;
        }

        .tips li {
            font-size: 14px;
            color: #666;
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
        }

        .tips li::before {
            content: "•";
            position: absolute;
            left: 8px;
            color: #667eea;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:active {
            background: #f8f9fa;
            transform: translateY(2px);
        }

        .network-status {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }

        .network-status.online {
            color: #51cf66;
        }

        .network-status.offline {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎤</div>
        <h1>口语训练</h1>
        <div class="status" id="status">服务连接中断</div>
        
        <div class="message">
            <p>抱歉，当前无法连接到口语训练服务</p>
            <p style="font-size: 14px; color: #999; margin-top: 10px;">可能是网络问题或服务正在维护</p>
        </div>

        <div class="tips">
            <h3>您可以尝试以下操作</h3>
            <ul>
                <li>检查设备的网络连接是否正常</li>
                <li>确认 WiFi 或移动网络已开启</li>
                <li>尝试切换网络或重启路由器</li>
                <li>稍后再试，服务可能正在维护</li>
            </ul>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="retryConnection()">重新连接</button>
            <button class="btn btn-secondary" onclick="goBack()">返回首页</button>
        </div>

        <div class="network-status" id="networkStatus">
            正在检测网络状态...
        </div>
    </div>

    <script type="text/javascript" src="../../../script/api.js"></script>
    <script>
        let retryCount = 0;
        const maxRetries = 3;

        apiready = function() {
            checkNetworkStatus();
            
            // 监听网络状态变化
            api.addEventListener({
                name: 'online'
            }, function(ret, err) {
                updateNetworkStatus(true);
            });

            api.addEventListener({
                name: 'offline'
            }, function(ret, err) {
                updateNetworkStatus(false);
            });
        };

        function checkNetworkStatus() {
            const connectionType = api.connectionType;
            const isOnline = connectionType !== 'none' && connectionType !== 'unknown';
            updateNetworkStatus(isOnline);
        }

        function updateNetworkStatus(isOnline) {
            const statusEl = document.getElementById('networkStatus');
            const statusBadge = document.getElementById('status');
            
            if (isOnline) {
                statusEl.className = 'network-status online';
                statusEl.textContent = '✓ 网络已连接';
                statusBadge.textContent = '服务连接中断';
                statusBadge.style.background = '#ff6b6b';
            } else {
                statusEl.className = 'network-status offline';
                statusEl.textContent = '✗ 网络未连接';
                statusBadge.textContent = '网络离线';
                statusBadge.style.background = '#868e96';
            }
        }

        function retryConnection() {
            const connectionType = api.connectionType;
            
            if (connectionType === 'none' || connectionType === 'unknown') {
                api.toast({
                    msg: '请先检查网络连接',
                    duration: 2000,
                    location: 'middle'
                });
                return;
            }

            retryCount++;
            
            api.showProgress({
                title: '重新连接中...',
                text: '请稍候',
                modal: true
            });

            // 尝试重新打开远程服务
            setTimeout(function() {
                api.hideProgress();
                
                // 获取原始URL参数
                const apiUrlIndex = api.pageParam.apiUrlIndex || 0;
                const ruurl = apiUrlIndex == '3' ? 'http://gitcode.12xue.com:4000' : 'https://en-web.12xue.com';
                const board = $api.getStorage('oralTrainingBoard') == 'sentence' 
                    ? '/pages/html/sentences/win-sentence-main.html' 
                    : '/pages/html/word/win-main.html';
                const path = api.systemType == 'ios' 
                    ? ruurl + '/pages/html/win-intro.html' 
                    : ruurl + board;

                // 关闭当前窗口并尝试打开远程服务
                api.closeWin();
                
                api.openWin({
                    name: 'oralTraining-win-main',
                    url: path,
                    pageParam: api.pageParam,
                    slidBackEnabled: false
                });
            }, 1500);
        }

        function goBack() {
            api.closeWin();
        }

        // 自动检测网络恢复
        setInterval(function() {
            checkNetworkStatus();
        }, 5000);
    </script>
</body>
</html>
