<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>作业列表</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui-pull-refresh.css"/>
    <style>
        [v-cloak] {
            /*display: none*/
        }

        .clearfix:before,
        .clearfix:after {
            content: " ";
            display: table;
        }

        .clearfix:after {
            clear: both;
        }

        /*清除浮动*/
        .content {
            padding: 10px;
        }

        .content ul li {
            width: 25%;
            float: left;
            padding: 8px;
            position: relative;
            height: 265px;;
        }
        .content ul li .item {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 5px;
            background: #fff;
            border: 1px solid #e4e4e8;
        }

        .content ul li .item h2 {
            font-size: 0.8rem;
            padding-top: 35px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 90%;
            margin: 0 auto;
            margin-bottom: 10px;
            color: #333333;
        }

        .item p {
            color: #666666;
            font-size: 0.6rem;
            width: 90%;
            margin: 0 auto;
            line-height: 1rem;
            padding: 1px 0px;
            height: 1rem;
            overflow: hidden;

        }

        .hide {
            display: none !important;
        }

        .news {
            display: block;
            width: 56px;
            position: absolute;
            right: 0px;
            top: 0px;
        }

        .news img {
            width: 100%;
        }

        .fontcolor {
            color: #999999
        }

        .sktime {
            height: 35px !important;
            /*color: #4bc7c7 !important;*/
            /*margin-top: 13px !important;*/
            /*padding-top: 10px !important;*/
        }

        .itemlist span:nth-of-type(1) {
            display: inline-block;
            max-width: 50%;
            height: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .itemlist span:nth-of-type(2), .itemlist span:nth-of-type(3) {
            display: inline-block;
            max-width: 80%;
            height: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .itemlist2 span {
            display: inline-block;
            max-width: 49%;
            height: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .itemlist3 {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .itemlist3-one {

        }

        .itemlist3 span:nth-of-type(1) {
            display: inline-block;
            max-width: 45%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .itemlist3 span:nth-of-type(3) {
            display: inline-block;
            max-width: 45%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .itemlist4 span:nth-of-type(1) {
            display: inline-block;
            max-width: 80%;
            height: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media only screen and (min-width: 901px) and (max-width: 980px) {
            .content ul li .item h2 {
                font-size: 0.7rem;
                padding-top: 40px;
            }

            .item p {
                font-size: 0.55rem;
            }
        }

        @media only screen and (min-width: 800px) and (max-width: 900px) {
            .content ul li .item h2 {
                font-size: 0.6rem;
                padding-top: 40px;
            }

            .item p {
                font-size: 0.45rem !important;
            }
        }

        .newback {
            width: 90%;
            background-color: #fefaf2;
            padding-top: 5px;
            margin-bottom: 5px;
            margin-left: 5%;
            font-size: 14px;
        }

        .subject {
            width: calc(100% - 40px);
            display: flex;
        }

        .classhour {
            color: rgb(230, 98, 54);
            border: 1px solid rgb(245, 197, 176);
            border-radius: 4px;
            padding-left: 5px;
            padding-right: 5px;
            text-align: center;
            height: 20px;
            line-height: 20px;
        }

        .itemclick-one {
            max-width: 55%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            color:#999999;
        }
        .itemclick-one-new {
            max-width: 100%;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            color:#999999;
        }
    </style>
</head>
<body>
<section class="aui-refresh-content">
    <div class="content" v-cloak="">
        <div style="width: 30%; margin: 0 auto; padding-top: 12%; text-align: center"
             v-if="courseLists.length==0&&isNull">
            <img src="../../../image/stuHomePad/noCourse.png" style="width: 100%; max-width: 508px;">
        </div>
        <ul v-else class="clearfix">
            <li v-for="courseList in courseLists"
                @click="openHandout(courseList.id,courseList.title,courseList.bjid,courseList.schoolid)">
                <div class="item">
                    <span class="news" v-if="courseList.read==0"><img src="../../../image/stuHomePad/news.png"></span>
                    <h2 v-html="courseList.title" style="margin-top: -15px">
                    </h2>
                    <div class="newback">
                        <p class="sktime itemlist3" v-text="'上课时间：'+courseList.skrq"></p>
                        <p style="margin-top: -10px" class="itemlist3" v-if="courseList.bjname!=''">
                            <span v-text="courseList.bjname"></span>
                            <span>&nbsp;</span>
                            <span v-text="courseList.fbrxm"></span>
                        </p>
<!--                        <p style="margin-top: -10px;margin-left: 4px" class="itemlist3" v-if="courseList.bjname!=null&&courseList.fbrxm==''">-->
<!--                            <span v-text="courseList.bjname"></span>-->
<!--                        </p>-->
                        <p style="margin-top: -10px;margin-left: 10px" class="itemlist3" v-if="courseList.bjname==''&&courseList.fbrxm!=null">
                            <span v-text="courseList.fbrxm"></span>
                        </p>

                    </div>
                    <div style=" margin-left: 5%;">
                        <p class="itemlist">
                            <span class="fontcolor" v-text="courseList.njname"></span>
                            <span class="fontcolor" v-text="courseList.sxcname"></span>
                        </p>
                    </div>
                    <div style=" margin-left: 5%;">
                        <p class="itemlist4 ">
                            <span class="fontcolor" v-text="courseList.dyname"></span>
                        </p>
                    </div>
                    <div style=" margin-left: 5%;">
                        <p class="subject" style="margin-bottom: 5px"  v-if="courseList.ksname.length>0">
                            <span class="itemclick-one">{{courseList.jiename}}&nbsp;&nbsp;</span>
                            <span class="classhour" v-if="courseList.ksname.length>0">{{courseList.ksname}}</span>
                        </p>
                        <p class="subject " style="margin-bottom: 5px" v-if="courseList.ksname.length==0">
                            <span class="itemclick-one-new">{{courseList.jiename}}&nbsp;&nbsp;</span></p>
                        <p class="fontcolor itemlist3" style="font-size: 0.5rem; color: #999; height: 35px !important;  border-top: 1px dashed #c6c6c6;padding-top:5px;padding-left:5px;margin-left: 5px" v-text="'发送时间:  '+formatDataTime(courseList.fssj)"></p>
                    </div>
                </div>
            </li>
        </ul>
    </div>
</section>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript" src="../../../script/aui-pull-refresh.js"></script>
<script type="text/javascript" src="../../../script/common.js"></script>
<script type="text/javascript" src="../../../script/fastclick.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var number = 0;
    var p = 1;
    var classid;
    var xkid;
    var dyid;
    var jieid;
    var njid;
    var pullRefresh;
    var courseArr = [];
    var totalP;
    apiready = function () {
        classid = api.pageParam.classid;
        xkid = api.pageParam.xkid;
        b=api.pageParam.b;
        c=api.pageParam.c;
        // alert(a);
        // alert(b);
        // alert(c);
        vm.getCourseList(p, classid, xkid, b,c);
        api.addEventListener({
            name: 'studentLesson'
        }, function (ret, err) {
            vm.gradeData = ret.value.data;
            njid = vm.gradeData.njid;
            dyid = vm.gradeData.sxcid;
            jieid = ret.value.jieid;
        });
        api.addEventListener({
            name: 'chooseunit'
        }, function (ret, err) {
            dyid = ret.value.dyid;
            jieid = '';
            njid = ret.value.njid;
            p = 1;
            courseArr = [];
            vm.getCourseList(p, classid, xkid, njid, dyid);
        });


        // api.addEventListener({//返回刷新列表
        //     name: 'sxjylba'
        // }, function (ret, err) {
        //     courseArr = [];
        //     vm.courseLists = courseArr;
        //     clean = true;
        //     p = 1;
        //     vm.getCourseList(p, classid, xkid, njid, dyid);
        // });


        api.addEventListener({
            name: 'chooseChapter'
        }, function (ret, err) {
            p = 1;
            courseArr = [];
            jieid = ret.value.jieid;
            vm.getCourseList(p, classid, xkid, njid, dyid, jieid);
        });


        pullRefresh = new auiPullToRefresh({
            container: document.querySelector('.aui-refresh-content'),
            triggerDistance: 100
        }, function (ret) {
            if (ret.status == "success") {
                courseArr = [];
                clean = true;
                p = 1;
                vm.getCourseList(p, classid, xkid, njid, dyid, jieid);
            }
        });

        api.addEventListener({
            name: 'scrolltobottom',
            extra: {
                threshold: -100           //设置距离底部多少距离时触发，默认值为0，数字类型
            }
        }, function (ret, err) {
            p++;
            if (p > totalP) {
                api.toast({
                    msg: '已经到底啦，没有更多资源包了',
                    duration: 2000,
                    location: 'bottom'
                });
            } else {
                clean = false;
                vm.getCourseList(p, classid, xkid, njid, dyid, jieid);
            }
        });

    };

    var vm = new Vue({
        el: '.content',
        data: {
            courseLists: [],
            isNull: false,

        },
        methods: {
            gettime: function (data) {
                var d = new Date(data * 1000);
                var date = (d.getFullYear()) + "-" + (d.getMonth() + 1) + "-" + (d.getDate());
                return date;
            },
            getCourseList: function (p, classid, xkid, njid, dyid, jieid) {
                // alert(njid);
                // alert(dyid);
                // alert(jieid)
                var params = {};
                var classid = classid;

                for (var i = 0; i < classid.length; i++) {
                    params["classid[" + i + "]"] = classid[i];
                }
                params['uid'] = $api.getStorage('uid');
                params['xkid'] = xkid;
                params['njid'] = njid;
                params['sxcid'] = dyid;
                params['dyid'] = jieid;
                params['num'] = 12;
                params['p'] = p;
                api.showProgress({
                    title: '加载中',
                    text: '请稍后...',
                    modal: false
                });
                // alert(JSON.stringify(params));
                apiObj.Get(UrlRouter.GetCourseList, {
                    values: params
                }, function (ret, err) {
                    api.hideProgress();
                    pullRefresh.cancelLoading();
                    if (ret) {
                        if (ret.ret == 0) {
                            // alert(JSON.stringify(ret.data))
                            totalP = ret.totalPages;
                            courseArr = courseArr.concat(ret.data);
                            if (number == 0) {
                                vm.chooseGrade(courseArr[0]);
                            }
                            if (courseArr.length == 0) {
                                vm.isNull = true;
                                vm.courseLists = courseArr;
                            } else {
                                vm.courseLists = courseArr;
                            }
                        } else {
                            api.toast({
                                msg: ret.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    } else {
                        api.toast({
                            msg: err.msg,
                            duration: 2000,
                            location: 'bottom'
                        });
                    }
                });
            },
            openHandout: function (kcid, title, bjid, schoolid) {
                api.openWin({
                    name: 'win-handout-list',
                    url: 'win-handout-list.html',
                    pageParam: {
                        kcid: kcid,
                        title: title,
                        bjid: bjid,
                        schoolid: schoolid
                    }
                });
            },
            formatDataTime: function (updateTime) {
                var date = new Date();
                date.setTime(updateTime * 1000);
                var y = date.getFullYear();
                var m = date.getMonth() + 1;
                m = m < 10 ? ('0' + m) : m;
                var d = date.getDate();
                d = d < 10 ? ('0' + d) : d;
                var h = date.getHours();
                h = h < 10 ? ('0' + h) : h;
                var minute = date.getMinutes();
                var second = date.getSeconds();
                minute = minute < 10 ? ('0' + minute) : minute;
                second = second < 10 ? ('0' + second) : second;
                return y + '-' + m + '-' + d + ' ' + h + ':' + minute;
            },
            chooseGrade: function (data) {
                number++;
                api.sendEvent({
                    name: 'studentLesson',
                    extra: {
                        data: data
                    }
                });
            }
        }
    });
</script>
</html>
