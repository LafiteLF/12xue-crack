<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>问答题，朗读题</title>
    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/wx-audio.css"/>
    <style>
        .wdt_content{ display: none}
    </style>
</head>
<body>
<div class="kong_bg">
    <div class="cxjz">
        <div class="cxjztop clearfix">
            <img src="../../../image/newhomework/cxjz.png">
            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>
        </div>
        <div class="cxjz_button" onclick="cxjz()">重新加载</div>
    </div>
</div>
<div class="wdt_content">
    <div class="content">
        <!--题干部分开始-->
        <div class="stem">
            <ul>
                <li class="tixing clearfix">
                    <div class="tihao" v-text="(index+1)+'.'"></div>
                    <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>
                </li>
                <li  class="zsd" @click="alertzsd(data.zsdmc)">
                    <span>难易度：</span><img  class="noImgClick" :src="data.nyd==1?'../../../image/newhomework/1xing.png':data.nyd==2?'../../../image/newhomework/2xing.png':data.nyd==3?'../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{data.zsdmc}}
                </li>
            </ul>
            <div class="tg_content font666" v-html="data.tg"></div>
            <div class="ldcl" v-if="material.tx=='ldt' && data.dastr!=''">
                <h3>朗读材料：</h3>
                <p v-html="data.dastr==''?'无':data.dastr"></p>
            </div>
        </div>
        <!--题干部分结束-->
        <!--答案部分开始-->
        <dl  class="wenda_answer bgFFF">
            <dt v-if="data.sys_id!= undefined || data.sys_id" class="defen">
                <img class="noImgClick" v-if="data.is_true!=0"
                     :src="data.is_true==1?' ../../../image/newhomework/zhengque.png':data.is_true==2?'../../../image/newhomework/cuowu.png':data.is_true==3?'../../../image/newhomework/bandui.png':''">
                <span
                      :style="data.is_true==1?'color: #4bc7c7':data.is_true==2?'color: #df7605':data.is_true==3?'color: #ffcd06':''"
                      v-text="data.is_true==1?'正确':data.is_true==2?'错误':data.is_true==3?'正确率'+data.accuracy+'%':''"></span>
            </dt>
            <dd>
                <h2 class="wendah2" v-if="data.sys_id!= undefined || data.sys_id">【我的答案】</h2>
                <div v-if="material.tx=='ldt' && data.is_unable==0" class="lddayinpin clearfix">
                    <img class="scyp2 noImgClick" src="../../../image/startPlay.png" onclick="vm.ZSrecordRun(this);"
                         :playStatus='0' alt="">
                    <div class="lddaRange"><input oninput="vm.zsmonitorRange(event)" class="myRange" type="range" min="0"
                                                  value="0" :max='data.xsdaobj[0].filetime'></div>
                    <p class="ypTimeP" v-text="getTimes(data.xsdaobj[0].filetime)"></p>
                </div>
                <ul class="clearfix wendawdda">
                    <li v-for="list in data.xsdaobj"
                        v-if="material.tx!='ldt'||(material.tx=='ldt' && list.is_unable==1 )"
                        :class="list.is_unable==1?'wendazi':(list.is_txt==1 && list.is_unable==0 && !list.image)?'wendazi':list.is_txt==2?'wendayuyin imgborder':list.is_txt==3?'wendashipin imgborder':'wendatu imgborder'">
                        <p v-if="list.is_unable==1 ||(list.is_txt==1 && list.is_unable==0 && !list.image)"
                           v-html="list.is_unable==1?'未答':list.is_txt==1 && list.is_unable==0?list.descript:''"></p>
                        <p v-if="list.is_txt==0 && list.is_unable==0" v-html="list.thumbnail"></p>
                        <p v-if="list.is_txt==2 || list.is_txt==3" :url="list.serverpath+list.preview_link"
                           tapmode onclick="vm.videoZYPlay(this)" :filetime="list.filetime">
                            <img class="noImgClick" src="../../../image/bof_03.png">
                        </p>
                    </li>
                </ul>
            </dd>
            <dd  v-if="material.tx!='ldt'">
                <h2 class="wendah2" v-text="'【'+material.tx_tip+'】'">
                </h2>
                <ul>
                    <li class="wendazi" v-html="data.dastr==''?'无':data.dastr">
                    </li>
                </ul>
            </dd>
            <dd>
                <h2 class="wendah2">【答案解析】</h2>
                <ul>
                    <li class="wendazi" v-html="data.dajx==''?'无':data.dajx">
                    </li>
                </ul>
            </dd>
            <div class="jrctbkong"></div>
        </dl>
        <!--答案部分结束-->
    </div>


</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript" src="../../../script/wx-audio.js"></script>
<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    var audioStreamer;
    var timer = null;
    var allTimes = 0;
    var sec;
    var downloadPath;
    apiready = function () {
        vue();
        vm.GetParentexercisesUrl();//获取作业习题详情及答题结果
        api.addEventListener({// 滑动暂停音频
            name: 'yinpinCLose'
        }, function (ret, err) {
            if($api.domAll('.scyp2').length>=1){
                if($('.scyp2').attr('playStatus')==1){
                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');
                }
                audioStreamer = api.require('audioStreamer');
                clearInterval(timer);
                audioStreamer.pause();
                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                $api.dom('.myRange').disabled = true;
            }
        });
    };
    function vue() {
        vm = new Vue({
            el: '.wdt_content',
            data: {
                index: api.pageParam.index,//当前frame的索引
                material: api.pageParam.detailInfo,//当前习题资料
                bjid: api.pageParam.bjid,//作业列表传过来的数据
                hwid:api.pageParam.hwid,
                data: [],//作业详情
                schoolid: api.pageParam.schoolid,//学校id
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
            },
            methods: {
                alertzsd:function(content){
                    alert('知识点：'+content);
                },
                videoZYPlay: function (context) {
                    var url = $api.attr(context, 'url');
                    var filetime = $api.attr(context, 'filetime');
                    api.openWin({
                        name: 'win_video_view',
                        url: '../../win_video_view.html',
                        slidBackEnabled: false,
                        pageParam: {
                            path: url,
                            title: '',
                            isMp3: false,
                            filetime: filetime
                        }
                    });
                },
                GetParentexercisesUrl: function () {//获取作业习题详情及答题结果
                    api.showProgress({
                        title: '加载中',
                        text: '请稍后...',
                        modal: true
                    });
                    apiObj.Get(UrlRouter.GetParentexercisesUrl, {
                        values: {
                            hwid:vm.hwid,
                            uid: $api.getStorage('uid'),
                            xtid: vm.material.zyid,
                            classid: vm.bjid,
                            ytlx: 1,
                            schoolid: vm.schoolid,
                        }
                    }, function (ret, err) {
                        api.hideProgress();
                        if (ret) {
                            if (ret.ret == 0) {
                                $('.wdt_content').show();
                                $('.kong_bg').hide();
                                vm.data = ret;
                            } else {
                                $('.wdt_content').hide();
                                $('.kong_bg').show();
                            }
                        } else {
                            $('.wdt_content').hide();
                            $('.kong_bg').show();
                        }
                    })
                },
                getTimes: function (value) {
                    var secondTime = parseInt(value);// 秒
                    var minuteTime = 0;// 分
                    if (secondTime > 59) {//如果秒数大于60，将秒数转换成整数
                        //获取分钟，除以60取整数，得到整数分钟
                        minuteTime = parseInt(secondTime / 60);
                        //获取秒数，秒数取佘，得到整数秒数
                        secondTime = parseInt(secondTime % 60);
                    }
                    var result = "" + parseInt(secondTime);
                    if (minuteTime > 0 && secondTime < 10) {
                        if(minuteTime>9){
                            result =  parseInt(minuteTime) + ":0" + result;
                        }else {
                            result = "0" + parseInt(minuteTime) + ":0" + result;
                        }
                    } else if (minuteTime > 0 && secondTime >= 10) {
                        if(minuteTime>9){
                            result = parseInt(minuteTime) + ":" + result;
                        }else {
                            result = "0" + parseInt(minuteTime) + ":" + result;
                        }
                    } else if (minuteTime == 0 && secondTime < 10) {
                        result = "00" + ":0" + result;
                    } else {
                        result = "00" + ":" + result;
                    }
                    return result;
                },
                ZSrecordRun: function (context) {
                    audioStreamer = api.require('audioStreamer');
                    var playStatus = $api.attr(context, 'playStatus');
                    var bfb;
                    var recodetime;
                    if (playStatus == '0') {
                        if (timer) {
                            clearInterval(timer);
                        }
                        $api.attr(context, 'playStatus', '1');
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                        sec = 0;
                        allTimes = vm.data.xsdaobj[0].filetime;
                        recodetime = vm.data.xsdaobj[0].filetime;
                        var url = vm.data.xsdaobj[0].serverpath + vm.data.xsdaobj[0].savename;
                        var path = "/audio/" + url;
                        api.download({
                            url: url,
                            savePath: 'fs:/' + path,
                            report: false,
                            cache: false,
                            allowResume: false
                        }, function (ret, err) {
                            if (ret && ret.state == 1) {
                                timer = setInterval(function (e) {
                                    sec = sec + 1;
                                    allTimes = allTimes - 1;
                                    bfb =  sec/recodetime *100;
                                    bfb = bfb.toFixed(2);
                                    var ss = 'background-size: '+bfb + '% 100%';
                                    console.log(sec);
                                    if (allTimes == 0 || sec >= vm.data.xsdaobj[0].filetime) {
                                        clearInterval(timer);
                                        $api.attr(context, 'playStatus', '0');
                                        $api.dom('.myRange').value = 0;
                                        $api.dom('.myRange').disabled = true;
                                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                        $api.text($api.dom('.ypTimeP'), vm.getTimes(vm.data.xsdaobj[0].filetime));
                                        $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                                    } else {

                                        var range = $api.dom('.myRange');
                                        range.value = sec;
                                        range.disabled = false;
                                        range.onchange = function () {
                                            sec = parseInt(this.value);
                                            range.value = sec;
                                            allTimes = vm.data.xsdaobj[0].filetime - sec;
                                            var time = vm.getTimes(allTimes);
                                            $api.text($api.dom('.ypTimeP'), time);
                                            bfb =  sec/recodetime *100;
                                            bfb = bfb.toFixed(2);
                                            var ss = 'background-size: '+bfb + '% 100%';
                                            $api.css($api.dom('.myRange'), ss);
                                            audioStreamer.seekToTime({
                                                time: sec
                                            });
                                        };
                                        var time = vm.getTimes(allTimes);
                                        $api.css($api.dom('.myRange'), ss);
                                        $api.text($api.dom('.ypTimeP'), time);
                                    }
                                }, 1000);
                                downloadPath = api.fsDir + path;
                                if (api.systemType == 'ios') {
                                    if(downloadPath.indexOf('.mp3') != -1){
                                        audioStreamer.openPlayer({
                                            path: downloadPath,
                                        }, function (ret) {
                                            if (ret.status) {

                                            }
                                        });
                                    }else{
                                        var audioTrans = api.require('audioTrans');
                                        audioTrans.amrToWav({
                                            path: downloadPath
                                        }, function (ret) {
                                            if (ret) {
                                                var path1 = ret.path;
                                                audioStreamer.openPlayer({
                                                    path: path1,
                                                }, function (ret) {
                                                    if (ret.status) {

                                                    }
                                                });
                                            }
                                        });
                                    }

                                } else {
                                    audioStreamer.openPlayer({
                                        path: downloadPath,
                                    }, function (ret) {
                                        if (ret.status) {

                                        }
                                    });
                                }
                            }
                        });


                    } else  if (playStatus == '1'){
                        $api.attr(context, 'playStatus', '2');
                        clearInterval(timer);
                        audioStreamer.pause();
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                        $api.dom('.myRange').disabled = true;
                    }else {
                        $api.dom('.myRange').disabled = false;
                        $api.attr(context, 'playStatus', '1');
                        recodetime = vm.data.xsdaobj[0].filetime;
                        //这个是一样的  重新播放
                        if (api.systemType == 'ios') {
                            audioStreamer.resume();
                        } else {
                            audioStreamer.openPlayer({
                                path: downloadPath,
                            }, function (ret) {
                            });
                        }
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                        timer = setInterval(function (e) {
                            sec = sec + 1;
                            allTimes = allTimes - 1;
                            bfb =  sec/recodetime *100;
                            bfb = bfb.toFixed(2);
                            var ss = 'background-size: '+bfb + '% 100%';
                            console.log(sec);
                            if (allTimes == 0 || sec >= vm.data.xsdaobj[0].filetime) {
                                clearInterval(timer);
                                $api.attr(context, 'playStatus', '0');
                                $api.dom('.myRange').value = 0;
                                $api.dom('.myRange').disabled = true;
                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                $api.text($api.dom('.ypTimeP'), vm.getTimes( vm.data.xsdaobj[0].filetime));
                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                            } else {

                                var range = $api.dom('.myRange');
                                range.value = sec;
                                range.disabled = false;
                                range.onchange = function () {
                                    sec = parseInt(this.value);
                                    range.value = sec;
                                    allTimes = vm.data.xsdaobj[0].filetime - sec;
                                    var time = vm.getTimes(allTimes);
                                    $api.text($api.dom('.ypTimeP'), time);
                                    bfb =  sec/recodetime *100;
                                    bfb = bfb.toFixed(2);
                                    var ss = 'background-size: '+bfb + '% 100%';
                                    $api.css($api.dom('.myRange'), ss);
                                    audioStreamer.seekToTime({
                                        time: sec
                                    });
                                };
                                var time = vm.getTimes(allTimes);
                                $api.css($api.dom('.myRange'), ss);
                                $api.text($api.dom('.ypTimeP'), time);
                            }
                        }, 1000);
                    }
                },
                zsmonitorRange: function (event) {
                    var range = $api.dom('.myRange');
                    var recodetime = vm.data.xsdaobj[0].filetime;
                    sec = parseInt(event.target.value);
                    allTimes = parseInt(recodetime - sec);
                    var bfb = sec / recodetime * 100;
                    bfb = bfb.toFixed(2);
                    var ss = 'background-size: ' + bfb + '% 100%';
                    $api.css($api.dom('.myRange'), ss);
                    range.value = sec;
                    var time = vm.getTimes(allTimes);
                    $api.text($api.dom('.ypTimeP'), time);
                    seekToTime(sec);
                },
            }

        });
    }

    function imgClick(context) {
        var src;
        src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        if (src.substring(src.length - 3) == 'gif') {
        } else {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    src
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
        }
    }
    function dismissDialog() {
        moduleDialog.dismissDialog();
    }
    function cxjz() {
            vm.GetParentexercisesUrl()
    }

    function seekToTime(sec) {
        audioStreamer.seekToTime({
            time: sec
        });
    }


</script>
</html>
