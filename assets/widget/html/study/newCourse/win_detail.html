<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>win</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width:calc(100% - 60px);        }    </style></head><body><div class="content1"><header class="clearfix">    <div onclick=" api.closeWin();" class="winTitle pull_left" v-text="title"></div></header><div class="content">    <div class="type bg4BC7C7 fontFFF">{{current+1}}/{{xtnum}}</div>    <ul class="scroll">        <li v-for="(list , index) in courseArr"   :class="current==index?'current':''" tapmode onclick="vm.itemClick(this)">            {{index+1}}        </li>    </ul></div><ul class="right_btn">    <li tapmode onclick="vm.winpageUpOnclick();"><img src="../../../image/up1.png"></li>    <li tapmode onclick="vm.winnextOnclick();"><img src="../../../image/down1.png"></li></ul></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script type="text/javascript">    var vm;    apiready = function () {        vue();        vm.openFrameGroup();        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            api.closeWin();        });        api.addEventListener({            name: 'pause'        }, function (ret, err) {            api.sendEvent({//暂停音频                name: 'yinpinCLose'            });        });    };    function vue(){        vm = new Vue({            el: '.content1',            data: {                title: api.pageParam.title,                courseArr : api.pageParam.courseArr,                current:0,                index:api.pageParam.index,                xtnum:api.pageParam.courseArr.length,            },            updated: function () {            },            methods: {                openFrameGroup: function () {                    var header = document.querySelector('header');                    var leftW = $api.offset($api.dom('.content')).w;                    var rightW = $api.offset($api.dom('.right_btn')).w;                    var headerH = $api.offset(header).h;                    var frameAry = [];                    var frameObj = {};                    for (var i = 0; i < vm.courseArr.length; i++) {                        var url;                        if (vm.courseArr[i].zyqf != 2) {//素材和作业要求                            if (vm.courseArr[i].filetype == '.mp3' || vm.courseArr[i].filetype == '.wma'){                                url = 'frame_homework_voice_pad.html';                            }                            else {                                url = 'frame_xzt.html';                            }                        } else {                            switch (vm.courseArr[i].tx_code) {                                case '1'://单选 多选 判断 听单句话 单项选择                                    url = 'frame_xzt.html';                                    break;                                case '2':// 填空题 名著导读                                    url = 'frame_tkt.html';                                    break;                                case '3'://问答题 语言表达 默写 翻译 作文 朗读 证明 书面表达 朗读 解答 辨析 简答 计算                                    url = "frame_wdt.html";                                    break;                                case '4'://复合题带选项                                    if (vm.courseArr[i].tx == 'tdh' || vm.courseArr[i].tx == 'tdb'|| vm.courseArr[i].tx == 'ttt') {//听对话 听对白                                        url = "frame_listen.html";                                    } else {//完型填空 阅读理解 材料选择题                                        url = "frame_wxtk.html";                                    }                                    break;                                case '5'://复合题不带选项 ：材料分析 解答 现代文阅读 综合探究 实验与探究 是个减伤 文言文批阅                                    url = "frame_sytj.html";                                    break                            }                        }                        frameObj = {                            name: 'frame_course' + (i + 1),                            url: url,                            bounces: false,                            bgColor: '#f2f2f2',                            pageParam: {                                detailInfo: vm.courseArr[i],                                bjid: api.pageParam.bjid,                                index: i,                                schoolid:api.pageParam.schoolid,                                hwid:api.pageParam.hwid,                                isConvert: vm.courseArr[i].is_convert,                                convertStatus: vm.courseArr[i].convert_status,                                filetype: vm.courseArr[i].filetype,                                zyid: vm.courseArr[i].zyid,                                filetype: vm.courseArr[i].filetype,                                material: vm.courseArr[i],                            }                        };                        frameAry.push(frameObj);                    }                    api.openFrameGroup({                        name: 'frame_course',                        scrollEnabled: false,                        rect: {                            x: leftW + 10,                            y: headerH + 10,                            w: api.winWidth - leftW - rightW - 30 ,                            h: api.winHeight - headerH - 10                        },                        index: vm.index,                        preload: 0,                        frames: frameAry,                        reload: true                    }, function (ret, err) {                        vm.current = ret.index;                        if (vm.current > 4) {                            $api.dom('.scroll').scrollTop = (vm.current - 4) * 47                        } else {                            $api.dom('.scroll').scrollTop = 0;                        }                        api.sendEvent({//暂停音频                            name: 'yinpinCLose'                        });                    });                },                winpageUpOnclick: function () {//右边上一个按钮切换                    if (vm.current == 0) {                        api.toast({                            msg: '已经是第一个了',                            duration: 2000,                            location: 'bottom'                        })                    } else {                        vm.current = vm.current - 1;                        api.setFrameGroupIndex({                            name: 'frame_course',                            index: vm.current,                            scroll: true                        });                    }                },                winnextOnclick: function () {//右边下一个按钮切换                    if (vm.current == vm.xtnum - 1) {                        api.toast({                            msg: '已经是最后一个了',                            duration: 2000,                            location: 'bottom'                        })                    } else {                        vm.current = vm.current + 1;                        api.setFrameGroupIndex({                            name: 'frame_course',                            index: vm.current,                            scroll: true                        });                    }                },                itemClick: function (context) {//左边题号切换                    vm.current = $(context).index();                    api.setFrameGroupIndex({                        name: 'frame_course',                        index: vm.current,                        scroll: true                    });                },            }        })    }</script></html>
