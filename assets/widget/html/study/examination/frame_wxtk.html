<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>完形填空</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>    <style>        .tkt_content {            display: none        }    </style></head><body><div class="kong_bg">    <div class="cxjz">        <div class="cxjztop clearfix">            <img src="../../../image/newhomework/cxjz.png">            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>        </div>        <div class="cxjz_button" onclick="cxjz()">重新加载</div>    </div></div><div class="tkt_content" id="tkt_content">    <!--<img  v-if="complete==2 && material.zyqf == 2 && isShowAnswer && data.res_type!=2 " class="jrctb noImgClick" :src="isctb!=1?'../../../image/newhomework/join.png':'../../../image/newhomework/out.png'" @click="PostExercisesTriggerWrong()">-->    <div class="tkt_top">        <ul>            <li class="tixing clearfix">                <!--<div class="tihao" v-text="material.sort+'.'"></div>-->                <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>            </li>        </ul>    </div>    <div class="tkt_left" id="left" style=" width: calc(60% - 53px);">        <div class="tg_content font666" v-html="data.tg"></div>    </div>    <div class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">        <div class="tkt_right_content">            <div :style="!isShowAnswer && (complete==5 || complete==4)?'display:block':'display:none'" class="tishi2 overflow"><img                    src="../../../image/newhomework/ts.png">未到答案显示时间，暂不显示正确答案哟~            </div>            <div class="huakuai" id="huakuai"></div>            <span v-if="isShowAnswer && complete==5 " class="zongfen">                     <span v-if="data.is_true==0" style="color: #ff778c">待批</span>                <span v-if="data.is_true!=0 " v-html="'本题得分<em>'+OneDecimalPlace(data.score)+'</em>/总分'+showScore(scorelist)"></span>            </span>            <span class="wxtk_xiaoti" :style="!isShowAnswer&& (complete==5 ||complete==4)?'top:40px':''" v-text="'共'+xiaotinum+'题'"></span>            <ul class="wxtk_content">                <li v-for="(list,index) in data.children">                    <!--答题部分开始-->                    <div :class="complete==1 ||complete==2 ?'wxtk_tg':'xiaotifenge wxtk_tg'"                         v-html="''+(index+material.sort)+'.'+list.tg"></div>                    <ul v-if="complete==1 ||complete==2" class="wxtk_option">                        <li v-for="item in list.options" :id="item.id" :index="index"                            :class="answer[index].da[0]==item.id?'xxactive':''" tapmode                            onclick="vm.xxselectClicked(this)" v-text="item.xx"></li>                    </ul>                    <!--答题部分结束-->                    <!--答案部分开始-->                    <dl v-if="complete==5 || complete==4" class="wxtk_answer bgFFF" :style="complete==4 && !isShowAnswer?'background:none':''">                        <dd class="wxtk_myanswer">                            <div v-if="isShowAnswer && complete==5" class="wxtkdefen">                                <span v-if="list.is_true==0" style="color: #ff778c">待批</span>                                <b v-if="list.is_true!=0 " v-html="'得分<em>'+OneDecimalPlace(list.score)+'</em>/分值'+OneDecimalPlace(scorelist[index])"></b>                            </div>                            <h2  v-if="complete==5 ">【我的答案】</h2>                            <ul class="clearfix "  v-if="complete==5" >                                <li class="wxtkzi" v-text="list.is_unable==1?'未答':list.xsdastr"></li>                            </ul>                        </dd>                        <dd :style="isShowAnswer?'display:block':'display:none'">                            <h2 v-text="'【'+material.tx_tip+'】'"></h2>                            <ul>                                <li class="wxtkzi" v-html="list.dastr==''?'无':list.dastr"></li>                            </ul>                        </dd>                        <dd :style="isShowAnswer?'display:block':'display:none'">                            <h2>【答案解析】</h2>                            <ul>                                <li class="wxtkzi" v-html="list.dajx==''?'无':list.dajx"></li>                            </ul>                        </dd>                    </dl>                    <!--答案部分开始-->                </li>            </ul>            <!--答案部分结束-->            <div class="jrctbkong"></div>        </div>    </div></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var queryHomewokAnswer;    windowError();    apiready = function () {        vue();        if (vm.complete == 1 || vm.complete == 2) {            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {                queryHomewokAnswer = {};            } else {                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));            }        }else{//答完题显示答案            vm.scorelist = api.pageParam.scorelist;        }        if(api.pageParam.showanswer==1){            vm.isShowAnswer=true;        }else{            vm.isShowAnswer=false;        }        vm.huakuai();        vm.GetPaperPaperExercisesAnswer();        // if (vm.complete ==5) {//答完题显示总分        //     vm.type = api.pageParam.type;        //     vm.scorelist = api.pageParam.scorelist;        // }        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            api.stopPlay();            $('.img1').show();            $('.img2').hide();        });    };    function vue() {        vm = new Vue({            el: '.tkt_content',            data: {                index: api.pageParam.index,//当前frame的索引                material: api.pageParam.material,//当前习题资料                complete: api.pageParam.complete,//作业完成状态                data: [],//习题详情                schoolid: api.pageParam.schoolid,//学校id                xiaotinum: 0,//小题总数                answer: [],                isPlaying: false,//老师留言是否播放中                isShowAnswer: false,                scorelist: '',                isctb:'',                type: ''//习题总分            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                OneDecimalPlace:function(num){                    return parseInt((num)*10)/10;                },                GetPaperPaperExercisesAnswer: function () {//考试获取习题and学生答题详情                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetPaperPaperExercisesAnswer, {                        values: {                            paper_id: vm.material.paper_id,                            uid: $api.getStorage('uid'),                            xtid: vm.material.resource_id,                            classid: api.pageParam.exambjid,                            schoolid: $api.getStorage('schoolid'),                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.tkt_content').show();                                $('.kong_bg').hide();                                vm.data = ret.data[0];                                vm.xiaotinum = ret.data[0].children.length;                                if (vm.complete == 1||vm.complete == 2) {                                    for (var i = 0; i < ret.data[0].children.length; i++) {//给初始化的小题加个默认空答案 防止报错                                        var kongcontent = {                                            'topid': ret.data[0].id,                                            'id': ret.data[0].children[i].id,                                            'da': [],                                            'daoptions': ret.data[0].children[i].daoptions,                                            'sort': ret.data[0].children[i].sort,                                        };                                        Vue.set(vm.answer, i, kongcontent);                                    }                                    if (queryHomewokAnswer[vm.material.resource_id].children&&queryHomewokAnswer[vm.material.resource_id].children.length>0) {//缓存的答案                                        vm.answer = queryHomewokAnswer[vm.material.resource_id].children;                                    }                                }                            } else {                                $('.kong_bg').show();                                $('.tkt_content').hide();                            }                        } else {                            $('.kong_bg').show();                            $('.tkt_content').hide();                        }                    } ,'','',false)                },                showScore: function (list) {                    var allscore = 0;                    for (var i = 0; i < list.length; i++) {                        allscore = allscore + Number(list[i]);                        if (i + 1 == list.length) {                            return vm.number_analysis(allscore);                        }                    }                },                number_analysis:function(number, bit){                    /**                     * number_format                     * @param number 传进来的数,                     * @param bit 保留的小数位,默认保留两位小数                     */                    if (vm.is_empty(number)) {                        return number;                    }                    //设置接收参数的默认值                    bit = bit ? bit : 1;                    var str = '';                    number = Number(number);                    number = (number).toFixed(bit);//格式化                    var realnum = number.split('.')[0];//整数位(使用小数点分割整数和小数部分)                    var decimal = number.split('.')[1];//小数位                    //重新拼接实数部分和小数位                    if (parseInt(decimal) > 0)                        realnum = realnum + '.' + decimal;                    return realnum;                },                is_empty:function(data){                    /**                     * 判断对象或字符串是否为空                     * @param data                     * @author 邹峰                     * @time 2017年07月24日15:44:24                     * @return {boolean}                     */                    if (typeof data === 'undefined') {                        return true;                    } else if (typeof data === 'string' && (data === '' || data === '0' || data === 'null')) {                        return true;                    } else if (typeof data === 'object') {                        for (var name in data) {                            return false;                        }                        return true;                    } else if (data instanceof Array) {                        if (data.length === 0) return true;                    } else if (typeof data === 'boolean') {                        return !data;                    } else if (data === null || data === 'null') {                        return true;                    } else if (data === 0 || data === '0') {                        return true;                    }                    return false;                },                xtzongfen:function(xtzf,xtnum,xtindex){                    var b=Math.floor((xtzf*10)/xtnum)/10;                    if(xtindex+1==xtnum){                        var last= xtzf-(b*(xtnum-1));                        if(last.toString().split('.')[1]>0){last = last.toFixed(1)}else{last = last.toFixed(0)}                        return last                    }else{                        return b;                    }                },                alertzsd: function (content) {                    alert('知识点：' + content);                },                PostExercisesTriggerWrong:function(){//错题本改版 ，添加错题本、移除错题本、表及重点                    var type;                    if(vm.isctb==1){                        type = 'outbook';                    }else{                        type = 'addbook';                    }                    apiObj.Post(UrlRouter.PostExercisesTriggerWrong, {                        values: {                            sys_id:vm.data.sys_id,                            kc_type:2,                            type:type                        }                    }, function (ret, err) {                        if (ret) {                            if (ret.ret == 0) {                                if(type=='outbook'){                                    vm.isctb=0;                                    api.toast({                                        msg: '已移出错题本',                                        duration: 2000,                                        location: 'bottom'                                    });                                }else{                                    vm.isctb=1;                                    api.toast({                                        msg: '成功加入错题本',                                        duration: 2000,                                        location: 'bottom'                                    });                                }                            }else{                                api.toast({                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        }else{                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    })                },                huakuai: function () {                    var tktcontent = document.getElementById('tkt_content'); //长线条                    var right = document.getElementById('right'); //小方块                    var left = document.getElementById('left');                    var huakuai = document.getElementById('huakuai');                    var ifBool = false; //判断鼠标是否按下//鼠标按下方块                    huakuai.addEventListener("touchstart", function (e) {                        e.stopPropagation();                        ifBool = true;                    });//拖动                    window.addEventListener("touchmove", function (e) {                        if (ifBool) {                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值                            if (minDiv_left >= tktcontent.offsetWidth - 15) {                                minDiv_left = tktcontent.offsetWidth - 15;                            }//设置拖动后小方块的left值                            var rightwidth;                            var leftwidth;                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {                                rightwidth = $(window).width() * 0.7 + 37;                                leftwidth = $(window).width() * 0.3 - 25;                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {                                rightwidth = $(window).width() * 0.4 + 37;                                leftwidth = $(window).width() * 0.6 - 25;                            } else {                                rightwidth = $(window).width() - minDiv_left;                                leftwidth = minDiv_left + 12                            }                            right.style.width = rightwidth + "px";                            left.style.width = leftwidth + "px";                        }                    });//鼠标松开                    window.addEventListener("touchend", function (e) {                        ifBool = false;                    });//获取元素的绝对位置                    function getPosition(node) {                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left                        var top = node.offsetTop;                        current = node.offsetParent; // 取得元素的offsetParent                        // 一直循环直到根元素                        while (current != null) {                            left += current.offsetLeft;                            top += current.offsetTop;                            current = current.offsetParent;                        }                        return {                            "left": left,                            "top": top                        };                    }                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    var xtindex = $(context).attr('index');                    vm.answer[xtindex].da = [$(context).attr('id')];                    vm.saveAnswer(vm.answer);                },                checded: function (context) {//复选框不会做点击事件                    var xtindex = $(context).attr('id');                    vm.answer[xtindex].da = [];                    vm.saveAnswer(vm.answer);                },                saveAnswer: function (da) {                    var eachxtgroup = {                        'is_auto': 1,                        'tx': vm.data.tx,                        'xtid': vm.material.resource_id,                        'children': da,                        'tx_code': vm.data.tx_code,                        'score': vm.material.score,                        'part_score': vm.material.part_score,                        'xts':vm.material.xts,                        'part_xts':vm.material.part_xts,                    };                    api.sendEvent({                        name: 'saveAnswerHuancun',                        extra: {                            eachxtgroup: eachxtgroup,                            zyid: vm.material.resource_id,                            index: vm.index                        }                    });                }            }        });    }    function getPosition(node) {        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left        var top = node.offsetTop;        current = node.offsetParent; // 取得元素的offsetParent        // 一直循环直到根元素        while (current != null) {            left += current.offsetLeft;            top += current.offsetTop;            current = current.offsetParent;        }        return {            "left": left,            "top": top        };    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if (src.substring(src.length - 3) == 'gif') {        } else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });        }    }    function cxjz() {        vm.GetPaperPaperExercisesAnswer();    }</script></html>
