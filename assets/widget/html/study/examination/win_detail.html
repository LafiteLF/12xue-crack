vm.openzyyq();">考试<br>说明</div></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/DateUtil.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var queryHomewokAnswer;    var xtgroup={};    var actionTime=0;    var newtimejs;    var newtimejs2;    var shuaxinTime=0;    var moduleDialog = null;//弹窗模块bhzparam    $api.setStorage('count_down',0);    apiready = function () {        moduleDialog = api.require('moduleDialog');        vue();        api.closeWin({            name: 'win_examing2'        });        // alert(api.pageParam.complete);        // alert(JSON.stringify(api.pageParam.scorelist))        vm.examtitle=api.pageParam.examtitle;        vm.examid=api.pageParam.examid;        vm.exambjid=api.pageParam.exambjid;        vm.examMateriallist=api.pageParam.examMateriallist;        vm.homeworkListData=api.pageParam.examXq;        vm.current = api.pageParam.current;        vm.xitiAllNum=api.pageParam.examzts;            // if(api.pageParam.complete==1||api.pageParam.complete==2){            //     vm.time_length=100;//考试时长            //         vm.duration=0;//学生用时            //         vm.count_down=100;//考试剩余时间            //         vm.allow_submit=0;//允许提交时间            // }            for(var i=0;i<  vm.examMateriallist.length;i++){                var list=  vm.examMateriallist[i];                var listdata=list.data;                var dttigan={'tx_code':0,'zymc':list.title,'resource_id':'dati'+i,sort:vm.Arabia_To_SimplifiedC ify(UPDATEret));            }        });        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            closewin();        });    };    function vue(){        vm = new Vue({            el: '.content1',            data: {                create_time:0,                current:0,                xitinum:0,                examtitle:'',                examid:'',                exambjid:'',                examMateriallist:[],                materiallist:[],                currentsort:'一',                answeredArr:{},                complete:api.pageParam.complete,                xitiAllNum: 0,// 习题总数可作答部分 不包括素材 和作业要求                yzxt:0,//已答习题                isallInput:true,                scorelist:api.pageParam.scorelist,                showanswer:api.pageParam.showanswer,                isopenzyyq:api.pageParam.isopenzyyq,                zyyq:api.pageParam.zyyq,                param: {                    "data": [{                        "viewType": 100,                        "x": api.winWidth / 2 - 150,                        "y": $api.getStorage('padHeight') / 2 - 75,                        "h": 150,                        "w": 300                    }, {                        "viewType": 101,                        "x": api.winWidth / 2 - 150 + 30,                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,                        "h": 48,                        "w": 240,                        "lineSpacting": 1.3,                        "showText": "<font color='#666666'>考试进行中，交卷后才能退出考试！</font>",                        "textSize": 14                    }, {                        "viewType": 102,                        "x": api.winWidth / 2-50 ,                        "y":$api.getStorage('padHeight') / 2 - 75 + 94,                        "h": 35,                        "w": 100,                        "clickID": "ok", ete==5 || (vm.complete==4 && vm.duration==0)){                                    }else{                                        if(vm.complete==2){                                            $api.setStorage('count_down',vm.time_length);                                            vm.count_down =$api.getStorage('count_down');                                        }                                        newtimejs = setInterval(function () {                                            vm.allow_submit--;                                            if(vm.complete==1){//正常考试                                                if($api.getStorage('count_down')>0){                                                    vm.duration++;                                                    vm.count_down = $api.getStorage('count_down');                                                    vm.count_down--;                                                    $api.setStorage('count_down',vm.count_down);                                                    vm.count_down = $api.getStorage('count_down');                                                    if( $api.getStorage('count_down')==300){                                                        apiObj.Get(UrlRouter.GetPaperCheckfinish, {                                                            values: {                                                                paperid:vm.examid,                                                                classid:vm.exambjid                                                            }                                                        }, function (ret, err) {                                                            api.hideProgress();                                                            if (ret) {                                                                if (ret.ret == 0) {                                                                    vm.time_length=ret.data  + tmpnewchar; break;                            case "4": tmpnewchar = "四" + tmpnewchar; break;                            case "5": tmpnewchar = "五" + tmpnewchar; break;                            case "6": tmpnewchar = "六" + tmpnewchar; break;                            case "7": tmpnewchar = "七" + tmpnewchar; break;                            case "8": tmpnewchar = "八" + tmpnewchar; break;                            case "9": tmpnewchar = "九" + tmpnewchar; break;                        }                        switch (part[0].length - i - 1) {                            case 0: tmpnewchar = tmpnewchar; break;                            case 1: if (perchar != 0) tmpnewchar = tmpnewchar + "十"; break;                            case 2: if (perchar != 0) tmpnewchar = tmpnewchar + "百"; break;                            case 3: if (perchar != 0) tmpnewchar = tmpnewchar + "千"; break;                            case 4: tmpnewchar = tmpnewchar + "万"; break;                            case 5: if (perchar != 0) tmpnewchar = tmpnewchar + "十"; break;                            case 6: if (perchar != 0) tmpnewchar = tmpnewchar + "百"; break;                            case 7: if (perchar != 0) tmpnewchar = tmpnewchar + "千"; break;                            case 8: tmpnewchar = tmpnewchar + "亿"; break;                            case 9: tmpnewchar = tmpnewchar + "十"; break;                        }                        newchar = tmpnewchar + newchar;                    }                    //替换所有无用汉字，直到没有此类无用的数字为止                    while (newchar.search("零零") != -1 || newchar.search("零亿") != -1 || newchar.search("亿万") != -1 || newchar.search("零万") != -1) {                        newchar = newchar.replace("零亿", "亿");                        newchar = newchar.replace("亿万", "亿");                        newchar = newchar.replace("零万", "万");                        newchar = newchar.replace("零零", "零");                    }                    //替换以“一十”开头的，为“十”                    if (newchar.indexOf("一十") == 0) {                        newchar = newchar.substr(1);                    }                    //替换以“零”结尾的，为“”                    if (newchar.lastIndexOf("零") == newchar.length - 1) {                        newchar = newchar.substr(0, newchar.length - 1);                    }                    return newchar;                }            }        });    }    function closewin() {        if(vm.complete==2 ||vm.complete==1){            moduleDialog.showDialog(vm.param, function (ret, err) {                if (ret.state == 'success' && ret.clickID) {                    dismissDialog();                    // api.closeWin();                } else {}            });        }else{            api.closeWin();        }        // api.closeWin();    }    function dismissDialog() {        moduleDialog.dismissDialog();    }</script></html>
