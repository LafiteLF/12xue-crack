<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport"

        .wdt_content {

<body>
    <div class="kong_bg">
        <div class="cxjz">
            <div class="cxjztop clearfix">
                <img src="../../../image/newhomework/cxjz.png">
                <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>
            </div>
            <div class="cxjz_button" onclick="cxjz()">重新加载</div>
        </div>
    </div>
    <div class="wdt_content">

        <div class="content">
            <!--题干部分开始-->
            <div class="stem">
                <ul>
                    <li class="tixing clearfix">
                        <div class="tihao" v-text="material.sort+'.'"></div>
                        <div class="tixingzi" v-text="'【'+material.txstr+'】'"></div>
                    </li>
                </ul>
                <div class="tg_content font666" v-html="data.tg"></div>
                <div class="ldcl" v-if="material.tx=='ldt' && data.dastr!=''">
                    <h3>朗读材料：</h3>
                    <p v-html="data.dastr==''?'无':data.dastr"></p>
                </div>
            </div>
            <!--题干部分结束-->
            <!--答案部分开始-->
            <dl v-if="complete==5 || complete==4" class="wenda_answer bgFFF">
                <dt v-if="isShowAnswer && complete==5" class="defen">
                    <span v-if="data.is_true==0" style="color: #ff778c">待批</span>
                    <b v-if="data.is_true!=0 "
                        v-html="'本题得分<em>'+OneDecimalPlace(data.score)+'</em>/总分'+OneDecimalPlace(scorelist[0])"></b>
                </dt>
                <dd :style="!isShowAnswer?'display:inline-block':'display:none'" class="tishi"><img
                        src="../../../image/newhomework/ts.png">未到答案显示时间，暂不显示正确答案哟~</dd>

                <dd v-if="complete==5 ">
                    <h2 class="wendah2">【我的答案】</h2>
                    <div v-if="material.tx=='ldt'&& material.is_unable!=1 " class="lddayinpin clearfix">
                        <img class="scyp2 noImgClick" src="../../../image/startPlay.png" onclick="vm.ZSrecordRun(this);"
                            :playStatus='0' alt="">
                        <div v-if="showinpin" class="lddaRange"><input class="myRange" type="range" min="0" value="0"
                                :max='data.xsdaobj[0].filetime'></div>
                        <p v-if="showinpin" class="ypTimeP" v-text="getTimes(data.xsdaobj[0].filetime)"></p>
                    </div>
                    <ul class="clearfix wendawdda" v-if="material.tx=='ldt'&& material.is_unable==1">
                        <li class="wendazi">
                            <p>未答</p>
                        </li>
                    </ul>

                    <ul class="clearfix wendawdda" v-if="material.tx!='ldt'">
                        <li v-for="list in data.xsdaobj" v-if="material.tx!='ldt'||(material.tx=='ldt'  )"
                            :class="(list.is_txt==1  && !list.image)?'wendazi':list.is_txt==2?'wendayuyin imgborder':list.is_txt==3?'wendashipin imgborder':'wendatu imgborder'">
                            <p v-if="list.is_unable==1 ||(list.is_txt==1 && list.is_unable==0 && !list.image)"
                                v-html="list.is_unable==1?'未答':list.is_txt==1 && list.is_unable==0?list.descript:''">
                            </p>
                            <p v-if="list.is_txt==0 " v-html="list.thumbnail"></p>
                            <p v-if="list.is_txt==2 || list.is_txt==3" :url="list.serverpath+list.preview_link" tapmode
                                onclick="vm.videoZYPlay(this)" :filetime="list.filetime">
                                <img class="noImgClick" src="../../../image/bof_03.png">
                            </p>
                        </li>
                    </ul>
                </dd>

                <dd :style="isShowAnswer?'display:block':'display:none'" v-if="material.tx!='ldt'">
                    <h2 class="wendah2" v-text="'【'+material.tx_tip+'】'">
                    </h2>
                    <ul>
                        <li class="wendazi" v-html="data.dastr==''?'无':data.dastr">
                        </li>
                    </ul>
                </dd>
                <dd :style="isShowAnswer?'display:block':'display:none'">
                    <h2 class="wendah2">【答案解析】</h2>
                    <ul>
                        <li class="wendazi" v-html="data.dajx==''?'无':data.dajx">
                        </li>
                    </ul>
                </dd>
                <div class="jrctbkong"></div>
            </dl>
            <!--答案部分结束-->
        </div>
        <!--答题部分开始-->
        <div v-if="complete==1 || complete==2" class="da_content">
            <textarea v-if='is_txt==1  && is_show_textarea==1 ' class="wdtzi" placeholder="请输入要填写的答案" cols="30"
                rows="10" maxlength="500" :value="answer.length>0?answer[0].descript:''"
                onchange="vm.shoudongpiyue(this);"></textarea>

            <div class="lddayinpin clearfix" v-if="material.tx=='ldt' && answer.length>0">

                <div class="lddaRange"> <input class="myRange" type="range" min="0" value="0" :max='answer[0].filetime'>
                </div>
                <p class="ypTimeP" v-text="getTimes(answer[0].filetime)">00:00</p>
                <div class="chacha" tapmode onclick="vm.deletePic(this);" id='0'>
                    <img class="noImgClick" src="../../../image/newhomework/cha.png">
                </div>
            </div>

            <dl class="clearfix " v-if="is_txt!=1 && answer.length>0 && material.tx!='ldt'">

                    </div>
                    <div :id="index" tapmode onclick="vm.deletePic(this);" class="chacha">
                        <img class="noImgClick" src="../../../image/newhomework/cha.png">
                    </div>
                </dd>
            </dl>
            <div
                :class="is_txt!=1 && answer.length>0?'wdAnswerTypeActive':is_txt==1  && is_show_textarea==1?'wdAnswerTypeActive':'wdAnswerType'">
                <ul>
                    <li class="openAnserType" tapmode onclick="vm.choose();"></li>

                </ul>
            </div>
        </div>
        <!--答题部分结束-->

                getUrlName: function (url) {
                    var index = url.lastIndexOf("/");

                    if (api.systemType == 'ios') {
                        var idIndex = url.indexOf("id=");
                        if (idIndex != -1) {
                            var idStr = url.substr(idIndex);
                            var andIndex = url.indexOf("&");
                            imgName = url.substring(idIndex + 3, andIndex);

                qiniuUpfile: function (imgurl, type, index) {//上传图片
                    api.showProgress({
                        title: '正在上传图片',
                        text: '请稍后',
                        modal: true
                    });
                    var fileKey = (new Date()).valueOf() + imgurl;
                    apiObj.Get(UrlRouter.GetQiNiuToken, {
                        values: {
                            uid: $api.getStorage('uid'),
                            bucket: 'vodresource',
                            key: fileKey
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                var token = ret.data.token;
                                var trans = api.require('trans');
                                trans.decodeImgToBase64({
                                    imgPath: imgurl
                                }, function (ret, err) {
                                    if (ret.status) {
                                        var file = b64ImgToBlob(ret.base64Str);
                                        var observable = qiniu.upload(file, fileKey, token, qiniuPutExtra, qiniuConfig);
                                        observable.subscribe({
                                            next(res) {
                                                //进度
                                            },
                                            error(err) {
                                                // 失败报错信息

                                                    'filetime': 0,
                                                    'is_txt': 0,
                                                    'Local_address': QINIU_DOMAIN + res.key
                                                }; //txt 0图片 2 音频  3视频   Local_address本地地址
                                                if (type == 'modulesave') {
                                                    Vue.set(vm.answer, index, answerlist);
                                                    vm.saveAnswer(vm.answer);
                                                } else {
                                                    vm.answer.push(answerlist);//把答案图片放在数组里
                                                    vm.saveAnswer(vm.answer);
                                                }
                                                api.hideProgress();
                                            }
                                        })
                                    } else {
                                        api.hideProgress();
                                        _toast('图片转码失败，请重试');
                                    }
                                });

                            } else {
                                api.hideProgress();
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }

                        } else {
                            api.hideProgress();
                            api.toast({
                                msg: '图片上传失败，请重新提交答案',
                                duration: 2000,
                                location: 'bottom'

                getTimes: function (value) {
                    var secondTime = parseInt(value);// 秒
                    var minuteTime = 0;// 分
                    if (secondTime > 59) {//如果秒数大于60，将秒数转换成整数
                        //获取分钟，除以60取整数，得到整数分钟
                        minuteTime = parseInt(secondTime / 60);
                        //获取秒数，秒数取佘，得到整数秒数
                        secondTime = parseInt(secondTime % 60);
                    }
                    var result = "" + parseInt(secondTime);
                    if (minuteTime > 0 && secondTime < 10) {
                        if (minuteTime > 9) {
                            result = parseInt(minuteTime) + ":0" + result;
                        } else {
                            result = "0" + parseInt(minuteTime) + ":0" + result;
                        }
                    } else if (minuteTime > 0 && secondTime >= 10) {
                        if (minuteTime > 9) {
                            result = parseInt(minuteTime) + ":" + result;
                        } else {
                            result = "0" + parseInt(minuteTime) + ":" + result;
                        }
                    } else if (minuteTime == 0 && secondTime < 10) {
                        result = "00" + ":0" + result;
                    } else {
                        result = "00" + ":" + result;
                    }
                    return result;
                },

                        $api.attr(context, 'playStatus', '1');
                        recodetime = vm.data.xsdaobj[0].filetime;
                        //这个是一样的  重新播放
                        if (api.systemType == 'ios') {
                            audioStreamer.resume();
                        } else {
                            audioStreamer.openPlayer({
                                path: downloadPath,
                            }, function (ret) {
                            });
                        }
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                        timer = setInterval(function (e) {
                            sec = sec + 1;
                            allTimes = allTimes - 1;
                            bfb = sec / recodetime * 100;
                            bfb = bfb.toFixed(2);
                            var ss = 'background-size: ' + bfb + '% 100%';
                            console.log(sec);
                            if (allTimes == 0 || sec >= vm.data.xsdaobj[0].filetime) {
                                clearInterval(timer);
                                $api.attr(context, 'playStatus', '0');
                                $api.dom('.myRange').value = 0;
                                $api.dom('.myRange').disabled = true;
                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                $api.text($api.dom('.ypTimeP'), vm.getTimes(vm.data.xsdaobj[0].filetime));
                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                            } else {

                                var range = $api.dom('.myRange');
                                range.value = sec;
                                range.disabled = false;
                                range.onchange = function () {
                                    sec = parseInt(this.value);
                                    range.value = sec;
                                    allTimes = vm.data.xsdaobj[0].filetime - sec;
                                    var time = vm.getTimes(allTimes);
                                    $api.text($api.dom('.ypTimeP'), time);
                                    bfb = sec / recodetime * 100;
                                    bfb = bfb.toFixed(2);
                                    var ss = 'background-size: ' + bfb + '% 100%';
                                    $api.css($api.dom('.myRange'), ss);
                                    audioStreamer.seekToTime({
                                        time: sec
                                    });
                                };
                                var time = vm.getTimes(allTimes);
                                $api.css($api.dom('.myRange'), ss);
                                $api.text($api.dom('.ypTimeP'), time);
                            }
                        }, 1000);
                    }
                },
            }

        });
    }

    function showImage(context) {
        if ($api.getStorage('padType') != '1') {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    $(context).attr('fdsrc')
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
            return
        }
        var url = $(context).attr('fdsrc');
        var index = $(context).attr('id');
        var param = { "deviceType": "deviceType_pad", "url": url };
        moduleImageScale.showImage(param, function (ret, err) {
            if (ret) {
                if (ret.state == "success" && ret.clickID == 'clickID_close') {
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_save') {
                    vm.qiniuUpfile(ret.imageSavePath, 'modulesave', index);
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_delete') {
                    vm.answer.splice(index, 1);
                    vm.saveAnswer(0, vm.answer);
                    moduleImageScale.dismissImage();
                }
            } else {
                alert(JSON.stringify(err));
            }


        });

    }
