                    });

                    vm.qiniuUpfile(imgsrc, xtindex);
                    api.closeWin({
                        name: 'Drawing_board'
                    });
                } else if (ret.value.type == '4') {//手写
                    if (vm.answer[xtindex].is_txt == 1) {
                        vm.answer[xtindex].da = [];

                showScore: function (list) {
                    var allscore = 0;
                    for (var i = 0; i < list.length; i++) {
                        allscore = allscore + Number(list[i]);
                        if (i + 1 == list.length) {
                            return vm.number_analysis(allscore);
                        }
                    }

                },
                number_analysis: function (number, bit) {
                    /**
                     * number_format
                     * @param number 传进来的数,
                     * @param bit 保留的小数位,默认保留两位小数
                     */
                    if (vm.is_empty(number)) {
                        return number;
                    }
                    //设置接收参数的默认值
                    bit = bit ? bit : 1;

                    var str = '';
                    number = Number(number);
                    number = (number).toFixed(bit);//格式化
                    var realnum = number.split('.')[0];//整数位(使用小数点分割整数和小数部分)
                    var decimal = number.split('.')[1];//小数位
                    //重新拼接实数部分和小数位
                    if (parseInt(decimal) > 0)
                        realnum = realnum + '.' + decimal;
                    return realnum;
                },
                is_empty: function (data) {
                    /**
                     * 判断对象或字符串是否为空
                     * @param data
                     * @author 邹峰
                     * @time 2017年07月24日15:44:24
                     * @return {boolean}
                     */
                    if (typeof data === 'undefined') {
                        return true;
                    } else if (typeof data === 'string' && (data === '' || data === '0' || data === 'null')) {
                        return true;
                    } else if (typeof data === 'object') {
                        for (var name in data) {
                            return false;
                        }
                        return true;
                    } else if (data instanceof Array) {
                        if (data.length === 0) return true;
                    } else if (typeof data === 'boolean') {
                        return !data;
                    } else if (data === null || data === 'null') {
                        return true;
                    } else if (data === 0 || data === '0') {
                        return true;
                    }
                    return false;

                huakuai: function () {
                    var tktcontent = document.getElementById('tkt_content'); //长线条
                    var right = document.getElementById('right'); //小方块
                    var left = document.getElementById('left');
                    var huakuai = document.getElementById('huakuai');
                    var ifBool = false; //判断鼠标是否按下
                    //鼠标按下方块
                    huakuai.addEventListener("touchstart", function (e) {
                        e.stopPropagation();
                        ifBool = true;
                    });
                    //拖动
                    window.addEventListener("touchmove", function (e) {
                        if (ifBool) {
                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x
                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标
                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值
                            if (minDiv_left >= tktcontent.offsetWidth - 15) {
                                minDiv_left = tktcontent.offsetWidth - 15;
                            }
                            //设置拖动后小方块的left值
                            var rightwidth;
                            var leftwidth;
                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {
                                rightwidth = $(window).width() * 0.7 + 37;
                                leftwidth = $(window).width() * 0.3 - 53;
                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {
                                rightwidth = $(window).width() * 0.4 + 37;
                                leftwidth = $(window).width() * 0.6 - 53;
                            } else {
                                rightwidth = $(window).width() - minDiv_left;
                                leftwidth = minDiv_left + 12
                            }
                            right.style.width = rightwidth + "px";
                            left.style.width = leftwidth + "px";
                        }
                    });
                    //鼠标松开
                    window.addEventListener("touchend", function (e) {
                        ifBool = false;
                    });

                    //获取元素的绝对位置
                    function getPosition(node) {
                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left
                        var top = node.offsetTop;
                        current = node.offsetParent; // 取得元素的offsetParent
                        // 一直循环直到根元素
                        while (current != null) {
                            left += current.offsetLeft;
                            top += current.offsetTop;
                            current = current.offsetParent;
                        }
                        return {
                            "left": left,
                            "top": top
                        };
                    }
                },

                compressImage: function (url, xtindex) {// 图片压缩处理

                        quality = 0.2;
                    } else {
                        quality = 0.8;
                    }
                    imageFilter.compress({
                        img: url,
                        quality: quality,
                        save: {
                            imgPath: "fs://img_compress/",
                            imgName: imgName + ".jpg"
                        }
                    }, function (ret, err) {
                        // console.log("compress result : ret=" + JSON.stringify(ret) + "  err:" + JSON.stringify(err));
                        if (ret.status) {
                            compressListener.successCount++;
                            var newimgurl = api.fsDir + "/img_compress/" + imgName + ".jpg";

                getUrlName: function (url) {
                    var index = url.lastIndexOf("/");

                    if (api.systemType == 'ios') {
                        var idIndex = url.indexOf("id=");
                        if (idIndex != -1) {
                            var idStr = url.substr(idIndex);
                            var andIndex = url.indexOf("&");
                            imgName = url.substring(idIndex + 3, andIndex);
                        } else {
                            imgName = url.substring(index + 1);
                        }
                    } else {
                        imgName = url.substring(index + 1);
                    }
                    return imgName;

                textToImage: function (tkindex, callback) {
                    var shareContent = $('#xt' + tkindex);
                    shareContent.css('padding', '100px 20px');
                    var width = shareContent.offsetWidth;
                    var height = shareContent.offsetHeight;
                    var canvas = document.createElement("canvas");
                    var scale = 2;
                    canvas.width = width * scale;
                    canvas.height = height * scale;
                    canvas.getContext("2d").scale(scale, scale);
                    var opts = {
                        scale: scale,
                        canvas: canvas,
                        logging: true,
                        width: width,
                        height: height
                    };
                    html2canvas(shareContent[0], opts).then(function (canvas) {
                        var imgBase64 = canvas.toDataURL('image/jpg');
                        trans64ToImage(imgBase64, callback);
                        shareContent.css('padding', '30px 40px 20px 40px');
                    });

    function getByteLen(val) {
        var len = 0;
        for (var i = 0; i < val.length; i++) {
            var a = val.charAt(i);
            if (a.match(/[^\x00-\xff]/ig) != null) {
                len += 2;
            }
            else {
                len += 1;
            }
        }
        return len;
    }

            base64Str: transBase64,
            imgPath: "fs://trans",
            imgName: imageName,
            album: false

            callback(ret, err);
        });

    function fillText(text) {
        var textSize = 16;
        var lineCount = Math.floor(canvas.width / textSize - 1);
        var line = 1;
        while (text.length) {
            var fillText = text.substr(0, lineCount);
            text = text.substr(lineCount);
            ctx.fillText(fillText, 10, 30 * line, canvas.width);
            line++;
        }

    }

                    $(context).attr('fdsrc')
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {

                }
            });
            return
        }
        var url = $(context).attr('fdsrc');
        var index = $(context).attr('id');
        var topindex = $(context).attr('topid');
        var param = { "deviceType": "deviceType_pad", "url": url };
        moduleImageScale.showImage(param, function (ret, err) {
            if (ret) {
                if (ret.state == "success" && ret.clickID == 'clickID_close') {
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_save') {
                    vm.qiniuUpfile(ret.imageSavePath, topindex, '', 'modulesave', index);
                    moduleImageScale.dismissImage();
                } else if (ret.state == "success" && ret.clickID == 'clickID_delete') {
                    if (vm.data.children[topindex].datatype == 2) {
                        Vue.set(vm.answer[topindex].da, index, null);
                    } else {
                        vm.answer[topindex].da.splice(index, 1);//删除数据指定索引位置的url

                    var tpnum = 0;
                    for (var i = 0; i < vm.answer[topindex].da.length; i++) {
                        if (vm.answer[topindex].da[i]) {

                        }
                    }
                    if (tpnum == 0) {
                        vm.answer[topindex].da = [];
                    }
                    vm.saveAnswer(vm.answer);
                    moduleImageScale.dismissImage();
                }
            } else {
                alert(JSON.stringify(err));
            }
