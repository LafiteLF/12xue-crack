<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>单选 多选 判断 听单句话 单项选择</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/></head><style>    .xzt_content {        display: none    }    strong {        color: #000;        font-weight: bold    }</style><body><div class="kong_bg">    <div class="cxjz">        <div class="cxjztop clearfix">            <img src="../../../image/newhomework/cxjz.png">            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>        </div>        <div class="cxjz_button" onclick="cxjz()">重新加载</div>    </div></div><div class="xzt_content">    <!--<img  v-if="complete==2 && material.tx_code！=0 && isShowAnswer && data.res_type!=2 " class="jrctb noImgClick" :src="isctb!=1?'../../../image/newhomework/join.png':'../../../image/newhomework/out.png'" @click="PostExercisesTriggerWrong()">-->    <div class="content">        <div class="stem">            <ul>                <li class="tixing clearfix" v-if="material.tx_code!=0">                    <div class="tihao" v-text="material.sort+'.'"></div>                    <div class="tixingzi" v-text=" '【'+material.txstr+'】'"></div>                </li>                <li class="tixing clearfix" v-if="material.tx_code==0">                    <!--<div class="tihao" v-text="material.sort+'.'"></div>-->                    <div class="tixingzi" v-text=" material.zymc"></div>                </li>            </ul>            <div class="tg_content font666" v-if="material.tx_code!=0" v-html="data.tg"></div>            <div class="tg_content font666" v-if="material.tx_code==0&&material.discript!=''" v-html="material.discript"></div>            <div class="scyinpin clearfix" v-if=" material.tx=='tdjh' && data.attachments">                <img class="scyp1 noImgClick" src="../../../image/newhomework/yuyinimg.png">                <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);"                     src="../../../image/startPlay.png" alt="">                <div class="ypRange"><input class="myRange" type="range" min="0" value="0"                                            :max='data.attachments[0].filetime'></div>                <p class="ypTimeP" v-text="getOutTime(data.attachments[0].filetime)"></p>                <audio v-if="fileType == '.mp3'" class="hideenAudio"                       :src='data.attachments[0].serverpath + data.attachments[0].savename'></audio>                <audio v-if="fileType != '.mp3'" class="hideenAudio"                       :src='data.attachments[0].serverpath + data.attachments[0].preview_link'></audio>            </div>        </div>        <!--答案部分开始-->        <dl v-if="(complete==5 || complete==4) && material.tx_code !=0" class="wenda_answer bgFFF">            <dt v-if="isShowAnswer && complete==5" class="defen" >                <span v-if="data.is_true==0" style="color: #ff778c">待批</span>                <b v-if="data.is_true!=0 "  v-html="'本题得分<em>'+OneDecimalPlace(data.score)+'</em>/总分'+OneDecimalPlace(scorelist[0])"></b>            </dt>            <dd :style="!isShowAnswer?'display:inline-block':'display:none'" class="tishi"><img                    src="../../../image/newhomework/ts.png">未到答案显示时间，暂不显示正确答案哟~            </dd>            <dd v-if="complete==5 ">                <h2 class="wendah2">【我的答案】</h2>                <ul class="clearfix wendawdda">                    <li class="wendazi">                        <p v-html="data.is_unable==1?'未答':data.xsdastr"></p>                    </li>                </ul>            </dd>            <dd :style="isShowAnswer?'display:block':'display:none'">                <h2 class="wendah2" v-text="'【'+material.tx_tip+'】'"></h2>                <ul>                    <li class="wendazi" v-html="data.dastr==''?'无':data.dastr"></li>                </ul>            </dd>            <dd :style="isShowAnswer?'display:block':'display:none'">                <h2 class="wendah2">【答案解析】</h2>                <ul>                    <li class="wendazi" v-html="data.dajx==''?'无':data.dajx"></li>                </ul>            </dd>            <div class="jrctbkong"></div>        </dl>        <!--答案部分结束-->    </div>    <!--作答部分开始-->    <ul v-if="(complete==1 ||complete==2) && material.tx_code!=0" class="option">        <!--单选-->        <li v-for="list in data.options" v-if="data.tx!='duoxt'" :id="list.id"            :class="answer[0]==list.id?'danxoption xxactive':'danxoption'"            v-text="data.tx=='pdt'?list.description:list.xx" tapmode            onclick="vm.xxselectClicked(this)"></li>        <!--多选-->        <li v-for="list in data.options" v-if="data.tx=='duoxt'" :id="list.id"            :class="isdxactive(list.id)?'duoxoption xxactive':'duoxoption'" v-text="list.xx" tapmode            onclick="vm.xxselectClicked(this)"></li>    </ul>    <!--作答部分结束--></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var queryHomewokAnswer;    var allTimes = 0;//音频播放    var sec;    var timer = null;    var audioStreamer;    var downloadUrl = '';    windowError();    apiready = function () {        vue();        // alert(JSON.stringify(api.pageParam.queryHomewokAnswer))        if (vm.complete ==1|| vm.complete ==2) {//答题状态            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {                queryHomewokAnswer = {};            } else {                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));            }        }else{//答完题显示答案                vm.scorelist = api.pageParam.scorelist;        }        if (vm.material.tx_code != 0) {//习题            vm.GetPaperPaperExercisesAnswer();        } else {//作业要求            $('.xzt_content').show();        }        // alert(JSON.stringify(queryHomewokAnswer))        // if (vm.complete == 5) {//答完题显示总分        //     vm.type = api.pageParam.type;        //     vm.scorelist = api.pageParam.scorelist;        // }        // alert(api.pageParam.showanswer);        if(api.pageParam.showanswer==1){            vm.isShowAnswer=true;        }else{            vm.isShowAnswer=false;        }        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if ($api.domAll('.scyp2').length >= 1) {                if ($('.scyp2').attr('playStatus') == 1) {                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                clearInterval(timer);                if (api.systemType == 'ios') {                    var hideenAudio = $api.dom('.hideenAudio');                    hideenAudio.pause();                } else {                    audioStreamer = api.require('audioStreamer');                    audioStreamer.pause();                }            }            api.stopPlay();            $('.img1').show();            $('.img2').hide();        });    };    function vue() {        vm = new Vue({            el: '.xzt_content',            data: {                index: api.pageParam.index,//当前frame的索引                material: api.pageParam.material,//当前习题资料                complete: api.pageParam.complete,//作业完成状态                data: [],//作业详情                schoolid: api.pageParam.schoolid,//学校id                answer: [],//答案数组                isPlaying: false,//老师留言是否播放中                isShowAnswer: false,                fileType: '',//素材类型                url: '',//素材路径                convert_status: '',//判断素材doc是否转码成功                type: '',//习题总分,                scorelist: '',                isctb: '',                filetime: 0,                title: '',            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                OneDecimalPlace:function(num){                    return parseInt((num)*10)/10;                },                GetPaperPaperExercisesAnswer: function () {//考试获取习题and学生答题详情                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetPaperPaperExercisesAnswer, {                        values: {                            paper_id: vm.material.paper_id,                            uid: $api.getStorage('uid'),                            xtid: vm.material.resource_id,                            classid:api.pageParam.exambjid,                            schoolid: $api.getStorage('schoolid'),                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.xzt_content').show();                                $('.kong_bg').hide();                                vm.data = ret.data[0];                                vm.isctb = ret.is_ctb;                                // alert(JSON.stringify(vm.data));                                if (vm.complete == 1||vm.complete == 2) {                                    if (queryHomewokAnswer[vm.material.resource_id]&&queryHomewokAnswer[vm.material.resource_id].da.length>0) {//缓存的答案                                        vm.answer = queryHomewokAnswer[vm.material.resource_id].da;                                    }                                }                            } else {                                $('.kong_bg').show();                                $('.xzt_content').hide();                            }                        } else {                            $('.kong_bg').show();                            $('.xzt_content').hide();                        }                    } ,'','',false)                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                isdxactive: function (xxid) {//判断多选选项是否选择了                    if (vm.answer.length > 0) {                        for (var i = 0; i < vm.answer.length; i++) {                            if (vm.answer[i] == xxid) {                                return true;                            }                        }                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    if (vm.data.tx == 'duoxt') {//判断是多选题 可以选多个答案                        if (vm.answer.length == 0) {                            vm.answer.push($(context).attr('id'));                            vm.saveAnswer(vm.answer);                        } else {                            for (var i = 0; i < vm.answer.length; i++) {                                if (vm.answer[i] == $(context).attr('id')) {                                    vm.answer.splice(i, 1);                                    vm.saveAnswer(vm.answer);                                    return;                                } else if (i == vm.answer.length - 1) {                                    vm.answer.push($(context).attr('id'));                                    vm.saveAnswer(vm.answer);                                    return;                                }                            }                        }                    } else {//判断是单选 或者判断题 只有一个选项的                        Vue.set(vm.answer, 0, $(context).attr('id'));                        vm.saveAnswer(vm.answer);                    }                },                saveAnswer: function (da) {                    var eachxtgroup = {                        'is_auto': 1,                        'tx': vm.data.tx,                        'xtid': vm.material.resource_id,                        'da': da,                        'daoptions': vm.data.daoptions,                        'tx_code': vm.data.tx_code,                        'score': vm.material.score,                        'part_score': vm.material.part_score,                        'xts':vm.material.xts,                        'part_xts':vm.material.part_xts,                    };                    api.sendEvent({                        name: 'saveAnswerHuancun',                        extra: {                            eachxtgroup: eachxtgroup,                            zyid: vm.material.resource_id,                            index: vm.index                        }                    });                },                studentRecord: function (context) {                    var url = vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime                    if (api.systemType == 'ios') {                        var hideenAudio = $api.dom('.hideenAudio');                    } else {                        audioStreamer = api.require('audioStreamer');                    }                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频                    if (playStatus == '0') {                        if (api.systemType == 'ios') {                            if (timer) {                                clearInterval(timer);                            }                            $api.attr(context, 'playStatus', '1');                            $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                            hideenAudio.play();                            sec = 0;                            allTimes = recodetime;                            timer = setInterval(function (e) {                                sec = sec + 1;                                allTimes = allTimes - 1;                                bfb = sec / recodetime * 100;   //2                                bfb = bfb.toFixed(2);//2                                var ss = 'background-size: ' + bfb + '% 100%';//2                                if (allTimes == 0 || sec >= recodetime) {                                    clearInterval(timer);                                    $api.attr(context, 'playStatus', '0');                                    $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                    var time = vm.getOutTime(recodetime);                                    $api.text($api.dom('.ypTimeP'), time);                                    range.value = 0;                                    $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                                } else {                                    range.value = sec;                                    var time = vm.getOutTime(allTimes);                                    $api.css($api.dom('.myRange'), ss);  //4                                    $api.text($api.dom('.ypTimeP'), time);                                }                            }, 1000);                        } else {                            api.showProgress({                                title: '正在加载资源',                                text: '请稍后...',                                modal: true                            });                            api.download({                                url: url,                                savePath: 'fs://mp3s/' + url,                                report: true,                                cache: true,                                allowResume: false                            }, function (ret, err) {                                if (ret.state == 1) {                                    api.hideProgress();                                    if (timer) {                                        clearInterval(timer);                                    }                                    $api.attr(context, 'playStatus', '1');                                    $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                                    downloadUrl = ret.savePath;                                    audioStreamer.openPlayer({                                        path: downloadUrl                                    }, function (ret) {                                    });                                    if (timer) {                                        clearInterval(timer);                                    }                                    $api.attr(context, 'playStatus', '1');                                    vm.isplayed = '1';                                    sec = 0;                                    allTimes = recodetime;                                    timer = setInterval(function (e) {                                        sec = sec + 1;                                        allTimes = allTimes - 1;                                        bfb = sec / recodetime * 100;   //2                                        bfb = bfb.toFixed(2);//2                                        var ss = 'background-size: ' + bfb + '% 100%';//2                                        if (allTimes == 0 || sec >= recodetime) {                                            clearInterval(timer);                                            $api.attr(context, 'playStatus', '0');                                            $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                            var time = vm.getOutTime(recodetime);                                            $api.text($api.dom('.ypTimeP'), time);                                            range.value = 0;                                            $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                                        } else {                                            range.value = sec;                                            var time = vm.getOutTime(allTimes);                                            $api.css($api.dom('.myRange'), ss);  //4                                            $api.text($api.dom('.ypTimeP'), time);                                        }                                    }, 1000);                                }                            });                        }                    } else if (playStatus == '1') {                        $api.attr(context, 'playStatus', '2');                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                        clearInterval(timer);                        if (api.systemType == 'ios') {                            hideenAudio.pause();                        } else {                            audioStreamer.pause();                        }                    } else {                        $api.attr(context, 'playStatus', '1');                        if (api.systemType == 'ios') {                            hideenAudio.play();                        } else {                            audioStreamer.openPlayer({                                path: downloadUrl                            }, function (ret) {                            });                        }                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                        timer = setInterval(function (e) {                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb = sec / recodetime * 100;    //5                            bfb = bfb.toFixed(2);   //5                            var ss = 'background-size: ' + bfb + '% 100%';  //5                            if (allTimes == 0 || sec >= recodetime) {                                $api.attr(context, 'playStatus', '0');                                clearInterval(timer);                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6                            } else {                                range.value = sec;                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);    //7                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    }                },                getOutTime: function (intime) {                    var outTime = '';                    if (intime <= 9) {                        outTime = '00:0' + intime;                    } else if (intime <= 59) {                        outTime = '00:' + intime;                    } else {                        var min = parseInt(intime / 60);                        var sec = intime % 60;                        if (sec <= 9) {                            if (min > 0 && min < 10) {                                outTime = '0' + min + ':0' + sec;                            } else if (min >= 10) {                                outTime = min + ':0' + sec;                            } else {                                outTime = '00:0' + sec;                            }                        } else {                            if (min > 0 && min < 10) {                                outTime = '0' + min + ':' + sec;                            } else if (min >= 10) {                                outTime = min + ':' + sec;                            } else {                                outTime = '00:' + sec;                            }                        }                    }                    return outTime;                },                // PostExercisesTriggerWrong:function(){//错题本改版 ，添加错题本、移除错题本、表及重点                //     var type;                //     if(vm.isctb==1){                //         type = 'outbook';                //     }else{                //         type = 'addbook';                //     }                //     apiObj.Post(UrlRouter.PostExercisesTriggerWrong, {                //         values: {                //             sys_id:vm.data.sys_id,                //             kc_type:2,                //             type:type                //         }                //     }, function (ret, err) {                //         if (ret) {                //             if (ret.ret == 0) {                //                 if(type=='outbook'){                //                     vm.isctb=0;                //                     api.toast({                //                         msg: '已移出错题本',                //                         duration: 2000,                //                         location: 'bottom'                //                     });                //                 }else{                //                     vm.isctb=1;                //                     api.toast({                //                         msg: '成功加入错题本',                //                         duration: 2000,                //                         location: 'bottom'                //                     });                //                 }                //                //             }else{                //                 api.toast({                //                     msg: ret.msg,                //                     duration: 2000,                //                     location: 'bottom'                //                 });                //             }                //         }else{                //             api.toast({                //                 msg: err.msg,                //                 duration: 2000,                //                 location: 'bottom'                //             });                //         }                //     })                // },            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if (src.substring(src.length - 3) == 'gif') {        } else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });        }    }    function cxjz() {        vm.GetPaperPaperExercisesAnswer();    }</script></html>
