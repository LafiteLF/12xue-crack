<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>答题统计</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <style>        .content {            width: 100%;            position: relative;            height: 100%;        }        .top {            width: 60%;            position: absolute;            left: 20%;            top: 30px;            background: #e0f4f4;            height: 200px;            border-radius: 6px;            border: 1px dashed #bfbfbf;        }        .top2 {            width: 60%;            position: absolute;            left: 20%;            top: calc(50% - 110px);            background: #e0f4f4;            height: 200px;            border-radius: 6px;            border: 1px dashed #bfbfbf;        }        .bottom {            width: 60%;            position: absolute;            left: 20%;            top: 238px;            background: #fff;            height: calc(100% - 258px);            border-radius: 6px;            border: 1px dashed #bfbfbf;        }        .ltimg, .rtimg {            width: 75px;            position: absolute;            top: -16px;        }        .ltimg {            left: -38px;        }        .rtimg {            right: -38px;        }        .lflj, .rflj {            width: 15px;            position: absolute;            bottom: -30px;            z-index: 10;        }        .lflj {            left: 90px        }        .rflj {            right: 90px        }        .white_circle {            width: 102px;            height: 102px;            border-radius: 100px;            border: 2px solid #fff;            margin: 0 auto;            margin-top: 13px;            position: relative;        }        .white_circle2 {            width: 102px;            height: 102px;            border-radius: 100px;            border: 2px solid #fff;            margin: 0 auto;            margin-top: 27px;        }        .solid_cricle {            width: 85px;            height: 85px;            border-radius: 100px;            background: #fff;            margin: 8px auto;            position: relative;        }        .solid_cricle2 {            width: 82px;            height: 82px;            border-radius: 100px;            background: #fff;            margin: 5px auto;            border: 5px solid #4bc7c7;        }        .solid_cricle2 b {            font-size: 3.4rem;            color: #4bc7c7;            text-align: center;            display: inline;            font-weight: normal;            /* padding-top: 14px; */            height: 40px;            vertical-align: top;            padding: 0 3px;            /* padding-top: 54px; */        }        .solid_cricle2 span {            font-size: 1.4rem;            color: #000;            display: block;            line-height: 80px;            text-align: center;        }        .solid_cricle b {            font-size: 3.0rem;            color: #4bc7c7;            text-align: center;            display: block;            font-weight: normal;            padding-top: 17px;            height: 34px;        }        .solid_cricle span {            font-size: 1.4rem;            color: #000;            display: block;            text-align: center        }        .ranking {            font-size: 1.8rem;            color: #303030;            width: 100%;            text-align: center;            padding-top: 10px;        }        .ranking span {            font-size: 2.1rem;            color: #4bc7c7        }        .ranking b {            width: 25px;            display: inline-block;        }        .Identification {            text-align: center;            padding-top: 13px;        }        .Identification li {            display: inline-block;            text-align: center;            font-size: 1.4rem;            margin: 0 10px;        }        .Identification li span {            display: inline-block;            width: 6px;            height: 6px;            margin-right: 5px;            border-radius: 40px;            vertical-align: bottom;            margin-bottom: 6px;        }        .Identification li:nth-of-type(1) {            color: #4bc7c7        }        .Identification li:nth-of-type(1) span {            color: #4bc7c7;            background: #4bc7c7;        }        .Identification li:nth-of-type(2) {            color: #df7605        }        .Identification li:nth-of-type(2) span {            color: #df7605;            background: #df7605        }        .Identification li:nth-of-type(3) {            color: #ffcc00        }        .Identification li:nth-of-type(3) span {            color: #ffcc00;            background: #ffcc00        }        .Identification li:nth-of-type(4) {            color: #ff778c        }        .Identification li:nth-of-type(4) span {            color: #ff778c;            background: #ff778c        }        .Identification li:nth-of-type(5) {            color: #d5d5d5        }        .Identification li:nth-of-type(5) span {            color: #d5d5d5;            border: 1px solid #d5d5d5        }        .bottomnr {            margin: 25px 15px 10px 15px;            padding-left: 10px;            padding-right: 10px;            height: calc(100% - 35px);            width: calc(100% - 50px);            overflow-y: scroll;        }        h1 {            font-size: 1.8rem;            color: #303030;            height: 18px;            line-height: 18px;            border-left: 4px solid #4bc7c7;            padding-left: 12px;            font-weight: normal;            /* margin-left: 0px; */            margin-top: 15px;        }        .classification {            position: relative;            padding-top: 5px;        }        .classification span {            position: absolute;            right: 20px;            top: 15px;            color: #9a9a9a;            font-size: 1.2rem        }        .classification span b {            font-weight: normal;            color: #4bc7c7;            padding: 0 3px;            font-size: 1.2rem        }        .Serial li {            float: left;            width: 30px;            height: 30px;            border-radius: 100px;            color: #fff;            background: #4bc7c7;            text-align: center;            line-height: 30px;            font-size: 1.4rem;            margin: 5px 8px        }        .Serial {            padding-bottom: 10px;            padding-top: 10px;            padding-left: 9px;        }        /*滚动条样式*/        *::-webkit-scrollbar { /*滚动条整体样式*/            width: 5px; /*高宽分别对应横竖滚动条的尺寸*/            height: 100%;        }        *::-webkit-scrollbar-thumb { /*滚动条里面小方块*/            border-radius: 10px;            -webkit-box-shadow: none;            background: #83dad9;        }        *::-webkit-scrollbar-track { /*滚动条里面轨道*/            -webkit-box-shadow: none;            border-radius: 10px;            background: #d8f6f4;        }        .tzts {            font-size: 1.2rem;            color: #9a9a9a;            position: absolute;            display: inline-block;            top: 17px;            left: 123px;        }        .solid_cricle i {            display: inline;            font-size: 2rem;            font-style: normal        }        .wxts {            font-size: 1.4rem;            color: #d5d5d5;            text-align: center;            position: absolute;            width: 100%;            top: calc(50% - 16px);        }        /*支持IE9及以上*/        .circle-bar {font-size: 200px;            width: 34px;            height: 34px;            position: absolute;            top: 2px;            left: 2px; }        .circle-bar-left,.circle-bar-right { width: 34px; height: 34px; background-color: #eee; }        /*            这里采用clip剪切了圆，实现左右两个半圆，右半圆在后面，因此在更上一层，            clip的用法参考：http://www.w3school.com.cn/cssref/pr_pos_clip.asp         */        .circle-bar-right { clip:rect(0,auto,auto,17px); }        .circle-bar-left { clip:rect(0,17px,auto,0); }        /*所有的后代都水平垂直居中，这样就是同心圆了*/        .circle-bar * {  position: absolute; top:0; right:0; bottom:0; left:0; margin:auto; }        /*自身以及子元素都是圆*/        .circle-bar, .circle-bar > * { border-radius: 50%; }        /*支持IE9及以上*/        .circle-bar2 {font-size: 200px;            width: 100px;            height: 100px;            position: absolute;            top: 0;            left:0; }        .circle-bar-left2,.circle-bar-right2 { width: 100px; height: 100px; background-color: #eee; }        /*            这里采用clip剪切了圆，实现左右两个半圆，右半圆在后面，因此在更上一层，            clip的用法参考：http://www.w3school.com.cn/cssref/pr_pos_clip.asp         */        .circle-bar-right2 { clip:rect(0,auto,auto,50px); }        .circle-bar-left2 { clip:rect(0,50px,auto,0); }        /*所有的后代都水平垂直居中，这样就是同心圆了*/        .circle-bar2 * {  position: absolute; top:0; right:0; bottom:0; left:0; margin:auto; }        /*自身以及子元素都是圆*/        .circle-bar2, .circle-bar2 > * { border-radius: 50%; }        .quan-zql{            width: 100px;            height: 100px;            border-radius: 1000px;            position: absolute;            top: 1px;            left: 1px;        }    </style></head><body><div class="content" v-if="isshow">    <!--有习题-->    <div  class="top">        <img class="ltimg" src="../../../image/stuHomePad/tjleft.png">        <img class="rtimg" src="../../../image/stuHomePad/tjright.png">        <img class="lflj" src="../../../image/stuHomePad/tj.png">        <img class="rflj" src="../../../image/stuHomePad/tj.png">        <div class="white_circle">            <div class="quan-zql">                <div class="circle-bar2" v-if="data.review_complete==1" :style="zql>=85?'background:linear-gradient(to right,#4bc7c7, #89da8b)':zql<85&&zql>=60?'background:linear-gradient(to right,#ffce00, #fff000)':'background:linear-gradient(to right, #ec9706 , #ff4736)'" >                    <div class="circle-bar-left2":style="bgleft()" ></div>                    <div class="circle-bar-right2" :style="bgright()"></div>                </div>            </div>            <div class="quan-zql" v-if="data.review_complete==0">                <div  style="background:#eee;  width: 100px; height: 100px; position: absolute; top: 0; left:0;border-radius: 1000px"></div>            </div>            <div class="solid_cricle" v-if="data.review_complete==1">                <b v-html="OneDecimalPlace(data.user_marks)"></b>                <span >分</span>            </div>            <div class="solid_cricle" v-if="data.review_complete==0">            <b   style=" font-size: 2.4rem;color:#d5d5d5 ;padding-top: 24px"> 暂无</b>            </div>        </div>        <!--<p class="ranking">用时：<span v-text="showtime(data.duration)" ></span></p>-->        <ul class="Identification">            <li><span></span>正确</li>            <li><span></span>错误</li>            <li><span></span>半对</li>            <li><span></span>待批</li>        </ul>    </div>    <div  class="bottom">        <!--显示答案-->        <div  class="bottomnr">            <div  class="classification">                <ul class="Serial clearfix"  >                    <li v-for="list in data.data" v-text="list.sort" :style="list.is_true==0?'background:#ff778c':list.is_true==2?'background:#df7605':list.is_true==3?'background:#ffcc00':list.is_true==-1?'background:#fff; border: 1px solid #cecece; color: #cccccc ;width: 28px; height: 28px;':''"  tapmode @click="openwin(list);" ></li>                </ul>            </div>        </div>    </div></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/wx-audio.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script type="text/javascript" src="../../../script/DateUtil.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    apiready = function () {        vue();       vm.examlist = api.pageParam.examlist;       vm.GetPaperStuStasticinfo();       // alert(JSON.stringify(api.pageParam.scorelist))    };    function vue() {        vm = new Vue({            el: '.content',            data: {                examlist:{},                data:{},                zql:0,                isshow:false            },            updated: function () {            },            methods: {                bgleft:function( ){                    if(vm.zql>50){                        return 'transform:rotate('+((vm.zql-50)*3.6)+'deg)';                    }                },                bgright:function( ){                        if(vm.zql<=50){                            var zql2;                            if(vm.zql=='暂无'){                                zql2 = 0;                            }else{                                zql2 = vm.zql;                            }                            return 'transform:rotate('+(zql2*3.6)+'deg)';                        }else{                            if(vm.zql>=85){                                return  'transform:rotate(0deg); background :linear-gradient(to right,#4bc7c7, #89da8b );'                            }else if(vm.zql>=60&& vm.zql<85){                                return  'transform:rotate(0deg); background :linear-gradient(to right,#ffce00, #fff000);'                            }else{                                return  'transform:rotate(0deg); background-color:#ff4637'                            }                        }                },                openwin:function(content){                    api.openWin({                        name: 'win_detail',                        url: 'win_detail.html',                        pageParam: {                            examtitle:api.pageParam.examlist.title,                            examid:api.pageParam.examlist.id,                            exambjid:api.pageParam.examlist.bjid,                            examMateriallist:api.pageParam.examlist.materiallist,                            examzts:api.pageParam.examlist.zts,                            current:content.num,                            complete:api.pageParam.complete,                            scorelist:api.pageParam.scorelist,                            showanswer:api.pageParam.showanswer,                            zyyq:api.pageParam.examlist.content,                            isxsScore:true                        }                    });                },                showtime:function(time){                    return DateUtil.formatTimeToFriendly(time)                },                OneDecimalPlace:function(num){                    return parseInt((num)*10)/10;                },                GetPaperStuStasticinfo: function () {                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: false                    });                    apiObj.Get(UrlRouter.GetPaperStuStasticinfo, {                        values: {                            uid: $api.getStorage('uid'),                            classid:api.pageParam.examlist.bjid,                            paperid:api.pageParam.examlist.id                        }                    }, function (ret, err) {                        if (ret) {                            if (ret.ret == 0) {                                $('.content').show();                                vm.data=ret.data;                                vm.zql=parseInt(ret.data.user_marks/ret.data.full_marks*100);                                vm.isshow=true;                                api.hideProgress();                            } else {                                api.hideProgress();                                api.toast({                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        } else {                            api.hideProgress();                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    } ,'','',false);                },            }        });    }</script></html>
