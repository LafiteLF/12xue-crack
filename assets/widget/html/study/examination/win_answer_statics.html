<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>考试统计</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/></head><body><header class="clearfix">    <div onclick="  api.closeWin();" class="winTitle pull_left">        考试统计    </div></header></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var inputType;//进入统计页面的方式    apiready = function () {        // alert(JSON.stringify(api.pageParam.examlist));        api.closeWin({            name: 'win_detail'        });        api.closeFrameGroup({            name: 'frame_Detail'        });        var header = document.querySelector('header');        var headerH = $api.offset(header).h;        var frameH = padWinHeight - headerH;        api.setStatusBarStyle({            style: 'light'        });        api.openFrame({            name: 'frame_answer_statics',            url: 'frame_answer_statics.html',            rect: {                x: 0,                y: headerH,                w: api.winWidth,                h: frameH            },            pageParam: {                examlist:api.pageParam.examlist,                complete:api.pageParam.complete,                scorelist:api.pageParam.scorelist,                showanswer:api.pageParam.showanswer,            },//            bounces: true        });        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            api.closeWin();        });    };</script></html>
