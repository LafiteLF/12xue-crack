    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>
    <style>
        .close {
            width: 100%;

            /*display: none*/

        body{

        .content{
            width: 300px;

            border-radius: 5px;

            padding-top: 132px;

        }

        }

<div class="close" onclick="api.closeFrame();"  ></div>
