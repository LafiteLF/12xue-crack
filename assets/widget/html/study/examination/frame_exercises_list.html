<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>习题列表</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/exerciseCss.css"/>    <style>        .ex_content{ display: none}        .ex_content dl{            padding-top: 0;        }        .ex_content dl p{ display: inline;margin: 0;padding: 0}        .listtg b p{ display: inline}        .listtg span p{ display: inline}        .ex_content dl dd{ line-height: 58px!important;}        .ex_content dl dd p img{; height:25px!important;margin-top: 16px}    </style></head><body><div class="ex_content">    <dl v-if=" materiallist.length>0">        <dd v-if="data.content&& data.content!=''" >            <p @click="openWinDetail('zyyq',0)" style="display: block; font-weight: bold" class="overflow">考试说明</p>        </dd>        <dd v-for="(list,index) in materiallist" :id="index" tapmode @click="openWinDetail('xt',index)">            <p v-if="list.tx_code==0" style="display: block"  class="listtg overflow">                <b v-html="list.zymc"></b>                <span v-if="list.discript" v-html="'('+tihuan(list.discript)+')'"></span>            </p>           <p v-if="list.tx_code!=0 && (list.tx_code!=4 || (list.tx_code==4 && list.xts==1)) " v-html="list.sort+'.'+getzymc(list.txstr,list.tx,list.zymc,list.score)" style="display: block"></p>            <p style="display: block" v-if=" list.tx_code==4 && list.xts>1 " v-html="list.sort+'～'+(list.sort+list.xts-1)+'.'+getzymc(list.txstr,list.tx,list.zymc,list.score)"></p>            <!--<span v-if="data.isshowanswer==1"  class="ex-daipi" :style="list.is_unable==1?'color:#ccc':list.is_unable==0&& list.is_true==0?'color:#ff778c':list.is_unable==0&& list.is_true==1?'color:#4bc7c7':list.is_unable==0&& list.is_true==2?'color:#f57f17':list.is_unable==0&& list.is_true==3?'color:#ffcc00':'color:#ffcc00'" v-text="list.is_unable==1?' ':list.is_unable==0&& list.is_true==0?'待批':list.is_unable==0&& list.is_true!=0?OneDecimalPlace(list.user_score)+'分':''" ></span>-->            <span v-if="data.isshowanswer==1 && list.tx_code!=0 && data.is_complete!=4"   class="ex-daipi" :style="list.is_true==0?'color:#ff778c': list.is_true==1?'color:#4bc7c7':list.is_true==2?'color:#f57f17': list.is_true==3?'color:#ffcc00':'color:#ffcc00'" v-text="list.is_true==0?'待批':OneDecimalPlace(list.user_score)+'分'" ></span>        </dd>    </dl>    <!--<dl >-->        <!--<dd  >-->            <!--<p   style="display: block">大是大非个人途径体育馆森岛帆高方大化工 <img src="../../../image/contentDel.png"></p>-->            <!--<p style="display: block"  ></p>-->            <!--<span   class="ex-daipi"   ></span>-->        <!--</dd>-->    <!--</dl>--></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    // var newdata;    apiready = function () {        vue();        $('.ex_content').show();        vm.data=api.pageParam.examListdata;        // alert(JSON.stringify(vm.data));        // newdata =JSON.parse(api.pageParam.examListdata);        vm.materiallist =api.pageParam.materiallist;    };    function vue() {        vm= new Vue({            el: '.ex_content',            data: {                data:{},                materiallist:[],                zyyq:api.pageParam.examListdata.content,                scorelist:[]            },            updated: function () {            },            methods: {                tihuan: function (zymc) {                    var tgStr;                    tgStr = zymc.replace(new RegExp("<br>", "gm"), "");                    tgStr = tgStr.replace(new RegExp("<br style=\"white-space: normal;\"/>", "gm"), "");                    tgStr = tgStr.replace(new RegExp("<br style=\"whi-space: normal;\"/>", "gm"), "");                    tgStr = tgStr.replace(new RegExp("<br/>", "gm"), "");                    tgStr = tgStr.replace(new RegExp("<p>", "gm"), "");                    tgStr = tgStr.replace(new RegExp("</p>", "gm"), "");                    tgStr = tgStr.replace(new RegExp("<br />", "gm"), "");                    tgStr.replace(/(^\s*)|(\s*$)/g, "");                    tgStr = tgStr.replace(new RegExp("&nbsp;", "gm"), "");                    return tgStr;                },                OneDecimalPlace:function(num){                    return parseInt((num)*10)/10;                },                getzymc: function (txstr,tx,zymc,score) {                        if(tx!='tdjh' && tx!='tdh' &&tx!='tdb'&&tx!='ttt'){                            return '【'+txstr+'】'+'('+vm.OneDecimalPlace(score)+'分) '+zymc;                        }else{                            return '【'+txstr+'】'+'('+vm.OneDecimalPlace(score)+'分) '+'<img src="../../../image/newhomework/tlbt.png">';                        }                },                openWinDetail:function(type,index){                    api.openWin({                        name: 'win_detail',                        url: 'win_detail.html',                        pageParam: {                            examtitle:vm.data.title,                            examid:vm.data.id,                            exambjid:vm.data.bjid,                            examMateriallist:vm.data.materiallist,                            examzts:vm.data.zts,                            current:index,                            complete:vm.data.is_complete,                            scorelist:api.pageParam.scorelist,                            showanswer:vm.data.isshowanswer,                            isopenzyyq:type,                            zyyq:vm.data.content,                            isxsScore:true                        }                    });                },                Arabia_To_SimplifiedChinese:function (Num) {                    for (i = Num.length - 1; i >= 0; i--) {                        Num = Num.replace(",", "")//替换Num中的“,”                        Num = Num.replace(" ", "")//替换Num中的空格                    }                    //验证输入的字符是否为数字                    if (isNaN(Num)) {                        alert("请检查小写金额是否正确");                        return;                    }                    //字符处理完毕后开始转换，采用前后两部分分别转换(小数点为界限)                    part = String(Num).split(".");                    // 初始化一个字符串                    newchar = "";                    //小数点前进行转化                    for (i = part[0].length - 1; i >= 0; i--) {                        //若数量超过拾亿单位，提示                        if (part[0].length > 10) {                            //alert("位数过大，无法计算");                            return "";                        }                        tmpnewchar = ""                        perchar = part[0].charAt(i);                        switch (perchar) {                            case "0":  tmpnewchar = "零" + tmpnewchar;break;                            case "1": tmpnewchar = "一" + tmpnewchar; break;                            case "2": tmpnewchar = "二" + tmpnewchar; break;                            case "3": tmpnewchar = "三" + tmpnewchar; break;                            case "4": tmpnewchar = "四" + tmpnewchar; break;                            case "5": tmpnewchar = "五" + tmpnewchar; break;                            case "6": tmpnewchar = "六" + tmpnewchar; break;                            case "7": tmpnewchar = "七" + tmpnewchar; break;                            case "8": tmpnewchar = "八" + tmpnewchar; break;                            case "9": tmpnewchar = "九" + tmpnewchar; break;                        }                        switch (part[0].length - i - 1) {                            case 0: tmpnewchar = tmpnewchar; break;                            case 1: if (perchar != 0) tmpnewchar = tmpnewchar + "十"; break;                            case 2: if (perchar != 0) tmpnewchar = tmpnewchar + "百"; break;                            case 3: if (perchar != 0) tmpnewchar = tmpnewchar + "千"; break;                            case 4: tmpnewchar = tmpnewchar + "万"; break;                            case 5: if (perchar != 0) tmpnewchar = tmpnewchar + "十"; break;                            case 6: if (perchar != 0) tmpnewchar = tmpnewchar + "百"; break;                            case 7: if (perchar != 0) tmpnewchar = tmpnewchar + "千"; break;                            case 8: tmpnewchar = tmpnewchar + "亿"; break;                            case 9: tmpnewchar = tmpnewchar + "十"; break;                        }                        newchar = tmpnewchar + newchar;                    }                    //替换所有无用汉字，直到没有此类无用的数字为止                    while (newchar.search("零零") != -1 || newchar.search("零亿") != -1 || newchar.search("亿万") != -1 || newchar.search("零万") != -1) {                        newchar = newchar.replace("零亿", "亿");                        newchar = newchar.replace("亿万", "亿");                        newchar = newchar.replace("零万", "万");                        newchar = newchar.replace("零零", "零");                    }                    //替换以“一十”开头的，为“十”                    if (newchar.indexOf("一十") == 0) {                        newchar = newchar.substr(1);                    }                    //替换以“零”结尾的，为“”                    if (newchar.lastIndexOf("零") == newchar.length - 1) {                        newchar = newchar.substr(0, newchar.length - 1);                    }                    return newchar;                }            }        });    }</script></html>
