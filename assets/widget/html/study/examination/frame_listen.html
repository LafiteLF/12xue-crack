<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>听力题</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>    <style>        .listen_content{ display: none}    </style></head><body><div class="kong_bg">    <div class="cxjz">        <div class="cxjztop clearfix">            <img src="../../../image/newhomework/cxjz.png">            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>        </div>        <div class="cxjz_button" onclick="cxjz()">重新加载</div>    </div></div><div class="listen_content">    <!--<img  v-if="complete==2 && material.zyqf == 2 && isShowAnswer && data.res_type!=2" class="jrctb noImgClick" :src="isctb!=1?'../../../image/newhomework/join.png':'../../../image/newhomework/out.png'" @click="PostExercisesTriggerWrong()">-->    <!--题干部分开始-->    <div class="listen_stem">        <ul>            <li class="tixing clearfix">                <!--<div class="tihao" v-text="material.sort+'.'"></div>-->                <div class="tixingzi"  v-text="'【'+material.txstr+'】'"></div>            </li>        </ul>        <div class=" font666 listen_tigan" >            <p v-html="data.tg"></p>            <div class="tdjhyinpin clearfix" v-if="data.attachments" >                <img  class="scyp1 noImgClick" src="../../../image/newhomework/yuyinimg.png">                <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);"  src="../../../image/startPlay.png" alt="">                <div class="ypRange"> <input class="myRange" type="range" min="0"  value="0"  :max='data.attachments[0].filetime' ></div>                <p class="ypTimeP" v-text="getOutTime(data.attachments[0].filetime)"></p>                <audio class="hideenAudio" :src='data.attachments[0].serverpath + data.attachments[0].preview_link' ></audio>            </div>        </div>    </div>    <!--题干部分结束-->    <div class="listen_bottom">        <dd  :style="!isShowAnswer && (complete==4 ||complete == 5) ?'display:inline-block':'display:none'" class="tishi"><img src="../../../image/newhomework/ts.png">未到答案显示时间，暂不显示正确答案哟~</dd>        <!--答题部分开始-->        <span v-if="isShowAnswer && complete == 5" class="zongfen">                     <span v-if="data.is_true==0" style="color: #ff778c">待批</span>                <span v-if="data.is_true!=0 " v-html="'本题得分<em>'+OneDecimalPlace(data.score)+'</em>/总分'+showScore(scorelist)"></span>            </span>        <span class="listen_xiaoti" :style="!isShowAnswer && (complete==4 ||complete==5)?'top:40px':'top:10px'" v-text="'共'+xiaotinum+'题'"></span>        <div v-for="(list,index) in data.children" >            <div class="listenda_content">                <div class="listen_xtxx" v-html="(index+material.sort)+'.'+list.tg"></div>                <ul v-if="complete==1||complete==2" class="option">                    <li v-for="item in list.options" :id="item.id" :index="index" :class="answer[index].da[0]==item.id?'danxoption xxactive':'danxoption'" tapmode onclick="vm.xxselectClicked(this)"v-text="item.xx" ></li>                </ul>            </div>            <!--答题部分结束-->            <!--答案部分开始-->            <dl v-if="complete == 5"  class="listen_answer bgFFF">                <div v-if="isShowAnswer" class="defen">                    <span v-if="list.is_true==0" style="color: #ff778c">待批</span>                    <b  v-if="list.is_true!=0 " v-html="'得分<em>'+OneDecimalPlace(list.score)+'</em>/分值'+ OneDecimalPlace(scorelist[index])"></b>                </div>                <dd v-if="complete==5 ">                    <h2 class="wendah2">【我的答案】</h2>                    <ul class="clearfix wendawdda">                        <li class="wendazi" v-text="list.is_unable==1?'未答':list.xsdastr"></li>                    </ul>                </dd>                <dd :style="isShowAnswer?'display:block':'display:none'">                    <h2 class="wendah2 " v-text="'【'+material.tx_tip+'】'"></h2>                    <ul>                        <li class="wendazi" v-html="list.dastr==''?'无':list.dastr" ></li>                    </ul>                </dd>                <dd :style="isShowAnswer?'display:block':'display:none'">                    <h2 class="wendah2">【答案解析】</h2>                    <ul>                        <li class="wendazi"  v-html="list.dajx==''?'无':list.dajx"></li>                    </ul>                </dd>            </dl>            <!--答案部分结束-->        </div>        <div class="jrctbkong"></div>    </div></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var queryHomewokAnswer;    var allTimes = 0;//音频播放    var sec;    var timer = null;    var audioStreamer;    var downloadUrl = '';    windowError();    apiready = function () {        vue();        if(vm.complete==2 ||vm.complete==1) {            if (JSON.stringify(api.pageParam.queryHomewokAnswer) == '[]') {                queryHomewokAnswer = {};            } else {                queryHomewokAnswer = JSON.parse(api.pageParam.queryHomewokAnswer[0].xtgroup.replace('&apos;', "'"));            }        }else{//答完题显示答案            vm.scorelist = api.pageParam.scorelist;        }        if(api.pageParam.showanswer==1){            vm.isShowAnswer=true;        }else{            vm.isShowAnswer=false;        }        vm.GetPaperPaperExercisesAnswer();        // if(vm.complete==4||vm.complete==5){//答完题显示总分        //     vm.type = api.pageParam.type;        //     vm.scorelist = api.pageParam.scorelist;        // }        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if($api.domAll('.scyp2').length>=1){                if($('.scyp2').attr('playStatus')==1){                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                clearInterval(timer);                if(api.systemType == 'ios'){                    var hideenAudio = $api.dom('.hideenAudio');                    hideenAudio.pause();                }else {                    audioStreamer = api.require('audioStreamer');                    audioStreamer.pause();                }            }            api.stopPlay();            $('.img1').show();            $('.img2').hide();        });    };    function vue(){        vm = new Vue({            el: '.listen_content',            data: {                index: api.pageParam.index,//当前frame的索引                material: api.pageParam.material,//当前习题资料                complete: api.pageParam.complete,//作业完成状态                data: [],                schoolid: api.pageParam.schoolid,//学校id                xiaotinum:0,                answer:[],                isPlaying: false,//老师留言是否播放中                isShowAnswer: false,                scorelist:'',                isctb:'',                type:''//习题总分            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                OneDecimalPlace:function(num){                    return parseInt((num)*10)/10;                },                GetPaperPaperExercisesAnswer: function () {//考试获取习题and学生答题详情                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetPaperPaperExercisesAnswer, {                        values: {                            paper_id: vm.material.paper_id,                            uid: $api.getStorage('uid'),                            xtid: vm.material.resource_id,                            classid: api.pageParam.exambjid,                            schoolid: $api.getStorage('schoolid'),                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.listen_content').show();                                $('.kong_bg').hide();                                vm.data = ret.data[0];                                vm.xiaotinum = ret.data[0].children.length;                                // alert(JSON.stringify(vm.data));                                if (vm.complete == 2 ||vm.complete == 1) {                                    for (var i = 0; i < ret.data[0].children.length; i++) {//给初始化的小题加个默认空答案 防止报错                                        var kongcontent = {                                            'topid': ret.data[0].id,                                            'id': ret.data[0].children[i].id,                                            'da': [],                                            'daoptions': ret.data[0].children[i].daoptions,                                            'sort': ret.data[0].children[i].sort,                                        };                                        Vue.set(vm.answer, i, kongcontent);                                    }                                    // alert(JSON.stringify(queryHomewokAnswer[vm.material.resource_id]))                                    if (queryHomewokAnswer[vm.material.resource_id].children&&queryHomewokAnswer[vm.material.resource_id].children.length>0) {//缓存的答案                                        vm.answer = queryHomewokAnswer[vm.material.resource_id].children;                                    }                                }                            } else {                                $('.kong_bg').show();                                $('.listen_content').hide();                            }                        } else {                            $('.kong_bg').show();                            $('.listen_content').hide();                        }                    } ,'','',false)                },                showScore: function (list) {                    var allscore = 0;                    for (var i = 0; i < list.length; i++) {                        allscore = allscore + Number(list[i]);                        if (i + 1 == list.length) {                            return vm.number_analysis(allscore);                        }                    }                },                number_analysis:function(number, bit){                    /**                     * number_format                     * @param number 传进来的数,                     * @param bit 保留的小数位,默认保留两位小数                     */                    if (vm.is_empty(number)) {                        return number;                    }                    //设置接收参数的默认值                    bit = bit ? bit : 1;                    var str = '';                    number = Number(number);                    number = (number).toFixed(bit);//格式化                    var realnum = number.split('.')[0];//整数位(使用小数点分割整数和小数部分)                    var decimal = number.split('.')[1];//小数位                    //重新拼接实数部分和小数位                    if (parseInt(decimal) > 0)                        realnum = realnum + '.' + decimal;                    return realnum;                },                is_empty:function(data){                    /**                     * 判断对象或字符串是否为空                     * @param data                     * @author 邹峰                     * @time 2017年07月24日15:44:24                     * @return {boolean}                     */                    if (typeof data === 'undefined') {                        return true;                    } else if (typeof data === 'string' && (data === '' || data === '0' || data === 'null')) {                        return true;                    } else if (typeof data === 'object') {                        for (var name in data) {                            return false;                        }                        return true;                    } else if (data instanceof Array) {                        if (data.length === 0) return true;                    } else if (typeof data === 'boolean') {                        return !data;                    } else if (data === null || data === 'null') {                        return true;                    } else if (data === 0 || data === '0') {                        return true;                    }                    return false;                },                xtzongfen:function(xtzf,xtnum,xtindex){                    var b=Math.floor((xtzf*10)/xtnum)/10;                    if(xtindex+1==xtnum){                        var last= xtzf-(b*(xtnum-1));                        if(last.toString().split('.')[1]>0){last = last.toFixed(1)}else{last = last.toFixed(0)}                        return last                    }else{                        return b;                    }                },                alertzsd:function(content){                    alert('知识点：'+content);                },                // PostExercisesTriggerWrong:function(){//错题本改版 ，添加错题本、移除错题本、表及重点                //     var type;                //     if(vm.isctb==1){                //         type = 'outbook';                //     }else{                //         type = 'addbook';                //     }                //     apiObj.Post(UrlRouter.PostExercisesTriggerWrong, {                //         values: {                //             sys_id:vm.data.sys_id,                //             kc_type:2,                //             type:type                //         }                //     }, function (ret, err) {                //         if (ret) {                //             if (ret.ret == 0) {                //                 if(type=='outbook'){                //                     vm.isctb=0;                //                     api.toast({                //                         msg: '已移出错题本',                //                         duration: 2000,                //                         location: 'bottom'                //                     });                //                 }else{                //                     vm.isctb=1;                //                     api.toast({                //                         msg: '成功加入错题本',                //                         duration: 2000,                //                         location: 'bottom'                //                     });                //                 }                //                //             }else{                //                 api.toast({                //                     msg: ret.msg,                //                     duration: 2000,                //                     location: 'bottom'                //                 });                //             }                //         }else{                //             api.toast({                //                 msg: err.msg,                //                 duration: 2000,                //                 location: 'bottom'                //             });                //         }                //     })                // },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    var xtindex=$(context).attr('index');                    vm.answer[xtindex].da =[$(context).attr('id')];                    vm.saveAnswer(vm.answer);                },                saveAnswer:function (da) {                    var eachxtgroup = {                        'is_auto': 1,                        'tx': vm.data.tx,                        'xtid': vm.material.resource_id,                        'children': da,                        'tx_code':vm.data.tx_code,                        'score': vm.material.score,                        'part_score': vm.material.part_score,                        'xts':vm.material.xts,                        'part_xts':vm.material.part_xts,                    };                    api.sendEvent({                        name: 'saveAnswerHuancun',                        extra: {                            eachxtgroup: eachxtgroup,                            zyid: vm.material.resource_id,                            index:vm.index                        }                    });                },                studentRecord:function (context) {                    var url =   vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime                    if(api.systemType == 'ios'){                        var hideenAudio = $api.dom('.hideenAudio');                    }else {                        audioStreamer = api.require('audioStreamer');                    }                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频                    if (playStatus == '0') {                        if(api.systemType == 'ios') {                            if (timer) {                                clearInterval(timer);                            }                            $api.attr(context, 'playStatus', '1');                            $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                            hideenAudio.play();                            sec = 0;                            allTimes = recodetime;                            timer = setInterval(function (e) {                                sec = sec + 1;                                allTimes = allTimes - 1;                                bfb = sec / recodetime * 100;   //2                                bfb = bfb.toFixed(2);//2                                var ss = 'background-size: ' + bfb + '% 100%';//2                                if (allTimes == 0 || sec >= recodetime) {                                    clearInterval(timer);                                    $api.attr(context, 'playStatus', '0');                                    $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                    var time = vm.getOutTime(recodetime);                                    $api.text($api.dom('.ypTimeP'), time);                                    range.value = 0;                                    $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                                } else {                                    range.value = sec;                                    var time = vm.getOutTime(allTimes);                                    $api.css($api.dom('.myRange'), ss);  //4                                    $api.text($api.dom('.ypTimeP'), time);                                }                            }, 1000);                        }else {                            api.showProgress({                                title: '正在加载资源',                                text: '请稍后...',                                modal: true                            });                            api.download({                                url : url,                                savePath:'fs://mp3s/' + url,                                report : true,                                cache : true,                                allowResume : false                            }, function(ret, err) {                                if (ret.state == 1) {                                    api.hideProgress();                                    if (timer) {                                        clearInterval(timer);                                    }                                    $api.attr(context, 'playStatus', '1');                                    $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                                    downloadUrl = ret.savePath;                                    audioStreamer.openPlayer({                                        path: downloadUrl                                    }, function (ret) {                                    });                                    if (timer) {                                        clearInterval(timer);                                    }                                    $api.attr(context, 'playStatus', '1');                                    vm.isplayed = '1';                                    sec = 0;                                    allTimes = recodetime;                                    timer = setInterval(function (e) {                                        sec = sec + 1;                                        allTimes = allTimes - 1;                                        bfb = sec / recodetime * 100;   //2                                        bfb = bfb.toFixed(2);//2                                        var ss = 'background-size: ' + bfb + '% 100%';//2                                        if (allTimes == 0 || sec >= recodetime) {                                            clearInterval(timer);                                            $api.attr(context, 'playStatus', '0');                                            $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                            var time = vm.getOutTime(recodetime);                                            $api.text($api.dom('.ypTimeP'), time);                                            range.value = 0;                                            $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                                        } else {                                            range.value = sec;                                            var time = vm.getOutTime(allTimes);                                            $api.css($api.dom('.myRange'), ss);  //4                                            $api.text($api.dom('.ypTimeP'), time);                                        }                                    }, 1000);                                }                            });                        }                    } else if (playStatus == '1') {                        $api.attr(context, 'playStatus', '2');                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                        clearInterval(timer);                        if(api.systemType == 'ios'){                            hideenAudio.pause();                        }else {                            audioStreamer.pause();                        }                    } else {                        $api.attr(context, 'playStatus', '1');                        if(api.systemType == 'ios'){                            hideenAudio.play();                        }else {                            audioStreamer.openPlayer({                                path: downloadUrl                            }, function (ret) {                            });                        }                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                        timer = setInterval(function (e) {                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb =  sec/recodetime *100;    //5                            bfb = bfb.toFixed(2);   //5                            var ss = 'background-size: '+bfb + '% 100%';  //5                            if (allTimes == 0 || sec >= recodetime) {                                $api.attr(context, 'playStatus', '0');                                clearInterval(timer);                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6                            } else {                                range.value = sec;                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);    //7                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    }                },                getOutTime: function (intime) {                    var outTime = '';                    if(intime<=9){                        outTime = '00:0'+intime;                    }else if(intime<=59){                        outTime = '00:'+intime;                    }else {                        var min =parseInt(intime/60);                        var sec = intime%60;                        if(sec<=9){                            if(min>0&&min<10){                                outTime ='0'+ min+ ':0' + sec ;                            }else if(min>=10){                                outTime = min+ ':0' + sec ;                            }else{                                outTime = '00:0'+sec;                            }                        }else{                            if(min>0&&min<10){                                outTime ='0'+ min + ':'+ sec ;                            }else if(min>=10){                                outTime = min + ':'+ sec ;                            }else {                                outTime = '00:'+sec;                            }                        }                    }                    return outTime;                }            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if(src.substring(src.length-3)=='gif'){}else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });}    }    function cxjz() {        vm.GetPaperPaperExercisesAnswer();    }</script></html>
