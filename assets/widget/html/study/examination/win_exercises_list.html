<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>习题列表</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width: calc(100% - 400px);        }        .buttonFive {            font-size: 1.2rem;            height: 27px;            line-height: 28px;            width: 110px;            overflow: hidden;            border: 1px solid #4BC7C7;            border-radius: 3px;            /*display: inline-block;*/            text-align: right;            display: none;        }        .buttonFive p{ display: inline-block; height: 27px; width:86px; text-align: center}        .markingMember {            background: url(../../../image/newhomework/xspy.png) no-repeat 5px 5px #fff;            background-size: 19px 17px;        }        .markingMember:active {            color: #fff;            background: url(../../../image/newhomework/xspy2.png) no-repeat 5px 5px #4bc7c7;            background-size: 19px 17px;        }        .quekao{            font-size: 1.4rem;            color: #ff778c;            margin-right: 20px!important;            padding-top: 5px;        }        .chengji{            font-size: 1.4rem;            color: #999;            float: right;            margin-top: 0px!important;            margin-right: 20px!important;            padding-top: 0px;            height: 49px;            line-height: 52px;        }        .chengji span{ color: #666}        .chengji span b{ font-weight: normal;color: #333}        .answerStatisticshui {            background: url(../../../image/newhomework/icon1hui.png) no-repeat 5px 5px #fff;            background-size: 19px 17px;        }    </style></head><body><header class="clearfix examcontent">    <div onclick="  vm.CloseWin();" class="winTitle pull_left" v-text="examtitle">    </div>    <ul class="pull_right clearfix winIcon">        <li   class="buttonFour font4BC7C7 answerStatisticshui pull_right"        v-if="data.is_complete==5 && data.isshowanswer!=1" style="color: #ddd; border-color: #ddd;  "><p>考试统计</p></li>        <li @click="openAnswerStatics()" class="buttonFour font4BC7C7 answerStatistics pull_right"            v-if="data.is_complete==5 && data.isshowanswer==1" ><p>考试统计</p></li>        <li class="chengji" v-if="data.is_complete==5">用时：<span>{{quzheng(data.duration)}}分钟</span></li>        <li class="chengji"v-if="data.is_complete==5">成绩：<span><b style="color:#4bc7c7" v-text="data.review_complete==1 && data.isshowanswer==1?OneDecimalPlace(data.user_marks):'暂无'"></b>/{{OneDecimalPlace(data.full_marks)}}</span></li>        <li class="quekao" v-if="data.is_complete==4">缺考</li>    </ul></header></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript" src="../../../script/common.js"></script><script type="text/javascript" src="../../../script/fastclick.js"></script><script type="text/javascript" src="../../../script/DateUtil.js"></script><script type="text/javascript">    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var newdata;    apiready = function () {        vue();        api.closeWin({            name: 'win_detail'        });        api.closeWin({            name: 'win_examing2'        });        vm.examtitle=api.pageParam.examtitle;        vm.examid=api.pageParam.examid;        vm.exambjid=api.pageParam.exambjid;        // alert(JSON.stringify(vm.homeworkLists))        vm.GetPaperStuinfo();        // Android按返回键关闭页面时结束自定义页面统计        api.addEventListener({            name: 'keyback'        }, function (ret, err) {            vm.CloseWin();        });    };     function vue(){         vm= new Vue({             el: '.examcontent',             data: {                 examtitle:'',                 examid:'',                 exambjid:'',                 data:{},                 materiallist:[],                 scorelist:[],                 showanswer:0             },             methods: {                 quzheng:function(num){                     return Math.ceil(num/60);                 },                 CloseWin:function(){                     api.sendEvent({                         name: 'shuaxinExamList',                     });                     api.closeWin();                 },                 showtime:function(time){                     return DateUtil.formatTimeToFriendly(time)                 },                 openAnswerStatics:function(){                     // if(vm.homeworkLists.showanswer==1){                         api.openWin({                             name: 'win_answer_statics',                             url: 'win_answer_statics.html',                             pageParam: {                                 examlist:JSON.parse(newdata),                                 materiallist:vm.materiallist,                                 scorelist:vm.scorelist,                                 complete:api.pageParam.complete,                                 showanswer:vm.data.isshowanswer,                             }                         });                     // }                 },                 OneDecimalPlace:function(num){                     return parseInt((num)*10)/10;                 },                 Arabia_To_SimplifiedChinese:function (Num) {                     for (i = Num.length - 1; i >= 0; i--) {                         Num = Num.replace(",", "")//替换Num中的“,”                         Num = Num.replace(" ", "")//替换Num中的空格                     }                     //验证输入的字符是否为数字                     if (isNaN(Num)) {                         alert("请检查小写金额是否正确");                         return;                     }                     //字符处理完毕后开始转换，采用前后两部分分别转换(小数点为界限)                     part = String(Num).split(".");                     // 初始化一个字符串                     newchar = "";                     //小数点前进行转化                     for (i = part[0].length - 1; i >= 0; i--) {                         //若数量超过拾亿单位，提示                         if (part[0].length > 10) {                             //alert("位数过大，无法计算");                             return "";                         }                         tmpnewchar = ""                         perchar = part[0].charAt(i);                         switch (perchar) {                             case "0":  tmpnewchar = "零" + tmpnewchar;break;                             case "1": tmpnewchar = "一" + tmpnewchar; break;                             case "2": tmpnewchar = "二" + tmpnewchar; break;                             case "3": tmpnewchar = "三" + tmpnewchar; break;                             case "4": tmpnewchar = "四" + tmpnewchar; break;                             case "5": tmpnewchar = "五" + tmpnewchar; break;                             case "6": tmpnewchar = "六" + tmpnewchar; break;                             case "7": tmpnewchar = "七" + tmpnewchar; break;                             case "8": tmpnewchar = "八" + tmpnewchar; break;                             case "9": tmpnewchar = "九" + tmpnewchar; break;                         }                         switch (part[0].length - i - 1) {                             case 0: tmpnewchar = tmpnewchar; break;                             case 1: if (perchar != 0) tmpnewchar = tmpnewchar + "十"; break;                             case 2: if (perchar != 0) tmpnewchar = tmpnewchar + "百"; break;                             case 3: if (perchar != 0) tmpnewchar = tmpnewchar + "千"; break;                             case 4: tmpnewchar = tmpnewchar + "万"; break;                             case 5: if (perchar != 0) tmpnewchar = tmpnewchar + "十"; break;                             case 6: if (perchar != 0) tmpnewchar = tmpnewchar + "百"; break;                             case 7: if (perchar != 0) tmpnewchar = tmpnewchar + "千"; break;                             case 8: tmpnewchar = tmpnewchar + "亿"; break;                             case 9: tmpnewchar = tmpnewchar + "十"; break;                         }                         newchar = tmpnewchar + newchar;                     }                     //替换所有无用汉字，直到没有此类无用的数字为止                     while (newchar.search("零零") != -1 || newchar.search("零亿") != -1 || newchar.search("亿万") != -1 || newchar.search("零万") != -1) {                         newchar = newchar.replace("零亿", "亿");                         newchar = newchar.replace("亿万", "亿");                         newchar = newchar.replace("零万", "万");                         newchar = newchar.replace("零零", "零");                     }                     //替换以“一十”开头的，为“十”                     if (newchar.indexOf("一十") == 0) {                         newchar = newchar.substr(1);                     }                     //替换以“零”结尾的，为“”                     if (newchar.lastIndexOf("零") == newchar.length - 1) {                         newchar = newchar.substr(0, newchar.length - 1);                     }                     return newchar;                 },                 GetPaperStuinfo: function () {//                     // api.showProgress({                     //     title: '加载中',                     //     text: '请稍后...',                     //     modal: false                     // });                     apiObj.Get(UrlRouter.GetPaperStuinfo, {                         values: {                             uid: $api.getStorage('uid'),                             classid:vm.exambjid,                             paperid:vm.examid                         }                     }, function (ret, err) {                         api.hideProgress();                         if (ret) {                             if (ret.ret == 0) {                                 vm.data=ret.data;                                 newdata =JSON.stringify(ret.data);                                 vm.showanswer=ret.data.isshowanswer;                                 // vm.examlist =ret.data                                 // alert(JSON.stringify(ret.data));                                 for(var i=0;i<vm.data.materiallist.length;i++){                                     var list=vm.data.materiallist[i];                                     var listdata=list.data;                                     var dttigan={'tx_code':0,'zymc':list.title,'resource_id':'dati'+i,sort:vm.Arabia_To_SimplifiedChinese(i+1),'discript':list.discript,'part_score':0};                                     listdata.unshift(dttigan);                                     vm.materiallist=vm.materiallist.concat(listdata);                                 }                                 for(var j = 0; j < vm.materiallist.length; j++){                                     var scorelist= vm.materiallist[j].part_score+'';                                     vm.scorelist[j] = scorelist.split(',');                                 }                                 // alert(JSON.stringify(ret.data))                                 var header = document.querySelector('header');                                 headerH = $api.offset(header).h;                                 var frameH = padWinHeight - headerH;                                 api.setStatusBarStyle({                                     style: 'light'                                 });                                 api.openFrame({                                     name: 'frame_exercises_list',                                     url: 'frame_exercises_list.html',                                     rect: {                                         x: 0,                                         y: headerH,                                         w: api.winWidth,                                         h: frameH                                     },                                     pageParam: {                                         examListdata:JSON.parse(newdata),                                         showanswer:vm.showanswer,                                         materiallist:vm.materiallist,                                         scorelist:vm.scorelist                                     }//            bounces: true                                 });                             }                             else{                                 api.hideProgress();                                 api.toast({                                     msg: ret .msg,                                     duration: 2000,                                     location: 'bottom'                                 });                             }                         }else{                             api.hideProgress();                             api.toast({                                 msg: err .msg,                                 duration: 2000,                                 location: 'bottom'                             });                         }                     } ,'','',false);                 },             }         })     }</script></html>
