<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        html, body {
            background-color: rgba(0, 0, 0, 0.3);
        }   .aui-border-t:before, .aui-border-b:after{ height: 0px;}
        .content {
            width: 35%;
            max-height: 50%;
            height: auto;
            top: 25%;
            position: absolute;
            left: 32.5%;
            overflow-y: scroll;
        }
        .aui-border-t:before, .aui-border-b:after{ height: 0px;}
        .content dl {
            width: 100%;
            height: 100%;
            background: #fff;
            margin: 0 auto;
            border-radius: 5px;
            overflow-y: auto;
        }


        .content dl dd {
            line-height: 55px;
            font-size: 0.7rem;
            color: #333333;
            border-bottom: 1px solid #e3e3e3;
            padding: 0 10%;;
        }
        .content dl dd:active {
            line-height: 55px;
            font-size: 0.7rem;
            color: #4bc7c7;
            border-bottom: 1px solid #e3e3e3;
            padding: 0 10%;;
        }
        .close {
            width: 100%;
            height: 100%
        }
        [v-cloak] {
            display: none;
        }

    </style>
</head>
<body>
<div class="close" tapmode onclick="api.closeFrame({
    name: 'bjpage'
});"></div>
<div  id="app" class="content">
    <dl >
        <dd  v-for="item,index in datalist" class="item-content aui-border-b aui-ellipsis-1" tapmode @click="itemClick(item,index)" v-text="item.name">
        </dd>
    </dl>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script type="text/javascript">
    var vm;
    apiready = function () {
        vm = new Vue({
            el: '.content',
            data: {
                datalist: api.pageParam.data,
            },
            methods: {
                itemClick: function (item,index) {
                    api.sendEvent({
                        name: 'selectbjindex',
                        extra: {bjindex: index}
                    });
                    api.closeFrame({
                        name: 'bjpage'
                    });
                }
            }
        });

    };
</script>
</html>
