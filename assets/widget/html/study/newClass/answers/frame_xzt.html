<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>单选 多选 判断 听单句话 单项选择</title>    <link rel="stylesheet" type="text/css" href="../../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../../css/frameDetail.css"/>    <script src="../../../../script/interact@1.10.27.min.js"></script></head><style>    .xzt_content {        display: none;    }    strong {        color: #000;        font-weight: bold    }    .tixingzi {        margin-left: 36px;    }    #aiBtn {        touch-action: none;   /* 禁止默认手势（必须） */        -webkit-user-drag: none; /* 禁止 iOS safari 拖拽图片 */        user-select: none;    /* 禁止文字选中 */    }</style><body><div class="kong_bg">    <div class="cxjz">        <div class="cxjztop clearfix">            <img src="../../../../image/newhomework/cxjz.png">            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>        </div>        <div class="cxjz_button" onclick="cxjz()">重新加载</div>    </div></div><div class="xzt_content">    <img v-if="isShowAnswer" id="aiBtn" class="noImgClick" @click.stop="PostAIBtn()" src="../../../../image/newhomework/aiBtn.png" style="position: fixed; right: 1vw; top:50%; transform: translateY(-50%); width: 50px; z-index: 300;" alt="AI解析">    <div class="content">        <div class="stem">            <ul>                <li class="tixing clearfix">                    <div class="tixingzi" v-text="'【'+xtinfo.txstr+'】'"></div>                </li>            </ul>            <div class="tg_content font666" v-html="data.tg"></div>            <div class="scyinpin clearfix" v-if="xtinfo.tx=='tdjh' && data.attachments">                <img class="scyp1 noImgClick" src="../../../../image/newhomework/yuyinimg.png">                <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);"                     src="../../../../image/startPlay.png" alt="">                <div class="ypRange"><input class="myRange" type="range" min="0" value="0"                                            :max='data.attachments[0].filetime'></div>                <p class="ypTimeP" v-text="getOutTime(data.attachments[0].filetime)"></p>                <audio class="hideenAudio"                       :src='data.attachments[0].serverpath + data.attachments[0].preview_link'>                </audio>            </div>        </div>        <!--答案部分开始-->        <dl v-if="complete==2" class="wenda_answer bgFFF">            <dt v-if="isShowAnswer" class="defen">                <img class="noImgClick" v-if="answerData.is_true!=0"                     :src="answerData.is_true==1?' ../../../../image/newhomework/zhengque.png':answerData.is_true==2?'../../../../image/newhomework/cuowu.png':answerData.is_true==3?'../../../../image/newhomework/bandui.png':''">                <span :style="answerData.is_true==1?'color: #4bc7c7':answerData.is_true==2?'color: #df7605':answerData.is_true==3?'color: #ffcd06':''"                      v-text="answerData.is_true==1?'正确':answerData.is_true==2?'错误':answerData.is_true==3?'正确率'+ (answerData.accuracy*100)+'%':''"></span>            </dt>            <dd>                <h2 class="wendah2">【我的答案】</h2>                <ul class="clearfix wendawdda">                    <li class="wendazi">                        <p v-text="is_unable==1 ? '未答' : selectedXx"></p>                    </li>                </ul>            </dd>            <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">                <h2 class="wendah2" v-text="'【'+data.tx_tip+'】'"></h2>                <ul>                    <li class="wendazi" v-html="data.dastr==''?'无':data.dastr"></li>                </ul>            </dd>            <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">                <h2 class="wendah2">【答案解析】</h2>                <ul>                    <li class="wendazi" v-html="data.dajx==''?'无':data.dajx"></li>                </ul>            </dd>        </dl>        <!--答案部分结束-->    </div>    <!--作答部分开始-->    <ul v-if="complete!=2" class="option">        <!--单选-->        <li v-for="list in data.option" v-if="data.tx!='duoxt'" :id="list.id" :xx="data.tx=='pdt'?list.description:list.xx"            :class="answer[0]==list.id?'danxoption xxactive':'danxoption'"            v-text="data.tx=='pdt'?list.description:list.xx"            tapmode onclick="vm.xxselectClicked(this)"></li>        <!--多选-->        <li v-for="list in data.option" v-if="data.tx=='duoxt'" :id="list.id" :xx="list.xx"            :class="isdxactive(list.id)?'duoxoption xxactive':'duoxoption'" v-text="list.xx"            tapmode onclick="vm.xxselectClicked(this)"></li>        <!--<li class="bhz font4BC7C7" tapmode onclick="vm.checded(this)">-->            <!--<span :class="is_unable==1?'inputCheckactive':''"></span>不会做-->        <!--</li>-->    </ul>    <div style="width: 100%;padding-top: 2rem; padding-bottom: 2rem" v-if="complete!=2">        <div class="upBtn" tapmode onclick="vm.commitAnswer()">提交</div>    </div>    <!--作答部分结束--></div></body><script type="text/javascript" src="../../../../script/api.js"></script><script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../../script/vue.js"></script><script type="text/javascript" src="../../../../script/common.js"></script><script type="text/javascript" src="../../../../script/fastclick.js"></script><script type="text/javascript" src="../../../../script/dealwithanswer.js"></script><script type="text/javascript" src="../../../../script/html2canvas.js"></script><script>    var apiObj;    var classObj, classObjForCloud;    var vm;    var allTimes = 0;//音频播放    var sec;    var timer = null;    var audioStreamer;    var downloadUrl = '';    var answerBody;    apiready = function () {        apiObj = new GridOpenApi(UrlDomain, source, version);        apiObj.SetAuthToken($api.getStorage('token'));        classObj = new GridOpenApi('http://' + $api.getStorage('ip'), source, version);        classObjForCloud = new GridOpenApi('http://' + $api.getStorage('netIP'), source, version);        vue();        vm.GetParentexercisesUrl();        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if ($api.domAll('.scyp2').length >= 1) {                if ($('.scyp2').attr('playStatus') == 1) {                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                clearInterval(timer);                if (api.systemType == 'ios') {                    var hideenAudio = $api.dom('.hideenAudio');                    hideenAudio.pause();                } else {                    audioStreamer = api.require('audioStreamer');                    audioStreamer.pause();                }            }            api.stopPlay();            $('.img1').show();            $('.img2').hide();        });        api.addEventListener({            name: 'answerEnd'        }, function (ret, err) {            vm.complete = 2;            vm.isShowAnswer = true;        });    };    function vue() {        vm = new Vue({            el: '.xzt_content',            data: {                complete: 0,//作业完成状态                data: [],//作业详情                answerData: {},                schoolid: $api.getStorage('schoolid'),//学校id                answer: [],//答案数组                is_unable: 0,//是否会做 0会做 1不会做                isShowAnswer: false,                type: '',//习题总分,                filetime: 0,                scorelist: '',                title: '',                xtinfo: api.pageParam.xtinfo,                classid: $api.getStorage('classid'),                selectedXx: ''            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            mounted() {                interact('#aiBtn')                    .draggable({                        listeners: {                            move (event) {                                const target = event.target                                const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx                                const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy                                target.style.transform = `translate(${x}px, ${y}px)`                                target.setAttribute('data-x', x)                                target.setAttribute('data-y', y)                            }                        }                    })            },            methods: {                GetParentexercisesUrl: function () {//获取作业习题详情及答题结果                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetParentexercisesUrl, {                        values: {                            hwid: vm.xtinfo.kcid,                            uid: $api.getStorage('uid'),                            xtid: vm.xtinfo.id,                            classid: vm.classid,                            ytlx: 2,                            schoolid: vm.schoolid                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.xzt_content').show();                                $('.kong_bg').hide();                                vm.data = ret;                            } else {                                $('.kong_bg').show();                                $('.xzt_content').hide();                            }                        } else {                            $('.kong_bg').show();                            $('.xzt_content').hide();                        }                    })                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                isdxactive: function (xxid) {//判断多选选项是否选择了                    if (vm.answer.length > 0) {                        for (var i = 0; i < vm.answer.length; i++) {                            if (vm.answer[i] == xxid) {                                return true;                            }                        }                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    if (vm.data.tx == 'duoxt') {//判断是多选题 可以选多个答案                        if (vm.answer.length == 0) {                            vm.answer.push($(context).attr('id'));                            vm.selectedXx = vm.selectedXx + $(context).attr('xx');                            vm.is_unable = 0;//会做                        } else {                            for (var i = 0; i < vm.answer.length; i++) {                                if (vm.answer[i] == $(context).attr('id')) {                                    vm.answer.splice(i, 1);                                    vm.selectedXx = vm.selectedXx.replace($(context).attr('xx'), '');                                    vm.is_unable = 0;//会做                                    return;                                } else if (i == vm.answer.length - 1) {                                    vm.answer.push($(context).attr('id'));                                    vm.selectedXx = vm.selectedXx + $(context).attr('xx');                                    vm.is_unable = 0;//会做                                    return;                                }                            }                        }                    } else {//判断是单选 或者判断题 只有一个选项的                        vm.selectedXx = $(context).attr('xx');                        Vue.set(vm.answer, 0, $(context).attr('id'));                        vm.is_unable = 0;//会做                    }                },                checded: function (context) {//复选框不会做点击事件                    vm.answer = [];                    vm.is_unable = 1;//不会做                },                commitAnswer: function () {                    if (vm.answer.length == 0) {                        api.toast({                            msg: '无法提交未作答习题！',                            duration: 2000,                            location: 'bottom'                        });                        return;                    }                    api.confirm({                        title: '提示',                        msg: '答案提交后无法修改，是否现在提交?',                        buttons: ['立即提交', '检查答案']                    }, function (ret, err) {                        if (ret.buttonIndex == 1) {                            api.showProgress({                                title: '答案提交中',                                text: '请稍后',                                modal: true                            });                            answerBody = {                                uid: $api.getStorage('uid'),                                kcid: vm.xtinfo.kcid,                                xsbjid: vm.classid,                                xkid: vm.data.xkid,                                njid: vm.data.njid,                                bbid: vm.data.bbid,                                sxcid: vm.data.sxcid,                                dyid: vm.data.dyid,                                jieid: vm.data.jieid,                                is_complete: 1,                                schoolid: vm.schoolid,                                ytlx: 1,//1基础 2拓展                                finish_time: 0,                                is_auto: 1,                                tx: vm.data.tx,                                is_unable: 0,                                xtid: vm.data.xtid,                                da: vm.answer,                                daoptions: vm.data.daoption,                                tx_code: vm.data.tx_code,                                score: 0,                                part_score: 0                            };                            vm.upToPc();                        }                    });                },                upToPc: function () {                    if (vm.data.tx == 'duoxt') {                        var a = vm.selectedXx.split("");                        var b = a.sort();                        var c = '';                        for (var i=0; i<b.length; i++) {                            c = c + b[i];                        }                        vm.selectedXx = c;                    }                    var dastr;                    if (vm.data.tx == 'pdt') {                        if (vm.selectedXx == '对') {                            dastr = 'A'                        } else if (vm.selectedXx == '错') {                            dastr = 'B'                        } else {                            dastr = vm.selectedXx;                        }                    } else {                        dastr = vm.selectedXx;                    }                    //区分云端课堂                    if ($api.getStorage('connectType') == 'Lan') {                        classObj.Post(UrlRouter.PostAnswer, {                            body: $api.jsonToStr({                                classid: vm.classid,                                uid: $api.getStorage('uid'),                                xtid: vm.data.xtid,                                kcid: vm.xtinfo.kcid,                                isauto: '1',                                istxt: 1,                                tx: vm.data.tx,                                tx_code: vm.data.tx_code,                                da: dastr,                                xsdastr: dastr,                                sxda: dastr                            })                        }, function (ret, err) {                            if (ret) {                                ProcessRet1(ret);                            } else {                                api.hideProgress();                                api.toast({                                    msg: err.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        });                    } else {                        api.addEventListener({                            name: 'ReceiveMessage_7a'                        }, function (ret, err) {                            ProcessRet1(ret.value.receive);                        });                        classObjForCloud.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostAnswer, {                            body: $api.jsonToStr({                                classid: vm.classid,                                uid: $api.getStorage('uid'),                                xtid: vm.data.xtid,                                kcid: vm.xtinfo.kcid,                                isauto: '1',                                istxt: 1,                                tx: vm.data.tx,                                tx_code: vm.data.tx_code,                                da: dastr,                                xsdastr: dastr,                                sxda: dastr,                                from: 'ReceiveMessage_7a',                                vclass_token: $api.getStorage('vclass_token'),                                private_token: $api.getStorage('private_token')                            })                        }, function (ret, err) {                            if (ret && ret.status == 1) {                            } else {                                api.hideProgress();                                api.toast({                                    msg: '提交失败',                                    duration: 2000,                                    location: 'bottom'                                });                            }                        });                    }                    vm.finishUpData(dealWithAnswer(answerBody));                },                finishUpData: function (ret) {                    if (ret) {                        vm.answerData = ret.answer;                    }                },                studentRecord: function (context) {                    var url = vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime                    if (api.systemType == 'ios') {                        var hideenAudio = $api.dom('.hideenAudio');                    } else {                        audioStreamer = api.require('audioStreamer');                    }                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1                    //这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频                    if (playStatus == '0') {                        if (api.systemType == 'ios') {                            if (timer) {                                clearInterval(timer);                            }                            $api.attr(context, 'playStatus', '1');                            $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');                            hideenAudio.play();                            sec = 0;                            allTimes = recodetime;                            timer = setInterval(function (e) {                                sec = sec + 1;                                allTimes = allTimes - 1;                                bfb = sec / recodetime * 100;   //2                                bfb = bfb.toFixed(2);//2                                var ss = 'background-size: ' + bfb + '% 100%';//2                                if (allTimes == 0 || sec >= recodetime) {                                    clearInterval(timer);                                    $api.attr(context, 'playStatus', '0');                                    $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                                    var time = vm.getOutTime(recodetime);                                    $api.text($api.dom('.ypTimeP'), time);                                    range.value = 0;                                    $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                                } else {                                    range.value = sec;                                    var time = vm.getOutTime(allTimes);                                    $api.css($api.dom('.myRange'), ss);  //4                                    $api.text($api.dom('.ypTimeP'), time);                                }                            }, 1000);                        } else {                            api.showProgress({                                title: '正在加载资源',                                text: '请稍后...',                                modal: true                            });                            api.download({                                url: url,                                savePath: 'fs://mp3s/' + url,                                report: true,                                cache: true,                                allowResume: false                            }, function (ret, err) {                                if (ret.state == 1) {                                    api.hideProgress();                                    if (timer) {                                        clearInterval(timer);                                    }                                    $api.attr(context, 'playStatus', '1');                                    $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');                                    downloadUrl = ret.savePath;                                    audioStreamer.openPlayer({                                        path: downloadUrl                                    }, function (ret) {                                    });                                    if (timer) {                                        clearInterval(timer);                                    }                                    $api.attr(context, 'playStatus', '1');                                    vm.isplayed = '1';                                    sec = 0;                                    allTimes = recodetime;                                    timer = setInterval(function (e) {                                        sec = sec + 1;                                        allTimes = allTimes - 1;                                        bfb = sec / recodetime * 100;   //2                                        bfb = bfb.toFixed(2);//2                                        var ss = 'background-size: ' + bfb + '% 100%';//2                                        if (allTimes == 0 || sec >= recodetime) {                                            clearInterval(timer);                                            $api.attr(context, 'playStatus', '0');                                            $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                                            var time = vm.getOutTime(recodetime);                                            $api.text($api.dom('.ypTimeP'), time);                                            range.value = 0;                                            $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                                        } else {                                            range.value = sec;                                            var time = vm.getOutTime(allTimes);                                            $api.css($api.dom('.myRange'), ss);  //4                                            $api.text($api.dom('.ypTimeP'), time);                                        }                                    }, 1000);                                }                            });                        }                    } else if (playStatus == '1') {                        $api.attr(context, 'playStatus', '2');                        $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                        clearInterval(timer);                        if (api.systemType == 'ios') {                            hideenAudio.pause();                        } else {                            audioStreamer.pause();                        }                    } else {                        $api.attr(context, 'playStatus', '1');                        if (api.systemType == 'ios') {                            hideenAudio.play();                        } else {                            audioStreamer.openPlayer({                                path: downloadUrl                            }, function (ret) {                            });                        }                        $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');                        timer = setInterval(function (e) {                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb = sec / recodetime * 100;    //5                            bfb = bfb.toFixed(2);   //5                            var ss = 'background-size: ' + bfb + '% 100%';  //5                            if (allTimes == 0 || sec >= recodetime) {                                $api.attr(context, 'playStatus', '0');                                clearInterval(timer);                                $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6                            } else {                                range.value = sec;                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);    //7                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    }                },                getOutTime: function (intime) {                    var outTime = '';                    if (intime <= 9) {                        outTime = '00:0' + intime;                    } else if (intime <= 59) {                        outTime = '00:' + intime;                    } else {                        var min = parseInt(intime / 60);                        var sec = intime % 60;                        if (sec <= 9) {                            if (min > 0 && min < 10) {                                outTime = '0' + min + ':0' + sec;                            } else if (min >= 10) {                                outTime = min + ':0' + sec;                            } else {                                outTime = '00:0' + sec;                            }                        } else {                            if (min > 0 && min < 10) {                                outTime = '0' + min + ':' + sec;                            } else if (min >= 10) {                                outTime = min + ':' + sec;                            } else {                                outTime = '00:' + sec;                            }                        }                    }                    return outTime;                },                PostAIBtn: async function () {                    if (vm.xtinfo.tx == 'tdjh') {                        api.toast({                            msg: '听力题暂不支持AI解析'                        })                        return;                    }                    api.showProgress({                        title: '正在请求AI',                        text: '请稍后...',                        modal: true                    });                    const aiAnalysis = $api.getStorage('aiAnalysis');                    try{                        const ret = await new Promise((resolve, reject) => {                            apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {                                body: $api.jsonToStr({                                    schoolid: $api.getStorage('schoolid'),                                    type: 'ai_analysis',                             }                        }).catch(error => {                            api.hideProgress();                            api.toast({                                msg: '截图失败：' + error,                                duration: 2000,                                location: 'bottom'                            });                        });                    });                }            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if (src.substring(src.length - 3) == 'gif') {        } else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });        }    }    function cxjz() {        vm.GetParentexercisesUrl()    }    function ProcessRet1(ret) {        api.hideProgress();        if (ret) {            if (ret.status == '-1') {                api.toast({                    msg: '你已经不是本班学生',                    duration: 2000,                    location: 'bottom'                });            } else if (ret.status == '0') {                api.toast({                    msg: '提交失败！',                    duration: 2000,                    location: 'bottom'                });            } else if (ret.status == '1') {                api.toast({                    msg: '提交成功！',                    duration: 2000,                    location: 'bottom'                });                api.sendEvent({                    name: 'commited'                });                vm.complete = 2;
