<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title>限时答题-单题</title>
    <link rel="stylesheet" type="text/css" href="../../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../../css/aui.2.0.css"/>
    <style>


        .nav-spanBtn {
            border: 1px solid #4bc7c7 !important;
            border-radius: 3px;
            font-size: 0.8rem;
            background: url("../../../../image/stuHomePad/add.png") no-repeat 6px 6px #fff;
            padding: 5px;
            margin-right: 10px;
            background-size: 18px;
            padding-left: 28px;
        }

        .nav-spanBtn:active {
            background: url("../../../../image/stuHomePad/addactive.png") no-repeat 6px 6px #4bc7c7;
            background-size: 18px;
            color: #fff;
        }

        header {
            border-bottom: 0;
        }

        .commited {
            width: 50%;
            margin-left: 25%;
            text-align: center;
            position: absolute;
        }

        .commited p {

            color: #FF935F;
        }

        .jxdt {
            width: 100px;
            height: 36px;
            background-color: #4bc7c7;
            border-radius: 50px;
            color: #ffffff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .jxdt:active {
            background-color: #ffffff;
            color: #4bc7c7;
        }

    </style>
</head>
<body>

<header id="main" class="aui-bar aui-bar-nav aui-bar-primary">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="closeWin()">
        <span class="aui-iconfont aui-icon-left"></span><span class="title">限时答题</span>
    </a>
    <!--<div style="float: right" tapmode onclick="nextXt()" class="jxdt aui-hide">-->
    <!--<span class="nav-spanBtn" style="font-size: 0.7rem">继续答题</span>-->
    <!--</div>-->
    <div v-if="isDisplayAiAnalysis"
         style="display: flex; flex-direction: row; position: absolute; left: 50%; transform: translateX(-50%); font-size: 0.6rem;">
        <div style="color: black;">本月剩余</div>
        <div style="color: #999999; margin-left: 10px;">AI解析次数:&nbsp;
            <span style="font-weight: bold;"
                  :style="{'color': aiAnalysis.count > 0 ? '#4BC7C7': '#F82A1A'}">{{ aiAnalysis.count }}</span></div>
        <div style="color: #999999; margin-left: 10px;">变式题推送次数:&nbsp;
            <span style="font-weight: bold;"
                  :style="{'color': aiPush.count > 0 ? '#4BC7C7': '#F82A1A'}">{{ aiPush.count }}</span></div>
    </div>

    <div id="win-right" class="aui-hide"
         style="display: flex; flex-direction: row; align-items: center; position:absolute; right: 5px; height: 36px; top: 10px;">
        <div @click.stop="openAiPush"
             style="display: flex;flex-direction: row; height: 27px; align-items: center; border: 1px solid #4BC7C7; border-radius: 3px; padding: 0 3px;">
            <img src="../../../../image/newhomework/aibst.png" alt="AI变式题"
                 style="width: 19px; height: 17px; margin-right: 5px;">
            <div style="font-size: 14px;  color: #4BC7C7; line-height: 1;">AI变式题</div>
        </div>
        <div class="jxdt" style="margin-left: 10px;" tapmode onclick="nextXt()">继续答题</div>
    </div>


    <div class="commited aui-hide" style="font-size: 16px;">
        <p>答案已成功提交，限时答题未结束，请耐心等待</p>
    </div>

</header>


</body>
<script type="text/javascript" src="../../../../script/api.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../../script/vue.global.prod-3.5.18.js"></script>
<script type="text/javascript" src="../../../../script/class_score.js"></script>
<script type="text/javascript" src="../../../../script/jquery-3.7.1.min.js"></script>
<script type="text/javascript">

    var xtinfo;
    var classObj, classObjForCloud;
    var classid;
    var headerH;
    var frameH;
    var heart;//标志心跳服务的请求计时

    var is_commit = 0; //是否已提交
    let app;

    apiready = function () {

        var header = document.querySelector('header');
        api.setStatusBarStyle({
            style: 'light'
        });
        classid = $api.getStorage('classid');
        classObj = new GridOpenApi('http://' + $api.getStorage('ip'), source, version);
        classObjForCloud = new GridOpenApi('http://' + $api.getStorage('netIP'), source, version);

        headerH = $api.offset(header).h;
        frameH = padWinHeight - headerH;
        xtinfo = api.pageParam.xtinfo;
        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
            closeWin();
        });

        api.addEventListener({
            name: 'commited'
        }, function (ret, err) {
            is_commit = 1;
            $api.removeCls($api.dom('.commited'), 'aui-hide');
//            api.setFrameAttr({
//                name: frameName,
//                rect: {
//                    x: 10,
//                    y: headerH + 24,
//                    w: api.winWidth - 20,
//                    h: frameH -38
//                }
//            });

        });


        api.addEventListener({
            name: 'viewdisappear'
        }, function (ret, err) {
            api.sendEvent({
                name: 'yinpinCLose'
            });
        });
        api.addEventListener({
            name: 'pause'
        }, function (ret, err) {
            api.sendEvent({
                name: 'yinpinCLose'
            });
        });


        //接收打开打分的事件
        api.addEventListener({
            name: api.winName
        }, function (ret, err) {
            stuScorePublicFunction(ret.value.scoreData, ret.value.type);
        });


        getUrl();
        getHeart();

        api.closeWin({
            name: 'win-class-answerCard-pad'
        });
        api.closeWin({
            name: 'win-xsdt-xtz-main-pad'
        });

        const {createApp, ref, onBeforeMount, watch} = Vue
        app = createApp({
            setup() {
                const isDisplayAiAnalysis = ref(false)
                const aiAnalysis = ref({count: 0})
                const aiPush = ref({count: 0})

                onBeforeMount(() => {
                    const apiObj = new GridOpenApi(UrlDomain, source, version)
                    apiObj.SetAuthToken($api.getStorage('token'))
                    watch(aiAnalysis, () => {
                        $api.setStorage('aiAnalysis', aiAnalysis.value);
                    }, {deep: true})

                    api.addEventListener({
                        name: 'aiAnalysis.count--'
                    }, () => {
                        if(aiAnalysis.value.count > 0){
                            aiAnalysis.value.count -= 1;
                        }
                    })

                    try {
                        apiObj.Get(UrlRouter.GetPayfeeCountByType, {
                            values: {
                                type: 'ai_analysis',
                                schoolid: $api.getStorage('schoolid'),
                            }
                        }, (ret, err) => {
                            if (ret) {
                                if (ret.ret === 0) {
                                    aiAnalysis.value = ret.data;
                                } else {
                                    aiAnalysis.value = {count: 0};
                                }
                            } else {
                                throw new Error(err)
                            }
                        })

                        apiObj.Get(UrlRouter.GetPayfeeCountByType, {
                            values: {
                                uid: $api.getStorage("uid"),
                                type: 'ai_push',
                                schoolid: $api.getStorage("schoolid"),
                            }
                        }, (ret, err) => {
                            if (ret && ret.ret === 0) {
                                aiPush.value = ret.data;
                            } else {
                                aiPush.value = {count: 0};
                                console.log("获取用户付费信息失败");
                            }
                        })
                    } catch (e) {
                        console.error(e);
                    }
                })

                async function openAiPush() {
                    if (xtinfo.zsd === '无') {
                        api.toast({
                            msg: '该题暂无AI变式题',
                        })
                        return;
                    }
                    const apiObj = new GridOpenApi(UrlDomain, source, version)
                    const ret = await new Promise((resolve, reject) => {
                        apiObj.SetAuthToken($api.getStorage('token'));
                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {
                            body: $api.jsonToStr({
                                uid: $api.getStorage("uid"),
                                schoolid: $api.getStorage("schoolid"),
                                type: 'ai_push',
                                resource_id: xtinfo.id,  //本题的id
                                count: aiPush.value['count'],
                                card_type: aiPush.value['card_type'] !== undefined ? aiPush.value['card_type'] : null,
                                ...(aiPush.value['card_id'] !== undefined && {card_id: aiPush.value['card_id']}),
                            })
                        }, function (ret, err) {
                            if (ret) {
                                resolve(ret);
                            } else {
                                reject(err);
                            }
                        });
                    });
                    if ((aiPush.value.count <= 0 && ret.ret === 0 && ret.data === 'nonumber') || ret.ret === -1) {
                        if ($api.getStorage('upgradeQRCode') === '1') {
                            api.toast({
                                msg: '本月剩余变式题推送次数已耗尽',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            api.openFrame({
                                name: 'number-exhausted',
                                url: '../../frame-number-exhausted.html',
                            })
                        }
                        return
                    }
                    if(ret.ret === 0 && ret.data === '') {
                        aiPush.value.count -= 1;
                    }

                    api.openWin({
                        name: 'win_bst.html',
                        url: '../AIbst/win_bst.html',
                        pageParam: {
                            xtid: xtinfo.id,
                            kcid: xtinfo.kcid,
                        },
                        bounces: false
                    });
                }

                return {
                    isDisplayAiAnalysis,
                    aiAnalysis,
                    aiPush,
                    openAiPush
                }
            }
        }).mount('#main')
    };

    function postAddOperationLog() {
        if (app.aiAnalysis.count > 0) {
            app.aiAnalysis.count--;
        }
    }


    function getUrl() {

        api.closeFrame({
            name: frameName
        });

        var frameUrl = '';
        switch (xtinfo.tx_code) {
            case 1://单选 多选 判断 听单句话 单项选择
                frameUrl = 'frame_xzt';
                openFrame(frameUrl);
                break;
            case 2:// 填空题 名著导读
                frameUrl = 'frame_tkt';
                openFrame(frameUrl);
                break;
            case 3://问答题 语言表达 默写 翻译 作文 朗读 证明 书面表达 朗读 解答 辨析 简答 计算
                frameUrl = "frame_wdt";
                openFrame(frameUrl);
                break;
            case 4://复合题带选项
                if (xtinfo.tx == 'tdh' || xtinfo.tx == 'tdb' || xtinfo.tx == 'ttt') {//听对话 听对白
                    frameUrl = "frame_listen";
                } else {//完型填空 阅读理解 材料选择题
                    frameUrl = "frame_wxtk";
                }
                openFrame(frameUrl);
                break;
            case 5://复合题不带选项 ：材料分析 解答 现代文阅读 综合探究 实验与探究 诗歌鉴赏 文言文批阅
                frameUrl = "frame_sytj";
                openFrame(frameUrl);
                break;
            default:
                api.alert({
                    title: '提示',
                    msg: '习题信息获取失败！',
                    buttons: ['确定']
                }, function (ret, err) {
                    if (ret.buttonIndex == 1) {
                        api.closeToWin({
                            name: 'win-interaction-home-pad'
                        });
                    }
                });
                break;
        }
    }


    function reload() {
        is_commit = 0;
        getUrl();
        getHeart();
    }


    var frameName;

    function openFrame(frameUrl) {
        frameName = frameUrl;
        api.openFrame({
            name: frameName,
            url: frameUrl + '.html',
            rect: {
                x: 10,
                y: headerH + 10,
                w: api.winWidth - 20,
                h: frameH - 10
            },
            bgColor: '#f2f2f2',
            bounces: false,
            pageParam: {
                xtinfo: xtinfo
            },
            reload: true
        });
    }


    //下一题
    function nextXt() {
        api.showProgress({
            title: '正在获取习题信息',
            text: '请稍后',
            modal: true
        });
        if ($api.getStorage('connectType') == 'Lan') {
            classObj.Get(UrlRouter.GetCmdToPc, {
                values: {
                    cmdname: 'dtstate',
                    classid: classid
                }
            }, function (ret, err) {
                if (ret) {
                    ProcessRet3(ret);
                } else {
                    api.hideProgress();
                    api.toast({
                        msg: '获取习题信息失败',
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            });
        } else {
            api.addEventListener({
                name: 'ReceiveMessage_18'
            }, function (ret, err) {
                ProcessRet3(ret.value.receive);
            });
            classObjForCloud.Get(UrlRouter.GetCmdToPc, {
                values: {
                    cmdname: 'dtstate',
                    uid: $api.getStorage('uid'),
                    classid: classid,
                    from: 'ReceiveMessage_18',
                    vclass_token: $api.getStorage('vclass_token'),
                    private_token: $api.getStorage('private_token')
                }
            }, function (ret, err) {
                if (ret && ret.status == 1) {
                } else {
                    api.hideProgress();
                    api.toast({
                        msg: ret.info,
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            });
        }
    }


    function ProcessRet3(ret) {
        api.hideProgress();
        if (ret) {
            switch (ret.status) {
                case '-2':
                    api.toast({
                        msg: '你不是当前班的学生',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                case '1':
                    //请求题目内容
                    getXiList();
                    break;
                case '-1':
                    api.toast({
                        msg: '老师还未开始新的答题，请耐心等待~',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                case '0':
                    api.toast({
                        msg: '老师还未开始新的答题，请耐心等待~',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                case '2':
                    api.toast({
                        msg: '老师还未开始新的答题，请耐心等待~',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                case '3':
                    api.toast({
                        msg: '习题组为空',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                default:
                    api.toast({
                        msg: '老师未开启课堂',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
            }
        } else {
            api.toast({
                msg: '获取习题信息失败',
                duration: 2000,
                location: 'bottom'
            });
        }
    }


    //请求题目内容
    function getXiList() {
        if ($api.getStorage('connectType') == 'Lan') {
            classObj.Get(UrlRouter.GetCmdToPc, {
                values: {
                    cmdname: 'xtinfo',
                    classid: classid
                }
            }, function (ret, err) {
                if (ret) {
                    ProcessRet4(ret);
                } else {
                    api.hideProgress();
                    api.toast({
                        msg: '获取习题信息失败',
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            });
        } else {
            api.addEventListener({
                name: 'ReceiveMessage_20'
            }, function (ret, err) {
                ProcessRet4(ret.value.receive);
            });
            classObjForCloud.Get(UrlRouter.GetCmdToPc, {
                values: {
                    cmdname: 'xtinfo',
                    uid: $api.getStorage('uid'),
                    classid: classid,
                    from: 'ReceiveMessage_20',
                    vclass_token: $api.getStorage('vclass_token'),
                    private_token: $api.getStorage('private_token')
                }
            }, function (ret, err) {
                if (ret && ret.status == 1) {
                } else {
                    api.hideProgress();
                    api.toast({
                        msg: ret.info,
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            });
        }
    }

    function ProcessRet4(ret) {
        api.hideProgress();
        if (ret) {
            if (ret.xtgroup) {
                //是习题组
                api.openWin({
                    name: 'win-xsdt-xtz-main-pad',
                    url: '../xtzFrames/win-xsdt-xtz-main-pad.html',
                    pageParam: {
                        xitiinfo: ret.xitiinfo,
                        classid: classid
                    },
                    slidBackEnabled: false,
                    reload: true
                });
            } else {
                xtinfo = ret;
                $api.text($api.dom('.title'), '限时答题');
                $('#win-right').addClass('aui-hide')
                app.isDisplayAiAnalysis = false;
                reload();
            }
        } else {
            api.toast({
                msg: '请重新连接老师课堂',
                duration: 2000,
                location: 'bottom'
            });
        }
    }


    //开启心跳请求，一秒一次
    function getHeart() {
        //区分云端课堂
        heart = setTimeout("getHeart()", 1000);
        if ($api.getStorage('connectType') == 'Lan') {
            classObj.CancleAjax('timeHeart');
            classObj.Get(UrlRouter.GetCmdToPc, {
                values: {
                    cmdname: 'dtstate',
                    stu: 1,
                    classid: classid
                }
            }, function (ret, err) {
                if (ret) {
                    ProcessRet2(ret);
                } else {
                    api.toast({
                        msg: '请求失败',
                        duration: 1500,
                        location: 'bottom'
                    });
                    setTimeout(function () {
                        api.closeToWin({
                            name: 'win-interaction-home-pad'
                        });
                    }, 1500);
                }
            }, 'timeHeart');
        } else {
            api.addEventListener({
                name: 'ReceiveMessage_9'
            }, function (ret, err) {
                ProcessRet2(ret.value.receive);
            });
            classObjForCloud.CancleAjax('timeHeart');
            classObjForCloud.Get(UrlRouter.GetCmdToPc, {
                values: {
                    cmdname: 'dtstate',
                    stu: 1,
                    classid: classid,
                    from: 'ReceiveMessage_9',
                    uid: $api.getStorage('uid'),
                    vclass_token: $api.getStorage('vclass_token'),
                    private_token: $api.getStorage('private_token')
                }
            }, function (ret, err) {
                if (ret && ret.status == 1) {
                } else {
                    clearTimeout(heart);
                    api.toast({
                        msg: '请求失败',
                        duration: 1500,
                        location: 'bottom'
                    });
                    setTimeout(function () {
                        api.closeToWin({
                            name: 'win-interaction-home-pad'
                        });
                    }, 1500);
                }
            }, 'timeHeart');
        }
    }

    function ProcessRet2(ret) {
        if (ret.status == '1') {
        } else if (ret.status == '2') {
            clearTimeout(heart);
            if (is_commit == 1) {
                //显示答题结果
                api.sendEvent({
                    name: 'answerEnd'
                });
                api.sendEvent({
                    name: 'yinpinCLose'
                });
                $api.text($api.dom('.title'), '答题结果');

                $('#win-right').removeClass('aui-hide');
                $api.addCls($api.dom('.commited'), 'aui-hide');
                app.isDisplayAiAnalysis = true;
//                api.setFrameAttr({
//                    name: frameName,
//                    rect: {
//                        x: 10,
//                        y: headerH + 10,
//                        w: api.winWidth - 20,
//                        h: frameH -10
//                    }
//                });
            } else {
                api.closeToWin({
                    name: 'win-interaction-home-pad'
                });
            }
        } else if (ret.status == '-1' || ret.status == '0') {
            clearTimeout(heart);
            api.toast({
                msg: '答题异常',
                duration: 2000,
                location: 'bottom'
            });
            api.closeToWin({
                name: 'win-interaction-home-pad'
            });
        } else {
            clearTimeout(heart);
            api.toast({
                msg: '请求错误',
                duration: 2000,
                location: 'bottom'
            });
            api.closeToWin({
                name: 'win-interaction-home-pad'
            });
        }
    }


    function closeWin() {
        if (is_commit == 0) {
            api.confirm({
                title: '',
                msg: '尚未完成答题，是否退出?',
                buttons: ['退出', '继续答题']
            }, function (ret, err) {
                if (ret) {
                    if (ret.buttonIndex == 1) {
                        api.closeToWin({
                            name: 'win-interaction-home-pad'
                        });
                    }
                }
            });
        } else {
            checkBack();
        }

    }

    function checkBack() {
        if ($api.getStorage('connectType') == 'Lan') {
            classObj.Get(UrlRouter.GetCmdToPc, {
                values: {
                    cmdname: 'dtstate',
                    stu: 1,
                    classid: classid
                }
            }, function (ret, err) {
                if (ret) {
                    ProcessRet1(ret);
                } else {
                    api.toast({
                        msg: '设备断开连接',
                        duration: 1500,
                        location: 'bottom'
                    });
                    setTimeout(function () {
                        api.closeToWin({
                            name: 'win-interaction-home-pad'
                        });
                    }, 1500);
                }
            });

        } else {
            api.addEventListener({
                name: 'ReceiveMessage_9s'
            }, function (ret, err) {
                ProcessRet1(ret.value.receive);
            });
            classObjForCloud.Get(UrlRouter.GetCmdToPc, {
                values: {
                    cmdname: 'dtstate',
                    stu: 1,
                    classid: classid,
                    from: 'ReceiveMessage_9s',
                    uid: $api.getStorage('uid'),
                    vclass_token: $api.getStorage('vclass_token'),
                    private_token: $api.getStorage('private_token')
                }
            }, function (ret, err) {
                if (ret && ret.status == 1) {
                } else {
                    api.toast({
                        msg: '请求失败',
                        duration: 1500,
                        location: 'bottom'
                    });
                    setTimeout(function () {
                        api.closeToWin({
                            name: 'win-interaction-home-pad'
                        });
                    }, 1500);
                }
            });

        }

    }


    function ProcessRet1(ret) {
        if (ret.status == '1') {
            api.toast({
                msg: '老师没有结束答题，请耐心等待~',
                duration: 2000,
                location: 'bottom'
            });
        } else {
            api.closeToWin({
                name: 'win-interaction-home-pad'
            });
        }
    }

</script>
</html>
