<script type="text/javascript">
    var apiReady=false;
    apiready = function () {
        var header = document.querySelector('header');
        //$api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;

        api.openFrame({
            name: 'frame-class-qiangda-pad',
            url: 'frame-class-qiangda-pad.html',
            rect: {
                x: 0,
                y: headerH,
                w: 'auto',
                h: frameH
            },
            bounces: false
        });
        apiReady=true;

        //接收打开打分的事件
        api.addEventListener({
            name: api.winName
        }, function (ret, err) {
            stuScorePublicFunction(ret.value.scoreData, ret.value.type);
        });

    };
    function closeWin() {
        if (apiReady){
            api.closeWin();
        }
    }
</script>
