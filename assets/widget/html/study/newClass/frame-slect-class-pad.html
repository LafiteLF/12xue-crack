<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <title>Title</title>
    <style>
        html, body {
            background-color: rgba(0, 0, 0, 0.3);
        }
        .aui-border-t:before, .aui-border-b:after{ height: 0px;}
        .backgroud {
            height: 100%;
            width: 100%;
        }

        .PopView {
            width: 32%;
            max-height: 50%;
            background: white;
            position: absolute;
            color: #000;
            left: 34%;
            top: 30%;
            overflow: auto;
            border-radius: 5px;

        }

        .item {
            text-align: center;
            padding-bottom: 20px;
            height: 60px;
            width: 100%;
            left: 10%;
            font-size: 18px;
            line-height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.5rem;
            color: #999;
        }

        .class {
            line-height: 40px;
            width: 80%;
            text-align: center;
            font-size: 14px;
            margin-left: 10%;
            border: 1px lightgrey solid;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .aui-list-item-title{
            font-size: 0.7rem !important;
        }
        .aui-list .aui-list-item:active{
            color: #4bc7c7;
            background: #fff;
        }
        .aui-list .aui-list-item:active .aui-list-item-title{
            color: #4bc7c7;
            background: #fff;
        }
        .aui-list .aui-list-item-title{
            color:#333;
        }
        .aui-list.aui-list-in .aui-list-item-inner:after{ height: 0px;}
        li{ border-bottom: 1px solid #dddddd }
    </style>
</head>
<body>
<div class="backgroud" tapmode onclick="closeFrame()">
</div>
<div class="PopView">
    <p class="item">请在老师开启课堂后选择</p>
    <ul class="aui-list aui-list-in">
        <li class="aui-list-item"  v-for="item in classArr" tapmode @click="classClick(item.bjid, item.tuid, item.realname)">
            <div class="aui-list-item-inner">
                <div class="aui-list-item-title" :style="item.bjid==classid?'color:#4bc7c7':'color:#333'" v-text="item.xdtitle+item.njmc+'级'+item.classname+'('+item.realname+'老师)'"></div>
            </div>
        </li>
    </ul>
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../script/vue.js"></script>
<script>
    var isReady = false;
    var vm;
    apiready = function () {
        isReady = true;
        vm = new Vue({
            el:'.PopView',
            data:{
                classArr: api.pageParam.classArr,
                teacherName : $api.getStorage('classTN'),
                classid : $api.getStorage('classbjid')
            },
            methods:{
                classClick:function (bjid, tuid, teachername) {
                    api.sendEvent({
                        name: 'chooseClassRoom',
                        extra: {classid: bjid, tuid: tuid, teachername: teachername}
                    });
                    closeFrame();
                }
            }
        })

    };

    function closeFrame() {
        if (isReady) {
            api.closeFrame({
                name: 'frame-slect-class-pad'
            });
        }
    }
</script>
</html>
