        body{

        }

            border: 1px solid #4bc7c7 !important;
            border-radius: 3px;

<body>
<header class="aui-bar aui-bar-nav">
    <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="api.closeWin();">
        <span class="aui-iconfont aui-icon-left" tapmode onclick="api.closeWin()"></span>分组学习
    </a>
    <div style="float: right; padding-right: 10px"  tapmode onclick="reloadTasklist();">
        <span class="nav-spanBtn" style="font-size: 0.7rem">刷新</span>
    </div>
</header>

<script type="text/javascript" src="../../../../script/api.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../../script/class_score.js"></script>
<script type="text/javascript">
    apiready = function(){
        var header = $api.dom('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.sendEvent({
            name: 'groupstudy_stu'
        });

        var db = api.require('db');
        db.executeSqlSync({
            name: dbName,
            sql: 'DELETE from groupAnsweredEx'
        });

        api.openFrame({
            name: 'frame-groupStudy-main-pad',
            url: 'frame-groupStudy-main-pad.html',
            bounces: false,
            vScrollBarEnabled: false,
            rect: {
                x: 0,
                y: headerH ,
                w: 'auto',
                h: frameH
            },
            pageParam:{
                groupInfo: api.pageParam.groupInfo,
                ip: api.pageParam.ip
            }
        });

        //接收打开打分的事件
        api.addEventListener({
            name: api.winName
        }, function (ret, err) {
            stuScorePublicFunction(ret.value.scoreData, ret.value.type);
        });

    };
    function reloadTasklist() {
        api.sendEvent({
            name: 'reloadGrouptasklistframe'
        });
    }
    function closeWin() {
        api.closeWin()
    }
</script>
