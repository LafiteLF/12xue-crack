<script type="text/javascript">
    apiready = function(){
        var header = $api.dom('header');
//        $api.fixStatusBar(header);
        api.setStatusBarStyle({
            style: 'light'
        });
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.openFrame({
            name: 'frame-groupStudy-member-pad',
            url: 'frame-groupStudy-member-pad.html',
            bounces: false,
            vScrollBarEnabled: false,
            rect: {
                x: 0,
                y: headerH ,
                w: 'auto',
                h: frameH
            },
            pageParam:{
                memberArr: api.pageParam.memberArr
            }
        });

        //接收打开打分的事件
        api.addEventListener({
            name: api.winName
        }, function (ret, err) {
            stuScorePublicFunction(ret.value.scoreData, ret.value.type);
        });

    };
</script>
