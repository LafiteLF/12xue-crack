<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>完形填空</title>    <link rel="stylesheet" type="text/css" href="../../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../../css/frameDetail.css"/>    <script src="../../../../script/interact@1.10.27.min.js"></script>    <style>        .tkt_content {            display: none;        }        .tixingzi {            margin-left: 36px;        }        #aiBtn {            touch-action: none;   /* 禁止默认手势（必须） */            -webkit-user-drag: none; /* 禁止 iOS safari 拖拽图片 */            user-select: none;    /* 禁止文字选中 */        }    </style></head><body><div class="kong_bg">    <div class="cxjz">        <div class="cxjztop clearfix">            <img src="../../../../image/newhomework/cxjz.png">            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>        </div>        <div class="cxjz_button" onclick="cxjz()">重新加载</div>    </div></div><div class="tkt_content" id="tkt_content">    <img v-if="isShowAnswer" id="aiBtn" class="noImgClick" @click.stop="PostAIBtn" src="../../../../image/newhomework/aiBtn.png" style="position: fixed; right: 1vw; top:50%; transform: translateY(-50%); width: 50px; z-index: 300;" alt="AI解析">    <div class="tkt_top">        <ul>            <li class="tixing clearfix">                <div class="tixingzi" v-text="'【'+data.txstr+'】'"></div>            </li>        </ul>    </div>    <div class="tkt_left" id="left" style=" width: calc(60% - 53px);">        <div class="tg_content font666" v-html="data.tg"></div>    </div>    <div class="tkt_right clearfix" id="right" style="width: calc(40% + 37px)">        <div class="tkt_right_content">            <div class="huakuai" id="huakuai"></div>            <span v-if="isShowAnswer && complete==2" class="zongfen" style="left: 20px;" v-html="getStyle(accuracy)"></span>            <span class="wxtk_xiaoti" v-text="'共'+xiaotinum+'小题'"></span>            <ul class="wxtk_content">                <li v-for="(list,index) in data.children">                    <!--答题部分开始-->                    <div :class="complete!=2?'wxtk_tg':'xiaotifenge wxtk_tg'" v-html="'('+(index+1)+')'+list.tg" style="margin-top: 10px"></div>                    <ul v-if="complete!=2" class="wxtk_option">                        <li v-for="item in list.options" :id="item.id" :xx="item.xx" :index="index"                            :class="answer[index].da[0]==item.id?'xxactive':''" tapmode                            onclick="vm.xxselectClicked(this)" v-text="item.xx"></li>                    </ul>                    <!--<div v-if="complete!=2" class="wxtkbhz font4BC7C7" :id="index" tapmode onclick="vm.checded(this)">-->                        <!--<span :class="answer[index].is_unable==1?'inputCheckactive':''"></span>不会做-->                    <!--</div>-->                    <!--答题部分结束-->                    <!--答案部分开始-->                    <dl v-if="complete==2" class="wxtk_answer bgFFF">                        <dd class="wxtk_myanswer">                            <div v-if="isShowAnswer" class="wxtkdefen">                                <img class="noImgClick" v-if="answerData[index].is_true != 0"                                     :src="answerData[index].is_true==1 ? ' ../../../../image/newhomework/zhengque.png' :                                     answerData[index].is_true==2 ? '../../../../image/newhomework/cuowu.png' :                                     answerData[index].is_true==3 ? '../../../../image/newhomework/bandui.png' : ''">                                <span :style="answerData[index].is_true==1 ? 'color : #4bc7c7' : answerData[index].is_true==2 ? 'color : #df7605' : answerData[index].is_true==3 ? 'color : #ffcd06' : ''"                                      v-text="answerData[index].is_true==1 ? '正确' : answerData[index].is_true==2 ? '错误' : answerData[index].is_true==3 ? '正确率'+(answerData.accuracy*100)+'%' : ''"></span>                            </div>                            <h2>【小组答案】</h2>                            <ul class="clearfix ">                                <li class="wxtkzi" v-text="answer[index].is_unable==1?'未答':answer[index].selectedXx"></li>                            </ul>                        </dd>                        <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">                            <h2 v-text="'【'+data.tx_tip+'】'"></h2>                            <ul>                                <li class="wxtkzi" v-html="list.dastr==''?'无':list.dastr"></li>                            </ul>                        </dd>                        <dd :style="isShowAnswer?'display:block':'display:none'" class="needpic">                            <h2>【答案解析】</h2>                            <ul>                                <li class="wxtkzi" v-html="list.dajx==''?'无':list.dajx"></li>                            </ul>                        </dd>                    </dl>                    <!--答案部分开始-->                </li>                <!--<div style="width: 100%;padding-top: 4rem; padding-bottom: 2rem" v-if="complete!=2">-->                    <!--<div class="upBtn" tapmode onclick="vm.commitAnswer()">提交</div>-->                <!--</div>-->            </ul>            <!--答案部分结束-->        </div>    </div></div></body><script type="text/javascript" src="../../../../script/api.js"></script><script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../../script/vue.js"></script><script type="text/javascript" src="../../../../script/common.js"></script><script type="text/javascript" src="../../../../script/fastclick.js"></script><script type="text/javascript" src="../../../../script/dealwithanswer.js"></script><script type="text/javascript" src="../../../../script/html2canvas.js"></script><script>    var apiObj;    var classObj, classObjForCloud;    var vm;    var answerBody;    var answerStatus; //该任务是否已完成 0未完成 1已完成    apiready = function () {        apiObj = new GridOpenApi(UrlDomain, source, version);        apiObj.SetAuthToken($api.getStorage('token'));        classObj = new GridOpenApi('http://' + $api.getStorage('ip'), source, version);        classObjForCloud = new GridOpenApi('http://' + $api.getStorage('netIP'), source, version);        answerStatus = api.pageParam.answerStatus;        vue();        vm.huakuai();        vm.GetParentexercisesUrl();////获取作业习题详情及答题结果        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            api.stopPlay();            $('.img1').show();            $('.img2').hide();        });        api.addEventListener({            name: 'groupstudyupgroupanswers'        }, function (ret, err) {            vm.commitAnswer();//            vm.complete = 2;//            vm.isShowAnswer = true;        });        api.addEventListener({            name: 'checkAnswerState'        }, function (ret, err) {            vm.checkAnswerState();        });    };    function vue() {        vm = new Vue({            el: '.tkt_content',            data: {                complete: 0,//作业完成状态                data: [],//习题详情                answerData: [],                schoolid: $api.getStorage('schoolid'),//学校id                classid: $api.getStorage('classid'),                xiaotinum: 0,//小题总数                answer: [],                isPlaying: false,//老师留言是否播放中                isShowAnswer: false,                xtinfo: api.pageParam.xtinfo,                kcid: api.pageParam.kcid,                taskId: api.pageParam.taskId,                daoptions: [],                is_choose: 0,                accuracy: 0, // 本题正确率            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            mounted() {                interact('#aiBtn')                    .draggable({                        listeners: {                            move (event) {                                const target = event.target                                const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx                                const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy                                target.style.transform = `translate(${x}px, ${y}px)`                                target.setAttribute('data-x', x)                                target.setAttribute('data-y', y)                            }                        }                    })            },            methods: {                dbDownLoadData: function () {                    var db = api.require('db');                    var selectedRet = db.selectSqlSync({                        name: dbName,                        sql: 'SELECT * FROM groupAnsweredEx WHERE  xtid = "' + api.pageParam.xtinfo.id + '" and myuid = "'+$api.getStorage('uid')+'" and kcid = "'+api.pageParam.kcid+'"'                    });                    if (typeof selectedRet.data != 'undefined' && selectedRet.data.length != 0) {                        var xsdaobj = decodeURIComponent(atob(selectedRet.data[0].xsdaobj));                        vm.answer = $api.strToJson(xsdaobj);                        vm.finishUpData();                    }                },                getStyle: function (accuracy) {                    if (accuracy < 0.6) {                        return '本题正确率：' + '<span style="color: #df7605;">' + parseFloat((accuracy * 100).toFixed(1)) + '%' + '</span>';                    } else if (accuracy < 0.85) {                        return '本题正确率：' + '<span style="color: #ffcd06;">' + parseFloat((accuracy * 100).toFixed(1)) + '%' + '</span>';                    } else {                        return '本题正确率：' + '<span style="color: #4bc7c7;">' + parseFloat((accuracy * 100).toFixed(1)) + '%' + '</span>';                    }                },                showScore: function (list) {                    var allscore = 0;                    for (var i = 0; i < list.length; i++) {                        allscore = allscore + Number(list[i]);                        if (i + 1 == list.length) {                            return vm.number_analysis(allscore);                        }                    }                },                number_analysis:function(number, bit){                    /**                     * number_format                     * @param number 传进来的数,                     * @param bit 保留的小数位,默认保留两位小数                     */                    if (vm.is_empty(number)) {                        return number;                    }                    //设置接收参数的默认值                    bit = bit ? bit : 1;                    var str = '';                    number = Number(number);                    number = (number).toFixed(bit);//格式化                    var realnum = number.split('.')[0];//整数位(使用小数点分割整数和小数部分)                    var decimal = number.split('.')[1];//小数位                    //重新拼接实数部分和小数位                    if (parseInt(decimal) > 0)                        realnum = realnum + '.' + decimal;                    return realnum;                },                is_empty:function(data){                    /**                     * 判断对象或字符串是否为空                     * @param data                     * @author 邹峰                     * @time 2017年07月24日15:44:24                     * @return {boolean}                     */                    if (typeof data === 'undefined') {                        return true;                    } else if (typeof data === 'string' && (data === '' || data === '0' || data === 'null')) {                        return true;                    } else if (typeof data === 'object') {                        for (var name in data) {                            return false;                        }                        return true;                    } else if (data instanceof Array) {                        if (data.length === 0) return true;                    } else if (typeof data === 'boolean') {                        return !data;                    } else if (data === null || data === 'null') {                        return true;                    } else if (data === 0 || data === '0') {                        return true;                    }                    return false;                },                xtzongfen:function(xtzf,xtnum,xtindex){                    var b=Math.floor((xtzf*10)/xtnum)/10;                    if(xtindex+1==xtnum){                        var last= xtzf-(b*(xtnum-1));                        if(last.toString().split('.')[1]>0){last = last.toFixed(1)}else{last = last.toFixed(0)}                        return last                    }else{                        return b;                    }                },                alertzsd: function (content) {                    alert('知识点：' + content);                },                huakuai: function () {                    var tktcontent = document.getElementById('tkt_content'); //长线条                    var right = document.getElementById('right'); //小方块                    var left = document.getElementById('left');                    var huakuai = document.getElementById('huakuai');                    var ifBool = false; //判断鼠标是否按下//鼠标按下方块                    huakuai.addEventListener("touchstart", function (e) {                        e.stopPropagation();                        ifBool = true;                    });//拖动                    window.addEventListener("touchmove", function (e) {                        if (ifBool) {                            var x = e.touches[0].pageX || e.touches[0].clientX; //鼠标横坐标var x                            var lineDiv_left = getPosition(tktcontent).left; //长线条的横坐标                            var minDiv_left = x - lineDiv_left; //小方块相对于父元素（长线条）的left值                            if (minDiv_left >= tktcontent.offsetWidth - 15) {                                minDiv_left = tktcontent.offsetWidth - 15;                            }//设置拖动后小方块的left值                            var rightwidth;                            var leftwidth;                            if (($(window).width() - minDiv_left) > ($(window).width() * 0.7 + 37)) {                                rightwidth = $(window).width() * 0.7 + 37;                                leftwidth = $(window).width() * 0.3 - 25;                            } else if (($(window).width() - minDiv_left) < ($(window).width() * 0.4 + 37)) {                                rightwidth = $(window).width() * 0.4 + 37;                                leftwidth = $(window).width() * 0.6 - 25;                            } else {                                rightwidth = $(window).width() - minDiv_left;                                leftwidth = minDiv_left + 12                            }                            right.style.width = rightwidth + "px";                            left.style.width = leftwidth + "px";                        }                    });//鼠标松开                    window.addEventListener("touchend", function (e) {                        ifBool = false;                    });//获取元素的绝对位置                    function getPosition(node) {                        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left                        var top = node.offsetTop;                        current = node.offsetParent; // 取得元素的offsetParent                        // 一直循环直到根元素                        while (current != null) {                            left += current.offsetLeft;                            top += current.offsetTop;                            current = current.offsetParent;                        }                        return {                            "left": left,                            "top": top                        };                    }                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                GetParentexercisesUrl: function () {//获取作业习题详情及答题结果                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetParentexercisesUrl, {                        values: {                            hwid: vm.kcid,                            uid: $api.getStorage('uid'),                            xtid: vm.xtinfo.id,                            classid: $api.getStorage('classid'),                            ytlx: 2,                            schoolid: vm.schoolid                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.tkt_content').show();                                $('.kong_bg').hide();                                vm.data = ret;                                //获取习题数据以后，再获取答案数据                                vm.dbDownLoadData();                                vm.xiaotinum = ret.children.length;                                if (vm.complete != 2) {                                    for (var i = 0; i < ret.children.length; i++) {//给初始化的小题加个默认空答案 防止报错                                        var kongcontent = {                                            'topid': ret.id,                                            'id': ret.children[i].id,                                            'da': [],                                            'is_unable': 1,                                            'daoptions': ret.children[i].daoptions,                                            'sort': ret.children[i].sort,                                        };                                        Vue.set(vm.answer, i, kongcontent);                                    }                                }                            } else {                                $('.tkt_content').hide();                                $('.kong_bg').show();                            }                        } else {                            $('.tkt_content').hide();                            $('.kong_bg').show();                        }                    })                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    var xtindex = $(context).attr('index');                    vm.answer[xtindex].da = [$(context).attr('id')];                    vm.answer[xtindex].is_unable = 0;                    vm.answer[xtindex].selectedXx = $(context).attr('xx');                    vm.answer[xtindex].xsdastr = $(context).attr('xx');                    vm.is_choose = 1;                },                checded: function (context) {//复选框不会做点击事件                    var xtindex = $(context).attr('id');                    vm.answer[xtindex].da = [];                    vm.answer[xtindex].is_unable = 1;//不会做                },                checkAnswerState: function () {                    var isAnswerChild = 0;                    var isUnAnswerChild = 0;                    if (vm.is_choose == 0) {                        isAnswerChild = 0;                    } else {                        isAnswerChild = 1;                    }                    for (var i=0; i<vm.answer.length; i++) {                        if (vm.answer[i].is_unable == 1) {                            isUnAnswerChild = 1;                            break;                        }                    }                    api.sendEvent({                        name: 'answerState',                        extra: {isAnswerChild: isAnswerChild, isUnAnswerChild: isUnAnswerChild}                    });                },                commitAnswer: function () {                    api.sendEvent({                        name: 'sendAnswer',                        extra: {                            ytlx: vm.xtinfo.ytlx,                            is_auto: 1,                            is_unable: 0,                            is_txt: 1,                            leader: $api.getStorage('uid'),                            classid: vm.classid,                            uid: $api.getStorage('uid'),                            xtid: vm.data.xtid,                            kcid: vm.kcid,                            isauto: '1',                            istxt: 1,                            tx: vm.data.tx,                            tx_code: vm.data.tx_code,                            children: vm.answer,                            return_data: $api.jsonToStr(vm.answer)                        }                    });                },                finishUpData: function () {                    answerBody = {                        uid: $api.getStorage('uid'),                        kcid: vm.kcid,                        xsbjid: vm.classid,                        xkid: vm.data.xkid,                        njid: vm.data.njid,                        bbid: vm.data.bbid,                        sxcid: vm.data.sxcid,                        dyid: vm.data.dyid,                        jieid: vm.data.jieid,                        is_complete: 1,                        schoolid: vm.schoolid,                        ytlx: 1,//1基础 2拓展                        finish_time: 0,                        is_auto: 1,                        tx: vm.data.tx,                        is_unable: 0,                        xtid: vm.data.xtid,                        children: vm.answer,                        daoptions: vm.daoption,                        tx_code: vm.data.tx_code,                        score: 0,                        part_score: 0                    };                    var ret = dealWithAnswer(answerBody);                    if (ret) {                        vm.answerData = ret.multilevelAnswers;                        vm.accuracy = ret.answer.accuracy;                        vm.complete = 2;                        vm.is_choose = 1;                        if (answerStatus == 1) {                            vm.isShowAnswer = true;                        }                    }                }            },            PostAIBtn: async function () {                api.showProgress({                    title: '正在请求AI',                    text: '请稍后...',                    modal: true                });                const aiAnalysis = $api.getStorage('aiAnalysis');                try{                    const ret = await new Promise((resolve, reject) => {                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {                            body: $api.jsonToStr({                                schoolid: $api.getStorage('schoolid'),                                type: 'ai_analysis',                                resource_id: vm.data.xtid,                                count: aiAnalysis.count,                                card_type: aiAnalysis.card_type !== undefined ? aiAnalysis.card_type : null,                                ...(aiAnalysis.card_id !== undefined && {card_id: aiAnalysis.card_id}),                            })                        }, function (ret, err) {                            if (ret) {                                resolve(ret);                            } else {                                reject(err);                            }                        })                    });                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber')|| ret.ret !== 0) {                        api.hideProgress()                        if ($api.getStorage('upgradeQRCode') !== '0') {                            api.toast({                                msg: '本月剩余AI解析次数已耗尽',                                duration: 2000,                                location: 'bottom'                            });                        } else {                            api.openFrame({                                name: 'frame-number-exhausted',                                url: '../../frame-number-exhausted.html',                            })                        }                        return                    }                    if(ret.ret === 0 && ret.data === ''){                        api.execScript({                            name: 'win-groupStudy-taskDetail-pad',                            script: 'postAddOperationLog()'                        });                    }                }catch (e){                    console.error(e);                    api.hideProgress()                    alert('网络错误')                    return                }                const tgContent = document.querySelector('.tg_content');                const wxtk_tgs = document.querySelectorAll('.wxtk_tg');                const needPics = document.querySelectorAll('.needpic');                const allElements = [tgContent, ...wxtk_tgs, ...needPics];                const imageUrls = [];                let processedCount = 0;                // 处理每个元素的截图                allElements.forEach((element, index) => {                    if (!element) return;                    html2canvas(element, {                        backgroundColor: '#ffffff',                        scale: 2,                        useCORS: true                    }).then(canvas => {                        const imgUrl = canvas.toDataURL('image/png');                        // const base64Data = imgUrl.replace(/^data:image\/\w+;base64,/, '');                        // var imageName = 'screenshot_'+ index + vm.data.xtid + '.png';                        imageUrls[index] = imgUrl;                        processedCount++;                        if (processedCount == allElements.length) {                            api.hideProgress();                            api.openFrame({                                name: 'frame_liushi',                                url: '../../newHomework/frame_liushi.html',                                rect: {                                    x: 0,                                    y: 0,                                    w: 'auto',                                    h: api.winHeight                                },                                pageParam: {                                    xtid: vm.data.xtid,                                    imagePaths: imageUrls,                                    classroom: true,                                },                                bounces: false                            });                        }                    }).catch(error => {                        api.hideProgress();                        api.toast({                            msg: '截图失败：' + error,                            duration: 2000,                            location: 'bottom'                        });                    });                });            }        });    }    function getPosition(node) {        var left = node.offsetLeft; //获取元素相对于其父元素的left值var left        var top = node.offsetTop;        current = node.offsetParent; // 取得元素的offsetParent        // 一直循环直到根元素        while (current != null) {            left += current.offsetLeft;            top += current.offsetTop;            current = current.offsetParent;        }        return {            "left": left,            "top": top        };    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if (src.substring(src.length - 3) == 'gif') {        } else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });        }    }    function cxjz() {        vm.GetParentexercisesUrl()    }</script></html>
