<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>听力题</title>    <link rel="stylesheet" type="text/css" href="../../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../../css/frameDetail.css"/>    <style>        .listen_content{            display: none;        }        .tixingzi {            margin-left: 36px;        }    </style></head><body><div class="kong_bg">    <div class="cxjz">        <div class="cxjztop clearfix">            <img src="../../../../image/newhomework/cxjz.png">            <p>您的网络开小差了<br>请检查网络环境并点击重新加载吧～</p>        </div>        <div class="cxjz_button" onclick="cxjz()">重新加载</div>    </div></div><div class="listen_content">    <!--题干部分开始-->    <div class="listen_stem">        <ul>            <li class="tixing clearfix">                <div class="tixingzi"  v-text="'【'+data.txstr+'】'"></div>            </li>        </ul>        <div class=" font666 listen_tigan" >            <p v-html="data.tg"></p>            <div class="tdjhyinpin clearfix" v-if="data.attachments" >                <img  class="scyp1 noImgClick" src="../../../../image/newhomework/yuyinimg.png">                <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);"  src="../../../../image/startPlay.png" alt="">                <div class="ypRange"> <input class="myRange" type="range" min="0"  value="0"  :max='data.attachments[0].filetime' ></div>                <p class="ypTimeP" v-text="getOutTime(data.attachments[0].filetime)"></p>                <audio class="hideenAudio" :src='data.attachments[0].serverpath + data.attachments[0].preview_link' ></audio>            </div>        </div>    </div>    <!--题干部分结束-->    <div class="listen_bottom">        <!--答题部分开始-->        <span v-if="isShowAnswer && complete==2" class="zongfen" style="top: 20px;"  v-html="getStyle(accuracy)"></span>        <span class="listen_xiaoti" v-text="'共'+xiaotinum+'小题'"></span>        <div v-for="(list,index) in data.children" style="margin-top: 10px">            <div class="listenda_content">                <div class="listen_xtxx" v-html="'('+(index+1)+')'+list.tg" style="margin-bottom: 30px;"></div>                <ul v-if="complete!=2" class="option">                    <li v-for="item in list.options" :id="item.id" :xx="item.xx" :index="index" :class="answer[index].da[0]==item.id?'danxoption xxactive':'danxoption'"                        tapmode onclick="vm.xxselectClicked(this)"v-text="item.xx" >                    </li>                    <!--<li  v-if="complete!=2" class="bhz font4BC7C7" :id="index" tapmode onclick="vm.checded(this)">-->                        <!--<span :class="answer[index].is_unable==1?'inputCheckactive':''"></span>不会做-->                    <!--</li>-->                </ul>            </div>            <!--答题部分结束-->            <!--答案部分开始-->            <dl v-if="complete==2"  class="listen_answer bgFFF">                <div v-if="isShowAnswer" class="defen" style="top: 32px;">                    <img class="noImgClick"                         :src="answerData[index].is_true==1 ? ' ../../../../image/newhomework/zhengque.png' :                         answerData[index].is_true==2 ? '../../../../image/newhomework/cuowu.png' :                         answerData[index].is_true==3 ? '../../../../image/newhomework/bandui.png' : '../../../../image/newhomework/cuowu.png'">                    <span :style="answerData[index].is_true==1 ? 'color: #4bc7c7' : answerData[index].is_true==2 ? 'color: #df7605' :                                  answerData[index].is_true==3 ? 'color: #ffcd06' : 'color: #df7605'"                          v-text="answerData[index].is_true==1 ? '正确' : answerData[index].is_true==2 ? '错误' : answerData[index].is_true==3 ? '半对' : ''"></span>                </div>                <dd>                    <h2 class="wendah2">【小组答案】</h2>                    <ul class="clearfix wendawdda">                        <li class="wendazi" v-text="answerData[index].is_unable==1 ? '未答' : answer[index].selectedXx"></li>                    </ul>                </dd>                <dd :style="isShowAnswer?'display:block':'display:none'">                    <h2 class="wendah2 " v-text="'【'+data.tx_tip+'】'"></h2>                    <ul>                        <li class="wendazi" v-html="list.dastr==''?'无':list.dastr" ></li>                    </ul>                </dd>                <dd :style="isShowAnswer?'display:block':'display:none'">                    <h2 class="wendah2">【答案解析】</h2>                    <ul>                        <li class="wendazi"  v-html="list.dajx==''?'无':list.dajx"></li>                    </ul>                </dd>            </dl>            <!--答案部分结束-->        </div>        <!--<div style="width: 100%;padding-top: 2rem; padding-bottom: 2rem" v-if="complete!=2">-->            <!--<div class="upBtn" tapmode onclick="vm.commitAnswer()">提交</div>-->        <!--</div>-->    </div></div></body><script type="text/javascript" src="../../../../script/api.js"></script><script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../../script/vue.js"></script><script type="text/javascript" src="../../../../script/common.js"></script><script type="text/javascript" src="../../../../script/fastclick.js"></script><script type="text/javascript" src="../../../../script/dealwithanswer.js"></script><script>    var apiObj;    var classObj, classObjForCloud;    var vm;    var allTimes = 0;//音频播放    var sec;    var timer = null;    var isfirst=1;    var audioStreamer;    var downloadUrl = '';    var answerBody;    var answerStatus; //该任务是否已完成 0未完成 1已完成    apiready = function () {        apiObj = new GridOpenApi(UrlDomain, source, version);        apiObj.SetAuthToken($api.getStorage('token'));        classObj = new GridOpenApi('http://' + $api.getStorage('ip'), source, version);        classObjForCloud = new GridOpenApi('http://' + $api.getStorage('netIP'), source, version);        answerStatus = api.pageParam.answerStatus;        vue();        vm.GetParentexercisesUrl();//获取作业习题详情及答题结果        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if($api.domAll('.scyp2').length>=1){                if($('.scyp2').attr('playStatus')==1){                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                clearInterval(timer);                if(api.systemType == 'ios'){                    var hideenAudio = $api.dom('.hideenAudio');                    hideenAudio.pause();                }else {                    audioStreamer = api.require('audioStreamer');                    audioStreamer.pause();                }            }            api.stopPlay();            $('.img1').show();            $('.img2').hide();        });        api.addEventListener({            name: 'groupstudyupgroupanswers'        }, function (ret, err) {            vm.commitAnswer();//            vm.complete = 2;//            vm.isShowAnswer = true;        });        api.addEventListener({            name: 'checkAnswerState'        }, function (ret, err) {            vm.checkAnswerState();        });    };    function vue(){        vm = new Vue({            el: '.listen_content',            data: {                complete: 0,//作业完成状态                data: [],                answerData: [], // 本地脚本返回信息                schoolid: $api.getStorage('schoolid'),//学校id                classid: $api.getStorage('classid'),                xiaotinum: 0,                answer:[],                isPlaying: false,//老师留言是否播放中                isShowAnswer: false,                xtinfo: api.pageParam.xtinfo,                daoptions: [],                kcid: api.pageParam.kcid,                is_choose: 0,                accuracy: 0,            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }            },            methods: {                dbDownLoadData: function () {                    var db = api.require('db');                    var selectedRet = db.selectSqlSync({                        name: dbName,                        sql: 'SELECT * FROM groupAnsweredEx WHERE  xtid = "' + api.pageParam.xtinfo.id + '" and myuid = "'+$api.getStorage('uid')+'" and kcid = "'+api.pageParam.kcid+'"'                    });                    if (typeof selectedRet.data != 'undefined' && selectedRet.data.length != 0) {                        var xsdaobj = decodeURIComponent(atob(selectedRet.data[0].xsdaobj));                        vm.answer = $api.strToJson(xsdaobj);                        vm.finishUpData();                    }                },                getStyle: function (accuracy) {                    if (accuracy < 0.6) {                        return '本题正确率：' + '<span style="color: #df7605;">' + parseFloat((accuracy * 100).toFixed(1)) + '%' + '</span>';                    } else if (accuracy < 0.85) {                        return '本题正确率：' + '<span style="color: #ffcd06;">' + parseFloat((accuracy * 100).toFixed(1)) + '%' + '</span>';                    } else {                        return '本题正确率：' + '<span style="color: #4bc7c7;">' + parseFloat((accuracy * 100).toFixed(1)) + '%' + '</span>';                    }                },                showScore: function (list) {                    var allscore = 0;                    for (var i = 0; i < list.length; i++) {                        allscore = allscore + Number(list[i]);                        if (i + 1 == list.length) {                            return vm.number_analysis(allscore);                        }                    }                },                number_analysis:function(number, bit){                    /**                     * number_format                     * @param number 传进来的数,                     * @param bit 保留的小数位,默认保留两位小数                     */                    if (vm.is_empty(number)) {                        return number;                    }                    //设置接收参数的默认值                    bit = bit ? bit : 1;                    var str = '';                    number = Number(number);                    number = (number).toFixed(bit);//格式化                    var realnum = number.split('.')[0];//整数位(使用小数点分割整数和小数部分)                    var decimal = number.split('.')[1];//小数位                    //重新拼接实数部分和小数位                    if (parseInt(decimal) > 0)                        realnum = realnum + '.' + decimal;                    return realnum;                },                is_empty:function(data){                    /**                     * 判断对象或字符串是否为空                     * @param data                     * @author 邹峰                     * @time 2017年07月24日15:44:24                     * @return {boolean}                     */                    if (typeof data === 'undefined') {                        return true;                    } else if (typeof data === 'string' && (data === '' || data === '0' || data === 'null')) {                        return true;                    } else if (typeof data === 'object') {                        for (var name in data) {                            return false;                        }                        return true;                    } else if (data instanceof Array) {                        if (data.length === 0) return true;                    } else if (typeof data === 'boolean') {                        return !data;                    } else if (data === null || data === 'null') {                        return true;                    } else if (data === 0 || data === '0') {                        return true;                    }                    return false;                },                xtzongfen:function(xtzf,xtnum,xtindex){                    var b=Math.floor((xtzf*10)/xtnum)/10;                    if(xtindex+1==xtnum){                        var last= xtzf-(b*(xtnum-1));                        if(last.toString().split('.')[1]>0){last = last.toFixed(1)}else{last = last.toFixed(0)}                        return last                    }else{                        return b;                    }                },                alertzsd:function(content){                    alert('知识点：'+content);                },                GetParentexercisesUrl: function () {//获取作业习题详情及答题结果                    api.showProgress({                        title: '加载中',                        text: '请稍后...',                        modal: true                    });                    apiObj.Get(UrlRouter.GetParentexercisesUrl, {                        values: {                            hwid: vm.kcid,                            uid: $api.getStorage('uid'),                            xtid: vm.xtinfo.id,                            classid: $api.getStorage('classid'),                            ytlx: 2,                            schoolid: vm.schoolid                        }                    }, function (ret, err) {                        api.hideProgress();                        if (ret) {                            if (ret.ret == 0) {                                $('.listen_content').show();                                $('.kong_bg').hide();                                vm.data = ret;                                //获取习题数据以后，再获取答案数据                                vm.dbDownLoadData();                                vm.xiaotinum = ret.children.length;                                if (vm.complete != 2) {                                    for (var i = 0; i < ret.children.length; i++) {//给初始化的小题加个默认空答案 防止报错                                        var kongcontent = {                                            'topid': ret.id,                                            'id': ret.children[i].id,                                            'da': [],                                            'is_unable': 1,                                            'daoptions': ret.children[i].daoptions,                                            'sort': ret.children[i].sort                                        };                                        Vue.set(vm.answer, i, kongcontent);                                        vm.daoptions.push(ret.children[i].daoptions);                                    }                                }                            } else {                                $('.listen_content').hide();                                $('.kong_bg').show();                            }                        } else {                            $('.listen_content').hide();                            $('.kong_bg').show();                        }                    })                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    var xtindex=$(context).attr('index');                    vm.answer[xtindex].da =[$(context).attr('id')];                    vm.answer[xtindex].is_unable = 0;                    vm.answer[xtindex].selectedXx = $(context).attr('xx');                    vm.answer[xtindex].xsdastr = $(context).attr('xx');                    vm.is_choose = 1;                },                checded: function (context) {//复选框不会做点击事件                    var xtindex= $(context).attr('id');                    vm.answer[xtindex].da = [];                    vm.answer[xtindex].is_unable = 1;//不会做                },                checkAnswerState: function () {                    var isAnswerChild = 0;                    var isUnAnswerChild = 0;                    if (vm.is_choose == 0) {                        isAnswerChild = 0;                    } else {                        isAnswerChild = 1;                    }                    for (var i=0; i<vm.answer.length; i++) {                        if (vm.answer[i].is_unable == 1) {                            isUnAnswerChild = 1;                            break;                        }                    }                    api.sendEvent({                        name: 'answerState',                        extra: {isAnswerChild: isAnswerChild, isUnAnswerChild: isUnAnswerChild}                    });                },                commitAnswer: function () {                    api.sendEvent({                        name: 'sendAnswer',                        extra: {                            ytlx: vm.xtinfo.ytlx,                            is_auto: 1,                            is_unable: 0,                            is_txt: 1,                            leader: $api.getStorage('uid'),                            classid: vm.classid,                            uid: $api.getStorage('uid'),                            xtid: vm.data.xtid,                            kcid: vm.kcid,                            isauto: '1',                            istxt: 1,                            tx: vm.data.tx,                            tx_code: vm.data.tx_code,                            children: vm.answer,                            return_data: $api.jsonToStr(vm.answer)                        }                    });                },                finishUpData: function () {                    answerBody = {                        uid: $api.getStorage('uid'),                        kcid: vm.xtinfo.kcid,                        xsbjid: vm.classid,                        xkid: vm.data.xkid,                        njid: vm.data.njid,                        bbid: vm.data.bbid,                        sxcid: vm.data.sxcid,                        dyid: vm.data.dyid,                        jieid: vm.data.jieid,                        is_complete: 1,                        schoolid: vm.schoolid,                        ytlx: 1,//1基础 2拓展                        finish_time: 0,                        is_auto: 1,                        tx: vm.data.tx,                        is_unable: 0,                        xtid: vm.data.xtid,                        children: vm.answer,                        daoptions: vm.daoption,                        tx_code: vm.data.tx_code,                        score: 0,                        part_score: 0                    };                    var ret = dealWithAnswer(answerBody);                    if (ret) {                        vm.answerData = ret.multilevelAnswers;                        vm.accuracy = ret.answer.accuracy;                        vm.complete = 2;                        vm.is_choose = 1;                        if (answerStatus == 1) {                            vm.isShowAnswer = true;                        }                    }                },                studentRecord:function (context) {                    var url =   vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime                    if(api.systemType == 'ios'){                        var hideenAudio = $api.dom('.hideenAudio');                    }else {                        audioStreamer = api.require('audioStreamer');                    }                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频                    if (playStatus == '0') {                        if(api.systemType == 'ios') {                            if (timer) {                                clearInterval(timer);                            }                            $api.attr(context, 'playStatus', '1');                            $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');                            hideenAudio.play();                            sec = 0;                            allTimes = recodetime;                            timer = setInterval(function (e) {                                sec = sec + 1;                                allTimes = allTimes - 1;                                bfb = sec / recodetime * 100;   //2                                bfb = bfb.toFixed(2);//2                                var ss = 'background-size: ' + bfb + '% 100%';//2                                if (allTimes == 0 || sec >= recodetime) {                                    clearInterval(timer);                                    $api.attr(context, 'playStatus', '0');                                    $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                                    var time = vm.getOutTime(recodetime);                                    $api.text($api.dom('.ypTimeP'), time);                                    range.value = 0;                                    $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                                } else {                                    range.value = sec;                                    var time = vm.getOutTime(allTimes);                                    $api.css($api.dom('.myRange'), ss);  //4                                    $api.text($api.dom('.ypTimeP'), time);                                }                            }, 1000);                        }else {                            api.showProgress({                                title: '正在加载资源',                                text: '请稍后...',                                modal: true                            });                            api.download({                                url : url,                                savePath:'fs://mp3s/' + url,                                report : true,                                cache : true,                                allowResume : false                            }, function(ret, err) {                                if (ret.state == 1) {                                    api.hideProgress();                                    if (timer) {                                        clearInterval(timer);                                    }                                    $api.attr(context, 'playStatus', '1');                                    $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');                                    downloadUrl = ret.savePath;                                    audioStreamer.openPlayer({                                        path: downloadUrl                                    }, function (ret) {                                    });                                    if (timer) {                                        clearInterval(timer);                                    }                                    $api.attr(context, 'playStatus', '1');                                    vm.isplayed = '1';                                    sec = 0;                                    allTimes = recodetime;                                    timer = setInterval(function (e) {                                        sec = sec + 1;                                        allTimes = allTimes - 1;                                        bfb = sec / recodetime * 100;   //2                                        bfb = bfb.toFixed(2);//2                                        var ss = 'background-size: ' + bfb + '% 100%';//2                                        if (allTimes == 0 || sec >= recodetime) {                                            clearInterval(timer);                                            $api.attr(context, 'playStatus', '0');                                            $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                                            var time = vm.getOutTime(recodetime);                                            $api.text($api.dom('.ypTimeP'), time);                                            range.value = 0;                                            $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                                        } else {                                            range.value = sec;                                            var time = vm.getOutTime(allTimes);                                            $api.css($api.dom('.myRange'), ss);  //4                                            $api.text($api.dom('.ypTimeP'), time);                                        }                                    }, 1000);                                }                            });                        }                    } else if (playStatus == '1') {                        $api.attr(context, 'playStatus', '2');                        $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                        clearInterval(timer);                        if(api.systemType == 'ios'){                            hideenAudio.pause();                        }else {                            audioStreamer.pause();                        }                    } else {                        $api.attr(context, 'playStatus', '1');                        if(api.systemType == 'ios'){                            hideenAudio.play();                        }else {                            audioStreamer.openPlayer({                                path: downloadUrl                            }, function (ret) {                            });                        }                        $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');                        timer = setInterval(function (e) {                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb =  sec/recodetime *100;    //5                            bfb = bfb.toFixed(2);   //5                            var ss = 'background-size: '+bfb + '% 100%';  //5                            if (allTimes == 0 || sec >= recodetime) {                                $api.attr(context, 'playStatus', '0');                                clearInterval(timer);                                $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6                            } else {                                range.value = sec;                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);    //7                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    }                },                getOutTime: function (intime) {                    var outTime = '';                    if(intime<=9){                        outTime = '00:0'+intime;                    }else if(intime<=59){                        outTime = '00:'+intime;                    }else {                        var min =parseInt(intime/60);                        var sec = intime%60;                        if(sec<=9){                            if(min>0&&min<10){                                outTime ='0'+ min+ ':0' + sec ;                            }else if(min>=10){                                outTime = min+ ':0' + sec ;                            }else{                                outTime = '00:0'+sec;                            }                        }else{                            if(min>0&&min<10){                                outTime ='0'+ min + ':'+ sec ;                            }else if(min>=10){                                outTime = min + ':'+ sec ;                            }else {                                outTime = '00:'+sec;                            }                        }                    }                    return outTime;                }            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if(src.substring(src.length-3)=='gif'){}else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, er
