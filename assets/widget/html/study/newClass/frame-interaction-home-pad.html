    /**
     * 课堂连接
     */
    function ConnectClass() {

        switch (api.connectionType.toLowerCase()) {
            case 'wifi':
                connectSuccess = false;
                $api.setStorage('connectSuccess', '1');
                connectByLan();

                //            api.confirm({
                //                title: '提示',
                //                msg: '请选择连接方式',
                //                buttons: ["云端课堂", "局域网课堂"]
                //            }, function (ret, err) {
                //                connectSuccess = false;
                //                $api.setStorage('connectSuccess', '1');
                //                if (ret.buttonIndex == 1) {
                //                    connectByCloud();
                //                } else if (ret.buttonIndex == 2) {
                //                    connectByLan();
                //                }
                //            });

                break;
            case '2g':
            case '3g':
            case '4g':
                connectSuccess = false;
                $api.setStorage('connectSuccess', '1');
                connectByCloud();
                break;
            case '5g':
                connectSuccess = false;
                $api.setStorage('connectSuccess', '1');
                connectByCloud();
                break;
            default:
                //提示并退出
                api.toast({
                    msg: '网络连接错误，请检查网络',
                    duration: 1500,
                    location: 'bottom'
                });
                setTimeout(function () {
                    api.closeWin();
                }, 1500);
                break;

        }
    }

    function connectByLan() {
        api.showProgress({
            title: '正在连接局域网课堂',
            text: '请稍后...',
            modal: false
        });
        api.ajax({
            url: UrlDomain + UrlRouter.GetStuLesson,
            method: 'get',
            timeout: 10,
            dataType: 'json',
            cache: false,
            returnAll: false,
            data: {
                values: {
                    uid: uid,
                    classid: classid
                }
            },
            headers: {
                Token: $api.getStorage('token'),
                Source: source,
                Version: version
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    ip = ret.ip;
                    if (ip == '') {
                        api.hideProgress();
                        api.toast({
                            msg: '老师未开启课堂',
                            duration: 2000,
                            location: 'bottom'
                        });
                    } else {
                        ips = ip.split('|');
                        //                        ips = '192.168.183.1:45518|192.168.106.1:45518|169.254.72.149:45518|172.16.42.250:45518'.split('|');
                        ipIndx = 0;
                        checkIpList(ipIndx); //检测IP地址
                    }
                } else {
                    api.hideProgress();
                    api.toast({
                        msg: '老师未开启课堂',
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            } else {
                api.hideProgress();
                api.confirm({
                    title: '局域网课堂连接失败',
                    msg: '请检查网络后重新选择连接方式',
                    buttons: ["云端课堂", "局域网课堂"]
                }, function (ret, err) {
                    connectSuccess = false;
                    $api.setStorage('connectSuccess', '1');
                    if (ret.buttonIndex == 1) {
                        connectByCloud();
                    } else if (ret.buttonIndex == 2) {
                        connectByLan();
                    }
                });
                // api.toast({
                //     msg: '网络请求失败',
                //     duration: 2000,
                //     location: 'bottom'
                // });
            }
        });
    }



    var ips = [];//ip数组
    var ipIndx;//当前的ip下标
    function checkIpList(i) {
        var temIp = ips[i];
        var url = 'http://' + temIp + "/tchinfo?classid=" + classid;
        api.ajax({
            url: url,
            method: 'get',
            cache: false,
            timeout: 5,//设置5秒超时
            dataType: 'json',
            returnAll: false
        }, function (ret, err) {
            if (ret) {
                if (ret.status == '1') {

                    api.toast({
                        msg: '已加入局域网课堂',
                        duration: 2000,
                        location: 'bottom'
                    });

                    api.hideProgress();
                    teachername = ret.tch_info[0].name;
                    $api.setStorage('classTN', teachername);
                    $api.setStorage('classid', classid);
                    $api.text($api.dom('.classname'), $api.getStorage('realname') + '已加入' + teachername + '老师的课堂');
                    ip = temIp;
                    $api.setStorage('ip', ip);
                    connectSuccess = true;
                    $api.setStorage('connectSuccess', '0');//连接课堂成功
                    ClassApiObj = new GridOpenApi('http://' + ip, source, version);
                    $api.setStorage('inClass', '1'); //已经进入课堂
                    api.sendEvent({
                        name: 'setIp'
                    });
                    connectType = 'Lan';
                    $api.setStorage('connectType', 'Lan');
                    setEnterClassMsg();

                } else {
                    if (ipIndx == ips.length - 1) {
                        checkCloud();
                    } else {
                        ipIndx++;
                        checkIpList(ipIndx)
                    }
                }
            } else {
                if (ipIndx == ips.length - 1) {
                    checkCloud();
                } else {
                    ipIndx++;
                    checkIpList(ipIndx)
                }
            }
        });
    }


    //点击限时答题
    function clickXsdt() {
        if (connectSuccess) {
            if (connectType == 'Lan') {
                ClassApiObj.Get(UrlRouter.GetCmdToPc, {
                    values: {
                        cmdname: 'dtstate',
                        classid: classid
                    }
                }, function (ret, err) {
                    if (ret) {
                        ProcessRet1(ret);
                    } else {
                        api.toast({
                            msg: '请重新连接老师课堂',
                            duration: 2000,
                            location: 'bottom'
                        });
                    }
                });

            } else {
                api.addEventListener({
                    name: 'ReceiveMessage_2'
                }, function (ret, err) {
                    ProcessRet1(ret.value.receive);
                });
                ClassApiObjForCloud.Get(UrlRouter.GetCmdToPc, {
                    values: {
                        cmdname: 'dtstate',
                        classid: classid,
                        from: 'ReceiveMessage_2',
                        uid: uid,
                        vclass_token: $api.getStorage('vclass_token'),
                        private_token: $api.getStorage('private_token')
                    }
                }, function (ret, err) {
                    if (ret && ret.status == 1) {
                    } else {
                        api.toast({
                            msg: '请重新连接老师课堂',
                            duration: 2000,
                            location: 'bottom'
                        });
                    }

                });
            }

        } else {
            openClass();
        }
    }

    //检查限时答题按钮状态
    function ProcessRet1(ret) {
        if (ret) {
            switch (ret.status) {
                case '-2':
                    api.toast({
                        msg: '你不是当前班的学生',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                case '1':
                    //请求题目内容
                    getXiList();
                    api.showProgress({
                        title: '加载中',
                        text: '请稍后...',
                        modal: false
                    });
                    break;

                case '-1':
                    api.toast({
                        msg: '答题未开始',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                case '0':
                    api.toast({
                        msg: '答题未开始',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                case '2':
                    api.toast({
                        msg: '答题未开始',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;

                case '3':
                    api.toast({
                        msg: '习题组为空',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
                default:
                    api.toast({
                        msg: '获取习题信息失败！',
                        duration: 2000,
                        location: 'bottom'
                    });
                    break;
            }
        } else {
            api.toast({
                msg: '请重新连接老师课堂',
                duration: 2000,
                location: 'bottom'
            });
        }
    }

    function scanner() {
        if (!checkPermission(['camera'])) {
            return;
        }
        if ($api.getStorage('gzxd') == '34' && $api.getStorage('schoolid') == '1007140989450038416' && $api.getStorage('njmc') == '2020') {
            api.toast({
                msg: '暂时没有权限',
                duration: 2000,
                location: 'middle'
            });
            return;
        }
        if (connectSuccess) {
            if (api.deviceModel != '12xue_minis') {
                var FNScanner = api.require('FNScanner');
                FNScanner.open({
                    autorotation: true,
                    isAlbum: true,
                    isLight: true
                }, function (ret, err) {
                    if (ret) {
                        if (ret.eventType == "success") {
                            scanSuccess(ret);
                        }
                    } else {
                        api.toast({
                            msg: err.msg,
                            duration: 2000,
                            location: 'middle'
                        });
                    }
                });
            } else {
                api.addEventListener({
                    name: 'scanSuccessClass'
                }, function (ret, err) {
                    scanSuccess(ret.value);
                });
                api.sendEvent({
                    name: 'openScannerForClass'
                });
            }




        } else {
            openClass();
        }
    }

    //扫码完成后操作
    var hwid = '';//需要二次调用 存全局变量
    function scanSuccess(ret) {
        $api.setStorage('scanType', 'class');
        var content = ret.content;
        if (content.indexOf('homework') > 0 || content.indexOf('material') > 0 || content.indexOf('videoshow') > 0) {
            var all = content.split('?')[1].split('&');
            var type = '';
            var sxcid = '';
            var dyid = '';
            var fxfw = '';
            for (var i = 0; i < all.length; i++) {
                if (all[i].split('=')[0] == 'id') {
                    hwid = all[i].split('=')[1];
                    //                    $api.setStorage('shwid', hwid);
                } else if (all[i].split('=')[0] == 'type') {
                    type = all[i].split('=')[1]
                } else if (all[i].split('=')[0] == 'sxcid') {
                    sxcid = all[i].split('=')[1];
                    //                    $api.setStorage('ssxcid', sxcid);
                } else if (all[i].split('=')[0] == 'dyid') {
                    dyid = all[i].split('=')[1];
                    //                    $api.setStorage('sdyid', dyid);
                } else if (all[i].split('=')[0] == 'fxfw') {
                    fxfw = all[i].split('=')[1];
                    //                    $api.setStorage('fxfw', fxfw);
                }
            }
            if (type == 'homework') {//智能导练
                GetPracticePracticeinfo(hwid, sxcid, dyid);
            } else if (type == 'material') {//精品素材
                GetPracticeMicroclassinfo(hwid, sxcid, '')
            } else if (type == 'videoshow') {//普通视频
                GetSpaceResourceinfo(hwid, fxfw);
            } else {
                api.toast({
                    msg: '扫描的二维码不符合规则~',
                    duration: 2000,
                    location: 'bottom'
                });
            }
        } else {
            api.toast({
                msg: '扫描的二维码不符合规则~',
                duration: 2000,
                location: 'bottom'
            });
        }
    }

    function GetSpaceResourceinfo(hwid, fxfw) {
        api.showProgress({
            title: '加载中',
            text: '请稍后...',
            modal: false
        });
        apiObj.SetAuthToken($api.getStorage("token"));
        apiObj.Get(UrlRouter.GetResourceCodeMaterialInfo, {
            values: {
                id: hwid,
                schoolid: $api.getStorage('schoolid'),
                fxfw: fxfw
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0) {

    function connectByCloud() {
        api.showProgress({
            title: '正在连接云端课堂',
            text: '请稍后...',
            modal: false
        });

        api.ajax({
            url: UrlDomain + UrlRouter.GetStuLesson,
            method: 'get',
            timeout: 10,
            dataType: 'json',
            cache: false,
            returnAll: false,
            data: {
                values: {
                    uid: uid,
                    classid: classid
                }
            },
            headers: {
                Token: $api.getStorage('token'),
                Source: source,
                Version: version
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    ip = ret.ip;
                    if (ip == '') {
                        api.hideProgress();
                        api.toast({
                            msg: '老师未开启课堂',
                            duration: 2000,
                            location: 'bottom'
                        });
                    } else {
                        checkCloud(); //获取云端课堂相关信息
                    }
                } else {
                    api.hideProgress();
                    api.toast({
                        msg: '老师未开启课堂',
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            } else {
                api.hideProgress();
                api.toast({
                    msg: '网络请求失败，请检查网络是否通畅',
                    duration: 2000,
                    location: 'bottom'
                });
            }
        });
    }


    function checkCloud() {
        api.ajax({
            url: UrlDomain + UrlRouter.GetVirtualclass,
            method: 'get',
            timeout: 5,
            dataType: 'json',
            cache: false,
            returnAll: false,
            data: {
                values: {
                    tuid: tuid,
                    suid: uid
                }
            },
            headers: {
                Token: $api.getStorage('token'),
                Source: source,
                Version: version
            }
        }, function (ret, err) {
            api.hideProgress();
            if (ret) {
                if (ret.ret == 0 && ret.data) {
                    openCloudClass(ret);
                } else {
                    api.toast({
                        msg: '老师未开启课堂',
                        duration: 2000,
                        location: 'bottom'
                    });
                }
            } else {
                api.toast({
                    msg: '连接云课堂失败，请重新连接',
                    duration: 2000,
                    location: 'bottom'
                });
            }
        });
    }


    var vclass;
    function openCloudClass(ret) {
        //必须参数
        var vclass_token = ret.data.vclass_token;
        var private_token = ret.data.private_token;
        var netIP = ret.data.proxyNode.netIP;
        var netPort = ret.data.proxyNode.netPort;

        $api.setStorage('vclass_token', vclass_token);
        $api.setStorage('private_token', private_token);
        $api.setStorage('netIP', netIP + ':' + netPort);
        $api.setStorage('netPort', netPort);

        //创建vclass
        vclass = new VClass(netIP, netPort, uid, private_token, vclass_token); //39.106.2.190

        //监听加入课堂结果
        vclass.onJoinClass(function (data) {
            if (data.status == 1) {
                api.toast({
                    msg: '已加入云端课堂',
                    duration: 2000,
                    location: 'bottom'
                });

                connectType = 'Cloud';
                $api.setStorage('connectType', 'Cloud');

                $api.setStorage('classTN', teachername);
                $api.setStorage('classid', classid);
                $api.text($api.dom('.classname'), $api.getStorage('realname') + '已加入' + teachername + '老师的课堂');
                connectSuccess = true;
                $api.setStorage('connectSuccess', '0');//连接课堂成功
                ClassApiObjForCloud = new GridOpenApi('http://' + $api.getStorage('netIP'), source, version);
                ClassApiObjForCloud.SetAuthToken($api.getStorage('token'));
                $api.setStorage('inClass', '1'); //已经进入课堂
                if ($api.getStorage('deviceModel') == 1) { //联想设备 进入课堂隐藏home recent键
                    api.sendEvent({
                        name: 'HomeAndRecent'
                    });
                }
                api.sendEvent({
                    name: 'closeSocket'
                });
                setEnterClassMsg();
            } else {
                api.toast({
                    msg: '加入课堂失败，请重新加入',
                    duration: 2000,
                    location: 'bottom'
                });
            }
        });

        //监听老师发送的消息
        vclass.onTeacherMessage(function (data) {
            ReceiveMessage(data);
        });

        //老师掉出课堂
        vclass.on('TeacherLeaveClass', function (data) {
            checkClassState();
        });

        //服务器断开
        vclass.on('disconnect', function (data) {
            vclass.StuJoinClass();
            $api.setStorage('connectSuccess', '1');
        });

        //进入课堂
        vclass.StuJoinClass();

    }


    function checkClassState() {
        var isUnline = true; //判断是否真的掉线了
        api.addEventListener({
            name: 'ReceiveMessage_checkclassstate'
        }, function (ret, err) {
            isUnline = false;
        });
        setTimeout(function () {
            sendCheck();
        }, 1000);
        setTimeout(function () {
            if (isUnline) {
                sendCheck();
            }
        }, 3000);
        setTimeout(function () {
            if (isUnline) {
                sendCheck();
            }
        }, 6000);
        setTimeout(function () {
            if (isUnline) {
                sendCheck();
            }
        }, 8000);
        setTimeout(function () {
            if (isUnline) {
                //关闭打分按钮
                api.sendEvent({
                    name: 'closeScoreBt'
                });

                $api.setStorage('connectSuccess', '1');
                $api.setStorage('inClass', '0');
                api.closeToWin({
                    name: 'win-stu-main'
                });
            }
        }, 10000);
    }

    function setEnterClassMsg() {
        if (connectType == 'Lan') {

    }



    function ReceiveMessage(ret) {
        var eventName = ret.msg.from;
        api.sendEvent({
            name: eventName,
            extra: { receive: ret.msg }
        });

        if (eventName == 'pc_client') {
            switch (ret.msg.action) {
                case 'doc_push':
                    api.openFrame({
                        name: 'pop-frame',
                        url: 'ktzl/pop-frame.html',
                        rect: {
                            x: 0,
                            y: 0,
                            w: 'auto',
                            h: api.winHeight
                        },
                        bounces: false
                    });
                    break;
                case 'doc_withdraw':
                    api.sendEvent({
                        name: 'removeKtzl'
                    });
                    break;
                case 'class_close':
                    api.toast({
                        msg: '老师已退出课堂',
                        duration: 1500,
                        location: 'bottom'
                    });
                    //关闭打分按钮
                    api.sendEvent({
                        name: 'closeScoreBt'
                    });

                    $api.setStorage('connectSuccess', '1');
                    $api.setStorage('inClass', '0');
                    setTimeout(function () {
                        api.closeToWin({
                            name: 'win-stu-main'
                        });
                    }, 1500);
                    break;
                default:
                    break;
            }
        }
    }

        })
    }
