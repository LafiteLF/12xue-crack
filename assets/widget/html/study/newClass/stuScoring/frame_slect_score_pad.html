<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title></title>
    <link rel="stylesheet" type="text/css" href="../../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../../css/aui.2.0.css"/>
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: rgba(0, 0, 0, 0.2);
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            align-items: center; /*定义body的元素垂直居中*/
            justify-content: center; /*定义body的里的元素水平居中*/
        }

        .content {
            width: 35%;
            /*top: 30%;*/
            position: absolute;
            /*left: 32.5%;*/
        }

        .content ul {
            width: 100%;
            background: #fff;
            margin: 0 auto;
            border-radius: 5px;
            padding-top: 50px;
            padding-bottom: 30px;
        }

        .close {
            width: 100%;
            height: 100%
        }

        .content ul li {
            text-align: center;
            font-size: 0.8rem;
            color: #fff;
            width: 50%;
            height: 46px;
            line-height: 46px;
            margin: 0 auto;
            border-radius: 5px;
            margin-bottom: 20px;
            background: #4bc7c7;
        }

        ul li span {
            color: #fff;
            display: block;
            height: 46px;
            line-height: 46px;
            width: 55%;
            margin: 0 auto
        }

        ul li:active{
            background: #3fa6a6;
        }
    </style>
</head>
<body>
<div class="close" tapmode onclick="vm.closeFrame()"></div>
<div class="content">
    <ul style="margin-top: 30px" class="checkContent">
        <li tapmode @click="checkType('stu')">
            <span>学生打分</span>
        </li>
        <li tapmode @click="checkType('group')">
            <span>小组打分</span>
        </li>
    </ul>

</div>
</body>
<script type="text/javascript" src="../../../../script/api.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../../script/vue.js"></script>
<script type="text/javascript">
    var vm;
    apiready = function () {
        initVue();
    };

    function initVue() {
        vm = new Vue({
            el: '.content',
            data: {
                tx: api.pageParam.tx
            },
            methods: {
                closeFrame: function () {
                    api.closeFrame({
                        name: 'frame_slect_score_pad'
                    });
                },
                checkType:function (type) {
                    api.sendEvent({
                        name: 'checkScore',
                        extra: {
                            type: type
                        }
                    });
                    api.closeFrame({
                        name: 'frame_slect_score_pad'
                    });
                }
            }
        });
    }
</script>
