            align-items: center; /*定义body的元素垂直居中*/
            justify-content: center; /*定义body的里的元素水平居中*/
        }
        .item2:active {
            width: 100px;

        ul {

        ul li {

        }

        .close {
            width: 100%;

        <li v-for="item in evaluate.chiled" tapmode @click="checkScore(item)">

<script type="text/javascript" src="../../../../script/api.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script>
<script type="text/javascript" src="../../../../script/jquery-1.11.3.min.js"></script>
<script type="text/javascript" src="../../../../script/vue.js"></script>
<script type="text/javascript">
    var vm;
    var classObj, classObjForCloud;
    apiready = function () {
        classObj = new GridOpenApi('http://' + $api.getStorage('ip'), source, version);
        classObjForCloud = new GridOpenApi('http://' + $api.getStorage('netIP'), source, version);
        initVue();
    };

    function initVue() {
        vm = new Vue({
            el: '.pop-content',
            data: {
                evaluate: api.pageParam.evaluate,
                type: api.pageParam.type
            },
            methods: {
                getTitle: function (item) {
                    return textEllipsis(item.title) + '(' + item.score + ')';
                },
                checkScore: function (item) {
                    if (api.pageParam.type == 'stu') {
                        if ($api.getStorage('connectType') == 'Lan') {
                            classObj.Get('/student_score_to_self', {
                                values: {
                                    classid: $api.getStorage('classid'),
                                    uid: $api.getStorage('uid'),
                                    student_name: $api.getStorage('realname'),
                                    score: item.score,
                                    score_id: item.id,
                                    evaluate_id: item.evaluate,
                                    title: item.title
                                }
                            }, function (ret, err) {
                                if (ret) {
                                    ProcessRet1(ret, item);
                                } else {
                                    api.toast({
                                        msg: '打分失败！',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                    api.closeFrame();
                                }
                            });

                        } else {
                            api.addEventListener({
                                name: 'ReceiveMessage_stuScore1'
                            }, function (ret, err) {
                                ProcessRet1(ret.value.receive, item);
                            });
                            classObjForCloud.Get('/student_score_to_self', {
                                values: {
                                    classid: $api.getStorage('classid'),
                                    student_name: $api.getStorage('realname'),
                                    score: item.score,
                                    score_id: item.id,
                                    evaluate_id: item.evaluate,
                                    title: item.title,
                                    uid: $api.getStorage('uid'),
                                    from: 'ReceiveMessage_stuScore1',
                                    vclass_token: $api.getStorage('vclass_token'),
                                    private_token: $api.getStorage('private_token')
                                }
                            }, function (ret, err) {
                                if (ret && ret.status == 1) {
                                } else {
                                    api.toast({
                                        msg: ret.info,
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }
                            });
                        }

                    } else {
                        if ($api.getStorage('connectType') == 'Lan') {
                            classObj.Get('/group_score_to_self', {
                                values: {
                                    classid: $api.getStorage('classid'),
                                    groupid: $api.getStorage('groupScoreId'),
                                    uid: $api.getStorage('uid'),
                                    group_name: $api.getStorage('groupScoreName'),
                                    score: item.score,
                                    score_id: item.id,
                                    evaluate_id: vm.evaluate.id,
                                    title: item.title
                                }
                            }, function (ret, err) {
                                if (ret) {
                                    ProcessRet2(ret, item);
                                } else {
                                    api.toast({
                                        msg: '打分失败！',
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                    api.closeFrame();
                                }
                            });
                        } else {

                            api.addEventListener({
                                name: 'ReceiveMessage_stuScore2'
                            }, function (ret, err) {
                                ProcessRet2(ret.value.receive, item);
                            });
                            classObjForCloud.Get('/group_score_to_self', {
                                values: {
                                    classid: $api.getStorage('classid'),
                                    groupid: $api.getStorage('groupScoreId'),
                                    group_name: $api.getStorage('groupScoreName'),
                                    score: item.score,
                                    score_id: item.id,
                                    evaluate_id: vm.evaluate.id,
                                    title: item.title,
                                    uid: $api.getStorage('uid'),
                                    from: 'ReceiveMessage_stuScore2',
                                    vclass_token: $api.getStorage('vclass_token'),
                                    private_token: $api.getStorage('private_token')
                                }
                            }, function (ret, err) {
                                if (ret && ret.status == 1) {
                                } else {
                                    api.toast({
                                        msg: ret.info,
                                        duration: 2000,
                                        location: 'bottom'
                                    });
                                }
                            });
                        }
                    }
                }
            }
        });
    }

    function textEllipsis(value) {
        if (!value) return '';
        if (value.length > 3) {
            return value.slice(0,3) + '...'
        }
        return value
    }


    function ProcessRet1(ret, item) {
        if (ret.status == 1) {
            api.openFrame({
                name: 'frame_finish_score',
                url: 'frame_finish_score.html',
                rect: {
                    x: 0,
                    y: 0,
                    w: 'auto',
                    h: 'auto'
                },
                pageParam: {
                    title: item.title,
                    score: item.score,
                    type: api.pageParam.type
                },
                bounces: false
            });
            api.closeFrame();
        } else {
            api.toast({
                msg: '打分失败',
                duration: 2000,
                location: 'bottom'
            });
            api.closeFrame();
        }
    }

    function ProcessRet2(ret, item) {
        if (ret.status == 1) {
            api.openFrame({
                name: 'frame_finish_score',
                url: 'frame_finish_score.html',
                rect: {
                    x: 0,
                    y: 0,
                    w: 'auto',
                    h: 'auto'
                },
                pageParam: {
                    title: item.title,
                    score: item.score,
                    type: api.pageParam.type
                },
                bounces: false
            });
            api.closeFrame();
        } else {
            api.toast({
                msg: '打分失败',
                duration: 2000,
                location: 'bottom'
            });
            api.closeFrame();
        }
    }


    //字符串转base64
    function encode(str) {
// 对字符串进行编码
        var encode = encodeURI(str);
// 对编码的字符串转化base64
        return btoa(encode);
    }

    //阻止冒泡的函数
    function stopBubble(e) {
        if (e && e.stopPropagation) {
            e.stopPropagation();
            return true;
        }
        window.event.cancelBubble = true;
    }


</script>
