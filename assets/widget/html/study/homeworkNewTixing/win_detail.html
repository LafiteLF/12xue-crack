<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>win</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/winDetailCss.css"/>    <style>        .winTitle {            width: calc(100% - 631px);        }        .scroll li{ position: relative}        .hd{ width: 10px; height: 10px; border-radius: 100px; background: #e64545; border: 1px solid #fff; position: absolute; top: -3px}    </style></head><body><div class="content1"><header class="clearfix">    <div onclick=" api.closeWin();" class="winTitle pull_left">        数学错题本    </div>    <ul class="pull_right clearfix winIcon">        <li class="buttonFour font4BC7C7 removectb pull_right"><p>移除错题本</p></li>        <li class="buttonFour font4BC7C7 allSubmit pull_right"><p>全部提交</p></li>        <li class="buttonTwo font4BC7C7 pingjia pull_right"><p>评价</p></li>        <li class="buttonFour font4BC7C7 uploadfj pull_right"><p>上传附件</p></li>        <li class="buttonTwo font4BC7C7 tiwen pull_right"><p>提问</p></li>        <li class="pull_right wzxts font666">未做习题：<span>6道</span></li>    </ul>    <!--<ul class="pull_right clearfix winIcon">-->    <!--<li class="buttonTwo font4BC7C7 tiwen pull_right"><p>清空</p></li>-->    <!--<li class="buttonTwo font4BC7C7 tiwen pull_right"><p>撤销</p></li>-->    <!--<li class="buttonTwo font4BC7C7 tiwen pull_right"><p>关闭</p></li>-->    <!--<li class="buttonTwo font4BC7C7 tiwen pull_right"><p>确定</p></li>-->    <!--</ul>--></header><div class="content">    <div class="type bg4BC7C7 fontFFF">{{current+1}}/10</div>    <ul class="scroll">        <li v-for="(list , index) in 12"   :class="current==index?'current':''" tapmode onclick="vm.itemClick(this)">            {{index+1}}            <span   class="hd"></span>        </li>    </ul></div><ul class="right_btn">    <li tapmode onclick="vm.winpageUpOnclick();"><img src="../../../image/up1.png"></li>    <li tapmode onclick="vm.winnextOnclick();"><img src="../../../image/down1.png"></li></ul></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script type="text/javascript">    apiready = function () {        vm.openFrameGroup()    };    vm = new Vue({        el: '.content1',        data: {            current:0,            xitinum:12        },        updated: function () {        },        methods: {            openFrameGroup: function () {                var header = document.querySelector('header');                var leftW = $api.offset($api.dom('.content')).w;                var rightW = $api.offset($api.dom('.right_btn')).w;                var headerH = $api.offset(header).h;                var frameAry = [                       {                            name: 'frame_xzt_wdt',                            url: 'frame_xzt.html',                            bounces: false,                            bgColor: '#f2f2f2',                            pageParam: {                                isdt:'0'                            }                        },                    {                        name: 'frame_xzt_ydt',                        url: 'frame_xzt.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'1'                        }                    },                    {                        name: 'frame_wdt_wdt',                        url: 'frame_wdt.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'0'                        }                    },                    {                        name: 'frame_wdt_ydt',                        url: 'frame_wdt.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'1'                        }                    },                    {                        name: 'frame_wxtk_wdt',                        url: 'frame_wxtk.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'0'                        }                    },                    {                        name: 'frame_wxtk_ydt',                        url: 'frame_wxtk.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'1'                        }                    },                    {                        name: 'frame_tkt_wdt',                        url: 'frame_tkt.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'0'                        }                    },                    {                        name: 'frame_tkt_ydt',                        url: 'frame_tkt.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'1'                        }                    },                    {                        name: 'frame_sytj_wdt',                        url: 'frame_sytj.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'0'                        }                    },                    {                        name: 'frame_sytj_ydt',                        url: 'frame_sytj.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'1'                        }                    },                    {                        name: 'frame_listen_wdt',                        url: 'frame_listen.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'0'                        }                    },                    {                        name: 'frame_listen_ydt',                        url: 'frame_listen.html',                        bounces: false,                        bgColor: '#f2f2f2',                        pageParam: {                            isdt:'1'                        }                    }                ];                // var frameObj = {};                // for (var i = 0; i < 10; i++) {                //     frameObj = {                //         name: 'frame_xzt' + (i + 1),                //         url: 'frame_tkt.html',                //         bounces: false,                //         bgColor: '#f2f2f2',                //         pageParam: {                //         }                //     };                //     frameAry.push(frameObj);                // }                api.openFrameGroup({                    name: 'frame_xzt',                    scrollEnabled: false,                    rect: {                        x: leftW + 10,                        y: headerH + 10,                        w: api.winWidth - leftW - rightW - 30 ,                        h: $api.getStorage('padHeight') - headerH - 10                    },                    index: 0,                    preload: 0,                    frames: frameAry,                    reload: true                }, function (ret, err) {                    vm.current = ret.index;                    if (vm.current > 4) {                        $api.dom('.scroll').scrollTop = (vm.current - 4) * 56;                    } else {                        $api.dom('.scroll').scrollTop = 0;                    }                });            },            winpageUpOnclick: function () {//右边上一个按钮切换                if (vm.current == 0) {                    api.toast({                        msg: '已经是第一个了',                        duration: 2000,                        location: 'bottom'                    })                } else {                    vm.current = vm.current - 1;                    api.setFrameGroupIndex({                        name: 'frame_xzt',                        index: vm.current,                        scroll: true                    });                }            },            winnextOnclick: function () {//右边下一个按钮切换                if (vm.current == vm.xitinum - 1) {                        api.toast({                            msg: '已经是最后一个了',                            duration: 2000,                            location: 'bottom'                        })                } else {                    vm.current = vm.current + 1;                    api.setFrameGroupIndex({                        name: 'frame_xzt',                        index: vm.current,                        scroll: true                    });                }            },            itemClick: function (context) {//左边题号切换                vm.current = $(context).index();                api.setFrameGroupIndex({                    name: 'frame_xzt',                    index: vm.current,                    scroll: true                });            },        }    })</script></html>
