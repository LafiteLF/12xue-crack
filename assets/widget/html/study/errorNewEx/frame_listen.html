<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>听力题</title>    <link rel="stylesheet" type="text/css" href="../../../css/publicCss.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/frameDetail.css"/>    <link rel="stylesheet" type="text/css" href="../../../css/ErrorBookLeftBtn.css">    <style>        body {            background-color: #f2f2f2;            font-size: 1.2rem;            padding-top: 0.5rem;            /*崩溃*/            height: auto;        }        [v-cloak] {            display: none !important;        }        .defen {            right: 125px;        }        .zsd img {            height: 16px;        }        .all_listen_content {            display: none;        }    </style></head><body><div class="all_listen_content" style="height: 100%;width: 100%;" v-cloak>    <ul class="leftedit_btn" style="width: 79px">        <li id="leftedit_btn_checkanswer" tapmode onclick="vm.onCheckAnswerClick();"><img class="noImgClick"                                                                                          id="leftedit_btn_checkanswer_src"                                                                                          :src="viewAnswer?'../../../image/check_answer_down.png':'../../../image/check_answer_up.png'">        </li>        <li id="leftedit_btn_makepoint" tapmode onclick="vm.onMakePointClick();">            <img class="noImgClick"                 :src="important==0?'../../../image/make_point_up.png':'../../../image/make_point_down.png'">        </li>        <li id="leftedit_btn_remove_src" tapmode onclick="vm.onRemoveFromErrNoteClick();"><img                class="noImgClick" src="../../../image/remove_from_errbook_up.png"></li>    </ul>    <div class="listen_content" style="width: 100%;height: 100%;position: fixed;left: 89px;top: 0;">        <!--题干部分开始-->        <div class="listen_stem" style="width: 89%;">            <ul>                <li class="tixing" v-text="'【'+txstr+'】'"></li>                <li v-if="complete||viewAnswer" class="zsd" @click="alertzsd(data.zsdmc)">                    <span>难易度：</span><img class="noImgClick"                                          :src="data.nyd==1?'../../../image/newhomework/1xing.png':data.nyd==2?'../../../image/newhomework/2xing.png':data.nyd==3?'../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{data.zsdmc}}                </li>            </ul>            <div class=" font666 listen_tigan" style="width:auto;">                <p style="padding-left: 10px;width: calc(100% - 20px);height: auto" v-html="data.tg"></p>                <div class="tdjhyinpin clearfix" v-if="data.attachments">                    <img class="scyp1 noImgClick" src="../../../image/newhomework/yuyinimg.png">                    <img class="scyp2 noImgClick" :playStatus='0' onclick="vm.studentRecord(this);"                         src="../../../image/startPlay.png" alt="">                    <div class="ypRange"><input class="myRange" type="range" min="0" value="0"                                                :max='data.attachments[0].filetime'></div>                    <p class="ypTimeP" v-text="getOutTime(data.attachments[0].filetime)"></p>                    <audio class="hideenAudio"                           :src='data.attachments[0].serverpath + data.attachments[0].preview_link'></audio>                </div>            </div>        </div>        <!--题干部分结束-->        <div class="listen_bottom" style="width: 90%;">            <!--答题部分开始-->            <span class="listen_xiaoti" style="right: 20px;" v-text="'共'+xiaotinum+'小题'"></span>            <div v-for="(list,index) in data.children">                <div class="listenda_content">                    <div class="listen_xtxx" style="width: calc(100% - 20px)" v-html="'('+(index+1)+')'+list.tg"></div>                    <ul v-if="!complete&&!viewAnswer" class="option">                        <li v-for="item in list.options" :id="item.id" :index="index"                            :class="answerArr[index].da[0]==item.id?'danxoption xxactive':'danxoption'" tapmode                            onclick="vm.xxselectClicked(this)" v-text="item.xx"></li>                    </ul>                </div>                <!--答题部分结束-->                <!--答案部分开始-->                <dl v-if="complete||viewAnswer" class="listen_answer bgFFF">                    <div class="defen" style="top: 35px">                        <img class="noImgClick" v-if="answerArr[index].is_true!=0"                             :src="answerArr[index].is_true==1?' ../../../image/newhomework/zhengque.png':answerArr[index].is_true==2?'../../../image/newhomework/cuowu.png':answerArr[index].is_true==3?'../../../image/newhomework/bandui.png':''">                        <span :style="answerArr[index].is_true==1?'color: #4bc7c7':answerArr[index].is_true==2?'color: #df7605':answerArr[index].is_true==3?'color: #ffcd06':''"                              v-text="answerArr[index].is_true==1?'正确':answerArr[index].is_true==2?'错误':answerArr[index].is_true==3?'正确率'+list.accuracy+'%':''"></span>                        <span v-if="answerArr[index].is_true==0" style="color: #ff778c">待批</span>                    </div>                    <dd>                        <h2 class="wendah2">【我的答案】</h2>                        <ul class="clearfix wendawdda">                            <li class="wendazi"                                v-text="answerArr[index].is_unable==1?'无':answerArr[index].xsdastr"></li>                        </ul>                    </dd>                    <dd>                        <h2 class="wendah2">【{{data.tx_tip}}】</h2>                        <ul>                            <li class="wendazi" v-html="list.dastr==''?'无':list.dastr"></li>                        </ul>                    </dd>                    <dd>                        <h2 class="wendah2">【答案解析】</h2>                        <ul>                            <li class="wendazi" v-html="list.dajx==''?'无':list.dajx"></li>                        </ul>                    </dd>                </dl>                <!--答案部分结束-->            </div>            <div class="tijiao" style="margin-top: 46px"                 :style="selectAnswerArr.length!=xiaotinum?'background: #d5d5d5':'background: #4bc7c7'"                 v-if="!complete&&!viewAnswer" tapmode onclick="vm.checkAnswer()">提交            </div>        </div>    </div></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    var vm;    var moduleDialog = null;//弹窗模块bhzparam    var allTimes = 0;//音频播放    var sec;    var timer = null;    apiready = function () {        vue();        api.addEventListener({// 滑动暂停音频            name: 'yinpinCLose'        }, function (ret, err) {            if ($api.domAll('.scyp2').length >= 1) {                if ($('.scyp2').attr('playStatus') == 1) {                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');                }                audioStreamer = api.require('audioStreamer');                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                clearInterval(timer);                var hideenAudio = $api.dom('.hideenAudio');                hideenAudio.pause();            }            api.stopPlay();            $('.img1').show();            $('.img2').hide();        });        vm.isdt = api.pageParam.isdt;        vm.totalCount = api.pageParam.totalCount;        vm.index = api.pageParam.index;        vm.current_page = api.pageParam.index;///////        document.getElementById('leftedit_btn_remove_src').addEventListener('touchstart', function () {            document.getElementById('leftedit_btn_remove_src').src = "../../../image/remove_from_errbook_down.png";        });        document.getElementById('leftedit_btn_remove_src').addEventListener('touchend', function () {            document.getElementById('leftedit_btn_remove_src').src = "../../../image/remove_from_errbook_up.png";        });        vm.getExInfo();    };    function vue() {        vm = new Vue({            el: '.all_listen_content',            data: {                current_page: 0,                isdt: 1,                important: 0,                index: 0,                totalCount: 0,                data: {},                tx_type: '',                answerArr: [],//答案数组                complete: 0,                viewAnswer: 0,//查看答案                viewAnswerArr: [],//查看答案的数组 学生做错习题时的答案信息                nowAnswerArr: [],//学生在错题本的答案数组                answerStr: '',//答案字符串                dastr: '',//习题正确答案                is_true: '',//本次答题是否正确                xiaotinum: 0,//小题总数                selectAnswerArr: [],//老师留言是否播放中                isPlaying: false,//老师留言是否播放中                txstr: '',                bhzparam: {                    "data": [{                        "viewType": 100,                        "x": api.winWidth / 2 - 150,                        "y": $api.getStorage('padHeight') / 2 - 75,                        "h": 150,                        "w": 300                    }, {                        "viewType": 101,                        "x": api.winWidth / 2 - 150 + 30,                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,                        "h": 48,                        "w": 240,                        "lineSpacting": 1.3,                        "showText": "<font color='#666666'>确认移出错题本？</font>",                        "textSize": 14                    }, {                        "viewType": 102,                        "x": api.winWidth / 2 - 150 + 159,                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,                        "h": 35,                        "w": 100,                        "clickID": "ok",                        "showText": "确定",                        "textSize": 14                    }, {                        "viewType": 102,                        "x": api.winWidth / 2 - 150 + 40,                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,                        "h": 35,                        "w": 100,                        "clickID": "no",                        "showText": "取消",                        "textSize": 14                    }]                },            },            updated: function () {                for (var i = 0; i < $api.domAll('img').length; i++) {                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');                    }                }                for (var i = 0; i < $api.domAll('a').length; i++) {                    $api.css($api.domAll('a')[i], 'color: #666;');                    $api.domAll('a')[i].onclick = function () {                        return false;                    }                }            },            methods: {                alertzsd: function (content) {                    alert('知识点：' + content);                },                onMakePointClick: function () {                    apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.DeleteStudentWrongBookUrl, {                        body: $api.jsonToStr({                            uid: $api.getStorage('uid'),                            type: 'is_important',                            sys_id: vm.data.sys_id,                            kc_type: vm.data.kc_type,                            is_important: vm.important == 1 ? 0 : 1                        })                    }, function (ret, err) {                        if (ret) {                            if (ret.ret == 0) {                                if (vm.important === 0) {                                    vm.important = 1;                                } else {                                    vm.important = 0;                                }                                api.sendEvent({                                    name: 'editImp',                                    extra: {}                                });                            } else {                                api.toast({                                    msg: ret.msg,                                    duration: 2000,                                    location: 'bottom'                                });                            }                        } else {                            api.toast({                                msg: err.msg,                                duration: 2000,                                location: 'bottom'                            });                        }                    })                },                onEditErroQustionClick: function () {                    api.toast({                        msg: 'onEditErroQustionClick',                        duration: 2000,                        location: 'bottom'                    });                },                onCheckAnswerClick: function () {//点击查看答案                    vm.viewAnswer = !vm.viewAnswer;                    vm.answerArr = [];                    if (vm.viewAnswer) {                        for (var i = 0; i < vm.viewAnswerArr.length; i++) {                            vm.answerArr.push(vm.viewAnswerArr[i]);                        }                    }                    else {                        for (var i = 0; i < vm.nowAnswerArr.length; i++) {                            vm.answerArr.push(vm.nowAnswerArr[i]);                        }                    }                    if (vm.viewAnswer) {                        vm.complete = 0;                    }                },                onRemoveFromErrNoteClick: function () {                    moduleDialog = api.require('moduleDialog');                    moduleDialog.showDialog(vm.bhzparam, function (ret, err) {                        if (ret.state == 'success' && ret.clickID) {                            if (ret.clickID == 'ok') {                                apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.DeleteStudentWrongBookUrl, {                                    body: $api.jsonToStr({                                        uid: $api.getStorage('uid'),                                        type: 'outbook',                                        sys_id: vm.data.sys_id,                                        kc_type: vm.data.kc_type,                                    })                                }, function (ret, err) {                                    if (ret) {                                        if (ret.ret == 0) {                                            //在这处理删除第一题，最后一题以及总题数是否为0                                            vm.totalCount = vm.totalCount - 1;                                            if (vm.totalCount == 0) {                                                api.closeWin();                                            }                                            else {                                                api.sendEvent({                                                    name: 'onTopIndexChange',                                                    extra: {index: vm.current_page},                                                });                                            }                                            api.sendEvent({                                                name: 'removeError',                                                extra: {}                                            });//刷新错题列表的frame数据                                        } else {                                            api.toast({                                                msg: ret.msg,                                                duration: 2000,                                                location: 'bottom'                                            });                                        }                                    } else {                                        api.toast({                                            msg: err.msg,                                            duration: 2000,                                            location: 'bottom'                                        });                                    }                                });                                dismissDialog();                            } else {                                dismissDialog();                            }                        } else {                        }                    });                },                checkAnswer: function () {//提交                    //没有全部作答不能提交                    if (vm.selectAnswerArr.length != vm.xiaotinum) {                        return false;                    }                    if (vm.nowAnswerArr.length == vm.xiaotinum) {                        for (var i = 0; i < vm.answerArr.length; i++) {                            if (vm.answerArr[i].da[0] == vm.answerArr[i].daoptions[0].id) {                                vm.answerArr[i].is_true = 1;//正确                            } else {                                vm.answerArr[i].is_true = 2;//错误                            }                        }                        vm.complete = 1;                    }                },                xxselectClicked: function (context) {//选择判断题选项点击事件                    var xtindex = $(context).attr('index');                    vm.nowAnswerArr[xtindex].da[0] = $(context).attr('id');                    vm.nowAnswerArr[xtindex].is_unable = 0;//不会做                    vm.nowAnswerArr[xtindex].xsdastr = $(context).text();//选项                    vm.answerArr = [];                    for (var i = 0; i < vm.nowAnswerArr.length; i++) {                        vm.answerArr.push(vm.nowAnswerArr[i]);                    }                    if (vm.selectAnswerArr.indexOf(xtindex) > -1) {//用于判断学生是不是选择了所有小题的答案                    } else {                        vm.selectAnswerArr.push(xtindex);                    }                },                getExInfo: function () {                    apiObj.Get(UrlRouter.ExercisesWrongs, {                        values: {                            uid: $api.getStorage('uid'),                            schoolid: $api.getStorage('newSchoolId'),                            xkid: api.pageParam.xkid,                            online: api.pageParam.online,                            type: api.pageParam.type,                            njid: api.pageParam.njid,                            dyid: api.pageParam.dyid,                            page: vm.index,                            num: 1,                            tx: api.pageParam.tx,                            is_important: api.pageParam.isImportant,                            xd:$api.getStorage('stuXD')                        }                    }, function (ret, err) {                        if (ret) {                            if (ret.ret == 0) {                                vm.data = ret.data.data[0];                                vm.tx_type = vm.data.tx;                                vm.txstr = vm.data.txstr;                                vm.important = vm.data.is_important;                                vm.dastr = vm.data.dastr;                                vm.xiaotinum = vm.data.children.length;                                for (var i = 0; i < vm.data.children.length; i++) {//给初始化的小题加个默认空答案 防止报错                                    var kongcontent = {                                        'topid': vm.data.id,                                        'id': vm.data.children[i].id,                                        'da': [],                                        'is_unable': vm.data.children[i].is_unable,                                        'daoptions': vm.data.children[i].daoptions,                                        'sort': vm.data.children[i].sort,                                        'is_true': vm.data.children[i].is_true,                                        'xsdastr': vm.data.children[i].xsdastr,                                    };                                    Vue.set(vm.nowAnswerArr, i, kongcontent);//本次提交的答案数组                                }                                for (var i = 0; i < vm.data.children.length; i++) {//给初始化的小题加个默认空答案 防止报错                                    var kongcontent = {                                        'topid': vm.data.id,                                        'id': vm.data.children[i].id,                                        'da': [],                                        'is_unable': vm.data.children[i].is_unable,                                        'daoptions': vm.data.children[i].daoptions,                                        'sort': vm.data.children[i].sort,                                        'is_true': vm.data.children[i].is_true,                                        'xsdastr': vm.data.children[i].xsdastr,                                    };                                    Vue.set(vm.answerArr, i, kongcontent);                                }                                for (var i = 0; i < vm.data.children.length; i++) {//给初始化的小题加个默认空答案 防止报错                                    var kongcontent = {                                        'topid': vm.data.id,                                        'id': vm.data.children[i].id,                                        'da': [],                                        'is_unable': vm.data.children[i].is_unable,                                        'daoptions': vm.data.children[i].daoptions,                                        'sort': vm.data.children[i].sort,                                        'is_true': vm.data.children[i].is_true,                                        'xsdastr': vm.data.children[i].xsdastr,                                    };                                    Vue.set(vm.viewAnswerArr, i, kongcontent);                                }                                $('.all_listen_content').css('display','block');                            } else {                                toast12xue(ret.msg);                            }                        } else {                            toast12xue(err.msg);                        }                    });                },                yuyin: function (audioItem, index) {                    if (audioItem.type == 1) {                        if (vm.isPlaying) {                            api.stopPlay();                            $('.img1').show();                            $('.img2').hide();                        } else {                            $('.img1').show();                            $('.img2').hide();                            var audioName = audioItem.savename;                            var path = "/audio/" + audioName + ".amr";                            api.download({                                url: audioItem.serverpath + "/" + audioItem.savename,                                savePath: 'fs:/' + path,                                report: false,                                cache: false,                                allowResume: false                            }, function (ret, err) {                                if (ret && ret.state == 1) {                                    // 下载成功  ret.savePath                                    isDownloading = false;                                    api.startPlay({                                        path: api.fsDir + path                                    }, function (ret, err) {                                        if (ret) {                                            vm.isPlaying = false;                                            $('.img1').show();                                            $('.img2').hide();                                        }                                    });                                    $('.yuyin3').eq(index).find('.img1').hide();                                    $('.yuyin3').eq(index).find('.img2').show();                                    $('.yuyin3').eq(index).siblings().find('.img1').show();                                    $('.yuyin3').eq(index).siblings().find('.img2').hide();                                }                            });                        }                        vm.isPlaying = !vm.isPlaying;                    }                },                studentRecord: function (context) {                    var url = vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link                    var playStatus = $api.attr(context, 'playStatus');                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime                    var hideenAudio = $api.dom('.hideenAudio');                    var range = $api.dom('.myRange');                    range.disabled = true;                    var bfb;  //1//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频                    if (playStatus == '0') {                        if (timer) {                            clearInterval(timer);                        }                        $api.attr(context, 'playStatus', '1');                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                        hideenAudio.play();                        sec = 0;                        allTimes = recodetime;                        timer = setInterval(function (e) {                            console.log(hideenAudio.currentTime + '  ' + sec);                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb = sec / recodetime * 100;   //2                            bfb = bfb.toFixed(2);//2                            var ss = 'background-size: ' + bfb + '% 100%';//2                            if (allTimes == 0 || sec >= recodetime) {                                clearInterval(timer);                                $api.attr(context, 'playStatus', '0');                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3                            } else {                                range.value = sec;//                                range.onchange = function () {//                                    sec = parseInt(this.value);//                                    range.value = sec;//                                    hideenAudio.currentTime = sec;//                                    allTimes = recodetime - sec;//                                    var time = vm.getOutTime(allTimes);//                                    $api.text($api.dom('.ypTimeP'), time);//                                };                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);  //4                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    } else if (playStatus == '1') {                        $api.attr(context, 'playStatus', '2');                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                        clearInterval(timer);                        hideenAudio.pause();                    } else {                        $api.attr(context, 'playStatus', '1');                        hideenAudio.play();                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');                        timer = setInterval(function (e) {                            sec = sec + 1;                            allTimes = allTimes - 1;                            bfb = sec / recodetime * 100;    //5                            bfb = bfb.toFixed(2);   //5                            var ss = 'background-size: ' + bfb + '% 100%';  //5                            if (allTimes == 0 || sec >= recodetime) {                                $api.attr(context, 'playStatus', '0');                                clearInterval(timer);                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');                                var time = vm.getOutTime(recodetime);                                $api.text($api.dom('.ypTimeP'), time);                                range.value = 0;                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6                            } else {                                range.value = sec;//                                range.onchange = function () {//                                    sec = parseInt(this.value);//                                    range.value = sec;//                                    hideenAudio.currentTime = sec;//                                    allTimes = recodetime - sec;//                                    var time = vm.getOutTime(allTimes);//                                    $api.text($api.dom('.ypTimeP'), time);//                                };                                var time = vm.getOutTime(allTimes);                                $api.css($api.dom('.myRange'), ss);    //7                                $api.text($api.dom('.ypTimeP'), time);                            }                        }, 1000);                    }                },                getOutTime: function (intime) {                    var outTime = '';                    if(intime<=9){                        outTime = '00:0'+intime;                    }else if(intime<59){                        outTime = '00:'+intime;                    }else {                        var min =parseInt(intime/60);                        var sec = intime%60;                        if(sec<=9){                            if(min>0&&min<10){                                outTime ='0'+ min+ ':0' + sec ;                            }else if(min>=10){                                outTime = min+ ':0' + sec ;                            }else{                                outTime = '00:0'+sec;                            }                        }else{                            if(min > 0 && min < 10){                                outTime ='0'+ min + ':'+ sec ;                            }else if(min>=10){                                outTime = min + ':'+ sec ;                            }else {                                outTime = '00:'+sec;                            }                        }                    }                    return outTime;                }            }        });    }    function imgClick(context) {        var src = $api.attr(context, 'src');        if (src.indexOf('data:image/png;base64,') != -1) {            return;        }        if (src.substring(src.length - 3) == 'gif') {        } else {            var photoBrowser = api.require('photoBrowser');            photoBrowser.open({                images: [                    src                ],                placeholderImg: 'widget://../image/loading_more.gif',                bgColor: '#fff'            }, function (ret, err) {                if (ret.eventType == 'click') {                    photoBrowser.close();                }            });        }    }    function dismissDialog() {        moduleDialog.dismissDialog();    }</script></html>
