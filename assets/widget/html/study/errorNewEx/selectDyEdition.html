<!doctype html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,initial-scale=1.0,width=device-width"/>    <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">    <meta name="apple-mobile-web-app-capable" content="yes">    <meta name="apple-mobile-web-app-status-bar-style" content="black">    <title>选择团队</title>    <link rel="stylesheet" href="../../../css/sm.min.css">    <link rel="stylesheet" href="../../../css/common.css">    <link rel="stylesheet" href="../../../css/analysis.css">    <link rel="stylesheet" type="text/css" href="../../../css/aui.css"/>    <style>        html, body {            background: rgba(0, 0, 0, 0.3)        }        .main {            width: 100%;            /*left: 30%;*/            height: 300px;            background: #fff;            /* bottom: 0px; */            /* left: 0px; */            bottom: 0;            position: fixed;            z-index: 2;            /*text-align: center;*/            /* padding-bottom: 50px; */        }        .queding {            width: calc(100% - 30px);            height: 40px;            text-align: center;            line-height: 40px;            background: #4bc7c7;            margin-left: 15px;            color: #fff;            margin-top: 5px;            border-radius: 3px;        }        .close {            position: fixed;            width: 100%;            height: 100%;            top: 0;            left: 0;            z-index: 1;        }        .selectnr {            position: relative;            height: 100%;            border-bottom: 1px solid #e5e7ea;            overflow-x: scroll;        }        .jcsx {            height: 40px;            background: #f5f5f5;            color: #bbbbbb;            text-align: left;            line-height: 40px;            font-size: 14px;            padding: 0 20px;        }        .selectsxc {            height: 40px;            line-height: 35px;            width: 100%;            position: absolute;            top: 40px;            border-bottom: 1px solid #dadada;            overflow-x: scroll;            padding: 0 20px;        }        .selectsxc ul {            text-align: left;            height: 40px;            overflow: scroll;        }        .selectsxc ul li {            float: left;            display: block;            font-size: 0.7rem;            text-align: center;            color: #999999;            height: 40px;            line-height: 40px;            width: 25%;     overflow-y: auto;        }        .selectbb {            /*overflow-x: scroll;*/            /*overflow-y: scroll;*/            width: 100%;            position: absolute;            /* top: 40px; */            height: 100%;            padding: 0 20px;            overflow-y: auto;        }        .selectbb ul li {            font-size: 14px;            line-height: 40px;            color: #333;            border-bottom: 1px solid #e5e5e5;            padding: 5px 0;        }        .jcsx span {            float: right;            padding-top: 5px        }        .jcsx span img {            width: 20px;        }    </style></head><body><div class="close" tapmode></div><div class="main">    <div class="selectnr">        <div class="jcsx">单元章节筛选<span onclick="api.closeFrame();"><img                src="../../../image/closeselect.png"></span></div>        <div class="selectbb">            <ul>                <li v-for="(item,index) in allVolume" v-text="item.name" :id="item.id" type="Volume" tapmode                    @click="choosebb(index,item)"                    :style="nowstatus.id==item.id?'color:#4bc7c7':'color:#666'"></li>            </ul>        </div>    </div></div></body><script type="text/javascript" src="../../../script/api.js"></script><script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../script/vue.js"></script><script>    apiready = function () {        if (api.pageParam.recommend == '') {            vm.allVolume = api.pageParam.chaptlist;            vm.nowstatus = {name: '全部', id: '0'};        } else {            vm.nowstatus = api.pageParam.recommend;            vm.allVolume = api.pageParam.chaptlist;        }        $api.attr($api.dom('.close'), 'onclick', 'api.closeFrame();');    };    var vm = new Vue({        el: '.main',        data: {            chaptlist: '',            recommend: '',            allschool: '',            allGrade: '',            allPublisher: '',            allVolume: '',            allSection: '',            nowstatus: '',            active: 0,            allstatus: [{'id': '5', 'name': '全部'}, {'id': '4', 'name': '未答题'}, {'id': '0', 'name': '未提交'}, {                'id': '1',                'name': '未过关'            }, {'id': '2', 'name': '暂过关'}, {'id': '3', 'name': '已过关'}]        },        updated: function () {            $api.css($api.dom('.main'), 'display:block');        },        methods: {            tab: function (context) {                vm.active = parseInt($(context).index());            },            choosebb: function (index, item) {                vm.nowstatus = vm.allVolume[index];                //发送筛选数据                api.sendEvent({                    name: 'selectsDydata',                    extra: {                        recommend: vm.nowstatus                    }                });                api.closeFrame();            }        }    });</script></html>
