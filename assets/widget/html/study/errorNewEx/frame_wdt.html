<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>
    <title>问答题，朗读题</title>

    <link rel="stylesheet" type="text/css" href="../../../css/wx-audio.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/ErrorBookLeftBtn.css">
    <style>
        [v-cloak] {
            display: none !important;
        }

        .wenda_answer {
            padding: 0 10px 10px 0;
            margin-top: 0;
            position: relative;
            width: calc(100% - 10px);
        }

        .defen {
            top: 25px;
        }

        /*滚动条样式*/
        *::-webkit-scrollbar { /*滚动条整体样式*/
            width: 5px; /*高宽分别对应横竖滚动条的尺寸*/
            height: 100%;
        }

        *::-webkit-scrollbar-thumb { /*滚动条里面小方块*/
            border-radius: 10px;
            -webkit-box-shadow: none;
            background: #83dad9;
        }

        *::-webkit-scrollbar-track { /*滚动条里面轨道*/
            -webkit-box-shadow: none;
            border-radius: 10px;
            background: #d8f6f4;
        }

        .all_wdt_content {
            display: none;
        }
    </style>
</head>
<body>

<div class="all_wdt_content" v-cloak style="width: 100%">
    <ul class="leftedit_btn" style="width: 79px">
        <li id="leftedit_btn_checkanswer" tapmode onclick="vm.onCheckAnswerClick();"><img class="noImgClick"
                                                                                          id="leftedit_btn_checkanswer_src"
                                                                                          :src="complete == 1?'../../../image/check_answer_down.png':'../../../image/check_answer_up.png'">
        </li>
        <li id="leftedit_btn_makepoint" tapmode onclick="vm.onMakePointClick();">
            <img class="noImgClick"
                 :src="important==0?'../../../image/make_point_up.png':'../../../image/make_point_down.png'">
        </li>
        <li id="leftedit_btn_remove" style="background-color: #ffffff" tapmode onclick="vm.onRemoveFromErrNoteClick();">
            <img class="noImgClick" id="leftedit_btn_remove_src" src="../../../image/remove_from_errbook_up.png"></li>
        <li id="leftedit_btn_AI" v-if="complete" tapmode @click="PostAIBtn();">
            <img class="noImgClick" id="leftedit_btn_remove_src" src="../../../image/newhomework/aiBtn.png"></li>
    </ul>
    <div style="margin-left: 89px;width: calc(100% - 89px)">
        <div class="wdt_content">
            <div class="content">
                <!--题干部分开始-->
                <div class="stem">
                    <ul style="margin-left: 89px; width: calc(100% - 89px)">
                        <li class="tixing" v-text="'【'+txstr+'】'"></li>
                        <li v-if="complete==1" class="zsd" @click="alertzsd(data.zsdmc)">
                            <span>难易度：</span><img class="noImgClick"
                                                     :src="data.nyd==1?'../../../image/newhomework/1xing.png':data.nyd==2?'../../../image/newhomework/2xing.png':data.nyd==3?'../../../image/newhomework/3xing.png':''"><span> 知识点：</span>{{

                        <img class="noImgClick" v-if="data.is_true!=0"

                        <span :style="data.is_true==1?'color: #4bc7c7':data.is_true==2?'color: #df7605':data.is_true==3?'color: #ffcd06':''"
                              v-text="data.is_true==1?'正确':data.is_true==2?'错误':data.is_true==3?'正确率'+data.accuracy+'%':''"></span>

                    <dd>

                        <!--:max='data.xsdaobj[0].filetime'></div>-->
                        <!--<p class="ypTimeP" v-text="getTimes(data.xsdaobj[0].filetime)"></p>-->
                        <!--</div>-->

                        <div v-if="data.tx=='ldt' && data.is_unable==0" class="lddayinpin clearfix">
                            <img class="scyp2 noImgClick" src="../../../image/startPlay.png"
                                 onclick="vm.ZSrecordRun(this);" :playStatus='0' alt="">
                            <div class="lddaRange"><input class="myRange" type="range" min="0" value="0"
                                                          :max='data.xsdaobj[0].filetime'></div>
                            <p class="ypTimeP" v-text="getTimes(data.xsdaobj[0].filetime)"></p>
                        </div>


                        <ul class="clearfix wendawdda">
                            <!--<li v-for="list in data.xsdaobj"-->

                            <!--:class="list.is_unable==1?'wendazi':(list.is_txt==1 && list.is_unable==0 && !list.image)?'wendazi':(list.is_txt==1 && list.is_unable==0 && list.image)?'wendatu imgborder':list.is_txt==0 && list.is_unable==0?'wendatu imgborder':'wendatu imgborder'">-->
                            <!--<p v-if="list.is_unable==1 ||(list.is_txt==1 && list.is_unable==0 && !list.image)"-->
                            <!--v-html="list.is_unable==1?'不会做':list.is_txt==1 && list.is_unable==0?list.descript:''"></p>-->
                            <!--<p v-if="(list.is_txt==0 && list.is_unable==0) || list.image"-->
                            <!--v-html="list.image?list.image:list.descript"></p>-->
                            <!--</li>-->
                            <li v-for="list in data.xsdaobj"
                                v-if="data.tx!='ldt'||(data.tx=='ldt' && list.is_unable==1 )"
                                :class="list.is_unable==1?'wendazi':(list.is_txt==1 && list.is_unable==0 && !list.image)?'wendazi':list.is_txt==2?'wendayuyin imgborder':list.is_txt==3?'wendashipin imgborder':'wendatu imgborder'">

                                <p v-if="list.is_txt==0 && list.is_unable==0" v-html="list.thumbnail"></p>
                                <p v-if="list.is_txt==2 || list.is_txt==3" :url="list.serverpath+list.preview_link"
                                   tapmode

                    <dd v-if="data.tx!='ldt'" class="needpic">

                    </dd>
                    <dd class="needpic">
                        <h2 class="wendah2">【答案解析】</h2>
                        <ul>
                            <li class="wendazi" v-html="data.dajx==''?'无':data.dajx">

<script>
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    var moduleDialog = null;//弹窗模块bhzparam

    var timer = null;
    var audioStreamer;
    var sec;
    var downloadPath;
    apiready = function () {
        vue();
        api.addEventListener({// 点击查看答案或者切换题目暂停音频
            name: 'yinpinCLose'
        }, function (ret, err) {
            vm.complete = !vm.complete;
            if ($api.domAll('.scyp2').length >= 1) {
                if ($('.scyp2').attr('playStatus') == 1) {
                    $api.attr($api.dom('.scyp2'), 'playStatus', '2');
                }
                audioStreamer = api.require('audioStreamer');
                clearInterval(timer);
                audioStreamer.pause();
                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                $api.dom('.myRange').disabled = true;
            }
        });
        vm.isdt = api.pageParam.isdt;
        vm.totalCount = api.pageParam.totalCount;
        vm.index = api.pageParam.index;

        vm.current_page = api.pageParam.index;///////
        document.getElementById('leftedit_btn_remove_src').addEventListener('touchstart', function () {
            document.getElementById('leftedit_btn_remove_src').src = "../../../image/remove_from_errbook_down.png";
        });
        document.getElementById('leftedit_btn_remove_src').addEventListener('touchend', function () {
            document.getElementById('leftedit_btn_remove_src').src = "../../../image/remove_from_errbook_up.png";
        });

        document.getElementById('leftedit_btn_checkanswer_src').addEventListener('touchstart', function () {
            document.getElementById('leftedit_btn_checkanswer_src').src = "../../../image/check_answer_down.png";
        });
        document.getElementById('leftedit_btn_checkanswer_src').addEventListener('touchend', function () {
            document.getElementById('leftedit_btn_checkanswer_src').src = "../../../image/check_answer_up.png";
        });
        vm.getExInfo();

    };

    function vue() {
        vm = new Vue({
            el: '.all_wdt_content',
            data: {
                current_page: 0,
                isdt: 1,
                important: 0,
                index: 0,
                totalCount: 0,
                data: {},
                tx_type: '',
                answerArr: [],//答案数组
                complete: 0,
                answerStr: '',//答案字符串
                dastr: '',//习题正确答案
                is_true: '',//本次答题是否正确
                txstr: '',
                bhzparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 75,
                        "h": 150,
                        "w": 300
                    }, {
                        "viewType": 101,
                        "x": api.winWidth / 2 - 150 + 30,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,
                        "h": 48,
                        "w": 240,
                        "lineSpacting": 1.3,
                        "showText": "<font color='#666666'>确认移出错题本？</font>",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 159,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "ok",
                        "showText": "确定",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 40,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "no",
                        "showText": "取消",
                        "textSize": 14
                    }]
                },
            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');
                    $api.domAll('a')[i].onclick = function () {
                        return false;
                    }
                }
            },
            methods: {
                videoZYPlay: function (context) {
                    var url = $api.attr(context, 'url');
                    var filetime = $api.attr(context, 'filetime');
                    api.openWin({
                        name: 'win_video_view',
                        url: '../../win_video_view.html',
                        slidBackEnabled: false,
                        pageParam: {
                            path: url,
                            title: '',
                            isMp3: false,
                            filetime: filetime
                        }
                    });
                },
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },
                tihuan: function (content) {
                    return content.replace(/#/g, "<font color='#999'>或</font>");
                },
                onMakePointClick: function () {
                    apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.DeleteStudentWrongBookUrl, {
                        body: $api.jsonToStr({
                            uid: $api.getStorage('uid'),
                            type: 'is_important',
                            sys_id: vm.data.sys_id,
                            kc_type: vm.data.kc_type,
                            is_important: vm.important == 1 ? 0 : 1
                        })
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                if (vm.important === 0) {
                                    vm.important = 1;
                                } else {
                                    vm.important = 0;
                                }
                                api.sendEvent({
                                    name: 'editImp',
                                    extra: {}
                                });
                            } else {
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }
                        } else {
                            api.toast({
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    })
                },
                onCheckAnswerClick: function () {
                    api.sendEvent({//暂停音频
                        name: 'yinpinCLose'
                    });
                },
                onRemoveFromErrNoteClick: function () {
                    moduleDialog = api.require('moduleDialog');
                    moduleDialog.showDialog(vm.bhzparam, function (ret, err) {
                        if (ret.state == 'success' && ret.clickID) {
                            if (ret.clickID == 'ok') {
                                apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.DeleteStudentWrongBookUrl, {
                                    body: $api.jsonToStr({
                                        uid: $api.getStorage('uid'),
                                        type: 'outbook',
                                        sys_id: vm.data.sys_id,
                                        kc_type: vm.data.kc_type,
                                    })
                                }, function (ret, err) {
                                    if (ret) {
                                        if (ret.ret == 0) {
                                            //在这处理删除第一题，最后一题以及总题数是否为0
                                            vm.totalCount = vm.totalCount - 1;

                                            if (vm.totalCount == 0) {
                                                api.closeWin();
                                            } else {
                                                api.sendEvent({
                                                    name: 'onTopIndexChange',
                                                    extra: {index: vm.current_page},
                                                });
                                            }
                                            api.sendEvent({
                                                name: 'removeError',
                                                extra: {}
                                            });//刷新错题列表的frame数据

                                        } else {
                                            api.toast({
                                                msg: ret.msg,
                                                duration: 2000,
                                                location: 'bottom'
                                            });
                                        }
                                    } else {
                                        api.toast({
                                            msg: err.msg,
                                            duration: 2000,
                                            location: 'bottom'
                                        });
                                    }
                                });
                                dismissDialog();
                            } else {
                                dismissDialog();
                            }
                        } else {

                        }

                    });
                },
                getTimes: function (value) {
                    var secondTime = parseInt(value);// 秒
                    var minuteTime = 0;// 分
                    if (secondTime > 59) {//如果秒数大于60，将秒数转换成整数
                        //获取分钟，除以60取整数，得到整数分钟
                        minuteTime = parseInt(secondTime / 60);
                        //获取秒数，秒数取佘，得到整数秒数
                        secondTime = parseInt(secondTime % 60);
                    }
                    var result = "" + parseInt(secondTime);
                    if (minuteTime > 0 && secondTime < 10) {
                        if (minuteTime > 9) {
                            result = parseInt(minuteTime) + ":0" + result;
                        } else {
                            result = "0" + parseInt(minuteTime) + ":0" + result;
                        }
                    } else if (minuteTime > 0 && secondTime >= 10) {
                        if (minuteTime > 9) {
                            result = parseInt(minuteTime) + ":" + result;
                        } else {
                            result = "0" + parseInt(minuteTime) + ":" + result;
                        }
                    } else if (minuteTime == 0 && secondTime < 10) {
                        result = "00" + ":0" + result;
                    } else {
                        result = "00" + ":" + result;
                    }
                    return result;
                },
                getExInfo: function () {
                    apiObj.Get(UrlRouter.ExercisesWrongs, {
                        values: {
                            uid: $api.getStorage('uid'),
                            schoolid: $api.getStorage('newSchoolId'),
                            xkid: api.pageParam.xkid,
                            online: api.pageParam.online,
                            type: api.pageParam.type,
                            njid: api.pageParam.njid,
                            dyid: api.pageParam.dyid,
                            page: vm.index,
                            num: 1,
                            tx: api.pageParam.tx,
                            is_important: api.pageParam.isImportant,
                            xd: $api.getStorage('stuXD')
                        }
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                
                                vm.data = ret.data.data[0];
                                vm.tx_type = vm.data.tx;
                                vm.txstr = vm.data.txstr;
                                vm.important = vm.data.is_important;
                                vm.dastr = vm.data.dastr;
                                $('.all_wdt_content').css('display', 'block');
                            } else {
                                toast12xue(ret.msg);
                            }
                        } else {
                            toast12xue(err.msg);
                        }
                    });
                },
                ZSrecordRun: function (context) {
                    audioStreamer = api.require('audioStreamer');
                    var playStatus = $api.attr(context, 'playStatus');
                    var bfb;
                    var recodetime;
                    if (playStatus == '0') {
                        if (timer) {
                            clearInterval(timer);
                        }
                        $api.attr(context, 'playStatus', '1');
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                        sec = 0;
                        allTimes = vm.data.xsdaobj[0].filetime;
                        recodetime = vm.data.xsdaobj[0].filetime;
                        var url = vm.data.xsdaobj[0].serverpath + vm.data.xsdaobj[0].savename;
                        var path = "/audio/" + url;
                        api.download({
                            url: url,
                            savePath: 'fs:/' + path,
                            report: false,
                            cache: false,
                            allowResume: false
                        }, function (ret, err) {
                            if (ret && ret.state == 1) {
                                timer = setInterval(function (e) {
                                    sec = sec + 1;
                                    allTimes = allTimes - 1;
                                    bfb = sec / recodetime * 100;
                                    bfb = bfb.toFixed(2);
                                    var ss = 'background-size: ' + bfb + '% 100%';
                                    console.log(sec);
                                    if (allTimes == 0 || sec >= vm.data.xsdaobj[0].filetime) {
                                        clearInterval(timer);
                                        $api.attr(context, 'playStatus', '0');
                                        $api.dom('.myRange').value = 0;
                                        $api.dom('.myRange').disabled = true;
                                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                        $api.text($api.dom('.ypTimeP'), vm.getTimes(vm.data.xsdaobj[0].filetime));
                                        $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                                    } else {
                                        var range = $api.dom('.myRange');
                                        range.value = sec;
                                        range.disabled = false;
                                        range.onchange = function () {
                                            sec = parseInt(this.value);
                                            range.value = sec;
                                            allTimes = vm.data.xsdaobj[0].filetime - sec;
                                            var time = vm.getTimes(allTimes);
                                            $api.text($api.dom('.ypTimeP'), time);
                                            bfb = sec / recodetime * 100;
                                            bfb = bfb.toFixed(2);
                                            var ss = 'background-size: ' + bfb + '% 100%';
                                            $api.css($api.dom('.myRange'), ss);
                                            audioStreamer.seekToTime({
                                                time: sec
                                            });
                                        };
                                        var time = vm.getTimes(allTimes);
                                        $api.css($api.dom('.myRange'), ss);
                                        $api.text($api.dom('.ypTimeP'), time);
                                    }
                                }, 1000);
                                downloadPath = api.fsDir + path;
//                                if (api.systemType == 'ios') {
//                                    if(downloadPath.indexOf('.mp3') != -1){
//                                        audioStreamer.openPlayer({
//                                            path: downloadPath
//                                        }, function (ret) {
//                                        });
//                                    } else {
//                                        var audioTrans = api.require('audioTrans');
//                                        audioTrans.amrToWav({
//                                            path: downloadPath
//                                        }, function (ret) {
//                                            if (ret) {
//                                                var path1 = ret.path;
//                                                audioStreamer.openPlayer({
//                                                    path: path1
//                                                }, function (ret) {
//                                                });
//                                            }
//                                        });
//                                    }
//
//                                } else {
                                audioStreamer.openPlayer({
                                    path: downloadPath
                                }, function (ret) {
                                });
//                                }
                            }
                        });


                    } else if (playStatus == '1') {
                        $api.attr(context, 'playStatus', '2');
                        clearInterval(timer);
                        audioStreamer.pause();
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                        $api.dom('.myRange').disabled = true;
                    } else {
                        $api.dom('.myRange').disabled = false;
                        $api.attr(context, 'playStatus', '1');
                        recodetime = vm.data.xsdaobj[0].filetime;
                        //这个是一样的  重新播放
                        if (api.systemType == 'ios') {
                            audioStreamer.resume();
                        } else {
                            audioStreamer.openPlayer({
                                path: downloadPath,
                            }, function (ret) {
                            });
                        }
                        $api.attr($api.dom('.scyp2'), 'src', '../../../image/stop.png');
                        timer = setInterval(function (e) {
                            sec = sec + 1;
                            allTimes = allTimes - 1;
                            bfb = sec / recodetime * 100;
                            bfb = bfb.toFixed(2);
                            var ss = 'background-size: ' + bfb + '% 100%';
                            console.log(sec);
                            if (allTimes == 0 || sec >= vm.data.xsdaobj[0].filetime) {
                                clearInterval(timer);
                                $api.attr(context, 'playStatus', '0');
                                $api.dom('.myRange').value = 0;
                                $api.dom('.myRange').disabled = true;
                                $api.attr($api.dom('.scyp2'), 'src', '../../../image/startPlay.png');
                                $api.text($api.dom('.ypTimeP'), vm.getTimes(vm.data.xsdaobj[0].filetime));
                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');
                            } else {

                                var range = $api.dom('.myRange');
                                range.value = sec;
                                range.disabled = false;
                                range.onchange = function () {
                                    sec = parseInt(this.value);
                                    range.value = sec;
                                    allTimes = vm.data.xsdaobj[0].filetime - sec;
                                    var time = vm.getTimes(allTimes);
                                    $api.text($api.dom('.ypTimeP'), time);
                                    bfb = sec / recodetime * 100;
                                    bfb = bfb.toFixed(2);
                                    var ss = 'background-size: ' + bfb + '% 100%';
                                    $api.css($api.dom('.myRange'), ss);
                                    audioStreamer.seekToTime({
                                        time: sec
                                    });
                                };
                                var time = vm.getTimes(allTimes);
                                $api.css($api.dom('.myRange'), ss);
                                $api.text($api.dom('.ypTimeP'), time);
                            }
                        }, 1000);
                    }
                },
                PostAIBtn: async function () {
                    const aiAnalysis = $api.getStorage('aiAnalysis');
                    const ret = await new Promise((resolve, reject) => {
                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {
                            body: $api.jsonToStr({
                                schoolid: $api.getStorage('schoolid'),
                                type: 'ai_analysis',
                                resource_id: vm.data.xtid,
                                count: aiAnalysis.count,
                                card_type: aiAnalysis.card_type !== undefined ? aiAnalysis.card_type : null,
                                ...(aiAnalysis.card_id !== undefined && {card_id: aiAnalysis.card_id}),
                            })
                        }, function (ret, err) {
                            if (ret) {
                                resolve(ret);
                            } else {
                                reject(err);
                            }
                        })
                    });
                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber')|| ret.ret === -1) {
                        if ($api.getStorage('upgradeQRCode') === '1') {
                            api.toast({
                                msg: '本月剩余AI解析次数已耗尽',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            api.openFrame({
                                name: 'frame-number-exhausted',
                                url: '../frame-number-exhausted.html',
                            })
                        }
                        return
                    }

                    if (ret.ret === 0 && ret.data === '') {
                        api.execScript({
                            name: 'win_error_detail_new',
                            script: 'postAIjxNum();'
                        });
                    }
                    api.showProgress({
                        title: '正在请求AI',
                        text: '请稍后...',
                        modal: true
                    });
                    const tgContent = document.querySelector('.tg_content');
                    const needPics = document.querySelectorAll('.needpic');
                    const allElements = [tgContent, ...needPics];
                    const imageUrls = [];
                    let processedCount = 0;
                    // 处理每个元素的截图
                    allElements.forEach((element, index) => {
                        if (!element) return;
                        html2canvas(element, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        }).then(canvas => {
                            const imgUrl = canvas.toDataURL('image/png');
                            // 保存图片到相册    
                            imageUrls[index] = imgUrl;
                            processedCount++;
                            // 当所有图片都处理完成时
                            if (processedCount == allElements.length) {
                                api.hideProgress();
                                api.openFrame({
                                    name: 'frame_liushi',
                                    url: '../newHomework/frame_liushi.html',
                                    rect: {
                                        x: 0,
                                        y: 0,
                                        w: 'auto',
                                        h: api.winHeight
                                    },
                                    pageParam: {
                                        xtid: vm.data.xtid,
                                        imagePaths: imageUrls
                                    },
                                    bounces: false
                                });
                            }
                        }).catch(error => {
                            api.toast({
                                msg: '截图失败：' + error,
                                duration: 2000,
                                location: 'bottom'
                            });
                        });
                    });
                },
            }
        });
    }

    function imgClick(context) {
        var src;
        src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        if (src.substring(src.length - 3) == 'gif') {
        } else {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    src
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
        }
    }

    function dismissDialog() {
        moduleDialog.dismissDialog();
    }
</script>
