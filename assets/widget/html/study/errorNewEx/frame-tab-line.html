<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no"/>
    <meta name="viewport"
          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>

    <title>title</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css"/>
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css"/>
    <style>
        html, body {
            background-color: rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .aui-border-t:before, .aui-border-b:after {
            height: 0px;
        }

        .show {
            width: 300px;
            top: calc(50% - 105px);
            position: absolute;
            left: calc(50% - 150px);
            background: #fff;
            border-radius: 5px;
            padding-top: 2rem;
            height: 210px;
            overflow-y: auto;
        }

        .item {
            text-align: center;
            font-size: 0.8rem;
            color: #fff;
            width: 60%;
            height: 46px;
            line-height: 46px;
            margin: 0 auto;
            border-radius: 5px;
            margin-bottom: 20px;
            background: #4bc7c7;
        }

        .item:active {
            background: #3fa6a6;
        }

        .backgroud {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="backgroud" tapmode onclick="api.closeFrame({
    name: 'frame-tab-line'
});"></div>
<div class="show">
    <ul >
        <li class="item aui-border-b" tapmode @click="itemClick(1)">线上错题</li>
        <li class="item aui-border-b" tapmode @click="itemClick(2)">线下错题</li>
    </ul>
    <!--<p id="2" class="item aui-border-b" tapmode onclick="itemClick(this)">未发送</p>-->
    <!--<p id="1" class="item aui-border-b" tapmode onclick="itemClick(this)">发送过</p>-->
</div>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/vue.min.js"></script>
<script type="text/javascript">
    var vm;
    var name;
    apiready = function () {
        vm = new Vue({
            el: '.show',
            data: {
                datalist: api.pageParam.array
            },
            methods: {
                itemClick: function (item) {
                    if (item == 1) {
                        name = '线上错题'
                    } else {
                        name = '线下错题'
                    }

                    api.sendEvent({
                        name: 'selectlinedata',
                        extra: {njdata: name}
                    });
                    api.closeFrame({
                        name: 'frame-tab-line'
                    });
                }
            }
        });

    };
</script>
</html>
