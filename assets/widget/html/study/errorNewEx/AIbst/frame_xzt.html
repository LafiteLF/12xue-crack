<script>

    function vue() {
        vm = new Vue({
            el: '.xzt_content',
            data: {

                isdt: 1,

                index: 0,
                totalCount: 0,

                dastr: '',//习题正确答案

                xsdastr: '',//学生做题时的答案
                txstr: '',
                bhzparam: {
                    "data": [{
                        "viewType": 100,
                        "x": api.winWidth / 2 - 150,
                        "y": $api.getStorage('padHeight') / 2 - 75,
                        "h": 150,
                        "w": 300
                    }, {

                        "x": api.winWidth / 2 - 150 + 30,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 30,
                        "h": 48,
                        "w": 240,
                        "lineSpacting": 1.3,
                        "showText": "<font color='#666666'>确认移出错题本？</font>",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 159,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "ok",
                        "showText": "确定",
                        "textSize": 14
                    }, {
                        "viewType": 102,
                        "x": api.winWidth / 2 - 150 + 40,
                        "y": $api.getStorage('padHeight') / 2 - 75 + 94,
                        "h": 35,
                        "w": 100,
                        "clickID": "no",
                        "showText": "取消",
                        "textSize": 14
                    }]

            },
            updated: function () {
                for (var i = 0; i < $api.domAll('img').length; i++) {
                    if (!$api.hasCls($api.domAll('img')[i], 'noImgClick')) {
                        $api.attr($api.domAll('img')[i], 'onclick', 'imgClick(this);');
                    }
                }
                for (var i = 0; i < $api.domAll('a').length; i++) {
                    $api.css($api.domAll('a')[i], 'color: #666;');

                        return false;
                    }
                }
            },
            methods: {
                alertzsd: function (content) {
                    alert('知识点：' + content);
                },
                checkAnswer: function () {//点击提交的时候 is_true需要重新计算
                    if (vm.answer.length != 0) {
                        vm.answerStr = vm.answer.sort().join('');//先对选项排序 再生成字符串
                        if (vm.data.tx == 'pdt') {
                            vm.answerStr = vm.answerStr == 'A' ? '对' : '错';
                        }
                        //vm.is_true = vm.answerStr == vm.dastr ? true : false;
                        vm.complete = 1;

                        var dataInfo = $api.jsonToStr({
                            sxdaStr: vm.answerStr
                        });
                        judgeAccuracy(vm.dastr, vm.answerStr);
                        var db_true = vm.is_true;

                        //打开数据库
                        var db = api.require('db');
                        var retDatabaseSync = db.openDatabaseSync({
                            name: dbName,
                            path: 'fs://student_12xue.db'
                        });
                        var INSERTret = db.executeSqlSync({//插入一条数据
                            name: dbName,
                            sql: "INSERT INTO NewErrorBooKData(uid,sys_id,is_true,answerStr) VALUES (" + $api.getStorage('uid') + "," + vm.data.sys_id + "," + db_true + ",'" + dataInfo.replace(/'/g, '&apos;') + "')"
                        });

                    }
                },
                isdxactive: function (xxid) {//判断多选选项是否选择了
                    if (vm.answer.length > 0) {
                        for (var i = 0; i < vm.answer.length; i++) {
                            if (vm.answer[i] == xxid) {
                                return true;
                            }
                        }
                    }
                },
                xxselectClicked: function (context) {//选择判断题选项点击事件
                    if (vm.data.tx == 'duoxt') {//判断是多选题 可以选多个答案
                        if (vm.answer.length == 0) {
                            vm.answer.push($(context).attr('id'));
                            vm.is_unable = 0;//会做
                        } else {
                            for (var i = 0; i < vm.answer.length; i++) {
                                if (vm.answer[i] == $(context).attr('id')) {
                                    vm.answer.splice(i, 1);
                                    return;
                                } else if (i == vm.answer.length - 1) {
                                    vm.answer.push($(context).attr('id'));
                                    vm.is_unable = 0;//会做
                                    return;
                                }
                            }
                        }
                    } else {//判断是单选 或者判断题 只有一个选项的
                        Vue.set(vm.answer, 0, $(context).attr('id'));
                    }
                },
                onMakePointClick: function () {
                    apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.DeleteStudentWrongBookUrl, {
                        body: $api.jsonToStr({
                            uid: $api.getStorage('uid'),
                            type: 'is_important',
                            sys_id: vm.data.sys_id,
                            kc_type: vm.data.kc_type,
                            is_important: vm.important == 1 ? 0 : 1
                        })
                    }, function (ret, err) {
                        if (ret) {
                            if (ret.ret == 0) {
                                if (vm.important === 0) {
                                    vm.important = 1;
                                } else {
                                    vm.important = 0;
                                }
                                api.sendEvent({
                                    name: 'editImp',
                                    extra: {}
                                });
                            } else {
                                api.toast({
                                    msg: ret.msg,
                                    duration: 2000,
                                    location: 'bottom'
                                });
                            }
                        } else {
                            api.toast({
                                msg: err.msg,
                                duration: 2000,
                                location: 'bottom'
                            });
                        }
                    })
                },
                onCheckAnswerClick: function () {//更换变式题
                    
                },
                getExInfo: function () {
                    vm.data = api.pageParam.material;
                    vm.tx_type = vm.data.tx;
                    vm.txstr = vm.data.txstr;
                    vm.important = vm.data.is_important;
                    vm.dastr = vm.data.dastr;
                    vm.xsdastr = vm.data.is_unable ==1 ? '无' : vm.data.xsdastr;
                    vm.is_true = vm.data.is_true;
                    $('.xzt_content').css('display','block');
                },
                studentRecord: function (context) {
                    var url = vm.data.attachments[0].serverpath + vm.data.attachments[0].preview_link;   // 获取一下  data.attachments[0].serverpath + data.attachments[0].preview_link
                    var playStatus = $api.attr(context, 'playStatus');
                    var recodetime = vm.data.attachments[0].filetime;  // 获取一下  filetime
                    var hideenAudio = $api.dom('.hideenAudio');
                    var range = $api.dom('.myRange');
                    range.disabled = true;
                    var bfb;  //1
//这是没有播放的情况  播放点击的音频  可能有其他音频正在播放  先关掉其他音频  再播放这个音频
                    if (playStatus == '0') {
                        if (timer) {
                            clearInterval(timer);
                        }
                        $api.attr(context, 'playStatus', '1');
                        $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');
                        hideenAudio.play();
                        sec = 0;
                        allTimes = recodetime;
                        timer = setInterval(function (e) {
                            console.log(hideenAudio.currentTime + '  ' + sec);
                            sec = sec + 1;
                            allTimes = allTimes - 1;
                            bfb = sec / recodetime * 100;   //2
                            bfb = bfb.toFixed(2);//2
                            var ss = 'background-size: ' + bfb + '% 100%';//2
                            if (allTimes == 0 || sec >= recodetime) {
                                clearInterval(timer);
                                $api.attr(context, 'playStatus', '0');
                                $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');
                                var time = vm.getOutTime(recodetime);
                                $api.text($api.dom('.ypTimeP'), time);
                                range.value = 0;
                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%'); //3
                            } else {
                                range.value = sec;
//                                range.onchange = function () {
//                                    sec = parseInt(this.value);
//                                    range.value = sec;
//                                    hideenAudio.currentTime = sec;
//                                    allTimes = recodetime - sec;
//                                    var time = vm.getOutTime(allTimes);
//                                    $api.text($api.dom('.ypTimeP'), time);
//                                };
                                var time = vm.getOutTime(allTimes);
                                $api.css($api.dom('.myRange'), ss);  //4
                                $api.text($api.dom('.ypTimeP'), time);
                            }
                        }, 1000);
                    } else if (playStatus == '1') {
                        $api.attr(context, 'playStatus', '2');
                        $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');
                        clearInterval(timer);
                        hideenAudio.pause();
                    } else {
                        $api.attr(context, 'playStatus', '1');
                        hideenAudio.play();
                        $api.attr($api.dom('.scyp2'), 'src', '../../../../image/stop.png');
                        timer = setInterval(function (e) {
                            sec = sec + 1;
                            allTimes = allTimes - 1;
                            bfb = sec / recodetime * 100;    //5
                            bfb = bfb.toFixed(2);   //5
                            var ss = 'background-size: ' + bfb + '% 100%';  //5
                            if (allTimes == 0 || sec >= recodetime) {
                                $api.attr(context, 'playStatus', '0');
                                clearInterval(timer);
                                $api.attr($api.dom('.scyp2'), 'src', '../../../../image/startPlay.png');
                                var time = vm.getOutTime(recodetime);
                                $api.text($api.dom('.ypTimeP'), time);
                                range.value = 0;
                                $api.css($api.dom('.myRange'), 'background-size: 0% 100%');   //6
                            } else {
                                range.value = sec;
//                                range.onchange = function () {
//                                    sec = parseInt(this.value);
//                                    range.value = sec;
//                                    hideenAudio.currentTime = sec;
//                                    allTimes = recodetime - sec;
//                                    var time = vm.getOutTime(allTimes);
//                                    $api.text($api.dom('.ypTimeP'), time);
//                                };
                                var time = vm.getOutTime(allTimes);
                                $api.css($api.dom('.myRange'), ss);    //7
                                $api.text($api.dom('.ypTimeP'), time);
                            }
                        }, 1000);
                    }
                },
                getOutTime: function (intime) {
                    var outTime = '';
                    if(intime<=9){
                        outTime = '00:0'+intime;
                    }else if(intime<59){
                        outTime = '00:'+intime;
                    }else {
                        var min =parseInt(intime/60);
                        var sec = intime%60;
                        if(sec<=9){
                            if(min>0&&min<10){
                                outTime ='0'+ min+ ':0' + sec ;
                            }else if(min>=10){
                                outTime = min+ ':0' + sec ;
                            }else{
                                outTime = '00:0'+sec;
                            }
                        }else{
                            if(min > 0 && min < 10){
                                outTime ='0'+ min + ':'+ sec ;
                            }else if(min>=10){
                                outTime = min + ':'+ sec ;
                            }else {
                                outTime = '00:'+sec;
                            }
                        }
                    }
                    return outTime;
                },
                PostAIBtn: async function () {
                    if (vm.data.tx == 'tdjh') {
                        api.toast({
                            msg: '听力题暂不支持AI解析'
                        })
                        return;
                    }
                    const aiAnalysis = $api.getStorage('aiAnalysis');
                    const ret = await new Promise((resolve, reject) => {
                        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.PostPayfeeOperationLog, {
                            body: $api.jsonToStr({
                                schoolid: $api.getStorage('schoolid'),
                                type: 'ai_analysis',
                                resource_id: vm.data.xtid,
                                count: aiAnalysis.count,
                                card_type: aiAnalysis.card_type !== undefined ? aiAnalysis.card_type : null,
                                ...(aiAnalysis.card_id !== undefined && {card_id: aiAnalysis.card_id}),
                            })
                        }, function (ret, err) {
                            if (ret) {
                                resolve(ret);
                            } else {
                                reject(err);
                            }
                        })
                    });
                    if ((aiAnalysis.count <= 0 && ret.ret === 0 && ret.data === 'nonumber')|| ret.ret === -1) {
                        if ($api.getStorage('upgradeQRCode') === '1') {
                            api.toast({
                                msg: '本月剩余AI解析次数已耗尽',
                                duration: 2000,
                                location: 'bottom'
                            });
                        } else {
                            api.openFrame({
                                name: 'frame-number-exhausted',
                                url: '../../frame-number-exhausted.html',
                            })
                        }
                        return
                    }
                    if(ret.ret === 0 && ret.data === ''){
                        api.execScript({
                            name: 'win_bst.html',
                            script: 'postAiAnalysis()'
                        });
                    }
                    api.showProgress({
                        title: '正在请求AI',
                        text: '请稍后...',
                        modal: true
                    });
                    const tgContent = document.querySelector('.tg_content');
                    const needPics = document.querySelectorAll('.needpic');
                    const allElements = [tgContent, ...needPics];
                    const imageUrls = [];
                    let processedCount = 0;
                    // 处理每个元素的截图
                    allElements.forEach((element, index) => {
                        if (!element) return;
                        html2canvas(element, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true
                        }).then(canvas => {
                            const imgUrl = canvas.toDataURL('image/png');
                            // 保存图片到相册    
                            imageUrls[index] = imgUrl;
                            processedCount++;
                            // 当所有图片都处理完成时
                            if (processedCount == allElements.length) {
                                api.hideProgress();
                                api.openFrame({
                                    name: 'frame_liushi',
                                    url: '../../newHomework/frame_liushi.html',
                                    rect: {
                                        x: 0,
                                        y: 0,
                                        w: 'auto',
                                        h: api.winHeight
                                    },
                                    pageParam: {
                                        xtid: vm.data.xtid,
                                        imagePaths: imageUrls
                                    },
                                    bounces: false
                                });
                            }
                        }).catch(error => {
                            api.toast({
                                msg: '截图失败：' + error,
                                duration: 2000,
                                location: 'bottom'
                            });
                        });
                    });
                },
            }
        });
    }
    function imgClick(context) {
        var src = $api.attr(context, 'src');
        if (src.indexOf('data:image/png;base64,') != -1) {
            return;
        }
        if (src.substring(src.length - 3) == 'gif') {
        } else {
            var photoBrowser = api.require('photoBrowser');
            photoBrowser.open({
                images: [
                    src
                ],
                placeholderImg: 'widget://../image/loading_more.gif',
                bgColor: '#fff'
            }, function (ret, err) {
                if (ret.eventType == 'click') {
                    photoBrowser.close();
                }
            });
        }
    }

    //线上线下错题按钮不同
    function setLeftBtnGroupType(type) {
        if (type === TYPE_ONLINE) {
            $("#leftedit_btn_checkanswer").removeAttr("style", "display:none;");
            $("#leftedit_btn_edit").attr("style", "display:none;");
        } else if (type === TYPE_OFFLINE) {
            $("#leftedit_btn_checkanswer").attr("style", "display:none;");
            $("#leftedit_btn_edit").removeAttr("style", "display:none;");

        }
    }
    function dismissDialog() {
        moduleDialog.dismissDialog();
    }

    function judgeAccuracy(dastr, xsdastr) {
        var dastrArr = [];
        var xsdastrArr = [];

        if (dastr == xsdastr) {
            vm.is_true = 1;
        }
        else {
            dastrArr = dastr.split('');
            xsdastrArr = xsdastr.split('');

            var flag = 0;//flag = 1则是错 否则为半对

            for (var j = 0; j < xsdastrArr.length; j++) {
                if (dastrArr.indexOf(xsdastrArr[j]) <= -1) {
                    flag = 1;
                    break;
                }
            }

            if (flag == 1) {
                vm.is_true = 2;
            }
            else {
                vm.is_true = 3;
            }
        }
    }
</script>
