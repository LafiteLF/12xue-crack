<script type="text/javascript">
    var apiObj = new GridOpenApi(UrlDomain, source, version);
    apiObj.SetAuthToken($api.getStorage('token'));
    var vm;
    apiready = function () {
        vue();
    };
    function vue() {
        vm = new Vue({
            el: '.close',
            data: {},
            methods: {
                closeFrame: function (event) {
                    api.closeFrame({
                        name: 'frame_error_select_pad'
                    });
                },
                inputClick: function (type) {
                    if (type == 'camera') {
                        api.sendEvent({
                            name: 'selecterror-pad',
                            extra: {type: 'camera'}
                        });
                    }
                    if (type == 'photo') {
                        api.sendEvent({
                            name: 'selecterror-pad',
                            extra: {type: 'photo'}
                        });
                    }
                    api.closeFrame({
                        name: 'frame_error_select_pad'
                    });
                }
            }
        });
    }


    function closeWin() {
        api.closeWin();
    }
</script>
