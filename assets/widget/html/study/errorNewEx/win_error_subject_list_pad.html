<!DOCTYPE HTML>
<html>

<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no" />
    <meta name="viewport"
        content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0" />

    <title>错题本首页</title>
    <link rel="stylesheet" type="text/css" href="../../../css/api.2.0.css" />
    <link rel="stylesheet" type="text/css" href="../../../css/aui.2.0.css" />
    <link rel="stylesheet" href="../../../css/ThirdCss/style.css" />
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        header {
            border-bottom: 1px #e5e5e5 solid;
        }

        body {
            background-color: #f2f2f2
        }

        .titlea {
            width: 100%;
            text-align: left;
        }
    </style>
</head>

<body>
    <header class="aui-bar aui-bar-nav">
        <a class="aui-toolbar-title aui-pull-left titlea" tapmode onclick="closeWin();">
            <span class="aui-iconfont aui-icon-left" tapmode onclick='closeWin()'></span>错题本
        </a>
    </header>
</body>
<script type="text/javascript" src="../../../script/api.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_SDK.js"></script>
<script type="text/javascript" src="../../../script/12XueApi_Router.js"></script>
<script type="text/javascript">
    apiready = function () {
        var header = document.querySelector('header');
        //        //$api.fixStatusBar(header);
        var headerH = $api.offset(header).h;
        var frameH = padWinHeight - headerH;
        api.setStatusBarStyle({
            style: 'light'
        });
        api.addEventListener({
            name: 'viewappear'
        }, function (ret, err) {
            api.closeFrame({
                name: 'frame_add_subject'
            });
        });
        api.openFrame({
            name: 'frame_error_subject_list_pad',
            url: 'frame_error_subject_list_pad.html',
            rect: {
                x: 0,
                y: headerH,
                w: api.winWidth,
                h: frameH
            },
            pageParam: { name: 'pageparam', classid: api.pageParam.classid },
            //            bounces: true
        });

        // Android按返回键关闭页面时结束自定义页面统计
        api.addEventListener({
            name: 'keyback'
        }, function (ret, err) {
            closeWin();
        });
        // speakText();
    };
    function closeWin() {
        api.closeWin();
    }
</script>
