<!DOCTYPE html><html><head>    <meta charset="utf-8">    <meta name="format-detection" content="telephone=no"/>    <meta name="viewport"          content="maximum-scale=1.0,minimum-scale=1.0,user-scalable=0,width=device-width,initial-scale=1.0"/>    <title>裁剪图片</title>    <link rel="stylesheet" type="text/css" href="../../../../css/publicCss.css"/></head><style>    [v-cloak] {        display: none    }    .content {        width: 100%;        height: 100%;        background: #000;    }    ul {        width: 80px;        position: fixed;        right: 0;        top: calc(50vh - 47.5px);        height: auto;    }    ul li {        width: 60px;        height: 30px;        border-radius: 100px;        text-align: center;        color: #fff;        font-size: 1.4rem;        line-height: 30px;    }</style><body><div class="content">    <ul>        <li style="background: #4bc7c7" onclick="save()">确定</li>        <li style="background:#ff778c;margin-top: 35px;" onclick="close2()">取消</li>    </ul></div></body><script type="text/javascript" src="../../../../script/api.js"></script><script type="text/javascript" src="../../../../script/12XueApi_SDK.js"></script><script type="text/javascript" src="../../../../script/12XueApi_Router.js"></script><script type="text/javascript" src="../../../../script/jquery-1.11.3.min.js"></script><script type="text/javascript" src="../../../../script/vue.js"></script><script type="text/javascript" src="../../../../script/common.js"></script><script type="text/javascript" src="../../../../script/fastclick.js"></script><script>    var apiObj = new GridOpenApi(UrlDomain, source, version);    apiObj.SetAuthToken($api.getStorage('token'));    apiready = function () {        var FNImageClip = api.require('FNImageClip');        FNImageClip.open({            rect: {                x: 0,                y: 0,                w: api.winWidth - 80,                h: api.winHeight            },            srcPath: api.pageParam.src,            mode: 'clip',            style: {                mask: 'rgba(0, 0, 0, 0.5)',                clip: {                    w: api.winWidth - 180,                    h: api.winHeight - 100,                    x: 50,                    y: 50,                    borderColor: '#0f0',                    borderWidth: 1,                    appearance: 'rectangle'                }            },            fixedOn: api.frameName        }, function (ret, err) {            if (ret) {            } else {            }        });    };    function save() {        api.showProgress({            title: '正在保存图片',            text: '请稍后',            modal: true        });        var FNImageClip = api.require('FNImageClip');        FNImageClip.save({            destPath: 'fs://imageClip/result' + new Date().valueOf() + '.jpg',            copyToAlbum: false,            quality: 1        }, function (ret, err) {            api.hideProgress();            if (ret) {                if (api.pageParam.from == 'edit' || api.pageParam.currentImgNums > 0) {                    api.sendEvent({                        name: 'cutImg' + api.pageParam.frameName,                        extra: {                            src: ret.destPath,                            sort: api.pageParam.sort,//编辑图片有用                            current_sys_id: api.pageParam.current_sys_id,                            from: api.pageParam.from,                        }                    });                } else {                    api.openFrame({                        name: 'frame_displayImg',                        url: 'frame_displayImg.html',                        rect: {                            x: 0,                            y: 0,                            w: api.winWidth,                            h: api.winHeight                        },                        pageParam: {                            src: ret.destPath,                            sort: api.pageParam.sort,//编辑图片有用                            current_sys_id: api.pageParam.current_sys_id,                            from: api.pageParam.from,                            flag: 'zerocamera',                            currentImgNums: 0,                            currentImgData: [],                        },                        bounces: false                    });                }            } else {                alert(JSON.stringify(err));            }        });    }    function close2() {        var FNImageClip = api.require('FNImageClip');        FNImageClip.close();        api.closeFrame({            name: 'frame_cutImg'        });    }</script></html>
