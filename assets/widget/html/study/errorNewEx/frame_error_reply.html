    function openList() {
        if (isClick == '1') {

                xkid: api.pageParam.xkid,
                xxxz: $api.getStorage('errorxxxz'),
                czxz: $api.getStorage('errorczxz'),
                gzxz: $api.getStorage('errorgzxz')
            }
        }, function (ret, err) {
//        api.hideProgress();

                if (ret.ret == 0) {
                    if (api.pageParam.editct == 1) {
                        if (vm.recommend == '') {

                                if (api.pageParam.errorData.njid == ret.data[i].id) {

                                            vm.recommend = ret.data[i];
                                            vm.nowstatus = ret.data[i].children[j];
                                            break;
                                        }
                                    }
                                }
                            }

                            for (var i = 0; i < ret.data.length; i++) {
                                if (api.pageParam.errorData.grade.id == ret.data[i].id) {
                                    for (var j = 0; j < ret.data[i].children.length; j++) {
                                        if (api.pageParam.errorData.volume.id == ret.data[i].children[j].id) {
                                            vm.recommend = ret.data[i];

                        style: 'light'

                    api.openFrame({
                        name: 'selectEdition',

                            w: api.winwidth,

    //网络请求
    function postReply() {
        api.showProgress({
            style: 'default',
            animationType: 'fade',
            title: '正在保存',
            text: '请稍后',
            modal: true
        });
        var content = clear_emoji($api.val($api.dom(".container textarea")));
        var params = {};
        var arrays = {};
        var reply_userinfo = {};
        if (pImageList && pImageList != undefined && pImageList.length > 0) {
            params["media"] = pImageList;
        }
        params["is_important"] = vm.is_important;

        if (api.pageParam.errorData != '') {
            params["sys_id"] = api.pageParam.errorData.sys_id;
        } else {
            params["sys_id"] = '';
        }
        params["bbid"] = bbid;
        params["sxcid"] = sxcid;
        params["njid"] = njid;
        params["dyid"] = dyid;

        params["descript"] = content;

        params["uid"] = $api.getStorage('uid');

//        alert(JSON.stringify(params))

        apiObj.Header({'Content-Type': 'application/json'}).Post(UrlRouter.UploadExercisesWrong, {
            body: $api.jsonToStr(params)
        }, function (ret, err) {

            if (ret && ret.ret == 0) {
                isClick = '0';
                api.sendEvent({
                    name: 'finishErroeReply'
                });
                api.sendEvent({
                    name: "removeError"
                });
                api.hideProgress();

                /**/
                api.sendEvent({
                    name: 'isImportantStatus',
                    extra: {}
                });


                api.closeWin();
            } else {
                isClick = '0';
                api.hideProgress();
                var msg = '';
                if (ret) {
                    msg = ret.msg;
                } else {
                    msg = err;
                }
                api.toast({
                    msg: msg,
                    duration: 2000,
                    location: 'middle'
                });
                count = 0;
            }
        })

    }

    function qiniuUpfile(index) {
        var fileKey = (new Date()).valueOf() + picArr[index];

        apiObj.Get(UrlRouter.GetQiNiuToken, {
            values: {
                uid: $api.getStorage('uid'),
                bucket: 'vodresource',
                key: fileKey
            }
        }, function (ret, err) {
            if (ret) {
                if (ret.ret == 0) {
                    var qiniuStorage = api.require("qiniuStorage");
                    qiniuStorage.configUploader({
                        params: {},
                        checkCrc: false,
                        mimeType: '',
                        zone: $api.getStorage('qiniuZone')
                    });
                    qiniuStorage.start({
                        token: ret.data.token,
                        path: picArr[index],
                        key: fileKey
                    });
                    qiniuStorage.addEventListener(function (ret) {
                        if (ret.eventType == 'complete' && (api.systemType == 'ios' ? (api.systemType == 'ios' ? ret.info.statusCode : ret.statusCode) : ret.statusCode) == 200) {
                            pImageList.push(QINIU_DOMAIN + ret.key);
                            if (index < picArr.length - 1) {
                                qiniuUpfile(++index);
                            } else {

                                postReply();
                            }
                        }
                    });
                } else {
                    api.hideProgress();
                    count++;
                    api.toast({
                        msg: ret.msg,
                        duration: 2000,
                        location: 'middle'
                    });
                }

            } else {
                api.hideProgress();
                count++;
                api.toast({
                    msg: err.msg,
                    duration: 2000,
                    location: 'middle'
                });
            }

        })
    }

    function addUpfileListener() {
        api.addEventListener({
            name: 'selecterror-pad'
        }, function (ret, err) {
            if (ret) {
                if (ret.value.type == 'camera') {
                    api.getPicture({
                        sourceType: 'camera',
                        encodingType: 'jpg',
                        mediaValue: 'pic',
                        destinationType: 'url',
                        quality: 50
                    }, function (ret, err) {
                        if (ret.data.length > 5) {
                            getFujianUrl(ret.data);
                        }
                    });
                }
                if (ret.value.type == 'photo') {
                    if (api.systemType == 'ios') {
                        api.getPicture({
                            sourceType: 'photo',
                            encodingType: 'jpg',
                            mediaValue: 'pic',
                            destinationType: 'url',

                            quality: 50
                        }, function (ret, err) {
                            if (ret.data.length > 5) {
                                getFujianUrl(ret.data);
                            }
                        });
                    } else {
                        if (!uiMediaScanner) {
                            uiMediaScanner = api.require('UIMediaScanner');
                        }
                        uiMediaScanner.open({
                            type: 'picture',
                            column: 4,
                            classify: true,
                            max: 1,
                            sort: {
                                key: 'time',
                                order: 'desc'
                            }, rotation: true,
                            texts: {
                                stateText: '已选*项',
                                cancelText: '取消',
                                finishText: '完成'
                            },
                            styles: {
                                bg: '#fff',
                                mark: {
                                    icon: '',
                                    position: 'bottom_left',
                                    size: 20
                                },
                                nav: {
                                    bg: '#4bc7c7',
                                    stateColor: '#fff',
                                    stateSize: 18,
                                    cancelBg: 'rgba(0,0,0,0)',
                                    cancelColor: '#fff',
                                    cancelSize: 18,
                                    finishBg: 'rgba(0,0,0,0)',
                                    finishColor: '#fff',
                                    finishSize: 18
                                }
                            }
                        }, function (ret) {
                            if (ret.eventType == 'confirm') {
                                if (ret.list.length != 0) {
                                    getFujianUrl(ret.list[0].path);
                                }
                            }
                        })
                    }
                }
            }


            function getFujianUrl(url) {
                api.showProgress({
                    title: '加载中',
                    text: '请稍后...',
                    modal: false
                });

    // 图片压缩处理
    function compressImage(url) {
        var imageFilter = api.require('imageFilter');
        var imgName = getUrlName(url);
        var quality;
        if (api.systemType == 'ios') {
            quality = 0.2;
        } else {
            quality = 0.3;
        }
        imageFilter.compress({
            img: url,
            quality: quality,
            save: {
                imgPath: "fs://img_compress/",
                imgName: imgName
            }
        }, function (ret, err) {
            console.log("compress result : ret=" + JSON.stringify(ret) + "  err:" + JSON.stringify(err));
            if (ret.status) {
                compressListener.successCount++;
                displayPic(api.fsDir + "/img_compress/" + imgName);
                console.log("compress url:" + api.fsDir + "/" + imgName);
            } else {
                alert(JSON.stringify(err));
            }
            imageFilter = '';
        })
    }

    /**
     * 检查图片压缩进度
     * @returns {boolean} true 压缩完成
     */
    function checkImageCompress() {
        if (compressListener.allCount != 0 && compressListener.allCount != compressListener.successCount) {
            api.toast({
                msg: '正在压缩图片，请稍后操作',
                duraction: 2000,
                location: 'middle'
            });
            return false;
        }
        return true;
    }

    function getUrlName(url) {
        var index = url.lastIndexOf("/");
        var imgName;
        if (api.systemType == 'ios') {
            var idIndex = url.indexOf("id=");
            if (idIndex != -1) {
                var idStr = url.substr(idIndex);
                var andIndex = url.indexOf("&");
                imgName = url.substring(idIndex + 3, andIndex);
            } else {
                imgName = url.substring(index + 1);
            }
        } else {
            imgName = url.substring(index + 1);
        }
        return imgName;
    }
